<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CentuMania · Medieval History Part 1</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0a12;--bg2:#0a0810;--panel:#1a1523;--panel2:#201b2c;--line:#2d2640;
  --ink:#f0e8ff;--ink2:#b89fd4;--ink3:#6b5a8a;
  --gold:#c084fc;--gold2:#9333ea;--gold-glow:rgba(192,132,252,.13);
  --amber:#f59e0b;--gold-bg:rgba(192,132,252,.12);
  --red:#f87171;--red-bg:rgba(248,113,113,.10);
  --blue:#60a5fa;--green:#34d399;
  --mono:"JetBrains Mono",monospace;--serif:"Instrument Serif",serif;--sans:"DM Sans",sans-serif;
  --nav:56px;--aside:268px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px}
.shell{display:grid;grid-template-rows:var(--nav) 1fr;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;padding:0 18px;gap:12px;border-bottom:1px solid var(--line);background:rgba(10,8,16,.97);backdrop-filter:blur(14px);z-index:60}
.logo{font-family:var(--serif);font-size:19px;font-style:italic;color:var(--gold);display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);flex-shrink:0}
.nav-stats{display:flex;gap:16px;margin-left:auto;align-items:center}
.stat{font-family:var(--mono);font-size:11px;color:var(--ink2)}
.stat b{font-size:13px}.stat.xp b{color:var(--gold)}.stat.nd b{color:var(--amber)}.stat.tp b{color:var(--red)}
.body-wrap{display:grid;grid-template-columns:var(--aside) 1fr;overflow:hidden;height:calc(100vh - var(--nav))}
aside{background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto}
aside::-webkit-scrollbar{width:3px}aside::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
main{overflow-y:auto;background:var(--bg)}
main::-webkit-scrollbar{width:4px}main::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
#sidebar-inner{padding:10px 8px 60px}
.ch-group{margin-bottom:3px}
.ch-toggle{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink2);padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:.13s;font-family:var(--sans)}
.ch-toggle:hover{background:var(--panel);color:var(--ink)}
.ch-icon{font-size:15px}.ch-label{flex:1}.ch-prog{font-family:var(--mono);font-size:10px;color:var(--ink3)}.ch-arr{font-size:11px;color:var(--ink3);flex-shrink:0}
.node-items{padding:3px 4px 3px 10px}
.ni-btn{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink3);padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;transition:.12s;font-family:var(--sans);margin-bottom:1px;min-height:44px}
.ni-btn:hover:not(.locked){background:var(--panel);color:var(--ink)}
.ni-btn.active{background:var(--gold-glow);border-color:var(--gold2);color:var(--gold)}
.ni-btn.passed:not(.active){color:var(--ink)}
.ni-btn.locked{cursor:default;opacity:.4}
.ni-title{flex:1;line-height:1.3}.ni-xp{font-family:var(--mono);font-size:10px;color:var(--ink3);flex-shrink:0}
.ni-tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;flex-shrink:0}
.ni-tag.lock{color:var(--ink3)}.ni-tag.done{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.25)}.ni-tag.vis{color:var(--amber)}
.view{padding:28px clamp(16px,3.5vw,52px) 80px;max-width:900px;margin:0 auto}
.tabs{display:flex;gap:3px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:22px;width:fit-content}
.tab{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:8px;cursor:pointer;border:0;background:none;color:var(--ink2);transition:.14s}
.tab:hover:not(.active){color:var(--ink)}.tab.active{background:var(--gold2);color:#fff;font-weight:700}
.tab-pane{display:none}.tab-pane.active{display:block}
.node-hd-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.node-type-tag{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.node-type-tag.trap{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.node-type-tag.gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(192,132,252,.3)}
.xp-pill{font-family:var(--mono);font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid rgba(192,132,252,.2);border-radius:6px;padding:3px 8px;margin-left:auto}
.node-title{font-family:var(--serif);font-size:clamp(24px,4vw,36px);font-style:italic;line-height:1.1;margin-bottom:12px}
.node-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
.ns-item{display:flex;flex-direction:column;gap:3px}
.ns-label{font-family:var(--mono);font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.ns-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink)}
.ns-val.faa-col{color:var(--amber)}.ns-val.pass-col{color:var(--green)}.ns-val.pend-col{color:var(--ink2)}
.fact-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin:12px 0;overflow:hidden}
.fact-block.gold-block{background:linear-gradient(135deg,rgba(192,132,252,.07),rgba(147,51,234,.04));border-color:rgba(192,132,252,.3)}
.fb-head{padding:9px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink2);border-bottom:1px solid var(--line);background:var(--panel2)}
.fb-body{padding:14px 16px}
ul.facts{list-style:none;padding:0}
ul.facts li{padding:7px 0 7px 22px;border-bottom:1px dashed var(--line);font-size:14px;position:relative;line-height:1.55}
ul.facts li:last-child{border-bottom:0}
ul.facts li::before{content:"▸";position:absolute;left:3px;top:9px;color:var(--amber);font-size:11px}
ul.facts b{color:var(--gold)}
.trap-block{background:var(--red-bg);border:1px solid rgba(248,113,113,.35);border-radius:12px;overflow:hidden;margin:12px 0}
.trap-block .fb-head{background:rgba(248,113,113,.08);color:var(--red);border-color:rgba(248,113,113,.35)}
.trap-block ul.facts li::before{content:"⚠";color:var(--red)}
.mnemonic-block{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.3);border-radius:12px;overflow:hidden;margin:12px 0}
.mnemonic-block .fb-head{background:rgba(96,165,250,.07);color:var(--blue);border-color:rgba(96,165,250,.3)}
.revision-block{background:rgba(96,165,250,.05);border:1px solid rgba(96,165,250,.2);border-radius:12px;overflow:hidden;margin:12px 0}
.revision-block .fb-head{background:rgba(96,165,250,.06);color:var(--blue);border-color:rgba(96,165,250,.2)}
.revision-block ul.facts li::before{content:"⚡";color:var(--blue);font-size:10px}
.oneliner-block{background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.18);border-radius:12px;overflow:hidden;margin:12px 0}
.oneliner-block .fb-head{background:rgba(52,211,153,.06);color:var(--green);border-color:rgba(52,211,153,.18)}
.oneliner-block ul.facts li::before{content:"🎯";color:var(--green);font-size:10px}
.flash-hint{font-family:var(--mono);font-size:11px;color:var(--ink3);text-align:center;margin-bottom:12px;letter-spacing:.5px}
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:14px}
.flash-card{perspective:900px;cursor:pointer;height:140px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;line-height:1.45;border:1px solid var(--line)}
.flash-front{background:var(--panel);color:var(--ink)}
.flash-back{background:rgba(240,188,69,.1);border-color:rgba(240,188,69,.3);color:var(--gold);transform:rotateY(180deg)}
.flash-reset-row{text-align:center;margin-top:4px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--line);margin:12px 0}
table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt th{padding:9px 13px;text-align:left;background:var(--gold2);color:#fff;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px}
table.dt td{padding:9px 13px;border-bottom:1px solid var(--line);color:var(--ink)}
table.dt tr:last-child td{border-bottom:0}
table.dt td:first-child{color:var(--amber);font-weight:600;font-family:var(--mono);font-size:12px}
table.dt b{color:var(--gold)}
.mcq-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.mcq-q{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.45}
.q-num{font-family:var(--mono);font-size:12px;color:var(--amber);margin-right:4px}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.mopt{padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--ink);font-size:13px;cursor:pointer;text-align:left;font-family:var(--sans);transition:.13s;width:100%}
.mopt:hover:not([disabled]){border-color:var(--gold2);background:var(--gold-glow)}
.mopt.correct{background:rgba(52,211,153,.12);border-color:var(--green);color:var(--green)}
.mopt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.mcq-fb{margin-top:10px;font-size:13px;padding:9px 12px;border-radius:8px;background:var(--panel2);color:var(--ink2);line-height:1.5;border:1px solid var(--line)}
.mcq-faa{margin-top:7px}
.faa-chip{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:6px}
.faa-chip.faa-ok{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.faa-chip.faa-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.retry-btn{margin-top:4px;padding:6px 16px;background:var(--panel2);border:1px solid var(--gold2);color:var(--gold);border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:11px}
.retry-btn:hover{background:var(--gold-glow)}
.unlock-banner{border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.5}
.pass-banner{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.35);color:var(--green)}
.fail-banner{background:var(--red-bg);border:1px solid rgba(248,113,113,.35);color:var(--ink)}
.node-nav{display:flex;gap:10px;margin-top:26px;padding-top:16px;border-top:1px solid var(--line)}
.nav-btn{font-family:var(--sans);font-weight:600;font-size:13px;border-radius:9px;padding:9px 15px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);transition:.14s;flex:1;text-align:center}
.nav-btn:hover:not([disabled]){border-color:var(--gold2)}.nav-btn[disabled]{opacity:.35;cursor:default}
.nav-btn.home-btn{flex:0 0 auto;background:var(--panel2)}
.dash-hero{background:linear-gradient(135deg,rgba(192,132,252,.08),rgba(147,51,234,.05));border:1px solid rgba(192,132,252,.2);border-radius:16px;padding:28px;margin-bottom:22px;text-align:center}
.dh-title{font-family:var(--serif);font-size:clamp(28px,5vw,44px);font-style:italic;margin-bottom:4px}
.dh-sub{font-family:var(--mono);font-size:12px;color:var(--ink3);letter-spacing:1px}
.dh-xp{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--gold);margin:12px 0 4px}
.dh-bar-wrap{height:8px;background:var(--line);border-radius:4px;overflow:hidden;max-width:400px;margin:0 auto 8px}
.dh-bar{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;transition:.6s}
.dh-label{font-family:var(--mono);font-size:12px;color:var(--ink2)}
.dash-chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:22px}
.dc{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.dc-icon{font-size:22px;margin-bottom:6px}
.dc-label{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--ink)}
.dc-prog-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:4px}
.dc-bar{height:100%;background:var(--gold);border-radius:3px;transition:.5s}
.dc-nums{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.cta-row{display:flex;gap:12px;flex-wrap:wrap}
.cta-btn{padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;border:0;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#fff;transition:.15s}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,132,252,.3)}
.cta-btn.sec{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.cta-btn[disabled]{opacity:.4;cursor:default;transform:none;box-shadow:none}
.toast{position:fixed;top:64px;right:18px;background:var(--panel2);border:1px solid var(--gold);border-radius:12px;padding:10px 16px;z-index:500;opacity:0;transform:translateY(-8px);transition:.3s;pointer-events:none;font-size:13px;max-width:340px;line-height:1.4}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{border-color:var(--red)}.toast.warn{border-color:var(--amber);color:var(--ink)}
.mob-bar{display:none}
@media(max-width:720px){
  .shell{grid-template-rows:var(--nav) 1fr 56px;height:100dvh}
  .body-wrap{grid-template-columns:1fr;height:calc(100dvh - var(--nav) - 56px)}
  aside{display:none}
  .mob-bar{display:flex;background:rgba(10,8,16,.98);backdrop-filter:blur(16px);border-top:1px solid var(--line);align-items:stretch}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:0;background:none;color:var(--ink3);cursor:pointer;padding:8px 4px;font-family:var(--mono);font-size:9px;transition:.13s}
  .mob-tab .mt-ico{font-size:20px}.mob-tab.act{color:var(--gold)}
  .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:.2s}
  .mob-overlay.show{opacity:1;pointer-events:all}
  .mob-drawer{position:fixed;left:-100%;top:0;bottom:0;width:min(300px,88vw);background:var(--bg2);border-right:1px solid var(--line);z-index:200;transition:.28s;overflow-y:auto}
  .mob-drawer.open{left:0}
  .mob-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--line)}
  .mob-close{background:none;border:1px solid var(--line);color:var(--ink2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px}
  .nav-stats{display:none}
  .view{padding:16px 14px 100px}
  .node-title{font-size:24px}
  .mcq-opts{grid-template-columns:1fr}
  .tabs{overflow-x:auto;width:100%;scrollbar-width:none}
  .toast{top:auto;bottom:68px;left:14px;right:14px}
}
@media(min-width:721px){.mob-drawer,.mob-overlay{display:none}}
</style>
</head>

],
revision:["Post-Harsha(647AD) vacuum, Rajputs emerged, 4 Agnikul clans: Pratiharas,Chahamanas,Chandellas,Paramaras","Tripartite Struggle(750-1000CE) for Kannauj between Gurjara-Pratihara(West),Palas(East),Rashtrakutas(Deccan)","Rashtrakutas = most powerful, lasted longest","Vatsaraja(Pratihara) FIRST initiated the struggle","Kannauj fought over for prestige(Harsha's legacy) not just territory"],
oneliners:["After Harsha's death (647 AD), North India lacked political unity for ~500 years","Rajputs emerged as the dominant force in this post-Harsha vacuum","The 4 Agnikul Rajput clans are Pratiharas, Chahamanas (Chauhans), Chandellas, and Paramaras","Pratiharas were based in Western India; Chahamanas in Ajmer; Chandellas in Bundelkhand; Paramaras in Malwa","The Tripartite Struggle (750-1000 CE) was fought over control of Kannauj","Kannauj was valuable for the Ganga trade route, Silk Route access, and as Harsha's former capital","The three powers in the Tripartite Struggle were Gurjara-Pratihara, Palas, and Rashtrakutas","The Rashtrakutas were the most powerful and longest-lasting of the three","Vatsaraja of the Pratiharas was the first to initiate the tripartite conflict"],
flashcards:[{q:"What vacuum followed Harsha's death in 647 AD?",a:"No political unity in North India for ~500 years"},{q:"Name the 4 Agnikul Rajput clans.",a:"Pratiharas, Chahamanas (Chauhans), Chandellas, Paramaras"},{q:"What was the Tripartite Struggle fought over?",a:"Control of Kannauj"},{q:"Name the 3 powers in the Tripartite Struggle.",a:"Gurjara-Pratihara, Palas, Rashtrakutas"},{q:"Which power was most powerful and longest-lasting in the struggle?",a:"The Rashtrakutas"},{q:"Who first initiated the Tripartite Struggle?",a:"Vatsaraja of the Pratiharas"},{q:"Why was Kannauj so valuable?",a:"Ganga trade route, Silk Route access, and prestige as Harsha's former capital"}],
mcqs:[
{q:"Which power was the MOST POWERFUL in the Tripartite Struggle?",o:["Gurjara-Pratihara","Palas","Rashtrakutas","Chauhans"],a:2,e:"Rashtrakutas of the Deccan were the most powerful in the Tripartite Struggle and lasted longest. They defeated both the Pratiharas and the Palas but did not permanently occupy Kannauj."},
{q:"The Tripartite Struggle was fought for control of:",o:["Pataliputra","Kannauj","Taxila","Rajgriha"],a:1,e:"Kannauj (on the Ganga trade route and Silk Route, Harsha's former capital) was the prize of the Tripartite Struggle. Controlling Kannauj symbolised supremacy over North India."},
{q:"Who FIRST initiated the Tripartite Struggle?",o:["Dharmapala (Pala)","Dhruva (Rashtrakuta)","Vatsaraja (Pratihara)","Devapala (Pala)"],a:2,e:"Vatsaraja of the Pratihara dynasty was the FIRST to initiate the Tripartite Struggle by defeating both Dharmapala (Pala) and Indrayudha of Kannauj."},
{q:"Rashtrakuta king Dhruva defeated both rivals in the Tripartite Struggle. What did he do NEXT?",o:["Occupied Kannauj and made it his capital","Built Kannauj fort","Returned to Deccan WITHOUT occupying Kannauj","Gave Kannauj to Pala king"],a:2,e:"Dhruva defeated both Vatsaraja (Pratihara) and Dharmapala (Pala) but returned to Deccan WITHOUT occupying Kannauj. This is a frequently asked SSC trap — he won battles but did not stay."},
{q:"Khajuraho temples (UNESCO World Heritage Site) were built by:",o:["Gurjara-Pratiharas","Rashtrakutas","Chauhans","Chandellas"],a:3,e:"Khajuraho temples were built by the Chandella rulers of Bundelkhand. Their capitals were Mahoba and Khajuraho."},
{q:"The 'Darbar at Kannauj' to symbolically assert supremacy was convened by:",o:["Vatsaraja","Devapala","Dharmapala","Gopala"],a:2,e:"Dharmapala (Pala) convened the grand Darbar at Kannauj and placed his own nominee on the throne — the most dramatic assertion of Pala supremacy in the Tripartite Struggle."},
{q:"Which Paramara ruler is called 'Kaviraja' for his literary contributions?",o:["Siyaka","Yashovarman","Bhoja","Munja"],a:2,e:"Paramara Bhoja (capital: Dhara, Malwa) is called Kaviraja for writing 24 Sanskrit works. He also wrote Samarangana Sutradhara (on architecture) and built the Bhojashala Sanskrit college."},
{q:"The Rani ki Vav (UNESCO) was built by Queen Udayamathi, wife of which king?",o:["Prithviraj Chauhan","Bhima-I of Solanki dynasty","Yashovarman Chandella","Mihira Bhoja"],a:1,e:"Rani ki Vav (the Queen's stepwell) at Patan, Gujarat, is a UNESCO World Heritage Site built by Queen Udayamathi, wife of Bhima-I of the Solanki/Chalukya dynasty of Gujarat."},
{q:"Devapala (Pala) extended the Pala empire to which of these regions?",o:["Kashmir and Punjab","Assam, Orissa, and parts of Nepal","Gujarat and Sindh","Deccan and Karnataka"],a:1,e:"Devapala, son of Dharmapala, was the greatest military Pala king. He defeated both Pratiharas and Rashtrakutas and extended the empire to Assam, Orissa, and parts of Nepal."},
{q:"The 4 Agnikul Rajput clans did NOT include:",o:["Pratiharas","Chandellas","Paramaras","Rashtrakutas"],a:3,e:"The 4 Agnikul Rajput clans are: Pratiharas, Chahamanas/Chauhans, Chandellas, and Paramaras. Rashtrakutas were a Deccan power — NOT an Agnikul Rajput clan."}
]},

{id:"en2",title:"Gurjara-Pratihara & Palas",xp:60,type:"regular",seqIdx:1,
facts:[
"<b>Gurjara-Pratihara (730–1036 AD):</b> Founder = Harichandra (Jodhpur, SW Rajasthan) | Originated from Gurjaras (pastoralists + fighters)",
"<b>Greatest achievement:</b> Contained Arab armies east of Indus River (most important contribution to Indian history)",
"Foreign visitor: <b>Al-Masudi</b> (Arab) visited Pratihara empire (957 AD)",
"<b>Mihira Bhoja / Bhoja-I (836–885)</b> = Greatest Pratihara ruler | Capital: Kannauj (also called Mahodaya) | Title: 'Adivaraha' | Called 'King Baura' by Al-Masudi",
"<b>Nagabhata-II</b> = conquered Kannauj + Indo-Gangetic Plain; <b>rebuilt Shiva temple at Somnath</b> (after Arab demolition)",
"<b>Mahendrapala-I</b> = empire at peak prosperity; Sanskrit poet <b>Rajasekhara</b> lived in his court",
"Rajasekhara's works: Karpuramanjari, Kavya Mimansa, Bala Ramayana, Balabharathi",
"<b>Rajyapala</b> = fled when Mahmud Ghazni raided Kannauj → killed by neighboring Rajputs for cowardice",
"<b>Palas (750–1150 AD):</b> Founder = Gopala (8th cent) | Name 'Pala' = 'protector' in Prakrit | All kings' names ended in 'Pala'",
"<b>Pala Capital:</b> Muddagiri/Munger (Bihar) | Religion: Mahayana Buddhism + Tantric schools",
"<b>Dharmapala</b> = Greatest Pala ruler | Founded <b>Vikramashila University</b> (Bihar) — 2nd most important Buddhist university after Nalanda",
"<b>Gopala elected by nobles</b> to end anarchy — early form of ELECTIVE MONARCHY in Indian history",
"<b>Atisha Dipankara</b> = Buddhist monk patronised by Mahipala-I; went to Tibet and spread Buddhism there",
"Islam first appeared in Bengal during Pala rule (increased trade with Middle East)"
],

"Vikramashila University = founded by DHARMAPALA (NOT Gopala, NOT Devapala)",
"Nalanda was NOT founded by Palas — Nalanda predates them (5th century Gupta period)",
"Gopala was ELECTED by nobles — earliest example of elective monarchy in India",
"Nagabhata-II REBUILT Somnath temple (after Arab demolition) — Mahmud Ghazni later destroyed it again in 1025",
"Al-Masudi visited Pratihara empire (957 AD) — NOT Pala, NOT Rashtrakuta"
],
revision:["Gurjara-Pratihara(730-1036AD): founder Harichandra(Jodhpur)","Greatest achievement: contained Arab armies east of Indus River","Mihira Bhoja/Bhoja-I(836-885)=greatest ruler, capital Kannauj/Mahodaya, title Adivaraha","Al-Masudi(Arab) visited 957AD, called Bhoja 'King Baura'","Nagabhata-II conquered Kannauj, rebuilt Shiva temple at Somnath after Arab demolition"],
oneliners:["The Gurjara-Pratihara dynasty ruled 730-1036 AD, founded by Harichandra of Jodhpur","The Pratiharas originated from the Gurjaras, pastoralists and fighters","The Pratiharas' greatest achievement was containing Arab armies east of the Indus River","Al-Masudi, an Arab traveller, visited the Pratihara empire in 957 AD","Mihira Bhoja (Bhoja-I), 836-885, was the greatest Pratihara ruler","Bhoja-I's capital was Kannauj, also called Mahodaya","Bhoja-I held the title 'Adivaraha' and was called 'King Baura' by Al-Masudi","Nagabhata-II conquered Kannauj and the Indo-Gangetic Plain","Nagabhata-II rebuilt the Shiva temple at Somnath after its Arab demolition","Mahendrapala-I's reign saw the empire at its peak prosperity"],
flashcards:[{q:"Who founded the Gurjara-Pratihara dynasty, and where?",a:"Harichandra, at Jodhpur"},{q:"What was the Pratiharas' greatest achievement?",a:"Containing Arab armies east of the Indus River"},{q:"Who was the greatest Pratihara ruler?",a:"Mihira Bhoja (Bhoja-I), 836-885"},{q:"What was Bhoja-I's capital, and his title?",a:"Kannauj (Mahodaya); titled Adivaraha"},{q:"Which Arab traveller visited the Pratihara empire, and when?",a:"Al-Masudi, in 957 AD"},{q:"What did Nagabhata-II rebuild, and why?",a:"The Shiva temple at Somnath, after Arab demolition"},{q:"Which ruler saw the empire at peak prosperity?",a:"Mahendrapala-I"}],
mcqs:[
{q:"Who founded the Vikramashila University?",o:["Gopala","Devapala","Dharmapala","Mahipala-I"],a:2,e:"Vikramashila University was founded by Dharmapala (the greatest Pala ruler) in Bihar. It was the 2nd most important Buddhist university after Nalanda. This is a very common SSC trap."},
{q:"The GREATEST ruler of the Gurjara-Pratihara dynasty was:",o:["Nagabhata-I","Vatsaraja","Nagabhata-II","Mihira Bhoja"],a:3,e:"Mihira Bhoja (Bhoja-I, 836–885) was the greatest Pratihara ruler. His capital was Kannauj (also called Mahodaya). His title was 'Adivaraha' and Arab traveller Al-Masudi called him 'King Baura.'"},
{q:"The Gurjara-Pratiharas are most remembered for:",o:["Building Khajuraho","Founding Pataliputra","Containing Arab armies east of the Indus","Founding Delhi Sultanate"],a:2,e:"The Gurjara-Pratiharas' most important historical contribution was containing the Arab armies east of the Indus River for nearly two centuries — preventing Arab expansion into the Indian heartland."},
{q:"Arab traveller Al-Masudi visited which empire in 957 AD?",o:["Pala empire","Rashtrakuta empire","Gurjara-Pratihara empire","Chola empire"],a:2,e:"Al-Masudi, the Arab traveller, visited the Gurjara-Pratihara empire in 957 AD. He called Mihira Bhoja 'King Baura.' He described the Pratihara empire as one of the great powers of his time."},
{q:"The Pala dynasty founder Gopala was UNIQUE because he was:",o:["The first Buddhist ruler in India","Elected by nobles to end anarchy — early elective monarchy","The first ruler to build Buddhist universities","A feudatory of the Rashtrakutas"],a:1,e:"Gopala (8th century CE) was elected by nobles to end anarchy in Bengal — making him an early example of elective monarchy in Indian history. All Pala rulers' names ended with 'Pala' (meaning 'protector')."},
{q:"Sanskrit poet Rajasekhara was associated with which Pratihara ruler's court?",o:["Mihira Bhoja","Nagabhata-II","Rajyapala","Mahendrapala-I"],a:3,e:"Sanskrit poet Rajasekhara (who wrote Karpuramanjari, Kavya Mimansa, Bala Ramayana, Balabharathi, Bhusan Kosh) lived in the court of Mahendrapala-I — when the Pratihara empire was at its peak of prosperity."},
{q:"Atisha Dipankara, who spread Buddhism in Tibet, was patronised by which Pala ruler?",o:["Dharmapala","Gopala","Devapala","Mahipala-I"],a:3,e:"Atisha Dipankara was patronised by Mahipala-I (the most important later Pala ruler who revived the dynasty). Atisha went to Tibet and spread Buddhism there. He is an important Buddhist figure in Tibetan history."},
{q:"The Pratihara king who REBUILT the Somnath temple (after it was demolished in an Arab raid from Sindh) was:",o:["Vatsaraja","Nagabhata-II","Mihira Bhoja","Yashpal"],a:1,e:"Nagabhata-II (805–833) rebuilt the Shiva temple at Somnath after it was demolished in an Arab raid from Sindh. (Note: Mahmud Ghazni later destroyed it again in 1025 CE — a different event!)"},
{q:"'Pala' in Prakrit means:",o:["Warrior","Protector","King","Devotee"],a:1,e:"'Pala' means 'protector' in Prakrit. This is why all Pala rulers had names ending in 'Pala' — Gopala, Dharmapala, Devapala, Mahipala, etc. The Pala dynasty was the last great Buddhist imperial dynasty in India."},
{q:"Pala dynasty was the last great WHAT type of dynasty in Indian history?",o:["Hindu imperial dynasty","Buddhist imperial dynasty","Jain ruling dynasty","Shaivite dynasty"],a:1,e:"The Pala dynasty was the last great Buddhist imperial dynasty in Indian history. They patronised Mahayana Buddhism and Tantric schools. Nalanda and Vikramashila universities flourished under their patronage."},
{q:"The capital of the Pala dynasty was:",o:["Varanasi","Pataliputra","Muddagiri/Munger (Bihar)","Vikramashila"],a:2,e:"The Pala capital was Muddagiri (also called Munger) in Bihar. Important cities under Pala rule included Pataliputra, Vikrampura, Ramvati, Monghyr, Tamralipti, and Jaggadala."}
]},

{id:"en3",title:"Rashtrakutas — Deccan Power",xp:55,type:"regular",seqIdx:2,
facts:[
"<b>Rashtrakutas (712–973 AD):</b> Capital = Manyakheta/Malkhed (near Solapur) | Feudatories of Chalukyas originally",
"<b>Founder:</b> Dantidurga (753 CE) — name means 'he whose elephant is his fortress'",
"<b>Most powerful in Tripartite Struggle</b> | Bridge between North & South India (economic + cultural)",
"<b>Krishna-I</b> built <b>Kailasanath temple at Ellora</b> (monolithic, rock-cut) — <b>LARGEST monolithic rock-cut structure in the world</b>",
"<b>Amoghavarsha-I (814–878)</b> = 'Ashoka of the South' | Title: Veeranarayana + Kaviraja | Jain follower | Wrote <b>Kavirajamarga</b> — OLDEST surviving literary work in Kannada",
"<b>Govinda-III</b> = greatest military Rashtrakuta ruler | defeated Ganga, Pallava, Pandya | described in Sanjan copper-plate",
"Arab merchant Suleiman visited Rashtrakuta kingdom; called it one of the <b>FOUR GREAT EMPIRES of the world</b>",
"Patronised: Shaivism, Vaishnavism, Jainism — remarkably tolerant",
"<b>Kailasanath temple (Ellora, Cave 16):</b> Built by Krishna-I | No scaffolding — carved from TOP to BOTTOM | 200,000 tons of rock removed",
"<b>Pattadakal temples (UNESCO):</b> Kashi Vishvanatha temple + Jain Narayana temple — both built during Rashtrakuta/Chalukya period",
"Rashtrakutas maintained friendly relations with Arab merchants → key for trade | End: capital burnt in 972 CE by united opponents"
],

"Amoghavarsha = follower of JAINISM (not Buddhism, not Shaivism)",

],

oneliners:["The Rashtrakuta dynasty ruled 712-973 AD, with capital at Manyakheta (Malkhed)","Dantidurga founded the Rashtrakuta dynasty in 753 CE","Rashtrakutas were originally feudatories of the Chalukyas","The Rashtrakutas were the most powerful party in the Tripartite Struggle","Rashtrakutas served as a bridge between North and South India economically and culturally","Krishna-I built the Kailasanath temple at Ellora","The Kailasanath temple is the largest monolithic rock-cut structure in the world","Amoghavarsha-I (814-878) was called the 'Ashoka of the South'","Amoghavarsha-I wrote the Kavirajamarga, the oldest surviving literary work in Kannada","Govinda-III is considered the greatest military ruler among the Rashtrakutas"],
flashcards:[{q:"Who founded the Rashtrakuta dynasty, and when?",a:"Dantidurga, in 753 CE"},{q:"What was the Rashtrakuta capital?",a:"Manyakheta (Malkhed)"},{q:"Who built the Kailasanath temple at Ellora?",a:"Krishna-I"},{q:"What is special about the Kailasanath temple?",a:"It is the largest monolithic rock-cut structure in the world"},{q:"Who was called the 'Ashoka of the South'?",a:"Amoghavarsha-I"},{q:"What did Amoghavarsha-I write, and its significance?",a:"Kavirajamarga — the oldest surviving Kannada literary work"},{q:"Who was the greatest military Rashtrakuta ruler?",a:"Govinda-III"}],
mcqs:[
{q:"The Kailasanath temple at Ellora — the largest monolithic rock-cut structure in the world — was built by:",o:["Dantidurga","Amoghavarsha-I","Govinda-III","Krishna-I"],a:3,e:"Krishna-I of the Rashtrakuta dynasty built the magnificent Kailasanath (Shiva) temple at Ellora (Cave 16). It is the LARGEST monolithic rock-cut structure in the world, carved from top to bottom without scaffolding."},
{q:"'Ashoka of the South' refers to which Rashtrakuta ruler?",o:["Dantidurga","Krishna-I","Govinda-III","Amoghavarsha-I"],a:3,e:"Amoghavarsha-I (814–878) is called 'Ashoka of the South.' He was a follower of Jainism, wrote Kavirajamarga (the oldest surviving Kannada literary work), and had titles Veeranarayana and Kaviraja."},
{q:"The OLDEST surviving literary work in the Kannada language is:",o:["Vikramasenavijaya","Adipurana","Kavirajamarga","Nalachampu"],a:2,e:"Kavirajamarga, written by Amoghavarsha-I of the Rashtrakuta dynasty, is the oldest surviving literary work in Kannada. It is a work on grammar and poetics."},
{q:"Who founded the Rashtrakuta dynasty?",o:["Krishna-I","Dhruva","Govinda-III","Dantidurga"],a:3,e:"Dantidurga (753 CE) founded the Rashtrakuta dynasty. He was a feudatory of the Chalukyan king Kirtivarman II. His name means 'he whose elephant is his fortress.'"},
{q:"Arab merchant Suleiman described the Rashtrakuta kingdom as one of the FOUR GREAT EMPIRES of the world. What was his description significant for?",o:["It proved Rashtrakutas traded with China","It showed Islamic world recognised Rashtrakutas as a global power","It proved Arabs invaded Rashtrakuta","It showed Rashtrakutas were Buddhist"],a:1,e:"Suleiman's description as one of the four great empires shows that the Islamic world recognised the Rashtrakutas as a global power alongside the Abbasid Caliphate, Tang China, and the Byzantine Empire."},
{q:"The religious affiliation of Amoghavarsha-I was:",o:["Shaivism","Buddhism","Jainism","Vaishnavism"],a:2,e:"Amoghavarsha-I was a devoted follower of Jainism. He is said to have even offered his finger to appease Goddess Mahalakshmi. The Rashtrakutas in general were tolerant of all religions."},
{q:"Pattadakal temples (UNESCO World Heritage Site, Karnataka) are associated with:",o:["Gurjara-Pratiharas","Palas","Chalukyas and Rashtrakutas","Cholas"],a:2,e:"Pattadakal temples in Karnataka — including Kashi Vishvanatha temple and Jain Narayana temple — are UNESCO World Heritage Sites associated with the Chalukya and Rashtrakuta period."},
{q:"The Rashtrakuta capital was:",o:["Varanasi","Kannauj","Manyakheta/Malkhed (near Solapur)","Ujjain"],a:2,e:"Manyakheta (also called Malkhed, near modern Solapur, Karnataka) was the Rashtrakuta capital. Amoghavarsha-I built a new capital there. The capital was burnt in 972 CE marking the end of the dynasty."},
{q:"Which mathematician's work 'Ganita Sara Sangraba' was produced in the Rashtrakuta court?",o:["Aryabhata","Brahmagupta","Mahaviracharya","Bhaskara"],a:2,e:"Mahaviracharya wrote Ganita Sara Sangraba (a mathematics text) in the Rashtrakuta court. This is a significant ancient Indian mathematics work from the 9th century CE."},
{q:"The Rashtrakutas maintained friendly relations with Arab merchants primarily for:",o:["Military alliance against Cholas","Trade purposes — Arab maritime trade was vital","Spreading Islam in Deccan","Getting Arab technology"],a:1,e:"The Rashtrakutas maintained friendly diplomatic relations with Arab merchants for trade purposes. Arab maritime traders controlled the Indian Ocean trade routes, and Rashtrakuta ports on the west coast were important trading centres."}
]},

{id:"en4",title:"Imperial Cholas — Empire & Administration",xp:70,type:"regular",seqIdx:3,
facts:[
"<b>Imperial Cholas (850–1279 AD)</b> = also called Cholas of Tanjore | Founder: Vijayalaya (feudatory of Pallavas; captured Tanjore 850 AD)",
"<b>Rajaraja-I (985–1014)</b> = Greatest Chola ruler | Titles: Mummidi Chola, Jayankonda, Shivpadshekhara | Defeated Chera + Pandya; conquered Maldives | Naval expedition vs Sailendra Empire (Malaya) | Built <b>Brihadeshwara/Rajarajeshwara temple (1010 CE) at Thanjavur (UNESCO 1987)</b>",
"<b>Rajendra-I (1014–1044)</b> = Son of Rajaraja-I | conquered whole Sri Lanka | Title: 'Gangaikondachola' | Bay of Bengal = '<b>Chola Lake</b>' | built city Gangaikondacholapuram | <b>1025 CE naval expedition against Srivijaya Empire</b> (Southeast Asia) — greatest naval expedition in medieval Indian history | sent two diplomatic missions to China",
"<b>Kulottunga-I (1070–1120)</b> = unified Chola + Chalukya kingdoms | abolished tolls ('sungam thavirtta') | also known as Sundara Chola",
"<b>Village Administration:</b> Ur (general assembly) | Mahasabha (adult men in Brahmana villages) | Nagaram (merchant assembly — OFTEN MISSED)",
"<b>Kudavolai System</b> = unique ballot system using palm-leaf slips to elect village committee members — EARLIEST form of democratic election in India",
"<b>Variyams</b> = executive committees under Mahasabha: Erivariyam (tank), Totta variyam (garden), Panchavara variyam (5-member)",
"<b>Uttaramerur Inscriptions</b> (Paranthaka's period) = most detailed record of village self-governance | qualifications for Variyam membership are listed",
"Empire divided: Mandalams (provinces) → Valanadu (districts)",
"Chola navy = STRONGEST maritime force in Asia in 11th century | extended control to Malaya + Sumatra (Srivijaya Empire)",
"Agrahatta (Persian wheel) used for irrigation | Peruvazhis = trunk roads"
],

mcqs:[
{q:"The Brihadeshwara temple at Thanjavur (UNESCO 1987) was built by:",o:["Vijayalaya","Rajendra-I","Kulottunga-I","Rajaraja-I"],a:3,e:"Rajaraja-I (985–1014), the greatest Chola ruler, built the Brihadeshwara/Rajarajeshwara temple at Thanjavur in 1010 CE. It is a UNESCO World Heritage Site. Its Vimana (tower) is 66 metres tall."},
{q:"Which Chola ruler called the Bay of Bengal the 'Chola Lake'?",o:["Rajaraja-I","Kulottunga-I","Vijayalaya","Rajendra-I"],a:3,e:"Rajendra-I (son of Rajaraja-I) called the Bay of Bengal the 'Chola Lake' after his naval supremacy over it. His title was 'Gangaikondachola' (he who brought the Ganges). He also led the great 1025 naval expedition against Srivijaya."},
{q:"The 'Kudavolai system' of the Cholas refers to:",o:["A tax system on trade","A ballot system using palm-leaf slips to elect village committees","A military conscription system","An irrigation management system"],a:1,e:"Kudavolai system is the unique ballot system used in Chola village administration. Palm-leaf slips with candidates' names were put in a pot and drawn by a boy — the earliest form of democratic election in India."},
{q:"The THIRD type of Chola assembly (often missed) that dealt with MERCHANTS in towns was:",o:["Ur","Mahasabha","Variyam","Nagaram"],a:3,e:"Nagaram was the merchant assembly in Chola towns — the third type of assembly alongside Ur (general village assembly) and Mahasabha (assembly of adult men in Brahmana villages/agraharas)."},
{q:"Which Chola ruler launched the famous 1025 CE naval expedition against the Srivijaya Empire in Southeast Asia?",o:["Rajaraja-I","Kulottunga-I","Vijayalaya","Rajendra-I"],a:3,e:"Rajendra-I launched the powerful 1025 CE naval expedition against the Srivijaya Empire (in modern Sumatra/Southeast Asia) — one of the greatest naval expeditions in medieval Indian history."},
{q:"The Uttaramerur Inscriptions (Paranthaka's period) are important for:",o:["Recording Chola naval victories","Listing qualifications for village self-governance elections","Describing Chola trade with China","Recording Chola temple construction"],a:1,e:"The Uttaramerur Inscriptions (Paranthaka's period) are the most detailed record of Chola village self-governance. They list the qualifications required to serve on Variyams (village executive committees) — invaluable for understanding ancient Indian democracy."},
{q:"Kulottunga-I's epithet 'sungam thavirtta' means:",o:["Conqueror of Sri Lanka","He who abolished taxes/tolls","He who built temples","He who brought Ganges water"],a:1,e:"'Sungam thavirtta' means 'he who abolished taxes/tolls.' Kulottunga-I (1070–1120) was known for abolishing tolls, unifying the Chola and Eastern Chalukya kingdoms, and for being praised in the poem Kalingattupparani."},
{q:"The Chola administrative unit above the district (Valanadu) was:",o:["Ur","Nagaram","Mandalam","Variyam"],a:2,e:"The Chola Empire was divided into Mandalams (provinces) → Valanadu (districts). This is the Chola provincial hierarchy. The Mandalam was the largest unit headed by a viceroy."},
{q:"Erivariyam was a Chola village committee responsible for:",o:["Garden maintenance","Military defence","Tank/water body management","Revenue collection"],a:2,e:"Erivariyam was the tank/water body committee under the Mahasabha. Other Variyams: Totta variyam (garden committee), Panchavara variyam (five-member general committee). These Variyams were elected via the Kudavolai system."},
{q:"The FOUNDER of the Imperial Chola dynasty was:",o:["Rajaraja-I","Vijayalaya","Rajendra-I","Paranthaka-I"],a:1,e:"Vijayalaya (850 AD) was the founder of the Imperial Chola dynasty. He was a feudatory of the Pallavas who captured Tanjore in 850 AD, starting the Imperial Chola line. The greatest kings were his successors Rajaraja-I and Rajendra-I."}
]},

{id:"en5",title:"Chola Art, Architecture & Culture — Traps",xp:45,type:"trap",seqIdx:4,
facts:[
"<b>3 Architecture Styles:</b> Nagara (North) → Shikhara (curvilinear) | Dravida (South) → Vimana (pyramidal) | Vesara (Hybrid) → Mixed",
"<b>Chola contribution:</b> Dravidian architecture reached its CLIMAX | Garbhagriha with 5–7 stories = Vimana | Mandapa = pillared hall | Gopurams = lofty gateways",
"<b>Brihadeshwara Vimana = 66 metres tall</b> — tallest in the world at time of construction",
"<b>Chola Bronze sculptures</b> used Panchaloha (5-metal alloy) + lost-wax (cire-perdue) technique | Best example: <b>Dancing Nataraja</b>",
"Nataraja = represents cosmic cycle of creation and destruction | Dances: Bharatanatyam & Kathakali",
"<b>Indo-Islamic architecture</b> = arch (mehrab), dome (gumbad), minaret (minar) | vs Indian = trabeate (post-and-lintel)",
"<b>Trabeate</b> = post-and-lintel (indigenous Indian) | <b>Arcuate</b> = arch-and-dome (Islamic) — both in Delhi Sultanate period",
"<b>Chola Literature:</b> Kamban's Ramayana | Periyapuranam (Sekkilar) | Telugu Mahabharata started by Nanniah completed by Tikkana | <b>Pampa, Ponna, Ranna</b> = 3 gems of Kannada literature",
"<b>Western Gangas (Orissa):</b> Anantavannan Chodaganga built Jagannath temple at Puri | Narsimhadeva (1238–1264) built <b>Sun temple at Konark</b>",
"<b>Dilwara Jain temples (Mt. Abu)</b> = Vimla Vasahi & Luna Vasahi → built by SOLANKIS of Gujarat (NOT Rajputs generally)"
],

"Jagannath temple Puri = ANANTAVANNAN CHODAGANGA (NOT the Cholas)",

],
revision:["3 architecture styles: Nagara(North,Shikhara),Dravida(South,Vimana),Vesara(Hybrid)","Brihadeshwara Vimana = 66 metres tall, tallest in world at time of construction","Chola bronze: Panchaloha(5-metal alloy)+lost-wax technique, best example=Dancing Nataraja","Nataraja represents cosmic cycle of creation and destruction","Indo-Islamic architecture features arch(mehrab) — different tradition, post-Chola"],
oneliners:["Indian temple architecture has 3 main styles: Nagara, Dravida, Vesara","Nagara style (North India) uses a curvilinear Shikhara tower","Dravida style (South India) uses a pyramidal Vimana","Vesara style is a hybrid of Nagara and Dravida","Dravidian architecture reached its climax under the Cholas","The Brihadeshwara temple's Vimana is 66 metres tall — the tallest in the world at the time","Chola bronze sculptures used Panchaloha (a 5-metal alloy)","Chola bronzes used the lost-wax (cire-perdue) casting technique","The Dancing Nataraja is the best example of Chola bronze sculpture","Nataraja's dance represents the cosmic cycle of creation and destruction"],
flashcards:[{q:"Name the 3 main Indian temple architecture styles.",a:"Nagara, Dravida, Vesara"},{q:"What defines Nagara style?",a:"A curvilinear Shikhara tower (North India)"},{q:"What defines Dravida style?",a:"A pyramidal Vimana (South India)"},{q:"How tall is the Brihadeshwara Vimana, and its historic significance?",a:"66 metres — tallest in the world at the time of construction"},{q:"What alloy and technique did Chola bronzes use?",a:"Panchaloha (5-metal alloy) and lost-wax (cire-perdue) casting"},{q:"What is the best example of Chola bronze sculpture?",a:"The Dancing Nataraja"},{q:"What does the Nataraja's dance represent?",a:"The cosmic cycle of creation and destruction"}],
mcqs:[
{q:"In Dravida (South Indian) temple architecture, the main tower over the garbhagriha is called:",o:["Shikhara","Gopuram","Vimana","Mandapa"],a:2,e:"In Dravida (South Indian) architecture, the tower over the garbhagriha is the VIMANA (pyramidal). The Shikhara is the curvilinear tower in Nagara (North Indian) architecture. Gopurams are the lofty gateway towers at the temple entrance."},
{q:"The Dancing Nataraja bronze sculpture is associated with which dynasty?",o:["Pallavas","Cholas","Rashtrakutas","Chalukyas"],a:1,e:"The Dancing Nataraja is the most iconic Chola bronze sculpture. Chola bronzes used Panchaloha (5-metal alloy: gold, silver, copper, zinc, iron) and the lost-wax (cire-perdue) technique. Nataraja represents the cosmic cycle of creation and destruction."},
{q:"The Sun Temple at Konark was built by:",o:["Rajaraja-I (Chola)","Narsimhadeva (Western Ganga)","Yashovarman (Chandella)","Krishna-I (Rashtrakuta)"],a:1,e:"The Sun Temple at Konark was built by Narsimhadeva (1238–1264 AD) of the Western Ganga dynasty of Orissa. It is known for its chariot shape and erotic sculptures and is a UNESCO World Heritage Site."},
{q:"'Arcuate' style of architecture refers to:",o:["Post-and-lintel (indigenous Indian)","Arch-and-dome (Islamic style)","Rock-cut cave temples","Brick architecture"],a:1,e:"Arcuate style uses arches and domes — introduced by Islamic architecture. Trabeate style uses post-and-lintel construction — the indigenous Indian method. Both coexisted during the Delhi Sultanate period."},
{q:"The Dilwara Jain temples at Mount Abu were built by:",o:["Chandellas","Chauhans","Paramaras","Solankis of Gujarat"],a:3,e:"The Dilwara Jain temples (Vimla Vasahi and Luna Vasahi) at Mount Abu in Rajasthan were built by the Solankis/Chalukyas of Gujarat — NOT by Rajput clans in general, as is commonly assumed."},
{q:"'3 gems of Kannada literature' — Pampa, Ponna, and Ranna — belong to which century?",o:["7th century","8th century","10th century","13th century"],a:2,e:"Pampa, Ponna, and Ranna are called the three gems (ratnatrayi) of 10th century Kannada literature. They flourished during the Rashtrakuta and Western Chalukya periods. Pampa wrote Vikramasenavijaya; Ponna wrote Santipurana."},
{q:"The Jagannath Temple at Puri was built by:",o:["Narsimhadeva","Rajaraja-I","Anantavannan Chodaganga","Rajendra-I"],a:2,e:"The Jagannath Temple at Puri was built by Anantavannan Chodaganga (1076–1150 AD), founder of the Western Ganga dynasty of Orissa, who held the title Trikalingadhipati."},
{q:"The Chola bronze technique of 'cire-perdue' means:",o:["5-metal alloy","Lost-wax casting technique","Stone-cutting method","Clay-moulding process"],a:1,e:"Cire-perdue (French: 'lost wax') is the lost-wax casting technique used for Chola bronzes. A wax model is made, covered in clay, heated (wax 'lost'), then liquid metal poured in. This produces the finest detail."},
{q:"Telugu Mahabharata was started by Nanniah and completed by:",o:["Pampa","Tikkana","Ranna","Kamban"],a:1,e:"The Telugu Mahabharata was started by Nanniah in the 11th century (Chalukya period) and completed by Tikkana in the 13th century. Kamban wrote the Tamil Ramayana (Kamban's Ramayana) — a different work."},
{q:"Vesara style of temple architecture is:",o:["Purely North Indian","Purely South Indian","A hybrid of Nagara and Dravida","An Islamic fusion style"],a:2,e:"Vesara is the hybrid architectural style combining Nagara (North Indian) and Dravida (South Indian) elements. The finest examples are the Chalukyan temples at Pattadakal (Karnataka), which is a UNESCO World Heritage Site."}
]}
]},

mcqs:[
{q:"Who was the FIRST Muslim invader of India?",o:["Mahmud of Ghazni","Muhammad Ghori","Muhammad bin Qasim","Timur Lang"],a:2,e:"Muhammad bin Qasim was the first Muslim invader of India in 712 AD. He attacked Sindh under orders of Al-Hajaj (Khalifa of Iran). The book on this Sindh attack is 'Chachnama' (translated by Ali Babar Qufi)."},
{q:"How many times did Mahmud of Ghazni attack India?",o:["7","12","17","25"],a:2,e:"Mahmud of Ghazni attacked India 17 times between 1001–1027 AD. His most famous raid was in 1025 CE when he attacked the Somnath temple in Gujarat and looted enormous wealth."},
{q:"Al-Beruni came to India with Mahmud of Ghazni. His famous book on India is:",o:["Shahnama","Chachnama","Kitab al Hind (Tahgiq-i-Hind)","Tughlaq Nama"],a:2,e:"Al-Beruni (Abu Rehan Mahmud) came to India with Mahmud of Ghazni and wrote Kitab al Hind (also called Tahgiq-i-Hind) — the most important account of India from that period. He translated Euclid into Sanskrit and transmitted the concept of zero to the West."},
{q:"Firdausi is called 'Homer of the East.' His famous work is:",o:["Kitab al Hind","Chachnama","Rehla","Shahnama"],a:3,e:"Firdausi is the Persian poet called 'Homer of the East.' His famous epic Shahnama (Book of Kings) is a masterpiece of Persian literature. He was in Mahmud of Ghazni's court."},
{q:"The book 'Chachnama' was written about:",o:["Mahmud's invasion of Somnath","Ghori's invasion of Delhi","Muhammad bin Qasim's invasion of Sindh (712 AD)","Timur's invasion of Delhi"],a:2,e:"Chachnama (translated by Ali Babar Qufi from Arabic) is the account of Muhammad bin Qasim's invasion of Sindh in 712 AD — the first Muslim invasion of India. The Khalifa of Iran at the time was Al-Hajaj."},
{q:"The Somnath temple in Gujarat was raided by Mahmud of Ghazni in:",o:["1001 AD","1018 AD","1025 AD","1030 AD"],a:2,e:"Mahmud of Ghazni raided the Somnath temple in 1025 AD — his most famous raid. He looted enormous wealth. The temple had been rebuilt by Nagabhata-II (Pratihara) after an earlier Arab demolition."},
{q:"What was Mahmud of Ghazni's PRIMARY motive for attacking India?",o:["To spread Islam","To establish a permanent kingdom in India","To loot wealth to fund his Central Asian campaigns","To avenge Arab defeats"],a:2,e:"Mahmud's primary motive was LOOTING — he used the wealth to fund his Central Asian military campaigns and build magnificent monuments in Ghazni. He was NOT interested in establishing a permanent Islamic empire in India."},
{q:"Which scholar in Mahmud's court transmitted Aryabhatiya (Indian mathematics) to the Western world?",o:["Firdausi","Utvi","Al-Beruni","Sisteni"],a:2,e:"Al-Beruni transmitted the Aryabattiyam (Aryabhata's mathematical work) to the Islamic world and West. He also described Arabic numerals, the decimal system, and the concept of zero in his writings, acting as a bridge between Indian and Islamic scholarship."},
{q:"The Khalifa (Caliph) of Iran who ordered the Sindh invasion (Muhammad bin Qasim, 712 AD) was:",o:["Harun-al-Rashid","Al-Hajaj","Abu Bakr","Umar"],a:1,e:"Al-Hajaj was the Khalifa (Caliph/Governor) of Iran who ordered Muhammad bin Qasim to attack Sindh in 712 AD — the first Muslim invasion of India. The attack was partly to avenge piracy on Arab ships."},
{q:"Which statement about Mahmud of Ghazni is CORRECT?",o:["He attacked India only once","He established a permanent empire in Delhi","He never reached South India or Gujarat","He attacked 17 times between 1001–1027 AD"],a:3,e:"Mahmud of Ghazni attacked India 17 times between 1001–1027 AD. He DID reach Gujarat (Somnath, 1025 AD). He did NOT establish a permanent empire in India — Delhi Sultanate was founded by Qutbuddin Aibak (1206 AD), long after Mahmud."}
]},

revision:["Ghori's campaign: 1175 Multan(won) | 1178 Mt.Abu(LOST to Bhim Dev-II) | 1191 Tarain-I(LOST to Prithviraj)","1192 Tarain-II(WON,Prithviraj captured&executed) | 1194 Chandawar(defeated Jaichandra)","Tarain-II won using mobile cavalry tactics(Turko-Afghan style)","Qutbuddin Aibak appointed governor after Tarain-II","Tarain+Chandawar laid foundation of Turkish rule in India"],
oneliners:["Muhammad Ghori's first Indian campaign was Multan (1175), which he won","Ghori LOST at Mount Abu (1178) to Bhim Dev-II","Ghori LOST the First Battle of Tarain (1191) to Prithviraj Chauhan","Ghori WON the Second Battle of Tarain (1192), using mobile cavalry tactics","Prithviraj Chauhan was captured and executed after Tarain-II","Qutbuddin Aibak was appointed governor after the Second Battle of Tarain","Ghori defeated Jaichandra of Kanauj at the Battle of Chandawar (1194)","The battles of Tarain and Chandawar together laid the foundation of Turkish rule in India"],

mcqs:[
{q:"In the Battle of Tarain-I (1191), who WON?",o:["Muhammad Ghori","Qutbuddin Aibak","Prithviraj Chauhan","Jaichandra"],a:2,e:"In the First Battle of Tarain (1191), Prithviraj Chauhan WON. Ghori was wounded and fled the battlefield. This is the most commonly confused pair in SSC — remember: 1191 = Prithviraj wins; 1192 = Ghori wins."},
{q:"Who destroyed the Nalanda and Vikramashila universities?",o:["Mahmud of Ghazni","Muhammad Ghori himself","Qutbuddin Aibak","Muhammad Bakhtiyar Khilji"],a:3,e:"Muhammad Bakhtiyar Khilji (a general of Ghori) attacked Bihar in 1197 and Bengal in 1202 and destroyed both Nalanda and Vikramashila universities — one of the greatest cultural losses in Indian history."},
{q:"Muhammad Ghori was killed in 1206 by:",o:["Prithviraj Chauhan's descendants","Rajput confederacy","Khokhars","Mongols"],a:2,e:"Muhammad Ghori was killed in 1206 by the Khokhars in Dhamyak district near the Jhelum river (Pakistan). He had earlier suppressed their revolt in 1205 but they killed him on his return."},
{q:"The Battle of Chandawar (1194) was fought between Muhammad Ghori and:",o:["Prithviraj Chauhan","Bhim Dev-II of Gujarat","Jaichandra of Kanauj (Gahadavala)","Aram Shah"],a:2,e:"The Battle of Chandawar (1194) was fought between Muhammad Ghori and Jaichandra (Gahadavala ruler of Kanauj). Ghori won. Along with Tarain (1192), Chandawar laid the foundation of Turkish rule in North India."},
{q:"Poet Chandbardai wrote 'PrithvirajRaso' which depicts the life of:",o:["Muhammad Ghori","Qutbuddin Aibak","Prithviraj Chauhan","Jaichandra"],a:2,e:"Chandbardai was the court poet and friend of Prithviraj Chauhan. He wrote PrithvirajRaso, a Hindi epic depicting Prithviraj's life, victories, and the defeat at Tarain. Prithviraj III is also called Rai Pithora."},
{q:"In 1178 AD, Muhammad Ghori attacked Mt. Abu and was DEFEATED by:",o:["Prithviraj Chauhan","Bhim Dev-II (Solanki king of Gujarat)","Moolraj-II","Jaichandra"],a:1,e:"In 1178 AD at Mt. Abu, Bhim Dev-II (Solanki/Chalukya king of Gujarat) defeated Muhammad Ghori — one of Ghori's few defeats. This is rarely asked but important as a trap question."},
{q:"Qutbuddin Aibak conquered which of the following from Chandella rulers?",o:["Ujjain and Malwa","Kalinjar, Mahoba, and Khajuraho","Varanasi and Kanauj","Mathura and Vrindavan"],a:1,e:"After Tarain-II (1192), Qutbuddin Aibak (as Ghori's viceroy) conquered Kalinjar, Mahoba, and Khajuraho from the Chandella rulers of Bundelkhand."},
{q:"Which CORRECT sequence represents the key battles of Muhammad Ghori in India?",o:["Chandawar → Tarain-I → Tarain-II","Tarain-I → Tarain-II → Chandawar","Tarain-II → Chandawar → Tarain-I","Mt. Abu → Chandawar → Tarain-I"],a:1,e:"Correct chronological sequence: Tarain-I (1191, Ghori lost) → Tarain-II (1192, Ghori won) → Chandawar (1194, Ghori won). This sequence is tested frequently."},
{q:"The destruction of Nalanda university happened in approximately:",o:["1025 AD by Mahmud Ghazni","1192 AD during Tarain-II","1197–1200 AD by Muhammad Bakhtiyar Khilji","1206 AD by Qutbuddin Aibak"],a:2,e:"Nalanda was destroyed by Muhammad Bakhtiyar Khilji during his attack on Bihar around 1197–1200 AD. The burning of the library (reportedly burning for months) was a catastrophic loss for Buddhist scholarship."},
{q:"Which Jain scholar associated with Solanki king Kumarapala wrote Kumarapalacharita?",o:["Mallinatha","Hemachandra","Rajasekhara","Yashodhara"],a:1,e:"Hemachandra (title: Kalikala Sarvagna) was the Jain scholar in the court of Solanki king Kumarapala. He wrote Kumarapalacharita, Naminatha, Parisistha Parvan, and Abhidhamma Chintamani."}
]}
]},

{id:"ds1",title:"Slave Dynasty — Aibak & Iltutmish",xp:65,type:"regular",seqIdx:7,
facts:[
"<b>Delhi Sultanate (1206–1526):</b> 5 dynasties | Official language = Turkish",
"Ghori's slave → <b>Qutub-ud-din Aibak (Turkish)</b> | Came to Delhi with 2 Sufi saints: Qutub-ud-din-Kaki (stayed Delhi) + Moin-ud-din Chishti (stayed Ajmer)",
"<b>Quwwat-ul-Islam mosque</b> built by Aibak = <b>INDIA'S FIRST MOSQUE</b> | Built using materials from 27 demolished Hindu & Jain temples | (Cheramanjuma = earlier structure but no regular worship, so not counted)",
"Aibak's titles: <b>Malik / SipahSalar / Lakh Baksh</b> (Lakh Baksh = giver of lakhs, for his generosity) | Capital: Lahore | Never accepted 'Sultan' title",
"Buildings by Aibak: <b>Qutub Minar</b>, Quwwat-ul-Islam mosque, <b>Adhai Din Ka Jhopra</b>",
"<b>Qutub Minar</b> = built in memory of Qutub-ud-din-Kaki | Aibak built only 1 storey | Iltutmish completed 3 more | Firoz Shah Tughlaq added last storey",
"Aibak died 1210 playing <b>Chaugan (polo)</b>",
"<b>Iltutmish (1211–1236)</b> = REAL FOUNDER of Delhi Sultanate | Capital: Delhi | Son-in-law of Aibak",
"Iltutmish's key achievements: Chehalgani/Chalisa (group of 40 nobles) | Completed Qutub Minar | Iqta System | Defeated Mongols | Introduced <b>2 coins: Tanka (silver) + Jital (copper)</b>",
"<b>Iqta System</b> = assignment of land/revenue rights to military officers in lieu of salary | Iqta holder = Muqti or Wali",
"Iltutmish nominated daughter <b>Razia Sultan</b> as successor → hereditary succession in Delhi Sultanate",
"<b>Razia Sultan (1236–1240)</b> = FIRST and LAST woman Muslim ruler in India | Husband: Alturia (Ruler of Bathinda) | Commander: Jamal-ud-din Yakoot | Did not accept Parda; wore Quba (blazer) + Qula (cap)"
],

"Lakh Baksh = Aibak's title for generosity (NOT meaning he gave 1 lakh coins)"
],
revision:["Delhi Sultanate(1206-1526): 5 dynasties, official language=Turkish","Qutub-ud-din Aibak: came with Sufi saints Qutub-ud-din-Kaki(Delhi)+Moin-ud-din Chishti(Ajmer)","Quwwat-ul-Islam mosque(Aibak)=INDIA'S FIRST MOSQUE, built from materials of 27 demolished temples","Aibak's titles: Malik/SipahSalar/Lakh Baksh, never accepted 'Sultan' title","Iltutmish=real consolidator of Sultanate, introduced Iqta system+silver Tanka+copper Jital"],
oneliners:["The Delhi Sultanate (1206-1526) had 5 dynasties, with Turkish as the official language","Qutub-ud-din Aibak, Ghori's slave, founded the Slave Dynasty","Aibak brought Sufi saints Qutub-ud-din-Kaki (stayed in Delhi) and Moin-ud-din Chishti (stayed in Ajmer)","The Quwwat-ul-Islam mosque, built by Aibak, is India's first mosque","The Quwwat-ul-Islam mosque was built using materials from 27 demolished Hindu and Jain temples","Aibak's titles included Malik, SipahSalar, and Lakh Baksh (giver of lakhs)","Aibak never accepted the title 'Sultan'","Aibak built the Qutub Minar and Adhai Din ka Jhonpra","Iltutmish is considered the real consolidator of the Delhi Sultanate","Iltutmish introduced the Iqta system, and the silver Tanka and copper Jital coins"],
flashcards:[{q:"What was the official language of the Delhi Sultanate?",a:"Turkish"},{q:"Who founded the Slave Dynasty?",a:"Qutub-ud-din Aibak"},{q:"What is India's first mosque, and who built it?",a:"Quwwat-ul-Islam mosque, by Aibak"},{q:"What materials was the Quwwat-ul-Islam mosque built from?",a:"Materials from 27 demolished Hindu and Jain temples"},{q:"What title did Aibak never accept?",a:"Sultan"},{q:"Who is considered the real consolidator of the Delhi Sultanate?",a:"Iltutmish"},{q:"What administrative system and coins did Iltutmish introduce?",a:"The Iqta system; silver Tanka and copper Jital coins"}],
mcqs:[
{q:"Who is called the REAL FOUNDER of the Delhi Sultanate?",o:["Qutbuddin Aibak","Ghori","Iltutmish","Razia Sultan"],a:2,e:"Iltutmish (1211–1236) is called the REAL FOUNDER of the Delhi Sultanate because he: shifted capital to Delhi, established the Iqta system, introduced coins (Tanka + Jital), built Sultan Garhi, and consolidated the empire. Aibak founded the dynasty but Iltutmish gave it structure."},
{q:"India's FIRST mosque built in Delhi was:",o:["Adhai Din Ka Jhopra","Jama Masjid","Quwwat-ul-Islam","Moth ki Masjid"],a:2,e:"Quwwat-ul-Islam ('Might of Islam') was built by Qutbuddin Aibak — the FIRST mosque in India built by Muslim rulers. It was constructed using materials from 27 demolished Hindu and Jain temples. Adhai Din Ka Jhopra is in Ajmer."},
{q:"Iltutmish introduced which TWO coins?",o:["Gold coin + Silver coin","Tanka (silver) + Jital (copper)","Bahloli + Dinari","Nishka + Shatamana"],a:1,e:"Iltutmish introduced the Tanka (silver coin) and Jital (copper coin) — establishing a sound monetary system for the Delhi Sultanate. This is one of the most frequently asked SSC facts about the Slave dynasty."},
{q:"The Iqta System, introduced by Iltutmish, meant:",o:["A tax on agricultural land","Assignment of land/revenue rights to military officers in lieu of salary","A system of temple grants","A market control system"],a:1,e:"The Iqta System was Iltutmish's key administrative innovation — military officers (Muqtis or Walis) were assigned land (Iqta) whose revenue they collected as their salary, instead of cash payment. This was the foundation of Delhi Sultanate administration."},
{q:"Qutbuddin Aibak died in 1210 while:",o:["Fighting the Mongols","Playing Chaugan (polo)","Attacked by Khokhars","During prayer"],a:1,e:"Qutbuddin Aibak died in 1210 playing Chaugan (polo) when he fell from his horse. He was known as 'Lakh Baksh' (giver of lakhs) for his generosity. His capital was Lahore, not Delhi."},
{q:"Razia Sultan was the first and last woman Muslim ruler in India. She refused parda and wore:",o:["Sari and crown","Quba (blazer) and Qula (cap)","Burqa and jewels","Armour only"],a:1,e:"Razia Sultan refused parda (veil) and wore Quba (a blazer/coat) and Qula (a cap) — masculine dress. She addressed public without a veil, rode elephants, and participated in military campaigns — unprecedented for a woman ruler of that era."},
{q:"Chehalgani/Chalisa established by Iltutmish was:",o:["A group of 40 soldiers","A group of 40 nobles who held immense power","A 40-day festival","A currency system"],a:1,e:"Chehalgani (also called Chalisa) was the group of 40 powerful Turkish nobles established by Iltutmish. They became so powerful that they eventually controlled sultanate politics. Balban later destroyed this group."},
{q:"The Qutub Minar was built in memory of which Sufi saint?",o:["Moin-ud-din Chishti","Nizamuddin Auliya","Qutub-ud-din-Kaki","Fariduddin Ganjshakar"],a:2,e:"The Qutub Minar was built in memory of Qutub-ud-din-Kaki (the Sufi saint who stayed in Delhi). Moin-ud-din Chishti stayed in Ajmer — the Adhai Din Ka Jhopra was built near his dargah."},
{q:"Who completed the Qutub Minar that Aibak had started?",o:["Ghori himself","Razia Sultan","Iltutmish (3 more storeys) — Firoz Tughlaq added the last","Balban"],a:2,e:"Aibak built 1 storey of Qutub Minar. Iltutmish completed 3 more storeys. Firoz Shah Tughlaq added the last (5th) storey — giving the Qutub Minar its final height of 72.5 metres."},
{q:"Razia Sultan's husband (ruler of Bathinda) was:",o:["Alturia","Jamal-ud-din Yakoot","Balban","Nasiruddin Mahmood"],a:0,e:"Razia Sultan's husband was Alturia (the ruler of Bathinda). Jamal-ud-din Yakoot was her Abyssinian commander/confidant. Both Razia and Alturia were killed in 1240 during a revolt."}
]},

{id:"ds2",title:"Balban & Khilji Dynasty — Alauddin",xp:75,type:"regular",seqIdx:8,
facts:[
"<b>Balban (1265–1287)</b> = also known as <b>Ulugh Khan</b> | Policy: <b>Blood and Iron</b>",
"<b>Killed Chehalgani</b> (40 nobles — the most important act of his reign)",
"Introduced <b>Nauroz Culture</b> (Persian Festival) + Persian culture | Introduced <b>Sazda and Paibos</b> (prostration + foot-kissing) — made these mandatory at court",
"Sultan = <b>Zil-i-ilahi</b> (Shadow of God on earth) + <b>Nibyabat-i-Khudai</b> (recipient of divine grace)",
"Set up <b>Barids system</b> = network of spies placed even in households of nobles",
"Separated <b>Diwan-i-wizarat</b> (Finance) from <b>Diwan-i-Arz</b> (Military) — administrative separation",
"<b>Khilji Dynasty (1290–1320)</b> | Founder: Jalaluddin Firoz Khilji (called himself 'darwesh king')",
"<b>Alauddin Khilji (1296–1316)</b> = MOST IMPORTANT Sultan | Real name: Ali Gurushasp | Title: Alexander Second / Sikander-i-Sani | Won 8 battles",
"<b>Market Control System:</b> 4 separate markets | 2 officers: Diwan-i-Riyasat + Shahana-i-Mandi | Daily reports from Barids + Munhiyans (secret spies)",
"<b>Alauddin's Army Reforms:</b> Daag (branding horses) + Huliya (descriptive roll of soldiers) | Paid army in CASH | Biswa system (land measurement)",
"<b>Alauddin = FIRST</b> to fix land revenue in cash | FIRST to order land measurement before fixing revenue | Fixed taxes at 50%",
"<b>Malik Kafur (HazaarDinari)</b> = purchased for 1000 Dinars; led South India campaigns under Alauddin",
"<b>Siri Fort</b> = Alauddin's capital = India's 2nd city of Delhi | First purpose-built capital of Delhi Sultanate",
"Alauddin: First Sultan to separate religion from politics | First NOT to ask for Manshur (approval) from Caliph"
],

],
revision:["Balban(1265-87)=Ulugh Khan, policy=Blood and Iron, killed Chehalgani(40 nobles)","Balban introduced Nauroz+Sazda&Paibos(prostration+foot-kissing) at court","Sultan titled Zil-i-ilahi(Shadow of God) | Set up Barids(spy network)","Khilji Dynasty(1290-1320): Alauddin Khilji=greatest, introduced market control reforms","Alauddin's market reforms: fixed prices, Shahna-i-Mandi(market inspector), Diwan-i-Riyasat"],
oneliners:["Balban (1265-1287) was also known as Ulugh Khan","Balban followed the 'Blood and Iron' policy","Balban's killing of the Chehalgani (40 nobles) was the most important act of his reign","Balban introduced the Persian Nauroz festival and made Sazda and Paibos mandatory at court","Balban took the title Zil-i-ilahi (Shadow of God on earth)","Balban set up the Barids, a network of spies even within nobles' households","Balban separated Diwan-i-wizarat (Finance) from Diwan-i-Arz (Military)","The Khilji Dynasty ruled 1290-1320","Alauddin Khilji was the greatest Khilji ruler","Alauddin Khilji introduced market control reforms, fixing prices via Shahna-i-Mandi"],
flashcards:[{q:"What was Balban's policy called?",a:"Blood and Iron"},{q:"What was the most important act of Balban's reign?",a:"Killing the Chehalgani (40 nobles)"},{q:"What court rituals did Balban make mandatory?",a:"Sazda (prostration) and Paibos (foot-kissing)"},{q:"What title did Balban take?",a:"Zil-i-ilahi (Shadow of God on earth)"},{q:"What spy network did Balban establish?",a:"The Barids"},{q:"Who was the greatest Khilji ruler?",a:"Alauddin Khilji"},{q:"What economic reform is Alauddin Khilji known for?",a:"Market control reforms — fixed prices via Shahna-i-Mandi"}],
mcqs:[
{q:"Balban's famous policy was known as:",o:["Blood and Iron","Divine Right","Market Control","Iqta System"],a:0,e:"Balban's 'Blood and Iron' policy involved ruthless suppression of rebellions, killing the 40 powerful nobles (Chehalgani), and establishing an absolute monarchy based on fear. He also introduced Sazda (prostration) and Paibos (foot-kissing) at court."},
{q:"Alauddin Khilji's title 'Sikander-i-Sani' means:",o:["Sword of Islam","Alexander the Second","Shadow of God","Destroyer of Enemies"],a:1,e:"'Sikander-i-Sani' means 'Alexander the Second' — Alauddin Khilji compared himself to Alexander the Great (called Sikander in Persian/Urdu). His real name was Ali Gurushasp."},
{q:"The 'Daag' and 'Huliya' systems introduced by Alauddin Khilji refer to:",o:["Tax collection systems","Branding horses (Daag) + Descriptive roll of soldiers (Huliya)","Market price fixing","Spy network systems"],a:1,e:"Daag = branding of horses with a royal mark to prevent fraud in cavalry | Huliya = descriptive roll of soldiers to prevent impostors. Together they reformed the army and prevented corruption in military supply."},
{q:"Alauddin Khilji was the FIRST Delhi Sultan to:",o:["Use spies","Fix land revenue in cash and measure land before fixing revenue","Build a mosque","Use war elephants"],a:1,e:"Alauddin Khilji was the FIRST to fix land revenue in cash (not kind) AND the first to order land measurement (by the biswa unit) before fixing revenue. He fixed revenue at 50% — very high. These were major administrative reforms."},
{q:"'HazaarDinari' is the nickname of Malik Kafur. 'HazaarDinari' means he was:",o:["Given a gift of 1000 gold coins","Purchased for 1000 Dinars","Worth 1000 soldiers","Given 1000 horses"],a:1,e:"Malik Kafur is called HazaarDinari because he was purchased by Nusrat Khan for 1000 Dinars in Gujarat and then gifted to Alauddin Khilji. He became Alauddin's most trusted general and led the famous South India campaigns."},
{q:"Alauddin's market control system had how many separate markets?",o:["2","3","4","6"],a:2,e:"Alauddin established 4 separate markets: (1) Grain market (Shahana-i-Mandi), (2) Cloth market, (3) Cattle and horse market, (4) Miscellaneous goods market. Each was separately controlled by Barids (intelligence) and Munhiyans (secret spies)."},
{q:"Balban introduced the concept of Sultan as 'Zil-i-ilahi' which means:",o:["Greatest warrior","Shadow of God on earth","Conqueror of worlds","Protector of Islam"],a:1,e:"'Zil-i-ilahi' means 'Shadow of God on earth.' Balban used this concept to elevate the Sultan's position above all nobles and justify absolute monarchy. He also called himself 'Nibyabat-i-Khudai' (recipient of divine grace)."},
{q:"Siri Fort (built by Alauddin Khilji) is historically significant as:",o:["The first fort in Delhi","India's 2nd city of Delhi and first purpose-built capital","The largest Sultanate-era fort","Built to resist Mongol attacks only"],a:1,e:"Siri Fort is India's 2nd city of Delhi (after Indraprastha/Mehrauli) and the FIRST purpose-built capital of the Delhi Sultanate. Aibak's capital was Lahore; Iltutmish used Old Delhi. Alauddin built Siri as a planned capital."},
{q:"Which famous poet was given the title 'Tuti-i-Hind (Parrot of India)' by Alauddin Khilji?",o:["Firdausi","Ziauddin Barani","Amir Khusrau","Rajasekhara"],a:2,e:"Amir Khusrau was given the title 'Tuti-i-Hind' (Parrot of India) by Alauddin Khilji. Khusrau was a disciple of Nizamuddin Auliya, invented Sitar and Tabla, and wrote Khazain-ul-Futuh (about Alauddin's conquests)."},
{q:"Balban's spy network, placing agents even in households of nobles, was called:",o:["Munhiyans","Barids","Shahana-i-Mandi","Chalisa"],a:1,e:"Balban set up the Barids system — a network of spies placed throughout the empire, even in nobles' households. Alauddin later used both Barids (intelligence agents) and Munhiyans (secret spies) for his market control system."}
]},

{id:"ds3",title:"Tughlaq Dynasty — Muhammad bin Tughlaq & Firoz Shah",xp:70,type:"regular",seqIdx:9,
facts:[
"<b>Tughlaq Dynasty (1320–1414)</b> = also known as Quaraunah Turks | Founder: Ghiyas-ud-din Tughlaq (title: Ghazi Malik)",
"Ghiyas-ud-din: introduced Postal Services + Irrigation System | built fort Tuglaqabad | killed by own son Jauna Khan (Muhammad bin Tughlaq) | Amir Khusrau's Tughlaq Nama → his rise",
"<b>Muhammad bin Tughlaq (1325–1351)</b> = MOST LITERATE Sultan | Also called 'Pagal Raja' for his failed policies",
"<b>5 Controversial Experiments (ALL FAILED):</b> 1) Increased Doab taxation | 2) Transfer of capital to Devgiri/Daultabad | 3) Token currency | 4) Khorasan expedition | 5) Quarachill expedition",
"Changed Devgiri's name to <b>Daultabad</b> | First Sultan to introduce <b>token/paper currency</b> in India (FAILED)",
"<b>Ibn Battuta</b> = came from Morocco | book: <b>Rehla</b> | served as Qazi (judge) of Delhi for <b>8 years</b> — not merely a visitor",
"<b>Firoz Shah Tughlaq (1351–1388)</b> = Liberal Sultan",
"Firoz Shah: <b>1st Sultan to impose Jaziya on Brahmins</b> | Autobiography: <b>Futuhat-e-Firozshahi</b>",
"Firoz Shah: brought <b>Ashoka pillar from Lumbini to India</b> | Renovated Qutub Minar + Sultan Garhi + Suraj Kund",
"<b>Cities built by Firoz Shah:</b> Firozabad, <b>Jaunpur (Siraz-e-Hind)</b>, Fatehabad, Hissar, Firozpur",
"<b>4 legal taxes under Firoz:</b> Kharaj (land) | Khams (1/5 loot) | Jizya (religious tax on Hindus) | Zakat (2.5% Muslim income)",
"Firoz: First Sultan to BAN TORTURE as state punishment | Developed Karkhanas (royal factories with thousands of slaves)",
"<b>Timur Lang attacked Delhi Sultanate in 1398 AD</b> | Nasiruddin Mahmood Shah = last Tughlaq ruler | Delhi depopulated for months after Timur's massacre"
],
