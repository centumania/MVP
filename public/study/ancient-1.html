<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CentuMania · Ancient History Part 1</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#13100a;--bg2:#0f0d07;--panel:#1e1a0f;--panel2:#24200f;--line:#2e2a16;
  --ink:#f0e8d0;--ink2:#c4a86a;--ink3:#7a6840;
  --gold:#f0bc45;--gold2:#c8960e;--gold-glow:rgba(240,188,69,.13);
  --amber:#e67e22;--gold-bg:rgba(240,188,69,.12);
  --red:#f06b6b;--red-bg:rgba(240,107,107,.10);
  --blue:#4f8ef7;--green:#3dd68c;
  --mono:"JetBrains Mono",monospace;--serif:"Instrument Serif",serif;--sans:"DM Sans",sans-serif;
  --nav:56px;--aside:268px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px}
/* SHELL */
.shell{display:grid;grid-template-rows:var(--nav) 1fr;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;padding:0 18px;gap:12px;border-bottom:1px solid var(--line);background:rgba(15,13,7,.97);backdrop-filter:blur(14px);z-index:60}
.logo{font-family:var(--serif);font-size:19px;font-style:italic;color:var(--gold);display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);flex-shrink:0}
.nav-stats{display:flex;gap:16px;margin-left:auto;align-items:center}
.stat{font-family:var(--mono);font-size:11px;color:var(--ink2)}
.stat b{font-size:13px}.stat.xp b{color:var(--gold)}.stat.nd b{color:var(--amber)}.stat.tp b{color:var(--red)}
.body-wrap{display:grid;grid-template-columns:var(--aside) 1fr;overflow:hidden;height:calc(100vh - var(--nav))}
aside{background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto}
aside::-webkit-scrollbar{width:3px}aside::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
main{overflow-y:auto;background:var(--bg)}
main::-webkit-scrollbar{width:4px}main::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
/* SIDEBAR */
#sidebar-inner{padding:10px 8px 60px}
.ch-group{margin-bottom:3px}
.ch-toggle{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink2);padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:.13s;font-family:var(--sans)}
.ch-toggle:hover{background:var(--panel);color:var(--ink)}
.ch-icon{font-size:15px}.ch-label{flex:1}.ch-prog{font-family:var(--mono);font-size:10px;color:var(--ink3)}.ch-arr{font-size:11px;color:var(--ink3);flex-shrink:0}
.node-items{padding:3px 4px 3px 10px}
.ni-btn{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink3);padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;transition:.12s;font-family:var(--sans);margin-bottom:1px;min-height:44px}
.ni-btn:hover:not(.locked){background:var(--panel);color:var(--ink)}
.ni-btn.active{background:var(--gold-glow);border-color:var(--gold2);color:var(--gold)}
.ni-btn.passed:not(.active){color:var(--ink)}
.ni-btn.locked{cursor:default;opacity:.4}
.ni-title{flex:1;line-height:1.3}.ni-xp{font-family:var(--mono);font-size:10px;color:var(--ink3);flex-shrink:0}
.ni-tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;flex-shrink:0}
.ni-tag.lock{color:var(--ink3)}.ni-tag.done{background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.25)}.ni-tag.vis{color:var(--amber)}
/* MAIN VIEWS */
.view{padding:28px clamp(16px,3.5vw,52px) 80px;max-width:900px;margin:0 auto}
/* TABS */
.tabs{display:flex;gap:3px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:22px;width:fit-content}
.tab{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:8px;cursor:pointer;border:0;background:none;color:var(--ink2);transition:.14s}
.tab:hover:not(.active){color:var(--ink)}.tab.active{background:var(--gold2);color:#fff;font-weight:700}
.tab-pane{display:none}.tab-pane.active{display:block}
/* NODE HEADER */
.node-hd-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.node-type-tag{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.node-type-tag.trap{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.3)}
.node-type-tag.gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,188,69,.3)}
.xp-pill{font-family:var(--mono);font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid rgba(240,188,69,.2);border-radius:6px;padding:3px 8px;margin-left:auto}
.node-title{font-family:var(--serif);font-size:clamp(24px,4vw,36px);font-style:italic;line-height:1.1;margin-bottom:12px}
.node-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
.ns-item{display:flex;flex-direction:column;gap:3px}
.ns-label{font-family:var(--mono);font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.ns-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink)}
.ns-val.faa-col{color:var(--amber)}.ns-val.pass-col{color:var(--green)}.ns-val.pend-col{color:var(--ink2)}
/* LEARN PANE */
.fact-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin:12px 0;overflow:hidden}
.fact-block.gold-block{background:linear-gradient(135deg,rgba(240,188,69,.07),rgba(230,126,34,.04));border-color:rgba(240,188,69,.3)}
.fb-head{padding:9px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink2);border-bottom:1px solid var(--line);background:var(--panel2)}
.fb-body{padding:14px 16px}
ul.facts{list-style:none;padding:0}
ul.facts li{padding:7px 0 7px 22px;border-bottom:1px dashed var(--line);font-size:14px;position:relative;line-height:1.55}
ul.facts li:last-child{border-bottom:0}
ul.facts li::before{content:"▸";position:absolute;left:3px;top:9px;color:var(--amber);font-size:11px}
ul.facts b{color:var(--gold)}
.trap-block{background:var(--red-bg);border:1px solid rgba(240,107,107,.35);border-radius:12px;overflow:hidden;margin:12px 0}
.trap-block .fb-head{background:rgba(240,107,107,.08);color:var(--red);border-color:rgba(240,107,107,.35)}
.trap-block ul.facts li::before{content:"⚠";color:var(--red)}
.mnemonic-block{background:rgba(79,142,247,.07);border:1px solid rgba(79,142,247,.3);border-radius:12px;overflow:hidden;margin:12px 0}
.mnemonic-block .fb-head{background:rgba(79,142,247,.07);color:var(--blue);border-color:rgba(79,142,247,.3)}
/* REVISION + ONE-LINERS */
.revision-block{background:rgba(79,142,247,.05);border:1px solid rgba(79,142,247,.2);border-radius:12px;overflow:hidden;margin:12px 0}
.revision-block .fb-head{background:rgba(79,142,247,.06);color:var(--blue);border-color:rgba(79,142,247,.2)}
.revision-block ul.facts li::before{content:"⚡";color:var(--blue);font-size:10px}
.oneliner-block{background:rgba(61,214,140,.05);border:1px solid rgba(61,214,140,.18);border-radius:12px;overflow:hidden;margin:12px 0}
.oneliner-block .fb-head{background:rgba(61,214,140,.06);color:var(--green);border-color:rgba(61,214,140,.18)}
.oneliner-block ul.facts li::before{content:"🎯";color:var(--green);font-size:10px}
/* FLASHCARDS */
.flash-hint{font-family:var(--mono);font-size:11px;color:var(--ink3);text-align:center;margin-bottom:12px;letter-spacing:.5px}
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:14px}
.flash-card{perspective:900px;cursor:pointer;height:150px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;line-height:1.45;border:1px solid var(--line)}
.flash-front{background:var(--panel);color:var(--ink)}
.flash-back{background:rgba(240,188,69,.1);border-color:rgba(240,188,69,.3);color:var(--gold);transform:rotateY(180deg)}
.flash-reset-row{text-align:center;margin-top:4px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--line);margin:12px 0}
table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt th{padding:9px 13px;text-align:left;background:var(--gold2);color:#fff;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px}
table.dt td{padding:9px 13px;border-bottom:1px solid var(--line);color:var(--ink)}
table.dt tr:last-child td{border-bottom:0}
table.dt td:first-child{color:var(--amber);font-weight:600;font-family:var(--mono);font-size:12px}
table.dt b{color:var(--gold)}
/* MCQ */
.mcq-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.mcq-q{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.45}
.q-num{font-family:var(--mono);font-size:12px;color:var(--amber);margin-right:4px}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.mopt{padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--ink);font-size:13px;cursor:pointer;text-align:left;font-family:var(--sans);transition:.13s;width:100%}
.mopt:hover:not([disabled]){border-color:var(--gold2);background:var(--gold-glow)}
.mopt.correct{background:rgba(61,214,140,.12);border-color:var(--green);color:var(--green)}
.mopt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.mcq-fb{margin-top:10px;font-size:13px;padding:9px 12px;border-radius:8px;background:var(--panel2);color:var(--ink2);line-height:1.5;border:1px solid var(--line)}
.mcq-faa{margin-top:7px}
.faa-chip{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:6px}
.faa-chip.faa-ok{background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.25)}
.faa-chip.faa-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.25)}
.retry-btn{margin-top:4px;padding:6px 16px;background:var(--panel2);border:1px solid var(--gold2);color:var(--gold);border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:11px}
.retry-btn:hover{background:var(--gold-glow)}
.unlock-banner{border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.5}
.pass-banner{background:rgba(61,214,140,.1);border:1px solid rgba(61,214,140,.35);color:var(--green)}
.fail-banner{background:var(--red-bg);border:1px solid rgba(240,107,107,.35);color:var(--ink)}
/* NODE NAV */
.node-nav{display:flex;gap:10px;margin-top:26px;padding-top:16px;border-top:1px solid var(--line)}
.nav-btn{font-family:var(--sans);font-weight:600;font-size:13px;border-radius:9px;padding:9px 15px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);transition:.14s;flex:1;text-align:center}
.nav-btn:hover:not([disabled]){border-color:var(--gold2)}.nav-btn[disabled]{opacity:.35;cursor:default}
.nav-btn.home-btn{flex:0 0 auto;background:var(--panel2)}
/* DASHBOARD */
.dash-hero{background:linear-gradient(135deg,rgba(240,188,69,.08),rgba(230,126,34,.05));border:1px solid rgba(240,188,69,.2);border-radius:16px;padding:28px;margin-bottom:22px;text-align:center}
.dh-title{font-family:var(--serif);font-size:clamp(28px,5vw,44px);font-style:italic;margin-bottom:4px}
.dh-sub{font-family:var(--mono);font-size:12px;color:var(--ink3);letter-spacing:1px}
.dh-xp{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--gold);margin:12px 0 4px}
.dh-bar-wrap{height:8px;background:var(--line);border-radius:4px;overflow:hidden;max-width:400px;margin:0 auto 8px}
.dh-bar{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;transition:.6s}
.dh-label{font-family:var(--mono);font-size:12px;color:var(--ink2)}
.dash-chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:22px}
.dc{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.dc-icon{font-size:22px;margin-bottom:6px}
.dc-label{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--ink)}
.dc-prog-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:4px}
.dc-bar{height:100%;background:var(--gold);border-radius:3px;transition:.5s}
.dc-nums{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.cta-row{display:flex;gap:12px;flex-wrap:wrap}
.cta-btn{padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;border:0;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;transition:.15s}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,188,69,.3)}
.cta-btn.sec{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.cta-btn[disabled]{opacity:.4;cursor:default;transform:none;box-shadow:none}
/* TOAST */
.toast{position:fixed;top:64px;right:18px;background:var(--panel2);border:1px solid var(--gold);border-radius:12px;padding:10px 16px;z-index:500;opacity:0;transform:translateY(-8px);transition:.3s;pointer-events:none;font-size:13px;max-width:340px;line-height:1.4}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{border-color:var(--red)}.toast.warn{border-color:var(--amber);color:var(--ink)}
/* MOBILE */
.mob-bar{display:none}
@media(max-width:720px){
  .shell{grid-template-rows:var(--nav) 1fr 56px;height:100dvh}
  .body-wrap{grid-template-columns:1fr;height:calc(100dvh - var(--nav) - 56px)}
  aside{display:none}
  .mob-bar{display:flex;background:rgba(15,13,7,.98);backdrop-filter:blur(16px);border-top:1px solid var(--line);align-items:stretch}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:0;background:none;color:var(--ink3);cursor:pointer;padding:8px 4px;font-family:var(--mono);font-size:9px;transition:.13s}
  .mob-tab .mt-ico{font-size:20px}.mob-tab.act{color:var(--gold)}
  .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:.2s}
  .mob-overlay.show{opacity:1;pointer-events:all}
  .mob-drawer{position:fixed;left:-100%;top:0;bottom:0;width:min(300px,88vw);background:var(--bg2);border-right:1px solid var(--line);z-index:200;transition:.28s;overflow-y:auto}
  .mob-drawer.open{left:0}
  .mob-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--line)}
  .mob-close{background:none;border:1px solid var(--line);color:var(--ink2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px}
  .nav-stats{display:none}
  .view{padding:16px 14px 100px}
  .node-title{font-size:24px}
  .mcq-opts{grid-template-columns:1fr}
  .flash-grid{grid-template-columns:1fr}
  .tabs{overflow-x:auto;width:100%;scrollbar-width:none}
  .toast{top:auto;bottom:68px;left:14px;right:14px}
}
@media(min-width:721px){.mob-drawer,.mob-overlay{display:none}}
</style>
</head>
<body>
<div class="shell">
  <nav class="topbar">
    <div class="logo"><span class="logo-dot"></span>CentuMania</div>
    <div class="nav-stats">
      <div class="stat xp">XP <b id="h-xp">0</b></div>
      <div class="stat nd">Nodes <b id="h-nd">0/0</b></div>
      <div class="stat tp">Traps <b id="h-tp">0/0</b></div>
    </div>

  <div class="body-wrap">
    <aside><div id="sidebar-inner"></div></aside>

      <div class="dash-view view" id="dash-view">

      <div class="node-view view" id="node-view" style="display:none">
        <div id="node-content"></div>
        <div class="node-nav" id="node-nav"></div>
      </div>
    </main>
  </div>
  <nav class="mob-bar">
    <button class="mob-tab act" id="mob-home"><span class="mt-ico">◈</span>Home</button>
    <button class="mob-tab" id="mob-menu"><span class="mt-ico">☰</span>Topics</button>
  </nav>
</div>
<div class="mob-overlay" id="mob-overlay"></div>
<div class="mob-drawer" id="mob-drawer">
  <div class="mob-drawer-head">
    <div class="logo"><span class="logo-dot"></span>Topics</div>
    <button class="mob-close" id="mob-close">✕</button>
  </div>
  <div id="mob-sidebar-inner"></div>
</div>
<div class="toast" id="toast"></div>

{q:"The BIGGEST dockyard of IVC is found at:",o:["Harappa","Mohenjodaro","Sutkagendor","Lothal"],a:3,e:"Lothal (Ahmedabad, Gujarat) has the biggest dockyard in IVC — evidence of sea trade with Mesopotamia. Lothal is called the 'Manchester of IVC'."},
{q:"Which IVC site is called the 'Lancashire of India'?",o:["Lothal","Harappa","Chanhudaro","Banawali"],a:2,e:"Chanhudaro is called Lancashire of India for its bead making factory. Lothal is Manchester. Both are textile/trade references to English industrial cities."},
{q:"Which major IVC site has NO citadel?",o:["Harappa","Mohenjodaro","Kali Banga","Chanhudaro"],a:3,e:"Chanhudaro is the ONLY major IVC site without a citadel. All other major sites have the two-part structure (Upper Citadel + Lower Town)."},
{q:"What does 'Mohenjodaro' mean?",o:["City of Light","Mound of the Dead","Great Bath","City of the Indus"],a:1,e:"Mohenjodaro means 'Mound of the Dead' in Sindhi. It was excavated by R.D. Banerjee in 1922 on the banks of the Indus river in Sindh, Pakistan."},
{q:"Dholavira (Kutch, Gujarat) is unique because:",o:["It has the biggest dockyard","It used ROCKS for construction (not baked bricks)","It has the most seals","It is the oldest IVC site"],a:1,e:"Dholavira uniquely used rocks (not standardized baked bricks) for construction. It also has a 3-part town (unlike 2-part in most sites) and water harvesting system."},
{q:"The WESTERNMOST site of IVC is:",o:["Alamgirpur","Ropad","Kali Banga","Sutkagendor"],a:3,e:"Sutkagendor (on the Dasht river, Baluchistan, near Iran border) is the westernmost IVC site. Alamgirpur (Meerut, UP, on Hindon river) is the easternmost."},
{q:"Kali Banga (Rajasthan) is famous for:",o:["Biggest dockyard","Pre-Harappan ploughed field evidence","Water harvesting","No citadel"],a:1,e:"Kali Banga on the Ghaggar river has evidence of pre-Harappan ploughed field — oldest ploughed field in South Asia. Also known for black bangles and fire altars."},
{q:"Earliest cultivation of RICE in IVC was found at:",o:["Harappa","Mohenjodaro","Kali Banga","Lothal"],a:3,e:"Lothal (Gujarat) has the earliest evidence of rice cultivation in IVC. Lothal is also known for the biggest dockyard, bead making factory, and chess board remains."}
]},

"<b>No horse remains</b> in IVC — horse introduced by Aryans"

mcqs:[
{q:"The Great Bath is located at which IVC site?",o:["Harappa","Lothal","Kali Banga","Mohenjodaro"],a:3,e:"The Great Bath is at Mohenjodaro — evidence of ritual public bathing. It is 12m × 7m and was the largest structure at Mohenjodaro."},
{q:"The Pashupati Seal was found at:",o:["Harappa","Lothal","Kali Banga","Mohenjodaro"],a:3,e:"The Pashupati Seal was found at Mohenjodaro. It shows a male deity in yogi posture with 3 horned heads, surrounded by Elephant, Tiger, Rhinoceros — proto-Shiva."},
{q:"The IVC script is:",o:["Brahmi script","Cuneiform","Pictographic — not deciphered","Devanagari"],a:2,e:"IVC script is pictographic (written right-to-left, sometimes boustrophedon). About 400+ signs have been identified. It has NOT been deciphered yet."},
{q:"The most depicted animal on IVC seals overall is:",o:["Bull","Elephant","Tiger","Unicorn"],a:3,e:"Unicorn is the most depicted animal on IVC seals overall. Bull is most common at Mohenjodaro specifically. Unicorn appears across all major IVC sites."},
{q:"IVC bricks were in the ratio of:",o:["1:1:2","2:3:4","1:2:4","1:3:6"],a:2,e:"IVC bricks were standardized in the ratio 1:2:4 (height:width:length). This standardization across all IVC sites shows remarkable urban planning coordination."},
{q:"Which metal was NOT used in IVC?",o:["Copper","Gold","Iron","Bronze"],a:2,e:"Iron was NOT used in IVC. Only copper, bronze (copper + tin), gold, and silver were used. Iron came into use in the Later Vedic period (called 'Krishna Ayas')."},
{q:"Trade with which civilization is evidenced by IVC seals found abroad?",o:["Egyptian civilization","Chinese civilization","Mesopotamian (Sumer) civilization","Roman civilization"],a:2,e:"IVC seals have been found in Mesopotamia (Sumer/modern Iraq) and vice versa — evidence of trade between IVC and Mesopotamia. Lothal's dockyard supported this sea trade."},
{q:"Which goddess was MOST prominently worshipped in IVC?",o:["Pashupati (proto-Shiva)","Mother Goddess","Sarasvati","Lakshmi"],a:1,e:"Mother Goddess was the most prominent deity in IVC — evidenced by numerous terracotta female figurines. Pashupati Seal shows a male deity but is less common than Mother Goddess."},
{q:"IVC's most advanced feature of town planning was:",o:["Grid system of roads","Great Bath","Underground covered drainage","Standardized bricks"],a:2,e:"Underground covered drainage system is considered the most advanced and unique feature of IVC town planning. No other ancient civilization had such a sophisticated drainage system."},
{q:"Which of the following was ABSENT in IVC?",o:["Bronze tools","Cotton cultivation","Horse domestication","Trade with Mesopotamia"],a:2,e:"Horse was ABSENT in IVC — no horse remains found. Horse was introduced to the Indian subcontinent by the Aryans. This is a key difference between IVC and Vedic civilisation."}
]},
{id:"ivc3",title:"IVC — Decline & Master Traps",xp:45,type:"trap",seqIdx:5,
facts:[

],

flashcards:[
{q:"List the 6 theories for IVC's decline.",a:"Aryan Invasion, Floods, Ecological change/Sarasvati drying, Tectonic activity, Epidemic, Trade decline"},
{q:"Who proposed the Aryan Invasion Theory, and is it accepted today?",a:"R.E.M. Wheeler proposed it; it is now largely rejected"},
{q:"Which decline theory is most widely accepted today?",a:"Ecological change — deforestation and the drying up of the Sarasvati river"},
{q:"Which IVC site uniquely has a 'Button Seal'?",a:"Lothal (all other major sites have stamp seals)"},
{q:"Where were fire altars found in the IVC?",a:"Both Kali Banga AND Lothal"},

{q:"What was found at Banawali?",a:"A terracotta plough and barley remains"},

mcqs:[
{q:"The Aryan Invasion Theory for IVC decline was proposed by:",o:["D.R. Sahini","R.D. Banerjee","R.E.M. Wheeler","J.P. Joshi"],a:2,e:"R.E.M. Wheeler proposed the Aryan Invasion Theory — that Aryans invaded and destroyed IVC. This theory is now largely rejected by archaeologists."},
{q:"'Button Seal' (as opposed to stamp seal) was found at which IVC site?",o:["Mohenjodaro","Harappa","Kali Banga","Lothal"],a:3,e:"Lothal has Button Seal, unlike the stamp seals found at all other major IVC sites. This is a commonly asked distinction in SSC exams."},
{q:"Fire altars were found at which IVC sites?",o:["Only Kali Banga","Only Lothal","Kali Banga AND Lothal","Mohenjodaro AND Harappa"],a:2,e:"Fire altars were found at BOTH Kali Banga (Rajasthan) and Lothal (Gujarat) — evidence of fire worship or yajnas. This is asked as 'which sites' showing both are correct."},
{q:"The 'Dog buried with Man' finding was at which IVC site?",o:["Lothal","Banawali","Kali Banga","Ropad"],a:3,e:"Ropad (on Sutlej river, Punjab, India) has the unique finding of a dog buried alongside a human being — unique in all IVC sites."},
{q:"Banawali (Haryana) is associated with which finding?",o:["Biggest dockyard","Terracotta plough and barley","Water harvesting","Pre-Harappan ploughed field"],a:1,e:"Banawali (Fatehabad, Haryana) on the Ghaggar river, excavated by R.S. Bisht, is known for terracotta figure of a plough and barley finds."},
{q:"Which theory of IVC decline involves the drying up of the Sarasvati river?",o:["Aryan Invasion","Tectonic activity","Epidemic","Ecological change"],a:3,e:"Ecological change theory: deforestation and the drying up of the Sarasvati river (Ghaggar-Hakra system) led to IVC decline. This is now the most widely accepted theory."},
{q:"The 'Bronze Dancing Girl' was found at:",o:["Harappa","Lothal","Mohenjodaro","Kali Banga"],a:2,e:"The Bronze Dancing Girl (a famous IVC artifact showing a nude female dancer) was found at Mohenjodaro. Also found there: Bearded Priest (steatite statue), Pashupati Seal, Great Bath."},
{q:"Which two IVC sites are on the Ghaggar river?",o:["Harappa and Mohenjodaro","Lothal and Dholavira","Kali Banga and Banawali","Ropad and Alamgirpur"],a:2,e:"Both Kali Banga (Rajasthan) and Banawali (Haryana) are on the Ghaggar river. Rakhi Garhi is also on Ghaggar. This river is identified with the ancient Sarasvati."},
{q:"Which statement about IVC is INCORRECT?",o:["IVC had underground drainage","IVC script is not deciphered","IVC used iron tools","IVC traded with Mesopotamia"],a:2,e:"IVC did NOT use iron tools. Only copper, bronze, gold, and silver were used. Iron came in the Later Vedic period. The other three statements are correct."},
{q:"The Bearded Priest statue (steatite) was found at:",o:["Harappa","Lothal","Kali Banga","Mohenjodaro"],a:3,e:"The Bearded Priest steatite statue was found at Mohenjodaro. It shows a figure with a shawl decorated with trefoil patterns. It is an iconic IVC artefact."}
]}
]},

{q:"The Rigveda starts with the words:",o:["Aum Namah Shivaya","Sarasvati Namaste","Agnimele Purohitam","Gayatri Mahantre"],a:2,e:"Rigveda starts with 'Agnimele Purohitam' — a hymn to Agni (fire god). This is a standard SSC question about Rigveda's opening words."},
{q:"The Purusha Sukta, which is the theoretical basis of the 4 varnas, is in:",o:["Atharvaveda","Samaveda Mandala 1","Rigveda Mandala 10","Yajurveda"],a:2,e:"Purusha Sukta is in Rigveda Mandala 10. It describes how the 4 varnas (Brahmin, Kshatriya, Vaishya, Shudra) emerged from different parts of the primordial being (Purusha)."}
]},
{id:"v2",title:"Early & Later Vedic Period",xp:60,type:"trap",seqIdx:7,
facts:[
"<b>Early Vedic (1500–1000 BC):</b> Patriarchal family | Largely egalitarian | No rigid caste | Women equal (Gargi, Lopamudra, Maitreyi)",
"<b>MOST important Early Vedic god = INDRA</b> (thunder, war) | Weapon: Vajra | Title: Purandara",
"Agni = 2nd most important | Varuna = cosmic order (Rita) | Soma = intoxicating plant/moon",
"<b>No temples, no idol worship</b> in Early Vedic | Bali = voluntary gift to king",
"<b>Cattle = measure of wealth</b> | Gavisthi = battle for cattle | Primary occupation = Pastoralism",
"<b>Later Vedic (1000–600 BC):</b> Agriculture replaced pastoralism | Iron used = Krishna Ayas",
"<b>Prajapati replaced Indra</b> as supreme god in Later Vedic",
"<b>Varna system crystallised</b> into rigid caste in Later Vedic | Shudra excluded from assemblies",
"<b>Women's status DECLINED</b> in Later Vedic: no sabha, child marriage, difficult widowhood",
"<b>Ashvamedha Yajna</b> (horse sacrifice) | Rajasuya (royal consecration) | Shatapatha Brahmana = largest Brahmana"
],

{q:"Who was the supreme deity in Early Vedic vs Later Vedic times?",a:"Early Vedic = Indra; Later Vedic = Prajapati"},

{q:"When was iron first used in the Vedic period, and what was it called?",a:"Later Vedic period; called 'Krishna Ayas' (black metal)"},
{q:"How did women's status change from Early to Later Vedic?",a:"Declined sharply — from relative equality (sabha access, svayamvara) to exclusion and child marriage"},

{q:"What was Gavisthi?",a:"'Desire for cattle' — the most common cause of war in the Early Vedic period"},
{q:"What is the Ashvamedha Yajna?",a:"A horse sacrifice performed by kings to assert territorial supremacy (Later Vedic)"},

mcqs:[
{q:"The most important deity in the Early Vedic period was:",o:["Brahma","Vishnu","Indra","Prajapati"],a:2,e:"Indra was the most important deity in the Early Vedic period (200 hymns in Rigveda). He is the god of thunder, storm, and war. His weapon is Vajra and title is 'Purandara'."},
{q:"Indra's weapon and title respectively are:",o:["Trishul — Mahadeva","Vajra — Purandara","Chakra — Vishnu","Danda — Yama"],a:1,e:"Indra's weapon = Vajra (thunderbolt) | Title = Purandara (destroyer of forts/cities). This combination is frequently asked in SSC."},
{q:"In Later Vedic period, the supreme god became:",o:["Indra","Varuna","Prajapati","Agni"],a:2,e:"Prajapati (creator god) replaced Indra as the supreme god in the Later Vedic period. Brahma, Vishnu, and Shiva (the Trimurti) also rose to prominence in this period."},
{q:"Iron was used in Vedic period and was called:",o:["Ayas","Loha only","Krishna Ayas","Tamra"],a:2,e:"Iron is called 'Krishna Ayas' (black metal) in Later Vedic texts. 'Ayas' = metal (generic, used for copper in Early Vedic) | 'Krishna Ayas' = iron | 'Loha' = another name for iron."},
{q:"In the Early Vedic period, the voluntary gift given to the king was called:",o:["Bhaga","Shulka","Bali","Kara"],a:2,e:"In Early Vedic period, 'Bali' was a voluntary gift to the king (not a tax). In Later Vedic period, Bali became compulsory. Bhaga (1/6 of produce) was a standard Later Vedic tax."},
{q:"The primary occupation in EARLY Vedic period was:",o:["Agriculture","Trade and commerce","Pastoralism (cattle-rearing)","Pottery making"],a:2,e:"Pastoralism (cattle-rearing) was the primary occupation in Early Vedic period. Cattle = measure of wealth. In Later Vedic period, agriculture replaced pastoralism as the main occupation."},
{q:"Gavisthi (battle for cattle) was the most common cause of war in which period?",o:["IVC period","Later Vedic period","Early Vedic period","Mahajanapada period"],a:2,e:"Gavisthi means 'desire for cattle' and was the most common cause of war in the Early Vedic period. Cattle was the primary measure of wealth in this period."},
{q:"The Ashvamedha Yajna was a:",o:["Harvest festival","Battle ritual","Horse sacrifice for territorial supremacy","Monsoon prayer"],a:2,e:"Ashvamedha Yajna (horse sacrifice) was performed by kings to assert territorial supremacy in the Later Vedic period. Rajasuya was the royal consecration ceremony."},
{q:"In Early Vedic period, women could:",o:["Not own property but could study","Attend sabha and choose husband (svayamvara)","Only perform household duties","Not compose Vedic hymns"],a:1,e:"In Early Vedic period, women had a respectable position: they could attend sabha & samiti, choose husband (svayamvara), and there were female sages like Gargi, Lopamudra, and Maitreyi."},
{q:"The largest and most important Brahmana text is:",o:["Aitareya Brahmana","Shatapatha Brahmana","Rigveda Brahmana","Tandya Brahmana"],a:1,e:"Shatapatha Brahmana is the largest and most important Brahmana text, composed in the Later Vedic period. 'Shatapatha' means 'a hundred paths' and it deals with ritual procedures."}
]}
]},

{q:"The Nanda dynasty was the first:",o:["Dynasty with a standing army","Buddhist ruling dynasty","Non-Kshatriya dynasty of Magadha","Dynasty to issue coins"],a:2,e:"The Nanda dynasty was the first non-Kshatriya dynasty to rule Magadha — they were of lower (non-warrior) caste origin. Mahapadma Nanda called himself 'Destroyer of all Kshatriyas.'"},
{q:"Ajatashatru used which weapon against Vaishali in battle?",o:["Greek catapult only","Mahashilakantaka and Rathamusala","Gunpowder","Elephant cavalry only"],a:1,e:"Ajatashatru used Mahashilakantaka (a stone-throwing catapult) and Rathamusala (a chariot fitted with rotating blades) in his war against Vaishali — the world's first republic."},
{q:"Why did Alexander NOT attack the Nanda empire?",o:["Chanakya defeated him","Nandas offered a treaty","His army refused to cross the Beas river","Alexander died before reaching Magadha"],a:2,e:"Alexander reached Punjab (326 BC) but his army refused to cross the Beas (Hyphasis) river, fearing the massive Nanda army (200,000 infantry, 6,000 war elephants). General Coenus voiced this."},
{q:"Mahapadma Nanda was called 'Ekarat' which means:",o:["Destroyer of all Kshatriyas","Sole sovereign","Conqueror of all","Great king of kings"],a:1,e:"'Ekarat' means sole sovereign — one who rules alone without rivals. Mahapadma Nanda was also called 'Destroyer of all Kshatriyas' (Sarva Kshatrantaka) for overthrowing Kshatriya rulers."},
{q:"Who planned the overthrow of Dhana Nanda (last Nanda ruler)?",o:["Ajatashatru","Alexander","Chanakya (Kautilya)","Ashoka"],a:2,e:"Chanakya (Kautilya) planned and engineered the overthrow of Dhana Nanda (last Nanda ruler), installing Chandragupta Maurya in his place. Chanakya later wrote the Arthashastra."}
]},

mcqs:[
{q:"The Battle of Hydaspes (326 BC) was fought on which river?",o:["Indus","Beas (Hyphasis)","Jhelum (Hydaspes/Vitasta)","Chenab"],a:2,e:"Battle of Hydaspes was fought on the Jhelum river (ancient names: Hydaspes / Vitasta). It was between Alexander and King Porus of Punjab. Beas is where Alexander STOPPED later."},
{q:"Who welcomed Alexander the Great at Taxila?",o:["Porus","Dhana Nanda","Ambhi","Chandragupta"],a:2,e:"Ambhi (also called Omphi), king of Taxila, welcomed Alexander and even helped him against Porus. Porus of Punjab bravely fought Alexander."},
{q:"Alexander the Great died at:",o:["Taxila","Alexandria, Egypt","Babylon","Macedon"],a:2,e:"Alexander died at Babylon in 323 BC at the age of 32/33. He died of fever (possibly typhoid). He never returned to Macedonia after his eastern campaigns."},
{q:"Why did Alexander's army refuse to advance beyond the Beas river?",o:["The army was tired and sick","They feared crossing the desert","They feared the massive Nanda army","Alexander ordered retreat"],a:2,e:"Alexander's army refused to cross the Beas (Hyphasis) river because they feared the massive Nanda empire's army (200,000 infantry, 6,000 elephants). General Coenus voiced their desire."},
{q:"Which city did Alexander name after his horse Bucephalus?",o:["Nicaea","Alexandria","Bucephala","Taxila"],a:2,e:"Alexander founded two cities on the Jhelum river after the Battle of Hydaspes: Nicaea (victory city, west bank) and Bucephala (named after his horse Bucephalus, east bank)."},
{q:"The Greek art style that developed due to Alexander's invasion and influenced Buddha's depiction in human form is called:",o:["Gupta school","Amaravati school","Gandhara school","Mathura school"],a:2,e:"The Gandhara school of art developed in the NW region due to Greek influence after Alexander. It produced the FIRST depictions of Buddha in human form (earlier only symbols were used)."},
{q:"Painted Grey Ware (PGW) pottery is associated with which period?",o:["Mahajanapada period","IVC period","Later Vedic period","Early Mauryan period"],a:2,e:"PGW (grey pottery with black geometric designs) is associated with the Later Vedic period (~1200–600 BC). Key sites: Hastinapur, Kurukshetra, Indraprastha."},
{q:"Northern Black Polished Ware (NBPW) is characteristic of which period?",o:["IVC","Early Vedic","Later Vedic only","Mahajanapada and early Mauryan"],a:3,e:"NBPW (shiny black polished pottery) is the most characteristic pottery of the Mahajanapada and early Mauryan period (~700–200 BC). It is associated with the 2nd urbanisation of India."},
{q:"Hastinapur (PGW site) was excavated by:",o:["D.R. Sahini","V.S. Wakankar","B.B. Lal","J.P. Joshi"],a:2,e:"Hastinapur was excavated by B.B. Lal in 1950–52. Evidence of flooding at Hastinapur connects to the Mahabharata's story of the Ganga flood. B.B. Lal also excavated Kali Banga."},
{q:"NBPW represents which phase of Indian history?",o:["First urbanisation (IVC)","Second urbanisation of India","Third urbanisation","Iron Age beginnings"],a:1,e:"NBPW is associated with the SECOND urbanisation of India — the rise of cities during the Mahajanapada period, as opposed to the FIRST urbanisation which was the IVC."},
{q:"Which Persian (Achaemenid) emperor conquered the Indus/Gandhara region, and around when?",o:["Cyrus the Great, ~550 BC","Darius I, ~518 BC","Xerxes, ~480 BC","Cambyses, ~525 BC"],a:1,e:"Darius I conquered the Indus/Gandhara region around 518 BC, making it the 20th satrapy of the Achaemenid Persian Empire — about 200 years before Alexander's invasion."},
{q:"The Kharosthi script, used in Gandhara and NW India, was derived from:",o:["Brahmi script","Greek script","Aramaic script","Sanskrit script"],a:2,e:"Kharosthi script was derived from the Aramaic script through Persian administrative influence, and was written right-to-left."},
{q:"Which of the following correctly orders the foreign invasions of NW India chronologically?",o:["Alexander (326 BC) then Darius I (518 BC)","Darius I (518 BC) then Alexander (326 BC)","Both occurred simultaneously","Alexander invaded before the Achaemenid Empire existed"],a:1,e:"The Persian (Achaemenid) conquest under Darius I (~518 BC) occurred about 200 years BEFORE Alexander's invasion (326 BC)."},
{q:"The Megalithic Culture of peninsular South India is primarily associated with which period?",o:["Bronze Age (same as IVC)","Iron Age (~1000–300 BC)","Early Vedic Period","Neolithic Period"],a:1,e:"The Megalithic Culture was an Iron Age culture of peninsular/South India, flourishing roughly 1000–300 BC, distinct from the North Indian PGW/NBPW cultures of the same broad era."},
{q:"The characteristic pottery of the Megalithic Culture is:",o:["Painted Grey Ware","Northern Black Polished Ware","Black-and-Red Ware","Ochre Coloured Pottery"],a:2,e:"Black-and-Red Ware (BRW) is the defining pottery of the Megalithic Culture, found alongside large stone burial structures across peninsular India."},
{q:"Which Megalithic site is famous for urn burials and terracotta sarcophagi?",o:["Brahmagiri","Adichanallur","Hallur","Maski"],a:1,e:"Adichanallur in Tamil Nadu is well known for Megalithic urn burials and terracotta sarcophagi (coffin-like burial containers)."},
{q:"The Megalithic site of Brahmagiri (Karnataka) is significant because it was:",o:["The largest Megalithic site","The first Megalithic site systematically excavated, by Mortimer Wheeler","The capital of a Mahajanapada","A PGW pottery site"],a:1,e:"Brahmagiri was the first Megalithic site to be systematically excavated, by the archaeologist Mortimer Wheeler."}
]}

/* ── STATE ── */
const SK='centumania_anc1_v2';
let S={xp:0,visited:{},mcq:{},faa:{},curNode:null,chOpen:{}};
function loadS(){try{const r=localStorage.getItem(SK);if(r)S=Object.assign({xp:0,visited:{},mcq:{},faa:{},curNode:null,chOpen:{}},JSON.parse(r));}catch(e){}}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

/* ── HELPERS ── */
function allNodes(){return CHAPTERS.flatMap(c=>c.nodes);}
function findNode(id){return allNodes().find(n=>n.id===id);}
function seqNodes(){return allNodes().slice().sort((a,b)=>a.seqIdx-b.seqIdx);}

function isUnlocked(node){
  if(node.seqIdx===0)return true;
  if(node.type==='gold'){
    const all=seqNodes().filter(n=>n.type!=='gold');
    const passed=all.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
    return (passed/all.length)>=0.8;
  }
  const prev=seqNodes().find(n=>n.seqIdx===node.seqIdx-1);
  if(!prev)return true;
  return !!(S.mcq[prev.id]&&S.mcq[prev.id].passed);
}

function totalXP(){return allNodes().reduce((s,n)=>s+((S.mcq[n.id]&&S.mcq[n.id].passed)?n.xp:0),0);}
function overallPct(){
  const nodes=allNodes().filter(n=>n.type!=='gold');
  const passed=nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  return nodes.length?Math.round(100*passed/nodes.length):0;
}

/* ── TOAST ── */
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type==='err'?' err':type==='warn'?' warn':'');
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── UPDATE TOPBAR ── */
function updateTopbar(){
  const nodes=allNodes().filter(n=>n.type!=='gold');
  const passed=nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  const traps=allNodes().filter(n=>n.type==='trap');
  const trapsPassed=traps.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  document.getElementById('h-xp').textContent=totalXP();
  document.getElementById('h-nd').textContent=passed+'/'+nodes.length;
  document.getElementById('h-tp').textContent=trapsPassed+'/'+traps.length;
}

/* ── SIDEBAR ── */
function buildSidebar(){
  ['sidebar-inner','mob-sidebar-inner'].forEach(sid=>{
    const sb=document.getElementById(sid);
    if(!sb)return;
    sb.innerHTML='';
    sb.style.padding='10px 8px 60px';
    CHAPTERS.forEach(ch=>{
      const grp=document.createElement('div');
      grp.className='ch-group';
      const passedCount=ch.nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
      const isOpen=S.chOpen[ch.id]!==false;
      const tog=document.createElement('button');
      tog.className='ch-toggle';
      tog.innerHTML=`<span class="ch-icon">${ch.icon}</span><span class="ch-label">${ch.title}</span><span class="ch-prog">${passedCount}/${ch.nodes.length}</span><span class="ch-arr">${isOpen?'▾':'▸'}</span>`;
      tog.onclick=()=>{S.chOpen[ch.id]=!isOpen;saveS();buildSidebar();};
      grp.appendChild(tog);
      const items=document.createElement('div');
      items.className='node-items';
      items.style.display=isOpen?'block':'none';
      ch.nodes.forEach(node=>{
        const unlocked=isUnlocked(node);
        const m=S.mcq[node.id];
        const passed=m&&m.passed;
        const btn=document.createElement('button');
        btn.className='ni-btn'+(S.curNode===node.id?' active':'')+(passed?' passed':'')+(unlocked?'':' locked');
        let tag='';
        if(!unlocked)tag='<span class="ni-tag lock">🔒</span>';
        else if(passed)tag='<span class="ni-tag done">✓</span>';
        else if(S.visited[node.id])tag='<span class="ni-tag vis">●</span>';
        btn.innerHTML=`${tag}<span class="ni-title">${node.title}</span><span class="ni-xp">+${node.xp}</span>`;
        btn.onclick=()=>openNode(node.id);
        items.appendChild(btn);
      });
      grp.appendChild(items);
      sb.appendChild(grp);
    });
  });
  updateTopbar();
}

/* ── OPEN NODE ── */
function openNode(id){
  const node=findNode(id);
  if(!node)return;
  if(!isUnlocked(node)){
    const prev=seqNodes().find(n=>n.seqIdx===node.seqIdx-1);
    showToast(`🔒 Complete "${prev?prev.title:'previous node'}" with 10/10 first!`,'warn');
    return;
  }
  S.curNode=id;S.visited[id]=true;saveS();buildSidebar();
  track('node_opened',{node_id:id,node_title:node.title,node_type:node.type,xp:node.xp});
  document.getElementById('dash-view').style.display='none';
  document.getElementById('node-view').style.display='block';
  renderNode(node);
  document.getElementById('mob-drawer').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('show');
  window.scrollTo(0,0);
  document.getElementById('main-area').scrollTop=0;
}

/* ── RENDER NODE ── */
function renderNode(node){
  const m=S.mcq[node.id]||{};
  const faaStr=m.faa!=null?Math.round(m.faa)+'%':'—';
  const bestStr=m.best!=null?Math.round(m.best)+'%':'—';
  let typTag='';
  if(node.type==='trap')typTag='<span class="node-type-tag trap">⚠ Trap Node</span>';
  if(node.type==='gold')typTag='<span class="node-type-tag gold">★ Golden Node</span>';
  const mcqs=node.mcqs||[];
  const testLabel=m.passed?`🎯 Test (10/10 ✓)`:`🎯 Test (10 MCQs)`;
  const retryBtn=(m.attempts&&!m.passed&&node.type!=='gold')?`<button class="retry-btn" style="margin-left:auto" onclick="retryNode('${node.id}')">↺ Retry</button>`:'';

  document.getElementById('node-content').innerHTML=`
<div class="node-hd">
  <div class="node-hd-top">${typTag}<div class="xp-pill">+${node.xp} XP</div></div>
  <h2 class="node-title">${node.title}</h2>
  <div class="node-stats">
    <div class="ns-item"><div class="ns-label">FAA</div><div class="ns-val faa-col">${faaStr}</div></div>
    <div class="ns-item"><div class="ns-label">Best</div><div class="ns-val">${bestStr}</div></div>
    <div class="ns-item"><div class="ns-label">Attempts</div><div class="ns-val">${m.attempts||0}</div></div>
    <div class="ns-item"><div class="ns-label">Status</div><div class="ns-val ${m.passed?'pass-col':'pend-col'}">${m.passed?'✓ Passed':'Pending'}</div></div>
    ${retryBtn}
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'learn')">📖 Learn</button>
  <button class="tab" onclick="switchTab(this,'flash')">🗂 Flashcards</button>
  <button class="tab" onclick="switchTab(this,'test')">${testLabel}</button>
</div>
<div id="tab-learn" class="tab-pane active">${buildLearnPane(node)}</div>
<div id="tab-flash" class="tab-pane">${buildFlashPane(node)}</div>
<div id="tab-test" class="tab-pane">${buildTestPane(node)}</div>
`;
  bindMCQ(node);
  buildNodeNav(node);
}

function switchTab(btn,tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

  let h='';

    h+='</ul></div></div>';

    h+=`<div class="mnemonic-block"><div class="fb-head">${node.mn.h}</div><div class="fb-body">${node.mn.b}</div></div>`;

    node.revision.forEach(r=>h+=`<li>${r}</li>`);
    h+='</ul></div></div>';
  }
  if(node.oneliners&&node.oneliners.length){
    h+='<div class="oneliner-block"><div class="fb-head">🎯 20 EXAM ONE-LINERS</div><div class="fb-body"><ul class="facts">';
    node.oneliners.forEach(o=>h+=`<li>${o}</li>`);
    h+='</ul></div></div>';
  }
  return h;
}

/* ── FLASHCARD PANE ── */
function buildFlashPane(node){
  const cards=node.flashcards||[];
  if(!cards.length)return '<div class="fact-block"><div class="fb-body" style="padding:2rem;text-align:center;color:var(--ink2)">No flashcards for this node yet.</div></div>';
  let h=`<p class="flash-hint">TAP A CARD TO FLIP • ${cards.length} CARDS</p><div class="flash-grid">`;
  cards.forEach((c,i)=>{
    h+=`<div class="flash-card" id="fc-${node.id}-${i}" onclick="this.classList.toggle('flipped')">
      <div class="flash-inner">
        <div class="flash-front">${c.q}</div>
        <div class="flash-back">${c.a}</div>
      </div>
    </div>`;
  });
  h+=`</div><div class="flash-reset-row"><button class="retry-btn" onclick="resetFlash('${node.id}')">↺ Reset All Cards</button></div>`;
  return h;
}
function resetFlash(nid){
  document.querySelectorAll(`[id^="fc-${nid}-"]`).forEach(c=>c.classList.remove('flipped'));
}

/* ── TEST PANE ── */
let _sess={};
function buildTestPane(node){
  if(node.type==='gold'){
    return '<div class="fact-block"><div class="fb-body" style="padding:2rem;text-align:center"><p style="font-size:1.1rem;color:var(--ink2)">🏹 Golden Revision Node — read the facts above and revisit them until you can recall them all!</p></div></div>';
  }
  if(!_sess[node.id])_sess[node.id]={};
  const m=S.mcq[node.id]||{};
  const mcqs=node.mcqs||[];
  let h='';
  if(m.passed){
    h+=`<div class="unlock-banner pass-banner">🎉 Passed! FAA: ${Math.round(m.faa||0)}% | Best: ${Math.round(m.best||0)}% | Attempts: ${m.attempts||1}</div>`;
  } else if(m.lastScore!==undefined){
    h+=`<div class="unlock-banner fail-banner">${m.lastScore}/10 — Need 10/10 to unlock next node. FAA locked at ${Math.round(m.faa||0)}%. <button class="retry-btn" onclick="retryNode('${node.id}')">↺ Retry</button></div>`;
  }
  mcqs.forEach((q,i)=>{
    const sessAns=_sess[node.id][i];
    const answered=sessAns!==undefined||m.passed;
    const displayAns=sessAns!==undefined?sessAns:(m.passed?q.a:undefined);
    const faaCorrect=S.faa[node.id]&&S.faa[node.id][i]===true;
    const faaSet=S.faa[node.id]&&S.faa[node.id][i]!==undefined;
    h+=`<div class="mcq-card${answered?' done':''}" data-qi="${i}" data-nid="${node.id}">`;
    h+=`<div class="mcq-q"><span class="q-num">${i+1}.</span> ${q.q}</div>`;
    h+='<div class="mcq-opts">';
    q.o.forEach((opt,oi)=>{
      let cls='mopt';
      if(answered){
        if(oi===q.a)cls+=' correct';
        else if(oi===displayAns&&displayAns!==q.a)cls+=' wrong';
      }
      h+=`<button class="${cls}" data-oi="${oi}"${answered?' disabled':''}>${String.fromCharCode(65+oi)}. ${opt}</button>`;
    });
    h+='</div>';
    if(answered){
      const wasCorrect=displayAns===q.a;
      h+=`<div class="mcq-fb">${wasCorrect?'✅':'❌'} ${q.e}</div>`;
      if(faaSet){
        h+=`<div class="mcq-faa"><span class="faa-chip ${faaCorrect?'faa-ok':'faa-err'}">${faaCorrect?'FAA ✓':'FAA ✗'} (first attempt)</span></div>`;
      }
    }
    h+='</div>';
  });
  // Bottom retry bar — always visible after completing all questions
  if(!m.passed&&m.attempts){
    h+=`<div style="margin-top:20px;padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <span style="font-family:var(--mono);font-size:13px;color:var(--ink2)">Best: <b style="color:var(--gold)">${Math.round(m.best||0)}%</b> &nbsp;|&nbsp; FAA: <b style="color:var(--amber)">${Math.round(m.faa||0)}%</b> &nbsp;|&nbsp; Need <b style="color:var(--green)">10/10</b> to unlock next</span>
      <button class="retry-btn" style="font-size:13px;padding:9px 22px" onclick="retryNode('${node.id}')">↺ Retry</button>
    </div>`;
  }
  return h;
}

/* ── BIND MCQ ── */
function bindMCQ(node){
  const mcqs=node.mcqs||[];
  const pane=document.getElementById('tab-test');
  if(!pane)return;
  pane.querySelectorAll('.mcq-card:not(.done)').forEach(card=>{
    const qi=parseInt(card.dataset.qi);
    card.querySelectorAll('.mopt').forEach(btn=>{
      btn.addEventListener('click',function(){
        if(card.classList.contains('done'))return;
        const chosen=parseInt(btn.dataset.oi);
        const correct=chosen===mcqs[qi].a;
        if(!_sess[node.id])_sess[node.id]={};
        _sess[node.id][qi]=chosen;
        if(!S.faa[node.id])S.faa[node.id]={};
        if(S.faa[node.id][qi]===undefined)S.faa[node.id][qi]=correct;
        card.classList.add('done');
        card.querySelectorAll('.mopt').forEach((b,oi)=>{
          b.disabled=true;
          if(oi===mcqs[qi].a)b.classList.add('correct');
          else if(oi===chosen&&!correct)b.classList.add('wrong');
        });
        const fb=document.createElement('div');
        fb.className='mcq-fb';
        fb.innerHTML=`${correct?'✅':'❌'} ${mcqs[qi].e}`;
        card.appendChild(fb);
        const faaEl=document.createElement('div');
        faaEl.className='mcq-faa';
        faaEl.innerHTML=`<span class="faa-chip ${S.faa[node.id][qi]?'faa-ok':'faa-err'}">${S.faa[node.id][qi]?'FAA ✓':'FAA ✗'} (first attempt)</span>`;
        card.appendChild(faaEl);
        saveS();
        if(Object.keys(_sess[node.id]).length===mcqs.length)finishAttempt(node);
      });
    });
  });
}

function retryNode(nid){
  _sess[nid]={};
  if(S.mcq[nid])delete S.mcq[nid].lastScore;
  saveS();
  const node=findNode(nid);
  document.getElementById('tab-test').innerHTML=buildTestPane(node);
  bindMCQ(node);
  document.getElementById('main-area').scrollTop=0;
}

function finishAttempt(node){
  const mcqs=node.mcqs||[];
  const sess=_sess[node.id]||{};
  const correct=mcqs.filter((q,i)=>sess[i]===q.a).length;
  const pct=Math.round(100*correct/mcqs.length);
  const passed=correct===mcqs.length;
  const faaCorrect=mcqs.filter((q,i)=>S.faa[node.id]&&S.faa[node.id][i]===true).length;
  const faaPct=Math.round(100*faaCorrect/mcqs.length);
  if(!S.mcq[node.id])S.mcq[node.id]={faa:faaPct,best:0,passed:false,attempts:0};
  S.mcq[node.id].attempts=(S.mcq[node.id].attempts||0)+1;
  S.mcq[node.id].faa=faaPct;
  if(pct>(S.mcq[node.id].best||0))S.mcq[node.id].best=pct;
  track('mcq_completed',{node_id:node.id,node_title:node.title,score:correct,total:mcqs.length,pct,faa_pct:faaPct,passed,attempts:S.mcq[node.id].attempts});
  if(passed){
    S.mcq[node.id].passed=true;
    if(S.mcq[node.id].lastScore!==undefined)delete S.mcq[node.id].lastScore;
    S.xp=(S.xp||0)+node.xp;
    saveS();buildSidebar();
    track('node_completed',{node_id:node.id,node_title:node.title,xp_earned:node.xp,faa_pct:faaPct,attempts:S.mcq[node.id].attempts});
    showToast(`🎉 10/10! +${node.xp} XP earned!`,'ok');
    setTimeout(()=>renderNode(node),400);
  } else {
    S.mcq[node.id].lastScore=correct;
    saveS();buildSidebar();
    const pane=document.getElementById('tab-test');
    if(pane){pane.innerHTML=buildTestPane(node);bindMCQ(node);}
    showToast(`${correct}/10 — Need 10/10. Retry to unlock next node.`,'warn');
  }
}

/* ── NODE NAV ── */
function buildNodeNav(node){
  const all=seqNodes();
  const idx=all.findIndex(n=>n.id===node.id);
  const prev=idx>0?all[idx-1]:null;
  const next=idx<all.length-1?all[idx+1]:null;
  const nextOk=next&&isUnlocked(next);
  document.getElementById('node-nav').innerHTML=`
    <button class="nav-btn" ${prev?'':"disabled"} onclick="${prev?`openNode('${prev.id}')`:'void(0)'}">← ${prev?prev.title:'Start'}</button>
    <button class="nav-btn home-btn" onclick="showDash()">⊞ Dashboard</button>
    <button class="nav-btn" ${nextOk?'':"disabled"} onclick="${nextOk?`openNode('${next.id}')`:'void(0)'}">→ ${next?next.title:'End'}</button>`;
}

/* ── DASHBOARD ── */
function showDash(){
  S.curNode=null;saveS();buildSidebar();
  document.getElementById('node-view').style.display='none';
  document.getElementById('dash-view').style.display='block';
  document.getElementById('mob-home').classList.add('act');
  document.getElementById('mob-menu').classList.remove('act');
  const allN=allNodes().filter(n=>n.type!=='gold');
  const passedN=allN.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  const pct=overallPct();
  const xp=totalXP();
  let chapCards='';
  CHAPTERS.forEach(ch=>{
    const nodes=ch.nodes;
    const p=nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
    const pPct=nodes.length?Math.round(100*p/nodes.length):0;
    chapCards+=`<div class="dc"><div class="dc-icon">${ch.icon}</div><div class="dc-label">${ch.title}</div><div class="dc-prog-bar"><div class="dc-bar" style="width:${pPct}%"></div></div><div class="dc-nums">${p}/${nodes.length} passed</div></div>`;
  });
  const goldenOk=pct>=80;
  document.getElementById('dash-content').innerHTML=`
<div class="dash-hero">
  <div class="dh-title">CentuMania <span style="font-family:var(--mono);font-size:12px;color:var(--ink3);font-style:normal;letter-spacing:1px;display:block;margin-top:4px">ANCIENT HISTORY · PART 1</span></div>
  <div class="dh-xp">${xp} XP</div>
  <div class="dh-bar-wrap"><div class="dh-bar" style="width:${pct}%"></div></div>
  <div class="dh-label">${passedN} of ${allN.length} nodes passed (${pct}%)</div>
</div>
<div class="dash-chapters">${chapCards}</div>
<div class="cta-row">
  <button class="cta-btn" onclick="startNext()">▶ Continue Learning</button>
  <button class="cta-btn sec" ${goldenOk?'':"disabled"} onclick="openNode('golden')">🏹 Golden Node ${goldenOk?'':' (need 80%)'}</button>
</div>`;
}

function startNext(){
  const next=seqNodes().find(n=>isUnlocked(n)&&!(S.mcq[n.id]&&S.mcq[n.id].passed));
  if(next)openNode(next.id);
  else showToast('All nodes complete! 🏆 Amazing!');
}

/* ── MOBILE ── */
function initMobile(){
  document.getElementById('mob-home').addEventListener('click',()=>{showDash();});
  document
  document.getElementById("mob-menu").addEventListener("click",()=>{
    document.getElementById("mob-drawer").classList.toggle("open");
    document.getElementById("mob-overlay").classList.toggle("show");
    document.getElementById("mob-menu").classList.toggle("act");
  });
  document.getElementById("mob-close").addEventListener("click",closeDrawer);
  document.getElementById("mob-overlay").addEventListener("click",closeDrawer);
}
function closeDrawer(){
  document.getElementById("mob-drawer").classList.remove("open");
  document.getElementById("mob-overlay").classList.remove("show");
  document.getElementById("mob-menu").classList.remove("act");
}

/* ── METRICS ── */
// Reads the Supabase JWT from localStorage/sessionStorage (where the CentuMania
// app persists it) and POSTs analytics events to the backend.
// Works only when served from centumania.co.in — no token = silently no-ops.
let _mToken=null, _mSid=null;

function initMetrics(){
  // Supabase stores the session under a key like `sb-<ref>-auth-token`
  // in either localStorage or sessionStorage depending on the user's "keep me
  // signed in" choice (see centumania-mvp/src/lib/supabase/client.ts).
  try {
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  } catch(e){}
  _mSid='anc1-'+(Date.now().toString(36));
}

function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},
    body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})
  }).catch(()=>{});
}

/* ── INIT ── */
function init(){
  loadS();
  initMetrics();
  track('material_opened',{material:'ancient_history_part1'});
  buildSidebar();
  initMobile();
  if(S.curNode){const n=findNode(S.curNode);if(n&&isUnlocked(n)){openNode(S.curNode);return;}}
  showDash();
}

document.addEventListener("DOMContentLoaded",init);


/* ===== CentuMania metrics (injected — additive; module content unchanged) ===== */
(function(){
  if(window.__cmTrackInit)return; window.__cmTrackInit=1;
  var CM_DEFAULT='ancient-1';
  var CM_T0=Date.now(),CM_ACTIVE=0,_cmVisT=Date.now();
  function cmToken(){try{var t=localStorage.getItem('cm:access_token');if(t)return t;}catch(e){}try{var st=[localStorage,sessionStorage],s,i,k,d;for(s=0;s<st.length;s++){for(i=0;i<st[s].length;i++){k=st[s].key(i);if(k&&k.indexOf('sb-')===0&&k.slice(-11)==='-auth-token'){d=JSON.parse(st[s].getItem(k)||'{}');if(d&&d.access_token)return d.access_token;}}}}catch(e){}return null;}
  function cmMat(){try{return localStorage.getItem('cm:material_id')||CM_DEFAULT;}catch(e){return CM_DEFAULT;}}
  function cmSid(){try{var id=sessionStorage.getItem('cm:analytics_session');if(!id){id=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():(Math.random().toString(36).slice(2)+Date.now().toString(36));sessionStorage.setItem('cm:analytics_session',id);}return id;}catch(e){return 'anon-'+Math.random().toString(36).slice(2);}}
  function cmInteract(itype,nodeId,meta){try{var t=cmToken();if(!t||!nodeId)return;fetch('/api/study/interaction',{method:'POST',keepalive:true,headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({interaction_type:itype,node_id:String(nodeId),material_id:cmMat(),session_id:cmSid(),timestamp:new Date().toISOString(),metadata:meta||{}})}).catch(function(){});}catch(e){}}
  function cmEvent(name,meta){try{var t=cmToken();if(!t)return;fetch('/api/events',{method:'POST',keepalive:true,headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({event_name:name,session_id:cmSid(),event_timestamp:new Date().toISOString(),metadata:Object.assign({material_id:cmMat()},meta||{})})}).catch(function(){});}catch(e){}}
  function cmBeacon(name,meta){try{var t=cmToken();if(!t)return;var p=JSON.stringify({_token:t,event_name:name,session_id:cmSid(),event_timestamp:new Date().toISOString(),metadata:Object.assign({material_id:cmMat()},meta||{})});if(navigator.sendBeacon)navigator.sendBeacon('/api/events/beacon',new Blob([p],{type:'application/json'}));}catch(e){}}
  document.addEventListener('visibilitychange',function(){if(document.hidden){CM_ACTIVE+=Date.now()-_cmVisT;cmBeacon('tab_switch',{seconds_active:Math.round(CM_ACTIVE/1000)});}else{_cmVisT=Date.now();}});
  window.addEventListener('pagehide',function(){if(!document.hidden)CM_ACTIVE+=Date.now()-_cmVisT;cmBeacon('session_end',{seconds_total:Math.round((Date.now()-CM_T0)/1000),seconds_active:Math.round(CM_ACTIVE/1000)});});
  cmEvent('material_opened',{});cmEvent('session_start',{});
  var _cmNodeT={},_cmLastQ=0;
  function _cmNode(id){try{if(typeof CHAPTERS!=='undefined')for(var c=0;c<CHAPTERS.length;c++){var ns=CHAPTERS[c].nodes||[];for(var n=0;n<ns.length;n++)if(ns[n].id===id)return ns[n];}}catch(e){}return null;}
  if(typeof openNode==='function'){var _o=openNode;openNode=function(id){_o(id);try{_cmNodeT[id]=Date.now();_cmLastQ=Date.now();var nd=_cmNode(id);cmInteract('node_opened',id,{total_questions:(nd&&nd.mcqs?nd.mcqs.length:0)});cmEvent('node_open',{node_id:id});}catch(e){}};}
  if(typeof finishAttempt==='function'){var _f=finishAttempt;finishAttempt=function(node){_f(node);try{var faa=(typeof S!=='undefined'&&S.faa&&S.faa[node.id])||{},total=(node.mcqs||[]).length,ok=0,k;for(k in faa)if(faa[k])ok++;var pct=total?Math.round(ok/total*100):0;cmInteract('node_completed',node.id,{total_questions:total,correct_first_attempt:ok,accuracy_pct:pct,time_spent_seconds:Math.round((Date.now()-(_cmNodeT[node.id]||Date.now()))/1000)});cmEvent('node_completed',{node_id:node.id,pct:pct});}catch(e){}};}
  try{new MutationObserver(function(ms){ms.forEach(function(m){var el=m.target;if(el&&el.classList&&el.classList.contains('mcq-card')&&el.classList.contains('done')&&!el._cmS){el._cmS=1;var qi=parseInt(el.dataset.qi),nid=el.dataset.nid;var fac=!!(typeof S!=='undefined'&&S.faa&&S.faa[nid]&&S.faa[nid][qi]===true);var now=Date.now(),dt=_cmLastQ?now-_cmLastQ:0;_cmLastQ=now;if(nid!=null){cmInteract('mcq_attempt',nid,{question_index:qi,is_correct:fac});cmEvent('answer',{node_id:nid,question_index:qi,is_correct:fac,time_spent_ms:dt});}}});}).observe(document.body,{subtree:true,attributes:true,attributeFilter:['class']});}catch(e){}
})();
