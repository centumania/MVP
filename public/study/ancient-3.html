<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CentuMania · Ancient History Part 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#13100a;--bg2:#1c170f;--bg3:#252015;--ink:#f5f0e8;--ink2:#b8a98a;--gold:#f0bc45;--gold2:#c8960e;--amber:#e67e22;--green:#3dd68c;--red:#f06b6b;--border:#2e2510;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--gold);text-decoration:none}
/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-logo{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.3rem;color:var(--gold)}
.hdr-sub{font-size:.75rem;color:var(--ink2);margin-left:4px}
.hdr-stats{margin-left:auto;display:flex;gap:16px;align-items:center}
.stat{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--ink2)}
.stat span{color:var(--gold);font-weight:600}
.mob-menu-btn{display:none;background:none;border:none;color:var(--ink);cursor:pointer;font-size:1.4rem;margin-right:8px}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 56px)}
/* SIDEBAR */
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
.sidebar-inner{padding:0 8px}
.ch-label{font-size:.65rem;color:var(--ink2);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px 4px;margin-top:8px}
.node-btn{width:100%;text-align:left;background:none;border:none;border-radius:var(--radius);padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.15s}
.node-btn:hover{background:var(--bg3)}
.node-btn.active{background:linear-gradient(90deg,rgba(240,188,69,.15),transparent);border-left:2px solid var(--gold)}
.node-btn.locked{opacity:.4;cursor:not-allowed}
.node-btn.passed .nb-title{color:var(--green)}
.nb-icon{font-size:.9rem;min-width:20px}
.nb-title{font-size:.78rem;color:var(--ink);line-height:1.3;flex:1}
.nb-badge{font-size:.6rem;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--ink2);white-space:nowrap}
.nb-badge.gold-badge{background:rgba(240,188,69,.15);border-color:var(--gold);color:var(--gold)}
/* MAIN */
.main-area{flex:1;overflow-y:auto;padding:24px}
/* DASHBOARD */
.dash-hero{text-align:center;padding:40px 20px 20px}
.dash-hero h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:2rem;color:var(--gold)}
.dash-hero p{color:var(--ink2);margin-top:8px}
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:24px 0}
.ds-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.ds-val{font-family:'JetBrains Mono',monospace;font-size:1.8rem;color:var(--gold);font-weight:600}
.ds-lbl{font-size:.7rem;color:var(--ink2);margin-top:4px}
.dash-chs{margin-top:8px}
.ch-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ch-card h3{font-size:.9rem;margin-bottom:10px}
.ch-nodes{display:flex;flex-wrap:wrap;gap:8px}
.cn-pill{font-size:.72rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:.15s}
.cn-pill:hover{border-color:var(--gold)}
.cn-pill.passed{background:rgba(61,214,140,.12);border-color:var(--green);color:var(--green)}
.cn-pill.locked{opacity:.4;cursor:not-allowed}
/* NODE VIEW */
.node-view{display:none}
.nv-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.nv-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.6rem;color:var(--gold)}
.nv-xp{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:rgba(240,188,69,.12);border:1px solid rgba(240,188,69,.3);border-radius:20px;padding:3px 10px;color:var(--gold)}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:8px 18px;font-size:.82rem;color:var(--ink2);cursor:pointer;transition:.15s;margin-bottom:-1px}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
/* LEARN PANE */
.learn-pane{line-height:1.7}
.learn-pane .sec-head{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.25rem;color:var(--gold);margin:20px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.learn-pane .sub-head{font-size:.9rem;color:var(--amber);margin:16px 0 8px;font-weight:600}
.learn-pane p{color:var(--ink2);font-size:.88rem;margin-bottom:10px}
.learn-pane table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:.8rem}
.learn-pane th{background:var(--bg3);color:var(--gold);padding:7px 10px;text-align:left;border:1px solid var(--border)}
.learn-pane td{padding:6px 10px;border:1px solid var(--border);color:var(--ink2);vertical-align:top}
.learn-pane tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.learn-pane b{color:var(--ink);font-weight:600}
.fact-box{background:rgba(240,188,69,.07);border:1px solid rgba(240,188,69,.2);border-radius:var(--radius);padding:12px 16px;margin:12px 0}
.fact-box strong{color:var(--gold);font-size:.8rem;display:block;margin-bottom:6px}
.fact-box ul{padding-left:16px}
.fact-box li{font-size:.78rem;color:var(--ink2);margin-bottom:3px}
.trap-box{background:rgba(240,107,107,.08);border:1px solid rgba(240,107,107,.25);border-radius:var(--radius);padding:12px 16px;margin:12px 0;font-size:.8rem;color:#f9a8a8}
.revision-box{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.22);border-radius:var(--radius);padding:12px 16px;margin:12px 0}
.revision-box strong{color:#4f8ef7;font-size:.8rem;display:block;margin-bottom:6px}
.revision-box ul{padding-left:16px}
.revision-box li{font-size:.78rem;color:var(--ink2);margin-bottom:3px}
.oneliner-box{background:rgba(61,214,140,.05);border:1px solid rgba(61,214,140,.18);border-radius:var(--radius);padding:12px 16px;margin:12px 0}
.oneliner-box strong{color:var(--green);font-size:.8rem;display:block;margin-bottom:6px}
.oneliner-box ul{padding-left:16px}
.oneliner-box li{font-size:.78rem;color:var(--ink2);margin-bottom:3px}
.flash-hint{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--ink2);text-align:center;margin-bottom:12px;letter-spacing:.5px}
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:14px}
.flash-card{perspective:900px;cursor:pointer;height:140px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);padding:12px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:.78rem;line-height:1.4;border:1px solid var(--border)}
.flash-front{background:var(--bg3);color:var(--ink)}
.flash-back{background:rgba(240,188,69,.1);border-color:rgba(240,188,69,.3);color:var(--gold);transform:rotateY(180deg)}
.flash-reset-row{text-align:center;margin-top:4px}
/* TEST PANE */
.test-info{background:var(--bg3);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:.8rem;color:var(--ink2)}
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.q-num{font-size:.7rem;color:var(--ink2);margin-bottom:6px}
.q-text{font-size:.88rem;color:var(--ink);margin-bottom:14px;line-height:1.5}
.opt-btn{width:100%;text-align:left;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:.82rem;color:var(--ink);cursor:pointer;margin-bottom:7px;transition:.15s}
.opt-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(240,188,69,.08)}
.opt-btn.correct{background:rgba(61,214,140,.15);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(240,107,107,.12);border-color:var(--red);color:var(--red)}
.opt-btn:disabled{cursor:default}
.exp-box{background:var(--bg3);border-left:3px solid var(--gold);padding:10px 14px;font-size:.78rem;color:var(--ink2);margin-top:8px;border-radius:0 6px 6px 0;display:none}
.faa-tag{font-size:.65rem;background:rgba(230,126,34,.15);border:1px solid rgba(230,126,34,.3);color:var(--amber);border-radius:4px;padding:1px 6px;margin-left:6px}
.score-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;text-align:center}
.score-big{font-family:'JetBrains Mono',monospace;font-size:2rem;color:var(--gold)}
.score-sub{font-size:.78rem;color:var(--ink2);margin-top:4px}
.btn{border:none;border-radius:8px;padding:10px 22px;font-size:.82rem;cursor:pointer;font-family:inherit;transition:.15s}
.btn-gold{background:var(--gold);color:#13100a;font-weight:600}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--ink2)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.node-nav{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:.82rem;color:var(--ink);opacity:0;transform:translateY(10px);transition:.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
/* MOBILE */
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}
.mob-drawer{display:none;position:fixed;top:0;left:0;width:280px;height:100%;background:var(--bg2);z-index:201;overflow-y:auto;transform:translateX(-100%);transition:.25s}
.mob-drawer.open{transform:translateX(0)}
.mob-close-btn{float:right;background:none;border:none;color:var(--ink);font-size:1.2rem;cursor:pointer;padding:12px}
.mob-home-btn{float:left;background:none;border:none;color:var(--ink2);font-size:.8rem;cursor:pointer;padding:12px}
@media(max-width:700px){
  .sidebar{display:none}.mob-menu-btn{display:block}
  .mob-overlay,.mob-drawer{display:block}
  .main-area{padding:16px}
  .hdr-stats .stat:not(:last-child){display:none}
}
</style>
</head>

</header>
<div class="layout">

      <div id="node-content"></div>

  </main>
</div>
<div class="toast" id="toast"></div>
<script>
const CHAPTERS=[{
id:'ch1',
title:'🌟 Chapter 1: Gupta Dynasty',
nodes:[{
id:'g1',
title:'Gupta Dynasty — Golden Age',
xp:150,
type:'regular',
seqIdx:0,
learn:'<h2 class="sec-head">🌟 Gupta Dynasty — Golden Age (250–550 AD)</h2><p>Called <b>Golden Age of India</b> — peak of art, science, literature, philosophy. Founders were <b>Vaishya</b> clan (NOT Kshatriya). Capital: <b>Pataliputra</b>; 2nd capital Ujjain under Chandragupta II. Religion: <b>Vaishnavism</b> (tolerant of all).</p><h3 class="sub-head">All Gupta Rulers</h3><table class=""><thead><tr><th>Ruler</th><th>Period</th><th>Title</th><th>Key Achievement</th></tr></thead><tbody><tr><td>Sri Gupta</td><td>240–280 AD</td><td>Maharaja</td><td>Founder; Vaishya clan</td></tr><tr><td>Ghatotakacha</td><td>281–319 AD</td><td>Maharaja</td><td>Son of Sri Gupta</td></tr><tr><td>Chandragupta I</td><td>319–335 AD</td><td>Maharajadhiraj</td><td>Real founder; married Lichchavi princess; Gupta Era begins</td></tr><tr><td>Samudragupta</td><td>335–375 AD</td><td>Kaviraj, Vikramanka</td><td>Napoleon of India; Prayag Prasasti by Harisena</td></tr><tr><td>Chandragupta II</td><td>376–415 AD</td><td>Vikramaditya</td><td>Defeated Shakas; Navaratnas; Fa-Hien visited; 1st silver coins</td></tr><tr><td>Kumaragupta I</td><td>415–455 AD</td><td>Shakraditya</td><td>Founded Nalanda University; fought Hunas</td></tr><tr><td>Skandagupta</td><td>455–467 AD</td><td>—</td><td>Defeated Hunas twice; repaired Sudarshana Lake</td></tr><tr><td>Vishnugupta</td><td>540–550 AD</td><td>—</td><td>Last known Gupta ruler</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: Gupta rulers were VAISHYA — NOT Kshatriya. Chandragupta I = real founder; Sri Gupta = nominal founder. Hiuen Tsang visited HARSHA — not Chandragupta II. Fa-Hien visited Chandragupta II.</div><div class="fact-box"><strong>SSC One-Liners</strong><ul><li>Chinese pilgrim during CG II = Fa-Hien (Fo-Kyo-Ki)</li><li>Chinese pilgrim during Harsha = Hiuen Tsang (Si-Yu-Ki)</li><li>Last Gupta ruler = Vishnugupta (540–550 AD)</li><li>Gupta Era begins = 319 AD (Chandragupta I)</li></ul></div>',
revision:['Gupta=Golden Age(250-550AD), Vaishya clan, capital Pataliputra(2nd Ujjain)','Order: Sri Gupta(founder)->Ghatotakacha->Chandragupta I(real founder,319AD)->Samudragupta->Chandragupta II->Kumaragupta I->Skandagupta->Vishnugupta(last)','Fa-Hien visited Chandragupta II | Hiuen Tsang visited Harsha (NOT Chandragupta II)','Gupta Era begins 319 AD (Chandragupta I)','Religion: Vaishnavism, but tolerant of all faiths'],
oneliners:['Gupta period (250-550 AD) is called the \'Golden Age of India\'','Gupta rulers belonged to the Vaishya clan, NOT Kshatriya','Pataliputra was the primary Gupta capital; Ujjain became the 2nd capital','Sri Gupta (240-280 AD) was the nominal founder of the dynasty','Chandragupta I (319-335 AD) is considered the real founder','The Gupta Era begins in 319 AD, the year of Chandragupta I\'s accession','Samudragupta is called the \'Napoleon of India\'','Chandragupta II defeated the Shakas and gained the title Vikramaditya','Kumaragupta I founded Nalanda University','Skandagupta defeated the Hunas twice and repaired the Sudarshana Lake','Vishnugupta (540-550 AD) was the last known Gupta ruler','Fa-Hien, a Chinese pilgrim, visited during Chandragupta II\'s reign'],
flashcards:[{q:'Who was the nominal founder vs the real founder?',a:'Sri Gupta = nominal founder; Chandragupta I = real founder'},{q:'When does the Gupta Era begin?',a:'319 AD, with Chandragupta I\'s accession'},{q:'What varna were the Gupta rulers?',a:'Vaishya, NOT Kshatriya'},{q:'Who is called the \'Napoleon of India\'?',a:'Samudragupta'},{q:'Which pilgrim visited Chandragupta II vs Harsha?',a:'Fa-Hien (Chandragupta II); Hiuen Tsang (Harsha)'},{q:'Who founded Nalanda University?',a:'Kumaragupta I'},{q:'Who was the last known Gupta ruler?',a:'Vishnugupta (540-550 AD)'},{q:'What was the Gupta 2nd capital, and under whom?',a:'Ujjain, under Chandragupta II'}],

o:['Chandragupta I',
'Sri Gupta',
'Samudragupta',
'Ghatotakacha'],
a:1,
e:'Sri Gupta (~240–280 AD) was the founder. Chandragupta I is the \'real founder\' who consolidated power.'}
,

q:'The Gupta rulers belonged to which varna (social class)?',

,

'Kannauj'],

,

o:['Hiuen Tsang',

,

,
{

,

,
{

{

title:'Chandragupta I & Samudragupta',

learn:'<h2 class="sec-head">⚔️ Chandragupta I & Samudragupta</h2><h3 class="sub-head">Chandragupta I (319–335 AD)</h3><p>Real founder of Gupta Empire. Son of Ghatotakacha. Enhanced power by marrying <b>Kumaradevi</b> (Lichchavi clan, Nepal). First to use title <b>Maharajadhiraj</b>. Ruled Bihar+UP+Bengal. <b>Gupta Era (319 AD)</b> begins.</p><h3 class="sub-head">Samudragupta — Napoleon of India</h3><table class=""><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody><tr><td>Title</td><td>Napoleon of India — given by historian V.A. Smith</td></tr><tr><td>Other titles</td><td>Kaviraj (king of poets), Vikramanka</td></tr><tr><td>Interest</td><td>Music — coins show him PLAYING VEENA</td></tr><tr><td>Campaigns</td><td>Allahabad Pillar (Prayag Prasasti by Harisena)</td></tr><tr><td>Also in</td><td>Eran Inscription (MP)</td></tr><tr><td>South India policy</td><td>Capture and RELEASE (political gesture)</td></tr><tr><td>North India policy</td><td>Capture and ANNEX</td></tr><tr><td>Yajna</td><td>Ashvamedha Yajna; gold coins of Yupa type</td></tr><tr><td>Granted</td><td>Buddhist king Meghavarman of Ceylon built monastery at Bodh Gaya</td></tr><tr><td>Court scholars</td><td>Harisena (poet) + Vasubandhu (philosopher)</td></tr></tbody></table><p>Succession: Samudragupta → <b>Ramgupta</b> (killed by CG II) → <b>Chandragupta II</b> (married Ramgupta\'s queen Dhruvadevi)</p><div class="trap-box">⚠️ EXAM TRAP: Napoleon of India = SAMUDRAGUPTA (not Chandragupta II). Prayag Prasasti written by HARISENA (not Samudragupta). South India rulers = released not annexed.</div>',

learn:'<h2 class="sec-head">🏹 Kumaragupta I & Skandagupta</h2><h3 class="sub-head">Kumaragupta I (415–455 AD)</h3><p>Title: <b>Shakraditya</b>. Founded <b>Nalanda University</b> (Bihar, near Rajgriha). Fought Hunas in final years. Issued large variety of gold coins.</p><h3 class="sub-head">Nalanda University Key Facts</h3><table class=""><thead><tr><th>Fact</th><th>Detail</th></tr></thead><tbody><tr><td>Founded by</td><td>Kumaragupta I (Gupta Dynasty)</td></tr><tr><td>Location</td><td>Bihar, near Rajgriha (Rajgir)</td></tr><tr><td>Speciality</td><td>Greatest Buddhist learning centre; 10,000+ students</td></tr><tr><td>Library</td><td>Dharmaganja (3 buildings: Ratnasagara, Ratnodadhi, Ratnaranjaka)</td></tr><tr><td>Famous visitors</td><td>Hiuen Tsang, I-tsing</td></tr><tr><td>Destroyed by</td><td>Bakhtiyar Khilji (~1193 AD)</td></tr></tbody></table><h3 class="sub-head">Skandagupta (455–467 AD)</h3><p>Defeated <b>Hunas twice</b> — saved India. Repaired <b>Sudarshana Lake</b> (Junagarh inscription by Parnadatta). Was a <b>Vaishnavite</b>. Last strong Gupta ruler. After death: local governors became hereditary feudal lords.</p><h3 class="sub-head">Sudarshana Lake Timeline</h3><table class=""><thead><tr><th>Repair</th><th>By Who</th><th>Dynasty</th></tr></thead><tbody><tr><td>1st built/repaired</td><td>Pushyagupta (governor)</td><td>Chandragupta Maurya</td></tr><tr><td>2nd repair</td><td>Rudradaman I</td><td>Kshatrapa/Saka</td></tr><tr><td>3rd repair</td><td>Skandagupta</td><td>Gupta</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: Nalanda founded by KUMARAGUPTA I — not Ashoka. Sudarshana Lake 3rd repair = Skandagupta (many say Ashoka). Last known Gupta = VISHNUGUPTA.</div>',

learn:'<h2 class="sec-head">🏛️ Gupta Administration & Culture</h2><h3 class="sub-head">Administrative Officials</h3><table class=""><thead><tr><th>Official</th><th>Role</th></tr></thead><tbody><tr><td>Mantri Parishad</td><td>Council of Ministers</td></tr><tr><td>Kumaramatya</td><td>Important administrative official</td></tr><tr><td>Vishayapati</td><td>Head of district (vishaya)</td></tr><tr><td>Gramika/Gramapati</td><td>Village head</td></tr><tr><td>Dandanayaka</td><td>Chief justice / military commander</td></tr><tr><td>Mahapratihara</td><td>Chief of palace guard</td></tr><tr><td>Sandhivigrahika</td><td>Foreign minister</td></tr></tbody></table><p>Provinces (Deshas) → Vishayas (districts) → Vithi (sub-districts) → Grama (village). Land revenue = <b>1/4 to 1/6</b> of produce (less than Mauryan 1/4–1/3).</p><h3 class="sub-head">Key Taxes</h3><table class=""><thead><tr><th>Tax</th><th>Meaning</th></tr></thead><tbody><tr><td>Bhaga</td><td>Share of produce — land revenue</td></tr><tr><td>Bhoga</td><td>Periodic supply of goods (flowers/fruits/firewood)</td></tr><tr><td>Kara</td><td>Additional household taxes</td></tr><tr><td>Hiranya</td><td>Cash tax by peasants</td></tr><tr><td>Sulka</td><td>Customs duty</td></tr></tbody></table><h3 class="sub-head">Temple Architecture — 5 Types</h3><table class=""><thead><tr><th>Type</th><th>Feature</th></tr></thead><tbody><tr><td>Flat-roofed</td><td>Earliest; Sanchi style</td></tr><tr><td>Shikhara (curvilinear)</td><td>Nagara style; later development</td></tr><tr><td>Apsidal</td><td>Semi-circular back; Buddhist influence</td></tr><tr><td>Circular plan</td><td>Rare type</td></tr><tr><td>Panchayatana</td><td>Star-shaped; 5 shrines (main + 4 corners)</td></tr></tbody></table><p><b>Dashavatara Temple</b> (Deogarh, UP) = classic Gupta temple. <b>Ajanta Caves 1,2,16,17</b> = finest Gupta paintings. Mathura school = red sandstone. Sarnath school = smooth finish + spiritual serenity.</p>',

learn:'<h2 class="sec-head">🗿 Three Classical Sculpture Schools</h2><table class=""><thead><tr><th>School</th><th>Period</th><th>Location</th><th>Patron</th><th>Material</th><th>Influence</th></tr></thead><tbody><tr><td>Gandhara</td><td>1st–5th c AD</td><td>NW India (Pakistan/Afghanistan)</td><td>Kushans</td><td>Grey schist</td><td>Greco-Roman (1st human Buddha)</td></tr><tr><td>Mathura</td><td>1st–5th c AD</td><td>Mathura (UP)</td><td>Kushans + Guptas</td><td>Red sandstone</td><td>Indigenous (no Greek influence)</td></tr><tr><td>Amravati</td><td>2nd–3rd c AD</td><td>Amravati (AP)</td><td>Satavahanas</td><td>White marble</td><td>Narrative panels; movement</td></tr></tbody></table><h3 class="sub-head">Gandhara School — Key Points</h3><p>Center: Purushapura (Peshawar) + Taxila. <b>FIRST to depict Buddha in human form</b>. Greek drapery, Roman curly hair on Buddha. Sites: Taxila, Hadda, Bamiyan (Afghanistan).</p><h3 class="sub-head">Mathura School — Key Points</h3><p>No Greek influence. Buddha with <b>ushnisha</b> (hair bun), transparent robes, bare-chested. Red sandstone. Also produced FIRST Jain Tirthankara images. Later influenced all Indian sculpture.</p><h3 class="sub-head">Amravati School — Key Points</h3><p>White marble medallion panels narrating Buddhist stories. Focus on movement and energy. Amravati Stupa = masterpiece (parts in Chennai Museum + British Museum). Influenced SE Asia & Sri Lanka Buddhist art.</p><div class="trap-box">⚠️ EXAM TRAP: Gandhara = grey schist (not marble or sandstone). Amravati = white marble (not sandstone). Mathura = red sandstone. Amravati patron = SATAVAHANAS (not Guptas or Kushans).</div>',

learn:'<h2 class="sec-head">🙏 Nayanmars & Alvars — South Indian Bhakti</h2><h3 class="sub-head">Nayanmars (Shaiva Bhakti Saints)</h3><table class=""><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Total</td><td>63 Nayanmars</td></tr><tr><td>Period</td><td>6th–9th century AD</td></tr><tr><td>Language</td><td>Tamil</td></tr><tr><td>Hymns to Shiva</td><td>Devaram (part of Panniru Thirumurai — 12 volumes)</td></tr></tbody></table><table class=""><thead><tr><th>Saint</th><th>Key Fact</th></tr></thead><tbody><tr><td>Appar (Thirunavukkarasar)</td><td>Converted MAHENDRAVARMAN I (Pallava) from Jainism to Shaivism ← SSC FREQUENT</td></tr><tr><td>Thirugnana Sambandar</td><td>Child saint; 4000+ hymns</td></tr><tr><td>Sundarar</td><td>Intimate devotion to Shiva</td></tr><tr><td>Manikkavachakar</td><td>Composed THIRUVASAGAM (most moving Shaiva text)</td></tr></tbody></table><h3 class="sub-head">Alvars (Vaishnava Bhakti Saints)</h3><table class=""><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Total</td><td>12 Alvars</td></tr><tr><td>Period</td><td>6th–9th century AD</td></tr><tr><td>Language</td><td>Tamil</td></tr><tr><td>Hymns to Vishnu</td><td>Divya Prabandham (Nalayira = 4000 divine compositions)</td></tr></tbody></table><table class=""><thead><tr><th>Alvar</th><th>Key Fact</th></tr></thead><tbody><tr><td>Nammalvar</td><td>Greatest Alvar; composed THIRUVAIMOZHI</td></tr><tr><td>Andal</td><td>ONLY WOMAN Alvar ← HIGH FREQ; composed TIRUPPAVAI (30 hymns); said to marry Vishnu at Srirangam</td></tr><tr><td>Periyalvar</td><td>Andal\'s father; composed Thiruppallandu</td></tr><tr><td>Kulashekhara Alvar</td><td>Chera king who became Alvar; composed Mukundamala</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: 63 Nayanmars (Shaiva) vs 12 Alvars (Vaishnava) — never confuse. Andal = ONLY WOMAN Alvar (NOT Nayanmar). Appar converted Mahendravarman I — Pallava king (Shaivism). Devaram = Nayanmars. Divya Prabandham = Alvars.</div>',

      const btn=document.createElement('button');
      btn.className='node-btn'+(unlocked?' ':' locked')+(passed?' passed':'')+(curNode&&curNode.id===node.id?' active':'');
      btn.innerHTML=`<span class="nb-icon">${node.type==='gold'?'🏹':node.type==='trap'?'⚠️':'📍'}</span><span class="nb-title">${node.title}</span><span class="nb-badge${node.type==='gold'?' gold-badge':''}">${node.xp}xp</span>`;
      if(unlocked)btn.onclick=()=>openNode(node);
      el.appendChild(btn);
    });
  });
}
function updateHeader(){
  const all=seqNodes().filter(n=>n.type!=='gold');
  const passed=all.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  const traps=seqNodes().filter(n=>n.type==='trap'&&S.mcq[n.id]&&S.mcq[n.id].passed).length;
  document.getElementById('h-xp').textContent=S.xp;
  document.getElementById('h-nd').textContent=passed;
  document.getElementById('h-tp').textContent=traps;
}
function updateDash(){
  const all=seqNodes().filter(n=>n.type!=='gold');
  const passed=all.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  const traps=seqNodes().filter(n=>n.type==='trap'&&S.mcq[n.id]&&S.mcq[n.id].passed).length;
  document.getElementById('dash-xp').textContent=S.xp;
  document.getElementById('dash-nd').textContent=passed+'/23';
  document.getElementById('dash-tp').textContent=traps;
  let faaQ=0,faaC=0;
  Object.values(S.faa).forEach(nf=>Object.values(nf).forEach(v=>{faaQ++;if(v)faaC++;}));
  document.getElementById('dash-faa').textContent=faaQ?Math.round(faaC/faaQ*100)+'%':'—';
  const dc=document.getElementById('dash-content');
  dc.innerHTML='';
  CHAPTERS.forEach(ch=>{
    const div=document.createElement('div');div.className='ch-card';
    div.innerHTML=`<h3>${ch.title}</h3><div class="ch-nodes">${ch.nodes.map(n=>{const u=isUnlocked(n);const p=S.mcq[n.id]&&S.mcq[n.id].passed;return`<span class="cn-pill${p?' passed':u?'':' locked'}" onclick="${u?'openNode(CHAPTERS.flatMap(c=>c.nodes).find(x=>x.id===\''+n.id+'\')); showNode()':''}"">${n.title}</span>`;}).join('')}</div>`;
    dc.appendChild(div);
  });
}
function showDash(){
  curNode=null;
  document.getElementById('dash-view').style.display='block';
  document.getElementById('node-view').style.display='none';
  buildSidebar('sidebar-inner');buildSidebar('mob-sidebar-inner');
  updateDash();updateHeader();
}
function openNode(node){
  if(!isUnlocked(node)){showToast('🔒 Complete the previous node first!');return;}
  curNode=node;curTab='learn';_sess={};
  track('node_opened',{node_id:node.id,node_title:node.title,node_type:node.type,xp:node.xp});
  document.getElementById('dash-view').style.display='none';
  document.getElementById('node-view').style.display='block';
  document.getElementById('nv-title').textContent=node.title;
  document.getElementById('nv-xp').textContent='+'+node.xp+' XP';
  buildSidebar('sidebar-inner');buildSidebar('mob-sidebar-inner');
  switchTab('learn');
}
function showNode(){
  document.getElementById('dash-view').style.display='none';
  document.getElementById('node-view').style.display='block';
}
function switchTab(tab){
  curTab=tab;
  document.getElementById('tab-learn').className='tab-btn'+(tab==='learn'?' active':'');
  document.getElementById('tab-flash').className='tab-btn'+(tab==='flash'?' active':'');
  document.getElementById('tab-test').className='tab-btn'+(tab==='test'?' active':'');
  document.getElementById('node-content').innerHTML=tab==='learn'?buildLearnPane(curNode):(tab==='flash'?buildFlashPane(curNode):buildTestPane(curNode));
  buildNodeNav();
}
function buildLearnPane(node){
  let h=node.learn?'<div class="learn-pane">'+node.learn+'</div>':'<p style="color:var(--ink2)">No content available.</p>';
  if(node.revision&&node.revision.length){
    h+='<div class="revision-box"><strong>⚡ 30 SECOND REVISION</strong><ul>';
    node.revision.forEach(r=>h+='<li>'+r+'</li>');
    h+='</ul></div>';
  }
  if(node.oneliners&&node.oneliners.length){
    h+='<div class="oneliner-box"><strong>🎯 20 EXAM ONE-LINERS</strong><ul>';
    node.oneliners.forEach(o=>h+='<li>'+o+'</li>');
    h+='</ul></div>';
  }
  return h;
}
function buildFlashPane(node){
  const cards=node.flashcards||[];
  if(!cards.length)return '<p style="color:var(--ink2);text-align:center;padding:2rem">No flashcards for this node yet.</p>';
  let h='<p class="flash-hint">TAP A CARD TO FLIP • '+cards.length+' CARDS</p><div class="flash-grid">';
  cards.forEach((c,i)=>{
    h+='<div class="flash-card" id="fc-'+node.id+'-'+i+'" onclick="this.classList.toggle(\'flipped\')">'+
      '<div class="flash-inner">'+
      '<div class="flash-front">'+c.q+'</div>'+
      '<div class="flash-back">'+c.a+'</div>'+
      '</div></div>';
  });
  h+='</div><div class="flash-reset-row"><button class="btn btn-gold" onclick="resetFlash(\''+node.id+'\')">↺ Reset All Cards</button></div>';
  return h;
}
function resetFlash(nid){
  document.querySelectorAll('[id^="fc-'+nid+'-"]').forEach(c=>c.classList.remove('flipped'));
}
function buildTestPane(node){
  if(node.type==='gold')return'<div class="learn-pane">'+node.learn+'<br><div style="text-align:center;padding:24px"><div style="font-size:2rem">🏹</div><p style="color:var(--gold);font-size:1rem;margin-top:8px">Revision Complete. Keep revising!</p></div></div>';
  const m=S.mcq[node.id]||{};
  let html='';
  if(m.passed){html+='<div class="score-bar"><div style="font-size:1.5rem">✅</div><div class="score-big">10/10</div><div class="score-sub">Node Passed! +'+node.xp+' XP earned</div></div>';}
  else if(m.lastScore!==undefined){html+='<div class="score-bar"><div style="font-size:1.5rem">📊</div><div class="score-big">'+m.lastScore+'/10</div><div class="score-sub">Last attempt — score locked. Try again!</div><button class="btn btn-gold" style="margin-top:12px" onclick="startFresh()">🔄 Retry</button></div>';}
  else{html+='<div class="test-info">Answer all 10 questions. Score 10/10 to unlock the next node. Your FIRST attempt accuracy (FAA) is permanently recorded.</div>';}
  node.mcqs.forEach((mcq,qi)=>{
    const sess=_sess[qi];const faa=S.faa[node.id]&&S.faa[node.id][qi]!==undefined;
    html+=`<div class="q-card" id="qc${qi}"><div class="q-num">Q${qi+1} of 10${faa?'<span class="faa-tag">FAA '+(S.faa[node.id][qi]?'✓':'✗')+'</span>':''}</div><div class="q-text">${mcq.q}</div>`;
    mcq.o.forEach((opt,oi)=>{
      let cls='opt-btn';let disabled='';let onclick=`onclick="answer(${qi},${oi})"`;
      if(sess!==undefined){disabled='disabled';if(oi===mcq.a)cls+=' correct';else if(oi===sess&&sess!==mcq.a)cls+=' wrong';}
      else if(m.passed||m.lastScore!==undefined){disabled='disabled';}
      html+=`<button class="${cls}" ${disabled} ${(m.passed||m.lastScore!==undefined)?'':onclick}>${String.fromCharCode(65+oi)}. ${opt}</button>`;
    });
    html+=`<div class="exp-box" id="exp${qi}" style="display:${sess!==undefined?'block':'none'}">${mcq.e}</div>`;
    html+='</div>';
  });
  if(!m.passed&&m.lastScore===undefined&&Object.keys(_sess).length===0){
    html+=`<div style="text-align:center;padding:12px"><button class="btn btn-gold" onclick="submitAll()">Submit All Answers</button></div>`;
  }
  return html;
}
function startFresh(){_sess={};const node=curNode;const m=S.mcq[node.id]||{};m.lastScore=undefined;S.mcq[node.id]=m;saveState();switchTab('test');}
function answer(qi,oi){
  if(_sess[qi]!==undefined)return;
  const node=curNode;const mcq=node.mcqs[qi];
  _sess[qi]=oi;
  if(!S.faa[node.id])S.faa[node.id]={};
  if(S.faa[node.id][qi]===undefined)S.faa[node.id][qi]=(oi===mcq.a);
  saveState();
  const qcard=document.getElementById('qc'+qi);
  qcard.querySelectorAll('.opt-btn').forEach((btn,idx)=>{
    btn.disabled=true;
    if(idx===mcq.a)btn.classList.add('correct');
    else if(idx===oi&&oi!==mcq.a)btn.classList.add('wrong');
  });
  const exp=document.getElementById('exp'+qi);if(exp)exp.style.display='block';
  if(Object.keys(_sess).length===node.mcqs.length)setTimeout(()=>finishAttempt(node),400);
}
function submitAll(){
  const node=curNode;
  node.mcqs.forEach((_,qi)=>{if(_sess[qi]===undefined)answer(qi,-1);});
}
function finishAttempt(node){
  const correct=node.mcqs.filter((_,qi)=>_sess[qi]===node.mcqs[qi].a).length;
  const passed=correct===node.mcqs.length;
  if(!S.mcq[node.id])S.mcq[node.id]={};
  const m=S.mcq[node.id];
  if(!m.best||correct>m.best)m.best=correct;
  m.attempts=(m.attempts||0)+1;
  if(m.attempts===1)m.faaPct=Math.round(correct/node.mcqs.length*100);
  const faaPct=m.faaPct||0;
  if(passed){
    if(!m.passed){S.xp+=node.xp;m.passed=true;track('node_completed',{node_id:node.id,node_title:node.title,xp_earned:node.xp,score:correct,total:node.mcqs.length,faa_pct:faaPct,attempts:m.attempts});}
    delete m.lastScore;
    showToast('🎉 Perfect! +'+node.xp+' XP!');
  }else{
    m.lastScore=correct;
    track('mcq_completed',{node_id:node.id,node_title:node.title,score:correct,total:node.mcqs.length,pct:Math.round(correct/node.mcqs.length*100),faa_pct:faaPct,passed:false,attempts:m.attempts});
    showToast('Score: '+correct+'/10. Need 10/10 to unlock next node.');
  }
  saveState();updateHeader();
  _sess={};
  switchTab('test');
}
function buildNodeNav(){
  const nav=document.getElementById('node-nav');
  const all=seqNodes();const idx=all.findIndex(n=>n.id===curNode.id);
  let html='<button class="btn btn-outline" onclick="showDash()">⌂ Dashboard</button>';
  if(idx>0){const prev=all[idx-1];html+=`<button class="btn btn-outline" onclick="openNode(seqNodes()[${idx-1}])">← ${prev.title.substring(0,20)}</button>`;}
  if(curTab==='learn'){html+=`<button class="btn btn-gold" onclick="switchTab('test')">📝 Take Test</button>`;}
  if(idx<all.length-1){const next=all[idx+1];if(isUnlocked(next)){html+=`<button class="btn btn-gold" onclick="openNode(seqNodes()[${idx+1}])">Next: ${next.title.substring(0,18)} →</button>`;}}
  nav.innerHTML=html;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function openDrawer(){document.getElementById('mob-drawer').classList.add('open');document.getElementById('mob-overlay').style.display='block';}
function closeDrawer(){document.getElementById('mob-drawer').classList.remove('open');document.getElementById('mob-overlay').style.display='none';}

/* ── METRICS ── */
let _mToken=null,_mSid=null;
function initMetrics(){
  // Supabase stores the session under a key like `sb-<ref>-auth-token`
  // in either localStorage or sessionStorage depending on the user's "keep me
  // signed in" choice (see centumania-mvp/src/lib/supabase/client.ts).
  try {
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  } catch(e){}
  _mSid='anc3-'+(Date.now().toString(36));
}
function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},
    body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})
  }).catch(()=>{});
}
initMetrics();track('material_opened',{material:'ancient_history_part3'});loadState();showDash();


/* ===== CentuMania metrics (injected — additive; module content unchanged) ===== */
(function(){

  function cmMat(){try{return localStorage.getItem('cm:material_id')||CM_DEFAULT;}catch(e){return CM_DEFAULT;}}
  function cmSid(){try{var id=sessionStorage.getItem('cm:analytics_session');if(!id){id=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():(Math.random().toString(36).slice(2)+Date.now().toString(36));sessionStorage.setItem('cm:analytics_session',id);}return id;}catch(e){return 'anon-'+Math.random().toString(36).slice(2);}}
  function cmInteract(itype,nodeId,meta){try{var t=cmToken();if(!t||!nodeId)return;fetch('/api/study/interaction',{method:'POST',keepalive:true,headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({interaction_type:itype,node_id:String(nodeId),material_id:cmMat(),session_id:cmSid(),timestamp:new Date().toISOString(),metadata:meta||{}})}).catch(function(){});}catch(e){}}
  function cmEvent(name,meta){try{var t=cmToken();if(!t)return;fetch('/api/events',{method:'POST',keepalive:true,headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({event_name:name,session_id:cmSid(),event_timestamp:new Date().toISOString(),metadata:Object.assign({material_id:cmMat()},meta||{})})}).catch(function(){});}catch(e){}}
  function cmBeacon(name,meta){try{var t=cmToken();if(!t)return;var p=JSON.stringify({_token:t,event_name:name,session_id:cmSid(),event_timestamp:new Date().toISOString(),metadata:Object.assign({material_id:cmMat()},meta||{})});if(navigator.sendBeacon)navigator.sendBeacon('/api/events/beacon',new Blob([p],{type:'application/json'}));}catch(e){}}
  document.addEventListener('visibilitychange',function(){if(document.hidden){CM_ACTIVE+=Date.now()-_cmVisT;cmBeacon('tab_switch',{seconds_active:Math.round(CM_ACTIVE/1000)});}else{_cmVisT=Date.now();}});
  window.addEventListener('pagehide',function(){if(!document.hidden)CM_ACTIVE+=Date.now()-_cmVisT;cmBeacon('session_end',{seconds_total:Math.round((Date.now()-CM_T0)/1000),seconds_active:Math.round(CM_ACTIVE/1000)});});
  cmEvent('material_opened',{});cmEvent('session_start',{});
  var _cmNodeT={},_cmLastQ=0;
  function _cmNode(id){try{if(typeof CHAPTERS!=='undefined')for(var c=0;c<CHAPTERS.length;c++){var ns=CHAPTERS[c].nodes||[];for(var n=0;n<ns.length;n++)if(ns[n].id===id)return ns[n];}}catch(e){}return null;}
  if(typeof openNode==='function'){var _o=openNode;openNode=function(id){_o(id);try{_cmNodeT[id]=Date.now();_cmLastQ=Date.now();var nd=_cmNode(id);cmInteract('node_opened',id,{total_questions:(nd&&nd.mcqs?nd.mcqs.length:0)});cmEvent('node_open',{node_id:id});}catch(e){}};}
  if(typeof finishAttempt==='function'){var _f=finishAttempt;finishAttempt=function(node){_f(node);try{var faa=(typeof S!=='undefined'&&S.faa&&S.faa[node.id])||{},total=(node.mcqs||[]).length,ok=0,k;for(k in faa)if(faa[k])ok++;var pct=total?Math.round(ok/total*100):0;cmInteract('node_completed',node.id,{total_questions:total,correct_first_attempt:ok,accuracy_pct:pct,time_spent_seconds:Math.round((Date.now()-(_cmNodeT[node.id]||Date.now()))/1000)});cmEvent('node_completed',{node_id:node.id,pct:pct});}catch(e){}};}
  try{new MutationObserver(function(ms){ms.forEach(function(m){var el=m.target;if(el&&el.classList&&el.classList.contains('mcq-card')&&el.classList.contains('done')&&!el._cmS){el._cmS=1;var qi=parseInt(el.dataset.qi),nid=el.dataset.nid;var fac=!!(typeof S!=='undefined'&&S.faa&&S.faa[nid]&&S.faa[nid][qi]===true);var now=Date.now(),dt=_cmLastQ?now-_cmLastQ:0;_cmLastQ=now;if(nid!=null){cmInteract('mcq_attempt',nid,{question_index:qi,is_correct:fac});cmEvent('answer',{node_id:nid,question_index:qi,is_correct:fac,time_spent_ms:dt});}}});}).observe(document.body,{subtree:true,attributes:true,attributeFilter:['class']});}catch(e){}
})();
