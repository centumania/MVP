<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1a14">
<title>Centumania — Number System</title>
<style>
/* ── TOKENS ──────────────────────────────────────────────────── */
:root{
  --bg:#0f1a14;--card:#162019;--card2:#1a2820;--border:#1e2e22;
  --text:#e8f0ea;--muted:#6b8c72;--sec:#8faa95;
  --green:#3ecf6e;--teal:#2dd4a0;--yellow:#d4a017;--red:#f76f6f;
  --blue:#5b8df8;--purple:#b57bee;--orange:#f59e42;--active:#1e3424;
  /* safe area — iOS notch / home bar */
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
}
/* ── RESET ───────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  height:100%;overscroll-behavior:none;
}
body{
  /* position:fixed+inset:0 is the most reliable iOS full-screen approach.
     It prevents rubber-band scroll and the address-bar resize flash. */
  position:fixed;inset:0;overflow:hidden;
  overscroll-behavior:none;
  background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:15px;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── SCREEN LAYER ────────────────────────────────────────────── */
/* Absolute (not fixed) because body is already fixed */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:opacity .22s ease,transform .22s ease;
  will-change:opacity,transform;
}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(10px);}

/* ── HOME ─────────────────────────────────────────────────────── */
.home-top{
  flex-shrink:0;
  background:var(--card);border-bottom:1px solid var(--border);
  padding:max(20px,var(--sat)) max(18px,var(--sar)) 14px max(18px,var(--sal));
}
.logo{font-size:1.4rem;font-weight:800;color:var(--green);letter-spacing:-.5px;}
.logo span{color:var(--text);}
.tagline{color:var(--muted);font-size:.72rem;font-family:'Courier New',monospace;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.xp-row{display:flex;justify-content:space-between;align-items:center;margin:10px 0 5px;}
.xp-lbl{font-size:.7rem;color:var(--muted);font-family:'Courier New',monospace;}
.xp-val{font-size:.8rem;color:var(--green);font-weight:700;font-family:'Courier New',monospace;}
.xp-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--teal));border-radius:3px;transition:width .5s ease;}
.lv-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--active);border:1px solid var(--green);border-radius:20px;font-size:.7rem;color:var(--green);font-weight:600;font-family:'Courier New',monospace;margin-top:8px;}

/* Scrollable areas: the KEY fix is flex:1 + min-height:0 + overflow-y:scroll.
   Without min-height:0, iOS won't constrain the flex child → no visible scroll. */
.worlds-scroll{
  flex:1;min-height:0;
  overflow-y:scroll;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding:14px max(14px,var(--sar)) max(80px,calc(80px + var(--sab))) max(14px,var(--sal));
}
.sec-hdr{font-size:.65rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:8px;}
.world-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px;margin-bottom:9px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;
  transition:transform .13s,background .13s;
  -webkit-appearance:none;
}
.world-card:active{transform:scale(.98);background:var(--card2);}
.world-card.done{border-color:var(--green);}
.w-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.w-info{flex:1;min-width:0;}
.w-name{font-weight:700;font-size:.92rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.w-desc{font-size:.74rem;color:var(--muted);}
.w-prog{margin-top:5px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.w-prog-fill{height:100%;border-radius:2px;transition:width .4s;}
.w-right{font-size:.68rem;color:var(--muted);font-family:'Courier New',monospace;flex-shrink:0;}

/* ── WORLD ────────────────────────────────────────────────────── */
.world-hdr{
  flex-shrink:0;
  padding:max(14px,var(--sat)) max(16px,var(--sar)) 12px max(16px,var(--sal));
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.back-btn{
  width:38px;height:38px;border-radius:10px;background:var(--active);border:1px solid var(--border);
  color:var(--text);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
  min-width:38px;min-height:38px;
}
.back-btn:active{background:var(--border);}
.stages-scroll{
  flex:1;min-height:0;
  overflow-y:scroll;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding:14px max(14px,var(--sar)) max(80px,calc(80px + var(--sab))) max(14px,var(--sal));
}
.stage-row{
  background:var(--card);border:1px solid var(--border);border-radius:11px;
  padding:13px 14px;margin-bottom:7px;
  display:flex;align-items:center;gap:11px;
  cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;
  transition:transform .13s;min-height:52px;
}
.stage-row:active{transform:scale(.98);}
.stage-row.locked{opacity:.38;pointer-events:none;}
.stage-row.done{border-color:var(--green);}
.st-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0;}
.st-info{flex:1;min-width:0;}
.st-name{font-weight:600;font-size:.88rem;}
.st-desc{font-size:.72rem;color:var(--muted);margin-top:2px;}

/* ── LEARN / TRAP ─────────────────────────────────────────────── */
.content-hdr{
  flex-shrink:0;
  padding:max(14px,var(--sat)) max(16px,var(--sar)) 12px max(16px,var(--sal));
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.content-body{
  flex:1;min-height:0;
  overflow-y:scroll;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding:14px max(14px,var(--sar)) 14px max(14px,var(--sal));
}
.content-footer{
  flex-shrink:0;
  padding:14px max(16px,var(--sar)) max(14px,calc(14px + var(--sab))) max(16px,var(--sal));
  background:var(--card);border-top:1px solid var(--border);
}
.learn-block{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:11px;}
.block-lbl{font-size:.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:9px;}
.fact-row{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}
.fact-row:last-child{border-bottom:none;padding-bottom:0;}
.fact-dot{color:var(--green);flex-shrink:0;margin-top:3px;font-size:.8rem;}
.fact-txt{font-size:.85rem;line-height:1.55;}
.shortcut-box{background:var(--active);border-radius:8px;padding:11px;}
.sc-line{font-size:.82rem;color:var(--teal);font-family:'Courier New',monospace;padding:2px 0;line-height:1.5;}
.video-slot{background:var(--border);border-radius:10px;padding:22px 14px;text-align:center;margin-bottom:11px;border:2px dashed var(--muted);}
.video-slot .v-icon{font-size:1.8rem;margin-bottom:6px;}
.video-slot .v-txt{color:var(--muted);font-size:.8rem;}
.video-slot .v-sub{color:var(--sec);font-size:.72rem;margin-top:3px;}
.sum-block{background:#1a1410;border:1px solid var(--yellow);border-radius:11px;padding:14px;margin-bottom:11px;}
.sum-lbl{font-size:.65rem;color:var(--yellow);letter-spacing:1px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:9px;}
.sum-type{background:var(--active);border-radius:8px;padding:10px 12px;margin-bottom:6px;}
.sum-type:last-child{margin-bottom:0;}
.sum-type-name{font-size:.78rem;font-weight:700;color:var(--orange);margin-bottom:4px;}
.sum-type-desc{font-size:.76rem;color:var(--sec);line-height:1.5;}
.sum-formula{font-family:'Courier New',monospace;color:var(--teal);font-size:.76rem;margin-top:4px;}
.trap-card{background:#1e1a14;border:2px solid var(--yellow);border-radius:12px;padding:16px;margin-bottom:10px;}
.trap-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.trap-hdr-txt{font-size:.75rem;color:var(--yellow);font-weight:700;text-transform:uppercase;font-family:'Courier New',monospace;letter-spacing:.4px;}
.trap-q{font-size:.9rem;font-weight:600;margin-bottom:12px;line-height:1.5;}
.trap-cmp{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.trap-wrong{background:#2e1a1a;border:1.5px solid var(--red);border-radius:9px;padding:9px 10px;text-align:center;}
.trap-right{background:#1a2e1e;border:1.5px solid var(--green);border-radius:9px;padding:9px 10px;text-align:center;}
.trap-badge{font-size:.62rem;text-transform:uppercase;letter-spacing:.4px;font-family:'Courier New',monospace;margin-bottom:3px;}
.trap-wrong .trap-badge{color:var(--red);}.trap-right .trap-badge{color:var(--green);}
.trap-val{font-size:.86rem;font-weight:700;}
.trap-wrong .trap-val{color:var(--red);}.trap-right .trap-val{color:var(--green);}
.trap-exp{font-size:.8rem;color:var(--sec);background:var(--active);border-radius:7px;padding:9px 11px;line-height:1.5;}

/* ── QUIZ ─────────────────────────────────────────────────────── */
.quiz-hdr{
  flex-shrink:0;
  padding:max(12px,var(--sat)) max(16px,var(--sar)) 10px max(16px,var(--sal));
  background:var(--card);border-bottom:1px solid var(--border);
}
.quiz-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.quiz-badge{font-size:.68rem;padding:3px 9px;border-radius:18px;font-family:'Courier New',monospace;font-weight:700;text-transform:uppercase;}
.quiz-ctr{font-size:.72rem;color:var(--muted);font-family:'Courier New',monospace;margin-left:auto;}
.quiz-prog-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.quiz-prog-fill{height:100%;border-radius:2px;transition:width .3s;}
.quiz-body{
  flex:1;min-height:0;
  overflow-y:scroll;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding:14px max(14px,var(--sar)) 14px max(14px,var(--sal));
}
.quiz-foot{
  flex-shrink:0;
  padding:12px max(16px,var(--sar)) max(12px,calc(12px + var(--sab))) max(16px,var(--sal));
  background:var(--card);border-top:1px solid var(--border);
}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:12px;}
.q-meta{font-size:.68rem;color:var(--muted);font-family:'Courier New',monospace;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px;}
.q-text{font-size:.95rem;font-weight:600;line-height:1.55;color:var(--text);}
.opts-list{display:flex;flex-direction:column;gap:7px;margin-top:12px;}
.opt-btn{
  background:var(--active);border:1.5px solid var(--border);border-radius:10px;
  padding:13px 13px;text-align:left;color:var(--text);font-size:.85rem;
  cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;
  display:flex;align-items:center;gap:9px;width:100%;min-height:48px;
  transition:all .1s;
  -webkit-appearance:none;
}
.opt-btn:active{transform:scale(.98);}
.opt-btn.sel{border-color:var(--blue);background:#1a243e;}
.opt-btn.ok{border-color:var(--green);background:#1a2e1e;}
.opt-btn.bad{border-color:var(--red);background:#2e1a1a;}
.opt-letter{width:26px;height:26px;border-radius:7px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;font-family:'Courier New',monospace;flex-shrink:0;}
.opt-btn.ok .opt-letter{background:var(--green);color:#0f1a14;}
.opt-btn.bad .opt-letter{background:var(--red);color:#fff;}
.fb-box{background:var(--card2);border-radius:9px;padding:11px 13px;margin-top:9px;display:none;}
.fb-box.show{display:block;}
.fb-correct{color:var(--green);font-weight:700;font-size:.85rem;margin-bottom:3px;}
.fb-wrong{color:var(--red);font-weight:700;font-size:.85rem;margin-bottom:3px;}
.fb-explain{color:var(--sec);font-size:.8rem;line-height:1.5;margin-top:4px;}
.fb-shortcut{color:var(--teal);font-size:.78rem;line-height:1.5;margin-top:5px;font-family:'Courier New',monospace;background:var(--active);border-radius:6px;padding:7px 9px;}
.xp-earned{color:var(--yellow);font-size:.76rem;font-weight:700;font-family:'Courier New',monospace;margin-top:4px;}
.btn-next{width:100%;padding:14px;background:var(--card2);color:var(--text);border:1.5px solid var(--border);border-radius:11px;font-size:.88rem;font-weight:600;cursor:pointer;display:none;touch-action:manipulation;min-height:48px;-webkit-appearance:none;}
.btn-next.show{display:block;}
.btn-next:active{background:var(--border);}

/* ── BUTTONS ─────────────────────────────────────────────────── */
.btn-primary{
  width:100%;padding:14px;background:var(--green);color:#0f1a14;border:none;border-radius:11px;
  font-size:.92rem;font-weight:700;cursor:pointer;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
  transition:transform .1s;min-height:48px;-webkit-appearance:none;
}
.btn-primary:active{transform:scale(.97);}
.btn-primary.yellow{background:var(--yellow);}

/* ── RESULT ───────────────────────────────────────────────────── */
#result{
  overflow-y:scroll;-webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  justify-content:center;align-items:center;
}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 20px;margin:16px;text-align:center;width:calc(100% - 32px);max-width:400px;}
.result-emoji{font-size:3rem;margin-bottom:10px;}
.result-title{font-size:1.3rem;font-weight:800;color:var(--green);margin-bottom:4px;}
.result-sub{color:var(--muted);font-size:.8rem;margin-bottom:18px;}
.result-xp{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:var(--active);border:2px solid var(--yellow);border-radius:28px;margin-bottom:18px;}
.result-xp-num{font-size:1.5rem;font-weight:800;color:var(--yellow);font-family:'Courier New',monospace;}
.result-xp-lbl{color:var(--muted);font-size:.78rem;}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.r-stat{background:var(--active);border-radius:9px;padding:11px 7px;text-align:center;}
.r-stat-num{font-size:1.2rem;font-weight:700;font-family:'Courier New',monospace;}
.r-stat-lbl{font-size:.65rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}
.btn-home{width:100%;padding:13px;background:var(--active);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.86rem;font-weight:600;cursor:pointer;margin-top:7px;touch-action:manipulation;min-height:48px;-webkit-appearance:none;}

/* ── TOAST ────────────────────────────────────────────────────── */
.toast{
  position:fixed;
  bottom:max(72px,calc(72px + var(--sab)));
  left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--card);border:1px solid var(--border);border-radius:18px;
  padding:7px 16px;font-size:.76rem;color:var(--text);
  opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── TAB BAR ─────────────────────────────────────────────────── */
.tab-bar{display:flex;background:var(--card2);border-radius:9px;padding:3px;margin-bottom:12px;}
.tab-btn{flex:1;padding:8px;border:none;background:none;color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;border-radius:7px;transition:all .13s;touch-action:manipulation;min-height:36px;}
.tab-btn.active{background:var(--active);color:var(--green);}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen" id="home">
  <div class="home-top">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="logo">Centu<span>mania</span></div>
        <div class="tagline">Number System · SSC / RRB / Banking</div>
      </div>
      <div class="lv-badge">⭐ <span id="lv-name">Beginner</span></div>
    </div>
    <div class="xp-row"><span class="xp-lbl">TOTAL XP</span><span class="xp-val" id="total-xp">0 XP</span></div>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>
  <div class="worlds-scroll">
    <div class="sec-hdr">8 Worlds · 7 Stages · 10 Practice Qs Each</div>
    <div id="worlds-list"></div>
  </div>
</div>

<!-- WORLD -->
<div class="screen hidden" id="world">
  <div class="world-hdr">
    <button class="back-btn" onclick="goHome()">←</button>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:700;font-size:.94rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="world-title"></div>
      <div style="font-size:.72rem;color:var(--muted);" id="world-sub"></div>
    </div>
  </div>
  <div class="stages-scroll" id="stages-list"></div>
</div>

<!-- LEARN -->
<div class="screen hidden" id="learn">
  <div class="content-hdr">
    <button class="back-btn" onclick="goWorld()">←</button>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="learn-title"></div>
      <div style="font-size:.7rem;color:var(--green);">Stage 1 · Learn the Concept</div>
    </div>
  </div>
  <div class="content-body" id="learn-body"></div>
  <div class="content-footer"><button class="btn-primary" onclick="afterLearn()">Start Recognition →</button></div>
</div>

<!-- TRAPS -->
<div class="screen hidden" id="traps">
  <div class="content-hdr">
    <button class="back-btn" onclick="goWorld()">←</button>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="trap-title"></div>
      <div style="font-size:.7rem;color:var(--orange);">⚠️ Trap Zone · Study These</div>
    </div>
  </div>
  <div class="content-body" id="trap-body"></div>
  <div class="content-footer"><button class="btn-primary yellow" onclick="startStage('trap_quiz')">Trap Quiz →</button></div>
</div>

<!-- QUIZ -->
<div class="screen hidden" id="quiz">
  <div class="quiz-hdr">
    <div class="quiz-meta">
      <div class="quiz-badge" id="quiz-badge">STAGE</div>
      <div class="quiz-ctr" id="quiz-ctr">Q 1/2</div>
    </div>
    <div class="quiz-prog-track"><div class="quiz-prog-fill" id="quiz-prog" style="width:0%"></div></div>
  </div>
  <div class="quiz-body" id="quiz-body"></div>
  <div class="quiz-foot"><button class="btn-next" id="next-btn" onclick="nextQ()">Next →</button></div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="result">
  <div class="result-card">
    <div class="result-emoji" id="r-emoji">🎯</div>
    <div class="result-title" id="r-title">Stage Complete!</div>
    <div class="result-sub" id="r-sub">Well done</div>
    <div class="result-xp"><span class="result-xp-num" id="r-xp">+0</span><span class="result-xp-lbl">XP Earned</span></div>
    <div class="result-stats">
      <div class="r-stat"><div class="r-stat-num" id="r-correct" style="color:var(--green)">0</div><div class="r-stat-lbl">Correct</div></div>
      <div class="r-stat"><div class="r-stat-num" id="r-wrong" style="color:var(--red)">0</div><div class="r-stat-lbl">Wrong</div></div>
      <div class="r-stat"><div class="r-stat-num" id="r-acc" style="color:var(--yellow)">0%</div><div class="r-stat-lbl">Accuracy</div></div>
    </div>

    id:"surds", title:"Surds & Simplification", emoji:"√", color:"#8faa95", desc:"Roots, indices & decimals",
    facts:["√12=2√3, √27=3√3, √48=4√3, √75=5√3","Cyclicity: 0.ā=a/9; 0.āb̄=ab/99; mixed=(all−non-repeat)/990","BODMAS: 'Of' comes BEFORE Division","x=a+b√c → 1/x=a-b√c → x+1/x=2a","NEVER: √(a+b)=√a+√b"],
    shortcuts:["Compare surds: convert using LCM of indices","∛3 vs √2: LCM=6 → 3^(2/6) vs 2^(3/6) = 9^(1/6) vs 8^(1/6) → ∛3 wins","Rationalize: a/√b = a√b/b"],
    sumTypes:[
      {name:"Simplifying Surds",desc:"Simplify √n to p√q form",formula:"Extract perfect square factors: √48=√(16×3)=4√3"},
      {name:"Comparing Surds",desc:"Determine which surd is larger",formula:"Convert to same index using LCM. Compare bases."},
      {name:"Rationalizing",desc:"Remove surd from denominator",formula:"Multiply by conjugate: 1/(a+b√c) × (a-b√c)/(a-b√c)"},
      {name:"Pure Recurring Decimal",desc:"Convert 0.āb̄c̄ to fraction",formula:"Pure recurring (n digits) = digits/99...9 (n nines)"},
      {name:"Mixed Recurring Decimal",desc:"Convert 0.a(bc) to fraction",formula:"(all digits − non-repeating part) / 990...0"}
    ],
    traps:[
      {q:"√(9+16) = √9+√16 = 3+4 = 7?",wrong:"TRUE",correct:"FALSE — √25=5",explain:"You can NEVER split √(a+b). √(9+16)=√25=5, NOT 3+4=7."},
      {q:"0.31212... = 312/999?",wrong:"312/999",correct:"(312-3)/990=103/330",explain:"Non-repeating digit 3 must be subtracted. Formula for mixed recurring: (all-non-repeat)/990."}
    ],
    questions:[
      {q:"First step to simplify √12+√27-√48?",opts:["Add directly","Simplify each surd","Rationalize","Find LCM"],ans:1,xp:10,explain:"Always simplify each surd first: √12=2√3, √27=3√3, √48=4√3.",shortcut:"Extract perfect squares: √12=2√3 etc."},
      {q:"√12+√27-√48 = ?",opts:["√3","2√3","3√3","0"],ans:0,xp:20,explain:"2√3+3√3-4√3=1√3=√3.",shortcut:"(2+3-4)√3=√3."},
      {q:"x=3+2√2. x+1/x = ?",opts:["4","5","6","8"],ans:2,xp:30,explain:"1/x=3-2√2. x+1/x=(3+2√2)+(3-2√2)=6.",shortcut:"x+1/x=2a where a=3. Answer=6."},
      {q:"0.3̄+0.4̄+0.5̄ = ?",opts:["1","4/3","12/9","Both b and c"],ans:3,xp:40,explain:"3/9+4/9+5/9=12/9=4/3. Both b and c are equal.",shortcut:"3/9+4/9+5/9=12/9=4/3."},
      {q:"Ascending order: ⁴√5, ³√4, √3",opts:["√3 < ³√4 < ⁴√5","⁴√5 < ³√4 < √3","³√4 < √3 < ⁴√5","√3 < ⁴√5 < ³√4"],ans:0,xp:50,explain:"LCM(4,3,2)=12. 5^3=125, 4^4=256, 3^6=729. All to 1/12: 125<256<729 → ⁴√5<³√4<√3. Wait: 3^6=729>4^4=256>5^3=125. So ascending: ⁴√5<³√4<√3. That's option A.",shortcut:"Convert to 12th root: 5^3=125, 4^4=256, 3^6=729. √3>³√4>⁴√5. Ascending: ⁴√5<³√4<√3."}
    ]
  }
];

const STAGES = [
  {key:"learn",name:"Learn",desc:"Facts + Shortcuts",icon:"📖",color:"#3ecf6e"},
  {key:"recognition",name:"Recognition",desc:"2 Qs · 10 XP each",icon:"👁",color:"#5b8df8"},
  {key:"shortcut",name:"Shortcut",desc:"2 Qs · 20 XP each",icon:"⚡",color:"#f7c948"},
  {key:"trap",name:"Trap Zone",desc:"Study the traps",icon:"⚠️",color:"#f59e42"},
  {key:"trap_quiz",name:"Trap Quiz",desc:"2 Qs · 30 XP each",icon:"🚨",color:"#f76f6f"},
  {key:"pyq",name:"PYQ Style",desc:"2 Qs · 40 XP each",icon:"📜",color:"#b57bee"},
  {key:"mastery",name:"Mastery",desc:"2 Qs · 50 XP each",icon:"🏆",color:"#d4a017"},
  {key:"practice",name:"Practice",desc:"10 Qs from JSON",icon:"🎯",color:"#3ecf6e"}
];

const STAGE_LABELS={recognition:"Recognition",shortcut:"Shortcut",trap_quiz:"Trap Quiz",pyq:"PYQ Style",mastery:"Mastery",practice:"Practice"};
const STAGE_COLORS={recognition:"#5b8df8",shortcut:"#f7c948",trap_quiz:"#f76f6f",pyq:"#b57bee",mastery:"#d4a017",practice:"#3ecf6e"};
const STAGE_XP={recognition:10,shortcut:20,trap_quiz:30,pyq:40,mastery:50,practice:20};

// ── STATE ──
let G={xp:0,done:{},world:null,stage:null,qIdx:0,qs:[],correct:0,wrong:0,sXP:0,answered:false};

function loadState(){
  try{const s=localStorage.getItem('centu_ns2');if(s){const d=JSON.parse(s);G.xp=d.xp||0;G.done=d.done||{};}}catch(e){}
}
function saveState(){
  try{localStorage.setItem('centu_ns2',JSON.stringify({xp:G.xp,done:G.done}));}catch(e){}
}
function getLevel(xp){
  if(xp<50)return{name:"Beginner",next:50};
  if(xp<200)return{name:"Explorer",next:200};
  if(xp<500)return{name:"Solver",next:500};
  if(xp<1000)return{name:"Strategist",next:1000};
  return{name:"Master",next:9999};
}
function isDone(wid,sk){return (G.done[wid]||[]).includes(sk);}
function isWorldDone(wid){return ['recognition','shortcut','trap_quiz','pyq','mastery','practice'].every(s=>isDone(wid,s));}
function markDone(wid,sk){if(!G.done[wid])G.done[wid]=[];if(!G.done[wid].includes(sk))G.done[wid].push(sk);saveState();}

// ── SCREEN ──
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id));}

// ── HOME ──
function renderHome(){
  const lv=getLevel(G.xp);
  document.getElementById('lv-name').textContent=lv.name;
  document.getElementById('total-xp').textContent=G.xp+' XP';
  document.getElementById('xp-fill').style.width=Math.min(100,Math.round(G.xp/lv.next*100))+'%';
  const list=document.getElementById('worlds-list');
  list.innerHTML=WORLDS.map((w,i)=>{
    const done=isWorldDone(w.id);
    const comp=(G.done[w.id]||[]).filter(s=>['recognition','shortcut','trap_quiz','pyq','mastery','practice'].includes(s)).length;
    const pct=Math.round(comp/6*100);
    return`<div class="world-card${done?' done':''}" onclick="openWorld(${i})">
      <div class="w-icon" style="background:${w.color}22;border:1.5px solid ${w.color}44">${w.emoji}</div>
      <div class="w-info">
        <div class="w-name">${w.title}</div>
        <div class="w-desc">${w.desc}</div>
        <div class="w-prog"><div class="w-prog-fill" style="width:${pct}%;background:${w.color}"></div></div>
      </div>
      <div class="w-right">${done?'✓':comp+'/6'}</div>
    </div>`;
  }).join('');
}
function goHome(){show('home');renderHome();}

// ── WORLD ──
function openWorld(idx){
  G.world=WORLDS[idx];
  document.getElementById('world-title').textContent=G.world.emoji+' '+G.world.title;
  document.getElementById('world-sub').textContent=G.world.desc+' · 5+10 Questions';
  renderStages();
  show('world');
}
function renderStages(){
  const w=G.world;
  const list=document.getElementById('stages-list');
  list.innerHTML='<div class="sec-hdr" style="padding:0 2px 8px">Learning Path</div>'+
  STAGES.map((s,i)=>{
    const done=isDone(w.id,s.key);
    const locked=i>0&&!isDone(w.id,STAGES[i-1].key)&&!(s.key==='trap_quiz'&&isDone(w.id,'trap'));
    return`<div class="stage-row${locked?' locked':''}${done?' done':''}" onclick="startStageDirect('${s.key}')">
      <div class="st-icon" style="background:${s.color}22;color:${s.color};border:1.5px solid ${s.color}44">${s.icon}</div>
      <div class="st-info"><div class="st-name">${s.name}</div><div class="st-desc">${s.desc}</div></div>
      ${done?'<span style="color:var(--green)">✓</span>':(locked?'<span style="color:var(--muted);font-size:.9rem">🔒</span>':'')}
    </div>`;
  }).join('');
}
function goWorld(){show('world');if(G.world)renderStages();}

function startStageDirect(key){
  if(key==='learn')openLearn();
  else if(key==='trap')openTraps();
  else startStage(key);
}

// ── LEARN ──
function openLearn(){
  const w=G.world;
  document.getElementById('learn-title').textContent=w.emoji+' '+w.title;
  const body=document.getElementById('learn-body');
  // Sum-type analysis section
  const sumHTML=w.sumTypes?`
    <div class="sum-block">
      <div class="sum-lbl">🔍 Sum-Type Analysis (Recognition Guide)</div>
      ${w.sumTypes.map(t=>`<div class="sum-type">
        <div class="sum-type-name">${t.name}</div>
        <div class="sum-type-desc">${t.desc}</div>
        <div class="sum-formula">${t.formula}</div>
      </div>`).join('')}
    </div>`:'';
  body.innerHTML=`
    <div class="video-slot"><div class="v-icon">📹</div><div class="v-txt">Short explanation video</div><div class="v-sub">Coming soon — paste YouTube link here</div></div>
    ${sumHTML}
    <div class="learn-block">
      <div class="block-lbl">Key Facts</div>
      ${w.facts.map(f=>`<div class="fact-row"><span class="fact-dot">▸</span><span class="fact-txt">${f}</span></div>`).join('')}
    </div>
    <div class="learn-block">
      <div class="block-lbl">Shortcuts</div>
      <div class="shortcut-box">${w.shortcuts.map(s=>`<div class="sc-line">${s}</div>`).join('')}</div>
    </div>`;
  markDone(w.id,'learn');
  show('learn');
}
function afterLearn(){startStage('recognition');}

// ── TRAPS ──
function openTraps(){
  const w=G.world;
  document.getElementById('trap-title').textContent='⚠️ '+w.title+' Traps';
  const body=document.getElementById('trap-body');
  body.innerHTML=(w.traps||[]).map(t=>`
    <div class="trap-card">
      <div class="trap-hdr"><span>⚠️</span><span class="trap-hdr-txt">Danger Zone</span></div>
      <div class="trap-q">${t.q}</div>
      <div class="trap-cmp">
        <div class="trap-wrong"><div class="trap-badge">❌ Wrong</div><div class="trap-val">${t.wrong}</div></div>
        <div class="trap-right"><div class="trap-badge">✓ Correct</div><div class="trap-val">${t.correct}</div></div>
      </div>
      <div class="trap-exp">${t.explain}</div>
    </div>`).join('');
  markDone(w.id,'trap');
  show('traps');
}

// ── QUIZ ──
function startStage(key){
  const w=G.world;
  let qs=[];
  
  if(key==='practice'){
    // Use JSON questions from PRACTICE_QS
    const pool=PRACTICE_QS[w.id]||[];
    qs=pool.map(q=>({...q,xp:20}));
  } else {
    // Use built-in questions filtered by level
    const lvMap={recognition:'recognition',shortcut:'shortcut',trap_quiz:'trap',pyq:'pyq',mastery:'mastery'};
    const lvl=lvMap[key]||key;
    qs=(w.questions||[]).filter(q=>q.level===lvl||!q.level);
    // If no level filtering, use questions by index
    if(!qs.length){
      const ranges={recognition:[0,1],shortcut:[2,3],trap_quiz:[2,3],pyq:[3,4],mastery:[4,5]};
      const r=ranges[key]||[0,2];
      qs=(w.questions||[]).slice(r[0],r[1]+1);
    }
    qs=qs.map(q=>({...q,xp:STAGE_XP[key]||20}));
  }
  
  if(!qs.length){toast('No questions for this stage');return;}
  G.stage=key;G.qs=qs;G.qIdx=0;G.correct=0;G.wrong=0;G.sXP=0;G.answered=false;
  renderQ();
  show('quiz');
}

function renderQ(){
  const q=G.qs[G.qIdx];
  const tot=G.qs.length;
  const col=STAGE_COLORS[G.stage]||'#3ecf6e';
  const lbl=STAGE_LABELS[G.stage]||'Quiz';
  
  const badge=document.getElementById('quiz-badge');
  badge.textContent=lbl;badge.style.background=col+'22';badge.style.color=col;badge.style.border='1px solid '+col+'44';
  document.getElementById('quiz-ctr').textContent='Q '+(G.qIdx+1)+'/'+tot;
  document.getElementById('quiz-prog').style.width=Math.round(G.qIdx/tot*100)+'%';
  document.getElementById('quiz-prog').style.background=col;
  
  const letters=['A','B','C','D'];
  document.getElementById('quiz-body').innerHTML=`
    <div class="q-card">
      <div class="q-meta">${lbl} · Q${G.qIdx+1} of ${tot} · +${q.xp} XP</div>
      <div class="q-text">${(q.q||'Question').replace(/\n/g,' ')}</div>
      <div class="opts-list">
        ${(q.opts||[]).map((o,i)=>`<button class="opt-btn" id="opt-${i}" onclick="selectAns(${i})">
          <span class="opt-letter">${letters[i]}</span><span>${o}</span>
        </button>`).join('')}
      </div>
      <div class="fb-box" id="fb"></div>
    </div>`;
  document.getElementById('next-btn').classList.remove('show');
  G.answered=false;
}

function selectAns(idx){
  if(G.answered)return;
  G.answered=true;
  const q=G.qs[G.qIdx];
  const ok=idx===q.ans;
  for(let i=0;i<4;i++){
    const b=document.getElementById('opt-'+i);
    if(!b)continue;
    if(i===q.ans)b.classList.add('ok');
    else if(i===idx&&!ok)b.classList.add('bad');
    b.style.pointerEvents='none';
  }
  const fb=document.getElementById('fb');
  fb.classList.add('show');
  if(ok){
    G.correct++;G.sXP+=q.xp;G.xp+=q.xp;saveState();
    fb.innerHTML=`<div class="fb-correct">✓ Correct!</div><div class="xp-earned">+${q.xp} XP</div>
      ${q.explain?`<div class="fb-explain">${q.explain}</div>`:''}
      ${q.shortcut?`<div class="fb-shortcut">💡 ${q.shortcut}</div>`:''}`;
    toast('+'+q.xp+' XP 🎯');
  } else {
    G.wrong++;
    fb.innerHTML=`<div class="fb-wrong">✗ Incorrect</div>
      <div class="fb-explain">Correct: <strong>${(q.opts||[])[q.ans]||''}</strong></div>
      ${q.explain?`<div class="fb-explain">${q.explain}</div>`:''}
      ${q.shortcut?`<div class="fb-shortcut">💡 ${q.shortcut}</div>`:''}`;
  }
  const isLast=G.qIdx>=G.qs.length-1;
  const nb=document.getElementById('next-btn');
  nb.textContent=isLast?'See Results →':'Next Question →';
  nb.classList.add('show');
}

function nextQ(){
  G.qIdx++;
  if(G.qIdx>=G.qs.length)showResult();
  else renderQ();
}

function showResult(){
  markDone(G.world.id,G.stage);
  const tot=G.qs.length;
  const acc=Math.round(G.correct/tot*100);
  const emojis={recognition:'👁️',shortcut:'⚡',trap_quiz:'⚠️',pyq:'📜',mastery:'🏆',practice:'🎯'};
  document.getElementById('r-emoji').textContent=emojis[G.stage]||'🎯';
  document.getElementById('r-title').textContent=(STAGE_LABELS[G.stage]||'Stage')+' Complete!';
  document.getElementById('r-sub').textContent=G.world.title+' · '+acc+'% accuracy';
  document.getElementById('r-xp').textContent='+'+G.sXP;
  document.getElementById('r-correct').textContent=G.correct;
  document.getElementById('r-wrong').textContent=G.wrong;
  document.getElementById('r-acc').textContent=acc+'%';
  // next stage
  const order=['recognition','shortcut','trap','trap_quiz','pyq','mastery','practice'];
  const curIdx=order.indexOf(G.stage);
  const nxt=order[curIdx+1];
  const btn=document.getElementById('r-continue');
  if(nxt){
    const nm=STAGE_LABELS[nxt]||nxt;
    btn.textContent='Next: '+(nxt==='trap'?'Trap Zone →':nm+' →');
  } else {btn.textContent='🏆 World Complete!';}
  btn.onclick=goWorld;
  show('result');renderHome();
}

// ── TOAST ──
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1500);}

// ── INIT ── (robust for all iOS/Android contexts)
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',function(){try{loadState();renderHome();show('home');}catch(e){document.getElementById('worlds-list').innerHTML='<p style="color:#f76f6f;padding:16px;font-size:.8rem">Error loading content. Please reload.</p>';console.error(e);}});}else{try{loadState();renderHome();show('home');}catch(e){console.error(e);}}
</script>
