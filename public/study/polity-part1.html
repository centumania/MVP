<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Indian Polity — Part 1 | CentuMania</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A1628;--bg2:#071020;--panel:#0F2147;--panel2:#112240;--line:#1a3060;
  --ink:#d4d8e8;--ink2:#8898b8;--ink3:#4a5880;
  --gold:#FF8F00;--gold2:#1565C0;--gold-glow:rgba(255,143,0,.15);
  --amber:#FFA726;--gold-bg:rgba(255,143,0,.08);
  --red:#f87171;--red-bg:rgba(248,113,113,.10);
  --blue:#60a5fa;--green:#4ade80;
  --mono:"JetBrains Mono",monospace;--serif:"Instrument Serif",serif;--sans:"DM Sans",sans-serif;
  --nav:56px;--aside:268px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg2);color:var(--ink);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
/* NAV */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--nav);background:var(--bg);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
.topbar .logo{font-family:var(--serif);font-size:1.2rem;color:var(--gold)}
.topbar .title{flex:1;font-size:.85rem;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .xp-badge{font-family:var(--mono);font-size:.78rem;color:var(--gold);background:var(--gold-bg);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,143,0,.25)}
.topbar .pct-badge{font-family:var(--mono);font-size:.78rem;color:var(--blue);background:rgba(96,165,250,.1);padding:4px 10px;border-radius:20px;border:1px solid rgba(96,165,250,.2)}
#menu-btn{display:none;background:none;border:none;color:var(--ink);font-size:1.4rem;cursor:pointer;padding:4px 8px}
/* LAYOUT */
.layout{display:flex;margin-top:var(--nav);min-height:calc(100vh - var(--nav))}
/* SIDEBAR */
aside{width:var(--aside);background:var(--bg);border-right:1px solid var(--line);position:fixed;top:var(--nav);bottom:0;overflow-y:auto;z-index:90;transition:transform .25s}
aside::-webkit-scrollbar{width:4px}
aside::-webkit-scrollbar-thumb{background:var(--line)}
.aside-inner{padding:12px 0 40px}
.ch-header{padding:10px 16px 4px;font-size:.68rem;font-weight:700;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase}
.node-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;font-size:.82rem}
.node-item:hover{background:rgba(255,143,0,.06);border-left-color:rgba(255,143,0,.3)}
.node-item.active{background:var(--gold-bg);border-left-color:var(--gold);color:var(--gold)}
.node-item.locked{opacity:.45;cursor:not-allowed}
.node-item.passed .ni-icon{color:var(--green)}
.node-item.gold-node{color:var(--gold)}
.ni-icon{font-size:.9rem;min-width:18px;text-align:center}
.ni-text{flex:1;line-height:1.3}
.ni-xp{font-family:var(--mono);font-size:.68rem;color:var(--ink3)}
.dash-btn{margin:12px 16px;padding:8px 12px;background:rgba(255,143,0,.08);border:1px solid rgba(255,143,0,.2);border-radius:8px;color:var(--gold);font-size:.8rem;cursor:pointer;width:calc(100% - 32px);text-align:left}
.dash-btn:hover{background:rgba(255,143,0,.15)}
/* MAIN */
main{margin-left:var(--aside);flex:1;padding:0 0 80px}
/* NODE CONTENT */
.nc{max-width:860px;margin:0 auto;padding:24px 20px}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--panel);border-radius:10px;padding:4px}
.tab{flex:1;padding:8px 4px;background:none;border:none;color:var(--ink2);font-size:.8rem;font-weight:600;letter-spacing:.05em;cursor:pointer;border-radius:8px;transition:all .15s;font-family:var(--sans)}
.tab.active{background:var(--panel2);color:var(--gold);border:1px solid rgba(255,143,0,.3)}
.tab-pane{display:none}
.tab-pane.active{display:block}
/* NODE HEADER */
.node-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.node-title{font-family:var(--serif);font-size:1.5rem;margin-bottom:6px}
.node-meta{font-size:.78rem;color:var(--ink2);display:flex;gap:12px;flex-wrap:wrap}
.node-meta span{display:flex;align-items:center;gap:4px}
/* SECTION CARDS */
.sec{background:var(--panel);border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid var(--line)}
.sec-title{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.facts-list{list-style:none}
.facts-list li{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.88rem;line-height:1.5;color:var(--ink)}
.facts-list li:last-child{border-bottom:none}
.facts-list li::before{content:"›";color:var(--gold);margin-right:8px}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:4px}
.tbl th{background:rgba(255,143,0,.1);color:var(--gold);padding:8px 10px;text-align:left;border:1px solid var(--line);font-weight:600}
.tbl td{padding:7px 10px;border:1px solid var(--line);color:var(--ink);vertical-align:top}
.tbl tr:nth-child(even) td{background:rgba(255,255,255,.02)}
/* MNEMONICS */
.mnemonic{background:rgba(255,143,0,.06);border:1px solid rgba(255,143,0,.2);border-radius:10px;padding:12px 16px;margin-bottom:14px}
.mnemonic .mn-h{font-weight:700;color:var(--gold);font-size:.82rem;margin-bottom:6px}
.mnemonic .mn-b{font-size:.88rem;line-height:1.6;color:var(--ink)}
/* TRAPS */
.traps-sec{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);border-radius:12px;padding:16px;margin-bottom:14px}
.traps-sec .sec-title{color:var(--red)}
.trap-item{padding:5px 0;border-bottom:1px solid rgba(248,113,113,.08);font-size:.85rem;color:var(--ink)}
.trap-item:last-child{border-bottom:none}
.trap-item::before{content:"⚠";color:var(--red);margin-right:8px}
/* REVISION */
.revision-sec{background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.2);border-radius:12px;padding:16px;margin-bottom:14px}
.revision-sec .sec-title{color:var(--blue)}
.rev-item{padding:4px 0;font-size:.85rem;color:var(--ink);border-bottom:1px solid rgba(96,165,250,.06)}
.rev-item:last-child{border-bottom:none}
.rev-item::before{content:"⚡";margin-right:8px}
/* ONE-LINERS */
.oneliners-sec{background:rgba(74,222,128,.05);border:1px solid rgba(74,222,128,.15);border-radius:12px;padding:16px;margin-bottom:14px}
.oneliners-sec .sec-title{color:var(--green)}
.ol-item{padding:4px 0;font-size:.83rem;color:var(--ink);border-bottom:1px solid rgba(74,222,128,.05)}
.ol-item:last-child{border-bottom:none}
.ol-item::before{content:"🎯 ";margin-right:4px}
/* FLASH CARDS */
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:4px}
.flash-card{perspective:800px;cursor:pointer;height:140px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center;text-align:center}
.flash-front{background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-size:.85rem;line-height:1.4}
.flash-back{background:rgba(255,143,0,.1);border:1px solid rgba(255,143,0,.3);color:var(--gold);font-size:.82rem;line-height:1.4;transform:rotateY(180deg)}
.flash-hint{text-align:center;font-size:.72rem;color:var(--ink3);margin-bottom:10px}
/* MCQ */
.mcq-wrap{display:flex;flex-direction:column;gap:16px}
.mcq-card{background:var(--panel);border-radius:12px;padding:16px;border:1px solid var(--line)}
.mcq-q{font-size:.9rem;font-weight:500;margin-bottom:12px;line-height:1.5}
.mcq-opts{display:flex;flex-direction:column;gap:7px}
.opt{padding:9px 14px;border-radius:8px;border:1px solid var(--line);cursor:pointer;font-size:.85rem;transition:all .15s;line-height:1.4}
.opt:hover:not(.answered){background:rgba(255,143,0,.08);border-color:rgba(255,143,0,.3)}
.opt.correct{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.opt.skip{background:rgba(74,222,128,.06);border-color:rgba(74,222,128,.3);color:var(--green)}
.mcq-exp{margin-top:10px;font-size:.8rem;color:var(--ink2);line-height:1.5;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:6px;display:none}
.mcq-exp.show{display:block}
.submit-row{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;font-family:var(--sans);transition:all .15s}
.btn-primary{background:var(--gold);color:#000}
.btn-primary:hover{background:var(--amber)}
.btn-secondary{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}
/* RESULT BANNER */
.result-banner{padding:16px;border-radius:10px;text-align:center;margin-top:16px;font-weight:600;display:none}
.result-banner.ok{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.result-banner.warn{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.3)}
/* NODE NAV */
.node-nav{display:flex;gap:8px;margin-top:24px;padding-top:16px;border-top:1px solid var(--line)}
.node-nav .btn{flex:1;text-align:center;font-size:.8rem}
/* DASHBOARD */
.dash{padding:24px 20px;max-width:860px;margin:0 auto}
.dash-title{font-family:var(--serif);font-size:1.6rem;margin-bottom:4px}
.dash-sub{color:var(--ink2);font-size:.85rem;margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--panel);border-radius:12px;padding:16px;border:1px solid var(--line);text-align:center}
.stat-val{font-family:var(--mono);font-size:1.4rem;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:.72rem;color:var(--ink2);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.progress-bar{background:var(--panel2);border-radius:100px;height:8px;overflow:hidden;margin:4px 0 12px}
.progress-fill{background:linear-gradient(90deg,var(--gold),var(--amber));height:100%;border-radius:100px;transition:width .5s}
.node-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.ng-card{background:var(--panel);border-radius:10px;padding:14px;border:1px solid var(--line);cursor:pointer;transition:all .15s}
.ng-card:hover:not(.ng-locked){border-color:rgba(255,143,0,.4);transform:translateY(-2px)}
.ng-card.ng-locked{opacity:.5;cursor:not-allowed}
.ng-card.ng-passed{border-color:rgba(74,222,128,.3)}
.ng-card .ng-icon{font-size:1.2rem;margin-bottom:6px}
.ng-card .ng-title{font-size:.82rem;font-weight:600;margin-bottom:4px}
.ng-card .ng-xp{font-family:var(--mono);font-size:.7rem;color:var(--ink3)}
.ng-card .ng-status{font-size:.7rem;color:var(--green);margin-top:4px}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 20px;font-size:.85rem;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.4);color:var(--green)}
.toast.warn{border-color:rgba(248,113,113,.4);color:var(--red)}
/* GOLD NODE */
.gold-header{background:linear-gradient(135deg,rgba(255,143,0,.15),rgba(255,167,38,.08));border:1px solid rgba(255,143,0,.3);border-radius:14px;padding:20px;margin-bottom:20px;text-align:center}
.gold-header h2{font-family:var(--serif);font-size:1.6rem;color:var(--gold);margin-bottom:4px}
.gold-header p{font-size:.85rem;color:var(--ink2)}
/* MASTER REVISION */
.master-sec{background:linear-gradient(135deg,rgba(255,143,0,.08),rgba(21,101,192,.08));border:1px solid rgba(255,143,0,.25);border-radius:14px;padding:18px;margin-bottom:16px}
.master-sec .sec-title{color:var(--gold);font-size:.75rem}
/* LOCKED overlay */
.locked-overlay{text-align:center;padding:60px 20px;color:var(--ink2)}
.locked-overlay .lock-icon{font-size:3rem;margin-bottom:16px;opacity:.5}
.locked-overlay h3{font-size:1.1rem;margin-bottom:8px;color:var(--ink)}
/* MOBILE */
@media(max-width:768px){
  #menu-btn{display:block}
  aside{transform:translateX(-100%)}
  aside.open{transform:translateX(0)}
  .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:89}
  .drawer-overlay.open{display:block}
  main{margin-left:0}
  .flash-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<script>
// ── METRICS ────────────────────────────────────────────────────────────────
const SK='centumania_pol1_v1';
let _mToken=null,_mSid=null;
function initMetrics(){
  try{
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;break;
        }
      }
    }
  }catch(e){}
  _mSid='pol1-'+(Date.now().toString(36));
}
function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},
    body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})
  }).catch(()=>{});
}

// ── STATE ──────────────────────────────────────────────────────────────────
let S={xp:0,mcq:{},faa:{},tabTime:{}};
function loadS(){try{const d=JSON.parse(localStorage.getItem(SK)||'{}');S={xp:0,mcq:{},faa:{},tabTime:{},...d};}catch(e){}}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

  {q:"The Preamble of India is based on:",o:["American Declaration of Independence","Cabinet Mission Plan 1946","Objectives Resolution moved by Nehru","French Declaration of Rights"],a:2,e:"The Indian Preamble is based on the Objectives Resolution moved by Nehru on 13 Dec 1946 and adopted on 22 Jan 1947."},
  {q:"Which country was first to have a Preamble to its Constitution?",o:["France","India","USA","Australia"],a:2,e:"The United States of America was the first country to have a Preamble to its Constitution."},
  {q:"The Preamble declares India to be a REPUBLIC. This means:",o:["India has a prime minister","India is a welfare state","The head of state is elected, not hereditary","India has a federal structure"],a:2,e:"REPUBLIC means the head of state (President) is elected for a fixed term, unlike a monarchy where the position is hereditary."},
  {q:"'SECULAR' as added to the Preamble means:",o:["India has a national religion","The state has no religion of its own","Only Hinduism is practiced","Religion is banned in public life"],a:1,e:"'Secular' means India has no state religion. The state gives equal respect and protection to all religions."},
  {q:"The Preamble is:",o:["Justiciable and enforceable by courts","Non-justiciable but part of Basic Structure","Neither justiciable nor part of Constitution","Justiciable only in SC"],a:1,e:"Preamble is Non-Justiciable (courts cannot enforce it directly) but it IS part of the Constitution and part of the Basic Structure."},
  {q:"What does 'FRATERNITY' in the Preamble assure?",o:["Economic equality","Reservation for minorities","Dignity of individual and unity/integrity of nation","Free speech and expression"],a:2,e:"FRATERNITY assures dignity of the individual and unity and integrity of the nation."}
 ]
}
]},

{id:"fundamental_rights",title:"Fundamental Rights (Part III)",xp:60,type:"regular",seqIdx:5,
 facts:[
  "Part III (Art 12-35) — called 'Magna Carta of India'",
  "Borrowed from US Bill of Rights",
  "Originally 7 Fundamental Rights → after 44th CAA 1978 → 6 FRs (Right to Property removed from FRs, made legal right under Art 300A)",
  "6 Fundamental Rights: (1) Right to Equality (14-18), (2) Right to Freedom (19-22), (3) Right against Exploitation (23-24), (4) Right to Freedom of Religion (25-28), (5) Cultural & Educational Rights (29-30), (6) Right to Constitutional Remedies (32)",
  "Art 12: Definition of State (includes Govt, Parliament, state legislatures, all local/other authorities)",
  "Art 13: Laws inconsistent with FRs are void",
  "Art 14: Equality before law (available to all persons)",
  "Art 15: Prohibition of discrimination on grounds of religion, race, caste, sex, place of birth",
  "Art 16: Equality of opportunity in public employment",
  "Art 17: Abolition of Untouchability",
  "Art 18: Abolition of Titles (except military/academic)",
  "Art 19: 6 freedoms (originally 7 — freedom to acquire/hold/dispose property removed by 44th CAA)",
  "Art 19 freedoms: Speech & Expression, Assembly (unarmed), Association, Movement, Residence, Profession",
  "Art 20: Protection against arbitrary conviction (ex-post facto, double jeopardy, self-incrimination)",
  "Art 21: Right to Life and Personal Liberty — most expansive FR",
  "Art 21A: Right to Education (6-14 years) — added by 86th CAA 2002",
  "Art 22: Protection against arbitrary arrest (right to know grounds, lawyer, magistrate within 24 hours)",
  "Art 23: Prohibition of traffic in human beings and forced labor",
  "Art 24: Prohibition of child labor below 14 years in hazardous industries",
  "Art 25-28: Right to Freedom of Religion",
  "Art 29-30: Cultural and Educational Rights (minorities)",
  "Art 32: Right to Constitutional Remedies — 'Heart and Soul of Constitution' (Dr. Ambedkar)",
  "5 types of Writs: Habeas Corpus (produce body), Mandamus (command to do), Prohibition (lower court stop), Certiorari (quash order), Quo Warranto (by what authority)",
  "SC (Art 32) can issue writs ONLY for FR violations | HC (Art 226) can issue writs for FR + other purposes",
  "Art 33: Parliament can restrict FRs for armed forces",
  "Art 34: Restriction of FRs during Martial Law",
  "Art 35: Parliament's power to legislate on FRs"
 ],
 table:{h:["FR","Articles","Key Right"],r:[
  ["Right to Equality","14-18","Equality, no discrimination, no untouchability, no titles"],
  ["Right to Freedom","19-22","6 freedoms, life & liberty, protection from arrest"],
  ["Right against Exploitation","23-24","No forced labor, no child labor (<14 hazardous)"],
  ["Right to Religion","25-28","Freedom of conscience, manage religious affairs"],
  ["Cultural & Educational","29-30","Minority rights to culture, language, establish institutions"],
  ["Right to Const. Remedies","32","Writs: HC,MC,P,C,QW — Heart & Soul (Ambedkar)"]
 ]},
 mn:{h:"🧠 MEMORY HOOK",b:"'EF-ER-CE' = Equality, Freedom, Exploitation, Religion, Cultural/Educational = 5 categories + Constitutional Remedies = 6 total. '5 WRITS = HM-PC-Q': Habeas Corpus, Mandamus, Prohibition, Certiorari, Quo Warranto. 'Art 32 = Heart & Soul' — Ambedkar."},

 oneliners:[
  "Fundamental Rights are in Part III (Art 12-35) — 'Magna Carta of India'",
  "Borrowed from US Bill of Rights",
  "Originally 7 FRs → Now 6 after 44th CAA 1978 removed Right to Property",
  "Right to Property is now a legal right under Art 300A",
  "Art 14: Equality before law — available to ALL persons (not just citizens)",
  "Art 17: Abolition of Untouchability — enforceable through Protection of Civil Rights Act",
  "Art 19: 6 freedoms (speech, assembly, association, movement, residence, profession)",
  "Art 21: Right to Life is the most expansive FR — includes many implied rights",
  "Art 21A: Right to Education (6-14 years) — added by 86th CAA 2002",
  "Art 32: Right to Constitutional Remedies — called 'Heart & Soul' by Ambedkar",
  "5 Writs: Habeas Corpus, Mandamus, Prohibition, Certiorari, Quo Warranto",
  "Habeas Corpus = 'you shall have the body' — protection against illegal detention",
  "Mandamus = 'we command' — issued to public authority to perform duty",
  "Prohibition — issued to lower court to STOP exceeding jurisdiction",
  "Certiorari — issued to quash/transfer a case from lower court",
  "Quo Warranto = 'by what authority' — challenges illegal occupation of public office",
  "SC (Art 32) issues writs ONLY for FR violations",

 ],
 flashcards:[
  {q:"Which case is Fundamental Rights known as in comparison to world history?",a:"'Magna Carta of India' (borrowed from US Bill of Rights)"},
  {q:"How many FRs originally? How many now?",a:"Originally 7 → Now 6 (Right to Property removed by 44th CAA 1978)"},
  {q:"Art 32 is called what by Dr. Ambedkar?",a:"'Heart and Soul of the Constitution'"},
  {q:"Name all 5 writs in order",a:"Habeas Corpus, Mandamus, Prohibition, Certiorari, Quo Warranto"},
  {q:"Difference between Art 32 (SC) and Art 226 (HC) writs?",a:"SC writs: ONLY for FR violations | HC writs: FR + other legal rights (wider)"},
  {q:"Art 21A was added by which amendment for what purpose?",a:"86th CAA 2002 — Right to Education for children 6-14 years"},
  {q:"Which FRs are available ONLY to citizens (not foreigners)?",a:"Art 15, 16, 19, 29, 30"},
  {q:"Art 17 abolished what?",a:"Untouchability — enforceable through Protection of Civil Rights Act 1955"},
  {q:"Right to Property was moved from FRs to where?",a:"Art 300A (legal right, not FR) by 44th CAA 1978"},
  {q:"Art 19 currently guarantees how many freedoms?",a:"6 freedoms: Speech, Assembly, Association, Movement, Residence, Profession"}
 ],
 mcqs:[
  {q:"The 'Heart and Soul of the Constitution' as described by Dr. Ambedkar refers to:",o:["Article 21","Article 14","Article 32","Article 51A"],a:2,e:"Dr. Ambedkar called Art 32 (Right to Constitutional Remedies) the 'Heart and Soul' of the Constitution because without it, all other FRs would be meaningless."},
  {q:"After the 44th Constitutional Amendment Act 1978, the number of Fundamental Rights became:",o:["5","6","7","8"],a:1,e:"44th CAA 1978 removed Right to Property from FRs (made it legal right under Art 300A), reducing FRs from 7 to 6."},
  {q:"Which writ is issued to challenge the illegal occupation of a public office?",o:["Habeas Corpus","Mandamus","Prohibition","Quo Warranto"],a:3,e:"Quo Warranto (by what authority) is issued to challenge a person's right to hold a public office."},
  {q:"The High Court can issue writs under Article 226 for:",o:["Violation of Fundamental Rights only","Violation of FR and legal rights — wider than SC","Cases beyond its jurisdiction","Only criminal matters"],a:1,e:"HC under Art 226 has wider writ jurisdiction than SC under Art 32. HC can issue writs not just for FR violations but for any legal right violation."},
  {q:"Article 21A (Right to Education for 6-14 years) was added by:",o:["73rd CAA 1992","82nd CAA 2000","86th CAA 2002","91st CAA 2003"],a:2,e:"86th CAA 2002 inserted Art 21A making education a fundamental right for children between 6-14 years."},
  {q:"The Right to Property is currently:",o:["A Fundamental Right under Art 19","A Fundamental Right under Art 300A","A legal right under Art 300A","Not mentioned in Constitution"],a:2,e:"Right to Property was removed from FRs by 44th CAA 1978. It is now a legal (constitutional) right under Art 300A but not a Fundamental Right."},
  {q:"Habeas Corpus writ means:",o:["We command","You shall have the body","By what authority","To be certified"],a:1,e:"Habeas Corpus means 'you shall have the body.' It is used to secure release of a person from illegal detention."},
  {q:"Article 19 currently guarantees how many freedoms?",o:["4","5","6","7"],a:2,e:"Art 19 currently has 6 freedoms: Speech & Expression, Assembly, Association, Movement, Residence, Profession. Freedom to acquire/hold/dispose property was removed by 44th CAA 1978."},
  {q:"Which Fundamental Right is available to BOTH citizens and foreigners?",o:["Art 15 (Non-discrimination)","Art 16 (Public employment equality)","Art 19 (Freedoms)","Art 20 (Protection against arbitrary conviction)"],a:3,e:"Art 20, 21, 21A, 22, 23, 24 are available to ALL persons — citizens and foreigners. Art 15,16,19,29,30 are only for citizens."},
  {q:"'Prohibition' writ is issued to:",o:["A person illegally holding public office","Lower courts to stop exceeding jurisdiction","Public authorities to perform their duty","Release a person from illegal detention"],a:1,e:"Prohibition is issued to a lower court or tribunal, directing it to STOP proceedings that are beyond its jurisdiction."}
 ]
},

  {q:"Directive Principles of State Policy are:",o:["Justiciable and enforceable by courts","Non-justiciable but fundamental in governance","Justiciable only by the Supreme Court","Neither justiciable nor binding"],a:1,e:"DPSPs are non-justiciable (courts cannot enforce them) but under Art 37, they are fundamental in the governance of the country."},
  {q:"Article 39A was added to the Constitution by:",o:["Original Constitution","44th CAA 1978","42nd CAA 1976","73rd CAA 1992"],a:2,e:"Art 39A (Equal Justice and Free Legal Aid) was added by 42nd CAA 1976. It is a DPSP."},
  {q:"Which of the following DPSPs was added by the 97th Constitutional Amendment Act 2011?",o:["Art 39A","Art 43A","Art 43B","Art 48A"],a:2,e:"Art 43B dealing with promotion of co-operative societies was added by 97th CAA 2011."},
  {q:"Uniform Civil Code is mentioned in which Article of the Constitution?",o:["Art 40","Art 44","Art 46","Art 50"],a:1,e:"Art 44 says the State shall endeavour to secure for citizens a Uniform Civil Code throughout India."},
  {q:"Granville Austin described Directive Principles as:",o:["'Heart and Soul of Constitution'","'Novel Feature'","'Conscience of Constitution'","'Magna Carta of India'"],a:2,e:"Granville Austin, constitutional historian, described DPSPs as the 'Conscience of the Constitution.' Ambedkar called Art 32 the 'Heart and Soul.'"},
  {q:"Article 50 of the Constitution directs the State to:",o:["Promote international peace","Provide free legal aid","Separate Judiciary from Executive","Protect environment"],a:2,e:"Art 50 says the State shall take steps to separate the Judiciary from the Executive in the public services of the State."},
  {q:"Art 48A (Protection of environment) was added by:",o:["Original Constitution","42nd CAA 1976","44th CAA 1978","86th CAA 2002"],a:1,e:"Art 48A was added by 42nd CAA 1976 along with Art 39A and Art 43A — all three added by the same amendment."},
  {q:"Which DPSP article was amended by the 86th CAA 2002?",o:["Art 39A","Art 43B","Art 45","Art 48A"],a:2,e:"Art 45 was amended by 86th CAA 2002. Previously it directed free education up to 14 years; now it covers early childhood care for under-6. Education 6-14 became a FR under Art 21A."},
  {q:"Consider: (1) DPSPs borrowed from USA (2) Art 39A added by 42nd CAA (3) Art 44 deals with UCC — which are correct?",o:["1 and 2","2 and 3 only","1 and 3","All three"],a:1,e:"DPSPs were borrowed from Ireland (NOT USA), so statement 1 is wrong. Art 39A was added by 42nd CAA (correct). Art 44 deals with UCC (correct). So only 2 and 3 are correct."}
 ]
},

  {q:"Fundamental Duties are contained in:",o:["Part III, Art 12-35","Part IV, Art 36-51","Part IV-A, Art 51A","Part V, Art 52"],a:2,e:"Fundamental Duties are in Part IV-A, Article 51A, added by 42nd CAA 1976."},
  {q:"How many Fundamental Duties were added by the 42nd Constitutional Amendment Act 1976?",o:["8","9","10","11"],a:2,e:"42nd CAA 1976 added 10 Fundamental Duties. The 11th was added later by 86th CAA 2002."},
  {q:"The 11th Fundamental Duty (added by 86th CAA 2002) relates to:",o:["Protecting natural environment","Developing scientific temper","Parent/guardian to provide education to children 6-14","Safeguarding public property"],a:2,e:"86th CAA 2002 added the 11th FD: It shall be the duty of every citizen who is a parent or guardian to provide opportunities for education to his child/ward between 6-14 years."},

  "Art 52: There shall be a President of India",
  "Art 53: Executive power vested in President",
  "President = De Jure / Titular / Nominal / Constitutional Head",
  "Elected indirectly by Electoral College",
  "Electoral College: Elected MPs (both houses) + Elected MLAs of all states + Elected MLAs of Delhi & Puducherry (70th CAA added Puducherry)",
  "NOT included in Electoral College: Nominated MPs, Nominated MLAs, Members of Legislative Councils",
  "Proportional Representation with Single Transferable Vote (STV)",
  "Term: 5 years | Any number of re-elections | Resign to VP",
  "Minimum age: 35 years | Must be citizen of India",
  "Must be qualified to be Lok Sabha member",
  "Oath: Administered by Chief Justice of India",
  "Art 61: Impeachment — 14-day advance notice, 1/4 members of house initiate, 2/3 majority in BOTH houses needed, State Legislatures have NO role, quasi-judicial process",
  "Salary: ₹5 lakh per month (current)",
  "3 Types of Veto: (1) Absolute Veto (2) Suspensive Veto (3) Pocket Veto",
  "Absolute Veto: President withholds assent — e.g., Rajendra Prasad (1954), Venkataraman (1991) exercised this",
  "Suspensive Veto: Returns bill for reconsideration — e.g., APJ Abdul Kalam returned OPBT Bill 2006",
  "Pocket Veto: Keeps bill pending indefinitely — e.g., Zail Singh (1986, Indian Post Office Amendment Bill)",
  "No Pocket Veto for Constitutional Amendment Bills (must assent)",
  "Pardoning Powers (Art 72): Can pardon death sentence, court-martial sentences — Governor CANNOT",
  "Ordinance Power (Art 123): When Parliament not in session, max 6 weeks after Parliament reassembles",
  "3 Emergencies: National Emergency (Art 352), President's Rule (Art 356), Financial Emergency (Art 360)",
  "President List: 1-Rajendra Prasad, 2-Radhakrishnan, 3-Zakir Husain (died in office), 4-VV Giri (first to win on 2nd preference), 5-Fakhruddin Ali Ahmed (died in office), 6-Neelam Sanjiva Reddy (uncontested), 12-Pranab Mukherjee, 13-Ram Nath Kovind, 14-Droupadi Murmu (first tribal woman, 2022)"

{id:"emergency_provisions",title:"Emergency Provisions",xp:60,type:"regular",seqIdx:21,
 facts:[
  "Part XVIII (Art 352-360): 3 types — National Emergency (352), President's Rule/State Emergency (356), Financial Emergency (360)",
  "Art 352 grounds: War, External Aggression, Armed Rebellion",
  "Originally Art 352 said 'internal disturbance' — changed to 'Armed Rebellion' by 44th CAA 1978 (after misuse during 1975-77 Emergency)",
  "National Emergency declared 3 times: 1962 (China war), 1971 (Pakistan war), 1975-77 (internal disturbance — pre-44th CAA wording)",
  "National Emergency must be approved by Parliament within 1 month (reduced from 2 months by 44th CAA 1978)",

  {q:"The grounds for proclaiming a National Emergency under Article 352 are:",o:["War, External Aggression, Armed Rebellion","War, Financial Instability, Armed Rebellion","External Aggression, Internal Disturbance, Financial Crisis","War, Constitutional Breakdown, Armed Rebellion"],a:0,e:"Art 352 grounds: War, External Aggression, or Armed Rebellion. 'Internal disturbance' was the original wording before 44th CAA 1978 replaced it with 'Armed Rebellion.'"},
  {q:"A National Emergency proclamation must be approved by Parliament within:",o:["15 days","1 month","2 months","6 months"],a:1,e:"44th CAA 1978 reduced the approval period for National Emergency from 2 months to 1 month."},
  {q:"President's Rule (Art 356) must be approved by Parliament within:",o:["1 month","2 months","3 months","6 months"],a:1,e:"President's Rule must be approved by both Houses of Parliament within 2 months of proclamation."},
  {q:"The maximum duration for which President's Rule can continue in a state is:",o:["1 year","2 years","3 years","Indefinite"],a:2,e:"President's Rule can be extended every 6 months up to a maximum of 3 years, subject to conditions after the first year."},

  {q:"Which Fundamental Rights can NEVER be suspended during any type of Emergency?",o:["Art 19 and Art 21","Art 20 and Art 21","Art 14 and Art 19","Art 21 and Art 22"],a:1,e:"Art 20 (protection in respect of conviction) and Art 21 (life and personal liberty) cannot be suspended under any Emergency — a safeguard from the 44th CAA 1978."},
  {q:"Under Article 358, the freedoms under Article 19 are automatically suspended during:",o:["Any National Emergency","Only War or External Aggression Emergency","Only Armed Rebellion Emergency","President's Rule"],a:1,e:"Art 358 automatically suspends Art 19 only when the Emergency is proclaimed on grounds of War or External Aggression — not Armed Rebellion."},
  {q:"The S.R. Bommai Case (1994) is associated with:",o:["Basic Structure Doctrine","Judicial review of Article 356 and the floor test requirement","Right to Privacy","Anti-Defection Law"],a:1,e:"S.R. Bommai v Union of India (1994) held that the imposition of President's Rule is subject to judicial review and that majority must be tested on the floor of the House."},
  {q:"National Emergency has been proclaimed in India in the years:",o:["1962, 1965, 1971","1962, 1971, 1975","1965, 1971, 1984","1962, 1975, 1999"],a:1,e:"National Emergency was declared in 1962 (Indo-China war), 1971 (Indo-Pak war), and 1975-77 (on grounds of internal disturbance)."},
  {q:"Beyond one year, President's Rule can be extended only if:",o:["The state assembly requests it","A National Emergency is in operation OR EC certifies elections aren't possible","The Governor recommends it again","The Chief Minister resigns"],a:1,e:"Extension beyond 1 year requires either a National Emergency in force in the whole/part of India, or an Election Commission certificate that elections cannot be held in the state."},
  {q:"The 38th CAA 1975 and 44th CAA 1978 relate to Emergency provisions in which way?",o:["Both expanded judicial review of Emergency","38th CAA made Emergency non-justiciable; 44th CAA restored judicial review","Both removed Emergency provisions","38th CAA added Financial Emergency"],a:1,e:"38th CAA 1975 made the President's satisfaction in proclaiming Emergency final and non-justiciable. 44th CAA 1978 removed this and restored judicial review."},
  {q:"During a Financial Emergency, the Union can direct a state to:",o:["Reduce salaries of state employees including HC/SC judges","Dissolve the state assembly","Remove the Governor","Declare President's Rule automatically"],a:0,e:"Under Art 360, the Centre may direct states to reduce salaries and allowances of all or any class of persons, including judges of the High Courts and Supreme Court."},
  {q:"President's Rule does NOT affect which institution in the state?",o:["State Legislative Assembly","State Council of Ministers","High Court of the state","Office of the Chief Minister"],a:2,e:"President's Rule affects the executive and legislative machinery of the state, but the High Court's powers and independence remain unaffected."},
  {q:"Which Article allows the President to suspend the right to move courts for enforcement of FRs (except Art 20 & 21) during a National Emergency?",o:["Art 356","Art 358","Art 359","Art 360"],a:2,e:"Art 359 allows the President to suspend the right to approach courts for enforcement of certain Fundamental Rights during a National Emergency, but Art 20 and 21 remain protected."},
  {q:"The word 'Armed Rebellion' replaced 'internal disturbance' in Article 352 due to experiences from:",o:["The 1962 China war","The 1971 Pakistan war","The 1975-77 Emergency","The Kargil conflict 1999"],a:2,e:"The perceived misuse of the 'internal disturbance' ground during the 1975-77 Emergency led the 44th CAA 1978 to replace it with the narrower term 'Armed Rebellion.'"},

{id:"centre_state_relations",title:"Centre-State Relations & Inter-State Bodies",xp:55,type:"regular",seqIdx:22,
 facts:[
  "Centre-State Relations: Part XI (Art 245-263) — Legislative, Administrative, Financial relations",
  "Legislative relations (Art 245-255): Parliament legislates for whole/part of India; State Legislature for the State only",
  "Residuary powers (subjects not in any list) rest with PARLIAMENT/Union (Art 248, 7th Schedule List I Entry 97) — unlike USA where residuary rests with states",
  "Art 254: On a Concurrent List conflict between Union and State law, Union law prevails — UNLESS the State law was reserved for and received President's assent",
  "Administrative relations (Art 256-263): Centre can give directions to States; All-India Services (IAS, IPS, IFoS) are common to Centre and States",
  "Art 263: Inter-State Council — President MAY establish it (discretionary, not mandatory) to inquire into and discuss inter-state disputes and common policy",
  "Inter-State Council was actually constituted only in 1990, on Sarkaria Commission's recommendation",
  "Inter-State Council: Chaired by the PM; members include CMs of all states, UT Administrators with legislature, and 6 Union Cabinet Ministers nominated by PM",
  "5 Zonal Councils — Northern, Central, Eastern, Western, Southern — set up under the States Reorganisation Act 1956 (Sections 15-22)",
  "Zonal Councils are STATUTORY bodies (Act of Parliament), NOT constitutional bodies",
  "Union Home Minister is the common Chairman of all 5 Zonal Councils; a member-state CM acts as Vice-Chairman by annual rotation",
  "Northern Zone: Punjab, Haryana, HP, Rajasthan, J&K, Ladakh, Delhi, Chandigarh",
  "Central Zone: UP, MP, Chhattisgarh, Uttarakhand | Eastern Zone: Bihar, Jharkhand, Odisha, West Bengal",
  "Western Zone: Gujarat, Maharashtra, Goa, Dadra & Nagar Haveli and Daman & Diu",
  "Southern Zone: AP, Telangana, Karnataka, Tamil Nadu, Kerala, Puducherry",
  "North-Eastern Council (NEC): SEPARATE statutory body under the NEC Act 1971 (in force from 1972) — NOT one of the 5 Zonal Councils",
  "NEC covers Assam, Manipur, Mizoram, Arunachal Pradesh, Nagaland, Meghalaya, Tripura, and Sikkim (added 2002)",
  "Sarkaria Commission (1983-88): on Centre-State relations; recommended setting up the Inter-State Council and restraint in using Art 356",
  "Punchhi Commission (2007, headed by Justice M.M. Punchhi): reviewed Centre-State relations; recommended localized/limited use of Art 356 and guidelines for Governor's discretion",
  "NITI Aayog's Governing Council includes all state CMs and UT Administrators — a platform for 'cooperative federalism'",
  "Financial relations: Art 268-281 — Art 280 (Finance Commission) and Art 279A (GST Council) covered separately"
 ],
 table:{h:["Body","Basis","Chairman","Member Scope"],r:[
  ["Inter-State Council","Art 263 (constitutional, discretionary)","Prime Minister","All state CMs + UT Administrators + 6 Union Ministers"],
  ["5 Zonal Councils","States Reorganisation Act 1956 (statutory)","Union Home Minister (common chair)","Group of neighbouring states/UTs per zone"],
  ["North-Eastern Council","NEC Act 1971 (statutory)","Union Home Minister (ex-officio)","8 NE states incl. Sikkim (2002)"],
  ["NITI Aayog Governing Council","Executive resolution","Prime Minister","All state CMs + UT Administrators"]
 ]},
 mn:{h:"🧠 MEMORY HOOK",b:"'Residuary = Union, not states' (Art 248). 'Zonal Councils = 1956 Act, NOT Constitution.' '5 Zones: N-C-E-W-S; NEC is a 6th, SEPARATE body (1971 Act).' 'Sarkaria(1983-88) → Inter-State Council; Punchhi(2007) → Art 356 guidelines.'"},

  {q:"Where do residuary powers rest in India's federal scheme?",a:"With the Union/Parliament (Art 248) — unlike the USA where they rest with the states"},
  {q:"Is establishing the Inter-State Council mandatory for the President?",a:"No — Art 263 makes it discretionary; it was actually set up only in 1990"},
  {q:"Who chairs the Inter-State Council?",a:"The Prime Minister"},

 mcqs:[
  {q:"Residuary powers (subjects not in any of the three lists) in India rest with:",o:["State Legislatures","Parliament/Union","Both equally","Local bodies"],a:1,e:"Art 248 vests residuary powers with Parliament/the Union — a key feature distinguishing India's quasi-federal model from the USA's."},
  {q:"The Inter-State Council under Article 263 was actually constituted in the year:",o:["1956","1983","1990","2007"],a:2,e:"Though Art 263 allows the President to establish an Inter-State Council, it was actually set up only in 1990, following the Sarkaria Commission's recommendation."},
  {q:"The 5 Zonal Councils of India were established under:",o:["The Constitution directly (Art 263)","States Reorganisation Act 1956","NEC Act 1971","An executive resolution"],a:1,e:"The 5 Zonal Councils are statutory bodies created under Sections 15-22 of the States Reorganisation Act 1956 — not a constitutional provision."},
  {q:"Who is the common Chairman of all 5 Zonal Councils?",o:["Prime Minister","Union Home Minister","Vice President","NITI Aayog CEO"],a:1,e:"The Union Home Minister is the ex-officio common Chairman of all 5 Zonal Councils; a member CM serves as Vice-Chairman by rotation."},
  {q:"The North-Eastern Council was established under:",o:["States Reorganisation Act 1956","North-Eastern Council Act 1971","73rd CAA 1992","Art 263 of the Constitution"],a:1,e:"The NEC is a separate statutory body created under the North-Eastern Council Act 1971, distinct from the 5 Zonal Councils."},
  {q:"Which state was added to the North-Eastern Council's coverage in 2002?",o:["Sikkim","Tripura","Assam","Mizoram"],a:0,e:"Sikkim was added to the North-Eastern Council in 2002; the original members were the other 7 north-eastern states."},
  {q:"The Sarkaria Commission (1983-88) is best associated with recommending:",o:["GST Council","Setting up the Inter-State Council","Anti-Defection Law","106th CAA"],a:1,e:"The Sarkaria Commission examined Centre-State relations and recommended, among other things, the constitution of an Inter-State Council."},
  {q:"The Punchhi Commission (2007) was primarily concerned with:",o:["Panchayati Raj reforms","Reviewing Centre-State relations, including Article 356 misuse","GST implementation","Judicial appointments"],a:1,e:"The Punchhi Commission, headed by Justice M.M. Punchhi, reviewed Centre-State relations and recommended restricting the misuse of Article 356."},
  {q:"In case of a conflict between a Union law and a State law on a Concurrent List subject, generally:",o:["State law always prevails","Union law prevails, unless the State law has received Presidential assent","Both laws apply simultaneously","The matter goes to the Inter-State Council"],a:1,e:"Art 254 provides that Union law prevails over State law on Concurrent List matters, with an exception if the State law was reserved for and received the President's assent."},
  {q:"Which body's Governing Council includes all state Chief Ministers and UT Administrators, promoting cooperative federalism?",o:["Finance Commission","Inter-State Council","NITI Aayog","Zonal Council"],a:2,e:"NITI Aayog's Governing Council includes all state CMs and UT Administrators with legislatures, serving as a platform for cooperative federalism."},
  {q:"Member states of the Western Zonal Council include:",o:["Punjab, Haryana, Rajasthan","Gujarat, Maharashtra, Goa","Bihar, Jharkhand, Odisha","UP, MP, Chhattisgarh"],a:1,e:"The Western Zonal Council comprises Gujarat, Maharashtra, Goa, and Dadra & Nagar Haveli and Daman & Diu."},
  {q:"All-India Services such as the IAS and IPS are:",o:["Exclusive to the Union government","Exclusive to State governments","Common to both Centre and States","Abolished after 1956"],a:2,e:"All-India Services (IAS, IPS, IFoS) are common to both the Union and the States — officers serve in state cadres but are recruited and controlled at an all-India level."},
  {q:"The Inter-State Council's membership includes how many Union Cabinet Ministers nominated by the PM?",o:["3","4","6","10"],a:2,e:"The Inter-State Council includes the PM (Chairman), all state CMs, UT Administrators with legislatures, and 6 Union Cabinet Ministers nominated by the PM."},
  {q:"Which Zonal Council does NOT include Rajasthan?",o:["Northern Zonal Council","Central Zonal Council","Southern Zonal Council","All include Rajasthan"],a:2,e:"Rajasthan is part of the Northern Zonal Council, not the Southern, Central, or Eastern zones."},
  {q:"The legislative relations between Centre and States are dealt with under:",o:["Articles 245-255","Articles 256-263","Articles 264-281","Articles 280-281 only"],a:0,e:"Articles 245-255 (Part XI) deal with legislative relations; Articles 256-263 deal with administrative relations; Articles 264-281 deal with financial relations."}
 ]

{id:"landmark_judgments",title:"Landmark Supreme Court Judgments",xp:65,type:"regular",seqIdx:23,
 facts:[
  "A.K. Gopalan v State of Madras (1950): Narrow/literal interpretation of Art 21; FRs read in isolation, not together",
  "Golaknath v State of Punjab (1967): Held Parliament CANNOT amend Fundamental Rights — later overturned by the 24th CAA 1971",
  "24th CAA 1971 restored Parliament's power to amend Fundamental Rights (reaction to Golaknath)",
  "Kesavananda Bharati v State of Kerala (1973): Established the BASIC STRUCTURE DOCTRINE — Parliament can amend any part but not the 'basic structure'; largest-ever bench (13 judges)",
  "Indira Gandhi v Raj Narain (1975): Held free & fair elections are part of the Basic Structure; struck down a 39th CAA clause shielding PM's election from judicial review",
  "Maneka Gandhi v Union of India (1978): Expanded Art 21 — 'procedure established by law' must be fair, just and reasonable; linked Art 14, 19, and 21 together",
  "Minerva Mills v Union of India (1980): Struck down 42nd CAA clauses giving DPSPs unlimited primacy over FRs; held judicial review itself is part of the Basic Structure",
  "Indra Sawhney v Union of India (1992) — 'Mandal Commission case': Upheld 27% OBC reservation; capped total reservation at 50%; excluded the 'creamy layer' from OBC quota",
  "S.R. Bommai v Union of India (1994): Curbed misuse of Art 356; floor test is the way to test majority; secularism held part of Basic Structure",
  "Vishaka v State of Rajasthan (1997): Laid down the 'Vishaka Guidelines' against workplace sexual harassment — later codified as the POSH Act 2013",
  "T.M.A. Pai Foundation v State of Karnataka (2002): On minority rights to establish and administer educational institutions (Art 30)",
  "I.R. Coelho v State of Tamil Nadu (2007): Laws placed in the 9th Schedule AFTER 24 April 1973 (Kesavananda judgment date) are still open to judicial review for Basic Structure violation",
  "Supreme Court Advocates-on-Record Assn v Union of India (2015) — 'NJAC Case': Struck down the NJAC (99th CAA 2014) as unconstitutional; restored the Collegium system",
  "K.S. Puttaswamy v Union of India (2017) — 'Right to Privacy case': 9-judge bench unanimously held Right to Privacy is a Fundamental Right under Art 21",
  "Shayara Bano v Union of India (2017): Declared instant Triple Talaq unconstitutional — led to the Muslim Women (Protection of Rights on Marriage) Act 2019",
  "Navtej Singh Johar v Union of India (2018): Decriminalised consensual homosexual acts by reading down Section 377 IPC",
  "Joseph Shine v Union of India (2018): Struck down Adultery (Section 497 IPC) as a criminal offence"
 ],

  "Art 324: Superintendence, direction, and control of elections vested in the Election Commission of India",
  "Representation of People Act 1950: Deals with allocation/delimitation of constituencies, qualification of voters, preparation of electoral rolls",
  "Representation of People Act 1951: Deals with the actual CONDUCT of elections, candidates/agents' conduct, election offences and disputes",
  "Delimitation Commission: Constituted by an Act of Parliament; redraws constituency boundaries based on the Census",
  "Last delimitation was based on the 2001 Census (2002); total Lok Sabha/Assembly seat numbers are frozen until the first Census after 2026 (84th & 87th CAA)",
  "Election Symbols (Reservation and Allotment) Order 1968: ECI allots and recognises political party symbols",
  "EVM (Electronic Voting Machine) was first used in 1982 in a by-election in Parur, North Paravur (Kerala)",
  "EVMs were used nationwide for the first time in the 2004 Lok Sabha elections",
  "VVPAT (Voter Verifiable Paper Audit Trail) was first used in 2013; mandated nationwide from the 2019 Lok Sabha elections",
  "NOTA (None of the Above) was introduced following the Supreme Court's order in PUCL v Union of India (2013)",
  "NOTA was first used in the 2013 state Assembly elections",
  "NOTA votes do NOT count toward any candidate and do NOT trigger a re-election — the candidate with the highest valid votes still wins",
  "Model Code of Conduct (MCC) has NO statutory/legal backing — it is morally/self-regulatory binding on parties and candidates",
  "MCC comes into effect from the date the Election Commission announces the election schedule",
  "Election Commission became a multi-member body from October 1993 (a brief multi-member phase also existed Oct 1989-Jan 1990); originally single-member (1950-89)",
  "ECI headquarters: New Delhi",
  "Voter ID card (EPIC — Electors Photo Identity Card) was introduced in 1993",
  "The right to vote in India is a STATUTORY right under the RPA 1951 (and Art 326 provides for adult franchise) — NOT a listed Fundamental Right",
  "Voting in India is NOT compulsory — it is a legal right, not a duty",
  "Booth capturing and re-polling powers in affected booths rest with the Election Commission"

{id:"recent_developments",title:"Recent Constitutional Developments",xp:55,type:"regular",seqIdx:25,
 facts:[
  "Article 370 gave Jammu & Kashmir special autonomous status (own constitution, flag, limited applicability of Union laws) — drafted by N. Gopalaswami Ayyangar; placed as a 'Temporary Provision' in Part XXI",
  "Article 35A (added via a 1954 Presidential Order, not by Parliament) empowered J&K's legislature to define 'permanent residents' and their special rights",
  "5 August 2019: A Presidential Order superseded the 1954 Order, applying the entire Constitution of India to J&K",
  "6 August 2019: Both Houses of Parliament passed a resolution effectively abrogating Article 370's special provisions",
  "Jammu and Kashmir Reorganisation Act 2019: Bifurcated the state into 2 Union Territories — J&K (WITH a legislature, like Delhi) and Ladakh (WITHOUT a legislature, like Chandigarh)",
  "The J&K Reorganisation Act came into effect on 31 October 2019",
  "Post-abrogation: J&K's separate constitution, flag, and penal code ceased to exist; all Indian laws now directly apply",
  "103rd CAA 2019: Inserted Art 15(6) and 16(6) — 10% EWS (Economically Weaker Sections) reservation in education and public employment, over and above existing quotas",
  "105th CAA 2021: Restored states'/UTs' power to prepare their own OBC lists (after a Supreme Court ruling on Maratha reservation); clarified Art 342A",
  "106th CAA 2023 ('Nari Shakti Vandan Adhiniyam'): Reserves 1/3rd (33%) of seats for women in the Lok Sabha, all State Legislative Assemblies, and the Delhi Assembly",
  "106th CAA inserts new Articles 330A and 332A; the women's quota also applies within the existing SC/ST reserved seats",
  "106th CAA received Presidential assent on 28 September 2023",
  "106th CAA's implementation is linked to the delimitation exercise after the NEXT Census — expected to take effect from the 2029 general elections, NOT immediately",
  "Dadra & Nagar Haveli and Daman & Diu — two separate UTs — were merged into a single UT on 26 January 2020",
  "India currently has 8 Union Territories: Delhi, Puducherry, J&K, Ladakh, Chandigarh, Andaman & Nicobar Islands, Lakshadweep, and Dadra & Nagar Haveli and Daman & Diu",
  "India currently has 28 States (the count dropped from 29 to 28 after J&K's 2019 reorganisation into Union Territories)",
  "National Commission for Women (NCW): a STATUTORY body under the NCW Act 1990 — NOT a constitutional body",
  "National Commission for Protection of Child Rights (NCPCR): a STATUTORY body under the Commissions for Protection of Child Rights Act 2005"
 ],

  {q:"Gram Sabha consists of:",o:["Elected Panchayat members","All adults of a village","All registered voters of the village","All tax-paying villagers"],a:2,e:"Gram Sabha consists of all registered voters in a village — it is the foundational democratic unit."},
  {q:"Which President exercised Absolute Veto on a bill?",o:["APJ Abdul Kalam","Zail Singh","Rajendra Prasad","Giani Zail Singh"],a:2,e:"Dr. Rajendra Prasad (1954) and Venkataraman (1991) exercised Absolute Veto. Zail Singh used Pocket Veto; APJ used Suspensive Veto."},
  {q:"The National Commission for Backward Classes was given constitutional status by:",o:["65th CAA 1990","89th CAA 2003","97th CAA 2011","102nd CAA 2018"],a:3,e:"102nd CAA 2018 inserted Art 338B establishing NCBC as a constitutional body."},
  {q:"Balwant Rai Mehta Committee (1957) is associated with:",o:["First recommendation of 3-tier PRI","Recommendation for constitutional status of PRIs","2-tier PRI recommendation","Urban local body reforms"],a:0,e:"Balwant Rai Mehta Committee (1957) was the first to recommend a 3-tier Panchayati Raj system."},
  {q:"Which article allows the President to seek advisory opinion from SC?",o:["Art 32","Art 131","Art 136","Art 143"],a:3,e:"Art 143: Advisory jurisdiction — President can refer a question of law or fact of public importance to SC for its opinion."},
  {q:"Under which Act does the CBI derive its powers?",o:["CBI Act 1942","DSPE Act 1946","IPC 1860","Prevention of Corruption Act 1988"],a:1,e:"CBI derives its powers from the Delhi Special Police Establishment (DSPE) Act 1946. There is no 'CBI Act.'"},
  {q:"The RTI Act requires information to be provided within 48 hours when:",o:["Requested by a senior citizen","Related to life or liberty of a person","Requested by a journalist","Related to government corruption"],a:1,e:"Under RTI Act 2005, information that relates to life or liberty of a person must be provided within 48 hours."},
  {q:"NJAC (National Judicial Appointments Commission) was established by which constitutional amendment?",o:["97th CAA 2011","99th CAA 2014","100th CAA 2015","101st CAA 2016"],a:1,e:"99th CAA 2014 established the NJAC through Art 124A. It was declared unconstitutional by SC in 2015, restoring the collegium system."},
  {q:"The GST Council takes decisions by:",o:["Simple majority","2/3rd majority of members present","3/4th weighted majority","Unanimous consent"],a:2,e:"GST Council decisions require 3/4th weighted majority. Centre's vote = 1/3rd of total votes cast; States' votes = 2/3rd."}
 ]
};


// ── ENGINE ─────────────────────────────────────────────────────────────────
function allNodes(){
  const arr=[];
  CHAPTERS.forEach(ch=>ch.nodes.forEach(n=>{n._chapter=ch.title;arr.push(n);}));
  arr.push({...GOLDEN_NODE,_chapter:'Golden Node'});
  return arr;
}
function seqNodes(){return allNodes().sort((a,b)=>a.seqIdx-b.seqIdx);}
function isUnlocked(node){
  if(node.seqIdx===0)return true;
  if(node.type==='gold'){
    const pct=overallPct();
    return pct>=(node.requires_pct||80);
  }
  const prev=seqNodes().find(n=>n.seqIdx===node.seqIdx-1);
  return prev&&S.mcq[prev.id]&&S.mcq[prev.id].passed;
}
function findNode(id){return allNodes().find(n=>n.id===id);}
function totalXP(){return seqNodes().reduce((a,n)=>a+n.xp,0);}
function overallPct(){
  const ns=seqNodes().filter(n=>n.type!=='gold');
  if(!ns.length)return 0;
  const passed=ns.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  return Math.round(100*passed/ns.length);
}

// ── SIDEBAR ─────────────────────────────────────────────────────────────────
function buildSidebar(){
  const si=document.getElementById('sidebar-inner');
  if(!si)return;
  let html=`<button class="dash-btn" onclick="showDash()">📊 Dashboard</button>`;
  const xp=S.xp||0,total=totalXP();
  const pct=overallPct();
  document.getElementById('tb-xp').textContent=xp+' XP';
  document.getElementById('tb-pct').textContent=pct+'%';
  CHAPTERS.forEach(ch=>{
    html+=`<div class="ch-header">${ch.title}</div>`;
    ch.nodes.forEach(n=>{
      const locked=!isUnlocked(n),passed=S.mcq[n.id]&&S.mcq[n.id].passed;
      const icon=locked?'🔒':passed?'✅':'📖';
      const cls=['node-item',locked?'locked':'',passed?'passed':''].join(' ');
      html+=`<div class="${cls}" onclick="${locked?'showToast(\'Complete previous nodes first\',\'warn\')':'openNode(\''+n.id+'\')'}" >
        <span class="ni-icon">${icon}</span>
        <span class="ni-text">${n.title}</span>
        <span class="ni-xp">${n.xp}XP</span>
      </div>`;
    });
  });
  // Golden
  const gn=GOLDEN_NODE,gl=!isUnlocked(gn),gp=S.mcq[gn.id]&&S.mcq[gn.id].passed;
  html+=`<div class="ch-header">⭐ Golden Node</div>`;
  html+=`<div class="node-item gold-node ${gl?'locked':''}" onclick="${gl?'showToast(\'Pass 80% of nodes first!\',\'warn\')':'openNode(\'master_polity\')'}" >
    <span class="ni-icon">${gl?'🔒':gp?'🏆':'⭐'}</span>
    <span class="ni-text">${gn.title}</span>
    <span class="ni-xp">${gn.xp}XP</span>
  </div>`;
  si.innerHTML=html;
}

// ── TAB TIMER ────────────────────────────────────────────────────────────────
let _tabStart=null,_tabActive=null;
function startTabTimer(nid){_tabStart=Date.now();_tabActive=nid;}
function stopTabTimer(){
  if(!_tabStart||!_tabActive)return;
  const secs=Math.round((Date.now()-_tabStart)/1000);
  if(!S.tabTime)S.tabTime={};
  S.tabTime[_tabActive]=(S.tabTime[_tabActive]||0)+secs;
  _tabStart=null;_tabActive=null;
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(btn,tab){
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const pane=document.getElementById('tab-'+tab);
  if(pane)pane.classList.add('active');
}

// ── FLASHCARD ─────────────────────────────────────────────────────────────────
function buildFlashPane(node){
  const cards=node.flashcards||[];
  if(!cards.length)return '<p style="color:var(--ink2);padding:16px">No flashcards available.</p>';
  let html=`<p class="flash-hint">Tap card to flip • ${cards.length} cards</p><div class="flash-grid">`;
  cards.forEach((c,i)=>{
    html+=`<div class="flash-card" onclick="this.classList.toggle('flipped')" id="fc-${node.id}-${i}">
      <div class="flash-inner">
        <div class="flash-front"><span>${c.q}</span></div>
        <div class="flash-back"><span>${c.a}</span></div>
      </div>
    </div>`;
  });
  html+=`</div><div style="text-align:center;margin-top:12px">
    <button class="btn btn-secondary" onclick="resetFlash('${node.id}')">↺ Reset All Cards</button>
  </div>`;
  return html;
}
function resetFlash(nid){
  document.querySelectorAll(`[id^="fc-${nid}-"]`).forEach(c=>c.classList.remove('flipped'));
}

// ── LEARN PANE ────────────────────────────────────────────────────────────────
function buildLearnPane(node){
  if(node.type==='gold')return buildGoldPane(node);
  let html='';
  // Facts
  if(node.facts&&node.facts.length){
    html+=`<div class="sec"><div class="sec-title">📋 Key Facts</div><ul class="facts-list">`;
    node.facts.forEach(f=>html+=`<li>${f}</li>`);
    html+=`</ul></div>`;
  }
  // Table
  if(node.table){
    html+=`<div class="sec"><div class="sec-title">📊 Quick Reference Table</div>
      <table class="tbl"><tr>`;
    node.table.h.forEach(h=>html+=`<th>${h}</th>`);
    html+=`</tr>`;
    node.table.r.forEach(r=>{html+=`<tr>`;r.forEach(c=>html+=`<td>${c}</td>`);html+=`</tr>`;});
    html+=`</table></div>`;
  }
  // Mnemonic
  if(node.mn){
    html+=`<div class="mnemonic"><div class="mn-h">${node.mn.h}</div><div class="mn-b">${node.mn.b}</div></div>`;
  }
  // Traps
  if(node.traps&&node.traps.length){
    html+=`<div class="traps-sec"><div class="sec-title">🚨 SSC TRAP ALERT</div>`;
    node.traps.forEach(t=>html+=`<div class="trap-item">${t}</div>`);
    html+=`</div>`;
  }
  // Rapid revision
  if(node.revision&&node.revision.length){
    html+=`<div class="revision-sec"><div class="sec-title">⚡ 30 SECOND REVISION</div>`;
    node.revision.forEach(r=>html+=`<div class="rev-item">${r}</div>`);
    html+=`</div>`;
  }
  // One-liners
  if(node.oneliners&&node.oneliners.length){
    html+=`<div class="oneliners-sec"><div class="sec-title">🎯 20 EXAM ONE-LINERS</div>`;
    node.oneliners.forEach(o=>html+=`<div class="ol-item">${o}</div>`);
    html+=`</div>`;
  }
  return html||'<p>Content loading...</p>';
}

function buildGoldPane(node){
  let html=`<div class="gold-header"><h2>🏆 Master Revision</h2><p>50 Golden Facts + 25 Traps + 20 MCQs</p></div>`;
  html+=`<div class="master-sec"><div class="sec-title">⭐ 50 Golden Facts — Polity Master</div>`;
  (node.goldFacts||[]).forEach((f,i)=>html+=`<div class="rev-item"><strong>${i+1}.</strong> ${f}</div>`);
  html+=`</div>`;
  html+=`<div class="traps-sec"><div class="sec-title">🚨 25 COMMON EXAM TRAPS</div>`;
  (node.goldTraps||[]).forEach(t=>html+=`<div class="trap-item">${t}</div>`);
  html+=`</div>`;
  return html;
}

// ── TEST PANE ─────────────────────────────────────────────────────────────────
let _sess={};
function buildTestPane(node){
  const mcqs=node.type==='gold'?node.goldMCQs:node.mcqs;
  if(!mcqs||!mcqs.length)return '<p style="padding:20px;color:var(--ink2)">No MCQs available.</p>';
  const sess=_sess[node.id]||{};
  const answered=Object.keys(sess).length;
  const total=mcqs.length;
  let html=`<div class="mcq-wrap">`;
  mcqs.forEach((q,i)=>{
    const chosen=sess[i];
    const isAns=chosen!==undefined;
    html+=`<div class="mcq-card"><div class="mcq-q">${i+1}. ${q.q}</div><div class="mcq-opts">`;
    q.o.forEach((opt,j)=>{
      let cls='opt';
      if(isAns){
        cls+=' answered';
        if(j===q.a)cls+=' correct';
        else if(j===chosen)cls+=' wrong';
        else if(j!==q.a&&j!==chosen)cls+=' skip';
      }
      html+=`<div class="${cls}" onclick="chooseOpt('${node.id}',${i},${j},this)">${String.fromCharCode(65+j)}. ${opt}</div>`;
    });
    html+=`</div>`;
    if(isAns){
      html+=`<div class="mcq-exp show">${q.e||''}</div>`;
    } else {
      html+=`<div class="mcq-exp" id="exp-${node.id}-${i}">${q.e||''}</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>
  <div class="submit-row">
    <button class="btn btn-primary" onclick="submitTest('${node.id}')">Submit (${answered}/${total} answered)</button>
    <button class="btn btn-secondary" onclick="retryNode('${node.id}')">🔄 Retry</button>
  </div>
  <div class="result-banner" id="result-${node.id}"></div>`;
  return html;
}

function chooseOpt(nid,qi,oi,el){
  const node=findNode(nid);
  const mcqs=node.type==='gold'?node.goldMCQs:node.mcqs;
  if(!node||_sess[nid]&&_sess[nid][qi]!==undefined)return;
  if(!_sess[nid])_sess[nid]={};
  // First attempt tracking — lock correctness on the FIRST time this question is ever
  // answered (across retries too); never overwrite on a later retry. Canonical FAA spec.
  if(!S.faa[nid])S.faa[nid]={};
  if(S.faa[nid][qi]===undefined)S.faa[nid][qi]=(oi===mcqs[qi].a);
  _sess[nid][qi]=oi;
  // Update opts
  const card=el.closest('.mcq-card');
  card.querySelectorAll('.opt').forEach((o,j)=>{
    o.classList.add('answered');
    if(j===mcqs[qi].a)o.classList.add('correct');
    else if(j===oi)o.classList.add('wrong');
    else o.classList.add('skip');
  });
  const exp=card.querySelector('.mcq-exp');
  if(exp)exp.classList.add('show');
  // Update submit button
  const answered=Object.keys(_sess[nid]).length,total=mcqs.length;
  const sb=document.querySelector('.submit-row .btn-primary');
  if(sb)sb.textContent=`Submit (${answered}/${total} answered)`;
  saveS();
}

function submitTest(nid){
  const node=findNode(nid);
  if(!node)return;
  finishAttempt(node);
}

function finishAttempt(node){
  const mcqs=node.type==='gold'?node.goldMCQs:node.mcqs;
  const sess=_sess[node.id]||{};
  const correct=mcqs.filter((q,i)=>sess[i]===q.a).length;
  const total=mcqs.length;
  const pct=Math.round(100*correct/total);
  const passed=correct===total;
  const faaCorrect=mcqs.filter((q,i)=>S.faa[node.id]&&S.faa[node.id][i]===true).length;
  const faaPct=Math.round(100*faaCorrect/total);
  if(!S.mcq[node.id])S.mcq[node.id]={faa:faaPct,best:0,passed:false,attempts:0};
  S.mcq[node.id].attempts=(S.mcq[node.id].attempts||0)+1;
  S.mcq[node.id].faa=faaPct;
  if(pct>(S.mcq[node.id].best||0))S.mcq[node.id].best=pct;
  if(passed){
    S.mcq[node.id].passed=true;
    S.xp=(S.xp||0)+node.xp;
    saveS();buildSidebar();
    showToast(`🎉 ${total}/${total}! +${node.xp} XP earned!`,'ok');
    track('node_completed',{node_id:node.id,node_title:node.title,xp_earned:node.xp,faa_pct:faaPct,attempts:S.mcq[node.id].attempts});
    const banner=document.getElementById('result-'+node.id);
    if(banner){banner.textContent=`🎉 Perfect Score! +${node.xp} XP Earned! Next node unlocked!`;banner.className='result-banner ok';banner.style.display='block';}
    setTimeout(()=>{if(node.type!=='gold'){buildSidebar();buildNodeNav(node);}},100);
  } else {
    S.mcq[node.id].lastScore=correct;
    saveS();buildSidebar();
    track('mcq_completed',{node_id:node.id,score:correct,total,pct,faa_pct:faaPct,passed:false,attempts:S.mcq[node.id].attempts});
    showToast(`${correct}/${total} — Need ${total}/${total}. Retry!`,'warn');
    const banner=document.getElementById('result-'+node.id);
    if(banner){banner.textContent=`${correct}/${total} correct (${pct}%). Need 100% to unlock next node. Retry below!`;banner.className='result-banner warn';banner.style.display='block';}
  }
}

function retryNode(nid){
  _sess[nid]={};
  const node=findNode(nid);
  if(!node)return;
  const tp=document.getElementById('tab-test');
  if(tp){tp.innerHTML=buildTestPane(node);}
}

// ── RENDER NODE ──────────────────────────────────────────────────────────────
function openNode(id){
  const node=findNode(id);
  if(!node)return;
  if(!isUnlocked(node)){showToast('Complete previous nodes first','warn');return;}
  stopTabTimer();
  renderNode(node);
  closeDrawer();
  track('node_opened',{node_id:node.id,node_title:node.title,material:'polity_part1'});
  startTabTimer(node.id);
  // Mark active
  document.querySelectorAll('.node-item').forEach(el=>el.classList.remove('active'));
}

function renderNode(node){
  const nc=document.getElementById('node-content');
  if(!nc)return;
  const xp=S.xp||0,total=totalXP(),pct=overallPct();
  document.getElementById('tb-xp').textContent=xp+' XP';
  document.getElementById('tb-pct').textContent=pct+'%';
  document.getElementById('tb-title').textContent=node.title;
  const mcqs=node.type==='gold'?node.goldMCQs:node.mcqs;
  const attempts=S.mcq[node.id]?S.mcq[node.id].attempts:0;
  const best=S.mcq[node.id]?S.mcq[node.id].best:0;
  const passed=S.mcq[node.id]&&S.mcq[node.id].passed;
  nc.innerHTML=`
    <div class="nc">
      <div class="node-header">
        <h1 class="node-title">${node.title}</h1>
        <div class="node-meta">
          <span>🏆 ${node.xp} XP</span>
          <span>📝 ${(mcqs||[]).length} MCQs</span>
          ${attempts?`<span>🔄 ${attempts} attempts</span>`:''}
          ${best?`<span>🎯 Best: ${best}%</span>`:''}
          ${passed?`<span style="color:var(--green)">✅ Completed</span>`:''}
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'learn')">LEARN</button>
        <button class="tab" onclick="switchTab(this,'flash')">FLASHCARDS</button>
        <button class="tab" onclick="switchTab(this,'test')">TEST</button>
      </div>
      <div id="tab-learn" class="tab-pane active">${buildLearnPane(node)}</div>
      <div id="tab-flash" class="tab-pane">${buildFlashPane(node)}</div>
      <div id="tab-test" class="tab-pane">${buildTestPane(node)}</div>
    </div>
  `;
  window.scrollTo(0,0);
  buildNodeNav(node);
}

function buildNodeNav(node){
  const nc=document.querySelector('.nc');
  if(!nc)return;
  const old=nc.querySelector('.node-nav');if(old)old.remove();
  const all=seqNodes();
  const idx=all.findIndex(n=>n.id===node.id);
  const prev=idx>0?all[idx-1]:null;
  const next=idx<all.length-1?all[idx+1]:null;
  const navDiv=document.createElement('div');
  navDiv.className='node-nav';
  if(prev)navDiv.innerHTML+=`<button class="btn btn-secondary" onclick="openNode('${prev.id}')">← ${prev.title}</button>`;
  else navDiv.innerHTML+=`<span></span>`;
  if(next&&isUnlocked(next))navDiv.innerHTML+=`<button class="btn btn-primary" onclick="openNode('${next.id}')">→ ${next.title}</button>`;
  else if(next)navDiv.innerHTML+=`<button class="btn btn-secondary" onclick="showToast('Complete this node first!','warn')">🔒 Next</button>`;
  nc.appendChild(navDiv);
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function showDash(){
  const nc=document.getElementById('node-content');
  const xp=S.xp||0,total=totalXP(),pct=overallPct();
  document.getElementById('tb-xp').textContent=xp+' XP';
  document.getElementById('tb-pct').textContent=pct+'%';
  document.getElementById('tb-title').textContent='Dashboard';
  const nodes=seqNodes();
  const passed=nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  const totalN=nodes.length;
  let html=`<div class="dash">
    <h1 class="dash-title">📜 Indian Polity — Part 1</h1>
    <p class="dash-sub">CentuMania Learning System</p>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${xp}</div><div class="stat-lbl">XP Earned</div></div>
      <div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-lbl">Overall</div></div>
      <div class="stat-card"><div class="stat-val">${passed}/${totalN}</div><div class="stat-lbl">Completed</div></div>
      <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Total XP</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="node-grid">`;
  nodes.forEach(n=>{
    const locked=!isUnlocked(n),p=S.mcq[n.id]&&S.mcq[n.id].passed;
    const icon=n.type==='gold'?'⭐':locked?'🔒':p?'✅':'📖';
    html+=`<div class="ng-card ${locked?'ng-locked':''} ${p?'ng-passed':''}" onclick="${locked?'showToast(\'Complete previous nodes first\',\'warn\')':'openNode(\''+n.id+'\')'}">
      <div class="ng-icon">${icon}</div>
      <div class="ng-title">${n.title}</div>
      <div class="ng-xp">${n.xp} XP</div>
      ${p?'<div class="ng-status">✅ Completed</div>':''}
    </div>`;
  });
  html+=`</div></div>`;
  nc.innerHTML=html;
  window.scrollTo(0,0);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── MOBILE ────────────────────────────────────────────────────────────────────
function toggleDrawer(){
  document.getElementById('aside').classList.toggle('open');
  document.getElementById('drawer-overlay').classList.toggle('open');
}
function closeDrawer(){
  document.getElementById('aside').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  loadS();
  initMetrics();
  buildSidebar();
  showDash();
  track('material_opened',{material:'polity_part1'});
});

window.addEventListener('beforeunload',()=>{
  stopTabTimer();
  track('session_end',{material:'polity_part1',xp:S.xp||0,pct:overallPct(),tab_time:S.tabTime||{}});
  saveS();
});
</script>
