<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📜 Modern History Part 1 — CentuMania</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#130A0A;--bg2:#0A0505;--panel:#2A1010;--panel2:#3D1818;--line:#5C2525;
  --ink:#ECD4D4;--ink2:#CC9090;--ink3:#885555;
  --gold:#FCA5A5;--gold2:#CC2222;--gold-glow:rgba(252,165,165,.18);
  --amber:#FBBF24;--gold-bg:rgba(252,165,165,.09);
  --red:#f87171;--red-bg:rgba(248,113,113,.12);--blue:#93C5FD;--green:#4ade80;
}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;}
#topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:.6rem 1rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;flex-shrink:0;}
#menu-btn{background:none;border:none;color:var(--ink);font-size:1.4rem;cursor:pointer;padding:.2rem;}
#tb-title{flex:1;font-weight:700;font-size:.95rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#tb-xp{color:var(--amber);font-weight:700;font-size:.9rem;white-space:nowrap;}
#tb-pct{color:var(--green);font-weight:700;font-size:.9rem;white-space:nowrap;}
#layout{display:flex;flex:1;overflow:hidden;}
#aside{display:none;width:280px;background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;flex-shrink:0;transition:transform .25s;}
#sidebar-inner{padding:.5rem;}
#main{flex:1;overflow-y:auto;padding:1rem;}
#node-content{max-width:900px;margin:0 auto;}
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;}
#drawer-overlay.show{display:block;}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--panel2);color:var(--ink);padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;}
#toast.show{opacity:1;}
.node-item{display:flex;align-items:center;gap:.6rem;padding:.6rem .7rem;border-radius:8px;cursor:pointer;margin-bottom:.3rem;transition:background .2s;border:1px solid transparent;}
.node-item:hover{background:var(--panel);}
.node-item.locked{opacity:.5;cursor:not-allowed;}
.node-item.gold-node{border-color:var(--gold);background:var(--gold-bg);}
.node-icon{font-size:1.2rem;flex-shrink:0;}
.node-info{flex:1;min-width:0;}
.node-label{font-size:.82rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.node-xp{font-size:.75rem;color:var(--amber);white-space:nowrap;}
.prog-bar{height:4px;background:var(--panel2);border-radius:2px;margin-top:.3rem;}
.prog-fill{height:100%;background:var(--gold2);border-radius:2px;transition:width .4s;}
.tab-bar{display:flex;gap:.4rem;margin-bottom:1rem;border-bottom:2px solid var(--line);padding-bottom:.6rem;}
.tab-btn{padding:.45rem .9rem;border:none;border-radius:6px;cursor:pointer;font-size:.83rem;font-weight:600;background:var(--panel);color:var(--ink2);transition:all .2s;}
.tab-btn.active{background:var(--gold2);color:#fff;}
.learn-body{display:flex;flex-direction:column;gap:1rem;}
.score-badge{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.5rem 1rem;font-size:.85rem;color:var(--ink2);}
h2{color:var(--gold);font-size:1.3rem;margin:.3rem 0;}
h3{color:var(--gold);font-size:1rem;margin:.5rem 0;}
.fact-item{background:var(--panel);border-left:3px solid var(--gold2);padding:.6rem .9rem;border-radius:0 6px 6px 0;font-size:.88rem;line-height:1.5;margin-bottom:.4rem;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.83rem;}
th{background:var(--panel2);color:var(--gold);padding:.5rem .7rem;text-align:left;border:1px solid var(--line);}
td{padding:.45rem .7rem;border:1px solid var(--line);color:var(--ink2);}
tr:nth-child(even)td{background:var(--bg2);}
.mnemonic-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;font-size:.87rem;line-height:1.6;color:var(--ink);}
.traps-section,.revision-section,.oneliners-section{background:var(--panel);border-radius:8px;padding:.8rem 1rem;}
.trap-item{background:var(--red-bg);border-left:3px solid var(--red);padding:.5rem .8rem;border-radius:0 6px 6px 0;font-size:.84rem;margin-bottom:.4rem;color:var(--ink);}
.revision-section ul{list-style:none;padding:0;}
.revision-section li{padding:.3rem 0;border-bottom:1px solid var(--line);font-size:.84rem;color:var(--ink2);}
.revision-section li::before{content:'✓ ';color:var(--green);}
.oneliner{padding:.3rem 0;border-bottom:1px solid var(--line);font-size:.83rem;color:var(--ink2);}
.flash-body{display:flex;flex-direction:column;gap:1rem;padding:1rem 0;}.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.8rem;width:100%;}.flip-hint{font-size:.7rem;color:var(--ink3);margin-top:.6rem;}
.flash-counter{color:var(--ink2);font-size:.85rem;}
.flash-card{width:100%;height:175px;perspective:1000px;cursor:pointer;position:relative;}
.flash-front,.flash-back{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:1.2rem;border-radius:12px;backface-visibility:hidden;transition:transform .4s;}
.flash-front{background:var(--panel);border:2px solid var(--gold);transform:rotateY(0deg);}
.flash-back{background:var(--panel2);border:2px solid var(--green);transform:rotateY(180deg);}
.flash-card.flipped .flash-front{transform:rotateY(-180deg);}
.flash-card.flipped .flash-back{transform:rotateY(0deg);}
.flash-q{font-size:.95rem;font-weight:600;color:var(--gold);}
.flash-a{font-size:.9rem;color:var(--green);}
.flip-hint{font-size:.75rem;color:var(--ink3);margin-top:.5rem;}
.flash-nav{display:flex;gap:1rem;}
.flash-nav button{padding:.5rem 1.2rem;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;cursor:pointer;}
.flash-nav button:disabled{opacity:.4;cursor:not-allowed;}
.test-body{display:flex;flex-direction:column;gap:1rem;}
.q-block{background:var(--panel);border-radius:8px;padding:.8rem 1rem;}
.q-block.correct{border-left:4px solid var(--green);}
.q-block.wrong{border-left:4px solid var(--red);}
.q-text{font-size:.9rem;font-weight:600;margin-bottom:.6rem;color:var(--ink);}
.opts{display:flex;flex-direction:column;gap:.4rem;}
.opt-label{display:flex;align-items:center;gap:.6rem;padding:.4rem .7rem;border-radius:6px;font-size:.85rem;cursor:pointer;border:1px solid var(--line);color:var(--ink2);transition:background .2s;}
.opt-label:hover{background:var(--panel2);}
.opt-label.selected{background:var(--panel2);border-color:var(--gold);color:var(--ink);}
.opt-label.right-ans{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green);}
.opt-label.wrong-ans{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.opt-label input[type=radio]{accent-color:var(--gold);}
.exp-box{font-size:.82rem;color:var(--ink2);background:var(--bg2);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;}
.submit-btn{padding:.7rem 1.5rem;background:var(--gold2);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:opacity .2s;}
.submit-btn:hover{opacity:.85;}
.gold-submit{background:linear-gradient(135deg,#b91c1c,#dc2626);}
.result-banner{padding:1rem;border-radius:8px;text-align:center;font-size:1.1rem;font-weight:700;}
.result-banner.pass{background:rgba(74,222,128,.15);color:var(--green);border:1px solid var(--green);}
.result-banner.fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.gold-header{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.gold-header span:first-child{color:var(--gold);font-weight:700;font-size:1rem;}
.gold-header span:last-child{color:var(--amber);font-weight:700;}
.gold-facts-ticker{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:.6rem .9rem;font-size:.78rem;color:var(--ink2);margin-bottom:1rem;max-height:90px;overflow-y:auto;line-height:1.6;}
.gold-traps{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;margin-top:1rem;}
.gold-locked-msg{text-align:center;padding:3rem 2rem;color:var(--ink2);}
.gold-locked-msg h2{color:var(--gold);margin:1rem 0;}
.welcome-panel{text-align:center;padding:3rem 2rem;color:var(--ink2);}
.welcome-panel h1{color:var(--gold);font-size:1.8rem;margin-bottom:.8rem;}
.welcome-stats{display:flex;gap:1.5rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;}
.welcome-stats div{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.5rem 1rem;font-size:.85rem;}
@media(min-width:769px){
  #aside{display:flex;flex-direction:column;}
}
@media(max-width:768px){
  #aside.open{display:block;position:fixed;top:0;left:0;height:100%;width:280px;z-index:200;}
  #main{padding:.7rem;}
}
</style>

st came to India via Calcutta → ✅ English first came via <b>Surat, 1608</b>", "❌ EIC formed in 1608 → ✅ EIC formed <b>31 Dec 1600</b>; arrived in India 1608", "❌ Vasco da Gama landed at Bombay → ✅ He landed at <b>Calicut (Kozhikode), Kerala — 1498</b>", "❌ Dutch came before Portuguese → ✅ Portuguese 1498, Dutch 1605", "❌ French East India Company formed 1668 → ✅ French EIC formed <b>1664</b>; Surat factory 1668", "❌ Battle of Swally was between English and French → ✅ <b>English vs Portuguese</b> — 1612 near Surat"], "revision": ["PDEDF = 1498, 1605, 1608, 1620, 1668", "EIC formed 1600, VOC 1602, French EIC 1664", "Battle of Swally 1612 = English defeated Portuguese", "First English factory = Surat 1608", "First French factory = Surat 1668"], "oneliners": ["Vasco da Gama 1498 = first European to reach India by sea", "EIC est. 31 Dec 1600 = Charter by Queen Elizabeth I", "Dutch VOC 1602 = world's first joint-stock company", "Swally 1612 = English dominance over Portuguese at sea", "1498 — Calicut (Kozhikode), Kerala. First European to reach India by sea.", "1608 — First factory at Surat. EIC was formed in 1600.", "Portuguese → Dutch → English → Danish → French (arrival order: 1498→1605→1608→1620→1668)", "31 December 1600 by Charter of Queen Elizabeth I", "1602 — Vereenigde Oost-Indische Compagnie (world's first joint-stock company)", "English defeated Portuguese near Surat — marked English naval supremacy over Portuguese in India", "1668 — Surat. French East India Company was formed in 1664.", "Tranquebar (1620) — also known as Serampore", "Dutch VOC — first factory at Masulipatnam, 1605", "English (EIC) and French", "Portuguese — 1498: Vasco da Gama landed at Calicut, Kerala — 1st European to reach India by sea route", "Dutch (VOC) — 1605: First factory at Masulipatnam; VOC = Vereenigde Oost-Indische Compagnie (formed 1602)", "English (EIC) — 1608: First factory at Surat; EIC = East India Company (formed 31 Dec 1600)", "Danish — 1620: First factory at Tranquebar (also called Serampore); Danish East India Company", "French — 1668: First factory at Surat; French East India Company formed 1664 under Colbert", "Company formation order: EIC 1600 → VOC 1602 → Danish 1616 → French 1664"], "flashcards": [{"q": "When and where did Vasco da Gama land in India?", "a": "1498 — Calicut (Kozhikode), Kerala. First European to reach India by sea."}, {"q": "When did the English (EIC) first arrive in India and where?", "a": "1608 — First factory at Surat. EIC was formed in 1600."}, {"q": "What does the mnemonic PDEDF stand for?", "a": "Portuguese → Dutch → English → Danish → French (arrival order: 1498→1605→1608→1620→1668)"}, {"q": "When was the East India Company (EIC) formed?", "a": "31 December 1600 by Charter of Queen Elizabeth I"}, {"q": "When was the Dutch VOC formed?", "a": "1602 — Vereenigde Oost-Indische Compagnie (world's first joint-stock company)"}, {"q": "What was the Battle of Swally (1612)?", "a": "English defeated Portuguese near Surat — marked English naval supremacy over Portuguese in India"}, {"q": "When and where did the French first set up a factory in India?", "a": "1668 — Surat. French East India Company was formed in 1664."}, {"q": "Where did the Danish East India Company set up their first factory?", "a": "Tranquebar (1620) — also known as Serampore"}, {"q": "Which company was the first to arrive in India after Vasco da Gama?", "a": "Dutch VOC — first factory at Masulipatnam, 1605"}, {"q": "By the 1750s, which two European powers remained as major rivals for India?", "a": "English (EIC) and French"}], "mcqs": [{"q": "Vasco da Gama landed at which place in India (1498)?", "o": ["Bombay", "Goa", "Calicut", "Surat"], "a": 2, "e": "Vasco da Gama landed at Calicut (Kozhikode), Kerala in 1498. He was the first European to reach India via sea route around Africa."}, {"q": "In what year was the English East India Company (EIC) formed?", "o": ["1588", "1600", "1608", "1615"], "a": 1, "e": "EIC was formed on 31 December 1600 by a  = English beat French; Paris 1763 = French finished"], "oneliners": ["Job Charnock founded Calcutta (Fort William) 1690", "Dupleix = first to use sepoys trained in European tactics", "After Treaty of Paris 1763, English had no European rival in India", "Battle of Wandiwash 1760 = Eyre Coote vs Count de Lally", "First English ambassador to Mughal court (1615); met Jahangir and obtained trading rights for EIC", "1639 — first fortified English settlement in India", "François Martin — established Pondicherry factory in 1673", "Used Indian sepoys trained in European-style warfare; interfered in Indian succession disputes to gain political influence", "Treaty of Aix-La-Chapelle (1748) — status quo ante, all territories restored", "Recalled to France in 1754; replaced by Godeheu who made peace with English", "English (Eyre Coote) defeated French (Count de Lally) — decisive victory ending French power in India", "French lost all political power; retained only Pondicherry, Chandernagore, Karikal, Mahe, Yanam as trading posts", "1690 — founded by Job Charnock", "1st: Austrian Succession War; 3rd: Seven Years War", "EIC Milestones: Formed 1600 → Surat factory 1608 → Thomas Roe met Jahangir 1613 → Fort St. George (Madras) 1639 → Bombay 1668 → Calcutta (Fort William) 1690", "Thomas Roe (1615): First English ambassador to Mughal court; obtained trading rights from Jahangir", "Fort St. George, Madras — 1639: First fortified English settlement in India", "Fort William, Calcutta — 1690: Founded by Job Charnock", "French in India: Pondicherry factory 1673 → François Martin = 1st Governor of French India → Dupleix became Governor-General 1742", "Dupleix's Strategy: Used Indian soldiers (sepoys) trained in European warfare — revolutionary concept; interfered in Indian succession disputes"], "flashcards": [{"q": "Who was Thomas Roe and what did he achieve?", "a": "First English ambassador to Mughal court (1615); met Jahangir and obtained trading rights for EIC"}, {"q": "When was Fort S ar in Europe (1756-63). Both were fought between England and France globally."}, {"q": "Dupleix's major contribution to European warfare in India was:", "o": ["Building iron forts", "Using Indian sepoys trained in European tactics", "Naval superiority", "Using cannon on elephants"], "a": 1, "e": "Dupleix's revolutionary strategy was training Indian sepoys in European-style warfare. This concept was adopted by all European powers and transformed warfare in India."}]}, {"id": "mughals_bengal_conquest", "label": "Last Mughals & Conquest of Bengal ⚔️", "icon": "⚔", "xp": 60, "seqIdx": 3, "facts": ["<b>Last Mughals after Aurangzeb (1707)</b>: Bahadur Shah I → Jahandar Shah → Farrukhsiyar → Muhammad Shah 'Rangeela' → Ahmad Shah → Alamgir II → Shah Alam II → Akbar Shah II → Bahadur Shah Zafar", "<b>Muhammad Shah 'Rangeela' (1719-48)</b>: Nadir Shah invaded Delhi 1739 — took Peacock Throne and Kohinoor diamond; Ahmad Shah Abdali also invaded", "<b>Siraj-ud-Daula</b>: Nawab of Bengal; seized Fort William June 1756 (<b>Black Hole of Calcutta</b> — 146 prisoners, 123 died)", "<b>Treaty of Alinagar — February 1757</b>: Between Siraj and Clive; Siraj restored EIC trading privileges", "<b>Battle of Plassey — 23 June 1757</b>: Robert Clive (EIC) vs Siraj-ud-Daula; Mir Jafar betrayed Siraj; Siraj fled and was killed; <b>Mir Jafar became Nawab</b>", "<b>Significance of Plassey</b>: EIC control over Bengal began; 'Foundation stone of British Empire in India'", "<b>Battle of Buxar — 22 October 1764</b>: Hector Munro (EIC) defeated combined forces of <b>Mir Kasim + Shuja-ud-Daula (Awadh) + Shah Alam II</b>", "<b>Treaty of Allahabad 1765</b>: Shah Alam II gave EIC Diwani Rights (revenue collection) of Bengal, Bihar, Orissa; Dual Government/Diwani system set up", "<b>Buxar more decisive than Plassey</b>: At Plassey EIC fought one Nawab; at Buxar they defeated 3 powers — cemented EIC control", "<b>Robert Clive</b>: Returned as Governor of Bengal 1765; introduced Dual Government (EIC collected revenue, Nawab maintained law & order)"], "table": "<table><thead><tr><th>Event</th><th>Date</th><th>Key Detail</th></tr></thead><tbody><tr><td>Black Hole of Calcutta</td><td>June 1756</td><td>146 imprisoned; 123 died in Fort William dungeon</td></tr><tr><td>Treaty of Alinagar</td><td>Feb 1757</td><td>Siraj restored EIC privileges</td></tr><tr><td>Battle of Plassey</td><td>23 June 1757</td><td>Clive vs Siraj; Mir Jafar betrayed; EIC wins</td></tr><tr><td>Battle of Buxar</td><td>22 Oct 1764</td><td>Munro vs Mir Kasim+Shuja+Shah Alam II</td></tr><tr><td>Treaty of Allahabad</td><td>1765</td><td>EIC got Diwani rights: Bengal, Bihar, Orissa</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — Battles of Bengal</b><br><b>P-B-A</b> = <b>P</b>lassey <b>B</b>efore <b>A</b>llahabad<br>Plassey (1757) → Buxar (1764) → Allahabad Treaty (1765)<br>Plassey = Mir JAFAR betrayed; Buxar = Mir KASIM fought<br>Mir Jafar → Mir Kasim → Mir Jafar (restored) = 'JKJ'", "traps": ["❌ Battle of Plassey was fought on 22 Oct 1757 → ✅ Plassey = <b>23 June 1757</b>; Buxar = 22 Oct 1764", "❌ Mir Kasim fought at Plassey → ✅ <b>Mir Jafar</b> betrayed at Plassey; Mir Kasim fought at Buxar", "❌ Plassey more decisive than Buxar → ✅ Buxar was more significant — EIC defeated 3 powers combined", "❌ EIC got Diwani rights after Plassey → ✅ Diwani rights came via <b>Treaty of Allahabad 1765</b> after Buxar", "❌ Black Hole had 100 prisoners → ✅ <b>146</b> imprisoned, <b>123</b> died (British claim — debated by historians)", "❌ Nadir Shah took the Peacock Throne and Taj Mahal → ✅ Nadir Shah took Peacock Throne + <b>Kohinoor diamond</b>"], "revision": ["Plassey 23 June 1757 = Clive vs Siraj, Mir Jafar betrayed", "Buxar 22 Oct 1764 = Mir Kasim + Shuja + Shah Alam II defeated", "Treaty Allahabad 1765 = Diwani rights Bengal, Bihar, Orissa", "Buxar > Plassey in significance", "Dual Government: EIC revenue, Nawab law & order (1765)"], "oneliners": ["Black Hole of Calcutta 1756 = 146 in, 123 dead", "Treaty of Alinag  fought?", "a": "23 June 1757 — Robert Clive (EIC) vs Siraj-ud-Daula (Nawab of Bengal). Mir Jafar betrayed Siraj."}, {"q": "What was the Battle of Buxar (1764) and why was it more significant than Plassey?", "a": "22 Oct 1764 — EIC defeated Mir Kasim + Shuja-ud-Daula + Shah Alam II. More significant as it defeated 3 powers, not just 1."}, {"q": "What were the Diwani Rights and when were they granted to EIC?", "a": "Revenue collection rights over Bengal, Bihar, Orissa — granted via Treaty of Allahabad, 1765"}, {"q": "What was the Black Hole of Calcutta?", "a": "June 1756: Siraj-ud-Daula imprisoned 146 EIC prisoners in Fort William dungeon; 123 died (British claim)"}, {"q": "Who became Nawab of Bengal after Battle of Plassey?", "a": "Mir Jafar — he betrayed Siraj-ud-Daula and was rewarded with the nawabship"}, {"q": "What was the Dual Government system?", "a": "Introduced by Clive 1765: EIC collected revenue (Diwani), Nawab handled law & order (Nizamat)"}, {"q": "What did Nadir Shah take from India in 1739?", "a": "Peacock Throne and Kohinoor diamond from Muhammad Shah 'Rangeela'"}, {"q": "What was the Treaty of Alinagar (1757)?", "a": "February 1757 — between Siraj-ud-Daula and Robert Clive; Siraj restored EIC's trading privileges"}, {"q": "Who was the last Mughal Emperor?", "a": "Bahadur Shah II (Zafar) — 1837-1858; exiled to Rangoon after 1857 Revolt"}, {"q": "Who defeated the combined army at Battle of Buxar?", "a": "Hector Munro (EIC) defeated Mir Kasim, Shuja-ud-Daula (Nawab of Awadh), and Shah Alam II"}], "mcqs": [{"q": "The Battle of Plassey was fought on:", "o": ["17 May 1757", "23 June 1757", "22 October 1757", "17 June 1764"], "a": 1, "e": "Battle of Plassey = 23 June 1757. Robert Clive defeated Siraj-ud-Daula. Mir Jafar betrayed Siraj, who fled and was later killed. This date is a major SSC trap — don't confuse with Buxar (22 Oct 1764)."}, {"q": "At the Battle of Buxar, EIC defeated the combined forces of:", "o": ["Siraj-ud-Daula + Mir Jafar + Shah Alam II", "Mir Kasim + Shuja-ud-Daula + Shah Alam II", "Mir Jafar + Nawab of Awadh + Nizam", "Tipu Sultan + Maratha + Nawab Bengal"], "a": 1, "e": "Battle of Buxar (22 Oct 1764): EIC (Hector Munro) defeated Mir Kasim (Bengal) + Shuja-ud-Daula (Awadh) + Shah Alam II (Mughal Emperor)."}, {"q": "Treaty of Allahabad (1765) granted EIC the Diwani rights over:", "o": ["Madras, Bombay, Calcutta", "Bengal, Bihar, Orissa", "Bengal and Awadh", "All of India"], "a": 1, "e": "Treaty of Allahabad 1765: Shah Alam II granted EIC the Diwani (revenue collection) rights over Bengal, Bihar, and Orissa. This was the foundation of British territorial empire."}, {"q": "The 'Black Hole of Calcutta' incident occurred in:", "o": ["1757", "1756", "1764", "1765"], "a": 1, "e": "Black Hole of Calcutta: June 1756. Siraj-ud-Daula captured Fort William; allegedly 146 prisoners were crammed in a small room, 123 died. This triggered Clive's expedition."}, {"q": "Which Mughal Emperor lost the Peacock Throne and Kohinoor to Nadir Shah?", "o": ["Aurangzeb", "Bahadur Shah I", "Muhammad Shah 'Rangeela'", "Ahmad Shah"], "a": 2, "e": "Muhammad Shah 'Rangeela' (1719-48) suffered Nadir Shah's invasion of Delhi in 1739. Nadir Shah looted the Peacock Throne and Kohinoor diamond and massacred thousands in Delhi."}, {"q": "Robert Clive introduced the 'Dual Government' in Bengal in:", "o": ["1757", "1760", "1765", "1772"], "a": 2, "e": "Robert Clive (as Governor of Bengal, 1765-67) introduced the Dual Government: EIC collected revenue (Diwani), Nawab handled civil administration (Nizamat). Warren Hastings abolished it in 1772."}, {"q": "Who betrayed Siraj-ud-Daula at the Battle of Plassey?", "o": ["Mir Kasim", "Mir Jafar", "Shah Alam II", "Shuja-ud-Daula"], "a": 1, "e": "Mir Jafar (commander of Siraj's army) betrayed Siraj at Plassey and held back his forces. He was rewarded with the Nawabship of Bengal."}, {"q": "Which battle is considered MORE decisive for British control of India?", "o": ["Battle of Plassey", "Battle of Buxar", "Battle of Wandiwash", "Battle of Adyar"], "a": 1, "e": "Battle of Buxar (1764) is considered more decisive — EIC defeated 3 major powers (Mir Kasim, Shuja-ud-Daula, Shah Alam II) vs only one Nawab at Plassey."}, {"q": "The Treaty of Alinagar (1757) was signed between:", "o": ["Clive and Mir Jafar", "Clive and Siraj-ud-Daula", "Warren Hastings and Nawab Bengal", "Shah Alam II and EIC"], "a": 1, "e": "Treaty of Alinagar (February 1757) between Robert Clive (EIC) and Siraj-ud-Daula. Siraj agreed to restore EIC's trading privileges. This was before Plassey."}, {"q": "The last Mughal Emperor Bahadur Shah Zafar was exiled to:", "o": ["London", "Lahore", "Rangoon", "Kabul"], "a": 2, "e": "After the 1857 Revolt, Bahadur Shah Zafar II was captured, tried, and exiled to Rangoon (Myanmar) where he died in 1862."}]}, {"id": "mysore_wars", "label": "4 Anglo-Mysore Wars", "icon": "🐯", "xp": 60, "seqIdx": 4, "facts": ["<b>1st Anglo-Mysore War (1767-69)</b>: Hyder Ali vs EIC (Bombay+Madras); Hyder Ali captured Madras; <b>Treaty of Madras 1769</b> — status quo; EIC humiliated", "<b>2nd Anglo-Mysore War (1780-84)</b>: Hyder Ali died 1782 (cancer); succeeded by <b>Tipu Sultan</b>; <b>Treaty of Mangalore 1784</b> — mutual restitution; last treaty of equality for EIC", "<b>3rd Anglo-Mysore War (1790-92)</b>: Lord Cornwallis; Tipu Sultan defeated; <b>Treaty of Srirangapatnam 1792</b> — Tipu gave up half his kingdom + ₹3.3 crore + 2 sons as hostages", "<b>4th Anglo-Mysore War (1799)</b>: Lord Wellesley (Subsidiary Alliance); <b>Tipu Sultan died 4 May 1799</b> at Srirangapatnam; Mysore returned to Wadiyar dynasty (Hindu rulers)", "<b>Tipu Sultan</b>: 'Tiger of Mysore'; introduced rocket artillery; opposed European expansion; allied with French; 'Citizen Tipu' (French Revolution influence)", "<b>Hyder Ali</b>: Self-made ruler; modernized Mysore army; strong navy; alliance with French and Marathas against EIC", "Key battles: <b>Battle of Pollilur (1780)</b> — Hyder Ali's greatest victory; Colonel Baillie's entire force captured", "Wellesley's Subsidiary Alliance: EIC provided military protection, Indian ruler paid for it → EIC controlled foreign policy", "After Tipu's death: Mysore given to <b>Krishna Raja Wadiyar III</b> (child king); Dewan Purnaiah administered", "Tipu Sultan's 2 sons held hostage after 3rd war → returned after 4th war (after Tipu's death)"], "table": "<table><thead><tr><th>War</th><th>Years</th><th>Viceroy/GG</th><th>Treaty/Result</th></tr></thead><tbody><tr><td>1st Anglo-Mysore</td><td>1767-69</td><td>Madras Governor</td><td>Treaty of Madras 1769 — EIC humiliated</td></tr><tr><td>2nd Anglo-Mysore</td><td>1780-84</td><td>Warren Hastings</td><td>Treaty of Mangalore 1784 — last equal treaty</td></tr><tr><td>3rd Anglo-Mysore</td><td>1790-92</td><td>Lord Cornwallis</td><td>Treaty of Srirangapatnam — Tipu gave half kingdom</td></tr><tr><td>4th Anglo-Mysore</td><td>1799</td><td>Lord Wellesley</td><td>Tipu died 4 May 1799; Mysore to Wadiyars</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — 4 Mysore Wars</b><br><b>MMC-W</b> = <b>M</b>adras → <b>M</b>angalore → <b>C</b>ornwallis(Srirangapatnam) → <b>W</b>ellesley(death)<br>Treaties: Madras(1769) → Mangalore(1784) → Srirangapatnam(1792) → Death(1799)<br>Hyder Ali died 1782 (2nd war) → Tipu Sultan took over", "traps": ["❌ Tipu Sultan died in the 3rd Anglo-Mysore War → ✅ Tipu died in the <b>4th war (4 May 1799)</b>", "❌ Treaty of Mangalore was humiliating for EIC → ✅ Treaty of Mangalore was the last <b>EQUAL</b> treaty; EIC was NOT humiliated", "❌ Hyder Ali captured Madras in 4th war → ✅ Hyder Ali captured Madras in the <b>1st war</b>", "❌ Cornwallis conducted 4th Mysore War → ✅ 3rd war = Cornwallis; 4th war = <b>Wellesley</b>", "❌ Tipu Sultan gave 3 sons as hostages → ✅ Tipu gave <b>2 sons</b> as hostages after 3rd war", "❌ Mysore given to Hyder Ali's family after Tipu's death → ✅ Mysore restored to <b>Wadiyar (Hindu)</b> dynasty"], "revision": ["4 wars: 1767-69, 1780-84, 1790-92, 1799", "Treaties: Madras, Mangalore, Srirangapatnam, Death", "Hyder Ali died 1782 (cancer) during 2nd war", "Tipu died 4 May 1799 — 4th war", "Mysore restored to Wadiyar dynasty after Tipu"], "oneliners": ["Tipu Sultan = Tiger of Mysore; introduced rocket artillery", "Battle of Pollilur 1780 = Hyder Ali's greatest victory over EIC", "Treaty of Srirangapatnam 1792 = Tipu gave half kingdom + 2 sons", "Subsidiary Alliance = EIC military protection in exchange for control", "Ended 2nd Anglo-Mysore War — mutual restitution of territories. Last treaty on equal terms between EIC and an Indian power.", "4 May 1799 — killed during the siege of Srirangapatnam in the 4th Anglo-Mysore War under Lord Wellesley", "Restored to the Wadiyar (Hindu) dynasty — Krishna Raja Wadiyar III became king; Dewan Purnaiah administered", "Ended 3rd Anglo-Mysore War: Tipu gave half his kingdom, paid ₹3.3 crore, and gave 2 sons as hostages to Cornwallis", "Captured Madras; forced Treaty of Madras 1769 — humiliated EIC with equal terms", "'Tiger of Mysore' — introduced rocket artillery (iron-cased rockets) used against British", "1782 — died of cancer during the 2nd Anglo-Mysore War; succeeded by Tipu Sultan", "EIC provided military protection to Indian rulers who paid for it — effectively gave EIC control of their foreign policy", "Battle of Pollilur (1780) — captured Colonel Baillie's entire force during 2nd Anglo-Mysore War", "Lord Cornwallis (Governor-General)", "1st Anglo-Mysore War (1767-69): Hyder Ali vs EIC (Bombay+Madras); Hyder Ali captured Madras; Treaty of Madras 1769 — status quo; EIC humiliated", "2nd Anglo-Mysore War (1780-84): Hyder Ali died 1782 (cancer); succeeded by Tipu Sultan; Treaty of Mangalore 1784 — mutual restitution; last treaty of equality for EIC", "3rd Anglo-Mysore War (1790-92): Lord Cornwallis; Tipu Sultan defeated; Treaty of Srirangapatnam 1792 — Tipu gave up half his kingdom + ₹3.3 crore + 2 sons as hostages", "4th Anglo-Mysore War (1799): Lord Wellesley (Subsidiary Alliance); Tipu Sultan died 4 May 1799 at Srirangapatnam; Mysore returned to Wadiyar dynasty (Hindu rulers)", "Tipu Sultan: 'Tiger of Mysore'; introduced rocket artillery; opposed European expansion; allied with French; 'Citizen Tipu' (French Revolution influence)", "Hyder Ali: Self-made ruler; modernized Mysore army; strong navy; alliance with French and Marathas against EIC"], "flashcards": [{"q": "What was the Treaty of Mangalore (1784) and why was it significant?", "a": "Ended 2nd Anglo-Mysore War — mutual restitution of territories. Last treaty on equal terms between EIC and an Indian power."}, {"q": "When and how did Tipu Sultan die?", "a": "4 May 1799 — killed during the siege of Srirangapatnam in the 4th Anglo-Mysore War under Lord Wellesley"}, {"q": "What happened to Mysore after Tipu Sultan's death?", "a": "Restored to the Wadiyar (Hindu) dynasty — Krishna Raja Wadiyar III became king; Dewan Purnaiah administered"}, {"q": "What was the Treaty of Srirangapatnam (1792)?", "a": "Ended 3rd Anglo-Mysore War: Tipu gave half his kingdom, paid ₹3.3 crore, and gave 2 sons as hostages to Cornwallis"}, {"q": "What did Hyder Ali achieve in the 1st Anglo-Mysore War?", "a": "Captured Madras; forced Treaty of Madras 1769 — humiliated EIC with equal terms"}, {"q": "What was Tipu Sultan's nickname and innovation?", "a": "'Tiger of Mysore' — introduced rocket artillery (iron-cased rockets) used against British"}, {"q": "When did Hyder Ali die and what caused his death?", "a": "1782 — died of cancer during the 2nd Anglo-Mysore War; succeeded by Tipu Sultan"}, {"q": "What was Wellesley's Subsidiary Alliance system?", "a": "EIC provided military protection to Indian rulers who paid for it — effectively gave EIC control of their foreign policy"}, {"q": "Which battle was Hyder Ali's greatest victory over EIC?", "a": "Battle of Pollilur (1780) — captured Colonel Baillie's entire force during 2nd Anglo-Mysore War"}, {"q": "Who led EIC in the 3rd Anglo-Mysore War?", "a": "Lord Cornwallis (Governor-General)"}], "mcqs": [{"q": "Tipu Sultan died on:", "o": ["22 Oct 1799", "4 May 1799", "17 June 1799", "1 March 1799"], "a": 1, "e": "Tipu Sultan died on 4 May 1799 during the siege of Srirangapatnam in the 4th Anglo-Mysore War under Lord Wellesley."}, {"q": "The Treaty of Mangalore (1784) ended:", "o": ["1st Anglo-Mysore War", "2nd Anglo-Mysore War", "3rd Anglo-Mysore War", "4th Anglo-Mysore War"], "a": 1, "e": "Treaty of Mangalore (1784) ended the 2nd Anglo-Mysore War. It was the LAST treaty on equal terms between EIC and an Indian state."}, {"q": "After Tipu Sultan's death, Mysore was restored to:", "o": ["Hyder Ali's family", "Mughal Empire", "Wadiyar dynasty", "British directly"], "a": 2, "e": "After Tipu's death, Mysore was restored to the Hindu Wadiyar dynasty (Krishna Raja Wadiyar III). Dewan Purnaiah administered on his behalf."}, {"q": "In the Treaty of Srirangapatnam (1792), Tipu Sultan gave how many sons as hostage?", "o": ["1", "2", "3", "4"], "a": 1, "e": "Tipu Sultan gave 2 sons (Abdul Khaliq and Muiz-ud-Din) as hostages to Cornwallis as part of the Treaty of Srirangapatnam (1792)."}, {"q": "Which Anglo-Mysore War saw Hyder Ali capture Madras?", "o": ["1st", "2nd", "3rd", "4th"], "a": 0, "e": "1st Anglo-Mysore War (1767-69): Hyder Ali advanced to the outskirts of Madras, forcing the humiliating Treaty of Madras (1769)."}, {"q": "Tipu Sultan's innovative weapon that troubled the British was:", "o": ["Iron Cannons", "Rocket Artillery", "Naval mines", "War elephants"], "a": 1, "e": "Tipu Sultan introduced iron-cased rocket artillery — an innovation that was studied by British (William Congreve) and led to development of Congreve rockets."}, {"q": "Lord Wellesley's 'Subsidiary Alliance' in the context of Mysore meant:", "o": ["Tipu became British ally", "EIC provided protection; controlled Mysore's foreign policy", "France protected Mysore", "Mysore joined EIC directly"], "a": 1, "e": "Wellesley's Subsidiary Alliance: EIC provided military protection; Indian ruler paid for it and surrendered control of foreign policy. Tipu REJECTED this and was destroyed."}, {"q": "Battle of Pollilur (1780) was Hyder Ali's greatest victory against:", "o": ["French", "Marathas", "EIC-Colonel Baillie's force", "Dutch"], "a": 2, "e": "Battle of Pollilur (September 1780): Hyder Ali captured Colonel Baillie's entire British force during the 2nd Anglo-Mysore War. Young Arthur Wellesley (future Duke of Wellington) was present."}, {"q": "The 4th Anglo-Mysore War was conducted under which Governor-General?", "o": ["Warren Hastings", "Lord Cornwallis", "Lord Wellesley", "Lord Hastings"], "a": 2, "e": "Lord Wellesley (Governor-General 1798-1805) conducted the 4th Anglo-Mysore War (1799) using his Subsidiary Alliance policy. Tipu rejected it and was defeated."}, {"q": "Hyder Ali died during which Anglo-Mysore War?", "o": ["1st", "2nd", "3rd", "4th"], "a": 1, "e": "Hyder Ali died of cancer in 1782 during the 2nd Anglo-Mysore War. His son Tipu Sultan continued the war and signed the Treaty of Mangalore (1784)."}]}, {"id": "maratha_sikh_wars", "label": "Anglo-Maratha & Anglo-Sikh Wars", "icon": "🏹", "xp": 60, "seqIdx": 5, "facts": ["<b>1st Anglo-Maratha War (1775-82)</b>: Warren Hastings; <b>Treaty of Salbai 1782</b> — status quo; EIC recognized Madhavrao II; 20 years of peace followed", "<b>2nd Anglo-Maratha War (1803-05)</b>: Lord Wellesley; Treaty of Bassein 1802 (Peshwa Baji Rao II accepted Subsidiary Alliance); Scindia and Bhonsle subdued", "<b>3rd Anglo-Maratha War (1817-18)</b>: Lord Hastings; Peshwas abolished; <b>Maratha Confederacy dissolved</b>; Peshwa Baji Rao II exiled to Bithur (pension of ₹8 lakh)", "<b>Pindari suppression (1817-18)</b>: Lord Hastings also suppressed Pindaris (mercenary marauders) simultaneously with 3rd Maratha War", "<b>1st Anglo-Sikh War (1845-46)</b>: After Maharaja Ranjit Singh's death (1839); Sikhs crossed Sutlej; Battles of Mudki, Ferozeshah, Aliwal, Sobraon; <b>Treaty of Lahore 1846</b ccepted it — major shift in Indian education policy."}, {"q": "Fort William College (1800) was established by:", "o": ["Warren Hastings", "Lord Cornwallis", "Lord Wellesley", "Lord Bentinck"], "a": 2, "e": "Fort William College was established by Lord Wellesley in 1800 at Calcutta to train British civil servants in Indian languages, customs and laws."}, {"q": "Pitt's India Act 1784 created a system of:", "o": ["Single control by Parliament", "Dual control (Board of Control + Court of Directors)", "Triple control", "Governor-General's direct rule"], "a": 1, "e": "Pitt's India Act 1784: Dual control — Board of Control (6 politicians, handled political/military) + Court of Directors (commercial). Remained till 1858."}, {"q": "Charter Act 1813 is associated with:", "o": ["Abolition of Sati", "Opening India to Christian missionaries", "Subsidiary Alliance", "Permanent Settlement"], "a": 1, "e": "Charter Act 1813 (Lord Minto I) opened India to Christian missionaries and set aside ₹1 lakh for Indian education. It ended EIC's trade monopoly except tea and China trade."}, {"q": "The Subsidiary Alliance system was introduced by:", "o": ["Lord Hastings", "Lord Cornwallis", "Lord Wellesley", "Lord Dalhousie"], "a": 2, "e": "Lord Wellesley introduced the Subsidiary Alliance system. Nizam of Hyderabad was the first to accept it (1798), followed by Mysore (after Tipu's death 1799)."}, {"q": "1st Anglo-Burmese War (1824-26) was conducted under:", "o": ["Lord Wellesley", "Lord Hastings", "Lord Amherst", "Lord Bentinck"], "a": 2, "e": "Lord Amherst (1823-28) conducted the 1st Anglo-Burmese War (1824-26), ended by Treaty of Yandabo 1826. Burma ceded Assam, Arakan, Tenasserim."}]}, {"id": "gg_dalhousie_reforms", "label": "Lord Dalhousie & Major Reforms", "icon": "🚂", "xp": 65, "seqIdx": 7, "facts": ["<b>Lord Dalhousie (1848-56)</b>: Greatest expansionist GG; <b>Doctrine of Lapse</b> — states without natural heir annexed", "States annexed by Doctrine of Lapse: <b>Satara 1848, Jaitpur+Sa y British (Lawrence, Seeley); 'National Revolt' by Disraeli; 'First War of Independence' by VD Savarkar (in his 1909 book)"], "flashcards": [{"q": "When and where did Mangal Pandey's revolt take place?", "a": "29 March 1857 at Barrackpore (Bengal) — 34th BNI regiment; attacked British officers; hanged 8 April 1857"}, {"q": "Who were the leaders of the 1857 Revolt at Delhi and Lucknow?", "a": "Delhi = Bahadur Shah Zafar II; Lucknow = Begum Hazrat Mahal"}, {"q": "What was the immediate cause of the 1857 Revolt?", "a": "Greased cartridges of Enfield rifle (beef + pork fat) — sepoys had to bite off tip, insulting both Hindus and Muslims"}, {"q": "Who called the 1857 Revolt 'First War of Independence'?", "a": "VD Savarkar — in his 1909 book '1857: The Indian War of Independence'"}, {"q": "Who was Rani Lakshmi Bai and what happened to her?", "a": "Led the 1857 revolt in Jhansi; defeated by Hugh Rose; died fighting at Gwalior in June 1858"}, {"q": "What were the key changes after 1857?", "a": "EIC rule ended; Crown took over (Queen's Proclamation 1 Nov 1858); GG became Viceroy; Secretary of State for India created"}, {"q": "When did the Meerut uprising take place?", "a": "10 May 1857 — 85 cavalry sepoys who refused cartridges were freed by fellow sepoys; march to Delhi began"}, {"q": "What were the three land revenue systems in British India?", "a": "Zamindari 1793 (Cornwallis, Bengal), Ryotwari 1820 (Munro, Madras/Bombay), Mahalwari 1833 (NW Provinces)"}, {"q": "Which British commander suppressed the revolt at Jhansi?", "a": "Hugh Rose — defeated Rani Lakshmi Bai; she died at Gwalior (June 1858)"}, {"q": "Why did the 1857 revolt fail?", "a": "Limited geographic spread, no unified command, no support from zamindars/educated class, lack of planning, absence of national consciousness"}], "mcqs": [{"q": "Mangal Pandey's revolt (29 March 1857) took place at:", "o": ["Meerut", "Barrackpore", "Delhi", "Lucknow"], "a": 1, "e": "Mangal Pandey (34th Bengal Native Infantry) revolted at Barrackpore (Bengal) on 29 March 1857. He attacked British officers Hewson and Baugh. He was hanged on 8 April 1857. Don't confuse with Meerut (10 May 1857)."}, {"q": "Who called the 1857 Revolt the 'First War of Independence'?", "o": ["Karl Marx", "Disraeli", "VD Savarkar", "RG Collingwood"], "a": 2, "e": "VD Savarkar in his 1909 book '1857: The Indian War of Independence' called it the First War of Independence. Disraeli called it 'National Revolt'. British called it 'Sepoy Mutiny'."}, {"q": "The leader of the 1857 revolt at Jhansi was:", "o": ["Begum Hazrat Mahal", "Rani Lakshmi Bai", "Nana Saheb", "Kunwar Singh"], "a": 1, "e": "Rani Lakshmi Bai led the revolt at Jhansi. She was defeated by Sir Hugh Rose, then continued fighting at Gwalior where she died in June 1858 — 'dressed like a man on horseback.'"}, {"q": "The Queen's Proclamation (Crown taking over India) was on:", "o": ["10 May 1857", "15 August 1857", "1 November 1858", "26 January 1858"], "a": 2, "e": "Queen's Proclamation: 1 November 1858. Crown took over India from EIC. Governor-General became Viceroy. Secretary of State for India (with council) replaced Board of Control."}, {"q": "Which land revenue system covered Bengal, Bihar, and Orissa?", "o": ["Ryotwari", "Mahalwari", "Permanent Settlement (Zamindari)", "All three"], "a": 2, "e": "Permanent Settlement (Zamindari) 1793 by Lord Cornwallis — applied to Bengal, Bihar, and Orissa. Fixed revenue with Zamindars permanently. Ryotwari (Madras/Bombay) and Mahalwari (NW Provinces) covered other regions."}, {"q": "The 1857 revolt leader at Lucknow was:", "o": ["Rani Lakshmi Bai", "Nana Saheb", "Begum Hazrat Mahal", "Kunwar Singh"], "a": 2, "e": "Begum Hazrat Mahal (wife of Nawab Wajid Ali Shah) led the revolt in Lucknow. She rallied people after Congress leaders were arrested and continued resistance until British retook Lucknow."}, {"q": "The Meerut uprising (the main start of 1857 Revolt) took place on:", "o": ["29 March 1857", "8 April 1857", "10 Ma , "Lord Irwin"], "a": 2, "e": "Lord Chelmsford (1916-21): Rowlatt Act 1919 (Black Act) and Jallianwala Bagh Massacre 13 April 1919 both occurred during his tenure. He was also associated with Montagu-Chelmsford Reforms (GoI Act 1919)."}, {"q": "'Do or Die' was the slogan of:", "o": ["Non-Cooperation Movement", "Civil Disobedience Movement", "Quit India Movement", "Swadeshi Movement"], "a": 2, "e": "'Do or Die' (Karo ya Maro) was Gandhi's call at the launch of Quit India Movement on 8 August 1942 at Gowalia Tank, Bombay. NCM slogan = 'Swaraj in one year'; CDM = 'Purna Swaraj'."}, {"q": "VD Savarkar described 1857 as 'First War of Independence' in his book published in:", "o": ["1857", "1885", "1909", "1919"], "a": 2, "e": "VD Savarkar wrote '1857: The Indian War of Independence' in 1909 (published in London as it was banned in India). He was the first to call it the First War of Independence — not a mere mutiny."}, {"q": "The Indian Independence Act was passed by the British Parliament in:", "o": ["June 1947", "July 1947", "August 1947", "November 1947"], "a": 1, "e": "Indian Independence Act was passed in July 1947 by the British Parliament. It followed the Mountbatten Plan (3 June 1947) and came into effect on 14-15 August 1947."}]}];
function save(){ss(SK,JSON.stringify(st));}
function load(){try{const d=gs(SK);if(d)st=JSON.parse(d);}catch(e){st={};}}
function calcPct(node){const r=st[PREFIX+node.id+'_results'];if(!r||!r.length)return 0;const s=r[r.length-1];return Math.round((s.correct/s.total)*100);}
function calcAvgPct(){const reg=CHAPTERS.filter(c=>c.type!=='gold');if(!reg.length)return 0;const sum=reg.reduce((a,c)=>a+calcPct(c),0);return Math.round(sum/reg.length);}
function rebuildUnlocked(){CHAPTERS.forEach((c,i)=>{if(c.type==='gold'){c._unlocked=(calcAvgPct()>=80);}else if(i===0){c._unlocked=true;}else{const prev=CHAPTERS[i-1];c._unlocked=(prev&&!prev.type&&calcPct(prev)>=60);}});}
function updateTopbar(){const xp=st[PREFIX+'xp']||0;document.getElementById('tb-xp').textContent='⚡ '+xp+' XP';document.getElementById('tb-pct').textContent='📊 '+calcAvgPct()+'%';}
function buildSidebar(){rebuildUnlocked();const c=document.getElementById('sidebar-inner');c.innerHTML='';CHAPTERS.forEach(n=>{const div=document.createElement('div');div.className='node-item'+(n._unlocked?'':' locked')+(n.type==='gold'?' gold-node':'');div.onclick=()=>{if(n._unlocked){selectNode(n);if(window.innerWidth<=768){document.getElementById('aside').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('show');}}else{showToast('🔒 Complete previous node with 60%+ to unlock!');}};const pct=calcPct(n);div.innerHTML=`<span class="node-icon">${n.icon}</span><div class="node-info"><div class="node-label">${n.label}</div><div class="node-xp">⚡${n.xp} XP${n.type==='gold'?' · Avg 80%+ required':''}</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;c.appendChild(div);});}
function selectNode(node){st[PREFIX+'current']=node.id;save();buildSidebar();updateTopbar();renderContent(node);}
function switchTab(nodeId,tab){st[PREFIX+nodeId+'_tab']=tab;save();const node=CHAPTERS.find(c=>c.id===nodeId);if(node)renderContent(node);}
function renderContent(node){document.getElementById('tb-title').textContent=node.icon+' '+node.label;const mc=document.getElementById('node-content');mc.innerHTML='';if(node.type==='gold'){renderGold(node,mc);return;}const tab=st[PREFIX+node.id+'_tab']||'learn';const tabs=`<div class="tab-bar"><button class="tab-btn${tab==='learn'?' active':''}" onclick="switchTab('${node.id}','learn')">📖 LEARN</button><button class="tab-btn${tab==='flash'?' active':''}" onclick="switchTab('${node.id}','flash')">🃏 FLASHCARDS</button><button class="tab-btn${tab==='test'?' active':''}" onclick="switchTab('${node.id}','test')">📝 TEST</button></div>`;const prev=st[PREFIX+node.id+'_results'];const badge=prev&&prev.length?`<div class="score-badge">Last score: ${prev[prev.length-1].pct}% (${prev[prev.length-1].correct}/${prev[prev.length-1].total})</div>`:'';mc.innerHTML=tabs+badge;if(tab==='learn')renderLearn(node,mc);else if(tab==='flash')renderFlash(node,mc);else renderTest(node,mc);}
function renderLearn(node,mc){const d=document.createElement('div');d.className='learn-body';d.innerHTML=`<h2>${node.icon} ${node.label}</h2><div>${node.facts.map(f=>`<div class="fact-item">${f}</div>`).join('')}</div><h3>📊 Quick Reference Table</h3><div class="table-wrap">${node.table}</div><h3>🧠 Memory Hook</h3><div class="mnemonic-box">${node.mn}</div><div class="traps-section"><h3>⚠️ Exam Traps</h3>${node.traps.map(t=>`<div class="trap-item">${t}</div>`).join('')}</div><div class="revision-section"><h3>✅ Rapid Revision</h3><ul>${node.revision.map(r=>`<li>${r}</li>`).join('')}</ul></div><div class="oneliners-section"><h3>💡 One-Liners</h3>${node.oneliners.map(o=>`<div class="oneliner">${o}</div>`).join('')}</div>`;mc.appendChild(d);}
function renderFlash(node,mc){const d=document.createElement('div');d.className='flash-body';d.innerHTML=`<div class="flash-counter">${node.flashcards.length} cards · tap any card to flip</div><div class="flash-grid">${node.flashcards.map(c=>`<div class="flash-card" onclick="this.classList.toggle('flipped')"><div class="flash-front"><div class="flash-q">${c.q}</div><div class="flip-hint">Tap to reveal</div></div><div class="flash-back"><div class="flash-a">${c.a}</div></div></div>`).join('')}</div>`;mc.appendChild(d);}
function navFlash(nodeId,dir){const node=CHAPTERS.find(c=>c.id===nodeId);let idx=st[PREFIX+nodeId+'_fi']||0;idx=Math.max(0,Math.min(node.flashcards.length-1,idx+dir));st[PREFIX+nodeId+'_fi']=idx;save();renderContent(node);}
function renderTest(node,mc){const d=document.createElement('div');d.className='test-body';const answered=st[PREFIX+node.id+'_ans']||{};const submitted=st[PREFIX+node.id+'_sub'];node.mcqs.forEach((q,qi)=>{const qd=document.createElement('div');qd.className='q-block'+(submitted?(answered[qi]===q.a?' correct':' wrong'):'');qd.innerHTML=`<div class="q-text">Q${qi+1}. ${q.q}</div><div class="opts">${q.o.map((o,oi)=>`<label class="opt-label${answered[qi]===oi?' selected':''}${submitted?(oi===q.a?' right-ans':(answered[qi]===oi?' wrong-ans':'')):''}"><input type="radio" name="q${node.id}_${qi}" value="${oi}" ${answered[qi]===oi?'checked':''} ${submitted?'disabled':''} onchange="setAns('${node.id}',${qi},${oi})"> ${o}</label>`).join('')}${submitted?`<div class="exp-box">💡 ${q.e}</div>`:''}`;d.appendChild(qd);});if(!submitted){const btn=document.createElement('button');btn.className='submit-btn';btn.textContent='Submit Answers';btn.onclick=()=>submitTest(node.id);d.appendChild(btn);}else{const res=st[PREFIX+node.id+'_results'];renderResult(node,d,res[res.length-1]);}mc.appendChild(d);}
function setAns(nodeId,qi,oi){const k=PREFIX+nodeId+'_ans';const a=st[k]||{};a[qi]=oi;st[k]=a;save();}
function submitTest(nodeId){const node=CHAPTERS.find(c=>c.id===nodeId);const answered=st[PREFIX+nodeId+'_ans']||{};let correct=0;node.mcqs.forEach((q,qi)=>{if(answered[qi]===q.a)correct++;});const pct=Math.round((correct/node.mcqs.length)*100);const res={correct,total:node.mcqs.length,pct};const key=PREFIX+nodeId+'_results';if(!st[key])st[key]=[];st[key].push(res);st[PREFIX+nodeId+'_sub']=true;if(pct>=60&&!(st[PREFIX+'xp_'+nodeId])){st[PREFIX+'xp']=(st[PREFIX+'xp']||0)+node.xp;st[PREFIX+'xp_'+nodeId]=true;}save();rebuildUnlocked();buildSidebar();updateTopbar();renderContent(node);}
function renderResult(node,d,res){const pass=res.pct>=60;const rb=document.createElement('div');rb.className='result-banner '+(pass?'pass':'fail');rb.innerHTML=pass?`🏆 ${res.pct}% — Passed! +${node.xp} XP earned`:`❌ ${res.pct}% — Need 60%+ to unlock next node`;d.appendChild(rb);const rb2=document.createElement('button');rb2.className='submit-btn';rb2.textContent='Retry Test';rb2.onclick=()=>{delete st[PREFIX+node.id+'_sub'];delete st[PREFIX+node.id+'_ans'];save();renderContent(node);};d.appendChild(rb2);}
function renderGold(node,mc){const avg=calcAvgPct();if(avg<80){mc.innerHTML=`<div class="gold-locked-msg"><div style="font-size:3rem">⭐</div><h2>Golden Challenge Locked</h2><p>Complete all regular nodes with average 80%+ to unlock.</p><p style="margin-top:1rem;color:var(--amber)">Your current average: <b>${avg}%</b> / 80% required</p></div>`;return;}const tab=st[PREFIX+node.id+'_tab']||'learn';const tabs=`<div class="tab-bar"><button class="tab-btn${tab==='learn'?' active':''}" onclick="switchTab('${node.id}','learn')">📖 GOLD FACTS</button><button class="tab-btn${tab==='test'?' active':''}" onclick="switchTab('${node.id}','test')">🏆 GOLD TEST</button></div>`;mc.innerHTML=tabs;if(tab==='learn'){const d=document.createElement('div');d.className='learn-body';d.innerHTML=`<div class="gold-header"><span>⭐ MASTER CHALLENGE: ALL PART 1 TOPICS</span><span>Avg: ${avg}% | Required: 80%</span></div><h3 style="color:var(--gold)">📌 Master Facts (Cross-Topic)</h3><div class="gold-facts-ticker">${node.goldFacts.map((f,i)=>`<div class="fact-item" style="margin-bottom:.3rem">${i+1}. ${f}</div>`).join('')}</div><div class="gold-traps"><h3 style="color:var(--gold);margin-bottom:.5rem">⚠️ Critical SSC Traps</h3>${node.goldTraps.map(t=>`<div class="trap-item">${t}</div>`).join('')}</div>`;mc.appendChild(d);}else{const answered=st[PREFIX+node.id+'_ans']||{};const submitted=st[PREFIX+node.id+'_sub'];const d=document.createElement('div');d.className='test-body';node.goldMCQs.forEach((q,qi)=>{const qd=document.createElement('div');qd.className='q-block'+(submitted?(answered[qi]===q.a?' correct':' wrong'):'');qd.innerHTML=`<div class="q-text" style="color:var(--gold)">G${qi+1}. ${q.q}</div><div class="opts">${q.o.map((o,oi)=>`<label class="opt-label${answered[qi]===oi?' selected':''}${submitted?(oi===q.a?' right-ans':(answered[qi]===oi?' wrong-ans':'')):''}"><input type="radio" name="gq${qi}" value="${oi}" ${answered[qi]===oi?'checked':''} ${submitted?'disabled':''} onchange="setAns('${node.id}',${qi},${oi})"> ${o}</label>`).join('')}${submitted?`<div class="exp-box">💡 ${q.e}</div>`:''}`;d.appendChild(qd);});if(!submitted){const btn=document.createElement('button');btn.className='submit-btn gold-submit';btn.textContent='Submit Golden Test';btn.onclick=()=>submitGoldTest(node.id);d.appendChild(btn);}else{renderGoldResult(node,d);}mc.appendChild(d);}}
function submitGoldTest(nodeId){const node=CHAPTERS.find(c=>c.id===nodeId);const answered=st[PREFIX+nodeId+'_ans']||{};let correct=0;node.goldMCQs.forEach((q,qi)=>{if(answered[qi]===q.a)correct++;});const pct=Math.round((correct/node.goldMCQs.length)*100);const res={correct,total:node.goldMCQs.length,pct};const key=PREFIX+nodeId+'_results';if(!st[key])st[key]=[];st[key].push(res);st[PREFIX+nodeId+'_sub']=true;if(pct>=80&&!(st[PREFIX+'xp_'+nodeId])){st[PREFIX+'xp']=(st[PREFIX+'xp']||0)+node.xp;st[PREFIX+'xp_'+nodeId]=true;showToast('🏆 GOLDEN NODE CLEARED! +200 XP!');}save();updateTopbar();renderContent(node);}
function renderGoldResult(node,d){const res=st[PREFIX+node.id+'_results'];const r=res[res.length-1];const pass=r.pct>=80;const rb=document.createElement('div');rb.className='result-banner '+(pass?'pass':'fail');rb.innerHTML=pass?`🏆 ${r.pct}% — GOLD CLEARED! +200 XP!`:`❌ ${r.pct}% — Need 80%+ for Golden Node`;d.appendChild(rb);const rb2=document.createElement('button');rb2.className='submit-btn gold-submit';rb2.textContent='Retry Gold Test';rb2.onclick=()=>{delete st[PREFIX+node.id+'_sub'];delete st[PREFIX+node.id+'_ans'];save();renderContent(node);};d.appendChild(rb2);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function toggleDrawer(){const a=document.getElementById('aside');const o=document.getElementById('drawer-overlay');a.classList.toggle('open');o.classList.toggle('show');}
let st={};
load();
document.getElementById('menu-btn').addEventListener('click',toggleDrawer);
document.getElementById('drawer-overlay').addEventListener('click',toggleDrawer);
let _mToken=null,_mSid=null;
function initMetrics(){
  try{
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  }catch(e){}
  _mSid='mod1-'+(Date.now().toString(36));
}
function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})}).catch(()=>{});
}
document.addEventListener('DOMContentLoaded',function(){rebuildUnlocked();buildSidebar();updateTopbar();initMetrics();track('material_opened',{material:'modern_history_part1'});const cur=st[PREFIX+'current'];const node=cur?CHAPTERS.find(c=>c.id===cur):null;if(node&&node._unlocked){renderContent(node);}else{document.getElementById('node-content').innerHTML=`<div class="welcome-panel"><h1>📜 Modern History Part 1</h1><p style="color:var(--ink2);max-width:500px;margin:0 auto">Master the arrival of Europeans, Carnatic Wars, Bengal, Mysore and Maratha conflicts for SSC Exams.</p><div class="welcome-stats"><div>📚 13 Learning Nodes</div><div>⭐ 1 Golden Challenge</div><div>🃏 130 Flashcards</div><div>📝 195 MCQs</div></div><p style="margin-top:1.5rem;color:var(--ink3);font-size:.85rem">Click a node in the sidebar to begin!</p></div>`;}});
</script></body></html>
