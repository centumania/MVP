<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Physics Map · Part 5 — Modern & Applied Physics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1611;--panel:#131d17;--panel2:#182318;--line:#1e2e22;--teal:#22d3c8;--green:#3dd68c;--gold:#f4c430;--red:#f06b6b;--ink1:#e8f5f0;--ink2:#9dc4b4;--ink3:#5a8a72;--mono:'JetBrains Mono',monospace;--serif:'Bebas Neue',sans-serif;--sans:'DM Sans',sans-serif;--nav-h:56px;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink1);font-family:var(--sans)}
.shell{display:flex;flex-direction:column;height:100%}
.topbar{height:var(--nav-h);background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:12px;flex-shrink:0;z-index:10}
.logo{font-family:var(--serif);font-size:18px;color:var(--green);letter-spacing:1px;display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-stats{margin-left:auto;display:flex;gap:16px;align-items:center}
.ns{font-family:var(--mono);font-size:11px;color:var(--ink3);display:flex;flex-direction:column;align-items:center;line-height:1.2}
.ns b{color:var(--green);font-size:13px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);opacity:0;transition:opacity .3s;margin-left:8px}
.sync-dot.show{opacity:1}
.body-wrap{display:flex;flex:1;overflow:hidden}
aside{width:260px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.side-hd{padding:12px 14px 8px;font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--ink3)}
#sideInner{flex:1;overflow-y:auto;padding:0 6px 20px}
#sideInner::-webkit-scrollbar{width:4px}#sideInner::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
main{flex:1;overflow:hidden;display:flex;flex-direction:column}
#mainArea{flex:1;overflow-y:auto;padding:0}
#mainArea::-webkit-scrollbar{width:5px}#mainArea::-webkit-scrollbar-thumb{background:var(--line)}
.bot-nav{height:52px;background:var(--panel);border-top:1px solid var(--line);display:flex;align-items:stretch;flex-shrink:0}
.bot-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--ink3);font-family:var(--mono);font-size:9px;cursor:pointer;letter-spacing:1px;transition:color .2s;min-height:44px}
.bot-btn:hover,.bot-btn.active{color:var(--green)}
.bot-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ch-group{margin-bottom:2px}
.ch-toggle{width:100%;background:none;border:none;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--ink2);font-family:var(--mono);font-size:10px;letter-spacing:.5px;border-radius:6px;transition:background .15s;text-align:left}
.ch-toggle:hover,.ch-toggle.open{background:var(--line);color:var(--ink1)}
.cht-pct{margin-left:auto;color:var(--teal);font-size:10px}
.node-items{display:none}
.ch-group.expanded .node-items{display:block}
.ni-btn{width:100%;background:none;border:none;padding:7px 10px 7px 22px;display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--ink3);font-family:var(--sans);font-size:12px;border-radius:4px;transition:background .12s,color .12s;text-align:left;min-height:44px}
.ni-btn:hover{background:rgba(255,255,255,.04);color:var(--ink2)}
.ni-btn.current{background:rgba(61,214,140,.08);color:var(--green)}
.ni-btn.done{color:var(--ink2)}
.ni-btn.locked{opacity:.45;cursor:default}
.ni-tag{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:3px;margin-left:auto;letter-spacing:.5px}
.ni-tag.trap{background:rgba(240,107,107,.12);color:var(--red)}
.ni-tag.hidden{background:rgba(122,122,255,.12);color:#9fa8ff}
.ni-tag.gold{background:rgba(244,196,48,.12);color:var(--gold)}
#viewWrap{min-height:100%;padding-bottom:40px}
.dash{padding:28px clamp(14px,3vw,48px) 80px;max-width:680px;margin:0 auto}
.dash-t{font-family:var(--serif);font-size:clamp(28px,5vw,46px);font-style:italic;color:var(--green);letter-spacing:1px;line-height:1}
.dash-s{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-bottom:24px;margin-top:4px;letter-spacing:1px}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.dc{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px 8px;text-align:center}
.dc .dv{font-family:var(--serif);font-size:26px;line-height:1}
.dc .dl{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:1px;margin-top:2px}
.dc.gold .dv{color:var(--gold)}.dc.g .dv{color:var(--green)}.dc.r .dv{color:var(--red)}.dc.b .dv{color:var(--teal)}
.ch-prog{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}
.cpr{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:var(--mono);font-size:11px}
.cpr:last-child{margin-bottom:0}
.cpr-n{width:160px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.cpr-bar{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.cpr-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s}
.cpr-pct{width:36px;text-align:right;color:var(--teal);font-size:10px}
.mentor-box{background:rgba(240,107,107,.07);border:1px solid rgba(240,107,107,.2);border-radius:10px;padding:14px;margin-bottom:16px}
.mentor-box h3{font-family:var(--mono);font-size:10px;color:var(--red);letter-spacing:1px;margin-bottom:8px}
.mentor-box ul{padding-left:16px;font-size:12px;color:var(--ink2);line-height:1.8}
.start-btn{width:100%;padding:14px;background:var(--green);color:#0e1611;font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:2px;border:none;border-radius:10px;cursor:pointer;margin-top:8px;min-height:48px}
.start-btn:hover{background:#4aeaa0}
.node-view{padding:20px clamp(14px,3vw,40px) 60px;max-width:760px;margin:0 auto}
.node-hd{margin-bottom:18px}
.node-badge{display:inline-block;font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:2px;margin-bottom:8px}
.node-badge.regular{background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.2)}
.node-badge.trap{background:rgba(240,107,107,.1);color:var(--red);border:1px solid rgba(240,107,107,.2)}
.node-badge.gold{background:rgba(244,196,48,.1);color:var(--gold);border:1px solid rgba(244,196,48,.2)}
.nt{font-family:var(--serif);font-size:clamp(22px,4vw,34px);color:var(--ink1);line-height:1.1;margin-bottom:6px}
.xp-pill{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:1px}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--panel2);padding:4px;border-radius:8px;border:1px solid var(--line)}
.tab{flex:1;padding:8px;background:none;border:none;color:var(--ink3);font-family:var(--mono);font-size:11px;cursor:pointer;border-radius:5px;letter-spacing:.5px;min-height:40px}
.tab.on{background:var(--line);color:var(--ink1)}
.diag-box{background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px}
.diag-head{font-family:var(--mono);font-size:9px;color:var(--ink3);padding:8px 14px;letter-spacing:2px;border-bottom:1px solid var(--line)}
.diag-body{padding:12px;overflow-x:auto}
.diag-body svg{max-width:100%;height:auto}
.fact-block{margin-bottom:16px}
.fb-head{font-family:var(--mono);font-size:9px;color:var(--teal);letter-spacing:2px;margin-bottom:8px}
.facts{padding-left:0;list-style:none}
.facts li{padding:6px 0 6px 18px;border-bottom:1px solid var(--line);position:relative;font-size:13px;line-height:1.6;color:var(--ink2)}
.facts li:last-child{border-bottom:none}
.facts li::before{content:"›";position:absolute;left:0;color:var(--green);font-weight:700}
.facts li b{color:var(--ink1)}
.section-lbl{font-family:var(--mono);font-size:9px;color:var(--teal);letter-spacing:2px;margin:16px 0 8px}
.tbl-wrap{overflow-x:auto;margin-bottom:16px;border-radius:8px;border:1px solid var(--line)}
table.dt{width:100%;border-collapse:collapse;font-size:12px}
table.dt th{background:var(--panel2);padding:8px 12px;font-family:var(--mono);font-size:10px;color:var(--teal);text-align:left;letter-spacing:.5px;white-space:nowrap}
table.dt td{padding:8px 12px;border-top:1px solid var(--line);color:var(--ink2);line-height:1.5}
table.dt tr:hover td{background:rgba(255,255,255,.02)}
table.dt td b{color:var(--ink1)}
.trap-block{background:rgba(240,107,107,.07);border:1px solid rgba(240,107,107,.18);border-radius:10px;padding:14px;margin-bottom:16px}
.tb-h{font-family:var(--mono);font-size:9px;color:var(--red);letter-spacing:2px;margin-bottom:10px}
.trap-block ul{padding-left:18px}.trap-block li{color:var(--ink2);font-size:13px;line-height:1.7;margin-bottom:4px}
.insight-block{background:rgba(244,196,48,.06);border:1px solid rgba(244,196,48,.15);border-radius:10px;padding:14px;margin-bottom:16px}
.ib-h{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;margin-bottom:8px}
.insight-block p{font-size:13px;color:var(--ink2);line-height:1.7}
.mcq-list{display:flex;flex-direction:column;gap:14px}
.mcq-card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.mcq-q{padding:12px 14px;font-size:13px;color:var(--ink1);line-height:1.6;display:flex;gap:10px}
.mcq-qn{font-family:var(--mono);font-size:10px;color:var(--teal);flex-shrink:0;padding-top:1px}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px 12px}
.mopt{padding:9px 12px;background:var(--line);border:1px solid transparent;border-radius:7px;color:var(--ink2);font-size:12px;cursor:pointer;text-align:left;transition:all .15s;min-height:44px}
.mopt:hover:not(:disabled){background:rgba(61,214,140,.1);border-color:rgba(61,214,140,.25);color:var(--ink1)}
.mopt.show-correct{border-color:var(--green)!important;background:rgba(61,214,140,.15)!important;color:var(--green)!important}
.mopt.correct{background:rgba(61,214,140,.18);border-color:var(--green);color:var(--green)}
.mopt.wrong{background:rgba(240,107,107,.18);border-color:var(--red);color:var(--red)}
.mopt:disabled{cursor:default}
.mcq-fb{padding:0 14px;font-size:12px;color:var(--ink3);max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.mcq-fb.show{max-height:140px;padding:10px 14px}
.mcq-fb.show.right{color:var(--green)}.mcq-fb.show.wrong{color:var(--red)}
.mcq-score{text-align:center;font-family:var(--mono);font-size:12px;color:var(--ink3);padding:12px}
.mcq-score span{color:var(--gold);font-weight:700}
.node-complete-banner{display:flex;align-items:center;gap:14px;background:rgba(61,214,140,.07);border:1px solid rgba(61,214,140,.2);border-radius:10px;padding:14px;margin-top:16px}
.ncb-icon{font-size:28px}
.ncb-title{font-family:var(--mono);font-size:11px;color:var(--green);letter-spacing:1px}
.ncb-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.golden-block{background:rgba(244,196,48,.06);border:1px solid rgba(244,196,48,.2);border-radius:12px;padding:18px}
.gb-h{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;margin-bottom:12px}
.golden-block ul{padding-left:0;list-style:none}
.golden-block li{padding:7px 0;border-bottom:1px solid rgba(244,196,48,.08);font-size:13px;color:var(--ink2);line-height:1.6;padding-left:16px;position:relative}
.golden-block li::before{content:"⚡";position:absolute;left:0;font-size:10px}
.golden-block li b{color:var(--ink1)}
.locked-view{padding:60px 20px;text-align:center}
.lv-ico{font-size:48px;margin-bottom:12px}
.locked-view h2{font-family:var(--serif);font-size:28px;color:var(--ink3);margin-bottom:8px}
.locked-view p{font-size:13px;color:var(--ink3);margin-bottom:16px}
.lock-req-list{display:flex;flex-direction:column;gap:6px;align-items:center}
.lreq{font-family:var(--mono);font-size:11px;color:var(--red);padding:6px 14px;border:1px solid rgba(240,107,107,.2);border-radius:6px}
.lreq.met{color:var(--green);border-color:rgba(61,214,140,.2)}
.node-nav{display:flex;gap:8px;margin-top:24px;padding-top:16px;border-top:1px solid var(--line)}
.nnav{flex:1;padding:10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--ink2);font-family:var(--mono);font-size:11px;cursor:pointer;min-height:44px}
.nnav:hover{border-color:var(--teal);color:var(--teal)}
.nnav.primary{background:rgba(61,214,140,.1);border-color:var(--green);color:var(--green)}
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--green);border-radius:8px;padding:8px 16px;font-family:var(--mono);font-size:12px;display:flex;gap:8px;align-items:center;opacity:0;pointer-events:none;transition:all .3s;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toastVal{color:var(--gold)}#toastMsg{color:var(--ink2)}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40}
.mob-overlay.show{display:block}
.mob-drawer{position:fixed;left:0;top:0;bottom:52px;width:80vw;max-width:300px;background:var(--panel);border-right:1px solid var(--line);z-index:45;transform:translateX(-100%);transition:transform .25s;display:flex;flex-direction:column;overflow:hidden}
.mob-drawer.open{transform:translateX(0)}
.mob-drawer-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.mob-drawer-hd span{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:2px}
.mob-drawer-close{background:none;border:none;color:var(--ink3);font-size:18px;cursor:pointer;padding:4px 8px;min-height:44px;min-width:44px}
#mobSideInner{flex:1;overflow-y:auto;padding:0 6px 20px}
.mob-stats{display:none;background:var(--panel);border-bottom:1px solid var(--line);padding:6px 14px;gap:16px;font-family:var(--mono);font-size:10px}
@media(max-width:720px){
  aside{display:none}
  #mainArea{padding:0}
  .dash{padding:18px 14px 80px}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .mcq-opts{grid-template-columns:1fr}
  .node-view{padding:16px 12px 80px}
  .mopt,.nnav,.ni-btn{min-height:44px}
  .tab{min-height:40px}
  .mob-stats{display:flex}
}
</style>
<body>
<div class="shell">
<nav class="topbar">
  <div class="logo"><span class="logo-dot"></span>Physics Map</div>
  <div class="nav-stats">
    <div class="ns"><b id="hXP">0</b><span>XP</span></div>
    <div class="ns"><b id="hVis">0/0</b><span>Nodes</span></div>
    <div class="ns"><b id="hTrap">0/0</b><span>Traps</span></div>
  </div>
  <div class="sync-dot" id="syncDot"></div>
</nav>
<div class="mob-stats">
  <div style="display:flex;flex-direction:column;align-items:center"><b id="mhXP" style="color:var(--green);font-size:12px">0</b><span style="color:var(--ink3);font-size:8px;letter-spacing:1px">XP</span></div>
  <div style="display:flex;flex-direction:column;align-items:center"><b id="mhVis" style="color:var(--green);font-size:12px">0/0</b><span style="color:var(--ink3);font-size:8px;letter-spacing:1px">NODES</span></div>
  <div style="display:flex;flex-direction:column;align-items:center"><b id="mhTrap" style="color:var(--red);font-size:12px">0/0</b><span style="color:var(--ink3);font-size:8px;letter-spacing:1px">TRAPS</span></div>
</div>
<div class="body-wrap">
  <aside><div class="side-hd">TOPICS</div><div id="sideInner"></div></aside>
  <main><div id="mainArea"><div id="viewWrap"></div></div></main>
</div>
<nav class="bot-nav">
  <button class="bot-btn active" onclick="showDash()">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Home
  </button>
  <button class="bot-btn" onclick="openDrawer()">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Topics
  </button>
  <button class="bot-btn" onclick="goTraps()">
    <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Traps
  </button>
</nav>
</div>
<div class="mob-overlay" id="mobOverlay" onclick="closeDrawer()"></div>
<div class="mob-drawer" id="mobDrawer">
  <div class="mob-drawer-hd"><span>TOPICS</span><button class="mob-drawer-close" onclick="closeDrawer()">✕</button></div>
  <div id="mobSideInner"></div>
</div>
<div class="toast" id="toast"><span id="toastVal"></span><span id="toastMsg"></span></div>
<script>

const DIAGRAMS={

const SKEY="centumania_physics5_v1";
const AKEY="centumania_physics5_astore_v1";
const BACKEND_URL=""; // Set to your Supabase Edge Function URL

let ASTORE={};
try{const r=localStorage.getItem(SKEY);if(r)S=Object.assign(S,JSON.parse(r));}catch(e){}
try{const r=localStorage.getItem(AKEY);if(r)ASTORE=Object.assign(ASTORE,JSON.parse(r));}catch(e){}
function save(){try{localStorage.setItem(SKEY,JSON.stringify(S));}catch(e){}}
function asave(){try{localStorage.setItem(AKEY,JSON.stringify(ASTORE));}catch(e){}}

// ── ANALYTICS ENGINE ──────────────────────────────────────────────────────────
let _sess={nodeId:null,openedAt:null,answered:0,correctFirst:0,total:0};

function _send(event,payload){
  if(!BACKEND_URL)return;
  const body=Object.assign({event,mapId:"physics_5",ts:new Date().toISOString()},payload);
  try{fetch(BACKEND_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body),keepalive:true}).catch(()=>{});}catch(e){}
}
function flashSync(){const d=document.getElementById("syncDot");if(!d)return;d.classList.add("show");setTimeout(()=>d.classList.remove("show"),900);}

// track node_opened — timestamp on open; fires node_abandoned for previous session if incomplete
function trackNodeOpened(nodeId,totalQ){
  if(_sess.nodeId && _sess.nodeId!==nodeId && _sess.total>0 && _sess.answered>0 && _sess.answered<_sess.total){
    const payload={nodeId:_sess.nodeId,timeSpentSeconds:Math.floor((Date.now()-_sess.openedAt)/1000),questionsAnswered:_sess.answered,totalQuestions:_sess.total};
    if(!ASTORE[_sess.nodeId])ASTORE[_sess.nodeId]={};
    ASTORE[_sess.nodeId].abandoned=Object.assign({ts:Date.now()},payload);
    asave();
    _send("node_abandoned",payload);
  }
  _sess={nodeId,openedAt:Date.now(),answered:0,correctFirst:0,total:totalQ};
  if(!ASTORE[nodeId])ASTORE[nodeId]={};
  ASTORE[nodeId].last_opened=Date.now();
  ASTORE[nodeId].open_count=(ASTORE[nodeId].open_count||0)+1;
  asave();
  _send("node_opened",{nodeId,totalQuestions:totalQ});
  flashSync();
}

// track question_answered — first attempt lock, send per question
function trackQuestionAnswered(nodeId,qi,correct){
  _sess.answered++;
  if(correct)_sess.correctFirst++;
  if(!ASTORE[nodeId])ASTORE[nodeId]={};
  if(!ASTORE[nodeId].questions)ASTORE[nodeId].questions={};
  const key="q"+qi;
  if(!ASTORE[nodeId].questions[key]){  // first-attempt lock — only record first try
    ASTORE[nodeId].questions[key]={correct,ts:Date.now(),timeIntoNode:Math.floor((Date.now()-_sess.openedAt)/1000)};
    asave();
  }
  _send("question_answered",{nodeId,questionIndex:qi,firstAttemptCorrect:correct,timeIntoNodeSeconds:Math.floor((Date.now()-_sess.openedAt)/1000)});
  flashSync();
  // Check node_completed
  if(_sess.answered>=_sess.total && _sess.total>0){
    const timeSpent=Math.floor((Date.now()-_sess.openedAt)/1000);
    const accuracy=Math.round(_sess.correctFirst/_sess.total*100);
    ASTORE[nodeId].completed={ts:Date.now(),timeSpentSeconds:timeSpent,accuracy,correct:_sess.correctFirst,total:_sess.total};
    asave();
    _send("node_completed",{nodeId,totalQuestions:_sess.total,correctOnFirstAttempt:_sess.correctFirst,firstAttemptAccuracyPct:accuracy,timeSpentSeconds:timeSpent,completedAt:new Date().toISOString()});
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function allNodes(){return CHAPTERS.flatMap(c=>c.nodes)}
function getNode(id){return allNodes().find(n=>n.id===id)}
function isVisited(id){return!!S.visited[id]}
function trapNodes(){return allNodes().filter(n=>n.type==="trap")}
function trapVisited(){return trapNodes().filter(n=>isVisited(n.id)).length}
function visitedCount(){return allNodes().filter(n=>isVisited(n.id)).length}
function totalNodes(){return allNodes().length}
function isUnlocked(node){
  if(node.type==="gold"){const ch=CHAPTERS.find(c=>c.nodes.some(n=>n.id===node.id));if(ch){return chPct(ch)>=(node.requires_pct||80);}}
  return true;
}
function chPct(ch){const vis=ch.nodes.filter(n=>isVisited(n.id)).length;return Math.round(vis/ch.nodes.length*100);}
function updateHeader(){
  const vis=visitedCount(),tot=totalNodes(),xp=S.xp,tv=trapVisited(),tn=trapNodes().length;
  ["hXP","mhXP"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=xp;});
  ["hVis","mhVis"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=vis+"/"+tot;});
  ["hTrap","mhTrap"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=tv+"/"+tn;});
}
let _toastT;
function showToast(xp,msg){
  const t=document.getElementById("toast"),v=document.getElementById("toastVal"),m=document.getElementById("toastMsg");
  if(!t)return;
  v.textContent=xp?"+"+xp+" XP":"✓";m.textContent=msg;
  t.classList.add("show");clearTimeout(_toastT);
  _toastT=setTimeout(()=>t.classList.remove("show"),2800);
}
function buildTable(t){return`<div class="tbl-wrap"><table class="dt"><thead><tr>${t.h.map(x=>`<th>${x}</th>`).join("")}</tr></thead><tbody>${t.r.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;}

function buildSidebar(){
  ["sideInner","mobSideInner"].forEach(sid=>{
    const el=document.getElementById(sid);if(!el)return;el.innerHTML="";
    CHAPTERS.forEach(ch=>{
      const pct=chPct(ch),isOpen=S.chOpen===ch.id;
      const div=document.createElement("div");
      div.className="ch-group"+(isOpen?" expanded":"");
      div.innerHTML=`<button class="ch-toggle${isOpen?" open":""}" data-ch="${ch.id}">
        <span style="font-size:16px">${ch.icon}</span><span>${ch.title}</span>
        <span class="cht-pct">${pct}%</span>
      </button>
      <div class="node-items">${ch.nodes.map(n=>{
        const unl=isUnlocked(n),vis=isVisited(n.id),cur=S.curNode===n.id;
        let ico=vis?"✓":"○",tag="";
        if(!unl){ico="🔒";tag=`<span class="ni-tag hidden">LOCKED</span>`;}
        else if(n.type==="gold"){ico="⚡";tag=`<span class="ni-tag gold">GOLD</span>`;}
        else if(n.type==="trap"){ico=vis?"⚠️":"⚠";tag=`<span class="ni-tag trap">TRAP</span>`;}
        return `<button class="ni-btn${cur?" current":""}${vis?" done":""}${!unl?" locked":""}" data-nid="${n.id}" data-unl="${unl}">
          <span style="width:15px;text-align:center;font-size:12px">${ico}</span>
          <span>${n.title}</span>${tag}
        </button>`;
      }).join("")}</div>`;
      el.appendChild(div);
      div.querySelector(".ch-toggle").onclick=()=>{
        S.chOpen=isOpen?null:ch.id;save();buildSidebar();
        if(!isOpen){const first=ch.nodes.find(n=>isUnlocked(n));if(first)openNode(first.id);}
      };
      div.querySelectorAll(".ni-btn[data-unl='true']").forEach(b=>b.onclick=()=>{openNode(b.dataset.nid);closeDrawer();});
      div.querySelectorAll(".ni-btn[data-unl='false']").forEach(b=>b.onclick=()=>{openLocked(b.dataset.nid);closeDrawer();});
    });
  });
}

function openNode(id){
  const node=getNode(id);if(!node||!isUnlocked(node))return openLocked(id);
  const fresh=!isVisited(id);
  S.curNode=id;S.chOpen=CHAPTERS.find(c=>c.nodes.some(n=>n.id===id))?.id||S.chOpen;
  if(fresh){S.visited[id]=Date.now();S.xp+=node.xp;
    const msgs={trap:"⚠ Exam Trap Revealed!",gold:"⚡ Gold Node!"};
    showToast(node.xp,msgs[node.type]||"Node Visited");}
  save();buildSidebar();updateHeader();renderNode(node);
  document.getElementById("mainArea").scrollTop=0;
  trackNodeOpened(id,node.mcqs?.length||0);
}
function openLocked(id){
  const node=getNode(id);if(!node)return;
  S.curNode=id;save();buildSidebar();
  const ch=CHAPTERS.find(c=>c.nodes.some(n=>n.id===id));
  const pct=ch?chPct(ch):0;
  const req=`<div class="lreq${pct>=(node.requires_pct||80)?" met":""}">Complete ${node.requires_pct||80}% of chapter (currently ${pct}%)</div>`;
  document.getElementById("viewWrap").innerHTML=`<div class="locked-view"><div class="lv-ico">🔒</div><h2>Locked</h2><p>Complete the chapter to unlock the Gold Node.</p><div class="lock-req-list">${req}</div></div>`;
}

function renderNode(node){
  const ch=CHAPTERS.find(c=>c.nodes.some(n=>n.id===node.id));
  const bm={regular:["◇ LEARN","regular"],trap:["⚠ EXAM TRAP","trap"],gold:["⚡ GOLD","gold"]};
  const [bl,bc]=bm[node.type]||["◇","regular"];
  let content="";
  if(node.type==="gold"){
    content=`<div class="golden-block"><div class="gb-h">⚡ GOLD NODE — HIGHEST YIELD EXAM FACTS</div><ul>${(node.golden||[]).map(g=>`<li>${g}</li>`).join("")}</ul></div>`;
  } else {
    if(node.diag&&DIAGRAMS[node.diag]){content+=`<div class="diag-box"><div class="diag-head">📊 VISUAL DIAGRAM</div><div class="diag-body">${DIAGRAMS[node.diag]}</div></div>`;}
    if(node.facts?.length){content+=`<div class="fact-block"><div class="fb-head">◇ KEY FACTS</div><ul class="facts">${node.facts.map(f=>`<li>${f}</li>`).join("")}</ul></div>`;}
    if(node.table){content+=`<div class="section-lbl">◇ COMPARISON TABLE</div>${buildTable(node.table)}`;}
    if(node.examples?.length){content+=`<div class="section-lbl">📝 WORKED EXAMPLES</div>`+node.examples.map(ex=>`<div class="example-box"><div class="ex-q"><b>Q:</b> ${ex.q}</div><div class="ex-sol"><b>Solution:</b> ${ex.s}</div></div>`).join("");}
    if(node.traps?.length){content+=`<div class="trap-block"><div class="tb-h">⚠ EXAM TRAPS — HIGH YIELD</div><ul>${node.traps.map(t=>`<li>${t}</li>`).join("")}</ul></div>`;}
  }
  let mcqHtml="";
  if(node.mcqs?.length){
    const best=S.mcq[node.id]||0;
    mcqHtml=`<div class="mcq-list">${best?`<div style="font-family:var(--mono);font-size:11px;color:var(--ink3);margin-bottom:8px">Best: <span style="color:var(--green)">${best}%</span></div>`:""}${node.mcqs.map((q,qi)=>`<div class="mcq-card" data-qi="${qi}" data-nid="${node.id}"><div class="mcq-q"><span class="mcq-qn">Q${qi+1}</span>${q.q}</div><div class="mcq-opts">${q.o.map((op,oi)=>`<button class="mopt" data-oi="${oi}">${String.fromCharCode(65+oi)}. ${op}</button>`).join("")}</div><div class="mcq-fb" id="fb_${node.id}_${qi}"></div></div>`).join("")}<div class="mcq-score" id="scr_${node.id}">Answer all questions to see your score</div></div>`;
  }
  const idx=ch?.nodes.findIndex(n=>n.id===node.id)??-1;
  const prev=idx>0?ch.nodes[idx-1]:null;
  const next=idx<(ch?.nodes.length-1)?ch.nodes[idx+1]:null;
  const nav=`<div class="node-nav">${prev?`<button class="nnav" onclick="openNode('${prev.id}')">‹ ${prev.title.substring(0,24)}</button>`:""}${next&&isUnlocked(next)?`<button class="nnav primary" onclick="openNode('${next.id}')">Next ›</button>`:""}</div>`;
  document.getElementById("viewWrap").innerHTML=`<div class="node-view">
    <div class="node-hd">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink3);margin-bottom:6px">${ch?.title||""} › ${node.title}</div>
      <div class="node-badge ${bc}">${bl}</div>
      <h1 class="nt">${node.title}</h1>
      <div class="xp-pill">✦ +${node.xp} XP${isVisited(node.id)?" earned":""}</div>
    </div>
    <div class="tabs"><button class="tab on" data-t="learn">📖 Learn</button><button class="tab" data-t="test">🎯 Test (${node.mcqs?.length||0}Q)</button></div>
    <div id="pane-learn">${content}${nav}</div>
    <div id="pane-test" style="display:none">${mcqHtml}${nav}</div>
  </div>`;
  document.querySelectorAll(".tab").forEach(btn=>{btn.onclick=()=>{const t=btn.dataset.t;document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.t===t));["learn","test"].forEach(p=>{const e=document.getElementById("pane-"+p);if(e)e.style.display=p===t?"block":"none";});};});
  bindMCQ(node);
}

function bindMCQ(node){
  if(!node.mcqs)return;
  let correct=0,answered=0,total=node.mcqs.length;
  node.mcqs.forEach((q,qi)=>{
    const card=document.querySelector(`.mcq-card[data-qi="${qi}"][data-nid="${node.id}"]`);if(!card)return;
    card.querySelectorAll(".mopt").forEach(btn=>{
      btn.onclick=()=>{
        if(card.dataset.done)return; // first-attempt lock
        card.dataset.done=1;
        const oi=+btn.dataset.oi,isCorrect=(oi===q.a);
        const fb=document.getElementById(`fb_${node.id}_${qi}`);
        card.querySelectorAll(".mopt").forEach((b,i)=>{b.disabled=true;if(i===q.a)b.classList.add("show-correct");});
        if(isCorrect){btn.classList.add("correct");correct++;fb.className="mcq-fb show right";fb.innerHTML="✓ "+q.e;}
        else{btn.classList.add("wrong");fb.className="mcq-fb show wrong";fb.innerHTML="✗ Wrong. "+q.e;}
        answered++;
        trackQuestionAnswered(node.id,qi,isCorrect);
        if(answered===total){
          const pct=Math.round(correct/total*100);
          const scr=document.getElementById(`scr_${node.id}`);
          if(scr)scr.innerHTML=`Score: <span>${correct}/${total} = ${pct}%</span> ${pct>=80?"🎯 Excellent":pct>=60?"✓ Good":"⚠ Revise"}`;
          if(pct>(S.mcq[node.id]||0)){S.mcq[node.id]=pct;save();}
          if(pct>=80)showToast(0,"MCQ Cleared 🎯");
          const tp=document.getElementById("pane-test");
          if(tp){const b=document.createElement("div");b.className="node-complete-banner";b.innerHTML=`<div class="ncb-icon">${pct>=80?"🏆":pct>=60?"✅":"📖"}</div><div class="ncb-text"><div class="ncb-title">NODE COMPLETE — ${pct}%</div><div class="ncb-sub">${correct}/${total} correct on first attempt${pct<60?" — revisit Learn tab":""}</div></div>`;tp.appendChild(b);}
        }
      };
    });
  });
}

{id:"heat-transfer-node",title:"Heat Transfer & Thermodynamics Laws",xp:20,type:"regular",diag:"heat-transfer",
facts:[
  "<b>Conduction:</b> atom vibration; needs medium; best in metals. Silver > Cu > Au > Al > Fe",
  "<b>Convection:</b> bulk fluid movement; hot fluid rises (less dense), cold sinks (more dense)",
  "<b>Radiation:</b> electromagnetic waves (infrared); NO medium needed; travels at 3×10⁸ m/s",
  "<b>Black/dark surfaces:</b> best absorbers AND emitters of radiation",
  "<b>White/shiny surfaces:</b> poor absorbers (reflect) — wear white in summer",
  "<b>Newton's Law of Cooling:</b> rate of heat loss ∝ (T_body − T_surroundings)",
  "<b>Greenhouse Effect:</b> CO₂, CH₄, H₂O vapour absorb & re-emit infrared → trap heat",
  "<b>Zeroth Law:</b> A in equilibrium with C, B in equilibrium with C → A in equilibrium with B",
  "<b>First Law:</b> ΔU = Q − W (conservation of energy for thermodynamic systems)",
  "<b>Second Law:</b> Heat flows spontaneously from hot to cold ONLY; entropy always increases",
  "<b>Third Law:</b> Entropy → 0 as T → 0 K; absolute zero is unattainable in practice"
],
table:{h:["Mode","Medium?","Mechanism","Speed","Examples"],r:[

  ["Convection","YES (fluid)","Bulk movement: hot rises","Medium","Sea breeze, boiling water, AC"],
  ["Radiation","NO (vacuum OK)","EM waves (infrared)","Fastest (c)","Sun's heat, fire warmth"]

examples:[

],
traps:[

],
mcqs:[

  {q:"Sea breeze blows from sea to land during daytime because?",o:["Sea temperature rises faster","Land heats faster → hot air rises → cool sea air replaces it","Wind direction follows Sun","Sea water evaporates"],a:1,e:"Land heats faster than sea → air above land rises (convection) → cool sea air moves in to replace it. At night the reverse happens (land breeze from land to sea)."},
  {q:"First Law of Thermodynamics is a statement of?",o:["Law of entropy","Conservation of energy","Direction of heat flow","Absolute zero"],a:1,e:"First Law: ΔU = Q − W. The change in internal energy = heat added − work done by system. This is conservation of energy applied to thermodynamic systems."},
  {q:"Black surfaces are better radiators than white surfaces because?",o:["Black is heavier","Black absorbs and emits radiation most efficiently","Black has higher specific heat","Black conducts heat better"],a:1,e:"Black/dark surfaces are the best absorbers AND emitters of radiation (Stefan-Boltzmann law). White/shiny surfaces reflect most radiation — that's why white clothes are worn in summer."},
  {q:"A refrigerator moves heat from cold interior to hot room. This?",o:["Violates 1st Law","Violates 2nd Law","Does NOT violate any law (uses external work)","Violates both laws"],a:2,e:"The 2nd Law says heat cannot spontaneously flow from cold to hot. A refrigerator uses electrical work (external energy) to pump heat from cold to hot — no violation."}
]},

{id:"gas-laws-node",title:"Boyle's, Charles's & Gas Laws",xp:20,type:"regular",diag:"gas-laws",
facts:[
  "<b>CRITICAL: ALWAYS use KELVIN (K = °C + 273) in gas law calculations</b>",
  "<b>Boyle's Law</b> (Boyle, 1662): PV = constant at fixed T. Formula: <b>P₁V₁ = P₂V₂</b>",
  "<b>Charles's Law</b> (Charles, 1787): V/T = constant at fixed P. Formula: <b>V₁/T₁ = V₂/T₂</b>",
  "<b>Gay-Lussac's Law</b> (1802): P/T = constant at fixed V. Formula: <b>P₁/T₁ = P₂/T₂</b>",
  "<b>Avogadro's Law</b> (1811): V ∝ n at fixed T and P. Formula: V₁/n₁ = V₂/n₂",
  "<b>Ideal Gas Equation: PV = nRT</b> | R = 8.314 J/mol·K",
  "<b>Graham's Law:</b> diffusion rate ∝ 1/√density | r₁/r₂ = √(d₂/d₁)",
  "<b>STP (0°C, 1 atm): 1 mole of any gas = 22.4 litres</b> — direct MCQ fact",
  "Avogadro's number: N_A = 6.022 × 10²³ molecules/mole"
],
table:{h:["Law","Held Constant","Relationship","Formula"],r:[
  ["Boyle's","Temperature T","P ∝ 1/V (inverse)","P₁V₁ = P₂V₂"],
  ["Charles's","Pressure P","V ∝ T (direct, Kelvin)","V₁/T₁ = V₂/T₂"],
  ["Gay-Lussac's","Volume V","P ∝ T (direct, Kelvin)","P₁/T₁ = P₂/T₂"],
  ["Ideal Gas","—","PV = nRT","R = 8.314 J/mol·K"],

  {q:"Gas at 2 atm, 5 L compressed to 2 L at same temperature. New pressure?",s:"P₁V₁ = P₂V₂ → 2×5 = P₂×2 → P₂ = <b>5 atm</b>"},

  "Boyle's Law: P and V are INVERSE — when P doubles, V halves (not doubles)"

mcqs:[
  {q:"A gas at 27°C is heated to 327°C at constant pressure. By what factor does volume increase?",o:["2 times","3 times","4 times","11 times"],a:0,e:"T₁=300K, T₂=600K. V₂/V₁ = T₂/T₁ = 600/300 = 2. Volume doubles. MUST use Kelvin — Charles's Law."},
  {q:"At STP, volume of 1 mole of any ideal gas is?",o:["11.2 L","22.4 L","44.8 L","2.24 L"],a:1,e:"STP (0°C, 1 atm): 1 mole of any ideal gas occupies exactly 22.4 litres. Direct exam fact — memorise."},
  {q:"A gas is compressed from 10 L to 5 L at constant temperature. Pressure doubles. Which law?",o:["Charles's","Gay-Lussac's","Boyle's","Avogadro's"],a:2,e:"Constant temperature, P×V = constant — this is Boyle's Law. PV = constant → compress V by half → P doubles."},
  {q:"In ideal gas equation PV = nRT, R is called?",o:["Boltzmann constant","Universal gas constant","Avogadro constant","Planck's constant"],a:1,e:"R = universal gas constant = 8.314 J/mol·K. Same for all ideal gases — that's why 'universal'. Boltzmann constant k = R/N_A."},
  {q:"Gas A has density 4 times that of gas B at same T and P. Ratio of their diffusion rates (A:B)?",o:["4:1","2:1","1:2","1:4"],a:2,e:"Graham's Law: rate ∝ 1/√density. r_A/r_B = √(d_B/d_A) = √(1/4) = 1/2. Gas A diffuses at half the rate of B."}

  "<b>Average KE per molecule = (3/2)kT</b> | k = Boltzmann constant = 1.38 × 10⁻²³ J/K",
  "<b>RMS speed v_rms = √(3RT/M)</b> — increases with T, decreases with molar mass M",
  "<b>At 0 K (absolute zero): molecular motion practically stops</b>",
  "<b>Pressure</b> = force from molecular collisions on container walls",
  "<b>Ideal gas:</b> no intermolecular forces, negligible molecular volume, elastic collisions",
  "<b>Real gas deviates from ideal at HIGH pressure and LOW temperature</b>",
  "Avogadro's number: N_A = 6.022 × 10²³ molecules per mole"
],
traps:[
  "Higher temperature = faster molecules (more KE) — molecules don't become smaller",
  "Real gas: deviates at HIGH pressure + LOW temperature (not high temperature)",
  "Avogadro's number is 6.022 × 10²³ (not 6.022 × 10²² or ×10²⁴)"
],
mcqs:[
  {q:"Temperature of a gas is a direct measure of?",o:["Total kinetic energy","Average kinetic energy of its molecules","Pressure of gas","Volume of gas"],a:1,e:"Temperature ∝ average KE per molecule = (3/2)kT. Higher temperature = faster moving molecules on average. Total KE depends on number of moles too."},
  {q:"At absolute zero, molecular motion in an ideal gas?",o:["Is maximum","Is the same as at room temperature","Practically stops","Doubles"],a:2,e:"At 0 K, average KE = (3/2)k×0 = 0. Molecular motion practically stops (quantum mechanics allows zero-point energy, but for exam purposes: stops)."},
  {q:"Which gas at same T and P will have higher RMS speed — H₂ (M=2) or O₂ (M=32)?",o:["O₂, as it's heavier","H₂, as it's lighter","Both the same","Depends on pressure"],a:1,e:"v_rms = √(3RT/M). Lower M = higher speed. H₂ (M=2) is 16 times lighter than O₂ (M=32) → v_rms of H₂ is 4 times higher."},
  {q:"Real gases deviate most from ideal behaviour at?",o:["High T, low P","Low T, high P","High T, high P","Low T, low P"],a:1,e:"At low T: molecules slow down → intermolecular attractions matter. At high P: molecules close together → volume non-negligible. Both conditions cause maximum deviation from ideal gas."},
  {q:"Avogadro's number (6.022 × 10²³) represents?",o:["Molecules in 1 litre of gas","Molecules in 1 mole of any substance","Atoms in 1 gram","Molecules per cubic metre"],a:1,e:"Avogadro's number = 6.022 × 10²³ particles (atoms/molecules/ions) per mole of any substance. One mole of H₂O = 6.022×10²³ water molecules."}

  "<b>Conservation of Angular Momentum:</b> L = Iω = constant when net external torque = 0",

  {q:"A torque of 15 N·m acts on a flywheel with I=3 kg·m². Angular acceleration?",o:["0.2 rad/s²","3 rad/s²","5 rad/s²","45 rad/s²"],a:2,e:"τ = Iα → α = τ/I = 15/3 = 5 rad/s². Rotational Newton's 2nd law: torque = moment of inertia × angular acceleration."},
  {q:"Angular momentum is conserved when?",o:["Linear velocity is constant","Net external force is zero","Net external torque is zero","Moment of inertia is constant"],a:2,e:"L = Iω is conserved when net external torque = 0. Analogous to linear momentum (p=mv) conserved when net force = 0. Figure skaters, divers exploit this."},
  {q:"A diver tucks her body mid-dive. Her rotation rate?",o:["Decreases","Stays the same","Increases","Becomes zero"],a:2,e:"Tucking reduces her moment of inertia (I). Since L = Iω is conserved (no external torque), ω must increase when I decreases. She spins faster."},
  {q:"Torque and Work both have units N·m. The key difference is?",o:["Torque is larger","Work is scalar, torque is a vector quantity","They are the same","Torque only applies to liquids"],a:1,e:"Work = F·d (scalar, dot product). Torque = r×F (vector, cross product). Same units N·m but completely different physical concepts — torque causes rotation, work is energy transfer."}
]}

  "β INCREASES when: λ↑, D↑, or d↓",
  "<b>Diffraction:</b> bending of light around edges; prominent when obstacle size ≈ wavelength",
  "Sound diffracts around corners (λ in cm–m) | Light barely diffracts (λ = 400–700 nm)",
  "<b>Polarization:</b> restriction to one plane — ONLY transverse waves can be polarized",
  "<b>Malus's Law:</b> I = I₀ cos²θ (transmitted intensity through analyser)"

  {q:"Young's Double Slit Experiment proved that light?",o:["Travels in straight lines","Has wave nature (shows interference)","Has particle nature","Cannot be polarized"],a:1,e:"YDSE (1801) demonstrated interference fringes — a characteristic of waves. It was the first experimental proof that light has wave nature (transverse wave showing interference and diffraction)."},

  {q:"Which gate is called a UNIVERSAL gate?",o:["AND","OR","NAND","XOR"],a:2,e:"NAND (and NOR) are universal gates — any logic function can be built using only NAND gates. NOT, AND, OR, XOR — all can be constructed from NAND alone. This makes circuit design simpler."},

facts:[
  "<b>KCL (Junction Rule):</b> ΣI_in = ΣI_out at any junction. Based on CHARGE conservation.",
  "<b>KVL (Loop Rule):</b> ΣV = 0 around any closed loop. Based on ENERGY conservation.",
  "<b>Wheatstone Bridge:</b> P/Q = R/S when balanced (galvanometer = 0 current)",
  "<b>Capacitor:</b> stores charge between conductors. C = Q/V. Unit: Farad (F).",
  "<b>Parallel plate capacitor:</b> C = ε₀A/d — increases if area↑ or gap↓",
  "<b>Dielectric</b> between plates: increases C by factor κ (dielectric constant)",
  "<b>Energy stored: U = ½CV² = Q²/2C</b>",
  "<b>Capacitors in SERIES: 1/C = 1/C₁ + 1/C₂</b> (REDUCES — opposite of resistors)",
  "<b>Capacitors in PARALLEL: C = C₁ + C₂</b> (ADDS — opposite of resistors)",
  "<b>Capacitor blocks DC; allows AC to pass</b>"
],
table:{h:["Combination","Resistors (R)","Capacitors (C)","Key Difference"],r:[
  ["Series","R=R₁+R₂ (ADDS UP)","1/C=1/C₁+1/C₂ (REDUCES)","OPPOSITE behaviour"],
  ["Parallel","1/R reduces","C=C₁+C₂ (ADDS UP)","OPPOSITE behaviour"]
]},
examples:[
  {q:"Three capacitors 2μF, 4μF, 6μF in series. Equivalent capacitance?",s:"1/C = 1/2 + 1/4 + 1/6 = 6/12 + 3/12 + 2/12 = 11/12\nC = 12/11 ≈ <b>1.09 μF</b> (less than smallest — correct for series)"}
],
traps:[
  "Capacitors in SERIES → total C LESS than smallest (opposite of series resistors which ADD)",
  "Capacitors in PARALLEL → total C ADDS (opposite of parallel resistors which reduce)",
  "KCL = conservation of CHARGE | KVL = conservation of ENERGY (not interchangeable)"
],
mcqs:[
  {q:"Three capacitors 3μF, 6μF, 9μF connected in parallel. Equivalent capacitance?",o:["2 μF","6 μF","9 μF","18 μF"],a:3,e:"Parallel capacitors ADD: C = 3+6+9 = 18 μF. Note: parallel resistors REDUCE. Capacitors and resistors behave OPPOSITELY in series and parallel."},
  {q:"Kirchhoff's Voltage Law (KVL) is based on?",o:["Conservation of charge","Conservation of mass","Conservation of energy","Ohm's law"],a:2,e:"KVL: sum of all potential differences in a closed loop = 0. This is conservation of energy — energy gained from EMF sources = energy lost in resistors in a complete loop."},
  {q:"Capacitor blocks DC but allows AC. This is because?",o:["Capacitor conducts DC better","DC charges capacitor → no more current | AC keeps reversing → capacitor charges/discharges continuously","Capacitor is only for AC circuits","DC creates magnetic field"],a:1,e:"For DC: capacitor charges up → opposes further current → blocks DC. For AC: polarity reverses continuously → capacitor keeps charging and discharging → AC 'flows through' capacitor circuit."},

  {q:"Wheatstone bridge is balanced when?",o:["Current through galvanometer is maximum","Current through galvanometer is zero","Voltage across bridge is zero","All resistors are equal"],a:1,e:"Bridge balanced: P/Q = R/S — no potential difference across galvanometer → zero current. Used to find unknown resistance precisely. Meter bridge is practical application of Wheatstone bridge."}
]},

function showDash(){
  S.curNode=null;buildSidebar();
  const vis=visitedCount(),tot=totalNodes(),pct=tot?Math.round(vis/tot*100):0;
  const missed=trapNodes().filter(n=>!isVisited(n.id));
  document.getElementById("viewWrap").innerHTML=`<div class="dash">
    <div class="dash-t">Physics Map 5</div>
    <div class="dash-s">MODERN &amp; APPLIED PHYSICS · SSC / RRB / TNPSC / LDC UDC</div>
    <div class="dash-grid">
      <div class="dc gold"><div class="dv">${S.xp}</div><div class="dl">Total XP</div></div>
      <div class="dc g"><div class="dv">${vis}/${tot}</div><div class="dl">Nodes</div></div>
      <div class="dc r"><div class="dv">${trapVisited()}/${trapNodes().length}</div><div class="dl">Traps</div></div>
      <div class="dc b"><div class="dv">${pct}%</div><div class="dl">Done</div></div>
    </div>
    <div class="ch-prog">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--ink3);margin-bottom:12px">CHAPTER PROGRESS</div>
      ${CHAPTERS.map(ch=>{const p=chPct(ch);return`<div class="cpr"><span class="cpr-n">${ch.icon} ${ch.title}</span><div class="cpr-bar"><div class="cpr-fill" style="width:${p}%"></div></div><span class="cpr-pct">${p}%</span></div>`;}).join("")}
    </div>
    ${missed.length?`<div class="mentor-box"><h3>⚠ EXAM TRAPS NOT YET VISITED</h3><ul>${missed.map(n=>`<li>${n.title} — ${n.xp} XP waiting</li>`).join("")}</ul></div>`:""}
    <button class="start-btn" onclick="startLearning()">${visitedCount()===0?"Start Learning →":"Continue →"}</button>
  </div>`;
}

function startLearning(){
  const first=allNodes().find(n=>isUnlocked(n)&&!isVisited(n.id))||allNodes()[0];
  if(first){S.chOpen=CHAPTERS.find(c=>c.nodes.some(n=>n.id===first.id))?.id;openNode(first.id);}
}
function goTraps(){
  const t=trapNodes();if(!t.length)return;
  const next=t.find(n=>!isVisited(n.id))||t[0];
  openNode(next.id);
}
function openDrawer(){document.getElementById("mobDrawer").classList.add("open");document.getElementById("mobOverlay").classList.add("show");}
function closeDrawer(){document.getElementById("mobDrawer").classList.remove("open");document.getElementById("mobOverlay").classList.remove("show");}
