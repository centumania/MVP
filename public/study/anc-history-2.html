<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CentuMania · Ancient History Part 2</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#13100a;--bg2:#0f0d07;--panel:#1e1a0f;--panel2:#24200f;--line:#2e2a16;
  --ink:#f0e8d0;--ink2:#c4a86a;--ink3:#7a6840;
  --gold:#f0bc45;--gold2:#c8960e;--gold-glow:rgba(240,188,69,.13);
  --amber:#e67e22;--gold-bg:rgba(240,188,69,.12);
  --red:#f06b6b;--red-bg:rgba(240,107,107,.10);
  --blue:#4f8ef7;--green:#3dd68c;
  --mono:"JetBrains Mono",monospace;--serif:"Instrument Serif",serif;--sans:"DM Sans",sans-serif;
  --nav:56px;--aside:268px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px}
.shell{display:grid;grid-template-rows:var(--nav) 1fr;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;padding:0 18px;gap:12px;border-bottom:1px solid var(--line);background:rgba(15,13,7,.97);backdrop-filter:blur(14px);z-index:60}
.logo{font-family:var(--serif);font-size:19px;font-style:italic;color:var(--gold);display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);flex-shrink:0}
.nav-stats{display:flex;gap:16px;margin-left:auto;align-items:center}
.stat{font-family:var(--mono);font-size:11px;color:var(--ink2)}
.stat b{font-size:13px}.stat.xp b{color:var(--gold)}.stat.nd b{color:var(--amber)}.stat.tp b{color:var(--red)}
.body-wrap{display:grid;grid-template-columns:var(--aside) 1fr;overflow:hidden;height:calc(100vh - var(--nav))}
aside{background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto}
aside::-webkit-scrollbar{width:3px}aside::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
main{overflow-y:auto;background:var(--bg)}
main::-webkit-scrollbar{width:4px}main::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
#sidebar-inner{padding:10px 8px 60px}
.ch-group{margin-bottom:3px}
.ch-toggle{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink2);padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:.13s;font-family:var(--sans)}
.ch-toggle:hover{background:var(--panel);color:var(--ink)}
.ch-icon{font-size:15px}.ch-label{flex:1}.ch-prog{font-family:var(--mono);font-size:10px;color:var(--ink3)}.ch-arr{font-size:11px;color:var(--ink3);flex-shrink:0}
.node-items{padding:3px 4px 3px 10px}
.ni-btn{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink3);padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;transition:.12s;font-family:var(--sans);margin-bottom:1px;min-height:44px}
.ni-btn:hover:not(.locked){background:var(--panel);color:var(--ink)}
.ni-btn.active{background:var(--gold-glow);border-color:var(--gold2);color:var(--gold)}
.ni-btn.passed:not(.active){color:var(--ink)}
.ni-btn.locked{cursor:default;opacity:.4}
.ni-title{flex:1;line-height:1.3}.ni-xp{font-family:var(--mono);font-size:10px;color:var(--ink3);flex-shrink:0}
.ni-tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;flex-shrink:0}
.ni-tag.lock{color:var(--ink3)}.ni-tag.done{background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.25)}.ni-tag.vis{color:var(--amber)}
.view{padding:28px clamp(16px,3.5vw,52px) 80px;max-width:900px;margin:0 auto}
.tabs{display:flex;gap:3px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:22px;width:fit-content}
.tab{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:8px;cursor:pointer;border:0;background:none;color:var(--ink2);transition:.14s}
.tab:hover:not(.active){color:var(--ink)}.tab.active{background:var(--gold2);color:#fff;font-weight:700}
.tab-pane{display:none}.tab-pane.active{display:block}
.node-hd-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.node-type-tag{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.node-type-tag.trap{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.3)}
.node-type-tag.gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,188,69,.3)}
.xp-pill{font-family:var(--mono);font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid rgba(240,188,69,.2);border-radius:6px;padding:3px 8px;margin-left:auto}
.node-title{font-family:var(--serif);font-size:clamp(24px,4vw,36px);font-style:italic;line-height:1.1;margin-bottom:12px}
.node-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
.ns-item{display:flex;flex-direction:column;gap:3px}
.ns-label{font-family:var(--mono);font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.ns-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink)}
.ns-val.faa-col{color:var(--amber)}.ns-val.pass-col{color:var(--green)}.ns-val.pend-col{color:var(--ink2)}
.fact-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin:12px 0;overflow:hidden}
.fact-block.gold-block{background:linear-gradient(135deg,rgba(240,188,69,.07),rgba(230,126,34,.04));border-color:rgba(240,188,69,.3)}
.fb-head{padding:9px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink2);border-bottom:1px solid var(--line);background:var(--panel2)}
.fb-body{padding:14px 16px}
ul.facts{list-style:none;padding:0}
ul.facts li{padding:7px 0 7px 22px;border-bottom:1px dashed var(--line);font-size:14px;position:relative;line-height:1.55}
ul.facts li:last-child{border-bottom:0}
ul.facts li::before{content:"\25B8";position:absolute;left:3px;top:9px;color:var(--amber);font-size:11px}
ul.facts b{color:var(--gold)}
.trap-block{background:var(--red-bg);border:1px solid rgba(240,107,107,.35);border-radius:12px;overflow:hidden;margin:12px 0}
.trap-block .fb-head{background:rgba(240,107,107,.08);color:var(--red);border-color:rgba(240,107,107,.35)}
.mnemonic-block{background:rgba(79,142,247,.07);border:1px solid rgba(79,142,247,.3);border-radius:12px;overflow:hidden;margin:12px 0}
.mnemonic-block .fb-head{background:rgba(79,142,247,.07);color:var(--blue);border-color:rgba(79,142,247,.3)}
.revision-block{background:rgba(79,142,247,.05);border:1px solid rgba(79,142,247,.2);border-radius:12px;overflow:hidden;margin:12px 0}
.revision-block .fb-head{background:rgba(79,142,247,.06);color:var(--blue);border-color:rgba(79,142,247,.2)}
.revision-block ul.facts li::before{content:"\26A1";color:var(--blue);font-size:10px}
.oneliner-block{background:rgba(61,214,140,.05);border:1px solid rgba(61,214,140,.18);border-radius:12px;overflow:hidden;margin:12px 0}
.oneliner-block .fb-head{background:rgba(61,214,140,.06);color:var(--green);border-color:rgba(61,214,140,.18)}
.oneliner-block ul.facts li::before{content:"\1F3AF";color:var(--green);font-size:10px}
.flash-hint{font-family:var(--mono);font-size:11px;color:var(--ink3);text-align:center;margin-bottom:12px;letter-spacing:.5px}
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:14px}
.flash-card{perspective:900px;cursor:pointer;height:150px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;line-height:1.45;border:1px solid var(--line)}
.flash-front{background:var(--panel);color:var(--ink)}
.flash-back{background:rgba(240,188,69,.1);border-color:rgba(240,188,69,.3);color:var(--gold);transform:rotateY(180deg)}
.flash-reset-row{text-align:center;margin-top:4px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--line);margin:12px 0}
table{width:100%;border-collapse:collapse;font-size:13px}
table th{padding:9px 13px;text-align:left;background:var(--gold2);color:#fff;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px}
table td{padding:9px 13px;border-bottom:1px solid var(--line);color:var(--ink)}
table tr:last-child td{border-bottom:0}
table td:first-child{color:var(--amber);font-weight:600;font-family:var(--mono);font-size:12px}
table b{color:var(--gold)}
.trap-box{background:var(--red-bg);border:1px solid rgba(240,107,107,.35);border-radius:10px;padding:12px 14px;margin:12px 0;font-size:13px;line-height:1.6;color:var(--ink)}
h2{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--gold);margin:0 0 14px}
h3{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink2);margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:6px}
p{font-size:14px;line-height:1.65;color:var(--ink);margin:8px 0}
ol,ul{padding-left:20px;margin:8px 0}
ol li,ul li{font-size:14px;line-height:1.65;padding:3px 0}
strong{color:var(--gold)}
.mcq-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.mcq-q{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.45}
.q-num{font-family:var(--mono);font-size:12px;color:var(--amber);margin-right:4px}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.mopt{padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--ink);font-size:13px;cursor:pointer;text-align:left;font-family:var(--sans);transition:.13s;width:100%}
.mopt:hover:not([disabled]){border-color:var(--gold2);background:var(--gold-glow)}
.mopt.correct{background:rgba(61,214,140,.12);border-color:var(--green);color:var(--green)}
.mopt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.mcq-fb{margin-top:10px;font-size:13px;padding:9px 12px;border-radius:8px;background:var(--panel2);color:var(--ink2);line-height:1.5;border:1px solid var(--line)}
.mcq-faa{margin-top:7px}
.faa-chip{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:6px}
.faa-chip.faa-ok{background:rgba(61,214,140,.1);color:var(--green);border:1px solid rgba(61,214,140,.25)}
.faa-chip.faa-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.25)}
.retry-btn{margin-top:4px;padding:6px 16px;background:var(--panel2);border:1px solid var(--gold2);color:var(--gold);border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:11px}
.retry-btn:hover{background:var(--gold-glow)}
.unlock-banner{border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.5}
.pass-banner{background:rgba(61,214,140,.1);border:1px solid rgba(61,214,140,.35);color:var(--green)}
.fail-banner{background:var(--red-bg);border:1px solid rgba(240,107,107,.35);color:var(--ink)}
.node-nav{display:flex;gap:10px;margin-top:26px;padding-top:16px;border-top:1px solid var(--line)}
.nav-btn{font-family:var(--sans);font-weight:600;font-size:13px;border-radius:9px;padding:9px 15px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);transition:.14s;flex:1;text-align:center}
.nav-btn:hover:not([disabled]){border-color:var(--gold2)}.nav-btn[disabled]{opacity:.35;cursor:default}
.nav-btn.home-btn{flex:0 0 auto;background:var(--panel2)}
.dash-hero{background:linear-gradient(135deg,rgba(240,188,69,.08),rgba(230,126,34,.05));border:1px solid rgba(240,188,69,.2);border-radius:16px;padding:28px;margin-bottom:22px;text-align:center}
.dh-title{font-family:var(--serif);font-size:clamp(28px,5vw,44px);font-style:italic;margin-bottom:4px}
.dh-sub{font-family:var(--mono);font-size:12px;color:var(--ink3);letter-spacing:1px}
.dh-xp{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--gold);margin:12px 0 4px}
.dh-bar-wrap{height:8px;background:var(--line);border-radius:4px;overflow:hidden;max-width:400px;margin:0 auto 8px}
.dh-bar{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;transition:.6s}
.dh-label{font-family:var(--mono);font-size:12px;color:var(--ink2)}
.dash-chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:22px}
.dc{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.dc-icon{font-size:22px;margin-bottom:6px}
.dc-label{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--ink)}
.dc-prog-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:4px}
.dc-bar{height:100%;background:var(--gold);border-radius:3px;transition:.5s}
.dc-nums{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.cta-row{display:flex;gap:12px;flex-wrap:wrap}
.cta-btn{padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;border:0;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;transition:.15s}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,188,69,.3)}
.cta-btn.sec{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.cta-btn[disabled]{opacity:.4;cursor:default;transform:none;box-shadow:none}
.toast{position:fixed;top:64px;right:18px;background:var(--panel2);border:1px solid var(--gold);border-radius:12px;padding:10px 16px;z-index:500;opacity:0;transform:translateY(-8px);transition:.3s;pointer-events:none;font-size:13px;max-width:340px;line-height:1.4}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{border-color:var(--red)}.toast.warn{border-color:var(--amber);color:var(--ink)}
.mob-bar{display:none}
@media(max-width:720px){
  .shell{grid-template-rows:var(--nav) 1fr 56px;height:100dvh}
  .body-wrap{grid-template-columns:1fr;height:calc(100dvh - var(--nav) - 56px)}
  aside{display:none}
  .mob-bar{display:flex;background:rgba(15,13,7,.98);backdrop-filter:blur(16px);border-top:1px solid var(--line);align-items:stretch}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:0;background:none;color:var(--ink3);cursor:pointer;padding:8px 4px;font-family:var(--mono);font-size:9px;transition:.13s}
  .mob-tab .mt-ico{font-size:20px}.mob-tab.act{color:var(--gold)}
  .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:.2s}
  .mob-overlay.show{opacity:1;pointer-events:all}
  .mob-drawer{position:fixed;left:-100%;top:0;bottom:0;width:min(300px,88vw);background:var(--bg2);border-right:1px solid var(--line);z-index:200;transition:.28s;overflow-y:auto}
  .mob-drawer.open{left:0}
  .mob-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--line)}
  .mob-close{background:none;border:1px solid var(--line);color:var(--ink2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px}
  .nav-stats{display:none}
  .view{padding:16px 14px 100px}
  .node-title{font-size:24px}
  .mcq-opts{grid-template-columns:1fr}
  .flash-grid{grid-template-columns:1fr}
  .tabs{overflow-x:auto;width:100%;scrollbar-width:none}
  .toast{top:auto;bottom:68px;left:14px;right:14px}
}
@media(min-width:721px){.mob-drawer,.mob-overlay{display:none}}
</style>
</head>
<body>
<div class="shell">
  <nav class="topbar">
    <div class="logo"><span class="logo-dot"></span>CentuMania</div>
    <div class="nav-stats">
      <div class="stat xp">XP <b id="h-xp">0</b></div>
      <div class="stat nd">Nodes <b id="h-nd">0/0</b></div>
      <div class="stat tp">Traps <b id="h-tp">0/0</b></div>
    </div>
  </nav>
  <div class="body-wrap">
    <aside><div id="sidebar-inner"></div></aside>
    <main id="main-area">
      <div class="dash-view view" id="dash-view">
        <div id="dash-content"></div>
      </div>
      <div class="node-view view" id="node-view" style="display:none">
        <div id="node-content"></div>
        <div class="node-nav" id="node-nav"></div>
      </div>
    </main>
  </div>
  <nav class="mob-bar">
    <button class="mob-tab act" id="mob-home"><span class="mt-ico">&#9672;</span>Home</button>
    <button class="mob-tab" id="mob-menu"><span class="mt-ico">&#9776;</span>Topics</button>
  </nav>
</div>
<div class="mob-overlay" id="mob-overlay"></div>
<div class="mob-drawer" id="mob-drawer">
  <div class="mob-drawer-head">
    <div class="logo"><span class="logo-dot"></span>Topics</div>
    <button class="mob-close" id="mob-close">&#10005;</button>
  </div>
  <div id="mob-sidebar-inner"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const CHAPTERS=[
{id:"jainism",title:"Jainism",icon:"🕉️",nodes:[
{id:"j1",title:"Mahavira & Tirthankaras",xp:50,type:"regular",seqIdx:0,
learn:`<h2>Mahavira &amp; Tirthankaras</h2>
<p>Jainism recognises <strong>24 Tirthankaras</strong> (ford-makers) who achieved liberation and showed the way.</p>
<h3>Key Tirthankaras</h3>
<div class="tbl-wrap"><table><thead><tr><th>#</th><th>Tirthankara</th><th>Symbol</th></tr></thead><tbody>
<tr><td>1st</td><td><strong>Rishabhanath (Adinath)</strong></td><td><strong>Bull</strong></td></tr>
<tr><td>2nd</td><td>Ajitnath</td><td>Elephant</td></tr>
<tr><td>7th</td><td>Suparaswanath</td><td><strong>Swastika</strong></td></tr>
<tr><td>22nd</td><td><strong>Arishtanemi (Neminath)</strong></td><td><strong>Conch Shell</strong></td></tr>
<tr><td>23rd</td><td><strong>Parshvanath</strong></td><td><strong>Serpent</strong> — preached 4 vows</td></tr>
<tr><td>24th</td><td><strong>Mahavira (Vardhaman)</strong></td><td><strong>Lion</strong></td></tr>
</tbody></table></div>
<h3>Mahavira — Complete Profile</h3>
<div class="tbl-wrap"><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody>
<tr><td>Birth year</td><td><strong>599 BC</strong> (Shvetambara / SSC standard)</td></tr>
<tr><td>Birth place</td><td><strong>Kundagrama</strong> near <strong>Vaishali</strong></td></tr>
<tr><td>Childhood name</td><td><strong>Vardhaman</strong></td></tr>
<tr><td>Father / Mother</td><td><strong>Siddhartha</strong> / <strong>Trishla</strong></td></tr>
<tr><td>Wife / Daughter</td><td><strong>Yashoda</strong> / Annoja Priyadarsni</td></tr>
<tr><td>1st disciple / Son-in-law</td><td><strong>Jamali</strong></td></tr>
<tr><td>Renounced home at age</td><td><strong>30</strong></td></tr>
<tr><td>Kaivalya (enlightenment)</td><td><strong>Rajupalika River</strong>, under Saal tree</td></tr>
<tr><td>Language preached</td><td><strong>Prakrit</strong></td></tr>
<tr><td>Death (Nirvana)</td><td><strong>527 BC</strong> at <strong>Pavapuri</strong></td></tr>
</tbody></table></div>
<h3>Mahavira vs Parshvanath</h3>
<div class="tbl-wrap"><table><thead><tr><th>Feature</th><th>Parshvanath (23rd)</th><th>Mahavira (24th)</th></tr></thead><tbody>
<tr><td>Vows</td><td><strong>4 vows</strong> (Ahimsa, Satya, Asteya, Aparigraha)</td><td><strong>5 vows</strong> + added Brahmacharya</td></tr>

{id:"j2",title:"Jain Doctrine, Councils & Sects",xp:50,type:"regular",seqIdx:1,
learn:`<h2>Jain Doctrine, Councils &amp; Sects</h2>
<h3>Tri-Ratna (Three Jewels)</h3>
<ol><li><strong>Samyaka Darshan</strong> — Right Faith</li>
<li><strong>Samyaka Gyan</strong> — Right Knowledge</li>
<li><strong>Samyaka Acharan</strong> — Right Conduct</li></ol>
<h3>Pancha Mahavrata (Five Great Vows)</h3>
<ol><li><strong>Ahimsa</strong> — Non-injury (most extreme in Jainism)</li>
<li><strong>Satya</strong> — Non-lying</li>
<li><strong>Asteya</strong> — Non-stealing</li>
<li><strong>Aparigraha</strong> — Non-possession</li>
<li><strong>Brahmacharya</strong> — Celibacy ← <strong>Added by Mahavira</strong></li></ol>
<h3>Jaina Councils</h3>
<div class="tbl-wrap"><table><thead><tr><th>Council</th><th>Place</th><th>Leader</th><th>Period</th><th>Outcome</th></tr></thead><tbody>
<tr><td><strong>1st Jain Council</strong></td><td><strong>Pataliputra</strong></td><td><strong>Sthulabahu</strong></td><td>3rd century BC</td><td>Compiled 12 Angas</td></tr>
<tr><td><strong>2nd Jain Council</strong></td><td><strong>Valabhi</strong></td><td><strong>Devaradhikshamasramana</strong></td><td><strong>513 AD</strong></td><td>12 Angas + 12 Upangas</td></tr>
</tbody></table></div>
<h3>Sects of Jainism</h3>
<div class="tbl-wrap"><table><thead><tr><th>Sect</th><th>Practice</th><th>Leader</th><th>Location</th></tr></thead><tbody>
<tr><td><strong>Digambara</strong></td><td>Sky-clad (<strong>naked</strong>)</td><td><strong>Bhadrabahu</strong></td><td>South (Deccan)</td></tr>
<tr><td><strong>Shvetambara</strong></td><td><strong>White-clad</strong></td><td><strong>Sthulabhadra</strong></td><td>North (Magadha)</td></tr>
</tbody></table></div>
<p>Split during Chandragupta Maurya's reign — <strong>famine</strong> in Magadha. Bhadrabahu led group to Deccan → <strong>Digambara</strong>. Sthulabhadra stayed North → <strong>Shvetambara</strong>.</p>
<h3>Jainism vs Buddhism</h3>
<div class="tbl-wrap"><table><thead><tr><th>Feature</th><th>Jainism</th><th>Buddhism</th></tr></thead><tbody>
<tr><td>Salvation</td><td>Extreme austerity</td><td>Middle path</td></tr>
<tr><td>Soul</td><td><strong>Believes in soul</strong></td><td>Does NOT believe in soul</td></tr>
<tr><td>Language</td><td><strong>Prakrit</strong></td><td><strong>Pali</strong></td></tr>
<tr><td>Spread</td><td>Confined to India; survived</td><td>Died in India; spread abroad</td></tr>
</tbody></table></div>
<div class="trap-box">⚠ TRAPS: 1st Jain Council = <strong>Pataliputra</strong> (not Vaishali). 2nd Jain Council = <strong>Valabhi</strong> (not Pataliputra). Digambara = <strong>naked</strong>; Shvetambara = <strong>white</strong>. Tri-Ratna ≠ Buddhist 3 Ratnas.</div>`,

{id:"b1",title:"Buddha — Life & Teachings",xp:55,type:"regular",seqIdx:3,
learn:`<h2>Lord Buddha — Life &amp; Teachings</h2>
<h3>Complete Profile</h3>
<div class="tbl-wrap"><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody>
<tr><td>Birth year</td><td><strong>563 BC</strong></td></tr>
<tr><td>Birth place</td><td><strong>Lumbini, Nepal</strong></td></tr>
<tr><td>Birth day</td><td><strong>Vaishakha Purnima</strong></td></tr>
<tr><td>Childhood name / Clan</td><td><strong>Siddhartha</strong> / <strong>Gautam</strong></td></tr>
<tr><td>Father / Mother</td><td><strong>Suddhodana</strong> / <strong>Mahamaya Devi</strong> (died 7 days after birth)</td></tr>
<tr><td>Foster mother</td><td><strong>Pajapati Gotami</strong></td></tr>
<tr><td>Wife / Son</td><td><strong>Yashodhara</strong> / <strong>Rahul</strong></td></tr>
<tr><td>Left home at age</td><td><strong>29</strong> — <strong>Mahabhinishkraman</strong> (Great Renunciation)</td></tr>
<tr><td>Enlightenment at age</td><td><strong>35</strong>; under <strong>Peepal (Bodhi) tree</strong> at <strong>Bodh Gaya</strong></td></tr>
<tr><td>1st sermon</td><td><strong>Sarnath</strong> (Deer Park) to <strong>5 ascetics</strong> — <strong>Dhammachakrapravartana</strong></td></tr>
<tr><td>1st disciple</td><td><strong>Kondanna</strong> (after 1st sermon)</td></tr>
<tr><td>Personal attendant</td><td><strong>Ananda</strong></td></tr>
<tr><td>Girl who offered milk &amp; rice</td><td><strong>Sujata</strong> (before enlightenment)</td></tr>
<tr><td>Death (Mahaparinirvana)</td><td><strong>483 BC</strong>, <strong>Kushinara</strong> (Kasia, UP)</td></tr>
<tr><td>Death cause</td><td>Ate pork offered by <strong>Chunda</strong> (blacksmith)</td></tr>
</tbody></table></div>
<h3>Four Noble Truths</h3>
<ol><li><strong>Dukkha</strong> — Life is full of suffering</li>
<li><strong>Samudaya</strong> — Suffering has a cause (desire)</li>
<li><strong>Nirodha</strong> — Suffering can be ended</li>
<li><strong>Marga</strong> — Eightfold Path ends suffering</li></ol>
<h3>Three Ratnas of Buddhism</h3>
<p><strong>Buddha</strong> (teacher) + <strong>Dhamma</strong> (teaching) + <strong>Sangha</strong> (community)</p>
<div class="trap-box">⚠ TRAPS: Sarnath = 1st sermon (NOT Bodh Gaya). Ananda = attendant; Kondanna = 1st disciple. Sujata = rice &amp; milk before enlightenment; Chunda = last meal before death. All three events = <strong>Vaishakha Purnima</strong>.</div>`,
revision:[

{id:"b2",title:"Buddhist Councils, Sects & Tripitaka",xp:55,type:"regular",seqIdx:4,
learn:`<h2>Buddhist Councils, Sects &amp; Tripitaka</h2>
<h3>Four Buddhist Councils</h3>
<div class="tbl-wrap"><table><thead><tr><th>Council</th><th>Year</th><th>Place</th><th>King</th><th>Chairman</th><th>Outcome</th></tr></thead><tbody>
<tr><td><strong>1st</strong></td><td>483 BC</td><td><strong>Rajgriha</strong></td><td><strong>Ajatashatru</strong></td><td>Mahakassapa</td><td>Vinaya + Sutta Pitaka compiled</td></tr>
<tr><td><strong>2nd</strong></td><td>383 BC</td><td><strong>Vaishali</strong></td><td><strong>Kalashoka</strong></td><td>Sarvakamini</td><td>Split: Sthavira &amp; Mahasanghika</td></tr>
<tr><td><strong>3rd</strong></td><td>255 BC</td><td><strong>Pataliputra</strong></td><td><strong>Ashoka</strong></td><td><strong>Moggaliputta Tisya</strong></td><td>Abhidhamma Pitaka compiled</td></tr>
<tr><td><strong>4th</strong></td><td>72 AD</td><td><strong>Kashmir</strong></td><td><strong>Kanishka</strong></td><td><strong>Vasumitra</strong></td><td>Split: Hinayana &amp; Mahayana</td></tr>
<tr><td>5th</td><td>1871 AD</td><td>Mandalay, Burma</td><td>Mindon Min</td><td>—</td><td>Tripitaka on 729 marble slabs</td></tr>
<tr><td>6th</td><td>1954 AD</td><td>Rangoon, Burma</td><td>PM U Nu</td><td>—</td><td>Modern Tripitaka edition</td></tr>
</tbody></table></div>
<h3>Sects of Buddhism</h3>
<div class="tbl-wrap"><table><thead><tr><th>Sect</th><th>Key Belief</th><th>Region</th></tr></thead><tbody>
<tr><td><strong>Hinayana</strong></td><td>Individual salvation; <strong>no idol worship</strong></td><td>Sri Lanka, SE Asia</td></tr>
<tr><td><strong>Mahayana</strong></td><td>Salvation for all; <strong>idol worship</strong>; Bodhisattvas</td><td>China, Japan, Korea</td></tr>
<tr><td><strong>Vajrayana</strong></td><td>Magical power; tantric practices</td><td><strong>Bengal &amp; Bihar</strong></td></tr>
</tbody></table></div>
<h3>Tripitaka</h3>
<div class="tbl-wrap"><table><thead><tr><th>Pitaka</th><th>Language</th><th>Content</th><th>Compiled at</th></tr></thead><tbody>
<tr><td><strong>Vinaya Pitaka</strong></td><td>Pali</td><td>Rules for monks</td><td>1st Council</td></tr>
<tr><td><strong>Sutta Pitaka</strong></td><td>Pali</td><td>Buddha's discourses; 5 Nikayas; Jatakas</td><td>1st Council</td></tr>
<tr><td><strong>Abhidhamma Pitaka</strong></td><td>Pali</td><td>Philosophical analysis</td><td>3rd Council</td></tr>
</tbody></table></div>
<p><strong>Jatakas</strong> = part of <strong>Khuddaka Nikaya</strong> of Sutta Pitaka</p>
<div class="trap-box">⚠ TRAPS: 1st Council = Ajatashatru (NOT Ashoka). 3rd = Ashoka at Pataliputra (NOT Vaishali). 4th = Kanishka at Kashmir (NOT Ashoka). Vasumitra = 4th Council; Sarvakamini = 2nd Council. Jatakas = Sutta Pitaka. Hinayana = NO idol worship.</div>`,

{id:"b3",title:"Buddhist Architecture & Ajivika Sect",xp:45,type:"regular",seqIdx:5,
learn:`<h2>Buddhist Architecture &amp; Ajivika Sect</h2>
<h3>Buddhist Architectural Terms</h3>
<div class="tbl-wrap"><table><thead><tr><th>Term</th><th>Meaning</th></tr></thead><tbody>
<tr><td><strong>Stupa</strong></td><td>Hemispherical dome over sacred relic; <strong>Sanchi Stupa</strong> most famous (Ashoka)</td></tr>
<tr><td><strong>Vihara</strong></td><td>Monastery for monks</td></tr>
<tr><td><strong>Chaitya</strong></td><td>Prayer hall with a stupa inside</td></tr>
<tr><td><strong>Pillar</strong></td><td>Ashokan pillars; <strong>4-lion capital at Sarnath</strong> = India's National Emblem</td></tr>
</tbody></table></div>
<h3>Ajivika Sect</h3>
<div class="tbl-wrap"><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody>
<tr><td>Founder</td><td><strong>Makkhali Gosala</strong></td></tr>
<tr><td>Period</td><td>6th century BC — contemporary of both <strong>Buddha and Mahavira</strong></td></tr>
<tr><td>Core belief</td><td><strong>Niyati</strong> (Fate/Destiny) = supreme force — <strong>pure determinism</strong></td></tr>
<tr><td>Salvation timing</td><td>After <strong>8,400,000 mahakalpas</strong> — regardless of actions</td></tr>
<tr><td>Called</td><td><strong>Fatalists / Determinists</strong></td></tr>
<tr><td>Royal sympathiser</td><td><strong>Bindusara</strong> (Mauryan king)</td></tr>
</tbody></table></div>
<p>Opposed Brahmanical rituals + Buddhist karma + Jain asceticism. Mahavira and Gosala were companions during his 6-year wandering.</p>
<div class="trap-box">⚠ KEY: Sanchi Stupa = built by <strong>Ashoka</strong>; gateways added by Shunga. Chaitya ≠ Vihara. Ajivika founder = <strong>Makkhali Gosala</strong>. Bindusara = Ajivika sympathiser; Chandragupta = Jainism.</div>`,

{id:"m1",title:"Chandragupta & Chanakya",xp:55,type:"regular",seqIdx:6,
learn:`<h2>Chandragupta Maurya &amp; Chanakya</h2>
<h3>Chandragupta Maurya (321–297 BC)</h3>
<div class="tbl-wrap"><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody>
<tr><td>Greek name</td><td><strong>Sandrocottus / Androcottus</strong></td></tr>
<tr><td>Advisor</td><td><strong>Chanakya / Kautilya / Vishnugupta</strong></td></tr>
<tr><td>Defeated</td><td><strong>Seleucus Nicator</strong> in <strong>305 BC</strong></td></tr>
<tr><td>Gave to Seleucus</td><td><strong>500 elephants</strong></td></tr>
<tr><td>Got from Seleucus</td><td>4 territories (Kabul, Herat, Gandhara, Baluchistan)</td></tr>
<tr><td>Greek ambassador</td><td><strong>Megasthenes</strong> (wrote <strong>Indica</strong>)</td></tr>
<tr><td>Capital</td><td><strong>Pataliputra</strong></td></tr>
<tr><td>Later life religion</td><td><strong>Jainism</strong></td></tr>
<tr><td>Death</td><td>At <strong>Shravanabelagola</strong> — by fasting (<strong>Sallekhana</strong>)</td></tr>
</tbody></table></div>
<h3>Chanakya / Kautilya</h3>
<ul><li>Also called <strong>Vishnugupta</strong> — taught at <strong>Taxila</strong></li>
<li>Wrote <strong>Arthashastra</strong> — rediscovered <strong>1905</strong> by <strong>R. Shamasastry</strong></li>
<li>Called <strong>Indian Machiavelli</strong></li></ul>
<h3>Bindusara (297–268 BC)</h3>
<div class="tbl-wrap"><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody>
<tr><td>Greek name</td><td><strong>Amitrochattes</strong></td></tr>
<tr><td>Ambassador from Syria</td><td><strong>Deimachus</strong> (from Antiochus I)</td></tr>
<tr><td>Ambassador from Egypt</td><td><strong>Dionysius</strong> (from Ptolemy Philadelphus)</td></tr>
</tbody></table></div>
<div class="trap-box">⚠ TRAPS: Chandragupta gave <strong>500 elephants</strong> (NOT gold). Megasthenes = Chandragupta's ambassador; Deimachus = Bindusara's. Chandragupta adopted <strong>Jainism</strong> (not Buddhism). Arthashastra rediscovered by <strong>R. Shamasastry in 1905</strong>.</div>`,
revision:[
"Chandragupta(321-297BC): Greek name Sandrocottus, advisor Chanakya, defeated Seleucus 305BC",
"Gave 500 elephants, got Kabul/Herat/Gandhara/Baluchistan | Megasthenes wrote Indica",
"Chanakya=Kautilya=Vishnugupta, taught at Taxila, wrote Arthashastra (rediscovered 1905, Shamasastry)",
"Bindusara(297-268BC): Greek name Amitrochattes, ambassadors Deimachus(Syria)+Dionysius(Egypt)",
"Chandragupta died at Shravanabelagola (Sallekhana, Jainism)"
],
oneliners:[
"Chandragupta Maurya ruled from 321-297 BC",
"Greeks called Chandragupta 'Sandrocottus' or 'Androcottus'",
"Chanakya, also called Kautilya or Vishnugupta, was Chandragupta's advisor",
"Chandragupta defeated Seleucus Nicator in 305 BC",
"Chandragupta gave Seleucus 500 elephants in exchange for 4 territories",
"The 4 territories gained were Kabul, Herat, Gandhara, and Baluchistan",
"Megasthenes was the Greek ambassador to Chandragupta's court and wrote Indica",
"Chandragupta's capital was Pataliputra",

{id:"m3",title:"Arthashastra, Saptanga & Mandala",xp:50,type:"regular",seqIdx:8,
learn:`<h2>Arthashastra, Saptanga &amp; Mandala Theory</h2>
<h3>Saptanga Theory (7 Elements of State)</h3>
<div class="tbl-wrap"><table><thead><tr><th>#</th><th>Sanskrit</th><th>Meaning</th></tr></thead><tbody>
<tr><td>1</td><td><strong>Swami</strong></td><td>King</td></tr>
<tr><td>2</td><td><strong>Amatya</strong></td><td>Ministers</td></tr>
<tr><td>3</td><td><strong>Janapada</strong></td><td>Territory + people</td></tr>
<tr><td>4</td><td><strong>Durga</strong></td><td>Fort</td></tr>
<tr><td>5</td><td><strong>Kosha</strong></td><td>Treasury</td></tr>
<tr><td>6</td><td><strong>Danda</strong></td><td>Army</td></tr>
<tr><td>7</td><td><strong>Mitra</strong></td><td>Allies</td></tr>
</tbody></table></div>
<h3>Mandala Theory (Circle of States)</h3>
<ul><li><strong>Vijigishu</strong> = conquering king (center)</li>
<li><strong>Ari</strong> = enemy (immediate neighbour)</li>
<li><strong>Mitra</strong> = friend (neighbour's neighbour)</li></ul>
<h3>Shadgunya (6 Foreign Policies)</h3>
<p>Sandhi (peace), Vigraha (war), Asana (neutrality), Yana (march), Samshraya (alliance), Dvaidhabhava (double policy)</p>
<h3>Mauryan Spy System</h3>
<div class="tbl-wrap"><table><thead><tr><th>Type</th><th>Name</th></tr></thead><tbody>
<tr><td>Stationary spies</td><td><strong>Sanstha Guptas</strong></td></tr>
<tr><td>Wandering spies</td><td><strong>Sanchara Guptas</strong></td></tr>
<tr><td>General agents</td><td><strong>Gudhapurusha</strong></td></tr>
</tbody></table></div>
<p>Pataliputra administered by <strong>6 Committees × 5 members</strong> each (per Megasthenes).</p>
<div class="trap-box">⚠ KEY: Saptanga = 7 elements. Mandala = neighbour = enemy. Vijigishu = conquering king. Pataliputra = 6 committees. Shadgunya = 6 foreign policies.</div>`,

<h3>Shunga Dynasty (185–73 BC)</h3>

<ul><li>Caste: <strong>Brahmins</strong> — 1st Brahmin rulers of Magadha</li>
<li>Capital: <strong>Pataliputra</strong></li>
<li><strong>Patanjali's Mahabhashya</strong> written during Shunga period (NOT Mauryan)</li>

<tr><td>Significance</td><td>Oldest known Vishnu pillar; Greek adopting Indian religion</td></tr>
</tbody></table></div>
<h3>Kanva Dynasty (73–28 BC)</h3>

<li>Last ruler: <strong>Susarman</strong>; ended by Satavahanas</li></ul>

{id:"pm2",title:"Foreign Rulers — Indo-Greeks, Shakas & Kushans",xp:55,type:"regular",seqIdx:10,
learn:`<h2>Foreign Rulers — Indo-Greeks, Shakas &amp; Kushans</h2>
<h3>Comparison Table</h3>
<div class="tbl-wrap"><table><thead><tr><th>Dynasty</th><th>Period</th><th>Key Ruler</th><th>Key Contribution</th></tr></thead><tbody>
<tr><td><strong>Indo-Greeks</strong></td><td>~200–30 BC</td><td><strong>Menander (Milinda)</strong></td><td>Bilingual coins; Milindapanha; Gandhara art</td></tr>
<tr><td><strong>Shakas</strong></td><td>1st BC–4th AD</td><td><strong>Rudradaman I</strong></td><td>1st Sanskrit inscription (Junagarh); Sudarshana Lake</td></tr>
<tr><td><strong>Pahlavas</strong></td><td>1st BC</td><td><strong>Gondophernes</strong></td><td>Saint Thomas traditionally visited India</td></tr>
<tr><td><strong>Kushans</strong></td><td>1st–3rd AD</td><td><strong>Kanishka</strong></td><td>Saka Era (78 AD); 4th Buddhist Council; Gandhara art</td></tr>
</tbody></table></div>
<h3>Kanishka — Detailed Profile</h3>
<div class="tbl-wrap"><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody>
<tr><td>Capital</td><td><strong>Purushapura (Peshawar)</strong></td></tr>
<tr><td>Era founded</td><td><strong>Saka Era (78 AD)</strong></td></tr>
<tr><td>4th Buddhist Council</td><td>Kashmir; Chairman: <strong>Vasumitra</strong>; Vice: <strong>Ashvagosha</strong></td></tr>
<tr><td>Court scholars</td><td>Ashvagosha, Nagarjuna, Charaka, Sushruta, Vasumitra</td></tr>
<tr><td>Coins</td><td>First to depict <strong>Buddha</strong> on coins</td></tr>
</tbody></table></div>
<h3>Ashvagosha</h3>
<ul><li>Wrote <em>Buddhacharita</em> (life of Buddha)</li>
<li>Called <strong>Father of Sanskrit Drama</strong></li>
<li>Vice-chairman of 4th Buddhist Council</li></ul>
<div class="trap-box">⚠ TRAPS: Menander = Milinda. Saka Era = <strong>78 AD</strong> (Kanishka). Kanishka capital = <strong>Purushapura</strong> (NOT Mathura). 4th Council chairman = <strong>Vasumitra</strong>. Kanishka coins = 1st to depict Buddha. Ashvagosha = <strong>father of Sanskrit drama</strong>.</div>`,

{id:"pm3",title:"Satavahanas",xp:50,type:"regular",seqIdx:11,
learn:`<h2>Satavahanas (120 BC – 220 AD)</h2>
<ul><li>Also called <strong>Andhras</strong> in Puranas</li>
<li>Capital: <strong>Pratishtana (Paithan)</strong> on Godavari, Maharashtra</li>
<li>Official language: <strong>Prakrit</strong></li>
<li>Most common coins: <strong>Lead</strong></li>
<li>First rulers to make <strong>land grants to Brahmanas</strong></li></ul>
<h3>Key Rulers</h3>
<div class="tbl-wrap"><table><thead><tr><th>Ruler</th><th>Position</th><th>Key Achievement</th></tr></thead><tbody>
<tr><td><strong>Simuka</strong></td><td>Founder (1st)</td><td>Founded dynasty</td></tr>
<tr><td><strong>Satakarni I</strong></td><td>3rd ruler</td><td>Performed Vedic sacrifices</td></tr>
<tr><td><strong>Hala</strong></td><td>17th ruler</td><td>Wrote <strong>Gathasaptasati (Sattasai)</strong> in Prakrit</td></tr>
<tr><td><strong>Gautamiputra Satakarni</strong></td><td><strong>23rd ruler</strong> (106–130 AD)</td><td><strong>Greatest ruler</strong>; defeated Saka Nahapana</td></tr>
<tr><td><strong>Vasishthiputra</strong></td><td>24th ruler</td><td>Defeated twice by Rudradaman I</td></tr>
</tbody></table></div>
<h3>Special Features</h3>
<ul><li>First to practice <strong>matrilineal naming</strong> (Gautamiputra = son of Gautami)</li>
<li><strong>Nasik inscription</strong> = recorded by his mother <strong>Gautami Balasri</strong></li>
<li>First to issue coins with <strong>portraits of rulers</strong></li></ul>
<h3>Amravati Stupa</h3>
<ul><li>On <strong>Krishna River, Andhra Pradesh</strong></li>
<li>Also called <strong>Mahachaitya</strong>; white marble</li>
<li>Parts in <strong>Chennai Government Museum</strong> + <strong>British Museum</strong></li></ul>
<div class="trap-box">⚠ TRAPS: Satavahanas = <strong>Andhras</strong>. Gautamiputra = <strong>23rd ruler</strong> (NOT founder). Hala wrote <strong>Sattasai</strong> (NOT Arthashastra). Satavahanas issued <strong>lead coins</strong> (NOT gold). Matrilineal naming = mothers' names for sons.</div>`,

{id:"t1",title:"Councils Trap — Buddhist & Jain",xp:40,type:"trap",seqIdx:12,
learn:`<h2>Councils Trap — Most Confused Facts</h2>
<h3>Buddhist Councils — Quick Recall</h3>
<div class="tbl-wrap"><table><thead><tr><th>Council</th><th>Year</th><th>Place</th><th>King</th><th>Chairman</th><th>Result</th></tr></thead><tbody>
<tr><td><strong>1st</strong></td><td>483 BC</td><td><strong>Rajgriha</strong></td><td><strong>Ajatashatru</strong></td><td><strong>Mahakassapa</strong></td><td>Vinaya + Sutta Pitaka</td></tr>
<tr><td><strong>2nd</strong></td><td>383 BC</td><td><strong>Vaishali</strong></td><td><strong>Kalashoka</strong></td><td><strong>Sarvakamini</strong></td><td>Split: Sthavira + Mahasanghika</td></tr>
<tr><td><strong>3rd</strong></td><td>255 BC</td><td><strong>Pataliputra</strong></td><td><strong>Ashoka</strong></td><td><strong>Moggaliputta Tisya</strong></td><td>Abhidhamma Pitaka</td></tr>
<tr><td><strong>4th</strong></td><td>72 AD</td><td><strong>Kashmir</strong></td><td><strong>Kanishka</strong></td><td><strong>Vasumitra</strong></td><td>Split: Hinayana + Mahayana</td></tr>
</tbody></table></div>
<h3>Jain Councils — Quick Recall</h3>
<div class="tbl-wrap"><table><thead><tr><th>Council</th><th>Place</th><th>Leader</th><th>Year</th><th>Outcome</th></tr></thead><tbody>
<tr><td><strong>1st</strong></td><td><strong>Pataliputra</strong></td><td><strong>Sthulabahu</strong></td><td>3rd century BC</td><td>12 Angas compiled</td></tr>
<tr><td><strong>2nd</strong></td><td><strong>Valabhi</strong></td><td><strong>Devaradhikshamasramana</strong></td><td><strong>513 AD</strong></td><td>12 Angas + 12 Upangas</td></tr>
</tbody></table></div>
<h3>Most Common Wrong Answers</h3>
<div class="tbl-wrap"><table><thead><tr><th>Wrong Answer</th><th>Correct Answer</th></tr></thead><tbody>
<tr><td>3rd Buddhist Council at Vaishali</td><td><strong>Pataliputra</strong></td></tr>
<tr><td>4th Buddhist Council by Ashoka</td><td>By <strong>Kanishka</strong></td></tr>
<tr><td>1st Jain Council at Vaishali</td><td><strong>Pataliputra</strong></td></tr>
<tr><td>2nd Jain Council at Pataliputra</td><td><strong>Valabhi</strong></td></tr>
<tr><td>Ashoka = chairman of 3rd Council</td><td><strong>Moggaliputta Tisya</strong> = chairman; Ashoka = king</td></tr>
<tr><td>Vasumitra = 2nd Council chairman</td><td>Vasumitra = 4th Council; 2nd = <strong>Sarvakamini</strong></td></tr>
</tbody></table></div>
<div class="trap-box">⚠ MNEMONIC — Buddhist councils: A-K-A-K (Ajatashatru, Kalashoka, Ashoka, Kanishka). Places: Rajgriha → Vaishali → Pataliputra → Kashmir. Jain: P-V (Pataliputra → Valabhi).</div>`,

const SK='centumania_anc2_v1';
let S={xp:0,visited:{},mcq:{},faa:{},curNode:null,chOpen:{}};
function loadS(){try{const d=localStorage.getItem(SK);if(d)S=Object.assign(S,JSON.parse(d));}catch(e){}}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

/* ── METRICS ── */
let _mToken=null,_mSid=null;
function initMetrics(){
  // Supabase stores the session under a key like `sb-<ref>-auth-token`
  // in either localStorage or sessionStorage depending on the user's "keep me
  // signed in" choice (see centumania-mvp/src/lib/supabase/client.ts).
  try {
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  } catch(e){}
  _mSid='anc2-'+(Date.now().toString(36));
}
function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},
    body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})
  }).catch(()=>{});
}

function allNodes(){return CHAPTERS.flatMap(ch=>ch.nodes);}
function seqNodes(){return allNodes().slice().sort((a,b)=>a.seqIdx-b.seqIdx);}
function findNode(id){return allNodes().find(n=>n.id===id);}
function totalXP(){return allNodes().reduce((s,n)=>s+(S.mcq[n.id]&&S.mcq[n.id].passed?n.xp:0),0);}
function overallPct(){
  const all=allNodes().filter(n=>n.type!=='gold');
  const p=all.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  return all.length?Math.round(100*p/all.length):0;
}

function isUnlocked(node){
  if(node.seqIdx===0)return true;
  if(node.type==='gold'){
    const all=seqNodes().filter(n=>n.type!=='gold');
    const passed=all.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
    return (passed/all.length)>=0.8;
  }
  const prev=seqNodes().find(n=>n.seqIdx===node.seqIdx-1);
  return !!(S.mcq[prev.id]&&S.mcq[prev.id].passed);
}

/* ── TOAST ── */
let _tTimer;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type==='err'?' err':type==='warn'?' warn':'');
  clearTimeout(_tTimer);_tTimer=setTimeout(()=>t.className='toast',2800);
}

/* ── TOPBAR ── */
function updateTopbar(){
  const all=allNodes().filter(n=>n.type!=='gold');
  const traps=allNodes().filter(n=>n.type==='trap');
  const passed=all.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  const tPassed=traps.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  document.getElementById('h-xp').textContent=totalXP();
  document.getElementById('h-nd').textContent=passed+'/'+all.length;
  document.getElementById('h-tp').textContent=tPassed+'/'+traps.length;
}

/* ── SIDEBAR ── */
function buildSidebar(){
  ['sidebar-inner','mob-sidebar-inner'].forEach(sid=>{
    const sb=document.getElementById(sid);
    sb.innerHTML='';
    CHAPTERS.forEach(ch=>{
      const grp=document.createElement('div');
      grp.className='ch-group';
      const passedCount=ch.nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
      const isOpen=S.chOpen[ch.id]!==false;
      const tog=document.createElement('button');
      tog.className='ch-toggle';
      tog.innerHTML='<span class="ch-icon">'+ch.icon+'</span><span class="ch-label">'+ch.title+'</span><span class="ch-prog">'+passedCount+'/'+ch.nodes.length+'</span><span class="ch-arr">'+(isOpen?'▾':'▸')+'</span>';
      tog.onclick=(()=>{const cid=ch.id;const o=isOpen;return()=>{S.chOpen[cid]=!o;saveS();buildSidebar();}})();
      grp.appendChild(tog);
      const items=document.createElement('div');
      items.className='node-items';
      items.style.display=isOpen?'block':'none';
      ch.nodes.forEach(node=>{
        const unlocked=isUnlocked(node);
        const m=S.mcq[node.id];
        const passed=m&&m.passed;
        const btn=document.createElement('button');
        btn.className='ni-btn'+(S.curNode===node.id?' active':'')+(passed?' passed':'')+(unlocked?'':' locked');
        let tag='';
        if(!unlocked)tag='<span class="ni-tag lock">🔒</span>';
        else if(passed)tag='<span class="ni-tag done">✓</span>';
        else if(S.visited[node.id])tag='<span class="ni-tag vis">●</span>';
        btn.innerHTML=tag+'<span class="ni-title">'+node.title+'</span>'+(node.xp?'<span class="ni-xp">+'+node.xp+'</span>':'');
        btn.onclick=(()=>{const nid=node.id;return()=>openNode(nid);})();
        items.appendChild(btn);
      });
      grp.appendChild(items);
      sb.appendChild(grp);
    });
  });
  updateTopbar();
}

/* ── OPEN NODE ── */
function openNode(id){
  const node=findNode(id);
  if(!node)return;
  if(!isUnlocked(node)){
    const prev=seqNodes().find(n=>n.seqIdx===node.seqIdx-1);
    showToast('🔒 Complete "'+(prev?prev.title:'previous node')+'" with 10/10 first!','warn');
    return;
  }
  S.curNode=id;S.visited[id]=true;saveS();buildSidebar();
  track('node_opened',{node_id:id,node_title:node.title,node_type:node.type,xp:node.xp});
  document.getElementById('dash-view').style.display='none';
  document.getElementById('node-view').style.display='block';
  renderNode(node);
  document.getElementById('mob-drawer').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('show');
  document.getElementById('main-area').scrollTop=0;
}

/* ── RENDER NODE ── */
function renderNode(node){
  const m=S.mcq[node.id]||{};
  const faaStr=m.faa!=null?Math.round(m.faa)+'%':'—';
  const bestStr=m.best!=null?Math.round(m.best)+'%':'—';
  let typTag='';
  if(node.type==='trap')typTag='<span class="node-type-tag trap">⚠ Trap Node</span>';
  if(node.type==='gold')typTag='<span class="node-type-tag gold">★ Golden Node</span>';
  const testLabel=m.passed?'🎯 Test (10/10 ✓)':'🎯 Test (10 MCQs)';
  const retryBtn=(m.attempts&&!m.passed&&node.type!=='gold')?'<button class="retry-btn" style="margin-left:auto" onclick="retryNode(\''+node.id+'\')">↺ Retry</button>':'';
  document.getElementById('node-content').innerHTML=
    '<div class="node-hd">'+
    '<div class="node-hd-top">'+typTag+'<div class="xp-pill">+'+(node.xp||0)+' XP</div></div>'+
    '<h2 class="node-title">'+node.title+'</h2>'+
    '<div class="node-stats">'+
    '<div class="ns-item"><div class="ns-label">FAA</div><div class="ns-val faa-col">'+faaStr+'</div></div>'+
    '<div class="ns-item"><div class="ns-label">Best</div><div class="ns-val">'+bestStr+'</div></div>'+
    '<div class="ns-item"><div class="ns-label">Attempts</div><div class="ns-val">'+(m.attempts||0)+'</div></div>'+
    '<div class="ns-item"><div class="ns-label">Status</div><div class="ns-val '+(m.passed?'pass-col':'pend-col')+'">'+(m.passed?'✓ Passed':'Pending')+'</div></div>'+
    retryBtn+
    '</div></div>'+
    '<div class="tabs">'+
    '<button class="tab active" onclick="switchTab(this,\'learn\')">📖 Learn</button>'+
    '<button class="tab" onclick="switchTab(this,\'flash\')">🗂 Flashcards</button>'+
    '<button class="tab" onclick="switchTab(this,\'test\')">'+testLabel+'</button>'+
    '</div>'+
    '<div id="tab-learn" class="tab-pane active">'+buildLearnPane(node)+'</div>'+
    '<div id="tab-flash" class="tab-pane">'+buildFlashPane(node)+'</div>'+
    '<div id="tab-test" class="tab-pane">'+buildTestPane(node)+'</div>';
  bindMCQ(node);
  buildNodeNav(node);
}

function switchTab(btn,tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

/* ── LEARN PANE ── */
function buildLearnPane(node){
  let h=node.learn?node.learn:'<p style="color:var(--ink2)">No content available.</p>';
  if(node.revision&&node.revision.length){
    h+='<div class="revision-block"><div class="fb-head">⚡ 30 SECOND REVISION</div><div class="fb-body"><ul class="facts">';
    node.revision.forEach(r=>h+='<li>'+r+'</li>');
    h+='</ul></div></div>';
  }
  if(node.oneliners&&node.oneliners.length){
    h+='<div class="oneliner-block"><div class="fb-head">🎯 20 EXAM ONE-LINERS</div><div class="fb-body"><ul class="facts">';
    node.oneliners.forEach(o=>h+='<li>'+o+'</li>');
    h+='</ul></div></div>';
  }
  return h;
}

/* ── FLASHCARD PANE ── */
function buildFlashPane(node){
  const cards=node.flashcards||[];
  if(!cards.length)return '<div class="fact-block"><div class="fb-body" style="padding:2rem;text-align:center;color:var(--ink2)">No flashcards for this node yet.</div></div>';
  let h='<p class="flash-hint">TAP A CARD TO FLIP • '+cards.length+' CARDS</p><div class="flash-grid">';
  cards.forEach((c,i)=>{
    h+='<div class="flash-card" id="fc-'+node.id+'-'+i+'" onclick="this.classList.toggle(\'flipped\')">'+
      '<div class="flash-inner">'+
      '<div class="flash-front">'+c.q+'</div>'+
      '<div class="flash-back">'+c.a+'</div>'+
      '</div></div>';
  });
  h+='</div><div class="flash-reset-row"><button class="retry-btn" onclick="resetFlash(\''+node.id+'\')">↺ Reset All Cards</button></div>';
  return h;
}
function resetFlash(nid){
  document.querySelectorAll('[id^="fc-'+nid+'-"]').forEach(c=>c.classList.remove('flipped'));
}

/* ── TEST PANE ── */
let _sess={};
function buildTestPane(node){
  if(node.type==='gold'){
    return '<div class="fact-block"><div class="fb-body" style="padding:2rem;text-align:center"><p style="font-size:1.1rem;color:var(--ink2)">🏹 Golden Revision Node — read the facts in the Learn tab and recall them all!</p></div></div>';
  }
  if(!_sess[node.id])_sess[node.id]={};
  const m=S.mcq[node.id]||{};
  const mcqs=node.mcqs||[];
  let h='';
  if(m.passed){
    h+='<div class="unlock-banner pass-banner">🎉 Passed! FAA: '+Math.round(m.faa||0)+'% | Best: '+Math.round(m.best||0)+'% | Attempts: '+(m.attempts||1)+'</div>';
  } else if(m.lastScore!==undefined){
    h+='<div class="unlock-banner fail-banner">'+m.lastScore+'/10 — Need 10/10 to unlock next node. FAA locked at '+Math.round(m.faa||0)+'%. <button class="retry-btn" onclick="retryNode(\''+node.id+'\')">↺ Retry</button></div>';
  }
  mcqs.forEach((q,i)=>{
    const sessAns=_sess[node.id][i];
    const answered=sessAns!==undefined||m.passed;
    const displayAns=sessAns!==undefined?sessAns:(m.passed?q.a:undefined);
    const faaCorrect=S.faa[node.id]&&S.faa[node.id][i]===true;
    const faaSet=S.faa[node.id]&&S.faa[node.id][i]!==undefined;
    h+='<div class="mcq-card'+(answered?' done':'')+'" data-qi="'+i+'" data-nid="'+node.id+'">';
    h+='<div class="mcq-q"><span class="q-num">'+(i+1)+'.</span> '+q.q+'</div>';
    h+='<div class="mcq-opts">';
    q.o.forEach((opt,oi)=>{
      let cls='mopt';
      if(answered){
        if(oi===q.a)cls+=' correct';
        else if(oi===displayAns&&displayAns!==q.a)cls+=' wrong';
      }
      h+='<button class="'+cls+'" data-oi="'+oi+'"'+(answered?' disabled':'')+'>'+String.fromCharCode(65+oi)+'. '+opt+'</button>';
    });
    h+='</div>';
    if(answered){
      const wasCorrect=displayAns===q.a;
      h+='<div class="mcq-fb">'+(wasCorrect?'✅':'❌')+' '+q.e+'</div>';
      if(faaSet){
        h+='<div class="mcq-faa"><span class="faa-chip '+(faaCorrect?'faa-ok':'faa-err')+'">'+(faaCorrect?'FAA ✓':'FAA ✗')+' (first attempt)</span></div>';
      }
    }
    h+='</div>';
  });
  if(!m.passed&&m.attempts){
    h+='<div style="margin-top:20px;padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;">'+
      '<span style="font-family:var(--mono);font-size:13px;color:var(--ink2)">Best: <b style="color:var(--gold)">'+Math.round(m.best||0)+'%</b> &nbsp;|&nbsp; FAA: <b style="color:var(--amber)">'+Math.round(m.faa||0)+'%</b> &nbsp;|&nbsp; Need <b style="color:var(--green)">10/10</b></span>'+
      '<button class="retry-btn" style="font-size:13px;padding:9px 22px" onclick="retryNode(\''+node.id+'\')">↺ Retry</button></div>';
  }
  return h;
}

/* ── BIND MCQ ── */
function bindMCQ(node){
  const mcqs=node.mcqs||[];
  const pane=document.getElementById('tab-test');
  if(!pane)return;
  pane.querySelectorAll('.mcq-card:not(.done)').forEach(card=>{
    const qi=parseInt(card.dataset.qi);
    card.querySelectorAll('.mopt').forEach(btn=>{
      btn.addEventListener('click',function(){
        if(card.classList.contains('done'))return;
        const chosen=parseInt(btn.dataset.oi);
        const correct=chosen===mcqs[qi].a;
        if(!_sess[node.id])_sess[node.id]={};
        _sess[node.id][qi]=chosen;
        if(!S.faa[node.id])S.faa[node.id]={};
        if(S.faa[node.id][qi]===undefined)S.faa[node.id][qi]=correct;
        card.classList.add('done');
        card.querySelectorAll('.mopt').forEach((b,oi)=>{
          b.disabled=true;
          if(oi===mcqs[qi].a)b.classList.add('correct');
          else if(oi===chosen&&!correct)b.classList.add('wrong');
        });
        const fb=document.createElement('div');
        fb.className='mcq-fb';
        fb.innerHTML=(correct?'✅':'❌')+' '+mcqs[qi].e;
        card.appendChild(fb);
        const faaEl=document.createElement('div');
        faaEl.className='mcq-faa';
        faaEl.innerHTML='<span class="faa-chip '+(S.faa[node.id][qi]?'faa-ok':'faa-err')+'">'+(S.faa[node.id][qi]?'FAA ✓':'FAA ✗')+' (first attempt)</span>';
        card.appendChild(faaEl);
        saveS();
        if(Object.keys(_sess[node.id]).length===mcqs.length)finishAttempt(node);
      });
    });
  });
}

function retryNode(nid){
  _sess[nid]={};
  if(S.mcq[nid])delete S.mcq[nid].lastScore;
  saveS();
  const node=findNode(nid);
  document.getElementById('tab-test').innerHTML=buildTestPane(node);
  bindMCQ(node);
  document.getElementById('main-area').scrollTop=0;
}

function finishAttempt(node){
  const mcqs=node.mcqs||[];
  const sess=_sess[node.id]||{};
  const correct=mcqs.filter((q,i)=>sess[i]===q.a).length;
  const pct=Math.round(100*correct/mcqs.length);
  const passed=correct===mcqs.length;
  const faaCorrect=mcqs.filter((q,i)=>S.faa[node.id]&&S.faa[node.id][i]===true).length;
  const faaPct=Math.round(100*faaCorrect/mcqs.length);
  if(!S.mcq[node.id])S.mcq[node.id]={faa:faaPct,best:0,passed:false,attempts:0};
  S.mcq[node.id].attempts=(S.mcq[node.id].attempts||0)+1;
  S.mcq[node.id].faa=faaPct;
  if(pct>(S.mcq[node.id].best||0))S.mcq[node.id].best=pct;
  if(passed){
    S.mcq[node.id].passed=true;
    if(S.mcq[node.id].lastScore!==undefined)delete S.mcq[node.id].lastScore;
    S.xp=(S.xp||0)+node.xp;
    saveS();buildSidebar();
    track('node_completed',{node_id:node.id,node_title:node.title,xp_earned:node.xp,faa_pct:faaPct,attempts:S.mcq[node.id].attempts});
    showToast('🎉 10/10! +'+(node.xp||0)+' XP earned!');
    setTimeout(()=>renderNode(node),400);
  } else {
    S.mcq[node.id].lastScore=correct;
    saveS();buildSidebar();
    track('mcq_completed',{node_id:node.id,node_title:node.title,score:correct,total:mcqs.length,pct,faa_pct:faaPct,passed:false,attempts:S.mcq[node.id].attempts});
    const pane=document.getElementById('tab-test');
    if(pane){pane.innerHTML=buildTestPane(node);bindMCQ(node);}
    showToast(correct+'/10 — Need 10/10. Retry to unlock next node.','warn');
  }
}

/* ── NODE NAV ── */
function buildNodeNav(node){
  const all=seqNodes();
  const idx=all.findIndex(n=>n.id===node.id);
  const prev=idx>0?all[idx-1]:null;
  const next=idx<all.length-1?all[idx+1]:null;
  const nextOk=next&&isUnlocked(next);
  document.getElementById('node-nav').innerHTML=
    '<button class="nav-btn" '+(prev?'':'disabled')+' onclick="'+(prev?'openNode(\''+prev.id+'\')':'void(0)')+'">&#8592; '+(prev?prev.title:'Start')+'</button>'+
    '<button class="nav-btn home-btn" onclick="showDash()">&#8862; Dashboard</button>'+
    '<button class="nav-btn" '+(nextOk?'':'disabled')+' onclick="'+(nextOk?'openNode(\''+next.id+'\')':'void(0)')+'">&#8594; '+(next?next.title:'End')+'</button>';
}

/* ── DASHBOARD ── */
function showDash(){
  S.curNode=null;saveS();buildSidebar();
  document.getElementById('node-view').style.display='none';
  document.getElementById('dash-view').style.display='block';
  document.getElementById('mob-home').classList.add('act');
  document.getElementById('mob-menu').classList.remove('act');
  const allN=allNodes().filter(n=>n.type!=='gold');
  const passedN=allN.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
  const pct=overallPct();
  const xp=totalXP();
  let chapCards='';
  CHAPTERS.forEach(ch=>{
    const nodes=ch.nodes;
    const p=nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;
    const pPct=nodes.length?Math.round(100*p/nodes.length):0;
    chapCards+='<div class="dc"><div class="dc-icon">'+ch.icon+'</div><div class="dc-label">'+ch.title+'</div><div class="dc-prog-bar"><div class="dc-bar" style="width:'+pPct+'%"></div></div><div class="dc-nums">'+p+'/'+nodes.length+' passed</div></div>';
  });
  const goldenOk=pct>=80;
  document.getElementById('dash-content').innerHTML=
    '<div class="dash-hero">'+
    '<div class="dh-title">CentuMania <span style="font-family:var(--mono);font-size:12px;color:var(--ink3);font-style:normal;letter-spacing:1px;display:block;margin-top:4px">ANCIENT HISTORY &middot; PART 2</span></div>'+
    '<div class="dh-xp">'+xp+' XP</div>'+
    '<div class="dh-bar-wrap"><div class="dh-bar" style="width:'+pct+'%"></div></div>'+
    '<div class="dh-label">'+passedN+' of '+allN.length+' nodes passed ('+pct+'%)</div>'+
    '</div>'+
    '<div class="dash-chapters">'+chapCards+'</div>'+
    '<div class="cta-row">'+
    '<button class="cta-btn" onclick="startNext()">&#9654; Continue Learning</button>'+
    '<button class="cta-btn sec" '+(goldenOk?'':'disabled')+' onclick="openNode(\'golden\')">&#127913; Golden Node'+(goldenOk?'':' (need 80%)')+'</button>'+
    '</div>';
}

function startNext(){
  const next=seqNodes().find(n=>isUnlocked(n)&&!(S.mcq[n.id]&&S.mcq[n.id].passed));
  if(next)openNode(next.id);
  else showToast('All nodes complete! 🏆 Amazing!');
}

/* ── MOBILE ── */
function initMobile(){
  document.getElementById('mob-home').addEventListener('click',()=>{showDash();});
  document.getElementById('mob-menu').addEventListener('click',()=>{
    document.getElementById('mob-drawer').classList.toggle('open');
    document.getElementById('mob-overlay').classList.toggle('show');
    document.getElementById('mob-menu').classList.toggle('act');
  });
  document.getElementById('mob-close').addEventListener('click',closeDrawer);
  document.getElementById('mob-overlay').addEventListener('click',closeDrawer);
}
function closeDrawer(){
  document.getElementById('mob-drawer').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('show');
  document.getElementById('mob-menu').classList.remove('act');
}

/* ── INIT ── */
function init(){
  loadS();
  initMetrics();
  track('material_opened',{material:'ancient_history_part2'});
  buildSidebar();
  initMobile();
  if(S.curNode){const n=findNode(S.curNode);if(n&&isUnlocked(n)){openNode(S.curNode);return;}}
  showDash();
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
