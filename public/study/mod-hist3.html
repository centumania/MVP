<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📜 Modern History Part 3 — CentuMania</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#130A0A;--bg2:#0A0505;--panel:#2A1010;--panel2:#3D1818;--line:#5C2525;
  --ink:#ECD4D4;--ink2:#CC9090;--ink3:#885555;
  --gold:#FCA5A5;--gold2:#CC2222;--gold-glow:rgba(252,165,165,.18);
  --amber:#FBBF24;--gold-bg:rgba(252,165,165,.09);
  --red:#f87171;--red-bg:rgba(248,113,113,.12);--blue:#93C5FD;--green:#4ade80;
}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;}
#topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:.6rem 1rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;flex-shrink:0;}
#menu-btn{background:none;border:none;color:var(--ink);font-size:1.4rem;cursor:pointer;padding:.2rem;}
#tb-title{flex:1;font-weight:700;font-size:.95rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#tb-xp{color:var(--amber);font-weight:700;font-size:.9rem;white-space:nowrap;}
#tb-pct{color:var(--green);font-weight:700;font-size:.9rem;white-space:nowrap;}
#layout{display:flex;flex:1;overflow:hidden;}
#aside{display:none;width:280px;background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;flex-shrink:0;transition:transform .25s;}
#sidebar-inner{padding:.5rem;}
#main{flex:1;overflow-y:auto;padding:1rem;}
#node-content{max-width:900px;margin:0 auto;}
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;}
#drawer-overlay.show{display:block;}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--panel2);color:var(--ink);padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;}
#toast.show{opacity:1;}
.node-item{display:flex;align-items:center;gap:.6rem;padding:.6rem .7rem;border-radius:8px;cursor:pointer;margin-bottom:.3rem;transition:background .2s;border:1px solid transparent;}
.node-item:hover{background:var(--panel);}
.node-item.locked{opacity:.5;cursor:not-allowed;}
.node-item.gold-node{border-color:var(--gold);background:var(--gold-bg);}
.node-icon{font-size:1.2rem;flex-shrink:0;}
.node-info{flex:1;min-width:0;}
.node-label{font-size:.82rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.node-xp{font-size:.75rem;color:var(--amber);white-space:nowrap;}
.prog-bar{height:4px;background:var(--panel2);border-radius:2px;margin-top:.3rem;}
.prog-fill{height:100%;background:var(--gold2);border-radius:2px;transition:width .4s;}
.tab-bar{display:flex;gap:.4rem;margin-bottom:1rem;border-bottom:2px solid var(--line);padding-bottom:.6rem;}
.tab-btn{padding:.45rem .9rem;border:none;border-radius:6px;cursor:pointer;font-size:.83rem;font-weight:600;background:var(--panel);color:var(--ink2);transition:all .2s;}
.tab-btn.active{background:var(--gold2);color:#fff;}
.learn-body{display:flex;flex-direction:column;gap:1rem;}
.score-badge{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.5rem 1rem;font-size:.85rem;color:var(--ink2);}
h2{color:var(--gold);font-size:1.3rem;margin:.3rem 0;}
h3{color:var(--gold);font-size:1rem;margin:.5rem 0;}
.fact-item{background:var(--panel);border-left:3px solid var(--gold2);padding:.6rem .9rem;border-radius:0 6px 6px 0;font-size:.88rem;line-height:1.5;margin-bottom:.4rem;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.83rem;}
th{background:var(--panel2);color:var(--gold);padding:.5rem .7rem;text-align:left;border:1px solid var(--line);}
td{padding:.45rem .7rem;border:1px solid var(--line);color:var(--ink2);}
tr:nth-child(even)td{background:var(--bg2);}
.mnemonic-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;font-size:.87rem;line-height:1.6;color:var(--ink);}
.traps-section,.revision-section,.oneliners-section{background:var(--panel);border-radius:8px;padding:.8rem 1rem;}
.trap-item{background:var(--red-bg);border-left:3px solid var(--red);padding:.5rem .8rem;border-radius:0 6px 6px 0;font-size:.84rem;margin-bottom:.4rem;color:var(--ink);}
.revision-section ul{list-style:none;padding:0;}
.revision-section li{padding:.3rem 0;border-bottom:1px solid var(--line);font-size:.84rem;color:var(--ink2);}
.revision-section li::before{content:'✓ ';color:var(--green);}
.oneliner{padding:.3rem 0;border-bottom:1px solid var(--line);font-size:.83rem;color:var(--ink2);}
.flash-body{display:flex;flex-direction:column;gap:1rem;padding:1rem 0;}.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.8rem;width:100%;}.flip-hint{font-size:.7rem;color:var(--ink3);margin-top:.6rem;}
.flash-counter{color:var(--ink2);font-size:.85rem;}
.flash-card{width:100%;height:175px;perspective:1000px;cursor:pointer;position:relative;}
.flash-front,.flash-back{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:1.2rem;border-radius:12px;backface-visibility:hidden;transition:transform .4s;}
.flash-front{background:var(--panel);border:2px solid var(--gold);transform:rotateY(0deg);}
.flash-back{background:var(--panel2);border:2px solid var(--green);transform:rotateY(180deg);}
.flash-card.flipped .flash-front{transform:rotateY(-180deg);}
.flash-card.flipped .flash-back{transform:rotateY(0deg);}
.flash-q{font-size:.95rem;font-weight:600;color:var(--gold);}
.flash-a{font-size:.9rem;color:var(--green);}
.flip-hint{font-size:.75rem;color:var(--ink3);margin-top:.5rem;}
.flash-nav{display:flex;gap:1rem;}
.flash-nav button{padding:.5rem 1.2rem;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;cursor:pointer;}
.flash-nav button:disabled{opacity:.4;cursor:not-allowed;}
.test-body{display:flex;flex-direction:column;gap:1rem;}
.q-block{background:var(--panel);border-radius:8px;padding:.8rem 1rem;}
.q-block.correct{border-left:4px solid var(--green);}
.q-block.wrong{border-left:4px solid var(--red);}
.q-text{font-size:.9rem;font-weight:600;margin-bottom:.6rem;color:var(--ink);}
.opts{display:flex;flex-direction:column;gap:.4rem;}
.opt-label{display:flex;align-items:center;gap:.6rem;padding:.4rem .7rem;border-radius:6px;font-size:.85rem;cursor:pointer;border:1px solid var(--line);color:var(--ink2);transition:background .2s;}
.opt-label:hover{background:var(--panel2);}
.opt-label.selected{background:var(--panel2);border-color:var(--gold);color:var(--ink);}
.opt-label.right-ans{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green);}
.opt-label.wrong-ans{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.opt-label input[type=radio]{accent-color:var(--gold);}
.exp-box{font-size:.82rem;color:var(--ink2);background:var(--bg2);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;}
.submit-btn{padding:.7rem 1.5rem;background:var(--gold2);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:opacity .2s;}
.submit-btn:hover{opacity:.85;}
.gold-submit{background:linear-gradient(135deg,#b91c1c,#dc2626);}
.result-banner{padding:1rem;border-radius:8px;text-align:center;font-size:1.1rem;font-weight:700;}
.result-banner.pass{background:rgba(74,222,128,.15);color:var(--green);border:1px solid var(--green);}
.result-banner.fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.gold-header{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.gold-header span:first-child{color:var(--gold);font-weight:700;font-size:1rem;}
.gold-header span:last-child{color:var(--amber);font-weight:700;}
.gold-facts-ticker{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:.6rem .9rem;font-size:.78rem;color:var(--ink2);margin-bottom:1rem;max-height:90px;overflow-y:auto;line-height:1.6;}
.gold-traps{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;margin-top:1rem;}
.gold-locked-msg{text-align:center;padding:3rem 2rem;color:var(--ink2);}
.gold-locked-msg h2{color:var(--gold);margin:1rem 0;}
.welcome-panel{text-align:center;padding:3rem 2rem;color:var(--ink2);}
.welcome-panel h1{color:var(--gold);font-size:1.8rem;margin-bottom:.8rem;}
.welcome-stats{display:flex;gap:1.5rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;}
.welcome-stats div{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.5rem 1rem;font-size:.85rem;}
@media(min-width:769px){
  #aside{display:flex;flex-direction:column}
}
@media(max-width:768px){
  #aside.open{display:block;position:fixed;top:0;left:0;height:100%;width:280px;z-index:200}
  #main{padding:.7rem;}
}
</style>

const CHAPTERS=[{"id": "reform_movements_hindu", "label": "Hindu Reform Movements", "icon": "🕉️", "xp": 60, "seqIdx": 0, "facts": ["Brahmo Sabha founded by <b>Raja Ram Mohan Roy</b> in <b>1828</b> in Calcutta — first organised social-reform movement.", "Brahmo Samaj renamed from Brahmo Sabha in <b>1843</b> under <b>Debendranath Tagore</b> (father of Rabindranath Tagore).", "<b>Keshab Chandra Sen</b> joined Brahmo Samaj in 1858; split created <b>Brahmo Samaj of India (1866)</b>.", "Second split: Keshab Sen formed <b>Nava Vidhaan (1880)</b> after controversy over his daughter's child marriage.", "<b>Derozio</b> founded <b>Young Bengal Movement / Academic Association (1828)</b> — rationalism and free thinking.", "<b>Dharma Sabha</b> founded by <b>Radhakant Deb in 1830</b> — orthodox Hindu reaction AGAINST Brahmo reforms.", "<b>Paramhansa Mandali</b> founded 1849 in Bombay — secret society against caste; allowed widow remarriage.", "<b>Prarthana Samaj</b> founded 1867 in Bombay by <b>Atmaram Pandurang</b>; later led by <b>MG Ranade &amp; RG Bhandarkar</b>.", "<b>Satyashodhak Samaj</b> founded by <b>Jyotirao Phule (1873)</b> — attacked Brahminical dominance, championed lower castes.", "<b>Arya Samaj</b> founded by <b>Swami Dayananda Saraswati in 1875</b> in Bombay; HQ shifted to Lahore.", "Arya Samaj motto: <b>'Go back to the Vedas'</b>; introduced <b>Shuddhi</b> (reconversion) movement.", "<b>Ramakrishna Mission</b> founded by <b>Swami Vivekananda in 1897</b> at Belur Math — in memory of Ramakrishna Paramahamsa.", "Vivekananda represented Hinduism at <b>Parliament of World Religions, Chicago in 1893</b>.", "<b>Theosophical Society</b> founded 1875 in New York by <b>Helena Blavatsky &amp; Colonel Olcott</b>; India HQ at <b>Adyar, Madras in 1882</b>.", "<b>Annie Besant</b> became President of Theosophical Society; founded <b>Central Hindu College (1898)</b> at Varanasi.", "<b>Dev Samaj</b> founded by <b>Shiv Narayan Agnihotri (1887)</b> at Lahore — rationalist moral reform.", "<b>Radhaswami Movement</b> founded by <b>Shiv Dayal Singh (Tulsi Ram) in 1861</b> at Agra.", "<b>Servants of India Society</b> founded by <b>Gopal Krishna Gokhale in 1905</b> — trained workers for national service.", "<b>Social Conference</b> founded by <b>MG Ranade in 1887</b> — annual social reform forum alongside INC sessions.", "Brahmo Samaj opposed: idol worship, caste, child marriage, polygamy; supported widow remarriage and women's education."], "table": "<table><thead><tr><th>Movement</th><th>Year</th><th>Founder</th><th>Key Objective</th></tr></thead><tbody><tr><td>Brahmo Sabha</td><td>1828</td><td>Raja Ram Mohan Roy</td><td>Monotheism, end sati & child marriage</td></tr><tr><td>Dharma Sabha</td><td>1830</td><td>Radhakant Deb</td><td>Orthodox counter to Brahmo reforms</td></tr><tr><td>Young Bengal</td><td>1828</td><td>Henry Derozio</td><td>Free thought, nationalism, rationalism</td></tr><tr><td>Paramhansa Mandali</td><td>1849</td><td>Mehtaji Durgaram</td><td>Against caste, for widow remarriage</td></tr><tr><td>Prarthana Samaj</td><td>1867</td><td>Atmaram Pandurang</td><td>Social reform within Hinduism (Bombay)</td></tr><tr><td>Satyashodhak Samaj</td><td>1873</td><td>Jyotirao Phule</td><td>Lower-caste emancipation, anti-Brahminism</td></tr><tr><td>Arya Samaj</td><td>1875</td><td>Dayananda Saraswati</td><td>Vedic revival, Shuddhi, anti-idolatry</td></tr><tr><td>Theosophical Society</td><td>1882 (India)</td><td>Blavatsky/Olcott → Annie Besant</td><td>Eastern spiritualism, Hindu revival</td></tr><tr><td>Ramakrishna Mission</td><td>1897</td><td>Swami Vivekananda</td><td>Service to humanity, Vedanta philosophy</td></tr><tr><td>Servants of India</td><td>1905</td><td>Gopal Krishna Gokhale</td><td>Self-sacrificing national service</td></tr></tbody></table>", "mn": "<b>Mnemonic — 'BR-DY-PP-SA-RT':</b><br>🟡 <b>B</b>rahmo Sabha (RRR 1828) → <b>D</b>harma Sabha (Deb 1830) → <b>Y</b>oung Bengal (Derozio 1828) → <b>P</b>aramhansa (1849) → <b>P</b>rarthana (1867) → <b>S</b>atyashodhak (Phule 1873) → <b>A</b>rya Samaj (1875) → <b>R</b>amakrishna Mission (1897) → <b>T</b>heosophical (Adyar 1882)", "traps": ["⚠️ Brahmo Sabha (1828) → renamed Brahmo SAMAJ (1843) under Debendranath — NOT both by same name from start!", "⚠️ Ramakrishna Mission (1897) was founded by VIVEKANANDA — NOT Ramakrishna Paramahamsa himself!", "⚠️ Arya Samaj 1st unit was in BOMBAY (1875), not Lahore — Lahore became HQ later!", "⚠️ Theosophical Society founded in NEW YORK (1875) — moved to Adyar, Madras in 1882!", "⚠️ Dharma Sabha was ORTHODOX COUNTER to Brahmo — don't confuse as another reform movement!", "⚠️ Satyashodhak Samaj was in MAHARASHTRA (Pune) — often confused with South Indian reform movements!"], "revision": ["1828: Brahmo Sabha (RRR) + Young Bengal (Derozio)", "1830: Dharma Sabha (Radhakant Deb) — orthodox COUNTER movement", "1843: Brahmo Sabha renamed Brahmo Samaj (Debendranath Tagore)", "1858: Keshab Chandra Sen joins Brahmo Samaj", "1866: Brahmo Samaj of India split (Keshab vs Debendranath)", "1875: Arya Samaj (Dayananda, Bombay) + Theosophical Society (New York)", "1880: Nava Vidhaan (Keshab after child marriage row)", "1897: Ramakrishna Mission (Vivekananda, Belur Math)", "1905: Servants of India Society (Gokhale)", "Prarthana Samaj = Bombay branch of social reform (1867)"], "oneliners": ["Brahmo Sabha 1828 = RRR's gift to India", "Young Bengal = Derozio's rational rebels", "Dharma Sabha 1830 = orthodox backlash to Brahmo", "Paramhansa Mandali 1849 = secret caste-killer society", "Prarthana Samaj 1867 = Bombay's answer to Brahmo", "Satyashodhak 1873 = Phule's war on Brahminism", "Arya Samaj 1875 = Back to the Vedas (Dayananda)", "Shuddhi = Arya Samaj's reconversion weapon", "Theosophical 1875 (NY) → 1882 (Adyar HQ)", "Annie Besant = Theosophical Society's Indian champion", "Vivekananda 1893 Chicago = India's global voice", "Ramakrishna Mission 1897 = service as worship", "Belur Math = Ramakrishna Mission headquarters", "Servants of India 1905 = Gokhale's selfless army", "Debendranath Tagore = Maharshi, RNT's father", "Keshab Chandra Sen = took Brahmo pan-India", "MG Ranade = Prarthana Samaj reformer + Social Conference", "Dev Samaj 1887 = secular moral reform (Lahore)", "Radhaswami 1861 = Shiv Dayal Singh's spiritual movement", "Social Conference 1887 = Ranade's annual reform forum"], "flashcards": [{"q": "Who founded Brahmo Sabha and when?", "a": "Raja Ram Mohan Roy, 1828 in Calcutta"}, {"q": "Who renamed Brahmo Sabha to Brahmo Samaj?", "a": "Debendranath Tagore in 1843"}, {"q": "Which movement was the ORTHODOX COUNTER to Brahmo reforms?", "a": "Dharma Sabha (1830) by Radhakant Deb"}, {"q": "When and where was Arya Samaj founded?", "a": "1875 in Bombay by Swami Dayananda Saraswati"}, {"q": "Who founded Satyashodhak Samaj (1873)?", "a": "Jyotirao Phule in Pune — to liberate lower castes from Brahminical dominance"}, {"q": "Ramakrishna Mission was founded by whom and when?", "a": "Swami Vivekananda in 1897 at Belur Math"}, {"q": "Where was Theosophical Society HQ in India?", "a": "Adyar, Madras (since 1882)"}, {"q": "Who founded Servants of India Society (1905)?", "a": "Gopal Krishna Gokhale"}, {"q": "What is Shuddhi in Arya Samaj context?", "a": "Reconversion ceremony to bring back converts to Hinduism"}, {"q": "Who led Prarthana Samaj in Bombay (1867)?", "a": "Founded by Atmaram Pandurang; led by MG Ranade and RG Bhandarkar"}], "mcqs": [{"q": "Brahmo Sabha was founded in which year?", "opts": ["1820", "1828", "1835", "1843"], "ans": 1, "exp": "1828 by Raja Ram Mohan Roy in Calcutta."}, {"q": "Which organisation was founded as an ORTHODOX response against Brahmo Samaj?", "opts": ["Prarthana Samaj", "Dharma Sabha", "Arya Samaj", "Theosophical Society"], "ans": 1, "exp": "Dharma Sabha (1830) by Radhakant Deb — conservative Hindu reaction."}, {"q": "Arya Samaj was first established in:", "opts": ["Lahore", "Calcutta", "Bombay", "Delhi"], "ans": 2, "exp": "Arya Samaj founded in Bombay in 1875; HQ later move  "militant_nationalism", "label": "Militant Nationalism", "icon": "💥", "xp": 60, "seqIdx": 4, "facts": ["Era of <b>Militant Nationalism (1905–1918)</b> — arose after Partition of Bengal (1905), marked by revolutionary activities.", "<b>Anushilan Samiti</b> — revolutionary secret society, founded <b>1902</b> in Calcutta by <b>Satish Chandra Bose</b>; Barindra Kumar Ghosh (Aurobindo's brother) became active member.", "<b>Yugantar Party</b> — founded in Bengal 1906 by <b>Barindra Kumar Ghosh</b> and <b>Bhupendranath Datta</b>; published Yugantar newspaper.", "<b>India House</b> — established in London (<b>1905</b>) by <b>Shyamji Krishna Varma</b>; Veer Savarkar and others stayed there; Indian Sociologist newspaper published.", "<b>Abhinav Bharat Society</b> — founded by <b>Veer Savarkar in 1904</b> at Nashik; also called 'Young India Society'.", "<b>Savarkar's 1857 book</b>: <i>The Indian War of Independence 1857</i> (1909) — declared 1857 as First War of Indian Independence.", "<b>Alipore Bomb Case (1908)</b> — Barindra Kumar Ghosh and Aurobindo Ghosh arrested; Khudiram Bose and Prafulla Chaki threw bombs at Kingsford's carriage (Muzaffarpur).", "<b>Khudiram Bose</b> — hanged on <b>11 August 1908</b>, age 18; youngest martyr of the freedom struggle.", "<b>Lal-Bal-Pal</b> — <b>Lala Lajpat Rai</b> (Punjab lion), <b>Bal Gangadhar Tilak</b> (Maharashtra), <b>Bipin Chandra Pal</b> (Bengal) — trio of Extremists.", "Tilak's newspapers: <b>Kesari (Marathi)</b> and <b>Mahratta (English)</b>; started <b>Ganesh Chaturthi (1893)</b> and <b>Shivaji Festival (1895)</b> as political tools.", "<b>Swadeshi Movement (1905)</b> — triggered by Partition of Bengal; burning of British goods, boycott of foreign cloth.", "<b>Bengal partition (1905)</b> — announced by Viceroy Lord Curzon (16 October 1905); annulled in 1911 by Lord Hardinge.", "<b>Ghadar Party</b> — founded <b>1913</b> by <b>Lala Hardayal</b> in San Francisco; Ghadar newspaper published.", "<b>Home Rule League</b> — <b>Tilak's (April 1916)</b> from Poona; <b>Annie Besant's (September 1916)</b> from Madras — two separate leagues.", "<b>Veer Savarkar</b> coined the term <b>'Hindutva' (1923)</b> in his book; transported to Cellular Jail (Kala Pani), Andaman in 1911.", "<b>Balwant Gangadhar Tilak</b> — 'Father of Indian Unrest' (British view); jailed for 6 years in Mandalay (Burma) 1908-1914.", "<b>Bhagat Singh, Sukhdev, Rajguru</b> — Lahore Conspiracy Case; hanged <b>23 March 1931</b>.", "<b>HSRA</b> (Hindustan Socialist Republican Association) — Bhagat Singh, Chandrashekhar Azad etc.; originally HRA (1924) founded by Sachindra Nath Sanyal.", "<b>Chandrashekhar Azad</b> — never captured; died 27 February 1931 at Alfred Park, Allahabad (now Azad Park).", "Vinayak Damodar Savarkar — returned to India in 1947; wrote <i>Hindutva</i> (1923) and <i>The Indian War of Independence</i> (1909)."], "table": "<table><thead><tr><th>Organisation</th><th>Year</th><th>Founder</th><th>Location / Key Activity</th></tr></thead><tbody><tr><td>Anushilan Samiti</td><td>1902</td><td>Satish Chandra Bose</td><td>Calcutta — revolutionary secret society</td></tr><tr><td>Abhinav Bharat Society</td><td>1904</td><td>Veer Savarkar</td><td>Nashik — 'Young India Society'</td></tr><tr><td>India House</td><td>1905</td><td>Shyamji Krishna Varma</td><td>London — Indian revolutionary HQ</td></tr><tr><td>Yugantar Party</td><td>1906</td><td>Barindra Kumar Ghosh</td><td>Bengal — Yugantar newspaper</td></tr><tr><td>Alipore Bomb Case</td><td>1908</td><td>Barindra/Aurobindo arrested</td><td>Khudiram Bose + Prafulla Chaki threw bombs</td></tr><tr><td>Ghadar Party</td><td>1913</td><td>Lala Hardayal</td><td>San Francisco — Ghadar newspaper</td></tr><tr><td>Home Rule League (Tilak)</td><td>April 1916</td><td>Bal Gangadhar Tilak</td><td>Poona — first Home Rule League</td></tr><tr><td>Home Rule League (Besant)</td><td>Sep 1916</td><td>Annie Besant</td><td>Madras — second Home Rule League</td></tr><tr><td>HSRA</td><td>1928</td><td>Bhagat Singh / Azad</td><td>Punjab — Lahore Conspiracy; hanged 1931</td></tr></tbody></table>", "mn": "<b>Mnemonic 'AS-AB-IH-YU-GB-HL-HS':</b><br>💥 <b>A</b>nushilan (1902 Calcutta) → <b>A</b>bhinav Bharat (Savarkar 1904) → <b>I</b>ndia House (Shyamji 1905 London) → <b>Y</b>ugantar (1906) → <b>G</b>hadar (Lala Hardayal 1913) → <b>H</b>ome Rule League (Tilak April + Besant Sep 1916) → <b>H</b>SRA (Bhagat Singh 1928)", "traps": ["⚠️ India House was in LONDON (1905) — NOT India! (Shyamji Krishna Varma established it)", "⚠️ Khudiram Bose hanged at 18 years old — on 11 Aug 1908 (youngest martyr)", "⚠️ TWO Home Rule Leagues: Tilak's (April 1916, Poona) and Besant's (Sep 1916, Madras) — DIFFERENT founders, cities!", "⚠️ Ghadar Party = San Francisco (1913) by Lala Hardayal — NOT India!", "⚠️ Alipore Bomb Case → Khudiram Bose threw bombs at KINGSFORD's carriage, not directly at him!", "⚠️ HRA (1924, Sanyal) was renamed HSRA in 1928 after Bhagat Singh joined!"], "revision": ["1902: Anushilan Samiti (Calcutta, Satish Chandra Bose)", "1904: Abhinav Bharat Society (Nashik, Savarkar)", "1905: India House (London, Shyamji Krishna Varma); Bengal Partition", "1906: Yugantar Party (Bengal, Barindra Ghosh)", "1908: Alipore Bomb Case; Khudiram Bose hanged 11 Aug 1908", "1913: Ghadar Party (San Francisco, Lala Hardayal)", "April 1916: Tilak's Home Rule League (Poona)", "Sep 1916: Annie Besant's Home Rule League (Madras)", "1928: HSRA (Bhagat Singh, Chandrashekhar Azad)", "23 March 1931: Bhagat Singh, Sukhdev, Rajguru hanged"], "oneliners": ["Anushilan Samiti 1902 = Calcutta's first revolutionary society", "Abhinav Bharat 1904 = Savarkar's Young India Society", "India House 1905 London = Shyamji Krishna Varma's revolutionary HQ", "Yugantar 1906 = Barindra Ghosh's Bengal revolutionary party", "Khudiram Bose = youngest martyr; hanged 11 Aug 1908 at 18", "Alipore Bomb Case 1908 = Barindra + Aurobindo arrested", "Ghadar Party 1913 = San Francisco (Lala Hardayal)", "Lal-Bal-Pal = Extremist trio (Lajpat liament' — all describe:", "opts": ["Gopal Krishna Gokhale", "Surendranath Banerjee", "Dadabhai Naoroji", "Pherozeshah Mehta"], "ans": 2, "exp": "All three descriptions apply to Dadabhai Naoroji (1825-1917) — pioneer nationalist and economic thinker."}, {"q": "Which Act raised marriage age to 18 for girls and 21 for boys in India?", "opts": ["Sarda Act 1929", "Age of Consent Act 1891", "Prohibition of Child Marriage Act 1978", "Hindu Marriage Act 1955"], "ans": 2, "exp": "The 1978 Amendment (Child Marriage Restraint Act) raised minimum ages to 18 (girls) and 21 (boys)."}]}];

function load(){try{const d=gs(SK);if(d)st=JSON.parse(d);}catch(e){st={};}}
function calcPct(node){const r=st[PREFIX+node.id+'_results'];if(!r||!r.length)return 0;const s=r[r.length-1];return Math.round((s.correct/s.total)*100);}
function calcAvgPct(){const reg=CHAPTERS.filter(c=>c.type!=='gold');if(!reg.length)return 0;const sum=reg.reduce((a,c)=>a+calcPct(c),0);return Math.round(sum/reg.length);}
function rebuildUnlocked(){CHAPTERS.forEach((c,i)=>{if(c.type==='gold'){c._unlocked=(calcAvgPct()>=80);}else if(i===0){c._unlocked=true;}else{const prev=CHAPTERS[i-1];c._unlocked=(prev&&!prev.type&&calcPct(prev)>=100);}});}
function updateTopbar(){const xp=st[PREFIX+'xp']||0;document.getElementById('tb-xp').textContent='⚡ '+xp+' XP';document.getElementById('tb-pct').textContent='📊 '+calcAvgPct()+'%';}
function buildSidebar(){rebuildUnlocked();const c=document.getElementById('sidebar-inner');c.innerHTML='';CHAPTERS.forEach(n=>{const div=document.createElement('div');div.className='node-item'+(n._unlocked?'':' locked')+(n.type==='gold'?' gold-node':'');div.onclick=()=>{if(n._unlocked){selectNode(n);if(window.innerWidth<=768){document.getElementById('aside').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('show');}}else{showToast('🔒 Complete previous node with 60%+ to unlock!');}};const pct=calcPct(n);div.innerHTML=`<span class="node-icon">${n.icon}</span><div class="node-info"><div class="node-label">${n.label}</div><div class="node-xp">⚡${n.xp} XP${n.type==='gold'?' · Avg 80%+ required':''}</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;c.appendChild(div);});}
function selectNode(node){st[PREFIX+'current']=node.id;save();buildSidebar();updateTopbar();renderContent(node);}
function switchTab(nodeId,tab){st[PREFIX+nodeId+'_tab']=tab;save();const node=CHAPTERS.find(c=>c.id===nodeId);if(node)renderContent(node);}
function renderContent(node){document.getElementById('tb-title').textContent=node.icon+' '+node.label;const mc=document.getElementById('node-content');mc.innerHTML='';if(node.type==='gold'){renderGold(node,mc);return;}const tab=st[PREFIX+node.id+'_tab']||'learn';const tabs=`<div class="tab-bar"><button class="tab-btn${tab==='learn'?' active':''}" onclick="switchTab('${node.id}','learn')">📖 LEARN</button><button class="tab-btn${tab==='flash'?' active':''}" onclick="switchTab('${node.id}','flash')">🃏 FLASHCARDS</button><button class="tab-btn${tab==='test'?' active':''}" onclick="switchTab('${node.id}','test')">📝 TEST</button></div>`;const prev=st[PREFIX+node.id+'_results'];const badge=prev&&prev.length?`<div class="score-badge">Last score: ${prev[prev.length-1].pct}% (${prev[prev.length-1].correct}/${prev[prev.length-1].total})</div>`:'';mc.innerHTML=tabs+badge;if(tab==='learn')renderLearn(node,mc);else if(tab==='flash')renderFlash(node,mc);else renderTest(node,mc);}
function renderLearn(node,mc){const d=document.createElement('div');d.className='learn-body';d.innerHTML=`<h2>${node.icon} ${node.label}</h2><div>${node.facts.map(f=>`<div class="fact-item">${f}</div>`).join('')}</div><h3>📊 Quick Reference Table</h3><div class="table-wrap">${node.table}</div><h3>🧠 Memory Hook</h3><div class="mnemonic-box">${node.mn}</div><div class="traps-section"><h3>⚠️ Exam Traps</h3>${node.traps.map(t=>`<div class="trap-item">${t}</div>`).join('')}</div><div class="revision-section"><h3>✅ Rapid Revision</h3><ul>${node.revision.map(r=>`<li>${r}</li>`).join('')}</ul></div><div class="oneliners-section"><h3>💡 One-Liners</h3>${node.oneliners.map(o=>`<div class="oneliner">${o}</div>`).join('')}</div>`;mc.appendChild(d);}
function renderFlash(node,mc){const d=document.createElement('div');d.className='flash-body';d.innerHTML=`<div class="flash-counter">${node.flashcards.length} cards · tap any card to flip</div><div class="flash-grid">${node.flashcards.map(c=>`<div class="flash-card" onclick="this.classList.toggle('flipped')"><div class="flash-front"><div class="flash-q">${c.q}</div><div class="flip-hint">Tap to reveal</div></div><div class="flash-back"><div class="flash-a">${c.a}</div></div></div>`).join('')}</div>`;mc.appendChild(d);}
function navFlash(nodeId,dir){const node=CHAPTERS.find(c=>c.id===nodeId);let idx=st[PREFIX+nodeId+'_fi']||0;idx=Math.max(0,Math.min(node.flashcards.length-1,idx+dir));st[PREFIX+nodeId+'_fi']=idx;save();renderContent(node);}
function renderTest(node,mc){const d=document.createElement('div');d.className='test-body';const answered=st[PREFIX+node.id+'_ans']||{};const submitted=st[PREFIX+node.id+'_sub'];node.mcqs.forEach((q,qi)=>{const qd=document.createElement('div');qd.className='q-block'+(submitted?(answered[qi]===q.ans?' correct':' wrong'):'');qd.innerHTML=`<div class="q-text">Q${qi+1}. ${q.q}</div><div class="opts">${q.opts.map((o,oi)=>`<label class="opt-label${answered[qi]===oi?' selected':''}${submitted?(oi===q.ans?' right-ans':(answered[qi]===oi?' wrong-ans':'')):''}"><input type="radio" name="q${node.id}_${qi}" value="${oi}" ${answered[qi]===oi?'checked':''} ${submitted?'disabled':''} onchange="setAns('${node.id}',${qi},${oi})"> ${o}</label>`).join('')}${submitted?`<div class="exp-box">💡 ${q.exp}</div>`:''}`;d.appendChild(qd);});if(!submitted){const btn=document.createElement('button');btn.className='submit-btn';btn.textContent='Submit Answers';btn.onclick=()=>submitTest(node.id);d.appendChild(btn);}else{const res=st[PREFIX+node.id+'_results'];renderResult(node,d,res[res.length-1]);}mc.appendChild(d);}
function setAns(nodeId,qi,oi){const k=PREFIX+nodeId+'_ans';const a=st[k]||{};a[qi]=oi;st[k]=a;save();}
function submitTest(nodeId){const node=CHAPTERS.find(c=>c.id===nodeId);const answered=st[PREFIX+nodeId+'_ans']||{};let correct=0;node.mcqs.forEach((q,qi)=>{if(answered[qi]===q.ans)correct++;});const pct=Math.round((correct/node.mcqs.length)*100);const res={correct,total:node.mcqs.length,pct};const key=PREFIX+nodeId+'_results';if(!st[key])st[key]=[];st[key].push(res);st[PREFIX+nodeId+'_sub']=true;if(pct>=100&&!(st[PREFIX+'xp_'+nodeId])){st[PREFIX+'xp']=(st[PREFIX+'xp']||0)+node.xp;st[PREFIX+'xp_'+nodeId]=true;}save();rebuildUnlocked();buildSidebar();updateTopbar();renderContent(node);}
function renderResult(node,d,res){const pass=res.pct>=100;const rb=document.createElement('div');rb.className='result-banner '+(pass?'pass':'fail');rb.innerHTML=pass?`🏆 ${res.pct}% — Passed! +${node.xp} XP earned`:`❌ ${res.pct}% — Need 100% to unlock next node`;d.appendChild(rb);const rb2=document.createElement('button');rb2.className='submit-btn';rb2.textContent='Retry Test';rb2.onclick=()=>{delete st[PREFIX+node.id+'_sub'];delete st[PREFIX+node.id+'_ans'];save();renderContent(node);};d.appendChild(rb2);}
function renderGold(node,mc){const avg=calcAvgPct();if(avg<80){mc.innerHTML=`<div class="gold-locked-msg"><div style="font-size:3rem">⭐</div><h2>Golden Challenge Locked</h2><p>Complete all regular nodes with average 80%+ to unlock.</p><p style="margin-top:1rem;color:var(--amber)">Your current average: <b>${avg}%</b> / 80% required</p></div>`;return;}const tab=st[PREFIX+node.id+'_tab']||'learn';const tabs=`<div class="tab-bar"><button class="tab-btn${tab==='learn'?' active':''}" onclick="switchTab('${node.id}','learn')">📖 GOLD FACTS</button><button class="tab-btn${tab==='test'?' active':''}" onclick="switchTab('${node.id}','test')">🏆 GOLD TEST</button></div>`;mc.innerHTML=tabs;if(tab==='learn'){const d=document.createElement('div');d.className='learn-body';d.innerHTML=`<div class="gold-header"><span>⭐ MASTER CHALLENGE: ALL PART 3 TOPICS</span><span>Avg: ${avg}% | Required: 80%</span></div><h3 style="color:var(--gold)">📌 Master Facts (Cross-Topic)</h3><div class="gold-facts-ticker">${node.goldFacts.map((f,i)=>`<div class="fact-item" style="margin-bottom:.3rem">${i+1}. ${f}</div>`).join('')}</div><div class="gold-traps"><h3 style="color:var(--gold);margin-bottom:.5rem">⚠️ Critical SSC Traps</h3>${node.goldTraps.map(t=>`<div class="trap-item">${t}</div>`).join('')}</div>`;mc.appendChild(d);}else{const answered=st[PREFIX+node.id+'_ans']||{};const submitted=st[PREFIX+node.id+'_sub'];const d=document.createElement('div');d.className='test-body';node.goldMCQs.forEach((q,qi)=>{const qd=document.createElement('div');qd.className='q-block'+(submitted?(answered[qi]===q.ans?' correct':' wrong'):'');qd.innerHTML=`<div class="q-text" style="color:var(--gold)">G${qi+1}. ${q.q}</div><div class="opts">${q.opts.map((o,oi)=>`<label class="opt-label${answered[qi]===oi?' selected':''}${submitted?(oi===q.ans?' right-ans':(answered[qi]===oi?' wrong-ans':'')):''}"><input type="radio" name="gq${qi}" value="${oi}" ${answered[qi]===oi?'checked':''} ${submitted?'disabled':''} onchange="setAns('${node.id}',${qi},${oi})"> ${o}</label>`).join('')}${submitted?`<div class="exp-box">💡 ${q.exp}</div>`:''}`;d.appendChild(qd);});if(!submitted){const btn=document.createElement('button');btn.className='submit-btn gold-submit';btn.textContent='Submit Golden Test';btn.onclick=()=>submitGoldTest(node.id);d.appendChild(btn);}else{renderGoldResult(node,d);}mc.appendChild(d);}}
function submitGoldTest(nodeId){const node=CHAPTERS.find(c=>c.id===nodeId);const answered=st[PREFIX+nodeId+'_ans']||{};let correct=0;node.goldMCQs.forEach((q,qi)=>{if(answered[qi]===q.ans)correct++;});const pct=Math.round((correct/node.goldMCQs.length)*100);const res={correct,total:node.goldMCQs.length,pct};const key=PREFIX+nodeId+'_results';if(!st[key])st[key]=[];st[key].push(res);st[PREFIX+nodeId+'_sub']=true;if(pct>=80&&!(st[PREFIX+'xp_'+nodeId])){st[PREFIX+'xp']=(st[PREFIX+'xp']||0)+node.xp;st[PREFIX+'xp_'+nodeId]=true;showToast('🏆 GOLDEN NODE CLEARED! +200 XP!');}save();updateTopbar();renderContent(node);}
function renderGoldResult(node,d){const res=st[PREFIX+node.id+'_results'];const r=res[res.length-1];const pass=r.pct>=80;const rb=document.createElement('div');rb.className='result-banner '+(pass?'pass':'fail');rb.innerHTML=pass?`🏆 ${r.pct}% — GOLD CLEARED! +200 XP!`:`❌ ${r.pct}% — Need 80%+ for Golden Node`;d.appendChild(rb);const rb2=document.createElement('button');rb2.className='submit-btn gold-submit';rb2.textContent='Retry Gold Test';rb2.onclick=()=>{delete st[PREFIX+node.id+'_sub'];delete st[PREFIX+node.id+'_ans'];save();renderContent(node);};d.appendChild(rb2);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function toggleDrawer(){const a=document.getElementById('aside');const o=document.getElementById('drawer-overlay');a.classList.toggle('open');o.classList.toggle('show');}
let st={};
load();
document.getElementById('menu-btn').addEventListener('click',toggleDrawer);
document.getElementById('drawer-overlay').addEventListener('click',toggleDrawer);
let _mToken=null,_mSid=null;
function initMetrics(){
  try{
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  }catch(e){}
  _mSid='mod3-'+(Date.now().toString(36));
}
function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})}).catch(()=>{});
}
document.addEventListener('DOMContentLoaded',function(){rebuildUnlocked();buildSidebar();updateTopbar();initMetrics();track('material_opened',{material:'modern_history_part3'});const cur=st[PREFIX+'current'];const node=cur?CHAPTERS.find(c=>c.id===cur):null;if(node&&node._unlocked){renderContent(node);}else{document.getElementById('node-content').innerHTML=`<div class="welcome-panel"><h1>📜 Modern History Part 3</h1><p style="color:var(--ink2);max-width:500px;margin:0 auto">Master the Revolt of 1857, Viceroys, Constitutional Acts and the Freedom Struggle for SSC Exams.</p><div class="welcome-stats"><div>📚 13 Learning Nodes</div><div>⭐ 1 Golden Challenge</div><div>🃏 130 Flashcards</div><div>📝 195 MCQs</div></div><p style="margin-top:1.5rem;color:var(--ink3);font-size:.85rem">Click a node in the sidebar to begin!</p></div>`;}});
</script></body></html>
