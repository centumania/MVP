<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CentuMania · Medieval History Part 2</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0a12;--bg2:#0a0810;--panel:#1a1523;--panel2:#201b2c;--line:#2d2640;
  --ink:#f0e8ff;--ink2:#b89fd4;--ink3:#6b5a8a;
  --gold:#c084fc;--gold2:#9333ea;--gold-glow:rgba(192,132,252,.13);
  --amber:#f59e0b;--gold-bg:rgba(192,132,252,.12);
  --red:#f87171;--red-bg:rgba(248,113,113,.10);
  --blue:#60a5fa;--green:#34d399;
  --mono:"JetBrains Mono",monospace;--serif:"Instrument Serif",serif;--sans:"DM Sans",sans-serif;
  --nav:56px;--aside:268px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px}
.shell{display:grid;grid-template-rows:var(--nav) 1fr;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;padding:0 18px;gap:12px;border-bottom:1px solid var(--line);background:rgba(10,8,16,.97);backdrop-filter:blur(14px);z-index:60}
.logo{font-family:var(--serif);font-size:19px;font-style:italic;color:var(--gold);display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);flex-shrink:0}
.nav-stats{display:flex;gap:16px;margin-left:auto;align-items:center}
.stat{font-family:var(--mono);font-size:11px;color:var(--ink2)}
.stat b{font-size:13px}.stat.xp b{color:var(--gold)}.stat.nd b{color:var(--amber)}.stat.tp b{color:var(--red)}
.body-wrap{display:grid;grid-template-columns:var(--aside) 1fr;overflow:hidden;height:calc(100vh - var(--nav))}
aside{background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto}
aside::-webkit-scrollbar{width:3px}aside::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
main{overflow-y:auto;background:var(--bg)}
main::-webkit-scrollbar{width:4px}main::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
#sidebar-inner{padding:10px 8px 60px}
.ch-group{margin-bottom:3px}
.ch-toggle{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink2);padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:.13s;font-family:var(--sans)}
.ch-toggle:hover{background:var(--panel);color:var(--ink)}
.ch-icon{font-size:15px}.ch-label{flex:1}.ch-prog{font-family:var(--mono);font-size:10px;color:var(--ink3)}.ch-arr{font-size:11px;color:var(--ink3);flex-shrink:0}
.node-items{padding:3px 4px 3px 10px}
.ni-btn{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink3);padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;transition:.12s;font-family:var(--sans);margin-bottom:1px;min-height:44px}
.ni-btn:hover:not(.locked){background:var(--panel);color:var(--ink)}
.ni-btn.active{background:var(--gold-glow);border-color:var(--gold2);color:var(--gold)}
.ni-btn.passed:not(.active){color:var(--ink)}
.ni-btn.locked{cursor:default;opacity:.4}
.ni-title{flex:1;line-height:1.3}.ni-xp{font-family:var(--mono);font-size:10px;color:var(--ink3);flex-shrink:0}
.ni-tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;flex-shrink:0}
.ni-tag.lock{color:var(--ink3)}.ni-tag.done{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.25)}.ni-tag.vis{color:var(--amber)}
.view{padding:28px clamp(16px,3.5vw,52px) 80px;max-width:900px;margin:0 auto}
.tabs{display:flex;gap:3px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:22px;width:fit-content}
.tab{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:8px;cursor:pointer;border:0;background:none;color:var(--ink2);transition:.14s}
.tab:hover:not(.active){color:var(--ink)}.tab.active{background:var(--gold2);color:#fff;font-weight:700}
.tab-pane{display:none}.tab-pane.active{display:block}
.node-hd-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.node-type-tag{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.node-type-tag.trap{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.node-type-tag.gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(192,132,252,.3)}
.xp-pill{font-family:var(--mono);font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid rgba(192,132,252,.2);border-radius:6px;padding:3px 8px;margin-left:auto}
.node-title{font-family:var(--serif);font-size:clamp(22px,4vw,34px);font-style:italic;line-height:1.1;margin-bottom:12px}
.node-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
.ns-item{display:flex;flex-direction:column;gap:3px}
.ns-label{font-family:var(--mono);font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.ns-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink)}
.ns-val.faa-col{color:var(--amber)}.ns-val.pass-col{color:var(--green)}.ns-val.pend-col{color:var(--ink2)}
.fact-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin:12px 0;overflow:hidden}
.fact-block.gold-block{background:linear-gradient(135deg,rgba(192,132,252,.07),rgba(147,51,234,.04));border-color:rgba(192,132,252,.3)}
.fb-head{padding:9px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink2);border-bottom:1px solid var(--line);background:var(--panel2)}
.fb-body{padding:14px 16px}
ul.facts{list-style:none;padding:0}
ul.facts li{padding:7px 0 7px 22px;border-bottom:1px dashed var(--line);font-size:14px;position:relative;line-height:1.55}
ul.facts li:last-child{border-bottom:0}
ul.facts li::before{content:"▸";position:absolute;left:3px;top:9px;color:var(--amber);font-size:11px}
ul.facts b{color:var(--gold)}
.trap-block{background:var(--red-bg);border:1px solid rgba(248,113,113,.35);border-radius:12px;overflow:hidden;margin:12px 0}
.trap-block .fb-head{background:rgba(248,113,113,.08);color:var(--red);border-color:rgba(248,113,113,.35)}
.trap-block ul.facts li::before{content:"⚠";color:var(--red)}
.mnemonic-block{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.3);border-radius:12px;overflow:hidden;margin:12px 0}
.mnemonic-block .fb-head{background:rgba(96,165,250,.07);color:var(--blue);border-color:rgba(96,165,250,.3)}
.revision-block{background:rgba(96,165,250,.05);border:1px solid rgba(96,165,250,.2);border-radius:12px;overflow:hidden;margin:12px 0}
.revision-block .fb-head{background:rgba(96,165,250,.06);color:var(--blue);border-color:rgba(96,165,250,.2)}
.revision-block ul.facts li::before{content:"⚡";color:var(--blue);font-size:10px}
.oneliner-block{background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.18);border-radius:12px;overflow:hidden;margin:12px 0}
.oneliner-block .fb-head{background:rgba(52,211,153,.06);color:var(--green);border-color:rgba(52,211,153,.18)}
.oneliner-block ul.facts li::before{content:"🎯";color:var(--green);font-size:10px}
.flash-hint{font-family:var(--mono);font-size:11px;color:var(--ink3);text-align:center;margin-bottom:12px;letter-spacing:.5px}
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:14px}
.flash-card{perspective:900px;cursor:pointer;height:140px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;line-height:1.45;border:1px solid var(--line)}
.flash-front{background:var(--panel);color:var(--ink)}
.flash-back{background:rgba(240,188,69,.1);border-color:rgba(240,188,69,.3);color:var(--gold);transform:rotateY(180deg)}
.flash-reset-row{text-align:center;margin-top:4px}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--line);margin:12px 0}
table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt th{padding:9px 13px;text-align:left;background:var(--gold2);color:#fff;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px}
table.dt td{padding:9px 13px;border-bottom:1px solid var(--line);color:var(--ink)}
table.dt tr:last-child td{border-bottom:0}
table.dt td:first-child{color:var(--amber);font-weight:600;font-family:var(--mono);font-size:12px}
table.dt b{color:var(--gold)}
.mcq-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.mcq-q{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.45}
.q-num{font-family:var(--mono);font-size:12px;color:var(--amber);margin-right:4px}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mopt{padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--ink);font-size:13px;cursor:pointer;text-align:left;font-family:var(--sans);transition:.13s;width:100%}
.mopt:hover:not([disabled]){border-color:var(--gold2);background:var(--gold-glow)}
.mopt.correct{background:rgba(52,211,153,.12);border-color:var(--green);color:var(--green)}
.mopt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.mcq-fb{margin-top:10px;font-size:13px;padding:9px 12px;border-radius:8px;background:var(--panel2);color:var(--ink2);line-height:1.5;border:1px solid var(--line)}
.mcq-faa{margin-top:7px}
.faa-chip{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:6px}
.faa-chip.faa-ok{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.faa-chip.faa-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.retry-btn{margin-top:4px;padding:6px 16px;background:var(--panel2);border:1px solid var(--gold2);color:var(--gold);border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:11px}
.retry-btn:hover{background:var(--gold-glow)}
.unlock-banner{border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.5}
.pass-banner{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.35);color:var(--green)}
.fail-banner{background:var(--red-bg);border:1px solid rgba(248,113,113,.35);color:var(--ink)}
.node-nav{display:flex;gap:10px;margin-top:26px;padding-top:16px;border-top:1px solid var(--line)}
.nav-btn{font-family:var(--sans);font-weight:600;font-size:13px;border-radius:9px;padding:9px 15px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);transition:.14s;flex:1;text-align:center}
.nav-btn:hover:not([disabled]){border-color:var(--gold2)}.nav-btn[disabled]{opacity:.35;cursor:default}
.nav-btn.home-btn{flex:0 0 auto;background:var(--panel2)}
.dash-hero{background:linear-gradient(135deg,rgba(192,132,252,.08),rgba(147,51,234,.05));border:1px solid rgba(192,132,252,.2);border-radius:16px;padding:28px;margin-bottom:22px;text-align:center}
.dh-title{font-family:var(--serif);font-size:clamp(26px,5vw,42px);font-style:italic;margin-bottom:4px}
.dh-sub{font-family:var(--mono);font-size:12px;color:var(--ink3);letter-spacing:1px}
.dh-xp{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--gold);margin:12px 0 4px}
.dh-bar-wrap{height:8px;background:var(--line);border-radius:4px;overflow:hidden;max-width:400px;margin:0 auto 8px}
.dh-bar{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;transition:.6s}
.dh-label{font-family:var(--mono);font-size:12px;color:var(--ink2)}
.dash-chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:22px}
.dc{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.dc-icon{font-size:22px;margin-bottom:6px}
.dc-label{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--ink)}
.dc-prog-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:4px}
.dc-bar{height:100%;background:var(--gold);border-radius:3px;transition:.5s}
.dc-nums{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.cta-row{display:flex;gap:12px;flex-wrap:wrap}
.cta-btn{padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;border:0;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#fff;transition:.15s}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,132,252,.3)}
.cta-btn.sec{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.cta-btn[disabled]{opacity:.4;cursor:default;transform:none;box-shadow:none}
.toast{position:fixed;top:64px;right:18px;background:var(--panel2);border:1px solid var(--gold);border-radius:12px;padding:10px 16px;z-index:500;opacity:0;transform:translateY(-8px);transition:.3s;pointer-events:none;font-size:13px;max-width:340px;line-height:1.4}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{border-color:var(--red)}.toast.warn{border-color:var(--amber);color:var(--ink)}
.mob-bar{display:none}
@media(max-width:720px){
  .shell{grid-template-rows:var(--nav) 1fr 56px;height:100dvh}
  .body-wrap{grid-template-columns:1fr;height:calc(100dvh - var(--nav) - 56px)}
  aside{display:none}
  .mob-bar{display:flex;background:rgba(10,8,16,.98);backdrop-filter:blur(16px);border-top:1px solid var(--line);align-items:stretch}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:0;background:none;color:var(--ink3);cursor:pointer;padding:8px 4px;font-family:var(--mono);font-size:9px;transition:.13s}
  .mob-tab .mt-ico{font-size:20px}.mob-tab.act{color:var(--gold)}
  .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:.2s}
  .mob-overlay.show{opacity:1;pointer-events:all}
  .mob-drawer{position:fixed;left:-100%;top:0;bottom:0;width:min(300px,88vw);background:var(--bg2);border-right:1px solid var(--line);z-index:200;transition:.28s;overflow-y:auto}
  .mob-drawer.open{left:0}
  .mob-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--line)}
  .mob-close{background:none;border:1px solid var(--line);color:var(--ink2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px}
  .nav-stats{display:none}
  .view{padding:16px 14px 100px}
  .node-title{font-size:22px}
  .mcq-opts{grid-template-columns:1fr}
  .tabs{overflow-x:auto;width:100%;scrollbar-width:none}
  .toast{top:auto;bottom:68px;left:14px;right:14px}
}
@media(min-width:721px){.mob-drawer,.mob-overlay{display:none}}
</style>
</head>
<body>
<div class="shell">
  <nav class="topbar">
    <div class="logo"><span class="logo-dot"></span>CentuMania</div>
    <div class="nav-stats">
      <div class="stat xp">XP <b id="h-xp">0</b></div>
      <div class="stat nd">Nodes <b id="h-nd">0/0</b></div>
      <div class="stat tp">Traps <b id="h-tp">0/0</b></div>
    </div>

  <div class="body-wrap">
    <aside><div id="sidebar-inner"></div></aside>
    <main id="main-area">
      <div class="dash-view view" id="dash-view"><div id="dash-content"></div></div>

</div>
<div class="mob-overlay" id="mob-overlay"></div>
<div class="mob-drawer" id="mob-drawer">

    <div class="logo"><span class="logo-dot"></span>Topics</div>
    <button class="mob-close" id="mob-close">✕</button>
  </div>
  <div id="mob-sidebar-inner"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const CHAPTERS=[

/* ─────────────────────── CHAPTER 1: MUGHALS ─────────────────────── */
{id:"mughals",title:"Mughal Empire",icon:"👑",nodes:[

{id:"mg1",title:"Babur, Humayun & Sher Shah Suri",xp:60,type:"regular",seqIdx:0,
facts:[
"<b>Mughal Empire (1526–1857):</b> Official language = Persian (Delhi Sultanate = Turkish)",
"<b>Babur (1526–1530):</b> Related to Timur (father's side) + Chengiz Khan (mother's side) | Autobiography: <b>Baburnama / Tuzuk-i-Baburi</b> (in Turkish)",
"Babur's key battles: Panipat-I (1526, defeated Ibrahim Lodhi) | Khanwa (1527, defeated <b>Rana Sanga</b> → assumed title <b>Ghazi</b>) | Chanderi (1528, defeated Medini Rai) | Ghagra (1529, vs Bengal army)",
"Babur won using: <b>Tulughma</b> (flanking tactic) + <b>Araba</b> (carts as artillery shield) | Gunners: <b>Ustad Ali & Mustafa</b> (Ottoman masters) | Introduced <b>Charbagh</b> (symmetrical gardens)",
"<b>Humayun (1530–56):</b> Built <b>Dinpanah</b> city | Lost at Chausa (1539) + Kannauj (1540) to <b>Sher Shah Suri</b> → fled India | Returned 1555; died falling from library (<b>Sher-e-Mandal</b>) 1556",
"Humayun: laid foundation of Mughal painting in Persia; brought painters <b>Mir Sayyid Ali & Abdal Samad</b> | Sister <b>Gul Badan Begum</b> wrote <b>Humayun-Nama</b> | Widow <b>Hamida Banu Begum</b> built <b>Humayun's Tomb (UNESCO)</b>",
"<b>Sher Shah Suri (1540–1545):</b> Real name Fared Khan | Founded <b>Sur dynasty</b> (2nd Afghan Empire) | Introduced <b>Rupaya</b> (1 Re = 178 grain silver) | Died in <b>Battle of Kalinjer</b> | Tomb: <b>Sasaram, Bihar</b>",
"Sher Shah's admin: Empire → <b>Sarkars</b> → <b>Parganas</b> → <b>Mauza (village)</b> | Land system: <b>Patta</b> (each peasant's payable amount) + <b>Qabooliyat</b> (deed of agreement) | State share = <b>1/3 of average produce</b>",
"Sher Shah built <b>GT Road (Sadak-e-Azam/Uttarpath)</b> from Bengal to Indus | Built <b>Sarais</b> (lodging + post offices) | Followed Alauddin's <b>Daag (branding horses)</b>",
"<b>Malik Muhammad Jaisi</b> wrote <b>Padmavat</b> during Sher Shah's time"
],
table:{h:["Ruler","Key Battle","Outcome"],r:[
["Babur","Panipat-I (1526)","Ibrahim Lodhi defeated → Mughal Empire begins"],
["Babur","Khanwa (1527)","Rana Sanga defeated → Babur assumes title 'Ghazi'"],
["Humayun","Chausa (1539)","Sher Shah WON → Humayun fled India"],
["Humayun","Kannauj (1540)","Sher Shah WON → Humayun fled to Iran"],
["Humayun","Sirhind (1555)","Humayun recaptured Delhi; died 1556"],
["Sher Shah","Battle of Kalinjer","Sher Shah DIED here (not at Chausa)"]
]},
mn:{h:"🧠 MNEMONIC",b:"Babur's tactics: <b>T-A-G</b> = Tulughma + Araba + Gunpowder<br>Sher Shah admin: <b>S-P-M</b> = Sarkar → Pargana → Mauza (village) = '<b>Sher Played Music</b>'<br>Babur lineage: <b>T+C</b> = Timur (father) + Chengiz (mother)"},
traps:[
"Baburnama written in TURKISH (NOT Persian — Persian is official Mughal language)",
"Humayun's Tomb built by widow HAMIDA BANU BEGUM (NOT by Humayun or Akbar)",
"Sher Shah died at Battle of KALINJER (NOT Chausa — Chausa is where he WON against Humayun)",
"Sher Shah's tomb is at SASARAM, Bihar (NOT Delhi, NOT Agra)",
"Rupaya = Sher Shah's coin | Babur did NOT introduce Rupaya"
],
revision:["Mughal Empire(1526-1857), official language=Persian(Sultanate was Turkish)","Babur(1526-30): related to Timur(father)+Chengiz Khan(mother), wrote Baburnama","Key battles: Panipat-I(1526,Ibrahim Lodhi),Khanwa(1527,Rana Sanga,title Ghazi),Chanderi(1528),Ghagra(1529)","Babur's tactics: Tulughma(flanking)+Araba(cart artillery shield)","Sher Shah Suri: introduced Rupiya, Grand Trunk Road, Sarai system"],
oneliners:["The Mughal Empire (1526-1857) used Persian as its official language","The Delhi Sultanate, by contrast, used Turkish as its official language","Babur (1526-1530) was related to Timur on his father's side and Chengiz Khan on his mother's side","Babur wrote his autobiography, the Baburnama (Tuzuk-i-Baburi), in Turkish","Babur won the First Battle of Panipat (1526) against Ibrahim Lodhi","Babur defeated Rana Sanga at the Battle of Khanwa (1527) and assumed the title Ghazi","Babur defeated Medini Rai at Chanderi (1528)","Babur used Tulughma (flanking tactics) and Araba (carts as artillery shields)","Sher Shah Suri introduced the Rupiya currency","Sher Shah Suri built the Grand Trunk Road and the Sarai (rest house) system"],

mcqs:[
{q:"Babur's autobiography 'Baburnama' was written in which language?",o:["Persian","Arabic","Turkish","Hindi"],a:2,e:"Baburnama (also called Tuzuk-i-Baburi) was written in Turkish — Babur's mother tongue. It was later translated into Persian by Abdul Rahim Khan-e-Khana. Persian was the official language of the Mughal court, but Babur wrote personally in Turkish."},
{q:"Babur defeated Rana Sanga in which battle and assumed the title 'Ghazi'?",o:["Battle of Panipat-I","Battle of Chanderi","Battle of Khanwa","Battle of Ghagra"],a:2,e:"In the Battle of Khanwa (1527), Babur defeated Rana Sanga of Mewar. After this victory, he assumed the title 'Ghazi' (Champion of Islam). This is distinct from Panipat-I where he defeated Ibrahim Lodhi."},
{q:"Babur's flanking cavalry tactic used in Indian battles was called:",o:["Araba","Tulughma","Charbagh","Daag"],a:1,e:"Tulughma was Babur's flanking cavalry tactic — dividing the army into centre and flanking wings, allowing the flanks to encircle the enemy. Araba was the use of carts linked together as an artillery shield. Together, these tactics won Panipat-I."},
{q:"Sher Shah Suri died in the:",o:["Battle of Chausa","Battle of Kannauj","Battle of Sirhind","Battle of Kalinjer"],a:3,e:"Sher Shah Suri died at the Battle of Kalinjer (1545) when a cannon misfired and exploded, killing him. He did NOT die at Chausa (he won there) or at Kannauj (he won there too). His tomb is at Sasaram, Bihar."},
{q:"Who built Humayun's Tomb (UNESCO World Heritage Site)?",o:["Akbar","Humayun himself","Hamida Banu Begum (his widow)","Jahangir"],a:2,e:"Humayun's Tomb was built by his widow Hamida Banu Begum. It is located in Delhi and was completed in 1570. It is a UNESCO World Heritage Site and is considered the precursor of the Taj Mahal."},
{q:"The 'Grand Trunk Road' built by Sher Shah Suri was originally called:",o:["Shahi Road","Sadak-e-Azam/Uttarpath","Dakshinapatha","Peruvazhis"],a:1,e:"The GT Road built by Sher Shah was called Sadak-e-Azam or Uttarpath — the royal road. It ran from Bengal (Sonargaon) to the Indus Valley (near Peshawar). The sarais (rest houses) built along it also served as post offices."},
{q:"The Rupaya (silver coin of 178 grains) was introduced by:",o:["Babur","Humayun","Akbar","Sher Shah Suri"],a:3,e:"Sher Shah Suri introduced the Rupaya — the silver coin (178 grains of silver) that became the foundation of India's currency system. It was also called 'Dam' in smaller denominations. The modern 'Rupee' traces its name to Sher Shah's Rupaya."},
{q:"Humayun's sister who wrote 'Humayun-Nama' was:",o:["Gulbarg Begum","Gul Badan Begum","Hamida Banu","Maham Begum"],a:1,e:"Gul Badan Begum, Humayun's sister, wrote Humayun-Nama — one of the few historical works written by a woman in the Mughal period. It gives valuable personal accounts of the Mughal court."},
{q:"In Sher Shah's revenue system, the agreement deed signed by the peasant was called:",o:["Patta","Qabooliyat","Zabti","Dahsala"],a:1,e:"Qabooliyat was the deed of agreement signed by the peasant acknowledging the revenue terms. Patta was the document given to the peasant stating the amount they had to pay. Together they formed the basis of Sher Shah's land revenue system."},
{q:"'Padmavat' was written by Malik Muhammad Jaisi during the reign of:",o:["Akbar","Babur","Sher Shah Suri","Humayun"],a:2,e:"Malik Muhammad Jaisi wrote Padmavat (a famous Sufi allegorical poem in Awadhi about the legendary Rani Padmini of Chittorgarh) during Sher Shah Suri's time. It is one of the most celebrated works of Hindi/Awadhi literature."}
]},

{id:"mg2",title:"Akbar — The Great Emperor",xp:80,type:"regular",seqIdx:1,
facts:[
"<b>Akbar (1556–1605):</b> Born 15 Oct 1542, Amarkot | Mother: Hamida Banu | Wife: Jodha Bai (Heer Kunwari/Harka Bai) | Regent 1556–60: <b>Bairam Khan</b> (Shia Muslim)",
"<b>Key acts:</b> 1563 = abolished Pilgrim Tax | 1564 = <b>abolished Jaziya</b> | 1579 = <b>Mazharnama (Infallibility Decree)</b> drafted by Sheikh Mubarak & Abul Fazl | 1582 = <b>Din-e-Ilahi</b> (Divine Faith; only 15 followers including Birbal) | Introduced <b>Ilahi Calendar</b>",
"<b>Ibadat Khana</b> (House of Worship at Fatehpur Sikri, 1575) = opened to all religions 1578 — 'Parliament of Religion'",
"<b>Fatehpur Sikri</b> = Akbar's capital for only 14 years (1571–1585); abandoned due to water scarcity + NW campaigns",
"<b>Land Revenue — Dahsala System:</b> Revenue fixed on average yield of previous 10 years | Land types: Polaj (every year) | Parati (once in 2 yrs) | Chachar (3–4 yrs) | Banjar (5+ yrs)",
"<b>Mansabdari System:</b> Two ranks — Zat (salary/personal rank) + Sawar (cavalry to maintain) | Rank NOT hereditary | Mansabdars paid via Jagir | Introduced by <b>Todar Mal</b>",
"<b>Sulh-i-Kul</b> = universal peace / tolerance — Akbar's core governance philosophy",
"<b>Battle of Haldighati (1576):</b> Mughal army led by <b>Man Singh</b> vs Maharana Pratap — Pratap escaped",
"<b>Navratnas:</b> Abul Fazl (Akbarnama + Ain-i-Akbari) | Birbal | Todar Mal (Finance Minister) | Tansen (musician, title Mian) | Abdul Rahim Khan-i-Khana | Raja Man Singh | Faizi | Mirza Aziz Koka | Fakir Aziao-Din",
"<b>Ain-i-Akbari</b> = encyclopaedia of Akbar's administration (prices, revenues, statistics of each province) | <b>Akbarnama</b> = biography — both written by Abul Fazl",
"<b>Buland Darwaza</b> at Fatehpur Sikri built to commemorate Gujarat victory (1573) | Tomb at <b>Sikandra, UP</b> (built by Jahangir)"
],

mcqs:[
{q:"Akbar abolished the Jaziya tax in which year?",o:["1563","1564","1575","1579"],a:1,e:"Akbar abolished Jaziya (the religious tax on non-Muslims) in 1564. He had abolished the Pilgrim Tax in 1563. These acts were part of his Sulh-i-Kul (universal tolerance) policy."},
{q:"The Mansabdari System was introduced by:",o:["Akbar","Babur","Raja Todar Mal","Birbal"],a:2,e:"The Mansabdari System was introduced by Raja Todar Mal (Akbar's Finance Minister, titled Diwan-i-Ashraf). The system had two ranks: Zat (personal rank/salary) and Sawar (cavalry to maintain). Ranks were NOT hereditary."},
{q:"Din-e-Ilahi (1582) promoted by Akbar had approximately how many followers?",o:["100","50","15","500"],a:2,e:"Din-e-Ilahi had only 15 followers — it was a personal spiritual path, NOT a mass religion. Birbal was the only Hindu to join. Abul Fazl also joined. It emphasised monotheism and drew from multiple religions."},
{q:"The Battle of Haldighati (1576) against Maharana Pratap was led on the Mughal side by:",o:["Akbar himself","Bairam Khan","Birbal","Man Singh"],a:3,e:"The Mughal army at the Battle of Haldighati was led by Raja Man Singh (one of Akbar's Navratnas). Akbar was not present personally. Maharana Pratap escaped and continued resistance from the forests."},
{q:"'Ain-i-Akbari' and 'Akbarnama' were written by:",o:["Birbal","Raja Todar Mal","Abul Fazl","Faizi"],a:2,e:"Both Ain-i-Akbari (encyclopaedia of Akbar's administration — revenues, prices, provincial statistics) and Akbarnama (biography of Akbar) were written by Abul Fazl. Faizi was Abul Fazl's brother and a poet."},
{q:"The Ibadat Khana (House of Worship) was opened to ALL religions in which year?",o:["1575","1578","1579","1582"],a:1,e:"Ibadat Khana was built in 1575 initially for Muslim scholars only. In 1578, Akbar opened it to representatives of all religions — Hindus, Jains, Zoroastrians, Christians — making it a 'Parliament of Religion.'"},
{q:"The 'Mazharnama' (Infallibility Decree) of 1579 was drafted by:",o:["Birbal and Tansen","Sheikh Mubarak and Abul Fazl","Raja Todar Mal and Man Singh","Faizi and Rahim"],a:1,e:"The Mazharnama (declaring Akbar's infallibility in religious matters) was drafted by Sheikh Mubarak and Abul Fazl in 1579. This declared Akbar the supreme arbiter of religious disputes — a controversial step."},
{q:"In Akbar's land classification, 'Banjar' referred to land that was:",o:["Cultivated every year","Cultivated once in 2 years","Cultivated once in 3-4 years","Cultivated once in 5 or more years"],a:3,e:"Banjar = land cultivated once in 5 or more years. Polaj = cultivated every year | Parati = once in 2 years | Chachar = once in 3-4 years | Banjar = 5+ years. This four-fold classification was part of Todar Mal's systematic land survey."},
{q:"Fatehpur Sikri was Akbar's capital for approximately how many years before being abandoned?",o:["4 years","14 years","24 years","34 years"],a:1,e:"Fatehpur Sikri was Akbar's capital for only 14 years (1571–1585). It was abandoned due to water scarcity and the need to shift focus to the northwest (Kashmir, Sindh campaigns). Akbar then moved to Lahore before returning to Agra."},
{q:"Which Navratna of Akbar was given the title 'Mian' by Akbar for his music?",o:["Birbal","Rahim","Abul Fazl","Tansen"],a:3,e:"Tansen (originally from Gwalior; given the title 'Tansen' by King Ramachandra) was given the title 'Mian' by Akbar — a mark of great respect. He is one of the greatest musicians in Indian history and is revered for creating multiple classical ragas."}
]},

{id:"mg3",title:"Jahangir & Shah Jahan",xp:65,type:"regular",seqIdx:2,
facts:[
"<b>Jahangir (1605–1627):</b> Childhood name Salim (Shekhu Baba) | Title: Jahangir (Conqueror of World)",
"Executed <b>Guru Arjan Dev Ji</b> (5th Sikh Guru) because Guru blessed rebel Prince Khusrau",
"Wife <b>Nur Jahan</b> (née Mehrunnisa, married 1611) = only Mughal empress to have <b>coins struck in her name</b> and issue farmans | Father = <b>Itimad-ud-Daula</b> (Pillar of State)",
"<b>Nur Jahan's Junta:</b> Nur Jahan + Itimad-ud-Daula + brother Asaf Khan + Prince Khurram (Shah Jahan) — effectively ran the empire",
"<b>Zanjir-i-Adal</b> (Chain of Justice) = 60 bells on gold chain outside Agra Fort — anyone could pull for royal justice",
"<b>Itimad-ud-Daula's tomb (Agra):</b> First Mughal building entirely in WHITE MARBLE | First use of <b>Pietra Dura</b> (inlaid semi-precious stones) — predates Taj Mahal ⚠️",
"Autobiography: <b>Tuzuk-i-Jahangiri / Jahangirnama</b> | Keen naturalist — described species with remarkable accuracy | Introduced Du-Aspah-Sih-Aspah (modified Mansabdari) | Tomb: Lahore",
"<b>Shah Jahan (1628–1658):</b> Childhood name Khurram | Wife: Arjumand Bano (Mumtaj Mahal) — died 1631",
"Built <b>Shahjahanabad</b> (Old Delhi) with Red Fort + Jama Masjid + Chandni Chowk",
"<b>Taj Mahal:</b> Built 1631–1653 | 22 years | 50,000 workers | Built by <b>Ustad Ahmed Lahori + Ustad Isha Khan</b> | UNESCO 1983 | Calligraphy by <b>Amanat Khan Shirazi</b>",
"<b>Peacock Throne (Takht-e-Taus)</b> had Koh-i-Noor diamond — looted by <b>Nadir Shah (1739)</b>",
"<b>Two Moti Masjids:</b> Shah Jahan built in Agra Fort (white marble) | Aurangzeb built in Red Fort Delhi",
"Son <b>Dara Shikoh</b> translated <b>52 Upanishads</b> as <b>Sirr-i-Akbar (The Great Secret)</b> ⚠️ NOT just Bhagavad Gita",
"Shah Jahan imprisoned by Aurangzeb in <b>Agra Fort (Musamman Burj)</b> — could see Taj Mahal from his window; died 1666"
],

flashcards:[{q:"What does 'Jahangir' mean, and what was his childhood name?",a:"'Conqueror of World'; childhood name Salim"},{q:"Why did Jahangir execute Guru Arjan Dev Ji?",a:"For blessing the rebel Prince Khusrau"},{q:"What was unique about Nur Jahan among Mughal empresses?",a:"She was the only one to have coins struck in her name"},{q:"Who was Nur Jahan's father?",a:"Itimad-ud-Daula"},{q:"What was the Zanjir-i-Adal?",a:"The Chain of Justice — 60 bells outside Agra Fort for royal justice"},{q:"What is Shah Jahan called, and why?",a:"'Architect King', for his architectural achievements"},{q:"What did Shah Jahan build, and for whom?",a:"The Taj Mahal (1632-53), for Mumtaz Mahal"}],
mcqs:[
{q:"The FIRST Mughal building made entirely of white marble, using Pietra Dura for the first time, was:",o:["Taj Mahal","Humayun's Tomb","Itimad-ud-Daula's Tomb","Jama Masjid"],a:2,e:"Itimad-ud-Daula's Tomb (built by Nur Jahan in Agra for her father) was the FIRST Mughal building entirely in white marble and the FIRST to use Pietra Dura (inlaid semi-precious stones). This technique was later used on a grander scale in the Taj Mahal — a very common SSC trap."},
{q:"Nur Jahan was the only Mughal empress to:",o:["Build a mosque","Have coins struck in her name and issue royal farmans","Fight a battle","Translate Sanskrit texts"],a:1,e:"Nur Jahan (Jahangir's wife) was the only Mughal empress to have coins struck in her own name and to issue farmans (royal decrees). She, along with her father Itimad-ud-Daula, brother Asaf Khan, and Shah Jahan, formed the 'Nur Jahan Junta' that effectively ran the empire."},
{q:"The Taj Mahal was built by Ustad Ahmed Lahori and Ustad Isha Khan. When was it designated a UNESCO World Heritage Site?",o:["1978","1983","1987","2003"],a:1,e:"Taj Mahal was designated a UNESCO World Heritage Site in 1983. It was built between 1631–1653 (22 years) using 50,000 workers. The calligraphy was done by Amanat Khan Shirazi (imported from Iran)."},
{q:"'Sirr-i-Akbar' (The Great Secret) was Dara Shikoh's Persian translation of:",o:["The Bhagavad Gita","The Ramayana","52 Upanishads","Vedas"],a:2,e:"Dara Shikoh translated 52 Upanishads into Persian as Sirr-i-Akbar (The Great Secret). He also wrote Majma-ul-Bahrain (Confluence of Two Seas) comparing Sufism and Vedanta. Common trap: students often say only Bhagavad Gita."},
{q:"The 'Zanjir-i-Adal' (Chain of Justice) was installed by which Mughal emperor?",o:["Akbar","Shah Jahan","Aurangzeb","Jahangir"],a:3,e:"Jahangir installed the Zanjir-i-Adal (Chain of Justice) — 60 bells on a golden chain outside Agra Fort. Anyone could pull it to get royal justice directly, bypassing officials. It symbolised Jahangir's commitment to accessible justice."},
{q:"Shah Jahan was imprisoned by Aurangzeb in which part of Agra Fort?",o:["Diwan-i-Khas","Sheesh Mahal","Musamman Burj","Jahangiri Mahal"],a:2,e:"Shah Jahan was imprisoned in the Musamman Burj (an octagonal tower) of Agra Fort. From his window, he could see the Taj Mahal — where his beloved wife Mumtaj Mahal was buried. He died there in 1666."},
{q:"There are TWO 'Moti Masjids' in India. Which emperor built which?",o:["Both by Shah Jahan","Both by Aurangzeb","Shah Jahan in Agra Fort; Aurangzeb in Red Fort Delhi","Akbar in Agra; Shah Jahan in Delhi"],a:2,e:"Two Moti Masjids exist: Shah Jahan built the Moti Masjid (Pearl Mosque) in Agra Fort in white marble (1648). Aurangzeb built another Moti Masjid inside the Red Fort in Delhi. This is one of the most frequently asked SSC traps."},
{q:"The Peacock Throne (Takht-e-Taus) was looted along with the Koh-i-Noor diamond by:",o:["Timur Lang in 1398","Ahmad Shah Abdali in 1761","Nadir Shah in 1739","Muhammad Ghori in 1193"],a:2,e:"Nadir Shah (Iranian ruler) invaded Delhi in 1739, looting it for 57 days. He took both the Peacock Throne (Takht-e-Taus) and the Koh-i-Noor diamond. He defeated Muhammad Shah Rangeela at the Battle of Karnal."},
{q:"Guru Arjan Dev Ji (5th Sikh Guru) was executed by Jahangir because:",o:["He refused to pay taxes","He blessed Prince Khusrau (Jahangir's rebel son)","He converted Muslims to Sikhism","He built a temple without permission"],a:1,e:"Guru Arjan Dev Ji blessed Prince Khusrau (Jahangir's rebel son who had fought against his father). Jahangir considered this treasonous and had the Guru executed in 1606. The Guru Granth Sahib had been compiled by Guru Arjan Dev just two years earlier (1604)."},
{q:"Jahangir's autobiography 'Tuzuk-i-Jahangiri' reveals he was notably:",o:["A military genius","A keen naturalist who described species accurately","An expert mathematician","A religious reformer"],a:1,e:"Jahangir's autobiography (Tuzuk-i-Jahangiri / Jahangirnama) is celebrated for his remarkably accurate observations on nature — he described birds, animals, and plants with scientific precision. He is considered one of the most observant naturalists among Mughal emperors."}
]},

{id:"mg4",title:"Aurangzeb & Mughal Decline",xp:65,type:"trap",seqIdx:3,
facts:[
"<b>Aurangzeb (1658–1707):</b> Title = Alamgir (World Conqueror) / ZindaPeer / Shahi Darvesh | Longest reigning Mughal (49 years) | Last effective Mughal emperor",
"<b>What Aurangzeb ABOLISHED:</b> Nauroz Festival (1659) | Jharokha Darshan (1669) | Musicians from court | Tuladan System (1670) | Dasara celebrations | Royal astrologers",
"<b>What Aurangzeb REIMPOSED:</b> Jaziya Tax (1679) | Pilgrim Tax (1679) | Temple construction ban",
"<b>Guru Tegh Bahadur</b> (9th Sikh Guru) executed 1675 at <b>Chandni Chowk, Delhi</b> | Site now = <b>Gurudwara Sis Ganj Sahib</b>",
"<b>Shivaji escaped from Agra (1666)</b> hidden in baskets — most embarrassing episode for Aurangzeb",
"<b>Deccan policy = biggest cause of Mughal decline</b> | Spent 25 years (1682–1707) in Deccan campaigns draining treasury",
"<b>Compiled Fatawa-i-Alamgiri</b> = comprehensive digest of Islamic law in India",

mcqs:[
{q:"Bibi Ka Maqbara (replica of Taj Mahal at Aurangabad) was built by:",o:["Aurangzeb himself","Aurangzeb's son Azam Shah","Shah Jahan","Aurangzeb's daughter"],a:1,e:"Bibi Ka Maqbara was built by Azam Shah (Aurangzeb's son) in 1668–69 in memory of his mother Rabia-ul-Daurani (Dilras Banu). Aurangzeb himself did NOT build it. This is a classic SSC trap where students attribute it to Aurangzeb."},
{q:"Aurangzeb reimposed Jaziya in 1679. This action is historically significant because:",o:["It generated enormous revenue","It ended a 115-year break in religious taxation — alienating Rajputs, Marathas, Hindus","It punished only rich Hindus","It was praised by Guru Tegh Bahadur"],a:1,e:"Akbar had abolished Jaziya in 1564. Aurangzeb reimposed it in 1679 after a 115-year gap. This single act alienated Rajputs, Marathas, Jats, Sikhs, and Hindus — contributing significantly to the empire's decline."},
{q:"Guru Tegh Bahadur (9th Sikh Guru) was executed in 1675 at:",o:["Amritsar","Anandpur Sahib","Chandni Chowk, Delhi","Lahore"],a:2,e:"Guru Tegh Bahadur was executed at Chandni Chowk, Delhi in 1675 for refusing to convert to Islam. The site is now Gurudwara Sis Ganj Sahib. This is distinct from Guru Arjan Dev (5th Guru) who was executed by Jahangir in 1606."},
{q:"Shivaji's escape from Aurangzeb's custody in Agra (1666) is historically notable because:",o:["It led to the Battle of Salher","He escaped hidden in baskets — the most embarrassing episode for Aurangzeb","He defeated the Mughal guards openly","He was let go by Aurangzeb voluntarily"],a:1,e:"Shivaji was confined in Agra after the Treaty of Purandar (1665). In 1666, he escaped hidden in large baskets (used to carry sweets/fruits for workers). This was the most embarrassing episode for Aurangzeb and allowed Maratha resistance to resume."},
{q:"The Treaty of Allahabad (1765) granted which territories' Diwani (revenue rights) to the East India Company?",o:["Awadh, Punjab, Delhi","Madras, Bombay, Surat","Bengal, Bihar, Orissa","Maharashtra, Gujarat, Deccan"],a:2,e:"The Treaty of Allahabad (1765) was signed by Shah Alam-II (Mughal emperor) with the East India Company after the Battle of Buxar (1764). It granted the Diwani (revenue collection rights) of Bengal, Bihar, and Orissa to the Company — a turning point in British India."},
{q:"The LAST Mughal emperor was Bahadur Shah-II, whose poetry pen name was:",o:["Rangeen","Mir","Ghalib","Zafar"],a:3,e:"Bahadur Shah-II (1837–1857) was the last Mughal emperor. He was a renowned Urdu poet with the pen name 'Zafar' (meaning victory). After the 1857 revolt, he was deported to Rangoon (Burma) where he died in 1862."},
{q:"Aurangzeb's single biggest policy failure leading to Mughal decline was:",o:["Reimposing Jaziya","His Deccan policy — 25 years of costly campaigns 1682–1707","Executing Guru Tegh Bahadur","Abolishing Jharokha Darshan"],a:1,e:"Aurangzeb's Deccan policy is considered the single biggest cause of Mughal decline. He spent 25 years (1682–1707) fighting in the Deccan, draining the treasury, losing lakhs of soldiers, and weakening the empire while the north was left ungoverned."},
{q:"'Fatawa-i-Alamgiri' compiled by Aurangzeb was:",o:["A military manual","A collection of his personal poetry","A comprehensive digest of Islamic law in India","A historical account of his reign"],a:2,e:"Fatawa-i-Alamgiri is the most comprehensive digest of Islamic (Hanafi) law compiled in India — assembled by Aurangzeb and a team of Islamic scholars. It is still referenced in Islamic jurisprudence. It was one of Aurangzeb's major intellectual contributions."},
{q:"Nadir Shah invaded India in 1739 and looted Delhi for:",o:["7 days","20 days","57 days","100 days"],a:2,e:"Nadir Shah looted Delhi for 57 days in 1739. He took the Peacock Throne (Takht-e-Taus) and the Koh-i-Noor diamond. He had defeated Muhammad Shah Rangeela at the Battle of Karnal. Delhi's population was massacred in the 'Nadir Shah's massacre (Qatl-e-Aam).'"},
{q:"Which late Mughal emperor gave the British a commercial Farman in 1717 enabling English trade?",o:["Muhammad Shah Rangeela","Bahadur Shah-I","Farrukh Siyar","Alamgir-II"],a:2,e:"Farrukh Siyar (1713–1719) gave the British a Farman in 1717 enabling free trade in Bengal. He was a puppet of the Sayyid Brothers (Abdullah Khan and Hussain Ali — the 'kingmakers'). This Farman was crucial for subsequent British commercial dominance in India."}
]}
]},

{id:"mv1",title:"Shivaji Maharaj & Maratha Rise",xp:70,type:"regular",seqIdx:4,
facts:[
"<b>Shivaji (1627–1680):</b> Born at <b>Shivneri fort</b> | Mother: <b>Jija Bai</b> | Father: Shahaji Bhosle | Inherited jagir of Poona 1637 | Mentor: <b>Dadaji Kondadeo</b>",
"Age 16: captured <b>Torna fort</b> | 1656: captured Javali from Chandrarao More | Created independent Maratha kingdom with <b>Raigad as capital</b>",
"<b>Battle of Pratapgarh (1659):</b> Killed <b>Afzal Khan</b> (Adil Shah's general) | <b>Battle of Pavankhind (1660):</b> Baji Prabhu Deshpande held back enemy → Shivaji escaped",
"<b>Treaty of Purandar (1665):</b> Signed between <b>Raja Jai Singh</b> (Aurangzeb's commander) & Shivaji — Shivaji ceded some forts to Mughals",
"<b>Shivaji's escape from Agra (1666):</b> Hidden in baskets — most embarrassing episode for Aurangzeb",
"Defeated Mughals at <b>Battle of Salher (1672)</b> | Crowned <b>Maharaja Chhatrapati (1674)</b> at <b>Raigad fort</b> | Coronation by <b>Gaga Bhatt</b> (Brahmin from Varanasi)",
"<b>Ashtapradhan Mandal:</b> Peshwa (Finance+Admin) | Senapati (Military) | Majumdar/Amatya (Accountant General) | Sachiv (Correspondence) | Dabir/Sumant (Foreign Minister) | Wagenavis/Mantri (Intelligence) | Nyayadhish (Justice) | Panditrao/Sadar (High Priest)",
"<b>Revenue system:</b> Chauth = 1/4 of land revenue | Sardeshmukhi = additional 1/10th levy | Land measured using rod called <b>Kathi</b>",
"Created <b>Indian naval tradition</b> to check Portuguese and Siddis of Janjira | Died 1680 at age 52",
"<b>Sambhaji (1680–89):</b> Son of Shivaji | Captured, tortured & executed by Mughals (1689)"
],

mcqs:[
{q:"Shivaji was born at which fort?",o:["Raigad fort","Torna fort","Shivneri fort","Pratapgarh fort"],a:2,e:"Shivaji was born at Shivneri fort (in 1627 or 1630). Raigad was his capital where he was crowned Chhatrapati in 1674. Torna was the first fort he captured at age 16. Pratapgarh is where he killed Afzal Khan in 1659."},
{q:"The 'Chauth' in Maratha revenue system was:",o:["1/10th of produce","1/4th of land revenue paid to avoid Maratha raids","1/6th of produce","1/3rd of produce"],a:1,e:"Chauth = 1/4th of land revenue paid by non-Maratha territories to avoid Maratha raids. Sardeshmukhi = additional 1/10th levy on lands where Marathas claimed hereditary rights as village headmen. These two formed the core of Maratha revenue from outside territories."},
{q:"The Treaty of Purandar (1665) was signed between Shivaji and:",o:["Aurangzeb personally","Mir Jumla","Raja Jai Singh (under Aurangzeb)","Shaista Khan"],a:2,e:"The Treaty of Purandar (1665) was signed between Shivaji and Raja Jai Singh (Aurangzeb's general/commander). Shivaji ceded some forts to the Mughals and agreed to visit Aurangzeb's court at Agra — which led to his famous escape."},
{q:"Shivaji's coronation as 'Maharaja Chhatrapati' at Raigad (1674) was performed by:",o:["Local Maharashtrian Brahmins","Gaga Bhatt (Brahmin scholar from Varanasi)","Aurangzeb's ambassador","Samarth Ramdas"],a:1,e:"Gaga Bhatt (a Brahmin scholar from Varanasi) performed Shivaji's coronation because local Maharashtrian Brahmins refused to recognise his Kshatriya status. Gaga Bhatt traced Shivaji's lineage to the Sisodia Rajputs of Mewar."},
{q:"In the Ashtapradhan Mandal, the minister responsible for INTELLIGENCE was called:",o:["Sachiv","Senapati","Wagenavis/Mantri","Panditrao"],a:2,e:"Wagenavis (also called Mantri) was responsible for intelligence, posts, and household affairs in Shivaji's Ashtapradhan Mandal. Sachiv handled correspondence. Senapati was the military commander. Each minister was directly responsible to Shivaji — no collective responsibility."},
{q:"The 'Sardeshmukhi' levy of the Marathas was:",o:["1/4 of produce — main war tax","An additional 1/10th levy on lands where Marathas claimed hereditary rights","1/6th revenue for Hindu temples","1/3rd for Maratha army"],a:1,e:"Sardeshmukhi was an additional 1/10th (10%) levy on lands outside Maratha territory where Marathas claimed hereditary rights as 'deshmukhs' (village headmen). It was separate from Chauth (1/4th). Together they funded the Maratha military expansion."},
{q:"Shivaji killed Afzal Khan (Bijapur's general) at:",o:["Battle of Pavankhind","Battle of Salher","Battle of Pratapgarh","Siege of Surat"],a:2,e:"At the Battle of Pratapgarh (1659), Shivaji killed Afzal Khan in a personal meeting. Khan came with a concealed dagger to kill Shivaji, but Shivaji was protected by armour and killed Khan with his 'wagh nakh' (tiger claws). This was his first major victory against the Bijapur Sultanate."},
{q:"The Maratha naval tradition was created by Shivaji primarily to counter:",o:["Mughals at sea","Dutch and French traders","Portuguese and Siddis of Janjira","British East India Company"],a:2,e:"Shivaji created India's naval tradition to counter the Portuguese (who dominated western coast trade) and the Siddis of Janjira (Abyssinian naval power at Janjira island). He built war galleys and established fortified harbours along the Konkan coast."},
{q:"Baji Prabhu Deshpande is remembered for:",o:["Defeating Afzal Khan","Helping Shivaji escape from Agra","Holding back enemy forces at Pavankhind so Shivaji could escape","Signing the Treaty of Purandar"],a:2,e:"Baji Prabhu Deshpande held back enemy forces at the Battle of Pavankhind (1660), sacrificing his life so that Shivaji could escape to safety. He continued fighting until he heard the cannon shot signalling Shivaji's safe arrival at Vishalgad fort."},
{q:"Which post in the Ashtapradhan was responsible for FOREIGN AFFAIRS and master of ceremonies?",o:["Sachiv","Panditrao","Dabir/Sumant","Nyayadhish"],a:2,e:"Dabir (also called Sumant) was the Foreign Minister and Master of Ceremonies in Shivaji's Ashtapradhan Mandal. Sachiv handled correspondence. Nyayadhish was the justice minister. Panditrao was the High Priest for internal religious matters."},
{q:"Sambhaji (son of Shivaji) met his end in 1689 by:",o:["Dying in battle against the Mughals","Being captured, tortured, and executed by Aurangzeb's forces","Suicide rather than capture","A disease during the Deccan campaign"],a:1,e:"Sambhaji was captured by Aurangzeb's forces in 1689. He was tortured brutally and then executed. His death temporarily weakened Maratha resistance but Rajaram (his brother) and later the Peshwas continued the struggle. Sambhaji had defeated Mughal forces at the Battle of Wai in 1687."}
]},

{q:"The FIRST hereditary Peshwa who formalised Maratha revenue rights (Sardeshmukhi+Chauth) from Mughals was:",o:["Baji Rao-I","Madhav Rao-I","Balaji Vishwanath","Balaji Baji Rao"],a:2,e:"Balaji Vishwanath (1713–1720) was the FIRST hereditary Peshwa. He secured the release of Chhatrapati Shahu from Mughal captivity and obtained formal Mughal recognition of the Maratha rights to collect Sardeshmukhi and Chauth."},
{q:"Baji Rao-I captured Salsette and Bassein from the Portuguese in:",o:["Battle of Vasai (1733)","Battle of Salher (1672)","Battle of Durai Sarai (1737)","Battle of Khandesh (1740)"],a:0,e:"Baji Rao-I captured Salsette and Bassein from the Portuguese at the Battle of Vasai in 1733 — demonstrating Maratha maritime ambition. He also defeated Nizam-ul-Mulk in 1737 (Treaty of Durai Sarai), marking the zenith of Maratha power."},
{q:"The 3rd Battle of Panipat (1761) was fought between:",o:["Marathas and British","Marathas and Mughals","Marathas and Ahmad Shah Abdali","Marathas and Hyder Ali"],a:2,e:"The 3rd Battle of Panipat (January 14, 1761) was between the Maratha Empire and Ahmad Shah Durrani (Abdali) of Afghanistan. Abdali won. The battle stopped Maratha northward expansion and dealt a devastating blow to the Maratha Confederacy."},
{q:"The GREATEST Peshwa who revived Maratha power after the 3rd Panipat disaster but died young at 27 was:",o:["Baji Rao-I","Nana Sahib-I","Balaji Vishwanath","Madhav Rao-I"],a:3,e:"Madhav Rao-I is considered the greatest Peshwa overall. He brilliantly revived Maratha power after the catastrophic 3rd Panipat defeat but died at just 27. His early death led to succession disputes and the eventual fragmentation of Maratha power."},
{q:"The Subsidiary Alliance with the British was accepted by the Marathas under:",o:["Treaty of Salbai (1st war)","Treaty of Bassein (2nd war)","Treaty of Purandar (3rd war)","Treaty of Allahabad"],a:1,e:"The Treaty of Bassein (1802) ended the 2nd Anglo-Maratha War. Peshwa Baji Rao-II accepted the Subsidiary Alliance — placing British troops in Maratha territory and paying for their maintenance. This virtually made the Marathas a British protectorate."},
{q:"The END of the Maratha Empire was caused by:",o:["1st Anglo-Maratha War","3rd Battle of Panipat","3rd Anglo-Maratha War (1817–18)","2nd Anglo-Maratha War"],a:2,e:"The 3rd Anglo-Maratha War (1817–1818) ended the Maratha Empire. Lord Hastings charged the Marathas with sheltering Pindari plunderers. The Maratha chieftains (Scindia, Holkar, Bhosale) fought separately and were defeated one by one. The Peshwa surrendered."},
{q:"Which Maratha chieftain controlled Gwalior?",o:["Holkar","Gaekwad","Scindia","Bhosale"],a:2,e:"Scindia (also spelled Shinde) controlled Gwalior. The other Maratha chieftains: Holkar = Indore | Gaekwad = Baroda | Bhosale = Nagpur | Pawar = Dhar | Peshwa = Poona. These five families + Peshwa formed the Maratha Confederacy."},
{q:"After the 3rd Anglo-Maratha War, the defeated Peshwa was placed on a small estate at:",o:["Pune","Satara","Bithur near Kanpur","Nagpur"],a:2,e:"After the 3rd Anglo-Maratha War (1817–18), the last Peshwa (Baji Rao-II) was given a pension and placed on a small estate at Bithur near Kanpur (UP). His adopted son Nana Sahib (a key leader of the 1857 revolt) was born there."},
{q:"Baji Rao-I famously said about the weakening Mughal empire: 'Let us strike at the trunk...' He won how many battles in his 20-year career?",o:["27","33","39","45"],a:2,e:"Baji Rao-I won 39 battles during his career (1720–1740) — he never lost a battle. He said: 'Let us strike at the trunk of the withering tree and the branches will fall themselves' — referring to the strategy of attacking the Mughal centre rather than fighting its subordinates."},
{q:"The Maratha Satara territory was annexed by the British under the 'Doctrine of Lapse' in:",o:["1818","1835","1848","1857"],a:2,e:"Satara was annexed in 1848 by Lord Dalhousie under the Doctrine of Lapse — the first territory to be annexed under this policy. The Doctrine held that adopted sons could not inherit princely states."}
]}
]},

facts:[
"<b>Vijayanagara Empire (1336–1650):</b> Name = 'City of Victory' | Built on south bank of <b>Tungabhadra</b> river | Capital <b>Hampi = UNESCO World Heritage Site (1986)</b>",
"<b>Founded 1336 CE by Harihara & Bukka</b> | Originally served Kakatiya rulers of Warangal | CAPTURED by Muhammad bin Tughlaq, converted to Islam, then <b>reconverted to Hinduism</b> under sage <b>Vidyaranya</b>",
"<b>Four Dynasties:</b> Sangama (1336–1485) | Saluva (1485–1505) | Tuluva (1505–1570) | Aravidu (1570–1650, last Hindu dynasty) | Founded by Tirumala",
"<b>Proudhadevaraya (Devaraya-II)</b> = most famous of Sangama dynasty | Titles: 'Elephant Hunter' + 'Dakshinapathada Chakravarthi' | Introduced Muslim archers + cavalry — pragmatic military reform",
"<b>Krishna Deva Raya (1509–1529)</b> = most famous king (Tuluva dynasty) | Also known as <b>Andhra Bhoja</b> | Authored <b>Amuktamalyada</b> (Telugu polity) + <b>Jambavati Kalyanam</b> (Sanskrit drama) | Patronised <b>Ashtadiggajas</b> (8 scholars)",
"<b>Allasani Peddanna</b> = greatest of Ashtadiggajas | Wrote <b>Manucharitam</b> | Title: <b>Andhra Kavita Pitamaha</b>",
"<b>Battle of Talikota (1565)</b> = also called <b>Battle of Bannihatti</b> | Combined forces of Bijapur+Ahmednagar+Golkonda+Bidar defeated Rama Raya → END of Vijayanagara",
"<b>Only empire in Medieval India to employ women in state services</b> (unique fact)",
"<b>Amara-Nayaka System / Nayankara System:</b> Top officers = Nayaks/Poligars; granted Amaram (land for service) | Similar to Iqta system",
"Administration: Mandalams → Nadus → Sthalas → Gramas | Land revenue = 1/6th | Tax-free lands = Manyams | 12 village functionaries = Ayangars"
],

mcqs:[
{q:"Hampi (capital of Vijayanagara) was designated a UNESCO World Heritage Site in:",o:["1983","1986","2003","2021"],a:1,e:"Hampi was designated a UNESCO World Heritage Site in 1986. Common traps: Taj Mahal = 1983 | Brihadeshwara = 1987 | Bhimbetka = 2003 | Dholavira = 2021. Hampi's 1986 date is distinctly different from all these."},
{q:"Harihara and Bukka (founders of Vijayanagara) are notable because they:",o:["Were feudatories of the Cholas","Were converted to Islam by Muhammad bin Tughlaq but reconverted to Hinduism under Vidyaranya","Were Portuguese-supported rulers","Were disciples of Ramanuja"],a:1,e:"Harihara and Bukka were originally captured by Muhammad bin Tughlaq and converted to Islam. Later, under the influence of the sage Vidyaranya, they reconverted to Hinduism and founded the Vijayanagara Empire in 1336. This origin story is frequently asked."},
{q:"'Amuktamalyada' — a treatise on Telugu polity — was written by:",o:["Allasani Peddanna","Tenali Ramakrishna","Krishna Deva Raya himself","Devaraya-II"],a:2,e:"Amuktamalyada was written by Krishna Deva Raya himself — making him both a great king and a literary figure. He also wrote Jambavati Kalyanam (Sanskrit drama). This is a classic trap — students attribute it to his court poets."},
{q:"Allasani Peddanna, titled 'Andhra Kavita Pitamaha', wrote which work?",o:["Jambavati Kalyanam","Manucharitam","Vikramasenavijaya","Parijatapaharanam"],a:1,e:"Allasani Peddanna was the greatest among Krishna Deva Raya's Ashtadiggajas (8 court scholars). He wrote Manucharitam and was titled Andhra Kavita Pitamaha (Grandfather of Andhra Poetry)."},
{q:"The Battle of Talikota (1565) is also known as the Battle of:",o:["Bannihatti","Chanderi","Vasai","Wai"],a:0,e:"The Battle of Talikota (1565) is also called the Battle of Bannihatti, fought on the banks of the Krishna River. The combined forces of Bijapur, Ahmednagar, Golkonda, and Bidar defeated Rama Raya and effectively ended the Vijayanagara Empire."},
{q:"The Vijayanagara Empire was unique in Medieval India for being the ONLY empire to:",o:["Build stone temples","Use elephants in war","Employ women in state services","Trade with Portuguese"],a:2,e:"Vijayanagara was the ONLY empire in Medieval India to formally employ women in state services — they worked as scribes, ministers, and even in military roles. Foreign travellers like Abdur Razzaq and Domingo Paes noted this practice."},
{q:"The 'Amara-Nayaka System' (Nayankara System) of Vijayanagara is similar in principle to the Mughal:",o:["Mansabdari System","Iqta System","Dahsala System","Zabti System"],a:1,e:"The Amara-Nayaka System (where Nayaks received Amaram — land grants — in exchange for military service) is similar to the Iqta System of the Delhi Sultanate (where military officers received land revenues in lieu of salary). Both were service-for-land grants."},
{q:"Krishna Deva Raya's '8 court scholars' were collectively known as:",o:["Navratnas","Nayakas","Ashtadiggajas","Ayangars"],a:2,e:"Krishna Deva Raya's 8 court scholars are called Ashtadiggajas (eight elephants supporting the eight directions). The greatest was Allasani Peddanna (Andhra Kavita Pitamaha). Navratnas were Akbar's 9 scholars — a different court."},
{q:"'Madhura Vijayam' — describing the recapture of Madurai from the Sultanate — was written by:",o:["Krishna Deva Raya","Allasani Peddanna","Gangadevi (wife of Kumar Kampana)","Devaraya-II"],a:2,e:"Madhura Vijayam is a Sanskrit poem written by Gangadevi (wife of Kumar Kampana, a Vijayanagara prince). It describes the recapture of Madurai from the Delhi Sultanate — a notable work of women's literature in the Vijayanagara period."},
{q:"Vijayanagara administration divided the empire into units in which order (largest to smallest)?",o:["Gramas → Sthalas → Nadus → Mandalams","Mandalams → Nadus → Sthalas → Gramas","Nadus → Mandalams → Gramas → Sthalas","Sthalas → Mandalams → Nadus → Gramas"],a:1,e:"Vijayanagara administrative hierarchy (largest to smallest): Mandalams (provinces) → Nadus (districts) → Sthalas (sub-districts) → Gramas (villages). Land revenue was 1/6th of produce. Tax-free lands were called Manyams. Village functionaries = 12 Ayangars."}
]},

"<b>Charminar (1591)</b> = built by Muhammad Quli Qutub Shah | Purpose: commemorate <b>end of plague epidemic</b> | Located in Hyderabad (originally called <b>Bhagyanagar</b>)",

"<b>Rana Kumbha of Mewar (1433–68)</b> = most famous Mewar ruler | Title: Sangeet Shiromani | Erected Kirti Stambh (Victory Tower) at Chittor",
"<b>Kalhana's Rajatarangini</b> = history of Kashmir written in Sanskrit (1148 CE) = first true historical text in Indian tradition",
"<b>Jaunpur Sharagi dynasty:</b> Jaunpur = 'Shiraz of India' | Malik Muhammad Jaisi (Padmavat) in this tradition | Shargi architecture: Atala Masjid, Lal Darwaja Masjid",
"<b>Ahoms of Assam:</b> Mongoloid from N. Burma | Name 'Assam' derived from Ahoms | Historical chronicles = <b>Buranjis</b> | Forced labour system = Paiks"

{q:"The Gol Gumbaz — the 2nd largest dome in the world — is in:",o:["Golconda (Hyderabad)","Bijapur (Karnataka)","Bidar (Karnataka)","Ahmednagar"],a:1,e:"Gol Gumbaz is in Bijapur (Karnataka), built by Muhammad Adil Shah of the Adil Shahi dynasty. It has the famous Whispering Gallery. The 2nd largest dome in the world (after St. Peter's Basilica, Rome). Common trap: students confuse it with Golconda."},
{q:"The Charminar (1591) was built by Muhammad Quli Qutub Shah to commemorate:",o:["The founding of Hyderabad","Victory over Vijayanagara","End of plague epidemic","Victory over the Portuguese"],a:2,e:"Charminar was built in 1591 to commemorate the end of a plague epidemic in the region. It is located in Hyderabad (originally called Bhagyanagar). The name 'Char Minar' means 'four minarets.'"},
{q:"Hyderabad was originally called:",o:["Golconda","Warangal","Bhagyanagar","Bidar"],a:2,e:"Hyderabad was founded as Bhagyanagar by Muhammad Quli Qutub Shah. It was later renamed Hyderabad. Golconda is the fort near Hyderabad — a separate entity. The Qutub Shahis built the Golconda fort and Charminar."},
{q:"The Bahmani kingdom's founder was:",o:["Mahmud Gawan","Ahmad Nizam Shah","Alauddin Hasan Bahman Shah (Hasan Gangu)","Firoz Shah Bahmani"],a:2,e:"The Bahmani kingdom was founded by Alauddin Hasan Bahman Shah (also known as Hasan Gangu) in 1347. He was a general who revolted against Muhammad bin Tughlaq and established the first major independent Muslim kingdom of the Deccan."},
{q:"Kalhana's 'Rajatarangini' is historically significant as:",o:["The first Sanskrit grammar book","The first true historical text in Indian tradition (1148 CE)","A religious text on Kashmir Shaivism","A diplomatic account of Mughal-Kashmir relations"],a:1,e:"Kalhana's Rajatarangini (written in Sanskrit in 1148 CE) is the first true historical text in the Indian tradition — following chronological order and citing sources. It is a history of Kashmir. UPSC frequently asks: 'Who wrote Rajatarangini?'"},
{q:"The historical chronicles of the Ahom kingdom of Assam are called:",o:["Buranjis","Rajatarangini","Vamsavalis","Sangeet Shiromani"],a:0,e:"Buranjis are the historical chronicles of the Ahom kingdom of Assam. The name 'Assam' itself is derived from 'Ahoms' — the Mongoloid tribe from northern Burma (Myanmar) who established the kingdom in the 13th century."},
{q:"The Adil Shahis of Bijapur were annexed by:",o:["Akbar","Shah Jahan","Aurangzeb in 1686","British in 1818"],a:2,e:"Aurangzeb annexed Bijapur (Adil Shahis) in 1686 and Golconda (Qutub Shahis) in 1687 — completing the Mughal conquest of the Deccan Sultanates. Ahmednagar (Nizam Shahis) had been annexed earlier by Shah Jahan in 1633."},
{q:"Zainul Abedeen, called 'Bud Shah' and 'Akbar of Kashmir', was famous for:",o:["Building the Gol Gumbaz","Translating Rajatarangini and Mahabharata into Persian and building artificial island Zaina Lanka","Founding the Bahmani kingdom","Composing classical music treatises"],a:1,e:"Zainul Abedeen (Bud Shah) was the greatest Kashmir ruler. He translated Kalhana's Rajatarangini and the Mahabharata into Persian. He built the artificial island Zaina Lanka on Wullur Lake. He is called 'Akbar of Kashmir' for his tolerance and scholarship."},
{q:"The 'Bidri work' craft tradition (blackened zinc alloy inlaid with silver) originated from which Deccan region?",o:["Bijapur","Golconda","Bidar","Ahmednagar"],a:2,e:"Bidri work is the famous craft from Bidar — a zinc alloy with blackened surface inlaid with silver designs. The name itself comes from Bidar (Karnataka). It flourished under the Barid Shahi dynasty of Bidar and the Bahmani sultanate's patronage."},
{q:"Rana Kumbha (1433–68) of Mewar is remembered for the title 'Sangeet Shiromani' and building:",o:["Dilwara Jain temples","Kirti Stambh (Victory Tower) at Chittor","Bibi Ka Maqbara","Gol Gumbaz"],a:1,e:"Rana Kumbha of Mewar erected the Kirti Stambh (Victory Tower) at Chittor to commemorate his military victories. He had the title 'Sangeet Shiromani' (crown jewel of music) and wrote music treatise Sangeet-Raj. He was the most famous Mewar ruler before Rana Sanga."}
]}
]},

facts:[
"<b>Sufism (tasawwuf)</b> = mysticism in Islam | Sufi = wool (people in long woolen clothes) | Began in Persia (12th cent) → India 1300 AD",
"<b>Al-Hujwiri</b> = FIRST Sufi to settle in India (died 1089 AD) | Known as <b>Data Ganj</b> | Wrote <b>Kashf-ul-Mahjub</b> (Revelation of the Veiled) = oldest Sufi treatise in Persian",
"Core beliefs: <b>Fana</b> (spiritual merger with Allah) | <b>Wahdatul-wajood</b> (one God) | <b>Sama</b> (spiritual music/dance) | <b>Zikr</b> (remembrance of God) | Pir-Murid relationship",
"Two types: <b>Ba-sharia</b> (followed Islamic law) | <b>Be-sharia</b> (did NOT follow Islamic law)",
"<b>4 Main Silsilas (Orders):</b> Chisti | Suhrawardi | Naqshbandi | Qadri",
"<b>Chisti Order:</b> Moinuddin Chishti introduced in India <b>1192</b> (same year as Battle of Tarain-II) | Dargah at Ajmer | <b>Baba Farid</b> (disciple) — poetry in <b>Punjabi = earliest Punjabi literature</b> | poems in Guru Granth Sahib | Nizamuddin Auliya — refused to meet Sultans; contemporary of 7 Delhi Sultans | Sama mostly Chisti",
"<b>Nizamuddin Auliya's dargah</b> = burial place of <b>Amir Khusrau, Jahanara Begum, Muhammad Shah Rangeela</b>",
"<b>Amir Khusrau:</b> Father of Qawwali | Disciple of Nizamuddin Auliya | Title: Tuti-i-Hind | Invented Sitar + Tabla | First to use <b>Hindavi (early Hindi)</b> in poetry | Developed Khayal + Tarana styles",
"<b>Suhrawardi Order:</b> Main centre = Multan | Saints held government positions | Famous saint: Bahauddin Zakaria",
"<b>Naqshbandi Order:</b> Orthodox sect | Introduced in India during Akbar's reign | Known for opposing Akbar's liberal policies",
"<b>Dara Shikoh</b> wrote <b>Safinat-ul-Auliya</b> = biographies of Sufi saints; also wrote <b>Majma-ul-Bahrain</b> (Confluence of Two Seas)"
],

mcqs:[
{q:"The FIRST Sufi saint to settle in India was:",o:["Moinuddin Chishti","Baba Farid","Al-Hujwiri (Data Ganj)","Nizamuddin Auliya"],a:2,e:"Al-Hujwiri (died 1089 AD) was the FIRST Sufi to settle in India. He is popularly known as Data Ganj Baksh. He wrote Kashf-ul-Mahjub (Revelation of the Veiled) — the oldest Sufi treatise in Persian. Moinuddin Chishti introduced the Chishti ORDER in India in 1192."},
{q:"'Kashf-ul-Mahjub' (Revelation of the Veiled) — the oldest Sufi treatise in Persian — was written by:",o:["Moinuddin Chishti","Nizamuddin Auliya","Baba Farid","Al-Hujwiri"],a:3,e:"Kashf-ul-Mahjub was written by Al-Hujwiri (Data Ganj) — the first Sufi to settle in India (died 1089 AD). It is the oldest Sufi treatise in Persian and a foundational text of Islamic mysticism."},
{q:"Baba Farid (Fariduddin Ganjshakar) is significant because he wrote in Punjabi, making his work:",o:["The first Urdu poetry","The earliest known Punjabi literature","The first Hindi devotional poetry","A translation of the Quran"],a:1,e:"Baba Farid wrote in Punjabi — his compositions represent the earliest known Punjabi literature. His poems are also included in the Guru Granth Sahib (compiled by Guru Arjan Dev in 1604), alongside Kabir, Ravidas, and Namdev."},
{q:"Moinuddin Chishti came to India in 1192 — the same year as:",o:["Battle of Panipat-I","Battle of Tarain-I","Battle of Tarain-II","Ghori's death"],a:2,e:"Moinuddin Chishti introduced the Chishti Sufi order in India in 1192 — the same year as the Battle of Tarain-II (Ghori's decisive victory over Prithviraj Chauhan). His dargah at Ajmer is one of India's most important pilgrimage sites for both Muslims and Hindus."},
{q:"Amir Khusrau was the disciple of Nizamuddin Auliya and is called 'Father of Qawwali.' He also created which literary first?",o:["First to translate the Quran into Hindi","First to use Hindavi (early Hindi) in poetry","First to write Persian poetry in India","First to compose Sanskrit-Persian mixed verse"],a:1,e:"Amir Khusrau was the FIRST to use Hindavi (early Hindi/Urdu) in poetry — a revolutionary step that helped bridge Persian literary tradition with the Indian vernacular. He also invented Sitar and Tabla, developed Khayal and Tarana styles, and was the Father of Qawwali."},
{q:"The Suhrawardi Sufi order was distinctive because its saints:",o:["Refused government positions","Lived in extreme poverty","Held important government positions and were wealthy","Opposed all forms of music"],a:2,e:"The Suhrawardi Sufi saints (main centre: Multan) were notable for holding important government positions and were generally wealthy — unlike Chishti saints who kept distance from the state. Famous Suhrawardi saint: Bahauddin Zakaria."},
{q:"'Sama' (mystical music and dance) is most associated with which Sufi order?",o:["Naqshbandi","Suhrawardi","Chisti","Qadri"],a:2,e:"Sama (spiritual music and dance) is most associated with the Chishti order. The Naqshbandi order is orthodox and typically opposes music. The Chishti saints believed Sama was a pathway to spiritual experience and divine love."},
{q:"Nizamuddin Auliya's dargah in Delhi is the burial place of (among others):",o:["Babur and Humayun","Amir Khusrau, Jahanara Begum, and Muhammad Shah Rangeela","Aurangzeb and Dara Shikoh","Iltutmish and Razia Sultan"],a:1,e:"Nizamuddin Auliya's dargah in Delhi is the burial place of Amir Khusrau (his disciple), Jahanara Begum (Shah Jahan's daughter), and Muhammad Shah Rangeela (the Mughal emperor). It remains one of Delhi's most important spiritual sites."},
{q:"The Naqshbandi Sufi order is known for being introduced into India during whose reign?",o:["Babur","Humayun","Akbar","Aurangzeb"],a:2,e:"The Naqshbandi order was introduced into India during Akbar's reign by Khwaja Baqi Billah. It is an orthodox Sufi order. Sheikh Ahmad Sirhindi (a leading Naqshbandi) opposed Akbar's Din-e-Ilahi and Jahangir's liberalism."},
{q:"'Majma-ul-Bahrain' (Confluence of Two Seas) was written by Dara Shikoh comparing:",o:["Vedanta and Buddhism","Sufism and Vedanta","Islam and Christianity","Bhakti movement and Sufism"],a:1,e:"Dara Shikoh wrote Majma-ul-Bahrain (Confluence of Two Seas) comparing Sufi concepts with Vedantic philosophy. He found deep similarities between Islamic mysticism and Hindu Vedanta. He also wrote Safinat-ul-Auliya (biographies of Sufi saints) and translated 52 Upanishads as Sirr-i-Akbar."}
]},

{id:"sb2",title:"Bhakti Movement — Saints & Impact",xp:65,type:"regular",seqIdx:9,
facts:[
"<b>Bhakti Movement:</b> Single-minded intense devotion to God | Relationship via love and worship, not ritual | Initiated by <b>Shaiva Nayanars</b> (devotees of Shiva) + <b>Vaishnavite Alvars</b> (devotees of Vishnu) in South India",
"<b>Nayanars:</b> Most important 3 = Appar, Sundarar, Thirugnana Sambandar | Literature: Thirumarai (Tevaram = Dravida Veda) | 63 Nayanars total",
"<b>Alvars:</b> Literature: Divya Prabandham (4000 verses = Tamil Veda) | <b>Andal</b> = ONLY female Alwar | Composed <b>Thiruppavai</b> (30 verses) | Called '<b>Meera of the South</b>' | Shrine at Srirangam",
"<b>Nirgun saints:</b> Formless God (knowledge-based) — Guru Nanak, Ravidas, Kabir",
"<b>Sagun saints:</b> God with form (love-based) — Tulsidas, Surdas, Meerabai",
"<b>Ramananda</b> = Founder of Sant-Parampara in North India | Substituted Rama worship for Krishna | 12 disciples including <b>Kabir</b> (Muslim weaver) + <b>Ravidas</b> (cobbler)",
"<b>Kabir Das (1440–1510):</b> Disciple of Ramananda | Nirguna saint | First to reconcile Hinduism & Islam | Poems compiled in <b>Bijak</b> (3 parts: Ramaini, Sabda, Sakhi) | 'Ram Rahim is the same'",
"<b>Guru Nanak Dev (1469–1538):</b> Born Talwandi, died Kartarpur | FOUNDER of Sikh religion + 1st Guru | Performed 4 Udasis (journeys): East, South, North, West | Spread Ik Onkar (One God) | Played Rabab with attendant Mardana | Started Guru-Ka-Langar",
"<b>Chaitanya Mahaprabhu (1486–1533):</b> Founder of modern Vaishnavism in Bengal | Saguna saint | Popularised Kirtans | Philosophy: Achintya Bheda-Abheda | Inspiration for ISKCON | Wrote Siksastakam",
"<b>Tulsidas (1532–1623):</b> Wrote Ramcharitmanas in <b>Awadhi</b> | Depicted Rama as incarnation",
"<b>Surdas (1483–1563):</b> Disciple of Vallabhacharya | Blind from birth | Wrote Sursagar | Outstanding poet in Brajbhasha",
"<b>Mirabai (1498–1546):</b> Queen of Chittorgarh | Wife of Bhoj Raj (son of Rana Sanga) | Devotee of Krishna",
"<b>Tukaram (1598–1650):</b> Contemporary of Shivaji | Founded Varkari sect | 'Man behind Maratha Nationalism' | Teachings in Abhangas",
"<b>Dnyaneshwar (1275–1296):</b> FOUNDER of Bhakti Movement in Maharashtra | Wrote Dnyaneswari (commentary on Bhagavad Gita) + Amrutanubhav",
"<b>Basavanna:</b> Virashaivism/Sharana Movement (Karnataka, 12th cent) | Established <b>Anubhava Mantapa</b> = '1st democratic parliament of the world'",
"<b>Guru Arjan Dev (5th Guru)</b> compiled Guru Granth Sahib (1604) + built Golden Temple | <b>Guru Ram Das (4th Guru)</b> founded Amritsar | <b>Guru Gobind Singh (10th Guru)</b> established Khalsa Panth (1699)"
],

mcqs:[
{q:"Who is called the 'Meera of the South' and is the ONLY female Alwar?",o:["Karaikkal Ammaiyar","Akka Mahadevi","Andal","Mirabai"],a:2,e:"Andal is the ONLY female Alwar (devotees of Vishnu). She composed Thiruppavai (30 verses sung during the Margazhi month) and is enshrined at Srirangam. She is called the 'Meera of the South.' Karaikkal Ammaiyar was a Nayanar (Shiva devotee), not an Alwar."},
{q:"The FOUNDER of the Bhakti Movement in Maharashtra was:",o:["Tukaram","Namdeva","Eknath","Dnyaneshwar"],a:3,e:"Dnyaneshwar (1275–1296) is the FOUNDER of the Bhakti Movement in Maharashtra. He wrote Dnyaneswari (commentary on Bhagavad Gita in Marathi) and Amrutanubhav. He followed the Nath Yogi tradition. Tukaram founded the Varkari sect later."},
{q:"The ONLY Nirguna saint in Maharashtra was:",o:["Tukaram","Dnyaneshwar","Namdeva","Eknath"],a:2,e:"Namdeva (1270–1350) was the ONLY Nirguna saint in Maharashtra. He was a devotee of Vithoba (Vishnu) and opposed the caste system. All other major Maharashtra Bhakti saints (Dnyaneshwar, Tukaram, Eknath) are classified as Sagun saints."},
{q:"The Guru Granth Sahib was compiled by which Sikh Guru in 1604?",o:["Guru Nanak (1st Guru)","Guru Ram Das (4th Guru)","Guru Arjan Dev (5th Guru)","Guru Gobind Singh (10th Guru)"],a:2,e:"Guru Arjan Dev (5th Guru) compiled the Guru Granth Sahib in 1604 at Amritsar. It includes compositions of Kabir, Baba Farid, Namdev, Ravidas, and other Bhakti saints — not just Sikh Gurus. Guru Arjan Dev also built the Golden Temple (Harmandir Sahib)."},
{q:"The city of Amritsar was founded by:",o:["Guru Nanak","Guru Arjan Dev","Guru Ram Das","Guru Gobind Singh"],a:2,e:"Amritsar was founded by Guru Ram Das (4th Guru). Guru Arjan Dev (5th Guru) then built the Harmandir Sahib (Golden Temple) there. Guru Gobind Singh (10th Guru) established the Khalsa Panth in 1699. These three Gurus and their contributions are frequently tested."},
{q:"Khalsa Panth was established in 1699 by:",o:["Guru Nanak","Guru Tegh Bahadur","Guru Arjan Dev","Guru Gobind Singh"],a:3,e:"Guru Gobind Singh (10th and last human Sikh Guru) established the Khalsa Panth on Vaisakhi, April 13, 1699, at Anandpur Sahib. This formalised Sikhism as a distinct religion with the Panj Pyaras (Five Beloved Ones). He also declared the Guru Granth Sahib as the eternal Guru."},
{q:"Kabir Das's poetic compositions are collected in 'Bijak' which has THREE parts. They are:",o:["Ramaini, Sabda, Sakhi","Abhangas, Dohe, Banis","Padas, Bhaivans, Chaupais","Kirtans, Bhajans, Ragas"],a:0,e:"Kabir's Bijak has three parts: Ramaini (verses on Rama/spiritual themes), Sabda (songs/pads), and Sakhi (couplets/dohe for daily wisdom). Bijak is his most important compilation. Kabir preached that 'Ram Rahim is the same' — reconciling Hindu and Islamic traditions."},
{q:"Chaitanya Mahaprabhu's philosophy 'Achintya Bheda-Abheda' means:",o:["Complete non-dualism (all is one)","Complete dualism (God separate from soul)","Simultaneous inconceivable difference and non-difference","God is formless and unattainable"],a:2,e:"Achintya Bheda-Abheda means 'inconceivable simultaneous difference and non-difference' between God and the individual soul. Chaitanya's philosophy inspired ISKCON (International Society for Krishna Consciousness). His Sanskrit work was Siksastakam."},
{q:"Basavanna's 'Anubhava Mantapa' (established in 12th century Karnataka) is historically described as:",o:["First Sufi monastery in India","First democratic parliament of the world","First Sanskrit academy in South India","First all-religion council of medieval India"],a:1,e:"Basavanna established the Anubhava Mantapa in 12th century Karnataka — called the 'first democratic parliament of the world' by historians. It was an open forum for the Virashaiva/Lingayat community to discuss spiritual and social matters. Basavanna also spread Virashaivism through Vachanas (poetry)."},
{q:"Guru Nanak performed FOUR Udasis (spiritual journeys). Which direction sequence is correct?",o:["North→South→East→West","East→South→North→West","West→East→South→North","South→North→West→East"],a:1,e:"Guru Nanak's four Udasis: East (Bengal/Assam), South (Sri Lanka), North (Tibet/Kashmir), West (Mecca/Baghdad/Persia). He spread 'Ik Onkar' (One God) message across these journeys. He played the Rabab with his attendant Mardana."}
]},

{id:"sb3",title:"Sikh Gurus, Foreigners & Master Traps",xp:50,type:"trap",seqIdx:10,
facts:[
"<b>10 Sikh Gurus in sequence:</b> Nanak (1st) → Angad → Amar Das → <b>Ram Das</b> (4th, founded Amritsar) → <b>Arjan Dev</b> (5th, Guru Granth Sahib + Golden Temple; executed by Jahangir) → Hargobind → Har Rai → Har Krishan → <b>Tegh Bahadur</b> (9th, executed by Aurangzeb 1675) → <b>Gobind Singh</b> (10th, Khalsa Panth 1699)",
"<b>Key Bhakti Traps:</b> Namdeva = only Nirguna saint in Maharashtra | Dnyaneshwar = founder of Maharashtra Bhakti | Tukaram = founded Varkari sect | Purandar Das = Karnataka Sangeeta Pitamaha (Carnatic Music)",
"<b>Foreign arrivals:</b> Vasco da Gama (1498, Calicut, Kerala) — discovered sea route via Cape of Good Hope | Portuguese captured Goa under <b>Afonso de Albuquerque (1510)</b> | British came on <b>Red Dragon Ship (1600)</b> | Sir Thomas Roe (1615) = first official British diplomatic mission to Mughal court (Jahangir's court)",
"<b>Nadir Shah (1739):</b> Looted Delhi 57 days | Took Koh-i-Noor + Peacock Throne | Battle of Karnal (defeated Muhammad Shah Rangeela)",
"<b>Vedanta sub-schools:</b> Advaita (Shankaracharya, 8th cent) — Non-Dualism | Vishishtadvaita (Ramanuja, 11th cent) — Qualified Monism | Dvaita (Madhvacharya, 13th cent) — Dualism",
"<b>Madhvacharya:</b> Established Udupi Krishna temple + 8 Mathas still active | Book: Anuvyakhyana",
"<b>Vallabhacharya (1479–1531):</b> Pushti Marg = path of grace | Worshipped Krishna as Srinathji",
"<b>Sankaradeva (1499–1569):</b> Spread Bhakti in Assam | Ekasarana movement (Neo-Vaishnavite) | Most famous work: Kirtana Ghosha | Wrote in Assamese + Brajavali"
],
