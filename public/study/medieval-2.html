mcqs:[
{q:"Guru Arjan Dev (5th Sikh Guru) was executed by which Mughal emperor?",o:["Akbar","Aurangzeb","Shah Jahan","Jahangir"],a:3,e:"Guru Arjan Dev (5th Guru) was executed by Jahangir in 1606 because he had blessed Jahangir's rebel son Prince Khusrau. He had compiled the Guru Granth Sahib (1604) and built the Golden Temple. Guru Tegh Bahadur (9th Guru) was executed by Aurangzeb in 1675."},
{q:"The Golden Temple (Harmandir Sahib) at Amritsar was built by which Sikh Guru?",o:["Guru Nanak (1st)","Guru Ram Das (4th)","Guru Arjan Dev (5th)","Guru Gobind Singh (10th)"],a:2,e:"Guru Arjan Dev (5th Guru) built the Harmandir Sahib (Golden Temple) at Amritsar. Guru Ram Das (4th Guru) had earlier founded the city of Amritsar and the sacred pool (Amrit Sarovar). These two are frequently confused."},
{q:"Vasco da Gama landed in India for the first time in 1498 at:",o:["Goa","Calicut (Kerala)","Bombay","Diu"],a:1,e:"Vasco da Gama landed at Calicut (Kozhikode, Kerala) in 1498 — becoming the first European to discover the sea route to India via the Cape of Good Hope. Goa was captured by the Portuguese under Afonso de Albuquerque in 1510 — a different event."},
{q:"Madhvacharya's philosophical school of 'Dvaita' (Dualism) teaches that:",o:["God and world are one (non-dualism)","God has qualities but soul is distinct (qualified monism)","Divinity is completely separate from the human soul — liberation only through God's grace","Soul and God alternate between same and different"],a:2,e:"Madhvacharya (1238–1319) preached Dvaita (Dualism) — God (Brahman) and the individual soul (Atman) are completely separate entities. Liberation comes only through God's grace, not self-knowledge. He established the Udupi Krishna temple and 8 Mathas still active today."},
{q:"'Karnataka Sangeeta Pitamaha' (Grandfather of Carnatic Music) is the title of:",o:["Tansen","Amir Khusrau","Purandar Das","Raja Man Singh Tomar"],a:2,e:"Purandar Das (1483–1564) is called Karnataka Sangeeta Pitamaha — the Grandfather/Father of Carnatic Music. He systematised Carnatic music education. Tansen was a Hindustani classical musician (Mughal court). Raja Man Singh Tomar patronised music at Gwalior."},
{q:"Sir Thomas Roe's significance in Mughal history is that he was:",o:["The first Portuguese envoy","The first official British diplomatic mission to Jahangir's Mughal court (1615)","A general who fought Aurangzeb","The person who got the Farman in 1717"],a:1,e:"Sir Thomas Roe (1615) was the first official British diplomatic mission to the Mughal court of Jahangir. He stayed 3 years and got a Farman for English trade at Surat. Captain Hawkins had visited in 1608 but unofficially. The 1717 Farman for Bengal trade was given by Farrukh Siyar."},

const SK='centumania_med2_v1';
let S={xp:0,visited:{},mcq:{},faa:{},curNode:null,chOpen:{}};
function loadS(){try{const r=localStorage.getItem(SK);if(r)S=Object.assign({xp:0,visited:{},mcq:{},faa:{},curNode:null,chOpen:{}},JSON.parse(r));}catch(e){}}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
/* ── METRICS ── */
let _mToken=null, _mSid=null;

function initMetrics(){
  // Supabase stores the session under a key like `sb-<ref>-auth-token`
  // in either localStorage or sessionStorage depending on the user's "keep me
  // signed in" choice (see centumania-mvp/src/lib/supabase/client.ts).
  try {
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  } catch(e){}
  _mSid='med2-'+(Date.now().toString(36));
}

function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},
    body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})
  }).catch(()=>{});
}

function allNodes(){return CHAPTERS.flatMap(c=>c.nodes);}
function findNode(id){return allNodes().find(n=>n.id===id);}
function seqNodes(){return allNodes().slice().sort((a,b)=>a.seqIdx-b.seqIdx);}
function isUnlocked(node){
  if(node.seqIdx===0)return true;
  if(node.type==='gold'){const all=seqNodes().filter(n=>n.type!=='gold');const passed=all.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;return(passed/all.length)>=0.8;}
  const prev=seqNodes().find(n=>n.seqIdx===node.seqIdx-1);
  if(!prev)return true;
  return !!(S.mcq[prev.id]&&S.mcq[prev.id].passed);
}
function totalXP(){return allNodes().reduce((s,n)=>s+((S.mcq[n.id]&&S.mcq[n.id].passed)?n.xp:0),0);}
function overallPct(){const nodes=allNodes().filter(n=>n.type!=='gold');const passed=nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;return nodes.length?Math.round(100*passed/nodes.length):0;}

function updateTopbar(){const nodes=allNodes().filter(n=>n.type!=='gold');const passed=nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;const traps=allNodes().filter(n=>n.type==='trap');const trapsPassed=traps.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;document.getElementById('h-xp').textContent=totalXP();document.getElementById('h-nd').textContent=passed+'/'+nodes.length;document.getElementById('h-tp').textContent=trapsPassed+'/'+traps.length;}
function buildSidebar(){['sidebar-inner','mob-sidebar-inner'].forEach(sid=>{const sb=document.getElementById(sid);if(!sb)return;sb.innerHTML='';sb.style.padding='10px 8px 60px';CHAPTERS.forEach(ch=>{const grp=document.createElement('div');grp.className='ch-group';const passedCount=ch.nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;const isOpen=S.chOpen[ch.id]!==false;const tog=document.createElement('button');tog.className='ch-toggle';tog.innerHTML=`<span class="ch-icon">${ch.icon}</span><span class="ch-label">${ch.title}</span><span class="ch-prog">${passedCount}/${ch.nodes.length}</span><span class="ch-arr">${isOpen?'▾':'▸'}</span>`;tog.onclick=()=>{S.chOpen[ch.id]=!isOpen;saveS();buildSidebar();};grp.appendChild(tog);const items=document.createElement('div');items.className='node-items';items.style.display=isOpen?'block':'none';ch.nodes.forEach(node=>{const unlocked=isUnlocked(node);const m=S.mcq[node.id];const passed=m&&m.passed;const btn=document.createElement('button');btn.className='ni-btn'+(S.curNode===node.id?' active':'')+(passed?' passed':'')+(unlocked?'':' locked');let tag='';if(!unlocked)tag='<span class="ni-tag lock">🔒</span>';else if(passed)tag='<span class="ni-tag done">✓</span>';else if(S.visited[node.id])tag='<span class="ni-tag vis">●</span>';btn.innerHTML=`${tag}<span class="ni-title">${node.title}</span><span class="ni-xp">+${node.xp}</span>`;btn.onclick=()=>openNode(node.id);items.appendChild(btn);});grp.appendChild(items);sb.appendChild(grp);});});updateTopbar();}
function openNode(id){const node=findNode(id);if(!node)return;if(!isUnlocked(node)){const prev=seqNodes().find(n=>n.seqIdx===node.seqIdx-1);showToast(`🔒 Complete "${prev?prev.title:'previous node'}" with 10/10 first!`,'warn');return;}S.curNode=id;S.visited[id]=true;saveS();buildSidebar();track('node_opened',{node_id:id,node_title:node.title,node_type:node.type,xp:node.xp});document.getElementById('dash-view').style.display='none';document.getElementById('node-view').style.display='block';renderNode(node);document.getElementById('mob-drawer').classList.remove('open');document.getElementById('mob-overlay').classList.remove('show');window.scrollTo(0,0);document.getElementById('main-area').scrollTop=0;}
function renderNode(node){const m=S.mcq[node.id]||{};const faaStr=m.faa!=null?Math.round(m.faa)+'%':'—';const bestStr=m.best!=null?Math.round(m.best)+'%':'—';let typTag='';if(node.type==='trap')typTag='<span class="node-type-tag trap">⚠ Trap Node</span>';if(node.type==='gold')typTag='<span class="node-type-tag gold">★ Golden Node</span>';const testLabel=m.passed?`🎯 Test (10/10 ✓)`:`🎯 Test (10 MCQs)`;const retryBtn=(m.attempts&&!m.passed&&node.type!=='gold')?`<button class="retry-btn" style="margin-left:auto" onclick="retryNode('${node.id}')">↺ Retry</button>`:'';document.getElementById('node-content').innerHTML=`<div class="node-hd"><div class="node-hd-top">${typTag}<div class="xp-pill">+${node.xp} XP</div></div><h2 class="node-title">${node.title}</h2><div class="node-stats"><div class="ns-item"><div class="ns-label">FAA</div><div class="ns-val faa-col">${faaStr}</div></div><div class="ns-item"><div class="ns-label">Best</div><div class="ns-val">${bestStr}</div></div><div class="ns-item"><div class="ns-label">Attempts</div><div class="ns-val">${m.attempts||0}</div></div><div class="ns-item"><div class="ns-label">Status</div><div class="ns-val ${m.passed?'pass-col':'pend-col'}">${m.passed?'✓ Passed':'Pending'}</div></div>${retryBtn}</div></div><div class="tabs"><button class="tab active" onclick="switchTab(this,'learn')">📖 Learn</button><button class="tab" onclick="switchTab(this,'flash')">🗂 Flashcards</button><button class="tab" onclick="switchTab(this,'test')">${testLabel}</button></div><div id="tab-learn" class="tab-pane active">${buildLearnPane(node)}</div><div id="tab-flash" class="tab-pane">${buildFlashPane(node)}</div><div id="tab-test" class="tab-pane">${buildTestPane(node)}</div>`;bindMCQ(node);buildNodeNav(node);}
function switchTab(btn,tab){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById('tab-'+tab).classList.add('active');}
function buildLearnPane(node){let h='';if(node.type==='gold'&&node.golden){h+='<div class="fact-block gold-block"><div class="fb-head">★ HIGH-YIELD REVISION FACTS</div><div class="fb-body"><ul class="facts">';node.golden.forEach(f=>h+=`<li>${f}</li>`);h+='</ul></div></div>';return h;}if(node.facts&&node.facts.length){h+='<div class="fact-block"><div class="fb-head">📌 KEY FACTS</div><div class="fb-body"><ul class="facts">';node.facts.forEach(f=>h+=`<li>${f}</li>`);h+='</ul></div></div>';}if(node.table){h+='<div class="tbl-wrap"><table class="dt"><thead><tr>';node.table.h.forEach(c=>h+=`<th>${c}</th>`);h+='</tr></thead><tbody>';node.table.r.forEach(row=>{h+='<tr>';row.forEach(c=>h+=`<td>${c}</td>`);h+='</tr>';});h+='</tbody></table></div>';}if(node.mn){h+=`<div class="mnemonic-block"><div class="fb-head">${node.mn.h}</div><div class="fb-body">${node.mn.b}</div></div>`;}if(node.traps&&node.traps.length){h+='<div class="trap-block"><div class="fb-head">⚠ EXAM TRAPS — HIGH FREQUENCY</div><div class="fb-body"><ul class="facts">';node.traps.forEach(t=>h+=`<li>${t}</li>`);h+='</ul></div></div>';}if(node.revision&&node.revision.length){h+='<div class="revision-block"><div class="fb-head">⚡ 30 SECOND REVISION</div><div class="fb-body"><ul class="facts">';node.revision.forEach(r=>h+=`<li>${r}</li>`);h+='</ul></div></div>';}if(node.oneliners&&node.oneliners.length){h+='<div class="oneliner-block"><div class="fb-head">🎯 20 EXAM ONE-LINERS</div><div class="fb-body"><ul class="facts">';node.oneliners.forEach(o=>h+=`<li>${o}</li>`);h+='</ul></div></div>';}return h;}
function buildFlashPane(node){const cards=node.flashcards||[];if(!cards.length)return '<div class="fact-block"><div class="fb-body" style="padding:2rem;text-align:center;color:var(--ink2)">No flashcards for this node yet.</div></div>';let h=`<p class="flash-hint">TAP A CARD TO FLIP • ${cards.length} CARDS</p><div class="flash-grid">`;cards.forEach((c,i)=>{h+=`<div class="flash-card" id="fc-${node.id}-${i}" onclick="this.classList.toggle('flipped')"><div class="flash-inner"><div class="flash-front">${c.q}</div><div class="flash-back">${c.a}</div></div></div>`;});h+=`</div><div class="flash-reset-row"><button class="retry-btn" onclick="resetFlash('${node.id}')">↺ Reset All Cards</button></div>`;return h;}
function resetFlash(nid){document.querySelectorAll(`[id^="fc-${nid}-"]`).forEach(c=>c.classList.remove('flipped'));}
let _sess={};
function buildTestPane(node){if(node.type==='gold'){return '<div class="fact-block"><div class="fb-body" style="padding:2rem;text-align:center"><p style="font-size:1.1rem;color:var(--ink2)">🏹 Golden Revision Node — master all 31 high-yield facts before your exam!</p></div></div>';}if(!_sess[node.id])_sess[node.id]={};const m=S.mcq[node.id]||{};const mcqs=node.mcqs||[];let h='';if(m.passed){h+=`<div class="unlock-banner pass-banner">🎉 Passed! FAA: ${Math.round(m.faa||0)}% | Best: ${Math.round(m.best||0)}% | Attempts: ${m.attempts||1}</div>`;}else if(m.lastScore!==undefined){h+=`<div class="unlock-banner fail-banner">${m.lastScore}/10 — Need 10/10. FAA: ${Math.round(m.faa||0)}%. <button class="retry-btn" onclick="retryNode('${node.id}')">↺ Retry</button></div>`;}mcqs.forEach((q,i)=>{const sessAns=_sess[node.id][i];const answered=sessAns!==undefined||m.passed;const displayAns=sessAns!==undefined?sessAns:(m.passed?q.a:undefined);const faaCorrect=S.faa[node.id]&&S.faa[node.id][i]===true;const faaSet=S.faa[node.id]&&S.faa[node.id][i]!==undefined;h+=`<div class="mcq-card${answered?' done':''}" data-qi="${i}" data-nid="${node.id}">`;h+=`<div class="mcq-q"><span class="q-num">${i+1}.</span> ${q.q}</div>`;h+='<div class="mcq-opts">';q.o.forEach((opt,oi)=>{let cls='mopt';if(answered){if(oi===q.a)cls+=' correct';else if(oi===displayAns&&displayAns!==q.a)cls+=' wrong';}h+=`<button class="${cls}" data-oi="${oi}"${answered?' disabled':''}>${String.fromCharCode(65+oi)}. ${opt}</button>`;});h+='</div>';if(answered){const wasCorrect=displayAns===q.a;h+=`<div class="mcq-fb">${wasCorrect?'✅':'❌'} ${q.e}</div>`;if(faaSet){h+=`<div class="mcq-faa"><span class="faa-chip ${faaCorrect?'faa-ok':'faa-err'}">${faaCorrect?'FAA ✓':'FAA ✗'} (first attempt)</span></div>`;}}h+='</div>';});if(!m.passed&&m.attempts){h+=`<div style="margin-top:20px;padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;"><span style="font-family:var(--mono);font-size:13px;color:var(--ink2)">Best: <b style="color:var(--gold)">${Math.round(m.best||0)}%</b> &nbsp;|&nbsp; FAA: <b style="color:var(--amber)">${Math.round(m.faa||0)}%</b> &nbsp;|&nbsp; Need <b style="color:var(--green)">10/10</b> to unlock next</span><button class="retry-btn" style="font-size:13px;padding:9px 22px" onclick="retryNode('${node.id}')">↺ Retry</button></div>`;}return h;}
function bindMCQ(node){const mcqs=node.mcqs||[];const pane=document.getElementById('tab-test');if(!pane)return;pane.querySelectorAll('.mcq-card:not(.done)').forEach(card=>{const qi=parseInt(card.dataset.qi);card.querySelectorAll('.mopt').forEach(btn=>{btn.addEventListener('click',function(){if(card.classList.contains('done'))return;const chosen=parseInt(btn.dataset.oi);const correct=chosen===mcqs[qi].a;if(!_sess[node.id])_sess[node.id]={};_sess[node.id][qi]=chosen;if(!S.faa[node.id])S.faa[node.id]={};if(S.faa[node.id][qi]===undefined)S.faa[node.id][qi]=correct;card.classList.add('done');card.querySelectorAll('.mopt').forEach((b,oi)=>{b.disabled=true;if(oi===mcqs[qi].a)b.classList.add('correct');else if(oi===chosen&&!correct)b.classList.add('wrong');});const fb=document.createElement('div');fb.className='mcq-fb';fb.innerHTML=`${correct?'✅':'❌'} ${mcqs[qi].e}`;card.appendChild(fb);const faaEl=document.createElement('div');faaEl.className='mcq-faa';faaEl.innerHTML=`<span class="faa-chip ${S.faa[node.id][qi]?'faa-ok':'faa-err'}">${S.faa[node.id][qi]?'FAA ✓':'FAA ✗'} (first attempt)</span>`;card.appendChild(faaEl);saveS();if(Object.keys(_sess[node.id]).length===mcqs.length)finishAttempt(node);});});});}
function retryNode(nid){_sess[nid]={};if(S.mcq[nid])delete S.mcq[nid].lastScore;saveS();const node=findNode(nid);document.getElementById('tab-test').innerHTML=buildTestPane(node);bindMCQ(node);document.getElementById('main-area').scrollTop=0;}
function finishAttempt(node){const mcqs=node.mcqs||[];const sess=_sess[node.id]||{};const correct=mcqs.filter((q,i)=>sess[i]===q.a).length;const pct=Math.round(100*correct/mcqs.length);const passed=correct===mcqs.length;const faaCorrect=mcqs.filter((q,i)=>S.faa[node.id]&&S.faa[node.id][i]===true).length;const faaPct=Math.round(100*faaCorrect/mcqs.length);if(!S.mcq[node.id])S.mcq[node.id]={faa:faaPct,best:0,passed:false,attempts:0};S.mcq[node.id].attempts=(S.mcq[node.id].attempts||0)+1;S.mcq[node.id].faa=faaPct;if(pct>(S.mcq[node.id].best||0))S.mcq[node.id].best=pct;if(passed){S.mcq[node.id].passed=true;if(S.mcq[node.id].lastScore!==undefined)delete S.mcq[node.id].lastScore;S.xp=(S.xp||0)+node.xp;track('node_completed',{node_id:node.id,node_title:node.title,xp_earned:node.xp,faa_pct:faaPct,attempts:S.mcq[node.id].attempts});saveS();buildSidebar();showToast(`🎉 10/10! +${node.xp} XP earned!`,'ok');setTimeout(()=>renderNode(node),400);}else{S.mcq[node.id].lastScore=correct;track('mcq_completed',{node_id:node.id,node_title:node.title,score:correct,total:mcqs.length,pct,faa_pct:faaPct,passed:false,attempts:S.mcq[node.id].attempts});saveS();buildSidebar();const pane=document.getElementById('tab-test');if(pane){pane.innerHTML=buildTestPane(node);bindMCQ(node);}showToast(`${correct}/10 — Need 10/10. Retry to unlock next node.`,'warn');}}
function buildNodeNav(node){const all=seqNodes();const idx=all.findIndex(n=>n.id===node.id);const prev=idx>0?all[idx-1]:null;const next=idx<all.length-1?all[idx+1]:null;const nextOk=next&&isUnlocked(next);document.getElementById('node-nav').innerHTML=`<button class="nav-btn" ${prev?'':"disabled"} onclick="${prev?`openNode('${prev.id}')`:'void(0)'}">← ${prev?prev.title:'Start'}</button><button class="nav-btn home-btn" onclick="showDash()">⊞ Dashboard</button><button class="nav-btn" ${nextOk?'':"disabled"} onclick="${nextOk?`openNode('${next.id}')`:'void(0)'}">→ ${next?next.title:'End'}</button>`;}
function showDash(){S.curNode=null;saveS();buildSidebar();document.getElementById('node-view').style.display='none';document.getElementById('dash-view').style.display='block';document.getElementById('mob-home').classList.add('act');document.getElementById('mob-menu').classList.remove('act');const allN=allNodes().filter(n=>n.type!=='gold');const passedN=allN.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;const pct=overallPct();const xp=totalXP();let chapCards='';CHAPTERS.forEach(ch=>{const nodes=ch.nodes;const p=nodes.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed).length;const pPct=nodes.length?Math.round(100*p/nodes.length):0;chapCards+=`<div class="dc"><div class="dc-icon">${ch.icon}</div><div class="dc-label">${ch.title}</div><div class="dc-prog-bar"><div class="dc-bar" style="width:${pPct}%"></div></div><div class="dc-nums">${p}/${nodes.length} passed</div></div>`;});const goldenOk=pct>=80;document.getElementById('dash-content').innerHTML=`<div class="dash-hero"><div class="dh-title">CentuMania <span style="font-family:var(--mono);font-size:12px;color:var(--ink3);font-style:normal;letter-spacing:1px;display:block;margin-top:4px">MEDIEVAL HISTORY · PART 2</span></div><div class="dh-xp">${xp} XP</div><div class="dh-bar-wrap"><div class="dh-bar" style="width:${pct}%"></div></div><div class="dh-label">${passedN} of ${allN.length} nodes passed (${pct}%)</div></div><div class="dash-chapters">${chapCards}</div><div class="cta-row"><button class="cta-btn" onclick="startNext()">▶ Continue Learning</button><button class="cta-btn sec" ${goldenOk?'':"disabled"} onclick="openNode('gn_med2')">🏹 Golden Node ${goldenOk?'':' (need 80%)'}</button></div>`;}
function startNext(){const next=seqNodes().find(n=>isUnlocked(n)&&!(S.mcq[n.id]&&S.mcq[n.id].passed));if(next)openNode(next.id);else showToast('All nodes complete! 🏆 Medieval History Part 2 mastered!');}
function initMobile(){document.getElementById('mob-home').addEventListener('click',()=>{showDash();});document.getElementById("mob-menu").addEventListener("click",()=>{document.getElementById("mob-drawer").classList.toggle("open");document.getElementById("mob-overlay").classList.toggle("show");document.getElementById("mob-menu").classList.toggle("act");});document.getElementById("mob-close").addEventListener("click",closeDrawer);document.getElementById("mob-overlay").addEventListener("click",closeDrawer);}
function closeDrawer(){document.getElementById("mob-drawer").classList.remove("open");document.getElementById("mob-overlay").classList.remove("show");document.getElementById("mob-menu").classList.remove("act");}
function init(){loadS();initMetrics();track('material_opened',{material:'medieval_history_part2'});buildSidebar();initMobile();if(S.curNode){const n=findNode(S.curNode);if(n&&isUnlocked(n)){openNode(S.curNode);return;}}showDash();}
document.addEventListener("DOMContentLoaded",init);


/* ===== CentuMania metrics (injected — additive; module content unchanged) ===== */
(function(){
  if(window.__cmTrackInit)return; window.__cmTrackInit=1;
  var CM_DEFAULT='medieval-2';
  var CM_T0=Date.now(),CM_ACTIVE=0,_cmVisT=Date.now();
  function cmToken(){try{var t=localStorage.getItem('cm:access_token');if(t)return t;}catch(e){}try{var st=[localStorage,sessionStorage],s,i,k,d;for(s=0;s<st.length;s++){for(i=0;i<st[s].length;i++){k=st[s].key(i);if(k&&k.indexOf('sb-')===0&&k.slice(-11)==='-auth-token'){d=JSON.parse(st[s].getItem(k)||'{}');if(d&&d.access_token)return d.access_token;}}}}catch(e){}return null;}
  function cmMat(){try{return localStorage.getItem('cm:material_id')||CM_DEFAULT;}catch(e){return CM_DEFAULT;}}
  function cmSid(){try{var id=sessionStorage.getItem('cm:analytics_session');if(!id){id=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():(Math.random().toString(36).slice(2)+Date.now().toString(36));sessionStorage.setItem('cm:analytics_session',id);}return id;}catch(e){return 'anon-'+Math.random().toString(36).slice(2);}}
  function cmInteract(itype,nodeId,meta){try{var t=cmToken();if(!t||!nodeId)return;fetch('/api/study/interaction',{method:'POST',keepalive:true,headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({interaction_type:itype,node_id:String(nodeId),material_id:cmMat(),session_id:cmSid(),timestamp:new Date().toISOString(),metadata:meta||{}})}).catch(function(){});}catch(e){}}
  function cmEvent(name,meta){try{var t=cmToken();if(!t)return;fetch('/api/events',{method:'POST',keepalive:true,headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({event_name:name,session_id:cmSid(),event_timestamp:new Date().toISOString(),metadata:Object.assign({material_id:cmMat()},meta||{})})}).catch(function(){});}catch(e){}}
  function cmBeacon(name,meta){try{var t=cmToken();if(!t)return;var p=JSON.stringify({_token:t,event_name:name,session_id:cmSid(),event_timestamp:new Date().toISOString(),metadata:Object.assign({material_id:cmMat()},meta||{})});if(navigator.sendBeacon)navigator.sendBeacon('/api/events/beacon',new Blob([p],{type:'application/json'}));}catch(e){}}
  document.addEventListener('visibilitychange',function(){if(document.hidden){CM_ACTIVE+=Date.now()-_cmVisT;cmBeacon('tab_switch',{seconds_active:Math.round(CM_ACTIVE/1000)});}else{_cmVisT=Date.now();}});
  window.addEventListener('pagehide',function(){if(!document.hidden)CM_ACTIVE+=Date.now()-_cmVisT;cmBeacon('session_end',{seconds_total:Math.round((Date.now()-CM_T0)/1000),seconds_active:Math.round(CM_ACTIVE/1000)});});
  cmEvent('material_opened',{});cmEvent('session_start',{});
  var _cmNodeT={},_cmLastQ=0;
  function _cmNode(id){try{if(typeof CHAPTERS!=='undefined')for(var c=0;c<CHAPTERS.length;c++){var ns=CHAPTERS[c].nodes||[];for(var n=0;n<ns.length;n++)if(ns[n].id===id)return ns[n];}}catch(e){}return null;}
  if(typeof openNode==='function'){var _o=openNode;openNode=function(id){_o(id);try{_cmNodeT[id]=Date.now();_cmLastQ=Date.now();var nd=_cmNode(id);cmInteract('node_opened',id,{total_questions:(nd&&nd.mcqs?nd.mcqs.length:0)});cmEvent('node_open',{node_id:id});}catch(e){}};}
  if(typeof finishAttempt==='function'){var _f=finishAttempt;finishAttempt=function(node){_f(node);try{var faa=(typeof S!=='undefined'&&S.faa&&S.faa[node.id])||{},total=(node.mcqs||[]).length,ok=0,k;for(k in faa)if(faa[k])ok++;var pct=total?Math.round(ok/total*100):0;cmInteract('node_completed',node.id,{total_questions:total,correct_first_attempt:ok,accuracy_pct:pct,time_spent_seconds:Math.round((Date.now()-(_cmNodeT[node.id]||Date.now()))/1000)});cmEvent('node_completed',{node_id:node.id,pct:pct});}catch(e){}};}
  try{new MutationObserver(function(ms){ms.forEach(function(m){var el=m.target;if(el&&el.classList&&el.classList.contains('mcq-card')&&el.classList.contains('done')&&!el._cmS){el._cmS=1;var qi=parseInt(el.dataset.qi),nid=el.dataset.nid;var fac=!!(typeof S!=='undefined'&&S.faa&&S.faa[nid]&&S.faa[nid][qi]===true);var now=Date.now(),dt=_cmLastQ?now-_cmLastQ:0;_cmLastQ=now;if(nid!=null){cmInteract('mcq_attempt',nid,{question_index:qi,is_correct:fac});cmEvent('answer',{node_id:nid,question_index:qi,is_correct:fac,time_spent_ms:dt});}}});}).observe(document.body,{subtree:true,attributes:true,attributeFilter:['class']});}catch(e){}
})();

</script>
