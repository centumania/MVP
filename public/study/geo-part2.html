<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Geography Part 2 — CentuMania</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030B17;--bg2:#020710;--panel:#071A30;--panel2:#0A2040;--line:#1A3A5C;
  --ink:#D4E0EC;--ink2:#88AACC;--ink3:#4A6888;
  --gold:#38BDF8;--gold2:#1D4ED8;--gold-glow:rgba(56,189,248,.15);
  --amber:#60A5FA;--gold-bg:rgba(56,189,248,.08);
  --red:#f87171;--red-bg:rgba(248,113,113,.10);
  --blue:#93C5FD;--green:#4ade80;
}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
@media(max-width:900px){body{height:100dvh}}
@media(max-width:700px){#sidebar{display:none !important}}
/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;z-index:50}
#tb-menu{background:none;border:none;color:var(--ink2);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px}
#tb-menu:hover{background:var(--line)}
#tb-title{font-size:14px;font-weight:700;color:var(--gold);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-badge{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--ink2);white-space:nowrap}
#tb-xp{color:var(--gold)}
/* BODY LAYOUT */
#body-wrap{display:flex;flex:1;overflow:hidden;position:relative}
/* SIDEBAR */
#sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s;overflow:hidden}
#sidebar.collapsed{width:0}
#sidebar-inner{overflow-y:auto;flex:1;padding:8px 0}
#sidebar-inner::-webkit-scrollbar{width:4px}
#sidebar-inner::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.ch-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;padding:10px 14px 4px}
.node-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 14px;background:none;border:none;cursor:pointer;text-align:left;border-radius:0;transition:background .15s;position:relative}
.node-btn:hover:not(.locked){background:var(--panel)}
.node-btn.active{background:var(--gold-bg);border-right:3px solid var(--gold)}
.node-btn.locked{opacity:.45;cursor:not-allowed}
.node-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.node-info{flex:1;overflow:hidden}
.node-name{font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-meta{font-size:10px;color:var(--ink3);margin-top:1px}
.node-pct{font-size:10px;font-weight:700;margin-left:auto;padding-left:6px;color:var(--green);flex-shrink:0}
.node-lock{font-size:12px;margin-left:auto;color:var(--ink3);flex-shrink:0}
.gold-btn .node-name{color:var(--gold)}
/* MAIN */
#main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
#main::-webkit-scrollbar{width:6px}
#main::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
/* DASHBOARD */
#dash{display:none}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.dash-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center}
.dash-card .val{font-size:28px;font-weight:800;color:var(--gold)}
.dash-card .lbl{font-size:11px;color:var(--ink2);margin-top:4px}
.progress-bar-wrap{background:var(--panel2);border-radius:4px;height:8px;overflow:hidden;margin:6px 0 2px}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;transition:width .4s}
/* NODE CONTENT */
#node-content{display:none}
.node-header{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px}
.node-hicon{font-size:32px}
.node-htitle{font-size:18px;font-weight:800;color:var(--ink)}
.node-hxp{font-size:12px;color:var(--gold);margin-top:2px}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px}
.tab-btn{flex:1;padding:7px;background:none;border:none;color:var(--ink2);font-size:12px;font-weight:600;cursor:pointer;border-radius:7px;transition:all .15s}
.tab-btn.active{background:var(--gold2);color:#fff}
/* LEARN PANE */
.learn-pane{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
.section-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.fact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px;margin-bottom:14px}
.fact-card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.5;color:var(--ink)}
.fact-card b{color:var(--gold)}
.tbl-wrap{overflow-x:auto;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--panel2);color:var(--gold);font-weight:700;padding:7px 10px;text-align:left;border-bottom:2px solid var(--line)}
td{padding:7px 10px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:top}
tr:hover td{background:rgba(255,255,255,.03)}
.mn-box{background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(29,78,216,.08));border:1px solid rgba(56,189,248,.25);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--ink);line-height:1.6;margin-bottom:14px}
.mn-box .mn-label{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.trap-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.trap-item{background:var(--red-bg);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--ink);line-height:1.5}
.trap-item::before{content:"⚠ ";color:var(--red);font-weight:700}
.rev-list{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.rev-item{background:var(--panel2);border-left:3px solid var(--gold2);border-radius:0 6px 6px 0;padding:7px 12px;font-size:12px;color:var(--ink);line-height:1.4}
.ol-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:6px;margin-bottom:14px}
.ol-item{background:var(--panel2);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--ink2);line-height:1.4}
.ol-item b{color:var(--amber)}
/* FLASH */
.flash-pane{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px 0}
.flash-card-wrap{perspective:1000px;width:100%;max-width:500px}
.flash-card{width:100%;min-height:160px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s;position:relative}
.flash-card.flipped{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;width:100%;min-height:160px;backface-visibility:hidden;border-radius:14px;padding:24px;display:flex;align-items:center;justify-content:center;text-align:center}
.flash-front{background:linear-gradient(135deg,var(--panel),var(--panel2));border:2px solid var(--line);font-size:15px;font-weight:600;color:var(--ink)}
.flash-back{background:linear-gradient(135deg,var(--gold2),rgba(29,78,216,.5));border:2px solid var(--gold);transform:rotateY(180deg);font-size:14px;color:#fff}
.flash-nav{display:flex;gap:12px;align-items:center}
.flash-nav button{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.flash-nav button:hover{border-color:var(--gold);color:var(--gold)}
.flash-counter{font-size:13px;color:var(--ink2)}
.flash-hint{font-size:11px;color:var(--ink3);margin-top:-8px}
/* TEST PANE */
.test-pane{display:flex;flex-direction:column;gap:14px}
.test-start{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:24px;text-align:center}
.test-start h3{font-size:16px;color:var(--ink);margin-bottom:8px}
.test-start p{font-size:13px;color:var(--ink2);margin-bottom:16px}
.btn-primary{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;font-weight:700;border:none;border-radius:8px;padding:10px 24px;cursor:pointer;font-size:14px;transition:opacity .15s}
.btn-primary:hover{opacity:.9}
.q-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
.q-meta{font-size:11px;color:var(--ink3);margin-bottom:8px}
.q-text{font-size:14px;font-weight:600;color:var(--ink);line-height:1.5;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 14px;text-align:left;cursor:pointer;font-size:13px;color:var(--ink);transition:all .15s;width:100%}
.opt-btn:hover:not(:disabled){border-color:var(--gold);background:var(--gold-bg)}
.opt-btn.correct{background:rgba(74,222,128,.15);border-color:#4ade80;color:#4ade80}
.opt-btn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.exp-box{background:var(--panel2);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 12px;font-size:12px;color:var(--ink2);line-height:1.5;margin-top:8px}
.result-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:24px;text-align:center}
.result-score{font-size:48px;font-weight:800;color:var(--gold)}
.result-lbl{font-size:13px;color:var(--ink2);margin-top:4px}
.result-msg{font-size:15px;color:var(--ink);margin:12px 0}
/* GOLD NODE */
.gold-node-panel{background:linear-gradient(135deg,rgba(56,189,248,.05),rgba(29,78,216,.08));border:1px solid rgba(56,189,248,.3);border-radius:14px;padding:20px}
/* NODE NAV */
.node-nav{display:flex;gap:10px;justify-content:flex-end}
.nav-btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink2);padding:7px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.nav-btn:hover{border-color:var(--gold);color:var(--gold)}
/* DRAWER / OVERLAY */
#aside{position:fixed;right:-340px;top:0;width:340px;height:100%;background:var(--panel);border-left:1px solid var(--line);z-index:200;transition:right .25s;overflow-y:auto;padding:20px}
#aside.open{right:0}
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
#drawer-overlay.show{display:block}
/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);border:1px solid var(--gold);color:var(--ink);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

{"id": "ocean_currents", "chapter": "Natural Systems 🌍", "title": "Ocean Currents", "icon": "🌊", "xp": 60, "seqIdx": 3, "facts": ["Ocean currents driven by <b>wind + seawater density (temperature + salinity)</b>", "<b>Thermohaline Circulation</b> = deep water currents (thermo = temp; haline = salinity)", "<b>Global Conveyor Belt</b> = connects deep & surface currents across all oceans", "Warm currents flow <b>Equator → Poles</b>; raise temperature of nearby land", "Cold currents flow <b>Poles → Equator</b>; reduce temperature; cause fog & desert on WESTERN coasts", "<b>Gulf Stream</b> = warm; N. Atlantic; warms Western Europe; originates in Gulf of Mexico", "<b>North Atlantic Drift</b> = extension of Gulf Stream; keeps UK & Norway mild", "<b>Kuroshio</b> = warm; N. Pacific; flows NE past Japan", "<b>Agulhas</b> = warm; Indian Ocean; flows SW along East Africa", "<b>Mozambique Current</b> = warm; Indian Ocean; flows S along SE Africa", "<b>Brazilian Current</b> = warm; S. Atlantic; flows SW along E. South America", "<b>Labrador Current</b> = cold; N. Atlantic; meets Gulf Stream → Grand Banks fog + rich fisheries", "<b>Benguela Current</b> = cold; S. Atlantic; off SW Africa → causes <b>Namib Desert</b>", "<b>Canary Current</b> = cold; N. Atlantic; off NW Africa → contributes to <b>Sahara</b>", "<b>Peru / Humboldt Current</b> = cold; S. Pacific; off W. South America → causes <b>Atacama Desert</b>", "<b>California Current</b> = cold; N. Pacific; off W. USA coast", "<b>Oyashio Current</b> = cold; N. Pacific; off NE Japan", "<b>West Australian Current</b> = cold; Indian Ocean; off W. Australia", "<b>DESERT CONNECTION:</b> Cold current off western coast → dry air → NO RAIN → DESERT", "Benguela (cold) → <b>Namib Desert</b> (SW Africa, Atlantic)", "Peru/Humboldt (cold) → <b>Atacama Desert</b> (W. South America, Pacific)", "Canary (cold) → <b>Sahara Desert</b> (NW Africa, Atlantic)", "West Australian (cold) → <b>Australian desert</b> (W. Australia, Indian Ocean)", "Grand Banks (off Newfoundland) = world's richest fishing grounds; Labrador cold + Gulf Stream warm"], "table": "<table><tr><th>Current</th><th>Type</th><th>Ocean</th><th>Key Effect</th></tr><tr><td>Gulf Stream</td><td>Warm</td><td>N. Atlantic</td><td>Warms W. Europe; from Gulf of Mexico</td></tr><tr><td>North Atlantic Drift</td><td>Warm</td><td>N. Atlantic</td><td>Extension of Gulf Stream; UK/Norway mild</td></tr><tr><td>Kuroshio</td><td>Warm</td><td>N. Pacific</td><td>Flows NE past Japan</td></tr><tr><td>Labrador</td><td>Cold</td><td>N. Atlantic</td><td>Meets Gulf Stream → Grand Banks fog</td></tr><tr><td>Benguela</td><td>Cold</td><td>S. Atlantic</td><td>→ Namib Desert (SW Africa)</td></tr><tr><td>Peru/Humboldt</td><td>Cold</td><td>S. Pacific</td><td>→ Atacama Desert (W. S.America)</td></tr><tr><td>Canary</td><td>Cold</td><td>N. Atlantic</td><td>→ Sahara Desert (NW Africa)</td></tr><tr><td>West Australian</td><td>Cold</td><td>Indian</td><td>→ W. Australian Desert</td></tr></table>", "mn": "🧠 <b>Desert Current trio:</b> <b>B</b>enguela → <b>N</b>amib | <b>P</b>eru → <b>A</b>tacama | <b>C</b>anary → <b>S</b>ahara | <b>W</b>est Australian → <b>A</b>ustralia = BN-PA-CS-WA | Warm = Gulf → keeps Europeans Warm", "traps": ["Cold currents cause DESERTS on WESTERN coasts (NOT eastern coasts)", "Gulf Stream = WARM (keeps Europe mild) — NOT a cold current", "North Atlantic Drift = EXTENSION of Gulf Stream (same warm current, different name)", "Labrador = COLD | Grand Banks fog = Labrador (cold) meets Gulf Stream (warm)", "Benguela → NAMIB | Peru → ATACAMA | Canary → SAHARA — don't mix these up"], "revision": ["Gulf Stream = warm; from Gulf of Mexico; warms Europe", "North Atlantic Drift = extension of Gulf Stream", "Labrador (cold) + Gulf Stream (warm) = Grand Banks fog & fisheries", "Benguela (cold) → Namib Desert (SW Africa)", "Peru/Humboldt (cold) → Atacama Desert (W. South America)", "Canary (cold) → Sahara Desert contribution", "West Australian (cold) → W. Australian desert", "Cold currents on WESTERN coasts → deserts", "Thermohaline = deep water circulation (temp + salinity)", "Warm currents: Equator → Poles | Cold: Poles → Equator", "Kuroshio = warm; N. Pacific (like Gulf Stream for Pacific)", "Oyashio = cold; N. Pacific off NE Japan"], "oneliners": ["<b>Gulf Stream</b> = warm; N. Atlantic; warms W. Europe", "<b>North Atlantic Drift</b> = extension of Gulf Stream", "<b>Kuroshio</b> = warm; N. Pacific; past Japan", "<b>Labrador</b> = cold; Grand Banks fog (meets Gulf Stream)", "<b>Benguela</b> = cold; S. Atlantic → Namib Desert", "<b>Peru/Humboldt</b> = cold; S. Pacific → Atacama Desert", "<b>Canary</b> = cold; N. Atlantic → Sahara (western edge)", "<b>West Australian</b> = cold; Indian Ocean → W. Australian desert", "<b>Cold currents → deserts</b> on WESTERN coasts", "<b>Thermohaline</b> = deep water current (temp + salinity)", "<b>Global Conveyor Belt</b> = deep + surface current system", "<b>Agulhas</b> = warm; Indian Ocean; E. Africa", "<b>Mozambique</b> = warm; Indian Ocean; SE Africa", "<b>California</b> = cold; N. Pacific; W. USA", "<b>Oyashio</b> = cold; N. Pacific; NE Japan", "<b>Brazilian</b> = warm; S. Atlantic; E. S. America", "<b>Grand Banks</b> = richest fishing; Labrador cold + Gulf Stream warm", "<b>Warm</b> = Equator → Poles | <b>Cold</b> = Poles → Equator", "<b>El Niño</b> = weakens SW Monsoon | <b>La Niña</b> = strengthens it", "<b>ITCZ</b> northward movement triggers SW Monsoon onset"], "flashcards": [{"q": "Which cold current causes the Namib Desert?", "a": "Benguela Current (S. Atlantic, off SW Africa)"}, {"q": "Which cold current causes the Atacama Desert?", "a": "Peru/Humboldt Current (S. Pacific, off W. South America)"}, {"q": "Which cold current contributes to the Sahara?", "a": "Canary Current (N. Atlantic, off NW Africa)"}, {"q": "Gulf Stream keeps which region warm?", "a": "Western Europe (UK, Norway, etc.)"}, {"q": "What is the North Atlantic Drift?", "a": "Extension of Gulf Stream; keeps UK/Norway mild"}, {"q": "What happens when Labrador meets Gulf Stream?", "a": "Grand Banks fog + rich fisheries"}, {"q": "What are thermohaline currents driven by?", "a": "Temperature (thermo) and salinity (haline) differences"}, {"q": "Cold currents cause deserts on which coasts?", "a": "WESTERN coasts"}, {"q": "Kuroshio is to Pacific as Gulf Stream is to?", "a": "Atlantic (both are warm currents flowing northward)"}, {"q": "El Niño effect on India's monsoon?", "a": "Weakens SW Monsoon (causes drought conditions)"}], "mcqs": [{"q": "The Benguela Current causes which desert?", "opts": ["Atacama Desert", "Sahara Desert", "Namib Desert", "Kalahari Desert"], "ans": 2, "exp": "Benguela Current (cold, S. Atlantic, off SW Africa) → Namib Desert."}, {"q": "The Peru/Humboldt Current causes which desert?", "opts": ["Namib Desert", "Atacama Desert", "Sahara Desert", "Gobi Desert"], "ans": 1, "exp": "Peru/Humboldt Current (cold, S. Pacific) → Atacama Desert (western coast of S. America)."}, {"q": "The Gulf Stream is:", "opts": ["A cold current that causes deserts", "A warm current that keeps Europe mild", "The deepest oceanic trench", "An extension of the Labrador current"], "ans": 1, "exp": "Gulf Stream = WARM current in N. Atlantic; originates in Gulf of Mexico; keeps Western Europe mild."}, {"q": "The North Atlantic Drift is best described as:", "opts": ["A cold current off NW Africa", "An extension of the Labrador Current", "An extension of the Gulf Stream", "A deep thermohaline current"], "ans": 2, "exp": "North Atlantic Drift = extension of Gulf Stream; keeps UK, Scandinavia mild."}, {"q": "What happens where the Labrador Current meets the Gulf Stream?", "opts": ["Warm tropical weather", "Grand Banks fog and rich fisheries", "Desert conditions", "Strong monsoon rains"], "ans": 1, "exp": "Cold Labrador + warm Gulf Stream = Grand Banks fog + world's richest fishing grounds (Newfoundland area)."}, {"q": "Cold currents primarily affect which type of coast?", "opts": ["Eastern coasts", "Western coasts", "Northern coasts", "Southern coasts"], "ans": 1, "exp": "Cold currents flow along WESTERN coasts → dry air, no rain → deserts. This is why Atacama, Namib, Sahara are on western coasts."}, {"q": "Which current is responsible for the W. Australian desert?", "opts": ["Agulhas Current", "Mozambique Current", "West Australian Current", "Kuroshio Current"], "ans": 2, "exp": "West Australian Current (cold, Indian Ocean) → causes desert conditions on western coast of Australia."}, {"q": "Thermohaline circulation is driven by:", "opts": ["Wind patterns only", "Temperature and salinity differences", "Tidal forces", "Coriolis force only"], "ans": 1, "exp": "Thermohaline = thermo (temperature) + haline (salinity). These density differences drive deep water circulation."}, {"q": "El Niño weakens which phenomenon?", "opts": ["NE Monsoon", "Western Disturbances", "SW Monsoon over India", "Bay of Bengal cyclones"], "ans": 2, "exp": "El Niño (warming of equatorial Pacific) weakens India's SW Monsoon → drought conditions. La Niña strengthens it."}, {"q": "Which warm current flows past Japan in the Pacific?", "opts": ["Oyashio", "California", "Kuroshio", "East Australian"], "ans": 2, "exp": "Kuroshio = warm current in N. Pacific; flows NE past Japan (equivalent of Gulf Stream in Atlantic)."}, {"q": "Oyashio is a:", "opts": ["Warm current of the Indian Ocean", "Cold current off NE Japan", "Extension of the Gulf Stream", "Deep thermohaline current"], "ans": 1, "exp": "Oyashio = cold current in N. Pacific, off NE Japan. Kuroshio (warm) + Oyashio (cold) = fisheries near Japan."}, {"q": "Which current is warm and flows along East Africa?", "opts": ["Benguela Current", "Canary Current", "Agulhas Current", "Labrador Current"], "ans": 2, "exp": "Agulhas Current = warm; Indian Ocean; flows SW along East Africa."}, {"q": "The 'Global Conveyor Belt' refers to:", "opts": ["A submarine cable network", "A system connecting deep and surface ocean currents", "A tropical wind belt", "A system of undersea volcanoes"], "ans": 1, "exp": "Global Conveyor Belt = system connecting deep thermohaline and surface currents across all oceans."}, {"q": "The Canary Current contributes to which desert?", "opts": ["Namib Desert", "Atacama Desert", "Sahara Desert", "Kalahari Desert"], "ans": 2, "exp": "Canary Current (cold, N. Atlantic, off NW Africa) = contributes to the Sahara's dry western edge."}, {"q": "Warm currents flow in which direction?", "opts": ["From Poles toward Equator", "From Equator toward Poles", "From East to West only", "Only in deep ocean"], "ans": 1, "exp": "Warm currents flow from Equator → Poles (raise temperature of coastal land). Cold = Poles → Equator."}]},
{"id": "soils", "chapter": "Natural Systems 🌍", "title": "Soils of India", "icon": "🌱", "xp": 60, "seqIdx": 4, "facts": ["<b>Alluvial soil</b> = most widespread; <b>43% of India's area</b>; transported by rivers", "Alluvial soil rich in <b>Potash</b>; poor in <b>Phosphorous</b>", "<b>Red soil</b> = 18.5% area; Ferric oxide gives red colour; low rainfall areas", "Red soil poor in: Lime, N, P, Mn, Humus", "<b>Black/Regur soil</b> = 15% area; cotton soil; <b>self-ploughing</b> (cracks in dry season)", "Black soil rich in: Ca, Fe, Mg, K, Al | Poor in: N, P, organic matter", "<b>Laterite soil</b> = hard when dry (brick-like); soft when wet; 'Later = brick' in Latin", "Laterite soil depleted of Lime & Silica (leached out by heavy rain)", "<b>Arid/Desert soil</b> = wind-deposited; high salt; kankar (CaCO₃ deposits)", "<b>Bhangar</b> = old alluvium; away from rivers; kankar deposits; less fertile", "<b>Khadar</b> = new alluvium; near rivers; fine-grained; very fertile; refreshed by floods", "<b>Bhabar</b> = foothills of Shivaliks; 8–16 km wide; pebble-studded; streams DISAPPEAR underground", "<b>Terai</b> = south of Bhabar; 20–30 km wide; damp; dense forests; streams REAPPEAR", "Alluvial crops: Wheat, Rice, Sugarcane, Pulses, Maize, Jute (UP, Bihar, Punjab, WB)", "Black soil crops: <b>Cotton</b> (primary), Jowar, Soybean (Maharashtra, MP, Gujarat)", "Laterite soil crops: <b>Tea, Coffee, Cashew, Rubber, Tapioca</b> (Kerala, Karnataka, Assam)", "Red soil crops: Wheat, Cotton, Pulses, Tobacco (AP, Karnataka, TN)", "Desert/Arid soil crops: Barley, Bajra, Millets (Rajasthan, Gujarat)", "Mountain soil crops: <b>Potatoes, Apples, Tea</b> (HP, UK, J&K)", "Soil colour: Black = Iron/Al/Humus | Red = Iron/Mg/P | Grey/Blue = Waterlogged | Green = Sulphur", "<b>Sir HG Champion</b> = first classified India's forests in 1936", "Forest Policy 1988 = target 33% of geographic area under forest", "Peaty/Marshy soil = heavy rainfall; high humus; alkaline; crops = Rice, Sugarcane", "Saline soil = high salt; affects root zone; found in waterlogged areas"], "table": "<table><tr><th>Soil</th><th>% Area</th><th>Best Crops</th><th>States</th></tr><tr><td>Alluvial</td><td>43%</td><td>Wheat, Rice, Sugarcane, Jute</td><td>UP, Bihar, Punjab, WB</td></tr><tr><td>Red</td><td>18.5%</td><td>Cotton, Pulses, Tobacco</td><td>AP, KA, TN, Kerala</td></tr><tr><td>Black (Regur)</td><td>15%</td><td>Cotton, Jowar, Soybean</td><td>MH, MP, Gujarat</td></tr><tr><td>Laterite</td><td>—</td><td>Tea, Coffee, Rubber, Cashew</td><td>Kerala, KA, Assam, Goa</td></tr><tr><td>Desert/Arid</td><td>—</td><td>Barley, Bajra, Millets</td><td>Rajasthan, Gujarat</td></tr><tr><td>Mountain</td><td>—</td><td>Potatoes, Apples, Tea</td><td>HP, UK, J&amp;K</td></tr></table>", "mn": "🧠 <b>Alluvial = 43% = A(lot)</b> | <b>Black = Self-ploughing</b> (B-S) | <b>Laterite = Lat = Later = Brick</b> | <b>Khadar = Fresh</b> (new; near river) | <b>Bhabar = streams Bury</b> (disappear) | <b>Terai = streams Rise</b> (reappear)", "traps": ["Most widespread soil = ALLUVIAL (43%) NOT Black soil", "Black soil = SELF-PLOUGHING (develops cracks when dry) — unique property", "Laterite = HARD when DRY (brick-like) NOT when wet", "Khadar = NEW alluvium (fertile near rivers) | Bhangar = OLD alluvium (kankar, less fertile)", "Bhabar = streams DISAPPEAR | Terai = streams REAPPEAR", "Alluvial = rich in POTASH; poor in PHOSPHOROUS (not the reverse)", "Black soil = poor in N, P, organic matter; rich in Ca, Fe, Mg, K"], "revision": ["Alluvial = 43%; rich Potash; poor Phosphorous", "Black = self-ploughing; poor N,P,organic; good for Cotton", "Red = ferric oxide; 18.5%", "Laterite = hard when dry; Tea/Coffee/Rubber", "Desert = kankar (CaCO₃); Barley/Bajra", "Khadar = new (fertile near river)", "Bhangar = old alluvium (kankar; less fertile)", "Bhabar = streams disappear (foothills; 8–16 km)", "Terai = streams reappear (south of Bhabar; 20–30 km)", "Mountain soil = Potatoes, Apples, Tea", "Black soil colour = Iron, Al, Humus", "Grey/Blue = waterlogged | Green = Sulphur"], "oneliners": ["<b>Alluvial soil</b> = most widespread (43%); rivers deposit it", "<b>Alluvial</b> rich in Potash; poor in Phosphorous", "<b>Black soil</b> = self-ploughing; cracks in summer", "<b>Black soil</b> rich Ca, Fe, Mg, K; poor N, P, organic", "<b>Black soil = Cotton</b> primary crop", "<b>Red soil</b> = 18.5%; ferric oxide = red colour", "<b>Laterite = brick-like when dry</b>; soft when wet", "<b>Laterite crops</b> = Tea, Coffee, Cashew, Rubber, Tapioca", "<b>Desert soil</b> = kankar (CaCO₃); Barley, Bajra", "<b>Khadar</b> = new alluvium (fertile; near river; refreshed by floods)", "<b>Bhangar</b> = old alluvium (less fertile; kankar deposits)", "<b>Bhabar</b> = pebble zone; streams disappear (8–16 km)", "<b>Terai</b> = streams reappear; dense forests; 20–30 km wide", "<b>Mountain soil</b> = Potatoes, Apples, Tea (HP, UK, J&K)", "<b>Black colour</b> = Iron + Al + Humus in soil", "<b>Grey/Blue colour</b> = waterlogged soil", "<b>Green colour</b> = sulphur presence", "<b>Peaty/Marshy</b> = heavy rain; high humus; alkaline", "<b>Forest soil</b> = acidic; high rainfall areas", "<b>Saline soil</b> = high salt; damages root zone"], "flashcards": [{"q": "Which soil is most widespread in India?", "a": "Alluvial soil (43% of India's area)"}, {"q": "Alluvial soil is rich in which nutrient?", "a": "Potash (poor in Phosphorous)"}, {"q": "Black soil has which unique property?", "a": "Self-ploughing (cracks when dry, swells when wet)"}, {"q": "Which soil is best for Tea, Coffee, Rubber?", "a": "Laterite soil (acidic; Kerala, Karnataka, Assam)"}, {"q": "Khadar vs Bhangar?", "a": "Khadar = new alluvium (fertile, near river) | Bhangar = old alluvium (kankar, less fertile)"}, {"q": "What happens to streams in Bhabar zone?", "a": "Streams disappear underground (porous pebble zone, Shivalik foothills)"}, {"q": "What do streams do in Terai zone?", "a": "Streams reappear (emerge from underground)"}, {"q": "What colour does iron + Al + humus give to soil?", "a": "Black colour"}, {"q": "Black soil is best for which crop?", "a": "Cotton (also called 'regur' or cotton soil)"}, {"q": "Which soil has kankar (CaCO₃) deposits?", "a": "Desert/Arid soil and Bhangar (old alluvium)"}], "mcqs": [{"q": "Which soil covers the MOST area in India?", "opts": ["Black soil", "Red soil", "Alluvial soil", "Laterite soil"], "ans": 2, "exp": "Alluvial soil covers 43% of India — most widespread. Found in northern plains, river valleys."}, {"q": "Black soil (Regur) is known for which unique property?", "opts": ["High nitrogen content", "Self-ploughing (cracks in summer)", "Rich in phosphorous", "Forms hard crust when wet"], "ans": 1, "exp": "Black soil develops cracks when dry (self-ploughing property). Shrinks when dry, swells when wet."}, {"q": "Laterite soil is HARD when:", "opts": ["Wet", "Dry", "Frozen", "Ploughed"], "ans": 1, "exp": "Laterite = hard when DRY (brick-like). The name comes from Latin 'Later' = brick."}, {"q": "Khadar is best described as:", "opts": ["Old alluvium with kankar deposits", "New alluvium; fertile; near rivers; refreshed by floods", "Pebble-studded foothills zone", "Rocky desert soil"], "ans": 1, "exp": "Khadar = new alluvium; fine-grained; very fertile; near rivers; refreshed annually by floodwaters."}, {"q": "Bhabar zone is characterized by:", "opts": ["Streams reappearing after going underground", "Dense forests and waterlogged conditions", "Pebble-studded zone where streams disappear underground", "Fine alluvial deposits near deltas"], "ans": 2, "exp": "Bhabar = porous pebble-studded zone at Shivalik foothills (8–16 km wide); streams disappear underground."}, {"q": "Alluvial soil is RICH in which nutrient but POOR in:", "opts": ["Nitrogen; Potash", "Potash; Phosphorous", "Phosphorous; Nitrogen", "Iron; Potash"], "ans": 1, "exp": "Alluvial soil = rich in POTASH, poor in PHOSPHOROUS. Good for wheat, rice, sugarcane, jute."}, {"q": "Which crops are BEST suited for Laterite soil?", "opts": ["Cotton, Jowar, Soybean", "Wheat, Rice, Sugarcane", "Tea, Coffee, Cashew, Rubber", "Barley, Bajra, Millets"], "ans": 2, "exp": "Laterite soil (acidic) = Tea, Coffee, Cashew, Rubber, Tapioca. Found in Kerala, Karnataka, Assam, Goa."}, {"q": "Black soil is DEFICIENT in:", "opts": ["Ca, Fe, Mg, K", "N, P and organic matter", "Iron and aluminum", "Potash and phosphorous"], "ans": 1, "exp": "Black soil is POOR in N, P, and organic matter. Rich in Ca, Fe, Mg, K, Al."}, {"q": "Grey or Blue-grey coloured soil indicates:", "opts": ["Sulphur content", "Iron and aluminium", "Waterlogged conditions", "Rich humus content"], "ans": 2, "exp": "Grey/Blue-grey soil colour indicates waterlogged (anaerobic) conditions. Green = sulphur. Black = iron/humus."}, {"q": "Which zone lies south of Bhabar and is known for dense forests?", "opts": ["Khadar zone", "Bhangar zone", "Terai zone", "Doab zone"], "ans": 2, "exp": "Terai zone = south of Bhabar; 20–30 km wide; damp; dense forests; streams reappear from Bhabar."}, {"q": "Mountain soil is best suited for which crops?", "opts": ["Cotton, Jowar, Sugarcane", "Potatoes, Apples, Tea", "Wheat, Rice, Pulses", "Barley, Bajra, Millets"], "ans": 1, "exp": "Mountain soil = Potatoes, Apples, Tea. States: HP, Uttarakhand, J&K."}, {"q": "Desert/Arid soil is characterized by:", "opts": ["High humus; waterlogged", "Wind-deposited; high salt; kankar (CaCO₃)", "High iron content; red colour", "Fine-grained; very fertile"], "ans": 1, "exp": "Desert soil = wind-deposited; high salt; kankar (CaCO₃ hardpan). Best crops: Barley, Bajra, Millets."}, {"q": "Bhangar differs from Khadar because Bhangar:", "opts": ["Is found near river channels", "Is newer and more fertile", "Contains kankar deposits and is less fertile", "Is formed by glacial deposits"], "ans": 2, "exp": "Bhangar = old alluvium; found away from rivers; has kankar (CaCO₃) deposits; less fertile than Khadar."}, {"q": "Which type of soil is found at the foothills of the Shivaliks?", "opts": ["Terai", "Bhangar", "Bhabar", "Khadar"], "ans": 2, "exp": "Bhabar = pebble-studded zone at Shivalik foothills (8–16 km wide). Below Bhabar = Terai."}, {"q": "Red soil gets its colour due to:", "opts": ["Humus content", "Ferric oxide (iron oxide)", "Sulphur deposits", "Manganese content"], "ans": 1, "exp": "Red soil = red colour due to ferric oxide (Fe₂O₃ — iron oxide). Covers 18.5% of India."}]},

{"id": "climate_monsoon", "chapter": "Natural Systems 🌍", "title": "Climate & Monsoon", "icon": "🌧️", "xp": 60, "seqIdx": 6, "facts": ["India's climate = <b>Tropical Monsoon</b> type", "Factors: Latitude, Altitude, Distance from Sea, <b>Monsoon Winds (most dominant)</b>, Relief, Jet Streams", "Normal Lapse Rate = <b>6.5°C per 1,000 m</b> altitude gain", "Tropic of Cancer divides India: South = Tropical; North = Subtropical", "Four Seasons: Cold (Jan–Feb), Pre-Monsoon/Summer (Mar–May), SW Monsoon (Jun–Sep), Post-Monsoon/NE Monsoon (Oct–Dec)", "SW Monsoon: blows <b>SW → NE</b> in summer", "<b>ITCZ</b> (Inter-Tropical Convergence Zone) moves northward → triggers SW Monsoon", "SE trade winds cross equator → Coriolis force deflects → become <b>SW Monsoon</b>", "<b>El Niño</b> = weakens SW Monsoon (drought) | <b>La Niña</b> = strengthens it", "SW Monsoon Two Branches: <b>Arabian Sea Branch</b> (→ W.Ghats → Konkan/Kerala/Mumbai → MP/Punjab) and <b>Bay of Bengal Branch</b> (→ NE India first → spreads west)", "<b>Western Disturbances</b> = extra-tropical cyclones from Mediterranean; winter rainfall in NW India", "Western Disturbances → winter wheat in Punjab/Haryana; snowfall in J&K", "<b>Mango Showers</b> = Kerala & Karnataka; pre-monsoon thunder showers (May) — help ripen mangoes", "<b>Nor-westers / Kalbaisakhi</b> = violent pre-monsoon thunderstorms in West Bengal & Bangladesh", "NE (Retreating) Monsoon: SW retreats by end of September; Bay of Bengal cyclones → NE Monsoon", "<b>Tamil Nadu</b> receives ~<b>35% annual rainfall</b> from NE Monsoon (Oct–Dec)", "Average India rainfall = <b>118 cm</b>", "High rainfall (>200 cm): NE India (Meghalaya, Assam, AP, Sikkim), West Coast", "Inadequate rainfall (<50 cm): W. Rajasthan, Kachchh, Ladakh", "<b>East coast</b> = most cyclone-prone; peak Oct–Dec; AP, Odisha, TN, WB most affected", "<b>Bay of Bengal = 6× more cyclones</b> than Arabian Sea", "Why BoB = more cyclones: Shallow + enclosed + warm + low salinity (Ganga/Brahmaputra inflow)", "West coast cyclones: rare; mostly June; affect Gujarat", "Pre-monsoon season features: Loo (hot dry winds, NW India), dust storms (Rajasthan)"], "table": "<table><tr><th>Season</th><th>Months</th><th>Key Feature</th></tr><tr><td>Cold Weather</td><td>Jan–Feb</td><td>Cold + dry; Western Disturbances → NW rain/snow</td></tr><tr><td>Pre-Monsoon/Hot</td><td>Mar–May</td><td>Rising temp; Mango Showers (KL, KA); Kalbaisakhi (WB)</td></tr><tr><td>SW Monsoon/Rainy</td><td>June–Sept</td><td>Main monsoon; SW→NE; chief rainfall</td></tr><tr><td>Post-Monsoon/NE</td><td>Oct–Dec</td><td>TN rain; Bay of Bengal cyclones</td></tr></table>", "mn": "🧠 <b>Monsoon seasons:</b> CSRN = <b>C</b>old, <b>S</b>ummer, <b>R</b>ain, <b>N</b>E-Monsoon (Jan→Oct) | <b>TN = NE Monsoon</b> | <b>Mango = KL+KA</b> | <b>Kalbaisakhi = WB</b> | <b>El Niño = Monsoon Nino (weakens)</b>", "traps": ["Most DOMINANT factor = MONSOON WINDS (not latitude or altitude)", "Normal Lapse Rate = 6.5°C per 1,000m (NOT 10°C — that's Dry Adiabatic Lapse Rate)", "Mango Showers = KERALA & KARNATAKA (NOT Tamil Nadu — TN gets NE monsoon)", "Tamil Nadu = NE Monsoon (Oct–Dec); gets ~35% annual rainfall from it", "El Niño = WEAKENS SW Monsoon (causes drought) | La Niña = STRENGTHENS it", "Bay of Bengal = 6× MORE cyclones than Arabian Sea", "Western Disturbances = WINTER; from MEDITERRANEAN; NW India (Punjab, Haryana, J&K)"], "revision": ["Most dominant climate factor = Monsoon winds", "Lapse Rate = 6.5°C/1,000m", "4 seasons: Jan–Feb, Mar–May, Jun–Sep, Oct–Dec", "El Niño = weakens SW monsoon", "TN = NE Monsoon (35% rainfall)", "Mango Showers = Kerala + Karnataka", "Kalbaisakhi = WB pre-monsoon storms", "Average India rainfall = 118 cm", "BoB = 6× more cyclones than Arabian Sea", "East coast cyclones = Oct–Dec", "Western Disturbances = winter rain NW India (from Mediterranean)", "SW Monsoon = ITCZ northward movement triggers it"], "oneliners": ["<b>Most dominant climate factor</b> = Monsoon winds", "<b>Normal Lapse Rate</b> = 6.5°C per 1,000 m altitude", "<b>ITCZ</b> moving north → triggers SW Monsoon onset", "<b>El Niño</b> = weakens SW Monsoon | <b>La Niña</b> = strengthens", "<b>SW Monsoon 2 branches</b> = Arabian Sea + Bay of Bengal", "<b>Arabian Sea branch</b> → W.Ghats → Konkan/Kerala first", "<b>BoB branch</b> → NE India first", "<b>Western Disturbances</b> = winter rain NW India (from Mediterranean)", "<b>Mango Showers</b> = Kerala & Karnataka (May; pre-monsoon)", "<b>Kalbaisakhi / Nor-westers</b> = WB & Bangladesh pre-monsoon storms", "<b>Tamil Nadu</b> = NE Monsoon main recipient (35% annual rainfall)", "<b>Average India rainfall</b> = 118 cm", "<b>East coast</b> = most cyclone-prone (Oct–Dec)", "<b>BoB</b> = 6× more cyclones than Arabian Sea", "<b>BoB cyclones</b>: shallow + enclosed + warm + low salinity", "<b>West coast cyclones</b> = rare; mostly June; Gujarat", "<b>Tropic of Cancer</b> divides India: S=Tropical; N=Subtropical", "<b>Loo</b> = hot dry winds; NW India; pre-monsoon", "<b>SW Monsoon retreats</b> from N.India by end September", "<b>India's climate type</b> = Tropical Monsoon"], "flashcards": [{"q": "What is the most dominant factor affecting India's climate?", "a": "Monsoon winds"}, {"q": "What is the Normal Lapse Rate?", "a": "6.5°C per 1,000 m altitude gain"}, {"q": "El Niño effect on India's monsoon?", "a": "Weakens SW Monsoon (drought conditions)"}, {"q": "Which coast gets rain from NE Monsoon (Oct–Dec)?", "a": "Tamil Nadu (35% of annual rainfall from NE Monsoon)"}, {"q": "What are Mango Showers?", "a": "Pre-monsoon thunder showers in Kerala & Karnataka (May)"}, {"q": "What are Kalbaisakhi / Nor-westers?", "a": "Violent pre-monsoon thunderstorms in WB & Bangladesh"}, {"q": "Average rainfall of India?", "a": "118 cm"}, {"q": "Bay of Bengal has how many times more cyclones than Arabian Sea?", "a": "6 times more cyclones"}, {"q": "What triggers the SW Monsoon?", "a": "ITCZ moves northward; SE trade winds cross equator → Coriolis effect → SW Monsoon"}, {"q": "Western Disturbances originate from where?", "a": "Mediterranean Sea (extra-tropical cyclones); bring winter rain to NW India"}], "mcqs": [{"q": "The most dominant factor affecting India's climate is:", "opts": ["Latitude", "Altitude", "Monsoon winds", "Relief features"], "ans": 2, "exp": "Monsoon winds are the most dominant factor. India's climate is called 'Tropical Monsoon' — defined by monsoon winds."}, {"q": "The Normal Lapse Rate (temperature decrease with altitude) is:", "opts": ["10°C per 1,000m", "6.5°C per 1,000m", "4°C per 1,000m", "8°C per 1,000m"], "ans": 1, "exp": "Normal Environmental Lapse Rate = 6.5°C per 1,000m altitude gain. The Dry Adiabatic is 10°C."}, {"q": "El Niño affects India's SW Monsoon by:", "opts": ["Strengthening it (above normal rains)", "Weakening it (below normal rains/drought)", "No effect on India", "Causing floods in eastern India"], "ans": 1, "exp": "El Niño = warming of equatorial Pacific = weakens India's SW Monsoon = drought conditions. La Niña = strengthens."}, {"q": "Tamil Nadu receives most of its rainfall from:", "opts": ["SW Monsoon (June–September)", "Western Disturbances", "NE Monsoon (October–December)", "Pre-monsoon Mango Showers"], "ans": 2, "exp": "Tamil Nadu = NE Monsoon (Oct–Dec) → ~35% of annual rainfall. TN gets LESS from SW Monsoon due to rain shadow."}, {"q": "'Mango Showers' are pre-monsoon rains that occur in:", "opts": ["Tamil Nadu & Andhra Pradesh", "Kerala & Karnataka", "West Bengal & Bangladesh", "Rajasthan & Gujarat"], "ans": 1, "exp": "Mango Showers = Kerala & Karnataka (May). They help in quick ripening of mangoes. NOT Tamil Nadu."}, {"q": "'Kalbaisakhi' (Nor-westers) are violent pre-monsoon thunderstorms typical of:", "opts": ["Kerala & Karnataka", "Rajasthan", "West Bengal & Bangladesh", "Punjab & Haryana"], "ans": 2, "exp": "Kalbaisakhi = violent nor-western thunderstorms in WB & Bangladesh (Baisakh month = April–May)."}, {"q": "Bay of Bengal generates how many times more cyclones than the Arabian Sea?", "opts": ["2 times", "4 times", "6 times", "10 times"], "ans": 2, "exp": "Bay of Bengal = 6× more cyclones than Arabian Sea (shallow, enclosed, warm, low salinity from river inflows)."}, {"q": "The average annual rainfall of India is approximately:", "opts": ["89 cm", "118 cm", "145 cm", "175 cm"], "ans": 1, "exp": "Average India rainfall = 118 cm. High: NE India (>200 cm). Low: W. Rajasthan (<50 cm)."}, {"q": "Western Disturbances bring rainfall to which region?", "opts": ["Tamil Nadu coast", "NE India", "NW India (Punjab, Haryana, J&K)", "Deccan Plateau"], "ans": 2, "exp": "Western Disturbances = extra-tropical cyclones from Mediterranean → winter rainfall in Punjab, Haryana, HP, J&K."}, {"q": "The SW Monsoon is triggered when:", "opts": ["La Niña cools the Indian Ocean", "ITCZ moves northward; SE trade winds cross equator + Coriolis", "Western Disturbances arrive from Mediterranean", "High pressure develops over Bay of Bengal"], "ans": 1, "exp": "SW Monsoon = ITCZ northward movement → SE trade winds cross equator → Coriolis force deflects → SW Monsoon."}, {"q": "East coast cyclone season peaks during:", "opts": ["June–July", "July–August", "September–October", "October–December"], "ans": 3, "exp": "East coast cyclones = Oct–Dec (post-monsoon NE Monsoon season). AP, Odisha, TN, WB most affected."}, {"q": "Which region in India receives INADEQUATE rainfall (<50 cm)?", "opts": ["Assam and Meghalaya", "West coast of India", "West Rajasthan, Kachchh, and Ladakh", "NE hills"], "ans": 2, "exp": "W. Rajasthan, Kachchh, and Ladakh receive <50 cm — rain shadow or landlocked desert areas."}, {"q": "Which branch of SW Monsoon reaches Tamil Nadu first?", "opts": ["Arabian Sea branch", "Bay of Bengal branch", "Western Disturbance", "Neither — TN gets NE Monsoon"], "ans": 3, "exp": "Tamil Nadu is in the rain shadow of W.Ghats for Arabian Sea branch. It gets NE Monsoon, not SW Monsoon primarily."}, {"q": "The SW Monsoon retreats from North India by approximately:", "opts": ["End of August", "End of September", "Mid-October", "End of November"], "ans": 1, "exp": "SW Monsoon retreats from N.India by end of September → NE Monsoon forms; hits TN coast Oct–Dec."}, {"q": "'Loo' refers to which climatic feature?", "opts": ["Cold dry winds of Ladakh", "Hot dry winds of NW India in pre-monsoon", "Cyclones of East coast", "Thunderstorms of WB"], "ans": 1, "exp": "Loo = hot, dry, dusty winds blowing in NW India (Punjab, Haryana, UP) during pre-monsoon season (Apr–May)."}]},
{"id": "rivers_overview", "chapter": "River Systems 🏞️", "title": "Rivers Overview", "icon": "🌊", "xp": 50, "seqIdx": 7, "facts": ["<b>Perennial rivers</b> = year-round flow from Himalayan glaciers (Ganga, Yamuna, Indus)", "<b>Non-Perennial rivers</b> = only in rainy season; from Deccan plateaus (Godavari, Krishna, Kaveri)", "<b>East-flowing rivers</b> = drain into Bay of Bengal; form <b>DELTAS</b>", "<b>West-flowing rivers</b> = drain into Arabian Sea; form <b>ESTUARIES</b>", "East-flowing: Mahanadi, Godavari, Krishna, Kaveri, Ganga", "West-flowing: <b>NMSTe</b> — Narmada, Mahi, Sabarmati, Tapi", "<b>Himalayan rivers</b> = antecedent rivers (older than Himalayas; cut through them)", "<b>Himalayan rivers</b>: long, carry large amount of water, have permanent glacial source", "<b>Peninsular rivers</b>: shorter, rain-fed, non-perennial, shallower", "<b>Longitudinal rivers</b> = flow parallel to mountain range (e.g., Teesta in Assam valley)", "Doab = land between two rivers ('do' = two; 'ab' = water in Persian)", "Delta-forming east coast rivers: Mahanadi (Chilika nearby), Godavari, Krishna, Cauvery", "<b>Sorrow of Bihar</b> = Kosi (frequent floods); <b>Sorrow of Bengal</b> = Damodar", "National River of India = <b>Ganga</b>", "National Aquatic Animal = <b>Gangetic Dolphin</b> (also called River Dolphin)", "Project Dolphin = conserve Riverine & Oceanic Dolphins", "<b>Eastward-draining rivers</b> generally have longer courses and larger drainage basins", "<b>River Disputes:</b> Krishna (MH, AP, KA), Godavari (MH, AP, MP, Odisha, KA), Cauvery (KL, KA, TN, Puducherry), Narmada (RJ, MP, GJ, MH)", "Mahanadi dispute: Odisha vs Chhattisgarh", "Mullaperiyar dispute: Kerala vs Tamil Nadu"], "table": "<table><tr><th>Type</th><th>Feature</th><th>Examples</th></tr><tr><td>Perennial</td><td>Year-round; Himalayan glaciers</td><td>Ganga, Yamuna, Indus</td></tr><tr><td>Non-Perennial</td><td>Rainy season only; Deccan</td><td>Godavari, Krishna, Kaveri</td></tr><tr><td>East-flowing</td><td>Bay of Bengal; DELTAS</td><td>Mahanadi, Godavari, Krishna</td></tr><tr><td>West-flowing</td><td>Arabian Sea; ESTUARIES</td><td>Narmada, Tapi, Mahi, Sabarmati</td></tr></table>", "mn": "🧠 <b>West-flowing = NMSTe</b> (Narmada, Mahi, Sabarmati, Tapi) | <b>East-flowing = all others form DELTAS</b> | <b>Perennial = Himalayan glaciers (permanent source)</b> | <b>Non-Perennial = Deccan (rain-fed)</b>", "traps": ["Non-Perennial = Deccan rivers (NOT Himalayan rivers which are perennial)", "West-flowing rivers form ESTUARIES (not deltas) — Narmada, Tapi especially", "East-flowing rivers form DELTAS | West-flowing = ESTUARIES (don't mix these)", "Himalayan rivers = ANTECEDENT (older than Himalayas); Peninsular = consequent", "Kosi = Sorrow of BIHAR | Damodar = Sorrow of BENGAL (not interchangeable)"], "revision": ["Perennial = Himalayan (glacier-fed); Non-perennial = Deccan (rain-fed)", "East-flowing = Deltas + Bay of Bengal", "West-flowing = Estuaries + Arabian Sea = NMSTe", "National River = Ganga", "National Aquatic Animal = Gangetic Dolphin", "Kosi = Sorrow of Bihar | Damodar = Sorrow of Bengal", "Himalayan rivers = antecedent (older than mountains)", "Doab = land between two rivers", "Cauvery dispute: KL, KA, TN, Puducherry", "Mahanadi dispute: Odisha vs Chhattisgarh", "Mullaperiyar dispute: Kerala vs TN"], "oneliners": ["<b>Perennial rivers</b> = Himalayan glacier-fed; flow year-round", "<b>Non-perennial</b> = Deccan; rain-fed; seasonal", "<b>East-flowing</b> = Bay of Bengal; form DELTAS", "<b>West-flowing (NMSTe)</b> = Arabian Sea; form ESTUARIES", "<b>Himalayan rivers</b> = antecedent; older than mountains", "<b>National River of India</b> = Ganga", "<b>National Aquatic Animal</b> = Gangetic Dolphin", "<b>Sorrow of Bihar</b> = Kosi (floods frequently)", "<b>Sorrow of Bengal</b> = Damodar (pollution + floods)", "<b>Doab</b> = land between two rivers (do = two; ab = water)", "<b>East-flowing delta rivers</b>: Mahanadi, Godavari, Krishna, Cauvery", "<b>Cauvery dispute< rm:", "opts": ["Estuaries", "Lagoons", "Deltas", "Gorges"], "ans": 2, "exp": "East-flowing rivers form DELTAS (Mahanadi, Godavari, Krishna, Cauvery). West-flowing form ESTUARIES (Narmada, Tapi)."}, {"q": "NMSTe rivers (Narmada, Mahi, Sabarmati, Tapi) flow into:", "opts": ["Bay of Bengal forming deltas", "Arabian Sea forming estuaries", "Indian Ocean forming lagoons", "Deccan forming marshes"], "ans": 1, "exp": "NMSTe = West-flowing; drain into Arabian Sea; form ESTUARIES (not deltas) because they flow through rift valleys."}, {"q": "The 'Sorrow of Bihar' is:", "opts": ["Damodar", "Gandak", "Kosi", "Son"], "ans": 2, "exp": "Kosi = Sorrow of Bihar (changes course frequently; massive floods). Damodar = Sorrow of Bengal."}, {"q": "The National River of India is:", "opts": ["Brahmaputra", "Indus", "Yamuna", "Ganga"], "ans": 3, "exp": "Ganga is India's National River. Gangetic Dolphin is the National Aquatic Animal."}, {"q": "'Antecedent rivers' are rivers that:", "opts": ["Run parallel to the coast", "Are older than the mountains they flow through", "Form the widest deltas", "Run through rift valleys"], "ans": 1, "exp": "Antecedent = rivers older than Himalayas. As mountains rose, rivers cut downward — creating spectacular gorges."}, {"q": "'Doab' refers to:", "opts": ["A type of delta formation", "Land between two rivers", "A riverine island", "A confluence of rivers"], "ans": 1, "exp": "Doab = do (two) + ab (water) = land between two rivers. Punjab has multiple Doabs (Bist, Bari, Rachna, Chaj, Sind Sagar)."}, {"q": "Which river is called the 'Sorrow of Bengal'?", "opts": ["Hooghly", "Brahmaputra", "Kosi", "Damodar"], "ans": 3, "exp": "Damodar = Sorrow of Bengal (frequent flooding + most polluted river). Kosi = Sorrow of Bihar."}, {"q": "National Aquatic Animal of India is:", "opts": ["Irrawaddy Dolphin", "Ganges River Dolphin (Gangetic Dolphin)", "Blue Whale", "Dugong"], "ans": 1, "exp": "Gangetic Dolphin (Platanista gangetica) = National Aquatic Animal of India. Project Dolphin conserves it."}, {"q": "The Cauvery water dispute involves which states?", "opts": ["MH, AP, KA", "KL, KA, TN, Puducherry", "UP, MP, RJ, GJ", "Odisha and Chhattisgarh"], "ans": 1, "exp": "Cauvery dispute: Kerala, Karnataka, Tamil Nadu, and Puducherry."}, {"q": "Which of these is a NON-PERENNIAL river?", "opts": ["Ganga", "Yamuna", "Godavari", "Indus"], "ans": 2, "exp": "Godavari = non-perennial (Deccan river; rain-fed; may run low in summer). Ganga, Yamuna, Indus = perennial."}, {"q": "Peninsular rivers differ from Himalayan rivers because they:", "opts": ["Flow into Arabian Sea only", "Are antecedent drainage", "Are shorter, rain-fed, non-perennial", "Always form deltas"], "ans": 2, "exp": "Peninsular rivers = shorter, rain-fed, non-perennial, shallower, consequent drainage (follow rock slope)."}, {"q": "Which river dispute is between Odisha and Chhattisgarh?", "opts": ["Godavari", "Mahanadi", "Indus", "Cauvery"], "ans": 1, "exp": "Mahanadi water dispute = Odisha vs Chhattisgarh. Mullaperiyar = Kerala vs TN."}, {"q": "West-flowing rivers form estuaries because:", "opts": ["They are in rain shadow areas", "They flow through rift valleys with hard rock; no sediment to form delta", "They are too short", "They flow very slowly"], "ans": 1, "exp": "NMSTe rivers flow through rift valleys in hard rocks → less sediment + faster flow → estuaries not deltas."}, {"q": "Project Dolphin aims to conserve:", "opts": ["Only Gangetic River Dolphins", "Only Oceanic Dolphins", "Both Riverine and Oceanic Dolphins", "Blue Whales and Dolphins"], "ans": 2, "exp": "Project Dolphin = conserve both Riverine (Gangetic dolphin) and Oceanic dolphins."}]},
{"id": "indus_system", "chapter": "River Systems 🏞️", "title": "Indus River System", "icon": "💧", "xp": 60, "seqIdx": 8, "facts": ["Indus origin: <b>Chemayungdung Glacier</b>, Kailash Range, Tibet", "Indus in Tibet called: <b>Sinkgi Khamban / Lion's Mouth</b>", "Indus length: <b>3,180 km</b> total (India = 709 km only)", "Indus route: Tibet → India (Damchauk, J&K) → Pakistan (POK) → <b>Arabian Sea (Karachi)</b>", "Indus flows <b>WEST</b>; forms V-shape gorge in POK", "Largest tributary of Indus = <b>Chenab</b>", "<b>Indus Water Treaty (IWT) 1960</b>: arranged by <b>World Bank</b>; signed at Karachi", "IWT signatories: India PM <b>Jawaharlal Nehru</b> + Pakistan President <b>Ayub Khan</b>", "India's rivers (IWT): <b>Ravi, Beas, Sutlej</b> (Eastern rivers)", "Pakistan's rivers (IWT): <b>Indus, Jhelum, Chenab</b> (Western rivers)", "<b>Sutlej</b> (Satluj): origin = Mansarovar Lake, Tibet; also called Red River", "Bhakra Dam (on Sutlej) = world's highest straight gravity dam; <b>226 m</b>", "Sutlej merges with Beas at <b>Hari ka Patan</b>, Firozpur", "<b>Beas (Vipasha)</b>: origin = Beas Kund, Rohtang Pass, Kullu", "<b>Ravi (Parushani)</b>: origin = Rohtang Pass area, Chamba (HP); Ranjit Sagar Dam + Chamera Dam", "<b>Chenab (Chandrabhaga)</b>: formed by Chandra + Bhaga rivers; Barlacha Pass, Lahaul Spiti", "<b>Jhelum</b>: origin = Sheshnag Lake, Verinag, Kashmir; Greek name = <b>Vitasta</b>", "Largest tributary of Jhelum = Kishanganga", "<b>Punjab = 5 rivers</b>: Jhelum, Chenab, Ravi, Sutlej, Beas", "Bist Doab = Beas & Sutlej | Bari Doab = Beas & Ravi", "Rachna Doab = Ravi & Chenab | Chaj Doab = Chenab & Jhelum", "Sind Sagar Doab = Jhelum & Indus", "Jhelum Greek name = Vitasta | Chenab ancient = Chandrabhaga | Beas ancient = Vipasha", "<b>Tehri Dam</b> (Bhagirathi, UK) = India's highest dam (261 m) — NOTE: on Ganga system, not Indus"], "table": "<table><tr><th>River</th><th>Origin</th><th>Key Fact</th></tr><tr><td>Sutlej</td><td>Mansarovar Lake, Tibet</td><td>Red River; function seqNodes(){return CHAPTERS.filter(n=>n.type!=='gold')}
function goldNode(){return CHAPTERS.find(n=>n.type==='gold')}
function allNodes(){return CHAPTERS}

function isUnlocked(n){
  if(n.seqIdx===0)return true;
  if(n.type==='gold'){
    const ns=seqNodes(),tot=ns.length;
    if(tot===0)return false;
    const avg=ns.reduce((s,x)=>s+(state.scores[x.id]||0),0)/tot;
    return avg>=n.requires_pct;
  }
  const prev=seqNodes().find(x=>x.seqIdx===n.seqIdx-1);
  return prev?(state.scores[prev.id]||0)>=60:false;
}

function refreshTopbar(){
  const ns=seqNodes(),tot=ns.length;
  const avg=tot?Math.round(ns.reduce((s,x)=>s+(state.scores[x.id]||0),0)/tot):0;
  document.getElementById('tb-xp').textContent='⚡ '+state.xp+' XP';
  document.getElementById('tb-pct').textContent='📊 '+avg+'%';
}

function buildSidebar(){
  const si=document.getElementById('sidebar-inner');
  si.innerHTML='';
  let lastCh='';
  CHAPTERS.forEach(n=>{
    if(n.chapter!==lastCh){
      lastCh=n.chapter;
      const lbl=document.createElement('div');
      lbl.className='ch-label';lbl.textContent=n.chapter;si.appendChild(lbl);
    }
    const btn=document.createElement('button');
    btn.className='node-btn'+(n.type==='gold'?' gold-btn':'');
    const locked=!isUnlocked(n);
    if(locked)btn.classList.add('locked');
    const sc=state.scores[n.id]||0;
    btn.innerHTML=`<span class="node-icon">${n.icon}</span>
      <span class="node-info"><span class="node-name">${n.title}</span>
      <span class="node-meta">${n.xp} XP</span></span>
      ${sc>0?`<span class="node-pct">${sc}%</span>`:''}
      ${locked?'<span class="node-lock">🔒</span>':''}`;
    btn.id='btn-geo2-'+n.id;
    if(!locked)btn.onclick=()=>openNode(n.id);
    si.appendChild(btn);
  });
}

let currentNodeId=null;
function openNode(id){
  const n=CHAPTERS.find(x=>x.id===id);
  if(!n||!isUnlocked(n))return;
  currentNodeId=id;
  document.querySelectorAll('.node-btn').forEach(b=>b.classList.remove('active'));
  const ab=document.getElementById('btn-geo2-'+id);
  if(ab)ab.classList.add('active');
  document.getElementById('dash').style.display='none';
  const nc=document.getElementById('node-content');
  nc.style.display='flex';nc.style.flexDirection='column';nc.style.gap='16px';
  nc.innerHTML='';
  const hdr=document.createElement('div');hdr.className='node-header';
  hdr.innerHTML=`<span class="node-hicon">${n.icon}</span>
    <div><div class="node-htitle">${n.title}</div>
    <div class="node-hxp">⚡ ${n.xp} XP${n.type==='gold'?' · 🏹 Golden Node':''}</div></div>`;
  nc.appendChild(hdr);
  if(n.type==='gold'){renderNode(n,nc,'gold');}
  else{
    const tabs=document.createElement('div');tabs.className='tabs';
    ['LEARN','FLASHCARDS','TEST'].forEach((t,i)=>{
      const b=document.createElement('button');b.className='tab-btn'+(i===0?' active':'');
      b.textContent=t;b.id='tab-geo2-'+i;b.onclick=()=>switchTab(n,i);tabs.appendChild(b);
    });
    nc.appendChild(tabs);
    const pane=document.createElement('div');pane.id='tab-pane-geo2';nc.appendChild(pane);
    renderNode(n,pane,'learn');
  }
  buildNodeNav(n,nc);
}

function renderNode(n,container,mode){
  container.innerHTML=mode==='gold'?buildGoldPane(n):
    mode==='flash'?buildFlashPane(n):
    mode==='test'?buildTestPane(n):buildLearnPane(n);
  if(mode==='flash')initFlash(n);
  if(mode==='test')initTest(n);
}

function switchTab(n,idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const pane=document.getElementById('tab-pane-geo2');
  const mode=['learn','flash','test'][idx];
  renderNode(n,pane,mode);
}

function buildLearnPane(n){
  let h=`<div class="learn-pane">`;
  h+=`<div class="section-title">📚 Key Facts</div><div class="fact-grid">`;
  (n.facts||[]).forEach(f=>{h+=`<div class="fact-card">${f}</div>`;});
  h+=`</div>`;
  if(n.table)h+=`<div class="section-title">📊 Table</div><div class="tbl-wrap">${n.table}</div>`;
  if(n.mn)h+=`<div class="section-title">🧠 Mnemonic</div><div class="mn-box"><div class="mn-label">Memory Hook</div>${n.mn}</div>`;
  h+=`<div class="section-title">⚠️ Exam Traps</div><div class="trap-list">`;
  (n.traps||[]).forEach(t=>{h+=`<div class="trap-item">${t}</div>`;});
  h+=`</div><div class="section-title">⚡ Rapid Revision</div><div class="rev-list">`;
  (n.revision||[]).forEach(r=>{h+=`<div class="rev-item">${r}</div>`;});
  h+=`</div><div class="section-title">💡 One-Liners</div><div class="ol-grid">`;
  (n.oneliners||[]).forEach(o=>{h+=`<div class="ol-item">${o}</div>`;});
  h+=`</div></div>`;
  return h;
}

function buildGoldPane(n){
  let h=`<div class="gold-node-panel">`;
  h+=`<div class="section-title">🏅 Master Facts</div><div class="fact-grid">`;
  (n.goldFacts||[]).forEach(f=>{h+=`<div class="fact-card">${f}</div>`;});
  h+=`</div><div class="section-title">⚠️ Critical Traps</div><div class="trap-list">`;
  (n.goldTraps||[]).forEach(t=>{h+=`<div class="trap-item">${t}</div>`;});
  h+=`</div>`;
  h+=`<div class="section-title" style="margin-top:16px">🎯 Final Test (${(n.goldMCQs||[]).length} Questions)</div>`;
  h+=`<div class="test-start"><h3>Golden Node Challenge</h3><p>Test your mastery — 15 high-difficulty questions</p>
    <button class="btn-primary" onclick="startTest('gold')">Start Challenge ⚔️</button></div>`;
  h+=`</div>`;
  return h;
}

function buildFlashPane(n){
  const fc=n.flashcards||[];
  return `<div class="flash-pane">
    <div class="flash-card-wrap">
      <div class="flash-card" id="fc-card" onclick="flipCard()">
        <div class="flash-front" id="fc-front">${fc[0]?fc[0].q:'No cards'}</div>
        <div class="flash-back" id="fc-back">${fc[0]?fc[0].a:''}</div>
      </div>
    </div>
    <div class="flash-hint">Tap card to flip</div>
    <div class="flash-nav">
      <button onclick="prevCard()">← Prev</button>
      <span class="flash-counter" id="fc-counter">1 / ${fc.length}</span>
      <button onclick="nextCard()">Next →</button>
    </div>
  </div>`;
}

let fcIdx=0;
function initFlash(n){fcIdx=0;}
function flipCard(){document.getElementById('fc-card').classList.toggle('flipped');}
function nextCard(){
  const n=CHAPTERS.find(x=>x.id===currentNodeId);
  const fc=n.flashcards||[];
  fcIdx=(fcIdx+1)%fc.length;
  updateCard(fc);
}
function prevCard(){
  const n=CHAPTERS.find(x=>x.id===currentNodeId);
  const fc=n.flashcards||[];
  fcIdx=(fcIdx-1+fc.length)%fc.length;
  updateCard(fc);
}
function updateCard(fc){
  const card=document.getElementById('fc-card');
  card.classList.remove('flipped');
  setTimeout(()=>{
    document.getElementById('fc-front').innerHTML=fc[fcIdx].q;
    document.getElementById('fc-back').innerHTML=fc[fcIdx].a;
    document.getElementById('fc-counter').textContent=(fcIdx+1)+' / '+fc.length;
  },200);
}

function buildTestPane(n){
  return `<div class="test-pane">
    <div class="test-start">
      <h3>📝 Knowledge Test</h3>
      <p>${(n.mcqs||[]).length} questions · Earn ${n.xp} XP on 60%+</p>
      <button class="btn-primary" onclick="startTest('node')">Start Test 🚀</button>
    </div>
  </div>`;
}

let testQ=[],testIdx=0,testScore=0,testMode='';
function getMcqs(mode){
  const n=CHAPTERS.find(x=>x.id===currentNodeId);
  if(!n)return[];
  return mode==='gold'?(n.goldMCQs||[]):(n.mcqs||[]);
}
function startTest(mode){
  testMode=mode;testIdx=0;testScore=0;
  testQ=getMcqs(mode).slice();
  const container=mode==='gold'?document.querySelector('.gold-node-panel'):document.getElementById('tab-pane-geo2');
  if(container)renderQ(container);
}
function renderQ(container){
  if(testIdx>=testQ.length){finishAttempt(container);return;}
  const q=testQ[testIdx];
  let h=`<div class="q-wrap"><div class="q-meta">Q${testIdx+1} of ${testQ.length}</div>
    <div class="q-text">${q.q}</div><div class="opts">`;
  q.opts.forEach((o,i)=>{h+=`<button class="opt-btn" onclick="chooseOpt(this,${i},${q.ans},'${container.id||'gp'}')">${o}</button>`;});
  h+=`</div></div>`;
  container.innerHTML=h;
}
function chooseOpt(btn,chosen,correct,cid){
  const container=document.getElementById(cid)||document.querySelector('.gold-node-panel')||document.getElementById('tab-pane-geo2');
  container.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(chosen===correct){btn.classList.add('correct');testScore++;}
  else{btn.classList.add('wrong');container.querySelectorAll('.opt-btn')[correct].classList.add('correct');}
  const q=testQ[testIdx];
  if(q.exp){const e=document.createElement('div');e.className='exp-box';e.textContent=q.exp;btn.parentElement.after(e);}
  const nb=document.createElement('button');nb.className='btn-primary';nb.style.marginTop='12px';
  nb.textContent=testIdx+1<testQ.length?'Next →':'See Results';
  nb.onclick=()=>{testIdx++;renderQ(container);};
  container.querySelector('.q-wrap').appendChild(nb);
}
function finishAttempt(container){
  const n=CHAPTERS.find(x=>x.id===currentNodeId);
  if(!n)return;
  const total=testQ.length,pct=Math.round((testScore/total)*100);
  const isGold=testMode==='gold';
  if(!isGold){
    if(pct>=(state.scores[n.id]||0)){state.scores[n.id]=pct;}
    if(pct>=60){state.xp+=n.xp;showToast('🎉 +'+n.xp+' XP earned!');}
    save();refreshTopbar();buildSidebar();
  } else {
    state.xp+=200;showToast('🏆 Golden Node Complete! +200 XP');
    save();refreshTopbar();buildSidebar();
  }
  container.innerHTML=`<div class="result-wrap">
    <div class="result-score">${pct}%</div>
    <div class="result-lbl">${testScore} / ${total} correct</div>
    <div class="result-msg">${pct>=80?'🔥 Excellent!':pct>=60?'✅ Passed!':'📖 Keep Revising'}</div>
    <button class="btn-primary" onclick="openNode('${n.id}')">Review Node</button>
  </div>`;
}

function buildNodeNav(n,container){
  const sn=seqNodes();
  const idx=sn.findIndex(x=>x.id===n.id);
  const prev=idx>0?sn[idx-1]:null;
  const next=idx<sn.length-1?sn[idx+1]:null;
  const gn=goldNode();
  const nav=document.createElement('div');nav.className='node-nav';
  if(prev)nav.innerHTML+=`<button class="nav-btn" onclick="openNode('${prev.id}')">← ${prev.title}</button>`;
  if(next&&isUnlocked(next))nav.innerHTML+=`<button class="nav-btn" onclick="openNode('${next.id}')">Next: ${next.title} →</button>`;
  if(!next&&gn&&isUnlocked(gn))nav.innerHTML+=`<button class="nav-btn" style="color:var(--gold)" onclick="openNode('${gn.id}')">🏹 Golden Node →</button>`;
  if(nav.innerHTML)container.appendChild(nav);
}

function showDash(){
  document.getElementById('dash').style.display='block';
  document.getElementById('node-content').style.display='none';
  document.querySelectorAll('.node-btn').forEach(b=>b.classList.remove('active'));
  const ns=seqNodes(),tot=ns.length;
  const avg=tot?Math.round(ns.reduce((s,x)=>s+(state.scores[x.id]||0),0)/tot):0;
  const done=ns.filter(x=>(state.scores[x.id]||0)>=60).length;
  document.getElementById('dash').innerHTML=`
    <div class="dash-grid">
      <div class="dash-card"><div class="val">${state.xp}</div><div class="lbl">Total XP</div></div>
      <div class="dash-card"><div class="val">${avg}%</div><div class="lbl">Avg Score</div></div>
      <div class="dash-card"><div class="val">${done}/${tot}</div><div class="lbl">Nodes Passed</div></div>
      <div class="dash-card"><div class="val">${Math.round((done/tot)*100)||0}%</div><div class="lbl">Completion</div></div>
    </div>
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px">
      <div class="section-title" style="margin-bottom:12px">Node Progress</div>
      ${ns.map(n=>`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span>${n.icon} ${n.title}</span><span style="color:var(--gold)">${state.scores[n.id]||0}%</span>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${state.scores[n.id]||0}%"></div></div>
      </div>`).join('')}
    </div>`;
}

function showToast(msg,dur=2500){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function toggleDrawer(){
  const a=document.getElementById('aside');
  const o=document.getElementById('drawer-overlay');
  a.classList.toggle('open');o.classList.toggle('show');
  if(a.classList.contains('open')){
    const dn=document.getElementById('drawer-nodes');
    dn.innerHTML=CHAPTERS.map(n=>{
      const unlocked=isUnlocked(n);
      const sc=(state.scores[n.id]||0);
      return `<div onclick="${unlocked?`closeDrawer();openNode('${n.id}')`:''}" style="padding:8px 10px;background:var(--panel2);border-radius:6px;font-size:13px;cursor:${unlocked?'pointer':'not-allowed'};opacity:${unlocked?1:.45};color:${unlocked?'var(--ink)':'var(--ink3)'};display:flex;align-items:center;gap:8px">
        <span>${n.icon}</span><span style="flex:1">${n.title}</span>${sc>0?`<span style="color:var(--green);font-size:11px">${sc}%</span>`:''}${unlocked?'':'<span style="font-size:11px">🔒</span>'}</div>`;
    }).join('');
  }
}
function closeDrawer(){
  document.getElementById('aside').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
}

let _mToken=null,_mSid=null;
function initMetrics(){
  try{
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  }catch(e){}
  _mSid='geo2-'+(Date.now().toString(36));
}
function track(event,data={}){
  try{
    const key='cm_metrics_geo2';
    let m=JSON.parse(localStorage.getItem(key)||'{"events":[]}');
    m.events.push({event,data,ts:Date.now()});
    if(m.events.length>200)m.events=m.events.slice(-200);
    localStorage.setItem(key,JSON.stringify(m));
  }catch(e){}
  if(_mToken){fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},body:JSON.stringify({event_name:event,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:data})}).catch(()=>{});}
}

function init(){
  buildSidebar();refreshTopbar();showDash();
  document.getElementById('tb-title').textContent='🌍 Geography Part 2';
  initMetrics();
  track('material_opened',{material:'geography_part2'});
  track('session_start');
}
document.addEventListener('DOMContentLoaded',init);
window.addEventListener('beforeunload',()=>track('session_end'));
</script>
</body>
</html>
