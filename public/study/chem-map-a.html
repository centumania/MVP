<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#141f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Chem Map A — Matter &amp; Atom | Centumania</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141f1c;--bg2:#111a17;--panel:#1a2a25;--panel2:#1e3029;--line:#254033;
  --ink:#e8f5f0;--ink2:#9dc4b4;--ink3:#5a8070;
  --green:#3dd68c;--green2:#2ab572;--green-glow:rgba(61,214,140,.13);
  --teal:#22d3c8;--gold:#f0bc45;--gold-bg:rgba(240,188,69,.12);
  --red:#f06b6b;--red-bg:rgba(240,107,107,.10);
  --blue:#4f8ef7;--violet:#a78bfa;--violet-bg:rgba(167,139,250,.11);
  --mono:"JetBrains Mono",monospace;--serif:"Instrument Serif",serif;--sans:"DM Sans",sans-serif;
  --nav-h:52px;--bot-h:52px;
  /* iOS safe area */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
  height:100%;
  /* Prevent iOS rubber-band on the html element */
  overscroll-behavior:none;
}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  overscroll-behavior:none;
  /* Prevent iOS bounce scroll on body */
  position:fixed;
  inset:0;
  overflow:hidden;
}
/* Workaround: body is position:fixed so we need a wrapper that scrolls */
.shell{display:grid;grid-template-rows:calc(var(--nav-h) + var(--sat)) 1fr calc(var(--bot-h) + var(--sab));height:100svh;height:100dvh;height:100vh;overflow:hidden;width:100%;}
.topbar{display:flex;align-items:center;gap:10px;padding:var(--sat) 14px 0;padding-left:max(14px,var(--sal));padding-right:max(14px,var(--sar));height:calc(var(--nav-h) + var(--sat));border-bottom:1px solid var(--line);background:rgba(17,26,23,.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:60}
.logo{font-family:var(--serif);font-size:18px;font-style:italic;color:var(--green);display:flex;align-items:center;gap:7px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);flex-shrink:0}
.logo sup{font-style:normal;font-size:9px;font-family:var(--mono);color:var(--ink3)}
.nav-stats{display:none}
.body{grid-row:2;overflow:hidden;display:grid;grid-template-columns:1fr}
aside{display:none}
main{overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch;scroll-behavior:smooth;overscroll-behavior-y:contain}
main::-webkit-scrollbar{width:3px}main::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.mob-stats{display:flex;gap:14px;align-items:center;padding:7px 14px;background:var(--panel2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;flex-shrink:0}
.mob-stats::-webkit-scrollbar{display:none}
.mob-stats .stat b{font-size:12px}
.stat{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--ink2)}
.stat b{font-size:13px}
.stat.xp b{color:var(--gold)}.stat.vis b{color:var(--teal)}.stat.trap b{color:var(--red)}
.mob-bar{display:flex;grid-row:3;background:rgba(17,26,23,.98);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--line);align-items:stretch;z-index:50;padding-bottom:var(--sab);padding-left:var(--sal);padding-right:var(--sar);}
.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:0;background:none;color:var(--ink3);cursor:pointer;padding:8px 4px;font-family:var(--mono);font-size:9px;letter-spacing:.5px;transition:.13s;position:relative;touch-action:manipulation;user-select:none;-webkit-user-select:none;min-height:44px;}
.mob-tab.active{color:var(--green)}.mob-tab .mt-ico{font-size:19px}
.mob-tab .mt-badge{position:absolute;top:5px;right:calc(50% - 15px);background:var(--red);color:#fff;font-size:8px;font-family:var(--mono);padding:1px 4px;border-radius:10px;min-width:14px;text-align:center}
.mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:.22s ease;touch-action:none;}
.mob-overlay.show{opacity:1;pointer-events:all}
.mob-drawer{position:fixed;left:-100%;top:0;bottom:0;width:min(300px,88vw);background:var(--bg2);border-right:1px solid var(--line);z-index:101;transition:.28s cubic-bezier(.2,.8,.4,1);overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:var(--sat);padding-bottom:var(--sab);will-change:transform;}
.mob-drawer.open{left:0}
.mob-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--line)}
.mob-close{background:none;border:1px solid var(--line);color:var(--ink2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.sidebar-inner{padding:10px 8px 60px}
.ch-group{margin-bottom:3px}
.ch-toggle{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink2);padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:.13s;font-family:var(--sans)}
.ch-toggle:hover,.ch-toggle.open{background:var(--panel);color:var(--ink)}
.ch-toggle .cht-pct{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-left:auto}
.ch-toggle.open .cht-pct{color:var(--green)}
.node-items{display:none;padding:3px 4px 3px 10px}
.ch-group.expanded .node-items{display:block}
.ni-btn{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink3);padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;transition:.12s;font-family:var(--sans);margin-bottom:1px}
.ni-btn:hover:not(.locked){background:var(--panel);color:var(--ink)}
.ni-btn.current{background:var(--green-glow);border-color:var(--green2);color:var(--green)}
.ni-btn.done:not(.current){color:var(--ink)}
.ni-btn.locked{cursor:default;opacity:.4}
.ni-tag{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:4px;margin-left:auto;flex-shrink:0}
.ni-tag.trap{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.25)}
.ni-tag.hidden{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(167,139,250,.25)}
.ni-tag.gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,188,69,.25)}
.node-view{padding:16px 14px calc(90px + var(--sab));max-width:900px;margin:0 auto;padding-left:max(14px,var(--sal));padding-right:max(14px,var(--sar));}
h1.nt{font-family:var(--serif);font-size:26px;font-style:italic;line-height:1.05;margin-bottom:6px}
.node-hd{margin-bottom:18px}
.node-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.node-badge.regular{background:var(--green-glow);color:var(--green);border:1px solid var(--green2)}
.node-badge.trap{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.3)}
.node-badge.hidden{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(167,139,250,.3)}
.node-badge.gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,188,69,.3)}
.xp-pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid rgba(240,188,69,.2);border-radius:6px;padding:3px 8px}
.section-lbl{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.section-lbl::after{content:"";flex:1;height:1px;background:var(--line)}
.tabs{display:flex;gap:3px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:20px;width:100%;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:8px;cursor:pointer;border:0;background:none;color:var(--ink2);transition:.14s;white-space:nowrap;flex-shrink:0}
.tab:hover:not(.on){color:var(--ink)}.tab.on{background:var(--green2);color:#fff;font-weight:700}
.fact-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden}
.fb-head{padding:9px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink2);border-bottom:1px solid var(--line);background:var(--panel2);display:flex;align-items:center;gap:7px}
.fb-body{padding:14px 16px}
ul.facts{list-style:none;padding:0}
ul.facts li{padding:7px 0 7px 22px;border-bottom:1px dashed var(--line);font-size:14px;position:relative;line-height:1.55}
ul.facts li:last-child{border-bottom:0}
ul.facts li::before{content:"▸";position:absolute;left:3px;top:8px;color:var(--teal);font-size:11px}
ul.facts b{color:var(--green)}
.trap-block{background:var(--red-bg);border:1px solid rgba(240,107,107,.35);border-radius:12px;padding:16px;margin:10px 0}
.trap-block .tb-h{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--red);margin-bottom:10px}
.trap-block ul{list-style:none;padding:0}
.trap-block li{padding:7px 0 7px 20px;position:relative;font-size:14px;border-bottom:1px dashed rgba(240,107,107,.18);line-height:1.5}
.trap-block li:last-child{border-bottom:0}
.trap-block li::before{content:"⚠";position:absolute;left:0;top:7px;font-size:11px;color:var(--red)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1px solid var(--line);margin:10px 0}
table.dt{width:100%;border-collapse:collapse;font-size:13px;min-width:320px}
table.dt th{padding:9px 13px;text-align:left;background:var(--green2);color:#fff;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
table.dt td{padding:9px 13px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink)}
table.dt tr:last-child td{border-bottom:0}
table.dt td:first-child{color:var(--teal);font-weight:600;font-family:var(--mono);font-size:12px}
.yes{color:var(--green);font-weight:700}.no{color:var(--red);font-weight:700}
.diag-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:10px 0}
.diag-head{padding:9px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--teal);border-bottom:1px solid var(--line);background:var(--panel2)}
.diag-body{padding:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.diag-body svg{display:block;width:100%;height:auto}
.golden-block{background:linear-gradient(135deg,rgba(240,188,69,.09),rgba(61,214,140,.06));border:1px solid rgba(240,188,69,.3);border-radius:14px;padding:18px;margin:12px 0}
.golden-block .gb-h{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:12px}
.golden-block ul{list-style:none;padding:0}
.golden-block li{padding:8px 0 8px 22px;position:relative;font-size:14px;border-bottom:1px dashed rgba(240,188,69,.15);line-height:1.5;color:var(--ink)}
.golden-block li:last-child{border-bottom:0}
.golden-block li::before{content:"→";position:absolute;left:0;color:var(--gold)}
.golden-block b{color:var(--green)}
.insight-block{background:linear-gradient(135deg,rgba(167,139,250,.07),rgba(79,142,247,.06));border:1px solid rgba(167,139,250,.3);border-radius:12px;padding:16px;margin:10px 0;position:relative;overflow:hidden}
.insight-block::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),var(--blue),var(--violet));background-size:200%;animation:iShimmer 3s linear infinite}
@keyframes iShimmer{0%{background-position:0%}100%{background-position:200%}}
.ib-h{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--violet);margin-bottom:10px}
.insight-block p{font-size:14px;line-height:1.6;color:var(--ink2)}
/* MCQ — single column on mobile */
.mcq-list{display:flex;flex-direction:column;gap:14px}
.mcq-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.mcq-q{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.45;color:var(--ink)}
.mcq-qn{font-family:var(--mono);font-size:11px;color:var(--teal);margin-right:6px}
.mcq-opts{display:grid;grid-template-columns:1fr;gap:8px}
.mopt{padding:11px 14px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--ink);font-size:14px;cursor:pointer;text-align:left;font-family:var(--sans);transition:.13s;touch-action:manipulation;user-select:none;-webkit-user-select:none;min-height:48px;width:100%;}
.mopt:active:not([disabled]){border-color:var(--green2);background:var(--green-glow);transform:scale(.98);}
.mopt.correct{background:rgba(61,214,140,.12);border-color:var(--green);color:var(--green)}
.mopt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.mopt.show-correct{background:rgba(61,214,140,.07);border-color:var(--green)}
.mcq-fb{margin-top:10px;font-size:13px;padding:9px 12px;border-radius:8px;display:none;line-height:1.5}
.mcq-fb.show{display:block}
.mcq-fb.right{background:rgba(61,214,140,.10);color:var(--green);border:1px solid rgba(61,214,140,.25)}
.mcq-fb.wrong{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.25)}
.mcq-score{font-family:var(--mono);font-size:12px;color:var(--ink2);margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.mcq-score span{color:var(--green)}
/* node completion banner */
.node-complete-banner{background:linear-gradient(135deg,rgba(61,214,140,.12),rgba(34,211,200,.08));border:1px solid rgba(61,214,140,.35);border-radius:12px;padding:14px 16px;margin-top:16px;display:flex;align-items:center;gap:10px}
.ncb-icon{font-size:22px;flex-shrink:0}
.ncb-text{flex:1}
.ncb-title{font-family:var(--mono);font-size:11px;color:var(--green);letter-spacing:1px;margin-bottom:3px}
.ncb-sub{font-size:13px;color:var(--ink2)}
.node-nav{display:flex;gap:10px;margin-top:24px;padding-top:16px;border-top:1px solid var(--line);align-items:center}
.nnav{font-family:var(--sans);font-weight:600;font-size:14px;border-radius:9px;padding:10px 16px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);transition:.14s;touch-action:manipulation;user-select:none;-webkit-user-select:none;min-height:48px;}
.nnav.primary{background:var(--green2);color:#fff;border-color:var(--green2);margin-left:auto}
.locked-view{text-align:center;padding:60px 20px}
.locked-view .lv-ico{font-size:48px;margin-bottom:14px;opacity:.3}
.locked-view h2{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--ink2);margin-bottom:8px}
.locked-view p{color:var(--ink2);font-size:14px;max-width:300px;margin:0 auto 18px;line-height:1.6}
.lock-req-list{display:inline-flex;flex-direction:column;gap:8px;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 18px;max-width:280px}
.lreq{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--ink3);line-height:1.5}
.lreq.met{color:var(--green)}.lreq::before{content:"○";flex-shrink:0}.lreq.met::before{content:"✓"}
.toast{position:fixed;top:calc(var(--nav-h) + var(--sat) + 8px);left:50%;transform:translateX(-50%) translateY(-8px);background:linear-gradient(135deg,rgba(240,188,69,.18),rgba(61,214,140,.12));border:1px solid var(--gold);border-radius:12px;padding:10px 18px;display:flex;align-items:center;gap:10px;z-index:300;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;will-change:transform,opacity;max-width:calc(100vw - 28px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold)}
.toast-msg{font-size:13px;font-weight:600;color:var(--ink)}
/* sync indicator */
.sync-dot{position:fixed;bottom:calc(var(--bot-h) + 8px);right:12px;width:8px;height:8px;border-radius:50%;background:var(--green);opacity:0;transition:.4s;z-index:200}
.sync-dot.show{opacity:1}
.dash{padding:18px 14px calc(90px + var(--sab));max-width:680px;margin:0 auto;padding-left:max(14px,var(--sal));padding-right:max(14px,var(--sar));}
.dash-t{font-family:var(--serif);font-size:32px;font-style:italic;margin-bottom:4px;color:var(--ink)}
.dash-s{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-bottom:22px;letter-spacing:1px}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.dc{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.dc .dv{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:4px}
.dc .dl{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase}
.dc.gold .dv{color:var(--gold)}.dc.g .dv{color:var(--green)}.dc.r .dv{color:var(--red)}.dc.b .dv{color:var(--teal)}
.ch-prog{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
.cpr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.cpr:last-child{margin-bottom:0}
.cpr-n{font-family:var(--mono);font-size:11px;color:var(--ink2);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cpr-bar{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.cpr-fill{height:100%;background:var(--green);border-radius:3px;transition:.5s}
.cpr-pct{font-family:var(--mono);font-size:10px;color:var(--green);width:28px;text-align:right;flex-shrink:0}
.mentor-box{background:var(--red-bg);border:1px solid rgba(240,107,107,.3);border-radius:12px;padding:14px;margin-bottom:14px}
.mentor-box h3{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--red);margin-bottom:8px}
.mentor-box li{font-size:13px;color:var(--ink2);padding:4px 0 4px 16px;position:relative;list-style:none;line-height:1.5}
.mentor-box li::before{content:"→";position:absolute;left:0;color:var(--red)}
.start-btn{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;border:0;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;font-family:var(--sans);cursor:pointer;width:100%;touch-action:manipulation;user-select:none;-webkit-user-select:none;min-height:52px;-webkit-appearance:none;appearance:none;}
.heatmap{display:flex;flex-wrap:wrap;gap:5px;padding:4px 0}
.hmap-item{font-family:var(--mono);font-size:11px;padding:4px 8px;border-radius:6px;cursor:default}
.hmap-item.h{background:rgba(240,188,69,.18);color:var(--gold);border:1px solid rgba(240,188,69,.3)}
.hmap-item.m{background:rgba(61,214,140,.10);color:var(--green);border:1px solid rgba(61,214,140,.2)}
.hmap-item.l{background:var(--panel2);color:var(--ink3);border:1px solid var(--line)}
@media(min-width:721px){
  :root{--nav-h:56px;--bot-h:0px}
  .shell{grid-template-rows:calc(var(--nav-h) + var(--sat)) 1fr;height:100svh;height:100dvh;height:100vh;}
  .body{grid-template-columns:260px 1fr;}
  aside{display:block;background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;overflow-x:hidden;padding-bottom:20px;}

// Active node session tracking
let _nodeSession={nodeId:null,openedAt:null,questionsAnswered:0,correctOnFirst:0,totalQ:0,abandoned:false};

function trackEvent(event,payload){
  // Fire-and-forget. Silent fail on network error.
  const body=Object.assign({event,mapId:"chem_a",ts:new Date().toISOString()},payload);
  try{
    fetch('/api/progress',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    }).then(()=>flashSync()).catch(()=>{});
  }catch(e){}
}

function flashSync(){
  const dot=document.getElementById('syncDot');
  if(!dot)return;
  dot.classList.add('show');
  setTimeout(()=>dot.classList.remove('show'),900);
}

function startNodeSession(nodeId,totalQ){
  // If previous node was open and not fully answered, fire abandoned
  if(_nodeSession.nodeId && _nodeSession.nodeId!==nodeId){
    const wasComplete=_nodeSession.questionsAnswered>=_nodeSession.totalQ && _nodeSession.totalQ>0;
    if(!wasComplete && _nodeSession.totalQ>0){
      trackEvent('node_abandoned',{
        nodeId:_nodeSession.nodeId,
        timeSpentSeconds:Math.floor((Date.now()-_nodeSession.openedAt)/1000),
        questionsAnswered:_nodeSession.questionsAnswered,
        totalQuestions:_nodeSession.totalQ
      });
    }
  }
  _nodeSession={nodeId,openedAt:Date.now(),questionsAnswered:0,correctOnFirst:0,totalQ,abandoned:false};
  trackEvent('node_opened',{nodeId,totalQuestions:totalQ});
}

function trackAnswer(nodeId,qi,correct){
  _nodeSession.questionsAnswered++;
  if(correct)_nodeSession.correctOnFirst++;
  trackEvent('question_answered',{
    nodeId,
    questionIndex:qi,
    firstAttemptCorrect:correct,
    timeIntoNodeSeconds:Math.floor((Date.now()-_nodeSession.openedAt)/1000)
  });
  // Check completion
  if(_nodeSession.questionsAnswered>=_nodeSession.totalQ){
    const timeSpent=Math.floor((Date.now()-_nodeSession.openedAt)/1000);
    const accuracy=Math.round(_nodeSession.correctOnFirst/_nodeSession.totalQ*100);
    trackEvent('node_completed',{
      nodeId,
      totalQuestions:_nodeSession.totalQ,
      correctOnFirstAttempt:_nodeSession.correctOnFirst,
      firstAttemptAccuracyPct:accuracy,
      timeSpentSeconds:timeSpent,
      completedAt:new Date().toISOString()
    });
  }
}

  mcqs:[
    {q:"Alloys are classified as?",o:["Elements","Compounds","Homogeneous mixtures","Heterogeneous mixtures"],a:2,e:"Alloys = HOMOGENEOUS mixtures. They have uniform composition throughout. The metals are NOT chemically bonded."},

 {id:"separation",title:"Separation Methods",xp:15,type:"regular",

  mcqs:[

 {id:"atomic-models",title:"Atomic Models — Thomson to Bohr",xp:20,type:"regular",diag:"atomic-models",
  facts:["<b>Dalton (1803)</b>: atom = solid indivisible sphere. First atomic theory.","<b>Thomson (1904)</b>: Plum Pudding model — electrons embedded in positive sphere","<b>Rutherford (1911)</b>: Nuclear model — dense positive nucleus, electrons orbit outside","Rutherford's Gold Foil: most α-particles passed → atom mostly empty; very few bounced back → dense nucleus","<b>Bohr (1913)</b>: electrons in fixed energy shells (K,L,M,N); no radiation unless jumping shells","Bohr explained hydrogen spectrum successfully","<b>Modern/Quantum</b>: electrons in orbitals (probability clouds) — s,p,d,f sub-shells"],
  table:{h:["Model","Year","Key Concept","Limitation"],r:[["Dalton","1803","Solid sphere","No electrons"],["Thomson","1904","Plum pudding (e⁻ in +ve)","No nucleus"],["Rutherford","1911","Nuclear model","e⁻ should spiral in"],["Bohr","1913","Fixed shells K,L,M,N","Only explains H"],["Quantum","Modern","Orbitals (probability)","Still valid"]]},
  mcqs:[
    {q:"Rutherford's model was based on which experiment?",o:["Cathode ray experiment","Gold foil experiment","Oil drop experiment","Spectroscopy"],a:1,e:"Gold foil experiment (1909): α-particles fired at gold foil. Most passed through (atom mostly empty); few bounced back → dense positive nucleus."},

    {q:"Limitation of Rutherford's model was?",o:["Did not explain nucleus","Did not explain electrons at all","Electrons should spiral into nucleus and atom should collapse","No mention of protons"],a:2,e:"Classical physics said orbiting electrons should radiate energy and spiral into nucleus → atom would collapse in nanoseconds. Bohr solved this."},

// ── HELPERS ───────────────────────────────────────────────────────────────────
function allNodes(){return CHAPTERS.flatMap(c=>c.nodes)}
function getNode(id){return allNodes().find(n=>n.id===id)}
function isVisited(id){return!!S.visited[id]}
function trapNodes(){return allNodes().filter(n=>n.type==="trap"||n.type==="hidden")}
function trapVisited(){return trapNodes().filter(n=>isVisited(n.id)).length}
function visitedCount(){return allNodes().filter(n=>isVisited(n.id)).length}
function totalNodes(){return allNodes().length}
function isUnlocked(node){
  if(node.type==="hidden"&&node.requires){return node.requires.every(r=>isVisited(r));}
  if(node.type==="gold"){const ch=CHAPTERS.find(c=>c.nodes.some(n=>n.id===node.id));if(ch){const p=chPct(ch);return p>=(node.requires_pct||80);}}
  return true;
}
function chPct(ch){const vis=ch.nodes.filter(n=>isVisited(n.id)).length;return Math.round(vis/ch.nodes.length*100);}
function updateHeader(){
  const vis=visitedCount(),tot=totalNodes(),xp=S.xp,tv=trapVisited(),tn=trapNodes().length;
  ["hXP","mhXP"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=xp;});
  ["hVis","mhVis"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=vis+"/"+tot;});
  ["hTrap","mhTrap"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=tv+"/"+tn;});
  const tb=document.getElementById("trapBadge");if(tb)tb.textContent=tn-tv;
}
let _toastT;
function showToast(xp,msg){
  const t=document.getElementById("toast"),v=document.getElementById("toastVal"),m=document.getElementById("toastMsg");
  if(!t)return;
  v.textContent=xp?"+"+xp+" XP":"✓";m.textContent=msg;
  t.classList.add("show");clearTimeout(_toastT);
  _toastT=setTimeout(()=>t.classList.remove("show"),2800);
}
function buildSidebar(){
  ["sideInner","mobSideInner"].forEach(sid=>{
    const el=document.getElementById(sid);if(!el)return;el.innerHTML="";
    CHAPTERS.forEach(ch=>{
      const pct=chPct(ch),isOpen=S.chOpen===ch.id;
      const div=document.createElement("div");
      div.className="ch-group"+(isOpen?" expanded":"");
      div.innerHTML=`<button class="ch-toggle${isOpen?" open":""}" data-ch="${ch.id}">
        <span style="font-size:16px">${ch.icon}</span><span>${ch.title}</span>
        <span class="cht-pct">${pct}%</span>
      </button>
      <div class="node-items">${ch.nodes.map(n=>{
        const unl=isUnlocked(n),vis=isVisited(n.id),cur=S.curNode===n.id;
        let ico=vis?"✓":"○",tag="";
        if(!unl){ico="🔒";tag=`<span class="ni-tag hidden">LOCKED</span>`;}
        else if(n.type==="gold"){ico="⚡";tag=`<span class="ni-tag gold">GOLD</span>`;}
        else if(n.type==="trap"){ico=vis?"⚠️":"⚠";tag=`<span class="ni-tag trap">TRAP</span>`;}
        else if(n.type==="hidden"){ico=vis?"🔓":"???";tag=`<span class="ni-tag hidden">SECRET</span>`;}
        return `<button class="ni-btn${cur?" current":""}${vis?" done":""}${!unl?" locked":""}" data-nid="${n.id}" data-unl="${unl}">
          <span style="width:15px;text-align:center;font-size:12px">${ico}</span>
          <span>${!unl&&n.type==="hidden"?"??? Hidden Node":n.title}</span>${tag}
        </button>`;
      }).join("")}</div>`;
      el.appendChild(div);
      div.querySelector(".ch-toggle").onclick=()=>{
        S.chOpen=isOpen?null:ch.id;save();buildSidebar();
        if(!isOpen){const first=ch.nodes.find(n=>isUnlocked(n));if(first)openNode(first.id);}
      };
      div.querySelectorAll(".ni-btn[data-unl='true']").forEach(b=>b.onclick=()=>{openNode(b.dataset.nid);closeDrawer();});
      div.querySelectorAll(".ni-btn[data-unl='false']").forEach(b=>b.onclick=()=>{openLocked(b.dataset.nid);closeDrawer();});
    });
  });
}
function openNode(id){
  const node=getNode(id);if(!node||!isUnlocked(node))return openLocked(id);
  const fresh=!isVisited(id);
  S.curNode=id;S.chOpen=CHAPTERS.find(c=>c.nodes.some(n=>n.id===id))?.id||S.chOpen;
  if(fresh){S.visited[id]=Date.now();S.xp+=node.xp;
    const msgs={trap:"⚠ Exam Trap Revealed!",hidden:"🔓 Secret Node Unlocked!",gold:"⚡ Gold Node Unlocked!"};
    showToast(node.xp,msgs[node.type]||"Node Visited");}
  save();buildSidebar();updateHeader();renderNode(node);
  document.getElementById("mainArea").scrollTop=0;
  // Start tracking session
  if(node.mcqs&&node.mcqs.length){startNodeSession(id,node.mcqs.length);}
  else{startNodeSession(id,0);}
}
function openLocked(id){
  const node=getNode(id);if(!node)return;
  S.curNode=id;save();buildSidebar();
  const ch=CHAPTERS.find(c=>c.nodes.some(n=>n.id===id));
  let reqs="";
  if(node.type==="hidden"&&node.requires)reqs=node.requires.map(rid=>{const rn=getNode(rid);return`<div class="lreq${isVisited(rid)?" met":""}">Visit: ${rn?.title||rid}</div>`;}).join("");
  else if(node.type==="gold"){const pct=ch?chPct(ch):0;reqs=`<div class="lreq${pct>=(node.requires_pct||80)?" met":""}">Complete ${node.requires_pct||80}% of chapter (${pct}% done)</div>`;}
  document.getElementById("viewWrap").innerHTML=`<div class="locked-view"><div class="lv-ico">🔒</div><h2>Locked</h2><p>${node.type==="hidden"?"Complete required nodes to reveal this secret.":"Complete chapter to unlock the Gold Node."}</p><div class="lock-req-list">${reqs}</div></div>`;
}
function buildTable(t){return`<div class="tbl-wrap"><table class="dt"><thead><tr>${t.h.map(x=>`<th>${x}</th>`).join("")}</tr></thead><tbody>${t.r.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;}
function buildHeatmap(items){return`<div class="heatmap">${items.map(i=>`<div class="hmap-item ${i.cls}">${i.label}</div>`).join("")}</div>`;}
function renderNode(node){
  const ch=CHAPTERS.find(c=>c.nodes.some(n=>n.id===node.id));
  const bm={regular:["◇ LEARN","regular"],trap:["⚠ EXAM TRAP","trap"],hidden:["🔓 SECRET","hidden"],gold:["⚡ GOLD","gold"]};
  const [bl,bc]=bm[node.type]||["◇","regular"];
  let content="";
  if(node.type==="gold"){
    content=`<div class="golden-block"><div class="gb-h">⚡ GOLD NODE — HIGHEST YIELD EXAM FACTS</div><ul>${(node.golden||[]).map(g=>`<li>${g}</li>`).join("")}</ul></div>`;
  } else {
    if(node.diag&&DIAGRAMS[node.diag]){content+=`<div class="diag-box"><div class="diag-head">📊 VISUAL DIAGRAM</div><div class="diag-body">${DIAGRAMS[node.diag]}</div></div>`;}
    if(node.facts){content+=`<div class="fact-block"><div class="fb-head">◇ KEY FACTS</div><div class="fb-body"><ul class="facts">${node.facts.map(f=>`<li>${f}</li>`).join("")}</ul></div></div>`;}
    if(node.table){content+=`<div class="section-lbl">◇ COMPARISON TABLE</div>${buildTable(node.table)}`;}
    if(node.traps){content+=`<div class="trap-block"><div class="tb-h">⚠ EXAM TRAPS — HIGH YIELD</div><ul>${node.traps.map(t=>`<li>${t}</li>`).join("")}</ul></div>`;}
    if(node.insight){content+=node.insight.map(i=>`<div class="insight-block"><div class="ib-h">💎 INSIGHT — ${i.h}</div><p>${i.body}</p></div>`).join("");}
  }
  let mcqContent="";
  if(node.mcqs?.length){
    const best=S.mcq[node.id]||0;
    mcqContent=`<div class="mcq-list">
      ${best?`<div style="font-family:var(--mono);font-size:11px;color:var(--ink3);margin-bottom:8px">Best score: <span style="color:var(--green)">${best}%</span></div>`:""}
      ${node.mcqs.map((q,qi)=>`<div class="mcq-card" data-qi="${qi}" data-nid="${node.id}">
        <div class="mcq-q"><span class="mcq-qn">Q${qi+1}</span>${q.q}</div>
        <div class="mcq-opts">${q.o.map((op,oi)=>`<button class="mopt" data-oi="${oi}">${String.fromCharCode(65+oi)}. ${op}</button>`).join("")}</div>
        <div class="mcq-fb" id="fb_${node.id}_${qi}"></div>
      </div>`).join("")}
      <div class="mcq-score" id="scr_${node.id}">Answer all questions to see your score</div>
    </div>`;
  } else {
    mcqContent=`<div style="text-align:center;padding:40px;color:var(--ink3);font-family:var(--mono);font-size:13px">No MCQs for this node</div>`;
  }
  const idx=ch?.nodes.findIndex(n=>n.id===node.id)??-1;
  const prev=idx>0?ch.nodes[idx-1]:null;
  const next=idx<(ch?.nodes.length-1)?ch.nodes[idx+1]:null;
  const nav=`<div class="node-nav">
    ${prev?`<button class="nnav" onclick="openNode('${prev.id}')">‹ ${prev.title.substring(0,22)}</button>`:""}
    ${next&&isUnlocked(next)?`<button class="nnav primary" onclick="openNode('${next.id}')">Next ›</button>`:""}
  </div>`;
  document.getElementById("viewWrap").innerHTML=`<div class="node-view">
    <div class="node-hd">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink3);margin-bottom:6px">${ch?.title||""} › ${node.title}</div>
      <div class="node-badge ${bc}">${bl}</div>
      <h1 class="nt">${node.title}</h1>
      <div class="xp-pill">✦ +${node.xp} XP${isVisited(node.id)?" earned":""}</div>
    </div>
    <div class="tabs">
      <button class="tab on" data-t="learn">📖 Learn</button>
      <button class="tab" data-t="test">🎯 Test (${node.mcqs?.length||0}Q)</button>
    </div>
    <div id="pane-learn">${content}${nav}</div>
    <div id="pane-test" style="display:none">${mcqContent}${nav}</div>
  </div>`;
  document.querySelectorAll(".tab").forEach(btn=>{
    btn.onclick=()=>{
      const t=btn.dataset.t;
      document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.t===t));
      ["learn","test"].forEach(p=>{const e=document.getElementById("pane-"+p);if(e)e.style.display=p===t?"block":"none";});
    };
  });
  bindMCQ(node);
}

function bindMCQ(node){
  if(!node.mcqs)return;
  let correct=0,answered=0,total=node.mcqs.length;
  node.mcqs.forEach((q,qi)=>{
    const card=document.querySelector(`.mcq-card[data-qi="${qi}"][data-nid="${node.id}"]`);if(!card)return;
    card.querySelectorAll(".mopt").forEach(btn=>{
      btn.onclick=()=>{
        if(card.dataset.done)return; // lock on first attempt
        card.dataset.done=1;
        const oi=+btn.dataset.oi;
        const fb=document.getElementById(`fb_${node.id}_${qi}`);
        const isCorrect=(oi===q.a);
        // Lock all options and highlight correct
        card.querySelectorAll(".mopt").forEach((b,i)=>{
          b.disabled=true;
          if(i===q.a)b.classList.add("show-correct");
        });
        if(isCorrect){
          btn.classList.add("correct");
          correct++;
          fb.className="mcq-fb show right";
          fb.innerHTML="✓ "+q.e;
        } else {
          btn.classList.add("wrong");
          fb.className="mcq-fb show wrong";
          fb.innerHTML="✗ Wrong. "+q.e;
        }
        answered++;
        // Send per-question tracking
        trackAnswer(node.id,qi,isCorrect);
        if(answered===total){
          const pct=Math.round(correct/total*100);
          const scr=document.getElementById(`scr_${node.id}`);
          if(scr){
            let grade=pct>=80?"🎯 Excellent":pct>=60?"✓ Good":"⚠ Revise";
            scr.innerHTML=`Score: <span>${correct}/${total} = ${pct}%</span> ${grade}`;
          }
          if(pct>(S.mcq[node.id]||0)){S.mcq[node.id]=pct;save();}
          if(pct>=80)showToast(0,"MCQ Cleared 🎯");
          else if(pct>=60)showToast(0,"Good attempt ✓");
          // Show completion banner
          const testPane=document.getElementById("pane-test");
          if(testPane){
            const banner=document.createElement("div");
            banner.className="node-complete-banner";
            banner.innerHTML=`<div class="ncb-icon">${pct>=80?"🏆":pct>=60?"✅":"📖"}</div>
              <div class="ncb-text">
                <div class="ncb-title">NODE COMPLETE — ${pct}%</div>
                <div class="ncb-sub">${correct}/${total} correct on first attempt${pct<60?" — revisit Learn tab":""}</div>
              </div>`;
            testPane.appendChild(banner);
          }
        }
      };
    });
  });
}

function showDash(){
  S.curNode=null;save();buildSidebar();
  document.querySelectorAll(".mob-tab").forEach(t=>t.classList.toggle("active",t.id==="mbt-dash"));
  const vis=visitedCount(),tot=totalNodes(),pct=tot?Math.round(vis/tot*100):0;
  const missed=trapNodes().filter(n=>!isVisited(n.id));
  document.getElementById("viewWrap").innerHTML=`<div class="dash">
    <div class="dash-t">Chem Map A</div>
    <div class="dash-s">MATTER & ATOM · SSC / RRB / TNPSC / PUDUCHERRY LDC</div>
    <div class="dash-grid">
      <div class="dc gold"><div class="dv">${S.xp}</div><div class="dl">Total XP</div></div>
      <div class="dc g"><div class="dv">${vis}/${tot}</div><div class="dl">Nodes</div></div>
      <div class="dc r"><div class="dv">${trapVisited()}/${trapNodes().length}</div><div class="dl">Traps</div></div>
      <div class="dc b"><div class="dv">${pct}%</div><div class="dl">Done</div></div>
    </div>
    <div class="ch-prog">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--ink3);margin-bottom:12px">CHAPTER PROGRESS</div>
      ${CHAPTERS.map(ch=>{const p=chPct(ch);return`<div class="cpr"><span class="cpr-n">${ch.icon} ${ch.title}</span><div class="cpr-bar"><div class="cpr-fill" style="width:${p}%"></div></div><span class="cpr-pct">${p}%</span></div>`;}).join("")}
    </div>
    ${missed.length?`<div class="mentor-box"><h3>⚠ EXAM TRAPS NOT YET VISITED</h3><ul>${missed.map(n=>`<li>${n.title} — ${n.xp} XP waiting</li>`).join("")}</ul></div>`:""}
    <button class="start-btn" onclick="startLearning()">${visitedCount()===0?"Start Learning →":"Continue →"}</button>
  </div>`;
}
function startLearning(){
  const first=allNodes().find(n=>isUnlocked(n)&&!isVisited(n.id))||allNodes()[0];
  if(first){S.chOpen=CHAPTERS.find(c=>c.nodes.some(n=>n.id===first.id))?.id;openNode(first.id);}
}
function goTraps(){
  const t=trapNodes();if(!t.length)return;
  const next=t.find(n=>!isVisited(n.id))||t[0];
  openNode(next.id);
}
function openDrawer(){
  document.getElementById("mobDrawer").classList.add("open");
  document.getElementById("mobOverlay").classList.add("show");
  // Prevent body scroll-through on iOS when drawer is open
  document.getElementById("mainArea").style.overflow="hidden";
}
function closeDrawer(){
  document.getElementById("mobDrawer").classList.remove("open");
  document.getElementById("mobOverlay").classList.remove("show");
  document.getElementById("mainArea").style.overflow="";
}

// ── Swipe-to-close drawer (iOS/Android gesture support) ───────────────────────
(function(){
  let startX=0,startY=0,dragging=false;
  const drawer=document.getElementById("mobDrawer");
  if(!drawer)return;
  drawer.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true;
  },{passive:true});
  drawer.addEventListener("touchmove",e=>{
    if(!dragging)return;
    const dx=e.touches[0].clientX-startX;
    const dy=Math.abs(e.touches[0].clientY-startY);
    if(dx<-30&&dy<50){closeDrawer();dragging=false;}
  },{passive:true});
  drawer.addEventListener("touchend",()=>{dragging=false;},{passive:true});
})();

if(!S.chOpen)S.chOpen=CHAPTERS[0].id;
buildSidebar();updateHeader();showDash();
</script><script src="/study/centumania-tracker.js"></script>
</body></html>
