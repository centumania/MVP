<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bio Map · Foundations &amp; Diversity · Centumania</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   CENTUMANIA DESIGN SYSTEM · Bio Map (Foundations & Diversity)
   Carbon Black · Centumania Indigo · Champion Gold
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --bg:             #0B1020;
  --bg2:            #111827;
  --surface:        #111827;
  --surface-up:     #1a2235;
  --surface-high:   #1e2a40;
  --indigo:         #2533FF;
  --indigo-hover:   #1f2bdb;
  --indigo-tint:    rgba(37,51,255,0.10);
  --indigo-border:  rgba(37,51,255,0.30);
  --gold:           #F6B300;
  --gold-tint:      rgba(246,179,0,0.12);
  --gold-border:    rgba(246,179,0,0.28);
  --success:        #22C55E;
  --success-tint:   rgba(34,197,94,0.12);
  --success-border: rgba(34,197,94,0.28);
  --danger:         #E3413A;
  --danger-tint:    rgba(227,65,58,0.12);
  --danger-border:  rgba(227,65,58,0.28);
  --warning:        #FBBF24;
  --warning-tint:   rgba(251,191,36,0.06);
  --warning-border: rgba(251,191,36,0.22);
  --text:           #F9FAFB;
  --text-dim:       #D1D5DB;
  --text-muted:     #9CA3AF;
  --text-faint:     #6B7280;
  --border:         rgba(255,255,255,0.08);
  --border-strong:  rgba(255,255,255,0.15);
  --font-disp:  'Bebas Neue', sans-serif;
  --font-body:  'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:  'JetBrains Mono', monospace;
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.5);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.6);
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.app {
  display: grid;
  grid-template-columns: 296px 1fr;
  grid-template-rows: 52px 1fr;
  height: 100vh;
  height: 100dvh;
  grid-template-areas: "top top" "side main";
}
header {
  grid-area: top;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(11,16,32,0.97);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 20;
}
.brand { display: flex; align-items: center; gap: 9px; }
.brand-name { font-family: var(--font-disp); font-size: 20px; letter-spacing: 0.5px; color: var(--text); line-height: 1; white-space: nowrap; }
.brand-badge { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--indigo); background: var(--indigo-tint); border: 1px solid var(--indigo-border); border-radius: 4px; padding: 2px 6px; }
.modes { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
.modes button { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); background: none; border: 0; padding: 5px 11px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.modes button:hover:not(.on) { color: var(--text); background: var(--surface-up); }
.modes button.on { background: var(--indigo); color: #fff; font-weight: 700; box-shadow: 0 1px 6px rgba(37,51,255,0.45); }
.prog { margin-left: auto; display: flex; align-items: center; gap: 9px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
.bar { width: 110px; height: 4px; border-radius: 2px; background: var(--surface-up); overflow: hidden; border: 1px solid var(--border); }
.bar i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--indigo) 0%, var(--gold) 100%); transition: width 0.5s ease; border-radius: 2px; }
.reset { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); background: none; border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; cursor: pointer; transition: all 0.15s; }
.reset:hover { color: var(--danger); border-color: var(--danger-border); }
aside { grid-area: side; border-right: 1px solid var(--border); background: var(--surface); overflow-y: auto; padding: 12px 8px 40px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
aside::-webkit-scrollbar { width: 3px; }
aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.search { width: 100%; font-family: var(--font-mono); font-size: 11px; color: var(--text); background: var(--surface-up); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; margin-bottom: 10px; outline: none; transition: border-color 0.15s; }
.search::placeholder { color: var(--text-faint); }
.search:focus { border-color: var(--indigo); }
.chap { margin-bottom: 3px; }
.chap > .chead { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; background: none; border: 0; color: var(--text-dim); font-family: var(--font-disp); font-size: 13px; letter-spacing: 0.5px; padding: 7px 8px; border-radius: 7px; cursor: pointer; transition: background 0.14s; }
.chap > .chead:hover { background: var(--surface-up); }
.chead .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--indigo); flex: 0 0 auto; box-shadow: 0 0 6px rgba(37,51,255,0.5); }
.chead .cnt { margin-left: auto; font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
.seclist { list-style: none; margin: 1px 0 6px; padding: 0 0 0 6px; border-left: 1px solid var(--border); margin-left: 11px; }
.seclist li { margin: 1px 0; }
.seclist button { display: flex; align-items: center; gap: 6px; width: 100%; text-align: left; background: none; border: 0; color: var(--text-muted); font-family: var(--font-body); font-size: 12.5px; padding: 5px 8px; border-radius: 6px; cursor: pointer; transition: all 0.13s; line-height: 1.3; }
.seclist button:hover { color: var(--text); background: var(--surface-up); }
.seclist button.active { color: var(--indigo); background: var(--indigo-tint); }
.seclist button.done { color: var(--gold); }
.seclist button.active.done { color: var(--gold); background: var(--gold-tint); }
.seclist button .chk { font-family: var(--font-mono); font-size: 9px; opacity: 0.45; flex: 0 0 auto; }
.seclist button.done .chk { color: var(--gold); opacity: 1; }
main { grid-area: main; overflow-y: auto; padding: 28px clamp(16px,4vw,52px) 80px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
main::-webkit-scrollbar { width: 3px; }
main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.wrap { max-width: 820px; margin: 0 auto; }
.crumb { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--indigo); margin-bottom: 6px; }
h1.node { font-family: var(--font-disp); font-size: clamp(34px,5vw,52px); letter-spacing: 1px; line-height: 1; margin: 0 0 22px; color: var(--text); }
.points { list-style: none; padding: 0; margin: 0 0 6px; }
.points li { position: relative; padding: 9px 0 9px 22px; border-bottom: 1px solid var(--border); font-size: 14.5px; color: var(--text-dim); line-height: 1.55; }
.points li:last-child { border-bottom: none; }
.points li::before { content: '›'; position: absolute; left: 5px; top: 8px; color: var(--indigo); font-weight: 700; font-size: 16px; }
.points b { color: var(--text); }
.points i { color: var(--text-muted); }
.points .star { color: var(--gold); font-family: var(--font-mono); font-size: 10px; vertical-align: super; }
.block { margin: 18px 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); box-shadow: var(--shadow-sm); }
.block .bh { display: flex; align-items: center; gap: 8px; padding: 9px 14px; font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faint); border-bottom: 1px solid var(--border); background: var(--surface-up); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
thead th { background: var(--indigo); color: rgba(255,255,255,0.95); font-family: var(--font-mono); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(255,255,255,0.018); }
td:first-child { color: var(--gold); font-weight: 600; font-size: 12.5px; }
.diagram { padding: 16px; background: var(--surface); overflow-x: auto; }
.diagram .mermaid { display: flex; justify-content: center; min-width: max-content; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); white-space: pre; }
.diagram .mermaid[data-processed] { white-space: normal; color: var(--text); }
.trap { padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; border-bottom: 1px solid var(--border); }
.trap:last-child { border-bottom: none; }
.trap .t { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.5px; color: #1a1200; background: var(--warning); border-radius: 4px; padding: 2px 6px; white-space: nowrap; margin-top: 2px; flex: 0 0 auto; }
.trap.err .t { background: var(--danger); color: #fff; }
.trap p { margin: 0; font-size: 13.5px; color: var(--text-dim); line-height: 1.5; }
.block.trapbox { border-color: var(--warning-border); background: var(--warning-tint); }
.block.trapbox .bh { color: var(--warning); background: transparent; border-color: var(--warning-border); }
.mcq { margin: 12px; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; background: var(--surface-up); }
.mcq .q { font-weight: 600; margin-bottom: 10px; font-size: 14.5px; color: var(--text); line-height: 1.4; }
.mcq .q .qn { font-family: var(--font-mono); color: var(--indigo); font-size: 10px; font-weight: 700; margin-right: 6px; letter-spacing: 0.5px; }
.opt { display: block; width: 100%; text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; margin: 5px 0; color: var(--text-dim); cursor: pointer; font-size: 13.5px; font-family: var(--font-body); transition: all 0.12s; line-height: 1.4; }
.opt:hover:not([disabled]) { border-color: var(--indigo-border); color: var(--text); background: var(--indigo-tint); }
.opt.correct { border-color: var(--success-border); background: var(--success-tint); color: var(--success); font-weight: 500; }
.opt.wrong { border-color: var(--danger-border); background: var(--danger-tint); color: var(--danger); }
.opt[disabled] { cursor: default; }
.expl { margin-top: 8px; font-size: 13px; color: var(--text-muted); padding: 9px 12px; border-left: 2px solid var(--indigo); background: var(--indigo-tint); border-radius: 0 6px 6px 0; display: none; line-height: 1.5; }
.expl.show { display: block; }
.expl b { color: var(--gold); }
.nav { display: flex; gap: 10px; align-items: center; margin-top: 28px; padding-top: 18px; border-top: 1px solid var(--border); }
.nav button { font-family: var(--font-body); font-weight: 600; font-size: 13px; border-radius: 8px; padding: 9px 16px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); transition: all 0.14s; }
.nav button:hover { border-color: var(--border-strong); color: var(--text); }
.nav .mark { margin-left: auto; background: var(--gold-tint); color: var(--gold); border-color: var(--gold-border); font-weight: 700; }
.nav .mark:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); }
.nav .mark.done { background: var(--success-tint); color: var(--success); border-color: var(--success-border); }
.nav .mark.done:hover { background: var(--success); color: var(--bg); border-color: var(--success); }
.hint { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); text-align: center; margin-top: 12px; letter-spacing: 0.5px; }
.quizhead { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
.score { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
.score b { color: var(--gold); font-size: 22px; font-family: var(--font-disp); letter-spacing: 0.5px; }
.pill { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--indigo); border: 1px solid var(--indigo-border); border-radius: 20px; padding: 3px 10px; background: var(--indigo-tint); }
.flash { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin: 8px 0; background: var(--surface); cursor: pointer; transition: border-color 0.14s; }
.flash:hover { border-color: var(--border-strong); }
.flash.open { border-color: var(--indigo-border); }
.flash .ft { font-family: var(--font-disp); font-size: 18px; letter-spacing: 0.5px; color: var(--text); }
.flash .fb { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
.flash.open .fb { display: block; }
.flash .tap { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 6px; letter-spacing: 0.5px; }
.menutoggle { display: none; }
@media (max-width: 820px) {
  .app { grid-template-columns: 1fr; }
  aside { position: fixed; z-index: 30; top: 52px; bottom: 0; left: 0; width: 85%; max-width: 320px; transform: translateX(-110%); transition: transform 0.24s ease; box-shadow: 0 0 48px rgba(0,0,0,0.8); }
  aside.open { transform: none; }
  .menutoggle { display: inline-flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); border-radius: 7px; padding: 6px 10px; cursor: pointer; font-size: 15px; }
  .prog .bar { width: 60px; }
  .brand-name { font-size: 17px; }
  .brand-badge { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="menutoggle" id="menuBtn">&#9776;</button>
    <div class="brand">
      <span class="brand-name">BIO MAP</span>
      <span class="brand-badge">FOUNDATIONS &amp; DIVERSITY</span>
    </div>
    <div class="modes">
      <button data-mode="study" class="on">STUDY</button>
      <button data-mode="revise">REVISE</button>
      <button data-mode="quiz">QUIZ</button>
    </div>
    <div class="prog">
      <span id="progTxt">0 / 0</span>
      <div class="bar"><i id="progBar"></i></div>
      <button class="reset" id="resetBtn">RESET</button>
    </div>
  </header>
  <aside id="side">
    <input class="search" id="search" placeholder="filter nodes&hellip;">
    <div id="nav"></div>
  </aside>
  <main><div class="wrap" id="view"></div></main>
</div>
<script>
const DIAG={
twoCells:`flowchart LR
  CELL["All Cells"] --> PRO["Prokaryotic"]
  CELL --> EUK["Eukaryotic"]
  PRO --> P1["No defined nucleus"]
  PRO --> P2["Genetic material in nucleoid"]
  PRO --> P4["Examples: Bacteria · Blue-green Algae"]
  EUK --> E1["Well-defined nucleus"]
  EUK --> E2["Membrane-bound organelles"]
  EUK --> E3["Examples: All except bacteria and cyanobacteria"]`,
organelles:`flowchart TD
  ROOT["Cell Organelles"] --> NUC["Nucleus: double membrane · pores · chromosomes"]
  ROOT --> RER["Rough ER: ribosomes · protein synthesis"]
  ROOT --> SER["Smooth ER: lipid metabolism · detox"]
  ROOT --> GOL["Golgi: post office · packages proteins · builds lysosomes"]
  ROOT --> LYS["Lysosomes: suicide bags · enzymes · waste · defence"]
  ROOT --> MIT["Mitochondria: powerhouse · ATP · own mtDNA"]
  ROOT --> PLA["Plastids: chloroplast · leucoplast · chromoplast"]
  ROOT --> VAC["Vacuoles: rigidity · large in plants"]
  ROOT --> CEN["Centrioles: animal cells · cell division"]`,
division:`flowchart TD
  S["Interphase: DNA replication (BEFORE mitosis)"] --> P["Prophase: chromatin condenses"]
  P --> M["Metaphase: align at equator"]
  M --> A["Anaphase: chromatids to poles"]
  A --> T["Telophase: envelope reforms"]
  T --> D["2 identical daughter cells"]`,
plantTissue:`flowchart TD
  PT["Plant Tissues"] --> MER["Meristematic: dividing"]
  PT --> PERM["Permanent: differentiated"]
  MER --> AP["Apical: tip · height"]
  MER --> LAT["Lateral: sides · girth"]
  MER --> INT["Intercalary: nodes · branching"]
  PERM --> SIMP["Simple (one cell type)"]
  PERM --> COMP["Complex (many cell types)"]
  SIMP --> PAR["Parenchyma: live · storage"]
  SIMP --> COL["Collenchyma: live · flexible support"]
  SIMP --> SCL["Sclerenchyma: DEAD · lignified · strength"]
  COMP --> XYL["Xylem: water up"]
  COMP --> PHO["Phloem: food both ways"]`,
vascular:`flowchart LR
  VT["Vascular Tissues"] --> XY["XYLEM"]
  VT --> PH["PHLOEM"]
  XY --> X1["Cells DEAD"]
  XY --> X2["Water + minerals"]
  XY --> X3["Upward · unidirectional"]
  PH --> Q1["Cells ALIVE (except fibres)"]
  PH --> Q2["Sugar + amino acids"]
  PH --> Q3["All directions"]`,
connective:`flowchart TD
  CT["Connective Tissues"] --> AR["Areolar"]
  CT --> AD["Adipose"]
  CT --> SK["Skeletal"]
  CT --> FL["Fluid"]
  AR --> AR1["Tendon: muscle to bone"]
  AR --> AR2["Ligament: bone to bone"]
  AD --> AD1["Fat storage + heat"]
  SK --> SK1["Bone + cartilage: support"]
  FL --> FL1["Blood: O2 · WBC defence · platelets clot"]
  FL --> FL2["Lymph: defence"]`,
taxonomy:`flowchart TD
  K["Kingdom (highest)"] --> P["Phylum / Division"]
  P --> C["Class"]
  C --> O["Order"]
  O --> F["Family"]
  F --> G["Genus (Capital)"]
  G --> Sp["Species (lowest · interbreed to fertile offspring)"]`,
plantKingdom:`flowchart TD
  PK["Plant Kingdom"] --> CRY["Cryptogamae: spores · no seeds"]
  PK --> PHA["Phanerogamae: seed-bearing"]
  CRY --> TH["Thallophyta: algae (Spirogyra)"]
  CRY --> BR["Bryophyta: first root/shoot (Funaria)"]
  CRY --> PT["Pteridophyta: true root/stem/leaf (ferns)"]
  PHA --> GYM["Gymnosperms: naked seeds (pine, cycas)"]
  PHA --> ANG["Angiosperms: seeds in fruit"]
  ANG --> DI["Dicots: 2 cotyledons · tap root · reticulate"]
  ANG --> MON["Monocots: 1 cotyledon · fibrous · parallel"]`,
animalia:`flowchart TD
  AN["Animalia"] --> INV["Invertebrates"]
  AN --> CH["Chordata / Vertebrata"]
  INV --> PO["Porifera: sponges · spicules (Sycon)"]
  INV --> CO["Coelenterata: radial · nematocysts (Hydra)"]
  INV --> PL["Platyhelminthes: flatworms · flame cells (tapeworm)"]
  INV --> NE["Nematoda: roundworms · pseudocoelom (Ascaris)"]
  INV --> A2["Annelida: first TRUE coelom · segmented (earthworm)"]
  INV --> AR["Arthropoda: largest 80pct · chitin · cockroach 13-chamber heart"]
  INV --> MO["Mollusca: soft body · shell (octopus)"]
  INV --> EC["Echinodermata: spiny · marine · ossicles (starfish)"]
  CH --> PI["Pisces: 2-chamber · gills"]
  CH --> AM["Amphibia: 3-chamber · gills then lungs"]
  CH --> RE["Reptilia: 3-chamber (crocodile = 4) · scales"]
  CH --> AV["Aves: 4-chamber · warm-blooded · feathers"]
  CH --> MA["Mammalia: 4-chamber · hair · mammary · diphyodont"]`,
amoeba:`flowchart LR
  A["Food detected"] --> B["Pseudopodia engulf"]
  B --> C["Food vacuole (phagocytosis)"]
  C --> D["Digestion"]
  D --> E["Absorption + assimilation"]
  E --> F["Egestion"]`,
photosynthesis:`flowchart LR
  CO2["CO2 via stomata"] --> LEAF["Chloroplast: thylakoids / stroma"]
  H2O["H2O via xylem"] --> LEAF
  LIGHT["Sunlight + chlorophyll"] --> LEAF
  LEAF --> GLU["Glucose C6H12O6"]
  LEAF --> O2["O2 released"]`,
movements:`flowchart TD
  MOV["Plant Movements"] --> NAST["Nastic: non-directional"]
  MOV --> TROP["Tropic: directional"]
  NAST --> TN["Thigmonasty: touch-me-not"]
  TROP --> PHO["Phototropism: stems +ve, roots -ve"]
  TROP --> GEO["Geotropism: roots +ve, shoots -ve"]
  TROP --> HYD["Hydrotropism: roots to moisture"]
  TROP --> CHE["Chemotropism: pollen tube to ovule"]
  TROP --> THI["Thigmotropism: tendrils wrap support"]`,
repro:`flowchart TD
  REP["Reproduction"] --> AS["Asexual: vegetative propagation"]
  REP --> SEX["Sexual: via flowers"]
  SEX --> NE["Non-essential: sepals + petals"]
  SEX --> ES["Essential whorls"]
  ES --> AND["Androecium = stamen → pollen (male)"]
  ES --> GYN["Gynoecium = pistil → ovule (female)"]
  AND --> POLL["Pollination"]
  GYN --> POLL
  POLL --> SELF["Self (autogamy)"]
  POLL --> CROSS["Cross (allogamy)"]`,
doubleFert:`flowchart TD
  PG["Pollen gives 2 male nuclei"] --> F1["Nucleus 1 + egg = ZYGOTE"]
  PG --> F2["Nucleus 2 + 2 polar nuclei = TRIPLOID endosperm"]
  F1 --> EM["Embryo to future plant"]
  F2 --> EN["Endosperm to nutrition"]
  EM --> FR["Ovary to fruit · ovules to seeds"]`,
trophic:`flowchart TD
  T1["T1 Producers (grass)"] -->|"10%"| T2["T2 Primary consumers (deer)"]
  T2 -->|"10%"| T3["T3 Secondary (frog)"]
  T3 -->|"10%"| T4["T4 Tertiary (snake)"]
  T4 -->|"10%"| T5["T5 Quaternary"]
  T5 --> DEC["Decomposers"]`,
skin:`flowchart TD
  SKIN["Human Skin"] --> EP["Epidermis: outer · NO blood vessels"]
  SKIN --> DER["Dermis: elastic · keratin → nails 1mm/wk"]
  SKIN --> HYP["Hypodermis: adipose · deepest"]
  SKIN --> FN["Functions"]
  FN --> F1["Protect from infection + dehydration"]
  FN --> F3["Sensory + homeostasis"]
  FN --> F4["Melanin: UV protection"]
  FN --> F5["Vitamin D via UV"]`

const KEY   = 'cm_biomap_v3';

let store = { done: [], best: 0 };
try { const r = localStorage.getItem(KEY); if (r) store = JSON.parse(r); } catch(e) {}
window.store = store;

function save() { try { localStorage.setItem(KEY, JSON.stringify(store)); } catch(e) {} }
const isDone = id => store.done.includes(id);

let cur  = 0;
let mode = 'study';
window.cur  = cur;
window.mode = mode;

/* Centum Index metric helpers */
window._cmNodeOpenedAt = Date.now();
window._cmMcqStats     = {};   /* { nodeId: { total, correct } } */

const $ = s => document.querySelector(s);

/* ── Mermaid ─────────────────────────────────────────────────────── */
let mermaidLib = null;
function runMermaid() {
  if (!mermaidLib) return;
  const nodes = [...document.querySelectorAll('.mermaid:not([data-processed])')];
  if (nodes.length) { try { mermaidLib.run({ nodes }).catch(() => {}); } catch(e) {} }
}
// Wrap import() via new Function() so old iOS Safari (< 14.5) doesn't get a
// parse-time SyntaxError that kills the entire script. The try/catch handles
// browsers that don't support dynamic import at all — diagrams just won't render.
try {
  (new Function('cb', 'import("https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs").then(cb).catch(function(){})'))
  (function(m) {
    mermaidLib = m.default;
    mermaidLib.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        darkMode:           true,
        background:         '#111827',
        mainBkg:            '#1a2235',
        primaryColor:       '#1a2235',
        primaryTextColor:   '#F9FAFB',
        primaryBorderColor: '#2533FF',
        lineColor:          '#6B7280',
        fontFamily:         'Inter, system-ui, sans-serif',
        fontSize:           '13px',
      },
      flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
    });
    runMermaid();
  });
} catch(e) {}

/* ── Nav ─────────────────────────────────────────────────────────── */
function buildNav(filter) {
  filter = filter || '';
  const navEl = $('#nav');
  if (!navEl) return;
  navEl.innerHTML = '';
  CONTENT.chapters.forEach(c => {
    const secs = c.sections.filter(s =>
      !filter || (s.title + ' ' + (s.points||[]).join(' ')).toLowerCase().includes(filter)
    );
    if (!secs.length) return;
    const dc   = c.sections.filter(s => isDone(s.id)).length;
    const wrap = document.createElement('div');
    wrap.className = 'chap';
    wrap.innerHTML = '<button class="chead"><span class="dot"></span>' + c.title + '<span class="cnt">' + dc + '/' + c.sections.length + '</span></button>';
    const ul = document.createElement('ul');
    ul.className = 'seclist';
    secs.forEach(s => {
      const gi = flat.findIndex(f => f.id === s.id);
      const li = document.createElement('li');
      li.innerHTML = '<button data-i="' + gi + '" class="' + (gi===cur?'active ':'') + (isDone(s.id)?'done':'') + '"><span class="chk">' + (isDone(s.id)?'✓':'○') + '</span>' + s.title + '</button>';
      ul.appendChild(li);
    });
    wrap.appendChild(ul);
    navEl.appendChild(wrap);
  });
  navEl.querySelectorAll('[data-i]').forEach(b => b.onclick = () => {
    cur = +b.dataset.i; window.cur = cur;
    mode = 'study';    window.mode = mode;
    setMode(); render(); closeDrawer();
  });
  navEl.querySelectorAll('.chead').forEach(h => h.onclick = () => {
    const ul = h.nextElementSibling;
    ul.style.display = ul.style.display === 'none' ? '' : 'none';
  });
}

function progress() {
  $('#progTxt').textContent = store.done.length + ' / ' + TOTAL;
  $('#progBar').style.width = (store.done.length / TOTAL * 100) + '%';
}

/* ── Builders ────────────────────────────────────────────────────── */
function tableHTML(t) {
  return '<div class="block"><div class="bh">&#9638; ' + (t.title||'TABLE') + '</div><table><thead><tr>' + t.headers.map(function(h){return '<th>'+h+'</th>';}).join('') + '</tr></thead><tbody>' + t.rows.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';}).join('') + '</tbody></table></div>';
}

function trapHTML(tr) {
  return '<div class="block trapbox"><div class="bh">&#9888; EXAM TRAPS</div>' + tr.map(function(t){return '<div class="trap '+(t[0]==='err'?'err':'')+'"><span class="t">'+(t[0]==='err'?'SOURCE ✗':'TRAP')+'</span><p>'+t[1]+'</p></div>';}).join('') + '</div>';
}

function diagHTML(k) {
  return '<div class="block"><div class="bh">&#9672; DIAGRAM</div><div class="diagram"><pre class="mermaid">' + DIAG[k] + '</pre></div></div>';
}

function oneMcq(m, id) {
  return '<div class="mcq" data-mcq="' + id + '"><div class="q"><span class="qn">Q</span>' + m.q + '</div>' +
    m.options.map(function(o,i){return '<button class="opt" data-i="'+i+'" data-a="'+m.answer+'">'+o+'</button>';}).join('') +
    '<div class="expl"><b>Answer.</b> ' + m.explain + '</div></div>';
}

function mcqHTML(ms, base) {
  return '<div class="block"><div class="bh">&#9998; QUICK CHECK</div>' + ms.map(function(m,i){return oneMcq(m, base+'_'+i);}).join('') + '</div>';
}

function wireMcq(scope) {
  scope.querySelectorAll('[data-mcq]').forEach(function(box) {
    box.querySelectorAll('.opt').forEach(function(opt) {
      opt.onclick = function() {
        var a = +opt.dataset.a, ch = +opt.dataset.i;
        box.querySelectorAll('.opt').forEach(function(o) {
          o.disabled = true;
          if (+o.dataset.i === a) o.classList.add('correct');
        });
        if (ch !== a) opt.classList.add('wrong');
        box.querySelector('.expl').classList.add('show');
        /* local Centum Index MCQ tally */
        var nodeId = flat[cur] && flat[cur].id;
        if (nodeId) {
          if (!window._cmMcqStats[nodeId]) window._cmMcqStats[nodeId] = { total: 0, correct: 0 };
          window._cmMcqStats[nodeId].total++;
          if (ch === a) window._cmMcqStats[nodeId].correct++;
        }
      };
    });
  });
}

/* ── Main render (tracker patches this → fires node_opened) ─────── */
function render() {
  if (mode === 'quiz')   return renderQuiz();
  if (mode === 'revise') return renderRevise();

  window._cmNodeOpenedAt = Date.now();

  var s   = flat[cur];
  var vEl = $('#view');
  var html = '<div class="crumb">' + s.chap + '</div><h1 class="node">' + s.title + '</h1>';
  if (s.points) html += '<ul class="points">' + s.points.map(function(p){return '<li>'+p+'</li>';}).join('') + '</ul>';
  if (s.mermaid) html += diagHTML(s.mermaid);
  if (s.tables) s.tables.forEach(function(t){ html += tableHTML(t); });
  if (s.traps && s.traps.length) html += trapHTML(s.traps);
  if (s.mcqs && s.mcqs.length) html += mcqHTML(s.mcqs, s.id);
  html += '<div class="nav"><button id="prev">‹ Prev</button><button id="next">Next ›</button><button id="mark" class="mark ' + (isDone(s.id)?'done':'') + '">' + (isDone(s.id)?'✓ Reviewed':'Mark reviewed') + '</button></div>';
  html += '<div class="hint">← / → or J / K to navigate · Space to mark reviewed</div>';
  vEl.innerHTML = html;

  wireMcq(vEl);
  runMermaid();
  $('#prev').onclick = function() { cur=(cur-1+TOTAL)%TOTAL; window.cur=cur; render(); sync(); };
  $('#next').onclick = function() { cur=(cur+1)%TOTAL;        window.cur=cur; render(); sync(); };
  $('#mark').onclick = toggleDone;
  vEl.parentElement.scrollTop = 0;
  sync();
}
window.render = render;

/* ── toggleDone (tracker patches this → fires node_completed) ────── */
function toggleDone() {
  var id = flat[cur].id;
  if (isDone(id)) store.done = store.done.filter(function(x){ return x !== id; });
  else            store.done.push(id);
  save(); progress(); render();
}
window.toggleDone = toggleDone;

function sync() { buildNav($('#search').value.trim().toLowerCase()); }

/* ── Revise ──────────────────────────────────────────────────────── */
function renderRevise() {
  var allTraps = [];
  flat.forEach(function(s){ (s.traps||[]).forEach(function(t){ allTraps.push({chap:s.chap,sec:s.title,kind:t[0],txt:t[1]}); }); });
  var vEl = $('#view');
  var html = '<div class="crumb">REVISION MODE</div><h1 class="node">Active Recall + Trap Sheet</h1>';
  html += '<p style="color:var(--text-muted);margin-top:-10px;font-size:13.5px">Flip each card to reveal. Every exam trap is listed below.</p>';
  html += '<div class="block"><div class="bh">&#10227; FLASHCARDS &mdash; ' + flat.length + ' NODES</div><div style="padding:8px 12px">';
  flat.forEach(function(s,i){
    html += '<div class="flash" data-f="'+i+'"><div class="ft">'+s.title+' <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-faint)">· '+s.chap+'</span></div>';
    html += '<div class="fb"><ul class="points" style="margin:0">'+(s.points||['(diagram / table node)']).map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>';
    html += '<div class="tap">tap to reveal</div></div>';
  });
  html += '</div></div>';
  html += '<div class="block trapbox"><div class="bh">&#9888; ALL TRAPS &amp; SOURCE ERRORS &mdash; '+allTraps.length+' ITEMS</div>';
  allTraps.forEach(function(t){
    html += '<div class="trap '+(t.kind==='err'?'err':'')+'"><span class="t">'+(t.kind==='err'?'SOURCE ✗':'TRAP')+'</span><p><b style="color:var(--text)">'+t.sec+':</b> '+t.txt+'</p></div>';
  });
  html += '</div>';
  vEl.innerHTML = html;
  vEl.querySelectorAll('.flash').forEach(function(f){ f.onclick = function(){ f.classList.toggle('open'); }; });
  vEl.parentElement.scrollTop = 0;
}

/* ── Quiz ────────────────────────────────────────────────────────── */
var quiz = null;
function renderQuiz() {
  if (!quiz) {
    var all = [];
    flat.forEach(function(s){ (s.mcqs||[]).forEach(function(m){ all.push(m); }); });
    for (var i = all.length-1; i>0; i--) {
      var j = Math.random()*(i+1)|0;
      var tmp = all[i]; all[i] = all[j]; all[j] = tmp;
    }
    quiz = { qs: all, answered: 0, correct: 0 };
  }
  var vEl = $('#view');
  var html = '<div class="crumb">QUIZ MODE</div><h1 class="node">Test Yourself</h1>';
  html += '<div class="quizhead"><span class="pill">'+quiz.qs.length+' QUESTIONS</span>';
  html += '<span class="score">Score <b id="liveScore">'+quiz.correct+'</b> / '+quiz.answered+'</span>';
  html += '<span class="score">Best: <b style="font-size:16px">'+store.best+'%</b></span>';
  html += '<button class="reset" id="reQuiz" style="margin-left:auto">&#8635; NEW SHUFFLE</button></div>';
  quiz.qs.forEach(function(m,i){ html += oneMcq(m,'quiz_'+i); });
  vEl.innerHTML = html;

  vEl.querySelectorAll('[data-mcq]').forEach(function(box) {
    box.querySelectorAll('.opt').forEach(function(opt) {
      opt.onclick = function() {
        if (box.dataset.lock) return;
        box.dataset.lock = '1';
        var a = +opt.dataset.a, ch = +opt.dataset.i;
        box.querySelectorAll('.opt').forEach(function(o){
          o.disabled = true;
          if (+o.dataset.i === a) o.classList.add('correct');
        });
        if (ch !== a) opt.classList.add('wrong'); else quiz.correct++;
        quiz.answered++;
        box.querySelector('.expl').classList.add('show');
        $('#liveScore').textContent = quiz.correct;
        var pct = Math.round(quiz.correct/quiz.qs.length*100);
        if (quiz.answered === quiz.qs.length) {
          if (pct > store.best) { store.best = pct; save(); }
          if (typeof window._cmPostTestScore === 'function') {
            window._cmPostTestScore(quiz.correct, quiz.qs.length, null);
          }
          _cmShowLeaderboard(quiz.correct, quiz.qs.length);
        }
      };
    });
  });
  $('#reQuiz').onclick = function(){ quiz=null; renderQuiz(); };
  vEl.parentElement.scrollTop = 0;
}

/* ── Study leaderboard panel (shown once after quiz completion) ──── */
var _cmLbShown = false;
function _cmShowLeaderboard(myScore, myTotal) {
  if (_cmLbShown) return; // show once per page load; reshuffles don't re-show
  _cmLbShown = true;

  var token = (function(){ try { return localStorage.getItem('cm:access_token'); } catch(e){ return null; } })();
  if (!token) return;

  // Inject styles once
  if (!document.getElementById('cm-lb-style')) {
    var s = document.createElement('style');
    s.id = 'cm-lb-style';
    s.textContent = [
      '#cm-lb{margin:0 0 28px;padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;}',
      '#cm-lb h3{font-family:var(--font-disp);font-size:17px;letter-spacing:.5px;color:var(--text);margin:0 0 14px;}',
      '#cm-lb table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px;}',
      '#cm-lb th{text-align:left;color:var(--text-faint);font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:0 8px 8px 0;border-bottom:1px solid var(--border);}',
      '#cm-lb td{padding:7px 8px 7px 0;color:var(--text-dim);border-bottom:1px solid var(--border);}',
      '#cm-lb tr.you td{color:var(--gold);font-weight:700;}',
      '#cm-lb .rank-num{color:var(--text-faint);}',
      '#cm-lb .my-score{margin-top:10px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}',
      '#cm-lb .err{color:var(--text-faint);font-family:var(--font-mono);font-size:11px;}'
    ].join('');
    document.head.appendChild(s);
  }

  // Insert placeholder while fetching
  var view = $('#view');
  var lb = document.createElement('div');
  lb.id = 'cm-lb';
  lb.innerHTML = '<h3>LEADERBOARD</h3><p class="err">Loading…</p>';
  view.insertBefore(lb, view.firstChild);

  fetch('/api/study/leaderboard', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
  .then(function(data) {
    var rows = (data.entries || []).slice(0, 10);
    var myRank = data.myRank;
    var inTop10 = rows.some(function(r){ return r.rank === (myRank && myRank.rank); });

    var html = '<h3>LEADERBOARD</h3>';
    html += '<table><thead><tr>';
    html += '<th>#</th><th>Name</th><th>Score</th><th>Days</th><th>Acc</th>';
    html += '</tr></thead><tbody>';
    rows.forEach(function(r) {
      var isMe = myRank && r.rank === myRank.rank;
      html += '<tr' + (isMe ? ' class="you"' : '') + '>';
      html += '<td class="rank-num">' + r.rank + '</td>';
      html += '<td>' + _cmEsc(r.name) + (isMe ? ' &#9733;' : '') + '</td>';
      html += '<td>' + r.total_score + '</td>';
      html += '<td>' + r.days_attended + '</td>';
      html += '<td>' + r.accuracy_percent + '%</td>';
      html += '</tr>';
    });
    if (myRank && !inTop10) {
      html += '<tr><td colspan="5" style="color:var(--text-faint);padding:4px 0">⋯</td></tr>';
      html += '<tr class="you">';
      html += '<td class="rank-num">' + myRank.rank + '</td>';
      html += '<td>You &#9733;</td>';
      html += '<td>' + myRank.total_score + '</td>';
      html += '<td>' + myRank.days_attended + '</td>';
      html += '<td>' + myRank.accuracy_percent + '%</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    html += '<p class="my-score">Today: ' + myScore + ' / ' + myTotal + ' correct</p>';
    lb.innerHTML = html;
  })
  .catch(function() {
    lb.innerHTML = '<h3>LEADERBOARD</h3><p class="err">Could not load — check back later.</p>';
  });
}
function _cmEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Mode switcher ───────────────────────────────────────────────── */
function setMode() {
  document.querySelectorAll('.modes button').forEach(function(b){ b.classList.toggle('on', b.dataset.mode===mode); });
}
document.querySelectorAll('.modes button').forEach(function(b) {
  b.onclick = function() {
    mode = b.dataset.mode; window.mode = mode;
    if (mode === 'quiz') quiz = null;
    setMode(); render();
  };
});

/* ── Controls ────────────────────────────────────────────────────── */
$('#search').oninput = function(e){ buildNav(e.target.value.trim().toLowerCase()); };
$('#resetBtn').onclick = function() {
  if (confirm('Clear all progress and best score?')) {
    store = {done:[],best:0}; window.store = store;
    save(); progress(); render(); sync();
  }
};
$('#menuBtn').onclick = function(){ $('#side').classList.toggle('open'); };
function closeDrawer() { $('#side').classList.remove('open'); }

/* ── Keyboard ─────────────────────────────────────────────────────── */
document.addEventListener('keydown', function(e) {
  if (mode !== 'study' || /INPUT|TEXTAREA/.test(document.activeElement.tagName)) return;
  if (e.key === 'ArrowRight' || e.key === 'j') { cur=(cur+1)%TOTAL; window.cur=cur; render(); }
  else if (e.key === 'ArrowLeft' || e.key === 'k') { cur=(cur-1+TOTAL)%TOTAL; window.cur=cur; render(); }
  else if (e.key === ' ') { e.preventDefault(); toggleDone(); }
});

/* ── Mode unlock from viewer (passed as ?unlock=study|revise|quiz) ── */
(function() {
  var unlock  = new URLSearchParams(window.location.search).get('unlock') || 'study';
  var allowed = { study: true, revise: unlock === 'revise' || unlock === 'quiz', quiz: unlock === 'quiz' };
  document.querySelectorAll('.modes button').forEach(function(b) {
    var m = b.dataset.mode;
    if (!allowed[m]) {
      b.setAttribute('data-locked', '1');
      b.style.opacity    = '0.35';
      b.style.cursor     = 'not-allowed';
      b.style.filter     = 'grayscale(0.6)';
      b.title = m === 'revise' ? 'Complete 50% of Study nodes first' : 'Complete Revise first';
    }
  });
  document.querySelectorAll('.modes button').forEach(function(b) {
    var orig = b.onclick;
    b.onclick = function(e) {
      if (b.getAttribute('data-locked')) {
        var msg = b.dataset.mode === 'revise' ? 'Complete 50% of Study nodes first' : 'Complete Revise mode first';
        var t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2235;color:#F9FAFB;padding:10px 22px;border-radius:10px;font-size:13px;font-family:JetBrains Mono,monospace;z-index:9999;border:1px solid rgba(37,51,255,0.3);box-shadow:0 4px 20px rgba(0,0,0,0.6);pointer-events:none';
        document.body.appendChild(t);
        setTimeout(function() { if (t.parentNode) t.remove(); }, 2400);
        return;
      }
      if (orig) orig.call(this, e);
    };
  });
})();

/* ── Init ─────────────────────────────────────────────────────────── */
buildNav(); progress(); setMode(); render();
</script>
<script src="/study/centumania-tracker.js"></script>
</body>
</html>
