<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CentuMania · World History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04100d;--bg2:#081a13;--bg3:#0d2219;
  --gold:#2ec4a0;--gold2:#1a8870;--amber:#25b090;
  --green:#3dd68c;--red:#f06b6b;--blue:#60b0f0;
  --text:#faf8e8;--text2:#c8c4a0;--text3:#7a7860;
  --border:#163028;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
h2.node-h2{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.6rem;color:var(--gold);margin:1.2rem 0 .7rem;border-bottom:1px solid var(--border);padding-bottom:.4rem}
h3.node-h3{font-size:1rem;font-weight:700;color:var(--amber);margin:1rem 0 .4rem;text-transform:uppercase;letter-spacing:.06em}
p.node-p{color:var(--text2);line-height:1.7;margin-bottom:.8rem}
.tbl-wrap{overflow-x:auto;margin:.6rem 0 1rem}
table{width:100%;border-collapse:collapse;font-size:.87rem}
th{background:var(--bg3);color:var(--gold);padding:.5rem .7rem;text-align:left;border:1px solid var(--border);font-weight:600}
td{padding:.45rem .7rem;border:1px solid var(--border);color:var(--text2);vertical-align:top}
tr:nth-child(even) td{background:rgba(255,255,255,.025)}
td b,td strong{color:var(--gold)}
.fact-box{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:var(--radius);padding:.8rem 1rem;margin:.6rem 0 1rem}
.fact-box-title{font-weight:700;color:var(--gold);font-size:.9rem;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.fact-box ul{list-style:none;padding:0}
.fact-box li{color:var(--text2);font-size:.87rem;padding:.25rem 0 .25rem .9rem;border-bottom:1px solid rgba(255,255,255,.05);position:relative}
.fact-box li::before{content:"›";position:absolute;left:0;color:var(--gold2)}
.trap-box{background:rgba(46,196,160,.1);border:1px solid rgba(46,196,160,.35);border-radius:var(--radius);padding:.75rem 1rem;margin:.8rem 0;font-size:.87rem;color:var(--text2);line-height:1.6}
.trap-box b{color:var(--amber)}
.revision-box{background:rgba(96,176,240,.07);border:1px solid rgba(96,176,240,.25);border-radius:var(--radius);padding:.8rem 1rem;margin:.6rem 0 1rem}
.revision-box-title{font-weight:700;color:var(--blue);font-size:.9rem;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.revision-box ul{list-style:none;padding:0}
.revision-box li{color:var(--text2);font-size:.87rem;padding:.25rem 0 .25rem .9rem;border-bottom:1px solid rgba(255,255,255,.05);position:relative}
.revision-box li::before{content:"⚡";position:absolute;left:0;color:var(--blue);font-size:.75rem}
.oneliner-box{background:rgba(61,214,140,.06);border:1px solid rgba(61,214,140,.2);border-radius:var(--radius);padding:.8rem 1rem;margin:.6rem 0 1rem}
.oneliner-box-title{font-weight:700;color:var(--green);font-size:.9rem;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.oneliner-box ul{list-style:none;padding:0}
.oneliner-box li{color:var(--text2);font-size:.87rem;padding:.25rem 0 .25rem .9rem;border-bottom:1px solid rgba(255,255,255,.05);position:relative}
.oneliner-box li::before{content:"🎯";position:absolute;left:0;font-size:.7rem}
.flash-hint{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text3);text-align:center;margin-bottom:.8rem;letter-spacing:.05em}
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.7rem;margin-bottom:.9rem}
.flash-card{perspective:900px;cursor:pointer;height:140px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);padding:.75rem;display:flex;align-items:center;justify-content:center;text-align:center;font-size:.82rem;line-height:1.4;border:1px solid var(--border)}
.flash-front{background:var(--bg3);color:var(--text)}
.flash-back{background:rgba(46,196,160,.12);border-color:rgba(46,196,160,.35);color:var(--gold);transform:rotateY(180deg)}
.flash-reset-row{text-align:center;margin-top:.3rem}
#app{display:flex;flex:1;min-height:0}
#sidebar{display:none;width:280px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.7rem 1.2rem;display:flex;align-items:center;gap:.8rem;flex-shrink:0}
#header h1{font-family:'Instrument Serif',serif;font-style:italic;color:var(--gold);font-size:1.3rem}
#header .stats{margin-left:auto;display:flex;gap:1rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text3)}
#header .stats span{color:var(--gold2)}
#content{flex:1;overflow-y:auto;padding:0}
.dash{padding:2rem;max-width:800px;margin:0 auto}
.dash-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:2rem;color:var(--gold);margin-bottom:.3rem}
.dash-sub{color:var(--text3);font-size:.9rem;margin-bottom:1.5rem}
.progress-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1.5rem}
.progress-label{font-size:.8rem;color:var(--text3);margin-bottom:.4rem;font-family:'JetBrains Mono',monospace}
.progress-bar{background:rgba(255,255,255,.08);border-radius:4px;height:10px}
.progress-fill{background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;height:10px;transition:width .4s}
.xp-display{font-family:'JetBrains Mono',monospace;font-size:1.5rem;color:var(--gold);margin-top:.5rem}
.start-btn{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#05111e;border:none;border-radius:var(--radius);padding:.75rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:1rem}
.start-btn:hover{opacity:.9}
.ch-header{padding:.6rem 1rem;font-size:.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);margin-top:.3rem}
.node-item{display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;position:relative}
.node-item:hover{background:rgba(255,255,255,.05)}
.node-item.active{background:rgba(46,196,160,.08);border-right:3px solid var(--gold)}
.node-item.locked{opacity:.45;cursor:not-allowed}
.node-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;border:2px solid var(--border)}
.node-icon.regular{background:var(--bg3);border-color:var(--border)}
.node-icon.trap{background:rgba(46,196,160,.15);border-color:var(--amber)}
.node-icon.gold{background:rgba(46,196,160,.15);border-color:var(--gold)}
.node-icon.done{background:rgba(61,214,140,.1);border-color:var(--green)}
.node-info{flex:1;min-width:0}
.node-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-xp{font-size:.72rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.node-badge{font-size:.7rem;padding:.15rem .4rem;border-radius:4px;font-weight:700}
.badge-done{background:rgba(61,214,140,.15);color:var(--green)}
.badge-locked{background:rgba(255,255,255,.05);color:var(--text3)}
.badge-open{background:rgba(46,196,160,.15);color:var(--gold)}
.node-view{display:flex;flex-direction:column;height:100%}
.node-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.tab-btn{padding:.7rem 1.5rem;font-size:.87rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text3);border-bottom:3px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover{color:var(--text)}
.tab-content{flex:1;overflow-y:auto;padding:1.5rem;max-width:880px;width:100%}
.mcq-wrap{margin-bottom:1rem}
.mcq-q{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.7rem;line-height:1.5}
.mcq-num{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--gold2);margin-bottom:.3rem}
.mcq-opts{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
.opt-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.6rem .9rem;text-align:left;cursor:pointer;font-size:.87rem;color:var(--text2);transition:all .15s;font-family:'DM Sans',sans-serif}
.opt-btn:hover:not(:disabled){border-color:var(--gold2);color:var(--text)}
.opt-btn.correct{background:rgba(61,214,140,.12);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(240,107,107,.1);border-color:var(--red);color:var(--red)}
.opt-btn.reveal{background:rgba(61,214,140,.07);border-color:rgba(61,214,140,.3);color:var(--green)}
.opt-btn:disabled{cursor:default}
.exp-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.7rem .9rem;font-size:.84rem;color:var(--text3);margin-bottom:1rem;line-height:1.5}
.score-banner{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:1.2rem;text-align:center}
.score-big{font-family:'JetBrains Mono',monospace;font-size:2.5rem;font-weight:700;color:var(--gold)}
.score-label{color:var(--text3);font-size:.87rem;margin-top:.2rem}
.action-btn{border:none;border-radius:8px;padding:.6rem 1.3rem;font-size:.87rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin:.3rem}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#05111e}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--gold2);color:var(--text)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg3);border:1px solid var(--gold);border-radius:var(--radius);padding:.8rem 1.2rem;font-size:.87rem;color:var(--gold);z-index:999;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.drawer-btn{display:none;background:var(--bg2);border:none;border-right:1px solid var(--border);padding:.8rem;cursor:pointer;color:var(--gold);font-size:1.2rem;flex-shrink:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100}
.golden-banner{background:linear-gradient(135deg,rgba(26,136,112,.15),rgba(46,196,160,.08));border:1px solid var(--gold);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;text-align:center;color:var(--gold);font-weight:700}
@media(min-width:769px){
  #sidebar{display:flex;flex-direction:column}
}
@media(max-width:768px){
  #sidebar.open{display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;width:280px;z-index:200}
  .drawer-btn{display:flex;align-items:center;justify-content:center}
  .overlay.show{display:block}
}

.node-nav{display:flex;gap:8px;padding:16px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.nav-btn{font-family:inherit;font-weight:600;font-size:13px;border-radius:8px;padding:9px 14px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);transition:.15s;flex:1;text-align:center}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-btn.home-btn{flex:0 0 auto;background:var(--bg2);color:var(--gold)}
</style>
</head>
<body>
<div id="overlay" class="overlay" onclick="closeDrawer()"></div>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-content"></div>
  </aside>
  <div id="main">
    <div id="header">

        <button class="start-btn" onclick="startJourney()">▶ Start Learning</button>
      </div>
      <div id="node-view" style="display:none;height:100%;flex-direction:column"></div>
    </div>
  </div>
</div>

learn:'<h2 class="node-h2">🌊 Spanish, Portuguese & Age of Exploration</h2><h3 class="node-h3">A3 — Spanish Empire (1492–1976)</h3><div class="tbl-wrap"><table><thead><tr><th>Fact</th><th>Answer</th></tr></thead><tbody><tr><td>Beginning</td><td>1492 — Columbus reached Americas</td></tr><tr><td>Columbus sailed for</td><td>Spain (funded by King Ferdinand & Queen Isabella)</td></tr><tr><td>Columbus reached</td><td>Bahamas (San Salvador) — October 12, 1492</td></tr><tr><td>Columbus thought he reached</td><td>India (hence "Indians")</td></tr><tr><td>Conquistador of Mexico</td><td>Hernán Cortés (defeated Aztecs, 1521)</td></tr><tr><td>Conquistador of Peru</td><td>Francisco Pizarro (defeated Incas, 1532)</td></tr><tr><td>Treaty of Tordesillas (1494)</td><td>Divided New World between Spain & Portugal</td></tr><tr><td>Decline</td><td>Spanish Armada defeated by England (1588)</td></tr><tr><td>Latin American independence</td><td>Early 19th century (1810–1825)</td></tr></tbody></table></div><h3 class="node-h3">A4 — Portuguese Empire (1415–1999)</h3><div class="tbl-wrap"><table><thead><tr><th>Explorer</th><th>Achievement</th><th>Year</th></tr></thead><tbody><tr><td>Bartholomeu Dias</td><td>First to round Cape of Good Hope</td><td>1488</td></tr><tr><td>Christopher Columbus</td><td>Reached Americas (for Spain)</td><td>1492</td></tr><tr><td>Vasco da Gama</td><td>Reached Calicut, India; Cape route</td><td>1498</td></tr><tr><td>Pedro Álvares Cabral</td><td>Discovered Brazil</td><td>1500</td></tr><tr><td>Ferdinand Magellan</td><td>First circumnavigation of Earth (started)</td><td>1519–1522</td></tr></tbody></table></div><div class="tbl-wrap"><table><thead><tr><th>Colony</th><th>Country</th></tr></thead><tbody><tr><td>Brazil</td><td>Portugal</td></tr><tr><td>Angola, Mozambique</td><td>Portugal</td></tr><tr><td>Goa (India)</td><td>Portugal (returned 1961)</td></tr><tr><td>Macau (China)</td><td>Portugal (returned 1999)</td></tr><tr><td>Mexico, South America</td><td>Spain</td></tr></tbody> learn:'<h2 class="node-h2">🗽 American Revolution (1775–1783)</h2><h3 class="node-h3">Background</h3><p class="node-p">13 British colonies on eastern coast of North America. Slogan: <b>"No taxation without representation"</b>. Main grievances: Stamp Act (1765), Townshend Acts (1767), Tea Act (1773).</p><div class="tbl-wrap"><table><thead><tr><th>Year</th><th>Event</th></tr></thead><tbody><tr><td>1770</td><td>Boston Massacre — British soldiers kill 5 colonists</td></tr><tr><td>1773</td><td>Boston Tea Party — colonists dump 342 chests of British tea into Boston Harbour</td></tr><tr><td>1774</td><td>First Continental Congress — 12 colonies meet in Philadelphia</td></tr><tr><td>1775</td><td>Battles of Lexington & Concord — first battles of Revolution</td></tr><tr><td>July 4, 1776</td><td>Declaration of Independence</td></tr><tr><td>1778</td><td>France joins war on American side</td></tr><tr><td>1781</td><td>Battle of Yorktown — British surrender</td></tr><tr><td>1783</td><td>Treaty of Paris — Britain recognises USA independence</td></tr><tr><td>1787</td><td>US Constitution drafted</td></tr><tr><td>1789</td><td>George Washington = 1st President of USA</td></tr></tbody></table></div><h3 class="node-h3">Declaration of Independence</h3><div class="tbl-wrap"><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody><tr><td>Signed</td><td>July 4, 1776 ← USA\'s national day</td></tr><tr><td>Drafted by</td><td>Thomas Jefferson</td></tr><tr><td>Key phrase</td><td>"All men are created equal"</td></tr><tr><td>Approved by</td><td>Second Continental Congress</td></tr></tbody></table></div><div class="tbl-wrap"><table><thead><tr><th>Person</th><th>Role</th></tr></thead><tbody><tr><td>George Washington</td><td>Commander of Continental Army; 1st US President</td></tr><tr><td>Thomas Jefferson</td><td>Drafted Declaration of Independence; 3rd President</td></tr><tr><td>Benjamin Franklin</td><td>Diplomat; secured French alliance</td></tr><tr><td>John Adams</td><td>2nd US President</td></tr><tr><td>Alexander Hamilton</td><td>1st Secretary of Treasury</td></tr></tbody></table></div><div class="fact-box"><div class="fact-box-title">🦅 American Revolution SSC One-Liners</div><ul><li>Boston Tea Party = 1773 (not 1776)</li><li>Declaration of Independence = July 4, 1776</li><li>Treaty of Paris (1783) = ended American Revolution</li><li>Thomas Jefferson wrote Declaration of Independence (not Washington)</li><li>American Revolution inspired French Revolution</li><li>George Washington = Commander of Continental Army AND 1st President</li></ul></div><div class="trap-box"><b>⚠️ Exam Trap:</b> Boston Tea Party = <b>1773</b>; Declaration of Independence = <b>1776</b> — these two dates are frequently swapped. <b>Thomas Jefferson</b> drafted the Declaration, not Washington. There are TWO Treaty of Paris: 1763 (Seven Years\' War) and 1783 (American Revolution).</div>',

learn:'<h2 class="node-h2">🥖 French Revolution (1789–1799)</h2><h3 class="node-h3">Background — Three Estates</h3><div class="tbl-wrap"><table><thead><tr><th>Estate</th><th>Who</th><th>Status</th></tr></thead><tbody><tr><td>1st Estate</td><td>Clergy</td><td>Privileged — no taxes</td></tr><tr><td>2nd Estate</td><td>Nobility</td><td>Privileged — no taxes</td></tr><tr><td>3rd Estate</td><td>Common people (97% of France)</td><td>Taxed heavily; no political power</td></tr></tbody></table></div><p class="node-p">France bankrupt after helping American Revolution. <b>Enlightenment ideas</b> (Voltaire, Rousseau, Montesquieu) spread ideas of liberty and equality.</p><div class="tbl-wrap"><table><thead><tr><th>Year</th><th>Event</th></tr></thead><tbody><tr><td>1789 May</td><td>Estates-General convened by Louis XVI</td></tr><tr><td>June 1789</td><td>National Assembly formed by 3rd Estate</td></tr><tr><td>July 14, 1789</td><td>Storming of the Bastille ← France\'s national day</td></tr><tr><td>Aug 1789</td><td>Declaration of Rights of Man adopted</td></tr><tr><td>1791</td><td>Constitutional Monarchy established</td></tr><tr><td>1793–1794</td><td>Reign of Terror — Robespierre\'s radical phase; ~40,000 executed</td></tr><tr><td>July 1794</td><td>Thermidorian Reaction — Robespierre guillotined</td></tr><tr><td>1795</td><td>Directory takes power (5-man committee)</td></tr><tr><td>1799</td><td>Napoleon\'s coup (18 Brumaire) — ends Revolution</td></tr></tbody></table></div><div class="tbl-wrap"><table><thead><tr><th>Person</th><th>Role</th></tr></thead><tbody><tr><td>King Louis XVI</td><td>Absolute monarch; executed 1793</td></tr><tr><td>Marie Antoinette</td><td>Queen; executed 1793; called "Madame Deficit"</td></tr><tr><td>Maximilien Robespierre</td><td>Leader of Reign of Terror; executed 1794</td></tr><tr><td>Jean-Paul Marat</td><td>Radical journalist; assassinated in bath by Charlotte Corday</td></tr><tr><td>Napoleon Bonaparte</td><td>Rose from Revolution; ended it in 1799</td></tr><tr><td>Marquis de Lafayette</td><td>Hero of both American & French Revolutions</td></tr></tbody></table></div><div class="fact-box"><div class="fact-box-title">🗼 French Revolution SSC One-Liners</div><ul><li>Storming of Bastille = July 14, 1789 = France\'s national day</li><li>Reign of Terror = Robespierre (1793–1794)</li><li>French Revolution slogan = Liberté, Égalité, Fraternité</li><li>Marie Antoinette called "Madame Deficit"</li><li>Declaration of Rights of Man = August 1789</li><li>Napoleon ended French Revolution = 1799</li><li>5 Causes: Financial bankruptcy, Social inequality, Enlightenment ideas, American Revolution inspiration, Food scarcity</li></ul></div><div class="trap-box"><b>⚠️ Exam Trap:</b> Storming of Bastille = <b>July 14</b> (French national day). Bastille was a <b>prison</b>, not a palace. Reign of Terror = <b>Robespierre</b> (who was then guillotined in Thermidorian Reaction 1794). Slogan = Liberté, Égalité, <b>Fraternité</b> (not Liberté, Fraternité, Égalité).</div>',

td><td>Jefferson Davis</td></tr><tr><td>Union President</td><td>Abraham Lincoln</td></tr><tr><td>Emancipation Proclamation</td><td>1863 — Lincoln freed slaves in Confederate states</td></tr><tr><td>Bloodiest battle</td><td>Battle of Gettysburg (1863)</td></tr><tr><td>Ended</td><td>April 9, 1865 — Lee surrendered to Grant at Appomattox</td></tr><tr><td>Lincoln assassinated</td><td>April 14, 1865 by John Wilkes Booth</td></tr><tr><td>13th Amendment</td><td>1865 — abolished slavery throughout USA</td></tr></tbody></table></div><div class="fact-box"><div class="fact-box-title">🐉 Chinese Rev + Civil War SSC One-Liners</div><ul><li>Long March = 1934–1935; ~6,000 miles</li><li>PRC = October 1, 1949 (China\'s national day)</li><li>Mao Zedong = "Great Helmsman"</li><li>Sun Yat-sen = "Father of the Nation" (China)</li><li>Chiang Kai-shek fled to = Taiwan</li><li>Deng Xiaoping = opened China\'s economy (post-1978)</li><li>Emancipation Proclamation = 1863 (freed slaves in Confederate states)</li><li>13th Amendment = 1865 (abolished slavery entirely)</li><li>Lincoln assassinated = April 14, 1865 by John Wilkes Booth</li></ul></div><div class="trap-box"><b>⚠️ Exam Trap:</b> PRC founded = <b>October 1, 1949</b> (China\'s national day). Long March = <b>1934–1935</b> (before WWII). Emancipation Proclamation = <b>1863</b> (freed slaves only in Confederate states); 13th Amendment = <b>1865</b> (freed ALL slaves). Lincoln was assassinated AFTER the war ended (April 14, after April 9 surrender).</div>',

d><tr><th>Year</th><th>Cold War Event</th></tr></thead><tbody><tr><td>1947</td><td>Truman Doctrine — US pledged to contain communism</td></tr><tr><td>1947</td><td>Marshall Plan — $13 billion to rebuild Western Europe</td></tr><tr><td>1948–49</td><td>Berlin Blockade & Airlift (USA supplied West Berlin by air)</td></tr><tr><td>1950–53</td><td>Korean War — 38th Parallel border; UN backed South Korea</td></tr><tr><td>1961</td><td>Berlin Wall built (Aug 13); fell Nov 9, 1989</td></tr><tr><td>1962</td><td>Cuban Missile Crisis — closest to nuclear war</td></tr><tr><td>1964–73</td><td>Vietnam War — USA backed South; withdrew 1973</td></tr></tbody></table></div><div class="fact-box"><div class="fact-box-title">🚀 Cuban Rev & Cold War SSC One-Liners</div><ul><li>Cuban Revolution = January 1, 1959 (Fidel Castro)</li><li>Bay of Pigs = 1961 (US failed invasion of Cuba)</li><li>Cuban Missile Crisis = October 1962 (13 days)</li><li>Cold War: 1947–1991</li><li>NATO = 1949; Warsaw Pact = 1955</li><li>Berlin Wall built = August 13, 1961; fell = November 9, 1989</li><li>Korean War = 1950–1953; border = 38th Parallel</li><li>Vietnam War ended = April 30, 1975; US withdrew = 1973</li></ul></div><div class="trap-box"><b>⚠️ Exam Trap:</b> Cuban Missile Crisis = <b>October 1962</b> (13 days). Bay of Pigs = <b>1961</b> (separate earlier event). Berlin Wall <b>built 1961</b>; <b>fell 1989</b> — these are often confused. Korean War ended with <b>armistice</b> (1953) — no formal peace treaty to this day.</div>',

learn:'<h2 class="node-h2">⚔️ World War I — Background & Causes</h2><h3 class="node-h3">Long-Term Causes: MAIN</h3><div class="tbl-wrap"><table><thead><tr><th>Letter</th><th>Cause</th><th>Detail</th></tr></thead><tbody><tr><td>M</td><td>Militarism</td><td>European powers building massive armies/navies; arms race</td></tr><tr><td>A</td><td>Alliances</td><td>Triple Alliance vs Triple Entente — any conflict drags everyone in</td></tr><tr><td>I</td><td>Imperialism</td><td>Competition for colonies in Africa & Asia creating tensions</td></tr><tr><td>N</td><td>Nationalism</td><td>Ethnic groups wanting independence; pan-Slavism vs pan-Germanism</td></tr></tbody></table></div><h3 class="node-h3">Alliance System</h3><div class="tbl-wrap"><table><thead><tr><th>Alliance</th><th>Year</th><th>Members</th></tr></thead><tbody><tr><td>Triple Alliance</td><td>1882</td><td>Germany, Austria-Hungary, Italy</td></tr><tr><td>Triple Entente</td><td>1907</td><td>France, Russia, Britain</td></tr></tbody></table></div><p class="node-p"><em>Italy switched to Entente side in 1915</em></p><h3 class="node-h3">The Spark — Assassination of Archduke Franz Ferdinand</h3><div class="tbl-wrap"><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody><tr><td>Who was killed</td><td>Archduke Franz Ferdinand — heir to Austro-Hungarian throne</td></tr><tr><td>Date</td><td>June 28, 1914</td></tr><tr><td>Location</td><td>Sarajevo, Bosnia</td></tr><tr><td>Assassin</td><td>Gavrilo Princip (member of "Black Hand" — Serbian nationalist group)</td></tr><tr><td>Chain reaction</td><td>Austria-Hungary blamed Serbia → ultimatum → Serbia partly accepted → Austria declared war</td></tr></tbody></table></div><h3 class="node-h3">War Sides</h3><div class="tbl-wrap"><table><thead><tr><th>Side</th><th>Key Members</th></tr></thead><tbody><tr><td>Allied Powers (Entente)</td><td>France, Britain, Russia, Italy (1915), USA (1917), Japan, Serbia</td></tr><tr><td>Central Powers</td><td>Germany, Austria-Hungary, Ottoman Empire, Bulgaria</td></tr></tbody></table></div><div class="tbl-wrap"><table><thead><tr><th>Year</th><th>Event</th></tr></thead><tbody><tr><td>July 28, 1914</td><td>Austria-Hungary declares war on Serbia — WWI begins</td></tr><tr><td>Aug 1914</td><td>Germany invades Belgium → Britain declares war</td></tr><tr><td>1915</td><td>Gallipoli Campaign (failed Allied attempt vs Ottomans)</td></tr><tr><td>1915</td><td>Sinking of Lusitania (1,198 killed including 128 Americans)</td></tr><tr><td>1916</td><td>Battle of Verdun — bloodiest; ~700,000 casualties</td></tr><tr><td>1916</td><td>Battle of Somme — 60,000 British casualties on Day 1</td></tr><tr><td>1916</td><td>Battle of Jutland — only major naval battle</td></tr><tr><td>April 1917</td><td>USA enters war (Zimmermann Telegram + Lusitania)</td></tr><tr><td>Nov 11, 1918</td><td>ARMISTICE — WWI ends (11th hour, 11th day, 11th month)</td></tr></tbody></table></div><div class="fact-box"><div class="fact-box-title">⚔️ WWI Causes SSC One-Liners</div><ul><li>MAIN = Militarism, Alliances, Imperialism, Nationalism</li><li>Assassin = Gavrilo Princip; Location = Sarajevo; Victim = Franz Ferdinand</li><li>Date of assassination = June 28, 1914</li><li>WWI began (war declared) = July 28, 1914</li><li>Black Hand = Serbian nationalist secret society</li><li>Triple Alliance = Germany + Austria-Hungary + Italy (Italy switched sides 1915)</li></ul></div><div class="trap-box"><b>⚠️ Exam Trap:</b> Assassination = <b>June 28, 1914</b>; WWI started (war declared) = <b>July 28, 1914</b> — one month gap. Assassin = <b>Gavrilo Princip</b> (not the Black Hand directly; he was a member). Italy was in Triple Alliance but switched to <b>Entente side in 1915</b>.</div>',

learn:'<h2 class="node-h2">📜 WWI — Events, Weapons & Results</h2><h3 class="node-h3">New Weapons in WWI</h3><div class="tbl-wrap"><table><thead><tr><th>Weapon</th><th>Detail</th></tr></thead><tbody><tr><td>Poison Gas</td><td>First used by Germany (chlorine gas, 1915 at Ypres)</td></tr><tr><td>Tanks</td><td>First used by Britain (Battle of Somme, 1916)</td></tr><tr><td>Submarines (U-boats)</td><td>Germany\'s naval weapon</td></tr><tr><td>Airplanes</td><td>First used in warfare</td></tr><tr><td>Machine guns</td><td>Made frontal attacks deadly</td></tr></tbody></table></div><h3 class="node-h3">Zimmermann Telegram (1917)</h3><p class="node-p">Germany secretly proposed <b>military alliance with Mexico</b> against USA. Intercepted by Britain; shown to USA → USA entered war. Sent by German Foreign Secretary <b>Arthur Zimmermann</b>.</p><h3 class="node-h3">Treaty of Versailles (1919) — Germany</h3><div class="tbl-wrap"><table><thead><tr><th>Clause</th><th>Detail</th></tr></thead><tbody><tr><td>War Guilt Clause (Article 231)</td><td>Germany accepted full blame for war</td></tr><tr><td>Reparations</td><td>Germany paid £6.6 billion (33 billion USD)</td></tr><tr><td>Territory</td><td>Lost Alsace-Lorraine (to France), West Prussia, colonies</td></tr><tr><td>Military</td><td>Army limited to 100,000; no air force; no submarines</td></tr><tr><td>Rhineland</td><td>Demilitarised zone</td></tr><tr><td>League of Nations</td><td>Created (but USA did NOT join)</td></tr></tbody></table></div><div class="tbl-wrap"><table><thead><tr><th>Treaty</th><th>Country</th><th>Key Provision</th></tr></thead><tbody><tr><td>Treaty of Versailles (1919)</td><td>Germany</td><td>War guilt; reparations; military limits</td></tr><tr><td>Treaty of St. Germain (1919)</td><td>Austria</td><td>Breakup of Austria-Hungary; new nations</td></tr><tr><td>Treaty of Trianon (1920)</td><td>Hungary</td><td>Hungary lost 2/3 of territory</td></tr><tr><td>Treaty of Sèvres (1920)</td><td>Ottoman Empire</td><td>Partitioned; replaced by Treaty of Lausanne (1923)</td></tr></tbody></table></div><h3 class="node-h3">Woodrow Wilson\'s 14 Points (1918)</h3><div class="fact-box"><div class="fact-box-title">📜 Wilson\'s Key Points</div><ul><li>1. No secret treaties</li><li>2. Freedom of the seas</li><li>3. Self-determination for all nations</li><li>14. League of Nations (most important)</li></ul></div><div class="tbl-wrap"><table><thead><tr><th>WWI Result</th><th>Detail</th></tr></thead><tbody><tr><td>Deaths</td><td>~20 million (10M military + 10M civilian)</td></tr><tr><td>Empires collapsed</td><td>4: German, Austro-Hungarian, Ottoman, Russian</td></tr><tr><td>New nations</td><td>Poland, Czechoslovakia, Yugoslavia, Finland, Estonia, Latvia, Lithuania</td></tr><tr><td>League of Nations</td><td>Formed 1920 — first international peacekeeping body</td></tr><tr><td>Seeds planted</td><td>Humiliation of Germany → WWII</td></tr></tbody></table></div><div class="fact-box"><div class="fact-box-title">📜 WWI Results SSC One-Liners</div><ul><li>WWI ended = November 11, 1918 (11:00 AM — "11th hour of 11th day of 11th month")</li><li>Armistice Day = November 11 (now Remembrance Day)</li><li>Treaty of Versailles = 1919 (signed June 28 — exactly 5 years after assassination)</li><li>USA didn\'t join League of Nations despite Wilson proposing it</li><li>Lusitania sunk = 1915 by German U-boat</li><li>First use of tanks = Britain (1916, Somme)</li><li>First use of poison gas = Germany (1915, Ypres)</li><li>4 empires fell: German, Austro-Hungarian, Ottoman, Russian</li></ul></div><div class="trap-box"><b>⚠️ Exam Trap:</b> First tanks = <b>Britain (1916)</b>; first poison gas = <b>Germany (1915)</b>. USA did NOT join League of Nations (<b>US Senate rejected</b> it — despite Wilson proposing it). Treaty of Versailles signed <b>June 28, 1919</b> = exactly 5 years after Franz Ferdinand\'s assassination on June 28, 1914.</div>',

><th>Key WWII Event</th></tr></thead><tbody><tr><td>Sept 1, 1939</td><td>Germany invades Poland → WWII begins</td></tr><tr><td>Sept 3, 1939</td><td>Britain & France declare war on Germany</td></tr><tr><td>May 1940</td><td>Dunkirk evacuation — 338,000 Allied troops rescued from France</td></tr><tr><td>June 1940</td><td>France falls to Germany; Vichy France established</td></tr><tr><td>July–Oct 1940</td><td>Battle of Britain — German Luftwaffe vs British RAF (Britain wins)</td></tr><tr><td>June 22, 1941</td><td>Operation Barbarossa — Germany invades USSR</td></tr><tr><td>Dec 7, 1941</td><td>Japan attacks Pearl Harbor, Hawaii — USA enters war</td></tr><tr><td>1942</td><td>Battle of Midway — USA defeats Japan\'s navy (turning point in Pacific)</td></tr><tr><td>Feb 1943</td><td>Battle of Stalingrad — Germany defeated; turning point in Europe</td></tr><tr><td>June 6, 1944</td><td>D-Day / Operation Overlord — Allied landing in Normandy, France</td></tr></tbody></table></div><div class="fact-box"><div class="fact-box-title">🔥 WWII Key SSC One-Liners</div><ul><li>WWII started: September 1, 1939 (Germany invades Poland)</li><li>Battle of Britain = 1940 (RAF vs Luftwaffe) — Britain won</li><li>Operation Barbarossa = June 22, 1941 (Germany invades USSR)</li><li>Pearl Harbor = December 7, 1941 (USA enters war)</li><li>Battle of Stalingrad = turning point in Europe (Feb 1943)</li><li>Battle of Midway = turning point in Pacific (1942)</li><li>D-Day = June 6, 1944, Normandy France</li><li>Mussolini\'s "March on Rome" = 1922</li></ul></div><div class="trap-box"><b>⚠️ Exam Trap:</b> Mussolini came to power <b>1922</b>; Hitler came to power <b>1933</b>. Stalingrad = turning point in <b>Europe</b>; Midway = turning point in <b>Pacific</b>. Pearl Harbor = <b>December 7, 1941</b> (not December 8). Dunkirk = <b>evacuation</b> (rescue), not a victory.</div>',

learn:'<h2 class="node-h2">💀 WWII — Holocaust, Atomic Bombs & Results</h2><h3 class="node-h3">The Holocaust</h3><div class="tbl-wrap"><table><thead><tr><th>Fact</th><th>Answer</th></tr></thead><tbody><tr><td>What</td><td>Systematic genocide of Jews by Nazi Germany</td></tr><tr><td>Killed</td><td>~6 million Jews + 5–6 million others (Roma, disabled, homosexuals, communists)</td></tr><tr><td>Method</td><td>Concentration camps / Extermination camps</td></tr><tr><td>Key camp</td><td>Auschwitz (Poland) — largest; ~1.1 million killed</td></tr><tr><td>Nazi ideology</td><td>Jews blamed for Germany\'s problems</td></tr><tr><td>Term</td><td>"Final Solution" = Nazi\'s plan to exterminate all Jews</td></tr><tr><td>Post-war</td><td>Nuremberg Trials (1945–46) — Nazi leaders tried for war crimes</td></tr></tbody></table></div><h3 class="node-h3">Atomic Bombs (1945)</h3><div class="tbl-wrap"><table><thead><tr><th>Fact</th><th>Hiroshima</th><th>Nagasaki</th></tr></thead><tbody><tr><td>Date</td><td>August 6, 1945</td><td>August 9, 1945</td></tr><tr><td>Bomb name</td><td>"Little Boy"</td><td>"Fat Man"</td></tr><tr><td>Aircraft</td><td>Enola Gay</td><td>Bockscar</td></tr><tr><td>Casualties</td><td>~140,000</td><td>~70,000</td></tr></tbody></table></div><div class="tbl-wrap"><table><thead><tr><th>Key Atomic Bomb Fact</th><th>Answer</th></tr></thead><tbody><tr><td>Ordered by</td><td>US President Harry S. Truman</td></tr><tr><td>Japan surrendered</td><td>September 2, 1945 (VJ Day)</td></tr><tr><td>Total WWII deaths</td><td>~70–85 million (deadliest conflict in history)</td></tr></tbody></table></div><h3 class="node-h3">Key WWII Dates</h3><div class="tbl-wrap"><table><thead><tr><th>Event</th><th>Date</th></tr></thead><tbody><tr><td>Hitler\'s suicide</td><td>April 30, 1945 (Berlin bunker)</td></tr><tr><td>Mussolini killed</td><td>April 28, 1945</td></tr><tr><td>VE Day (Victory in Europe)</td><td>May 8, 1945</td></tr><tr><td>Hiroshima bombed</td><td>August 6, 1945</td></tr><tr><td>Nagasaki bombed</td><td>August 9, 1945</td></tr><tr><td>Japan surrenders (WWII ends)</td><td>September 2, 1945</td></tr></tbody></table></div><h3 class="node-h3">Nuremberg Trials (1945–1946)</h3><p class="node-p"><b>International Military Tribunal</b> at Nuremberg, Germany. Nazi leaders tried for war crimes, crimes against humanity, crimes against peace. <b>12 sentenced to death</b> (including Göring — committed suicide before execution). Established principle: individuals responsible for war crimes even under government orders.</p><div class="tbl-wrap"><table><thead><tr><th>WWII Result</th><th>Detail</th></tr></thead><tbody><tr><td>Dead</td><td>~70–85 million — deadliest conflict in history</td></tr><tr><td>Two superpowers</td><td>USA & USSR</td></tr><tr><td>United Nations</td><td>Founded 1945</td></tr><tr><td>Cold War</td><td>Began</td></tr><tr><td>Marshall Plan</td><td>USA helped rebuild Western Europe (~$13 billion)</td></tr><tr><td>NATO</td><td>Formed 1949</td></tr><tr><td>Germany</td><td>Divided into West Germany & East Germany</td></tr><tr><td>Israel</td><td>State of Israel created (1948)</td></tr></tbody></table></div><div class="fact-box"><div class="fact-box-title">💀 WWII Results SSC One-Liners</div><ul><li>VE Day = May 8, 1945 (Victory in Europe)</li><li>Hiroshima = August 6, 1945 (Little Boy; Enola Gay)</li><li>Nagasaki = August 9, 1945 (Fat Man; Bockscar)</li><li>Atomic bomb ordered by: Truman; Japan surrendered September 2, 1945</li><li>Hitler died: April 30, 1945 (suicide)</li><li>Nuremberg Trials = first international war crimes tribunal</li><li>Auschwitz = largest Nazi extermination camp (Poland)</li></ul></div><div class="trap-box"><b>⚠️ Exam Trap:</b> Hiroshima bomb name = <b>"Little Boy"</b>; Nagasaki = <b>"Fat Man"</b>. Aircraft for Hiroshima = <b>Enola Gay</b>; Nagasaki = Bockscar. VE Day = <b>May 8</b> (Europe); Japan surrendered = <b>September 2</b>. "Final Solution" = Holocaust (extermination of Jews) — not the same as the Holocaust itself (term for the broader genocide).</div>',

let S={xp:0,done:{},mcq:{}};
function loadState(){try{const d=localStorage.getItem(SK);if(d)S=JSON.parse(d);}catch(e){}}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

function seqNodes(){const a=[];CHAPTERS.forEach(c=>c.nodes.forEach(n=>a.push(n)));return a.sort((a,b)=>a.seqIdx-b.seqIdx);}
function regularNodes(){return seqNodes().filter(n=>n.type!=='gold');}
function isUnlocked(nid){
  const sn=seqNodes();const idx=sn.findIndex(n=>n.id===nid);if(idx===0)return true;
  const rn=regularNodes();const rPassed=rn.filter(n=>S.done[n.id]).length;
  const nd=sn[idx];if(nd.type==='gold'){return rPassed>=Math.ceil(rn.length*0.8);}
  const prev=sn[idx-1];return !!S.done[prev.id];
}

function buildSidebar(){
  let h='';
  CHAPTERS.forEach(ch=>{
    h+=`<div class="ch-header">${ch.title}</div>`;
    ch.nodes.forEach(nd=>{
      const locked=!isUnlocked(nd.id);
      const done=S.done[nd.id];
      const icon=done?'✓':(nd.type==='gold'?'🏹':nd.type==='trap'?'⚠':'○');
      const iClass=done?'done':nd.type;
      const badge=done?`<span class="node-badge badge-done">DONE</span>`:
        locked?`<span class="node-badge badge-locked">🔒</span>`:
        `<span class="node-badge badge-open">OPEN</span>`;
      const act=nd.id===window._curNode?' active':'';
      h+=`<div class="node-item${locked?' locked':''}${act}" onclick="${locked?'showToast(\'Complete previous node first!\')':'openNode(\''+nd.id+'\')'}">
        <div class="node-icon ${iClass}">${icon}</div>
        <div class="node-info">
          <div class="node-name">${nd.title}</div>
          <div class="node-xp">${nd.xp} XP</div>
        </div>${badge}</div>`;
    });
  });
  document.getElementById('sidebar-content').innerHTML=h;
}

function updateHeader(){
  const rn=regularNodes();const done=rn.filter(n=>S.done[n.id]).length;
  document.getElementById('hdr-xp').textContent=S.xp;
  document.getElementById('hdr-done').textContent=done;
  document.getElementById('hdr-total').textContent=seqNodes().length;
}
function updateDash(){
  const rn=regularNodes();const done=rn.filter(n=>S.done[n.id]).length;
  const pct=Math.round(done/rn.length*100);
  document.getElementById('dash-bar').style.width=pct+'%';
  document.getElementById('dash-xp').textContent=S.xp;
}
function showDash(){
  window._curNode=null;
  document.getElementById('dash-view').style.display='';
  document.getElementById('node-view').style.display='none';
  updateDash();buildSidebar();updateHeader();
}
function startJourney(){
  const first=seqNodes()[0];openNode(first.id);
}

let _curTab='learn';
function openNode(nid){
  if(!isUnlocked(nid)){showToast('Complete previous node first!');return;}
  window._curNode=nid;
  const nd=seqNodes().find(n=>n.id===nid);
  track('node_opened',{node_id:nd.id,node_title:nd.title,node_type:nd.type,xp:nd.xp});
  document.getElementById('dash-view').style.display='none';
  const nv=document.getElementById('node-view');
  nv.style.display='flex';nv.style.flexDirection='column';nv.style.height='100%';
  _curTab='learn';
  renderNodeView(nd);
  buildSidebar();closeDrawer();
}
function switchTab(t){_curTab=t;const nd=seqNodes().find(n=>n.id===window._curNode);renderNodeView(nd);}
function renderNodeView(nd){
  const nv=document.getElementById('node-view');
  const testLbl=nd.type==='gold'?'Revision':'Test (10 Q)';
  nv.innerHTML=`<div class="node-tabs">
    <button class="tab-btn${_curTab==='learn'?' active':''}" onclick="switchTab('learn')">📖 Learn</button>
    <button class="tab-btn${_curTab==='flash'?' active':''}" onclick="switchTab('flash')">🗂 Flashcards</button>
    ${nd.type!=='gold'?`<button class="tab-btn${_curTab==='test'?' active':''}" onclick="switchTab('test')">${testLbl}</button>`:''}
  </div><div class="tab-content" id="tab-body"></div><div class="node-nav" id="node-nav"></div>`;
  const body=document.getElementById('tab-body');
  if(_curTab==='learn'){
    let h='';
    if(nd.type==='gold')h=`<div class="golden-banner">🏹 Golden Node — Master Revision — All content unlocked!</div>`+nd.learn;
    else h=nd.learn;
    if(nd.revision&&nd.revision.length){
      h+='<div class="revision-box"><div class="revision-box-title">⚡ 30 Second Revision</div><ul>';
      nd.revision.forEach(r=>h+='<li>'+r+'</li>');
      h+='</ul></div>';
    }
    if(nd.oneliners&&nd.oneliners.length){
      h+='<div class="oneliner-box"><div class="oneliner-box-title">🎯 20 Exam One-Liners</div><ul>';
      nd.oneliners.forEach(o=>h+='<li>'+o+'</li>');
      h+='</ul></div>';
    }
    body.innerHTML=h;
  } else if(_curTab==='flash'){
    buildFlashPane(nd,body);
  } else {
    buildTestPane(nd,body);
  }
  buildNodeNavWH(nd);
}
function buildFlashPane(nd,body){
  const cards=nd.flashcards||[];
  if(!cards.length){body.innerHTML='<p style="color:var(--text3);text-align:center;padding:2rem">No flashcards for this node yet.</p>';return;}
  let h='<p class="flash-hint">TAP A CARD TO FLIP • '+cards.length+' CARDS</p><div class="flash-grid">';
  cards.forEach((c,i)=>{
    h+='<div class="flash-card" id="fc-'+nd.id+'-'+i+'" onclick="this.classList.toggle(\'flipped\')">'+
      '<div class="flash-inner">'+
      '<div class="flash-front">'+c.q+'</div>'+
      '<div class="flash-back">'+c.a+'</div>'+
      '</div></div>';
  });
  h+='</div><div class="flash-reset-row"><button class="opt-btn" onclick="resetFlash(\''+nd.id+'\')">↺ Reset All Cards</button></div>';
  body.innerHTML=h;
}
function resetFlash(nid){
  document.querySelectorAll('[id^="fc-'+nid+'-"]').forEach(c=>c.classList.remove('flipped'));
}
function buildTestPane(nd,body){
  if(!S.mcq[nd.id])S.mcq[nd.id]={answers:[],faa:[],lastScore:null};
  const ms=S.mcq[nd.id];
  const attempted=ms.answers.length===nd.mcqs.length;
  if(attempted&&ms.lastScore!==null){
    const sc=ms.lastScore;
    const pass=sc===nd.mcqs.length;
    body.innerHTML=`<div class="score-banner">
      <div class="score-big">${sc}/${nd.mcqs.length}</div>
      <div class="score-label">${pass?'🎉 Perfect! Node Complete!':'Keep going — you need 10/10 to unlock next node'}</div>
    </div>
    ${pass?`<button class="action-btn btn-gold" onclick="showDash()">← Dashboard</button>`
      :`<button class="action-btn btn-gold" onclick="startFresh('${nd.id}')">↺ Retry (New Attempt)</button>
       <button class="action-btn btn-outline" onclick="switchTab('learn')">📖 Review Notes</button>`}
    <hr style="border-color:var(--border);margin:1rem 0">
    ${nd.mcqs.map((q,i)=>{
      const ua=ms.answers[i]??-1;const correct=q.a;
      const icon=ua===correct?'✓':'✗';const col=ua===correct?'var(--green)':'var(--red)';
      const opts=q.o.map((o,oi)=>{
        const cls=oi===correct?'correct':oi===ua&&ua!==correct?'wrong':'';
        return `<div class="opt-btn ${cls}" style="margin-bottom:.3rem">${o}</div>`;
      }).join('');
      return `<div class="mcq-wrap">
        <div class="mcq-num" style="color:${col}">${i+1}/${nd.mcqs.length} ${icon}</div>
        <div class="mcq-q">${q.q}</div>
        <div class="mcq-opts">${opts}</div>
        <div class="exp-box">💡 ${q.e}</div></div>`;
    }).join('')}`;
    return;
  }
  // fresh attempt
  let h='';
  nd.mcqs.forEach((q,i)=>{
    const answered=ms.answers[i]!==undefined;
    const ua=ms.answers[i]??-1;
    const faa=ms.faa[i];
    const opts=q.o.map((o,oi)=>{
      let cls='';
      if(answered){cls=oi===q.a?'correct':oi===ua&&ua!==q.a?'wrong':faa&&oi===q.a?'reveal':'';}
      const dis=answered?'disabled':'';
      return `<button class="opt-btn ${cls}" ${dis} onclick="answer('${nd.id}',${i},${oi})">${o}</button>`;
    }).join('');
    const expHtml=answered?`<div class="exp-box">💡 ${q.e}</div>`:'';
    h+=`<div class="mcq-wrap" id="q${i}">
      <div class="mcq-num">Question ${i+1} of ${nd.mcqs.length}</div>
      <div class="mcq-q">${q.q}</div>
      <div class="mcq-opts">${opts}</div>${expHtml}</div>`;
  });
  const allAnswered=ms.answers.length===nd.mcqs.length;
  const finBtn=allAnswered?`<button class="action-btn btn-gold" onclick="finishAttempt('${nd.id}')">Submit & See Score →</button>`:'';
  body.innerHTML=h+finBtn;
}

function startFresh(nid){
  if(!S.mcq[nid])S.mcq[nid]={answers:[],faa:[],lastScore:null};
  S.mcq[nid].answers=[];S.mcq[nid].faa=[];S.mcq[nid].lastScore=null;
  saveState();switchTab('test');
}
function answer(nid,qi,oi){
  if(!S.mcq[nid])S.mcq[nid]={answers:[],faa:[],lastScore:null};
  const ms=S.mcq[nid];
  if(ms.answers[qi]!==undefined)return;
  if(!ms.faa[qi])ms.faa[qi]=true;
  ms.answers[qi]=oi;
  saveState();
  const nd=seqNodes().find(n=>n.id===nid);
  const body=document.getElementById('tab-body');
  buildTestPane(nd,body);
  // scroll to question
  const el=document.getElementById('q'+qi);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function finishAttempt(nid){
  const nd=seqNodes().find(n=>n.id===nid);
  const ms=S.mcq[nid];
  const sc=nd.mcqs.reduce((acc,q,i)=>acc+(ms.answers[i]===q.a?1:0),0);
  if(!S.attempts)S.attempts={};
  S.attempts[nid]=(S.attempts[nid]||0)+1;
  if(S.attempts[nid]===1)ms.faaPct=Math.round(sc/nd.mcqs.length*100);
  const faaPct=ms.faaPct||0;
  ms.lastScore=sc;
  if(sc===nd.mcqs.length){
    S.done[nid]=true;S.xp+=nd.xp;
    track('node_completed',{node_id:nid,node_title:nd.title,xp_earned:nd.xp,score:sc,total:nd.mcqs.length,faa_pct:faaPct,attempts:S.attempts[nid]});
    showToast('🎉 Perfect! +'+nd.xp+' XP! Node unlocked!');
  } else {
    track('mcq_completed',{node_id:nid,node_title:nd.title,score:sc,total:nd.mcqs.length,pct:Math.round(sc/nd.mcqs.length*100),faa_pct:faaPct,passed:false,attempts:S.attempts[nid]});
    showToast('Score: '+sc+'/'+nd.mcqs.length+' — Need 10/10 to unlock next node');
  }
  saveState();updateHeader();buildSidebar();
  const body=document.getElementById('tab-body');buildTestPane(nd,body);
}
function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}
function openDrawer(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show');}
function closeDrawer(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}


/* ── METRICS ── */
let _mToken=null,_mSid=null;
function initMetrics(){
  // Supabase stores the session under a key like `sb-<ref>-auth-token`
  // in either localStorage or sessionStorage depending on the user's "keep me
  // signed in" choice (see centumania-mvp/src/lib/supabase/client.ts).
  try {
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  } catch(e){}
  _mSid='wh1-'+(Date.now().toString(36));
}
function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},
    body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})
  }).catch(()=>{});
}
initMetrics();track('material_opened',{material:'world_history_part1'});loadState();showDash();

function buildNodeNavWH(nd){
  const sn=seqNodes();
  const idx=sn.findIndex(n=>n.id===nd.id);
  const prev=idx>0?sn[idx-1]:null;
  const next=sn[idx+1]||null;
  const nextOk=next&&isUnlocked(next.id);
  const nav=document.getElementById('node-nav');if(!nav)return;
  nav.innerHTML=
    `<button class="nav-btn"${prev?'':' disabled'}${prev?` onclick="openNode('${prev.id}')"`:''}>← ${prev?prev.title:'Start'}</button>`+
    `<button class="nav-btn home-btn" onclick="showDash()">⊞ Dashboard</button>`+
    `<button class="nav-btn"${nextOk?'':' disabled'}${nextOk?` onclick="openNode('${next.id}')"`:''}>→ ${next?next.title:'End'}</button>`;
}
