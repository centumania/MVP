<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SSC English · Conjunctions & Sentence Correction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141f1c;--bg2:#111a17;--panel:#1a2a25;--panel2:#1e3029;--line:#254033;
  --ink:#e8f5f0;--ink2:#9dc4b4;--ink3:#5a8070;
  --green:#3dd68c;--green2:#2ab572;--green-glow:rgba(61,214,140,.13);
  --teal:#22d3c8;--gold:#f0bc45;--gold-bg:rgba(240,188,69,.12);
  --red:#f06b6b;--red-bg:rgba(240,107,107,.10);
  --blue:#4f8ef7;--violet:#a78bfa;--violet-bg:rgba(167,139,250,.11);
  --mono:"JetBrains Mono",monospace;--serif:"Instrument Serif",serif;--sans:"DM Sans",sans-serif;
  --nav-h:56px;--aside-w:264px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px}
.shell{display:grid;grid-template-rows:var(--nav-h) 1fr;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--line);background:rgba(17,26,23,.97);backdrop-filter:blur(14px);z-index:60}
.logo{font-family:var(--serif);font-size:19px;font-style:italic;color:var(--green);display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0}
.nav-stats{display:flex;gap:14px;align-items:center;margin-left:auto}
.stat{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--ink2)}
.stat b{font-size:13px}
.stat.xp b{color:var(--gold)}.stat.vis b{color:var(--teal)}.stat.trap b{color:var(--red)}
.body{display:grid;grid-template-columns:var(--aside-w) 1fr;overflow:hidden;height:calc(100vh - var(--nav-h))}
aside{background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto}
aside::-webkit-scrollbar{width:3px}aside::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
main{overflow-y:auto;background:var(--bg)}
main::-webkit-scrollbar{width:4px}main::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.sidebar-inner{padding:10px 8px 60px}
.ch-group{margin-bottom:3px}
.ch-toggle{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink2);padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:.13s;font-family:var(--sans)}
.ch-toggle:hover,.ch-toggle.open{background:var(--panel);color:var(--ink)}
.ch-toggle .cht-pct{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-left:auto}
.ch-toggle.open .cht-pct{color:var(--green)}
.node-items{display:none;padding:3px 4px 3px 10px}
.ch-group.expanded .node-items{display:block}
.ni-btn{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--ink3);padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;transition:.12s;font-family:var(--sans);margin-bottom:1px;min-height:44px}
.ni-btn:hover:not(.locked){background:var(--panel);color:var(--ink)}
.ni-btn.current{background:var(--green-glow);border-color:var(--green2);color:var(--green)}
.ni-btn.done:not(.current){color:var(--ink)}
.ni-btn.locked{cursor:default;opacity:.4}
.ni-tag{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:4px;margin-left:auto;flex-shrink:0}
.ni-tag.trap{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.25)}
.ni-tag.hidden{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(167,139,250,.25)}
.ni-tag.gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,188,69,.25)}
.node-view{padding:28px clamp(16px,3.5vw,52px) 80px;max-width:900px;margin:0 auto}
.tabs{display:flex;gap:3px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:22px;width:fit-content}
.tab{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:8px;cursor:pointer;border:0;background:none;color:var(--ink2);transition:.14s}
.tab:hover:not(.on){color:var(--ink)}.tab.on{background:var(--green2);color:#fff;font-weight:700}
.node-hd{margin-bottom:20px}
.node-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.node-badge.regular{background:var(--green-glow);color:var(--green);border:1px solid var(--green2)}
.node-badge.trap{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.3)}
.node-badge.gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,188,69,.3)}
h1.nt{font-family:var(--serif);font-size:clamp(24px,4vw,38px);font-style:italic;line-height:1.05;margin-bottom:6px}
.xp-pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid rgba(240,188,69,.2);border-radius:6px;padding:3px 8px}
.fact-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin:12px 0;overflow:hidden}
.fb-head{padding:9px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink2);border-bottom:1px solid var(--line);background:var(--panel2);display:flex;align-items:center;gap:7px}
.fb-body{padding:14px 16px}
ul.facts{list-style:none;padding:0}
ul.facts li{padding:7px 0 7px 22px;border-bottom:1px dashed var(--line);font-size:14px;position:relative;line-height:1.55;color:var(--ink)}
ul.facts li:last-child{border-bottom:0}
ul.facts li::before{content:"▸";position:absolute;left:3px;top:8px;color:var(--teal);font-size:11px}
ul.facts b{color:var(--green)}
ul.facts code{font-family:var(--mono);font-size:12px;background:var(--panel2);padding:1px 5px;border-radius:4px;color:var(--gold)}
.trap-block{background:var(--red-bg);border:1px solid rgba(240,107,107,.35);border-radius:12px;padding:16px;margin:12px 0}
.trap-block .tb-h{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--red);margin-bottom:10px}
.trap-block ul{list-style:none;padding:0}
.trap-block li{padding:7px 0 7px 20px;position:relative;font-size:14px;border-bottom:1px dashed rgba(240,107,107,.18);line-height:1.5}
.trap-block li:last-child{border-bottom:0}
.trap-block li::before{content:"⚠";position:absolute;left:0;top:7px;font-size:11px;color:var(--red)}
.trap-block b{color:var(--red)}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--line);margin:12px 0}
table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt th{padding:9px 13px;text-align:left;background:var(--green2);color:#fff;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
table.dt td{padding:9px 13px;text-align:left;border-bottom:1px solid var(--line);color:var(--ink);line-height:1.4}
table.dt tr:last-child td{border-bottom:0}
table.dt td:first-child{color:var(--teal);font-weight:600;font-family:var(--mono);font-size:12px;white-space:nowrap}
.diag-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:12px 0}
.diag-head{padding:9px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--green);border-bottom:1px solid var(--line);background:var(--panel2)}
.diag-body{padding:16px;overflow-x:auto}
.diag-body svg{display:block;width:100%;height:auto}
.golden-block{background:linear-gradient(135deg,rgba(240,188,69,.09),rgba(61,214,140,.06));border:1px solid rgba(240,188,69,.3);border-radius:14px;padding:20px;margin:14px 0}
.golden-block .gb-h{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:14px}
.golden-block ul{list-style:none;padding:0}
.golden-block li{padding:8px 0 8px 24px;position:relative;font-size:14px;border-bottom:1px dashed rgba(240,188,69,.15);line-height:1.5}
.golden-block li:last-child{border-bottom:0}
.golden-block li::before{content:"→";position:absolute;left:0;color:var(--gold)}
.golden-block b{color:var(--green)}
.mcq-list{display:flex;flex-direction:column;gap:14px}
.mcq-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.mcq-q{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.45;color:var(--ink)}
.mcq-qn{font-family:var(--mono);font-size:11px;color:var(--teal);margin-right:6px}
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mopt{padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--ink);font-size:13px;cursor:pointer;text-align:left;font-family:var(--sans);transition:.13s;line-height:1.35}
.mopt:hover:not([disabled]){border-color:var(--green2);background:var(--green-glow)}
.mopt.correct{background:rgba(61,214,140,.12);border-color:var(--green);color:var(--green)}
.mopt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.mopt.show-correct{background:rgba(61,214,140,.07);border-color:var(--green)}
.mcq-fb{margin-top:10px;font-size:13px;padding:9px 12px;border-radius:8px;display:none;line-height:1.5}
.mcq-fb.show{display:block}
.mcq-fb.right{background:rgba(61,214,140,.10);color:var(--green);border:1px solid rgba(61,214,140,.25)}
.mcq-fb.wrong{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,107,107,.25)}
.mcq-score{font-family:var(--mono);font-size:12px;color:var(--ink2);margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.mcq-score span{color:var(--green)}
.node-nav{display:flex;gap:10px;margin-top:26px;padding-top:16px;border-top:1px solid var(--line);align-items:center}
.nnav{font-family:var(--sans);font-weight:600;font-size:14px;border-radius:9px;padding:9px 15px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);transition:.14s}
.nnav:hover{border-color:var(--green2)}.nnav.primary{background:var(--green2);color:#fff;border-color:var(--green2);margin-left:auto}
.locked-view{text-align:center;padding:70px 20px}
.locked-view .lv-ico{font-size:52px;margin-bottom:14px;opacity:.3}
.locked-view h2{font-family:var(--serif);font-style:italic;font-size:28px;color:var(--ink2);margin-bottom:8px}
.locked-view p{color:var(--ink2);font-size:14px;max-width:320px;margin:0 auto 18px;line-height:1.6}
.lock-req-list{display:inline-flex;flex-direction:column;gap:8px;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 18px}
.lreq{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--ink3)}
.lreq.met{color:var(--green)}.lreq::before{content:"○"}.lreq.met::before{content:"✓"}
.toast{position:fixed;top:64px;right:18px;background:linear-gradient(135deg,rgba(240,188,69,.15),rgba(61,214,140,.10));border:1px solid var(--gold);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:300;opacity:0;transform:translateY(-8px);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold)}
.toast-msg{font-size:13px;font-weight:600}
.dash{padding:36px clamp(18px,4vw,56px) 80px;max-width:700px;margin:0 auto}
.dash-t{font-family:var(--serif);font-size:clamp(30px,5vw,50px);font-style:italic;margin-bottom:4px}
.dash-s{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-bottom:26px;letter-spacing:1px}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.dc{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px;text-align:center}
.dc .dv{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:4px}
.dc .dl{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase}
.dc.gold .dv{color:var(--gold)}.dc.g .dv{color:var(--green)}.dc.r .dv{color:var(--red)}.dc.b .dv{color:var(--teal)}
.ch-prog{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
.cpr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.cpr:last-child{margin-bottom:0}
.cpr-n{font-family:var(--mono);font-size:11px;color:var(--ink2);width:200px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cpr-bar{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.cpr-fill{height:100%;background:var(--green);border-radius:3px;transition:.5s}
.cpr-pct{font-family:var(--mono);font-size:10px;color:var(--green);width:30px;text-align:right}
.start-btn{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;border:0;border-radius:12px;padding:13px 28px;font-size:15px;font-weight:700;font-family:var(--sans);cursor:pointer;margin-right:12px}
.mob-bar{display:none}.mob-overlay{display:none}
.sync-dot{position:fixed;bottom:16px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--green);opacity:0;transition:.4s;z-index:200}
.sync-dot.show{opacity:1}
.node-complete-banner{background:linear-gradient(135deg,rgba(61,214,140,.12),rgba(34,211,200,.08));border:1px solid rgba(61,214,140,.35);border-radius:12px;padding:14px 16px;margin-top:16px;display:flex;align-items:center;gap:10px}
.ncb-icon{font-size:22px;flex-shrink:0}
.ncb-title{font-family:var(--mono);font-size:11px;color:var(--green);letter-spacing:1px;margin-bottom:3px}
.ncb-sub{font-size:13px;color:var(--ink2)}
/* Tense timeline strip */
.tl-strip{display:flex;align-items:stretch;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--line);margin:12px 0}
.tl-cell{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--line);font-size:11px;line-height:1.4}
.tl-cell:last-child{border-right:0}
.tl-cell .tl-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
.tl-cell .tl-val{font-size:12px;font-weight:600}
.tl-past{background:rgba(240,107,107,.07)}.tl-past .tl-label{color:var(--red)}
.tl-pres{background:rgba(61,214,140,.07)}.tl-pres .tl-label{color:var(--green)}
.tl-fut{background:rgba(79,142,247,.07)}.tl-fut .tl-label{color:var(--blue)}
@media(max-width:720px){
  :root{--nav-h:52px}
  .shell{grid-template-rows:var(--nav-h) 1fr var(--nav-h);height:100dvh}
  .body{grid-template-columns:1fr;grid-row:2;height:calc(100dvh - calc(var(--nav-h)*2))}
  aside{display:none}
  .mob-bar{display:flex;grid-row:3;background:rgba(17,26,23,.98);backdrop-filter:blur(16px);border-top:1px solid var(--line);align-items:stretch;z-index:50}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:0;background:none;color:var(--ink3);cursor:pointer;padding:8px 4px;font-family:var(--mono);font-size:9px;transition:.13s}
  .mob-tab.active{color:var(--green)}.mob-tab .mt-ico{font-size:18px}
  .mob-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:.2s}
  .mob-overlay.show{opacity:1;pointer-events:all}
  .mob-drawer{position:fixed;left:-100%;top:0;bottom:0;width:min(300px,88vw);background:var(--bg2);border-right:1px solid var(--line);z-index:101;transition:.28s cubic-bezier(.2,.8,.4,1);overflow-y:auto}
  .mob-drawer.open{left:0}
  .mob-drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--line)}
  .mob-close{background:none;border:1px solid var(--line);color:var(--ink2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .node-view{padding:16px 14px 100px}
  h1.nt{font-size:24px}
  .dash{padding:18px 14px 100px}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .mcq-opts{grid-template-columns:1fr}
  .tabs{overflow-x:auto;white-space:nowrap;width:100%;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .nav-stats{display:none}
  .toast{bottom:70px;top:auto;left:14px;right:14px}
  .sync-dot{bottom:calc(var(--nav-h) + 8px)}
  .tl-strip{flex-wrap:wrap}
  .tl-cell{flex:1 1 30%;border-bottom:1px solid var(--line)}
}
@media(min-width:721px){.mob-drawer{display:none}}
</style>
</head>
<body>
<div class="shell">
<nav class="topbar">
  <div class="logo"><span class="logo-dot"></span>SSC English — Conjunctions & Sentence Correction</div>
  <div class="nav-stats">
    <div class="stat xp">XP <b id="hXP">0</b></div>
    <div class="stat vis">Nodes <b id="hVis">0/0</b></div>
    <div class="stat trap">Traps <b id="hTrap">0/0</b></div>
  </div>
</nav>
<div class="body">
  <aside><div class="sidebar-inner" id="sideInner"></div></aside>
  <main id="mainArea"><div id="viewWrap"></div></main>
</div>
<nav class="mob-bar">
  <button class="mob-tab active" onclick="showDash()"><span class="mt-ico">◈</span>Home</button>
  <button class="mob-tab" onclick="openDrawer()"><span class="mt-ico">☰</span>Topics</button>
  <button class="mob-tab" onclick="goTraps()"><span class="mt-ico">⚠</span>Traps</button>
</nav>
</div>
<div class="sync-dot" id="syncDot"></div>
<div class="mob-overlay" id="mobOverlay" onclick="closeDrawer()"></div>
<div class="mob-drawer" id="mobDrawer">
  <div class="mob-drawer-head">
    <div class="logo"><span class="logo-dot"></span>Topics</div>
    <button class="mob-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="sidebar-inner" id="mobSideInner"></div>
</div>
<div class="toast" id="toast"><div class="toast-val" id="toastVal"></div><div class="toast-msg" id="toastMsg"></div></div>

<script>

const DIAGRAMS = {
"con-map": `<svg viewBox="0 0 760 140" xmlns="http://www.w3.org/2000/svg" style="max-width:760px;width:100%">

<text x="380" y="22" fill="#f0bc45" font-size="10" font-weight="bold" text-anchor="middle" font-family="DM Sans,sans-serif" letter-spacing="2">CORRELATIVE PAIRS — MATCH THEM EXACTLY</text>
<rect x="4" y="36" width="185" height="96" rx="8" fill="rgba(61,214,140,.06)" stroke="#3dd68c" stroke-width="1"/>
<text x="96" y="58" fill="#3dd68c" font-size="11" font-weight="bold" text-anchor="middle" font-family="JetBrains Mono,monospace">Either … or</text>
<text x="96" y="78" fill="#9dc4b4" font-size="10" text-anchor="middle" font-family="DM Sans,sans-serif">Neither … nor</text>
<text x="96" y="98" fill="#e8f5f0" font-size="10" text-anchor="middle" font-family="DM Sans,sans-serif">verb with B</text>
<text x="96" y="118" fill="#f06b6b" font-size="9" text-anchor="middle" font-family="JetBrains Mono,monospace">NOT neither…or</text>
<rect x="197" y="36" width="185" height="96" rx="8" fill="rgba(34,211,200,.06)" stroke="#22d3c8" stroke-width="1"/>
<text x="289" y="58" fill="#22d3c8" font-size="11" font-weight="bold" text-anchor="middle" font-family="JetBrains Mono,monospace">No sooner … than</text>
<text x="289" y="78" fill="#9dc4b4" font-size="10" text-anchor="middle" font-family="DM Sans,sans-serif">Hardly … when</text>

{id:"con-core",title:"Conjunction Rules",icon:"🧷",nodes:[

 {id:"con-correlative",title:"Correlative Pairs",xp:20,type:"regular",diag:"con-map",
  facts:[
   "<b>Either … or / Neither … nor</b> → verb agrees with the closer (B) subject; 'neither' pairs with 'nor' (not 'or')",
   "<b>Both … and</b> → always a PLURAL verb: 'Both Ram and Sita ARE present'",
   "<b>Not only … but also</b> → parallel structure (same part of speech on both sides)",
   "<b>Whether … or</b> → two alternatives: 'Tell me whether you agree or not'",
   "<b>So … that / Such … that</b> → result: 'He was so tired that he slept'; 'It was such a hot day that we stayed in'",
   "<b>As … as</b> (equal) / <b>So … as</b> (negative comparison): 'She is not so tall as her sister'"
  ],
  table:{h:["Pair","Rule","Example"],r:[
   ["Either…or","verb with B","Either he or they ARE right"],
   ["Neither…nor","'nor' not 'or'","Neither Ram nor Shyam was there"],
   ["Both…and","plural verb","Both Ram and Sita ARE here"],
   ["Not only…but also","parallel structure","not only sings but also dances"],
   ["So…that / Such…that","result","so tired that he slept"],
   ["Whether…or","alternatives","whether you agree or not"]
  ]},
  mcqs:[
   {q:"Which is CORRECT?",o:["Neither Ram or Shyam came","Neither Ram nor Shyam came","Either Ram nor Shyam came","Neither Ram and Shyam came"],a:1,e:"'Neither' pairs with 'nor'."},
   {q:"Both Ram and Shyam ___ my friends.",o:["is","was","are","has"],a:2,e:"'Both…and' takes a plural verb → ARE."},
   {q:"Which shows correct parallel structure?",o:["She not only sings but also dancing","She not only sings but also dances","She sings not only but also dances","She not only sing but also dance"],a:1,e:"Parallel: sings / dances."},
   {q:"He was ___ tired ___ he fell asleep instantly.",o:["so / that","such / that","as / as","too / to"],a:0,e:"'So + adjective + that' → result."},
   {q:"It was ___ a hot day ___ we stayed indoors.",o:["so / that","such / that","as / that","too / that"],a:1,e:"'Such + (a) noun + that' → result."}
  ]},

 {id:"con-nosooner",title:"No sooner / Hardly / Lest / Although",xp:20,type:"trap",
  facts:[
   "<b>No sooner … than</b> — Past Perfect + inversion: 'No sooner HAD he entered THAN the phone rang'",
   "<b>Hardly / Scarcely … when/before</b> — Past Perfect + inversion, but with 'when' (NOT 'than'): 'Hardly HAD he sat down WHEN she called'",
   "<b>Lest … should</b> — 'lest' means 'for fear that'; always followed by 'should', NEVER 'not': 'Walk carefully lest you SHOULD fall'",
   "<b>Although / Though</b> → NO 'but' (use 'yet' or nothing): 'Although he is rich, (yet) he is not happy'",
   "The inversion trap: after 'No sooner / Hardly / Scarcely', the auxiliary comes BEFORE the subject",
   "'No sooner did he enter than…' is also acceptable (do-inversion), but 'No sooner he entered' is wrong"
  ],
  table:{h:["Structure","Correct form"],r:[
   ["No sooner…than","No sooner had he come than it rained"],
   ["Hardly…when","Hardly had she left when it rained"],
   ["Scarcely…when","Scarcely had I slept when he called"],
   ["Lest…should","lest you should fall"],
   ["Although…(yet)","Although tired, yet he worked"]
  ]},
  mcqs:[
   {q:"___ had he entered the hall ___ the lights went out.",o:["No sooner / when","No sooner / than","Hardly / than","Scarcely / than"],a:1,e:"'No sooner' pairs with 'than'."},
   {q:"Hardly had she finished speaking ___ the audience applauded.",o:["than","when","then","but"],a:1,e:"'Hardly/Scarcely' pairs with 'when'."},
   {q:"Walk carefully lest you ___ fall.",o:["will","should","would","may"],a:1,e:"'Lest' is always followed by 'should'."},
   {q:"Which is CORRECT?",o:["Although he is rich, but he is unhappy","Although he is rich, yet he is unhappy","Although he is rich but unhappy","Though rich, but unhappy"],a:1,e:"'Although' takes no 'but'; 'yet' or nothing is fine."},
   {q:"Choose the correct form:",o:["No sooner he entered than it rained","No sooner had he entered than it rained","No sooner he had entered when it rained","No sooner he entered when it rained"],a:1,e:"Inversion + past perfect + 'than'."}
  ]}
]},

{id:"con-correction",title:"Sentence Correction",icon:"✂️",nodes:[

 {id:"con-redundancy",title:"Redundancy, Double Negatives & Comparatives",xp:20,type:"regular",
  facts:[
   "<b>Double negatives</b>: two negatives = positive → use the 'any' series: 'I don't know NOTHING' → 'I don't know ANYTHING'",
   "<b>Redundancy</b>: returned BACK → returned; descended DOWN → descended; advanced FORWARD → advanced; MORE superior → superior; END result → result",
   "<b>Absolute adjectives</b> take no degree: 'very unique' → unique; 'very excellent' → excellent; 'more perfect' → perfect",
   "<b>No double comparative</b>: 'more smarter' → smarter; 'more better' → better",
   "<b>No double superlative</b>: 'most tallest' → tallest; 'most best' → best",
   "<b>Of the two</b> = comparative: 'the better of the two' (NOT 'the best of the two')"
  ],
  table:{h:["Wrong","Correct"],r:[
   ["returned back","returned"],
   ["more superior","superior"],
   ["very unique","unique"],
   ["more smarter","smarter"],
   ["most tallest","tallest"],
   ["best of the two","better of the two"]
  ]},
  mcqs:[
   {q:"Correct: 'She is more wiser than her colleague.'",o:["more wise","wiser","most wiser","more wisely"],a:1,e:"No double comparative → 'wiser'."},
   {q:"Correct: 'He returned back to his hometown.'",o:["returned back","returned","return back","returned again"],a:1,e:"'Returned' already means 'back'."},
   {q:"Correct: 'This is a very unique design.'",o:["very unique","unique","more unique","most unique"],a:1,e:"'Unique' is absolute — no degree word."},
   {q:"Correct: 'He is the best player of the two.'",o:["best","better","more good","goodest"],a:1,e:"Of two → comparative → 'the better'."},
   {q:"Correct: 'I don't know nothing about it.'",o:["don't know nothing","don't know anything","know nothing not","not know nothing"],a:1,e:"Avoid double negative → 'don't know anything'."},
   {q:"Correct: 'He is more superior to all his colleagues.'",o:["more superior","superior","most superior","superiors"],a:1,e:"'Superior' is already comparative."}
  ]},

 {id:"con-adjadv",title:"Adjective/Adverb, Modifiers & Infinitives",xp:20,type:"regular",
  facts:[
   "<b>Adverb after a verb</b>: 'sings very good' → 'sings very well'; 'speaks fluent' → 'speaks fluently'",
   "<b>Adjective after a linking verb</b> (look/seem/feel/become): 'She looks beautifully' → 'She looks beautiful'",
   "<b>Dangling/misplaced modifier</b>: the participle phrase must refer to the SUBJECT of the main clause",
   "'Walking down the road, the trees looked beautiful' → 'Walking down the road, I found the trees beautiful'",
   "<b>Causatives (make/let)</b> + bare infinitive: 'made me to wait' → 'made me wait'; 'let me to go' → 'let me go'",
   "<b>had better / would rather</b> + bare infinitive: 'had better to go' → 'had better go'; 'would rather to sleep' → 'would rather sleep'"
  ],
  table:{h:["Wrong","Correct"],r:[
   ["sings very good","sings very well"],
   ["speaks English fluent","speaks English fluently"],
   ["She looks beautifully","She looks beautiful"],

  ]},
  mcqs:[

   {q:"Correct: 'She looks very beautifully today.'",o:["beautifully","beautiful","more beautifully","beauty"],a:1,e:"Linking verb 'looks' + adjective → 'beautiful'."},
   {q:"Correct: 'She made him to apologise in public.'",o:["to apologise","apologise","apologising","apologised"],a:1,e:"Causative 'make' + bare infinitive → 'made him apologise'."},
   {q:"Correct: 'He would rather to stay at home.'",o:["to stay","stay","staying","stayed"],a:1,e:"'Would rather' + bare infinitive → 'rather stay'."},
   {q:"Correct: 'Walking down the street, the houses were old.'",o:["the houses were old","I found the houses old","houses looked old","the houses are old"],a:1,e:"The participle must refer to the subject → 'I found the houses old'."},
   {q:"Correct: 'Having finished the exam, the paper was submitted.'",o:["the paper was submitted","he submitted the paper","the paper submitted","paper is submitted"],a:1,e:"Dangling modifier → 'he submitted the paper'."}
  ]}
]},

const SKEY="ssc_eng_08_conjunctions";
let S={xp:0,visited:{},mcq:{},curNode:null,chOpen:null};
try{const r=localStorage.getItem(SKEY);if(r)S=Object.assign(S,JSON.parse(r));}catch(e){}
function save(){try{localStorage.setItem(SKEY,JSON.stringify(S));}catch(e){}}

let _ns={nodeId:null,openedAt:null,answered:0,correct:0,totalQ:0};
function trackEvent(ev,payload){
  const body=Object.assign({event:ev,mapId:"ssc_eng_08_conjunctions",ts:new Date().toISOString()},payload);
  try{fetch('/api/progress',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(()=>flashSync()).catch(()=>{});}catch(e){}
}
function flashSync(){const d=document.getElementById('syncDot');if(!d)return;d.classList.add('show');setTimeout(()=>d.classList.remove('show'),900);}
function startNodeSession(nodeId,totalQ){
  if(_ns.nodeId&&_ns.nodeId!==nodeId&&_ns.totalQ>0&&_ns.answered<_ns.totalQ)
    trackEvent('node_abandoned',{nodeId:_ns.nodeId,timeSpentSeconds:Math.floor((Date.now()-_ns.openedAt)/1000),questionsAnswered:_ns.answered,totalQuestions:_ns.totalQ});
  _ns={nodeId,openedAt:Date.now(),answered:0,correct:0,totalQ};
  trackEvent('node_opened',{nodeId,totalQuestions:totalQ,openedAt:new Date().toISOString()});
}
function trackAnswer(nodeId,qi,isCorrect){
  _ns.answered++;if(isCorrect)_ns.correct++;
  trackEvent('question_answered',{nodeId,questionIndex:qi,firstAttemptCorrect:isCorrect,timeIntoNodeSeconds:Math.floor((Date.now()-_ns.openedAt)/1000)});
  if(_ns.answered>=_ns.totalQ)
    trackEvent('node_completed',{nodeId,totalQuestions:_ns.totalQ,correctOnFirstAttempt:_ns.correct,firstAttemptAccuracyPct:Math.round(_ns.correct/_ns.totalQ*100),timeSpentSeconds:Math.floor((Date.now()-_ns.openedAt)/1000),completedAt:new Date().toISOString()});
}

function allNodes(){const a=[];CHAPTERS.forEach(c=>c.nodes.forEach(n=>a.push({...n,chId:c.id})));return a;}
function getNode(id){for(const c of CHAPTERS)for(const n of c.nodes)if(n.id===id)return n;return null;}
function isVisited(id){return!!S.visited[id];}
function isUnlocked(node){
  if(!node)return false;
  if(node.type==="gold"){const ch=CHAPTERS.find(c=>c.nodes.some(n=>n.id===node.id));if(ch){const reg=ch.nodes.filter(n=>n.id!==node.id);const pct=reg.length?reg.filter(n=>isVisited(n.id)).length/reg.length*100:0;return pct>=(node.requires_pct||80);}}
  return true;
}
function chPct(ch){const reg=ch.nodes.filter(n=>n.type!=="gold");return reg.length?Math.round(reg.filter(n=>isVisited(n.id)).length/reg.length*100):0;}
function totalNodes(){return allNodes().length;}
function visitedCount(){return Object.keys(S.visited).length;}
function trapNodes(){return allNodes().filter(n=>n.type==="trap");}
function trapVisited(){return trapNodes().filter(n=>isVisited(n.id)).length;}

function showToast(xp,msg){
  const t=document.getElementById("toast");
  document.getElementById("toastVal").textContent=xp>0?"+"+xp+" XP":"✓";
  document.getElementById("toastMsg").textContent=msg;
  t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800);
}
function updateHeader(){
  document.getElementById("hXP").textContent=S.xp;
  document.getElementById("hVis").textContent=visitedCount()+"/"+totalNodes();
  document.getElementById("hTrap").textContent=trapVisited()+"/"+trapNodes().length;
}
function buildSidebar(){
  ["sideInner","mobSideInner"].forEach(sid=>{
    const el=document.getElementById(sid);if(!el)return;el.innerHTML="";
    CHAPTERS.forEach(ch=>{
      const pct=chPct(ch),isOpen=S.chOpen===ch.id;
      const div=document.createElement("div");div.className="ch-group"+(isOpen?" expanded":"");
      div.innerHTML=`<button class="ch-toggle${isOpen?" open":""}" data-ch="${ch.id}">
        <span style="font-size:16px">${ch.icon}</span><span>${ch.title}</span>
        <span class="cht-pct">${pct}%</span></button>
      <div class="node-items">${ch.nodes.map(n=>{
        const unl=isUnlocked(n),vis=isVisited(n.id),cur=S.curNode===n.id;
        let ico=vis?"✓":"○",tag="";
        if(!unl){ico="🔒";tag=`<span class="ni-tag hidden">LOCKED</span>`;}
        else if(n.type==="gold"){ico="🏹";tag=`<span class="ni-tag gold">GOLD</span>`;}
        else if(n.type==="trap"){ico=vis?"⚠️":"⚠";tag=`<span class="ni-tag trap">TRAP</span>`;}
        return `<button class="ni-btn${cur?" current":""}${vis?" done":""}${!unl?" locked":""}" data-nid="${n.id}" data-unl="${unl}">
          <span style="width:15px;text-align:center;font-size:12px">${ico}</span>
          <span>${n.title}</span>${tag}</button>`;
      }).join("")}</div>`;
      el.appendChild(div);
      div.querySelector(".ch-toggle").onclick=()=>{
        S.chOpen=isOpen?null:ch.id;save();buildSidebar();
        if(!isOpen){const first=ch.nodes.find(n=>isUnlocked(n));if(first)openNode(first.id);}
      };
      div.querySelectorAll(".ni-btn[data-unl='true']").forEach(b=>b.onclick=()=>{openNode(b.dataset.nid);closeDrawer();});
      div.querySelectorAll(".ni-btn[data-unl='false']").forEach(b=>b.onclick=()=>{openLocked(b.dataset.nid);closeDrawer();});
    });
  });
}

function openNode(id){
  const node=getNode(id);if(!node||!isUnlocked(node))return openLocked(id);
  const fresh=!isVisited(id);
  S.curNode=id;S.chOpen=CHAPTERS.find(c=>c.nodes.some(n=>n.id===id))?.id||S.chOpen;
  if(fresh){S.visited[id]=Date.now();S.xp+=node.xp;
    const msgs={trap:"⚠ Exam Trap Found!",gold:"🏹 Golden Node!"};
    showToast(node.xp,msgs[node.type]||"Node Visited");}
  save();buildSidebar();updateHeader();renderNode(node);
  document.getElementById("mainArea").scrollTop=0;
  startNodeSession(id,node.mcqs?.length||0);
}
function openLocked(id){
  const node=getNode(id);if(!node)return;
  S.curNode=id;save();buildSidebar();
  const ch=CHAPTERS.find(c=>c.nodes.some(n=>n.id===id));
  let reqs="";
  if(node.type==="gold"){const pct=ch?chPct(ch):0;reqs=`<div class="lreq${pct>=(node.requires_pct||80)?" met":""}">Complete ${node.requires_pct||80}% of chapter nodes (${pct}% done)</div>`;}
  document.getElementById("viewWrap").innerHTML=`<div class="locked-view"><div class="lv-ico">🔒</div><h2>Locked</h2><p>Complete chapter requirements to unlock this Golden Node.</p><div class="lock-req-list">${reqs}</div></div>`;
}
function buildTable(t){return`<div class="tbl-wrap"><table class="dt"><thead><tr>${t.h.map(x=>`<th>${x}</th>`).join("")}</tr></thead><tbody>${t.r.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;}

function renderNode(node){
  const ch=CHAPTERS.find(c=>c.nodes.some(n=>n.id===node.id));
  const bm={regular:["◇ LEARN","regular"],trap:["⚠ EXAM TRAP","trap"],gold:["🏹 GOLDEN","gold"]};
  const [bl,bc]=bm[node.type]||["◇","regular"];
  let content="";
  if(node.type==="gold"){
    content=`<div class="golden-block"><div class="gb-h">🏹 GOLDEN NODE — Highest Probability Points · ${ch?.title||''}</div><ul>${(node.golden||[]).map(g=>`<li>${g}</li>`).join("")}</ul></div>`;
  } else {
    if(node.diag&&DIAGRAMS[node.diag])content+=`<div class="diag-box"><div class="diag-head">📊 DIAGRAM</div><div class="diag-body">${DIAGRAMS[node.diag]}</div></div>`;
    if(node.facts)content+=`<div class="fact-block"><div class="fb-head">◇ KEY FACTS</div><div class="fb-body"><ul class="facts">${node.facts.map(f=>`<li>${f}</li>`).join("")}</ul></div></div>`;
    if(node.table)content+=buildTable(node.table);
    if(node.traps)content+=`<div class="trap-block"><div class="tb-h">⚠ EXAM TRAPS — HIGH YIELD</div><ul>${node.traps.map(t=>`<li>${t}</li>`).join("")}</ul></div>`;
  }
  let mcqContent="";
  if(node.mcqs?.length){
    const best=S.mcq[node.id]||0;
    mcqContent=`<div class="mcq-list">
      ${best?`<div style="font-family:var(--mono);font-size:11px;color:var(--ink3);margin-bottom:8px">Best score: <span style="color:var(--green)">${best}%</span></div>`:""}
      ${node.mcqs.map((q,qi)=>`<div class="mcq-card" data-qi="${qi}" data-nid="${node.id}">
        <div class="mcq-q"><span class="mcq-qn">Q${qi+1}</span>${q.q}</div>
        <div class="mcq-opts">${q.o.map((op,oi)=>`<button class="mopt" data-oi="${oi}">${String.fromCharCode(65+oi)}. ${op}</button>`).join("")}</div>
        <div class="mcq-fb" id="fb_${node.id}_${qi}"></div>
      </div>`).join("")}
      <div class="mcq-score" id="scr_${node.id}">Answer all questions to see your score</div>
    </div>`;
  } else {mcqContent=`<div style="text-align:center;padding:40px;color:var(--ink3);font-family:var(--mono);font-size:13px">No MCQs for this node</div>`;}
  const idx=ch?.nodes.findIndex(n=>n.id===node.id)??-1;
  const prev=idx>0?ch.nodes[idx-1]:null;
  const next=idx<(ch?.nodes.length-1)?ch.nodes[idx+1]:null;
  const nav=`<div class="node-nav">
    ${prev?`<button class="nnav" onclick="openNode('${prev.id}')">‹ ${prev.title.replace(/&amp;/g,'&').substring(0,26)}</button>`:""}
    ${next&&isUnlocked(next)?`<button class="nnav primary" onclick="openNode('${next.id}')">Next ›</button>`:""}
  </div>`;
  document.getElementById("viewWrap").innerHTML=`<div class="node-view">
    <div class="node-hd">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--ink3);margin-bottom:6px">${ch?.title||""} › ${node.title}</div>
      <div class="node-badge ${bc}">${bl}</div>
      <h1 class="nt">${node.title}</h1>
      <div class="xp-pill">✦ +${node.xp} XP${isVisited(node.id)?" earned":""}</div>
    </div>
    <div class="tabs"><button class="tab on" data-t="learn">📖 Learn</button><button class="tab" data-t="test">🎯 Test</button></div>
    <div id="pane-learn">${content}${nav}</div>
    <div id="pane-test" style="display:none">${mcqContent}${nav}</div>
  </div>`;
  document.querySelectorAll(".tab").forEach(btn=>{
    btn.onclick=()=>{
      const t=btn.dataset.t;
      document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.t===t));
      ["learn","test"].forEach(p=>{const e=document.getElementById("pane-"+p);if(e)e.style.display=p===t?"block":"none";});
    };
  });
  bindMCQ(node);
}

function bindMCQ(node){
  if(!node.mcqs)return;
  let correct=0,answered=0,total=node.mcqs.length;
  node.mcqs.forEach((q,qi)=>{
    const card=document.querySelector(`.mcq-card[data-qi="${qi}"][data-nid="${node.id}"]`);if(!card)return;
    card.querySelectorAll(".mopt").forEach(btn=>{
      btn.onclick=()=>{
        if(card.dataset.done)return;
        card.dataset.done=1;
        const oi=+btn.dataset.oi,fb=document.getElementById(`fb_${node.id}_${qi}`);
        const isCorrect=(oi===q.a);
        card.querySelectorAll(".mopt").forEach((b,i)=>{b.disabled=true;if(i===q.a)b.classList.add("show-correct");});
        if(isCorrect){btn.classList.add("correct");correct++;fb.className="mcq-fb show right";fb.innerHTML="✓ "+q.e;}
        else{btn.classList.add("wrong");fb.className="mcq-fb show wrong";fb.innerHTML="✗ Wrong. "+q.e;}
        answered++;
        trackAnswer(node.id,qi,isCorrect);
        if(answered===total){
          const pct=Math.round(correct/total*100);
          const scr=document.getElementById(`scr_${node.id}`);
          if(scr){const gr=pct>=80?"🎯 Excellent":pct>=60?"✓ Good":"⚠ Revise";scr.innerHTML=`Score: <span>${correct}/${total} = ${pct}%</span> ${gr}`;}
          if(pct>(S.mcq[node.id]||0)){S.mcq[node.id]=pct;save();}
          if(pct>=80)showToast(0,"MCQ Cleared 🎯");else if(pct>=60)showToast(0,"Good attempt ✓");
          const tp=document.getElementById("pane-test");
          if(tp){const b=document.createElement("div");b.className="node-complete-banner";
            b.innerHTML=`<div class="ncb-icon">${pct>=80?"🏆":pct>=60?"✅":"📖"}</div><div><div class="ncb-title">NODE COMPLETE — ${pct}%</div><div class="ncb-sub">${correct}/${total} correct on first attempt${pct<60?" — revisit Learn tab":""}</div></div>`;
            tp.appendChild(b);}
        }
      };
    });
  });
}

function showDash(){
  S.curNode=null;save();buildSidebar();
  const vis=visitedCount(),tot=totalNodes(),pct=tot?Math.round(vis/tot*100):0;
  document.getElementById("viewWrap").innerHTML=`<div class="dash">
    <div class="dash-t">Conjunctions & Sentence Correction</div>
    <div class="dash-s">SSC CGL / CHSL / MTS / CPO · RULES · TRAPS · PYQ PRACTICE</div>
    <div class="dash-grid">
      <div class="dc gold"><div class="dv">${S.xp}</div><div class="dl">Total XP</div></div>
      <div class="dc g"><div class="dv">${vis}/${tot}</div><div class="dl">Nodes</div></div>
      <div class="dc r"><div class="dv">${trapVisited()}/${trapNodes().length}</div><div class="dl">Traps</div></div>
      <div class="dc b"><div class="dv">${pct}%</div><div class="dl">Done</div></div>
    </div>
    <div class="ch-prog">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--ink3);margin-bottom:12px">CHAPTER PROGRESS</div>
      ${CHAPTERS.map(ch=>{const p=chPct(ch);return`<div class="cpr"><span class="cpr-n">${ch.icon} ${ch.title}</span><div class="cpr-bar"><div class="cpr-fill" style="width:${p}%"></div></div><span class="cpr-pct">${p}%</span></div>`;}).join("")}
    </div>
    <button class="start-btn" onclick="startLearning()">${visitedCount()===0?"Start Learning →":"Continue →"}</button>
    <div style="margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--teal);margin-bottom:10px">HOW TO USE</div>
      <div style="font-size:13px;color:var(--ink2);line-height:1.6"><b style="color:var(--ink)">Learn</b> tab = rules, tables, diagrams. <b style="color:var(--red)">Trap</b> nodes = the mistakes SSC loves to test. Hit <b style="color:var(--ink)">Test</b> for PYQ-style MCQs with instant explanations. Clear a chapter to unlock its <b style="color:var(--gold)">Golden</b> summary. Progress saves on this device.</div>
    </div>
  </div>`;
}


function startLearning(){
  const first=allNodes().find(n=>isUnlocked(n)&&!isVisited(n.id))||allNodes()[0];
  if(first){S.chOpen=CHAPTERS.find(c=>c.nodes.some(n=>n.id===first.id))?.id;openNode(first.id);}
}
function goTraps(){
  const t=trapNodes();if(!t.length)return;
  const next=t.find(n=>!isVisited(n.id))||t[0];openNode(next.id);
}
function openDrawer(){document.getElementById("mobDrawer").classList.add("open");document.getElementById("mobOverlay").classList.add("show");}
function closeDrawer(){document.getElementById("mobDrawer").classList.remove("open");document.getElementById("mobOverlay").classList.remove("show");}

if(!S.chOpen)S.chOpen=CHAPTERS[0].id;
buildSidebar();updateHeader();showDash();
