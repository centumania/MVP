<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#130A0A;--bg2:#0A0505;--panel:#2A1010;--panel2:#3D1818;--line:#5C2525;
  --ink:#ECD4D4;--ink2:#CC9090;--ink3:#885555;
  --gold:#FCA5A5;--gold2:#CC2222;--gold-glow:rgba(252,165,165,.18);
  --amber:#FBBF24;--gold-bg:rgba(252,165,165,.09);
  --red:#f87171;--red-bg:rgba(248,113,113,.12);--blue:#93C5FD;--green:#4ade80;
}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;}
#topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:.6rem 1rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;flex-shrink:0;}
#menu-btn{background:none;border:none;color:var(--ink);font-size:1.4rem;cursor:pointer;padding:.2rem;}
#tb-title{flex:1;font-weight:700;font-size:.95rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#tb-xp{color:var(--amber);font-weight:700;font-size:.9rem;white-space:nowrap;}
#tb-pct{color:var(--green);font-weight:700;font-size:.9rem;white-space:nowrap;}
#layout{display:flex;flex:1;overflow:hidden;}
#aside{width:280px;background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;flex-shrink:0;transition:transform .25s;}
#sidebar-inner{padding:.5rem;}
#main{flex:1;overflow-y:auto;padding:1rem;}
#node-content{max-width:900px;margin:0 auto;}
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;}
#drawer-overlay.show{display:block;}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--panel2);color:var(--ink);padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;}
#toast.show{opacity:1;}
.node-item{display:flex;align-items:center;gap:.6rem;padding:.6rem .7rem;border-radius:8px;cursor:pointer;margin-bottom:.3rem;transition:background .2s;border:1px solid transparent;}
.node-item:hover{background:var(--panel);}
.node-item.locked{opacity:.5;cursor:not-allowed;}
.node-item.gold-node{border-color:var(--gold);background:var(--gold-bg);}
.node-icon{font-size:1.2rem;flex-shrink:0;}
.node-info{flex:1;min-width:0;}
.node-label{font-size:.82rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.node-xp{font-size:.75rem;color:var(--amber);white-space:nowrap;}
.prog-bar{height:4px;background:var(--panel2);border-radius:2px;margin-top:.3rem;}
.prog-fill{height:100%;background:var(--gold2);border-radius:2px;transition:width .4s;}
.tab-bar{display:flex;gap:.4rem;margin-bottom:1rem;border-bottom:2px solid var(--line);padding-bottom:.6rem;}
.tab-btn{padding:.45rem .9rem;border:none;border-radius:6px;cursor:pointer;font-size:.83rem;font-weight:600;background:var(--panel);color:var(--ink2);transition:all .2s;}
.tab-btn.active{background:var(--gold2);color:#fff;}
.learn-body{display:flex;flex-direction:column;gap:1rem;}
.score-badge{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.5rem 1rem;font-size:.85rem;color:var(--ink2);}
h2{color:var(--gold);font-size:1.3rem;margin:.3rem 0;}
h3{color:var(--gold);font-size:1rem;margin:.5rem 0;}
.fact-item{background:var(--panel);border-left:3px solid var(--gold2);padding:.6rem .9rem;border-radius:0 6px 6px 0;font-size:.88rem;line-height:1.5;margin-bottom:.4rem;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.83rem;}
th{background:var(--panel2);color:var(--gold);padding:.5rem .7rem;text-align:left;border:1px solid var(--line);}
td{padding:.45rem .7rem;border:1px solid var(--line);color:var(--ink2);}
tr:nth-child(even)td{background:var(--bg2);}
.mnemonic-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;font-size:.87rem;line-height:1.6;color:var(--ink);}
.traps-section,.revision-section,.oneliners-section{background:var(--panel);border-radius:8px;padding:.8rem 1rem;}
.trap-item{background:var(--red-bg);border-left:3px solid var(--red);padding:.5rem .8rem;border-radius:0 6px 6px 0;font-size:.84rem;margin-bottom:.4rem;color:var(--ink);}
.revision-section ul{list-style:none;padding:0;}
.revision-section li{padding:.3rem 0;border-bottom:1px solid var(--line);font-size:.84rem;color:var(--ink2);}
.revision-section li::before{content:'✓ ';color:var(--green);}
.oneliner{padding:.3rem 0;border-bottom:1px solid var(--line);font-size:.83rem;color:var(--ink2);}
.flash-body{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:1rem 0;}
.flash-counter{color:var(--ink2);font-size:.85rem;}
.flash-card{width:100%;max-width:540px;height:200px;perspective:1000px;cursor:pointer;position:relative;}
.flash-front,.flash-back{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:1.2rem;border-radius:12px;backface-visibility:hidden;transition:transform .4s;}
.flash-front{background:var(--panel);border:2px solid var(--gold);transform:rotateY(0deg);}
.flash-back{background:var(--panel2);border:2px solid var(--green);transform:rotateY(180deg);}
.flash-card.flipped .flash-front{transform:rotateY(-180deg);}
.flash-card.flipped .flash-back{transform:rotateY(0deg);}
.flash-q{font-size:.95rem;font-weight:600;color:var(--gold);}
.flash-a{font-size:.9rem;color:var(--green);}
.flip-hint{font-size:.75rem;color:var(--ink3);margin-top:.5rem;}
.flash-nav{display:flex;gap:1rem;}
.flash-nav button{padding:.5rem 1.2rem;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;cursor:pointer;}
.flash-nav button:disabled{opacity:.4;cursor:not-allowed;}
.test-body{display:flex;flex-direction:column;gap:1rem;}
.q-block{background:var(--panel);border-radius:8px;padding:.8rem 1rem;}
.q-block.correct{border-left:4px solid var(--green);}
.q-block.wrong{border-left:4px solid var(--red);}
.q-text{font-size:.9rem;font-weight:600;margin-bottom:.6rem;color:var(--ink);}
.opts{display:flex;flex-direction:column;gap:.4rem;}
.opt-label{display:flex;align-items:center;gap:.6rem;padding:.4rem .7rem;border-radius:6px;font-size:.85rem;cursor:pointer;border:1px solid var(--line);color:var(--ink2);transition:background .2s;}
.opt-label:hover{background:var(--panel2);}
.opt-label.selected{background:var(--panel2);border-color:var(--gold);color:var(--ink);}
.opt-label.right-ans{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green);}
.opt-label.wrong-ans{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.opt-label input[type=radio]{accent-color:var(--gold);}
.exp-box{font-size:.82rem;color:var(--ink2);background:var(--bg2);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;}
.submit-btn{padding:.7rem 1.5rem;background:var(--gold2);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:opacity .2s;}
.submit-btn:hover{opacity:.85;}
.gold-submit{background:linear-gradient(135deg,#b91c1c,#dc2626);}
.result-banner{padding:1rem;border-radius:8px;text-align:center;font-size:1.1rem;font-weight:700;}
.result-banner.pass{background:rgba(74,222,128,.15);color:var(--green);border:1px solid var(--green);}
.result-banner.fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.gold-header{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.gold-header span:first-child{color:var(--gold);font-weight:700;font-size:1rem;}
.gold-header span:last-child{color:var(--amber);font-weight:700;}
.gold-facts-ticker{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:.6rem .9rem;font-size:.78rem;color:var(--ink2);margin-bottom:1rem;max-height:90px;overflow-y:auto;line-height:1.6;}
.gold-traps{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;margin-top:1rem;}
.gold-locked-msg{text-align:center;padding:3rem 2rem;color:var(--ink2);}
.gold-locked-msg h2{color:var(--gold);margin:1rem 0;}
.welcome-panel{text-align:center;padding:3rem 2rem;color:var(--ink2);}
.welcome-panel h1{color:var(--gold);font-size:1.8rem;margin-bottom:.8rem;}
.welcome-stats{display:flex;gap:1.5rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;}
.welcome-stats div{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.5rem 1rem;font-size:.85rem;}
@media(max-width:768px){
  #aside{position:fixed;top:0;left:0;height:100%;z-index:200;transform:translateX(-100%);}
  #aside.open{transform:translateX(0);}
  #main{padding:.7rem;}
}
</style>

+ English education + cooperation with British"], "flashcards": [{"q": "Who founded the Brahmo Samaj and when?", "a": "Raja Ram Mohan Roy founded Brahmo Samaj in 1828 at Calcutta. He is called 'Father of Modern India'."}, {"q": "Who founded the Arya Samaj and what was its motto?", "a": "Swami Dayanand Saraswati founded Arya Samaj in 1875. Motto: 'Back to Vedas'. Opposed idol worship, child marriage, caste."}, {"q": "Who founded the Ramakrishna Mission and when?", "a": "Swami Vivekananda founded Ramakrishna Mission in 1897 at Belur Math. Ramakrishna was his guru."}, {"q": "What did Annie Besant have to do with the Theosophical Society?", "a": "Annie Besant joined the Theosophical Society in 1893 and became its president. The society was FOUNDED by Madame Blavatsky and Col. Olcott in 1875."}, {"q": "What was the MAO College at Aligarh?", "a": "Mohammadan Anglo-Oriental College founded by Sir Syed Ahmed Khan in 1875 at Aligarh. It became Aligarh Muslim University (AMU) in 1920."}, {"q": "What was Vivekananda's famous contribution in 1893?", "a": "Swami Vivekananda represented India at the Parliament of Religions in Chicago 1893 — gave a famous speech beginning 'Sisters and Brothers of America'"}, {"q": "What was the Shuddhi Movement?", "a": "Reconversion movement by Arya Samaj — reconverting Hindus who had converted to other religions back to Hinduism"}, {"q": "What was the Prarthana Samaj (1867)?", "a": "Founded by Atmaram Pandurang at Bombay 1867. MG Ranade joined. Focused on widow remarriage, women education, inter-dining."}, {"q": "Who was Syed Ahmed Barelvi?", "a": "Leader of Wahabi Movement; fought against Sikh rule; killed at Battle of Balakot 1831. The movement later became anti-British."}, {"q": "What was the Deoband School (1867)?", "a": "Islamic educational institution founded at Saharanpur, UP in 1867 by Muhammad Qasim Nanautavi. Promoted Islamic education; opposed Western influence."}], "mcqs": [{"q": "The Brahmo Samaj was founded by:", "o": ["Swami Vivekananda", "Raja Ram Mohan Roy", "Dayanand Saraswati", "Keshab Chandra Sen"], "a": 1, "e": "Brahmo Samaj was founded by Raja Ram Mohan Roy in 1828 at Calcutta. He is called 'Father of Modern India' and 'Father of Indian Renaissance'. Keshab Chandra Sen joined later."}, {"q": "The Arya Samaj was founded in:", "o": ["1828", "1867", "1875", "1897"], "a": 2, "e": "Arya Samaj was founded by Swami Dayanand Saraswati in 1875, first at Bombay. HQ later moved to Lahore. Its motto was 'Back to Vedas'. Brahmo Samaj=1828; Prarthana=1867; Ramakrishna=1897."}, {"q": "The Ramakrishna Mission (1897) was founded by:", "o": ["Ramakrishna Paramahansa", "Swami Vivekananda", "Annie Besant", "Dayanand Saraswati"], "a": 1, "e": "Ramakrishna Mission was founded by Swami Vivekananda in 1897 at Belur Math. Ramakrishna Paramahansa was Vivekananda's guru, not the founder. Vivekananda represented India at Parliament of Religions Chicago 1893."}, {"q": "The Theosophical Society was founded by:", "o": ["Annie Besant", "Madame Blavatsky and Col. Olcott", "Dayanand Saraswati", "Keshab Chandra Sen"], "a": 1, "e": "Theosophical Society was founded by Madame Blavatsky and Col. Henry Olcott in New York in 1875. HQ moved to Adyar, Madras in 1882. Annie Besant joined in 1893 and became president."}, {"q": "MAO College at Aligarh was founded by:", "o": ["Sir Syed Ahmed Khan", "Nawab of Bhopal", "Deoband scholars", "Lord Ripon"], "a": 0, "e": "MAO (Mohammadan Anglo-Oriental) College was founded by Sir Syed Ahmed Khan in 1875 at Aligarh. He promoted English education for Muslims and cooperation with British. It became AMU in 1920."}, {"q": "Swami Vivekananda represented India at Parliament of Religions in Chicago in:", "o": ["1885", "1889", "1893", "1897"], "a": 2, "e": "Swami Vivekananda attended the Parliament of World's Religions in Chicago in September 1893. His speech starting 'Sisters and Brothers of America' brought him global recognition."}, {"q": "The Wahabi Movement was led by:", "o": ["Muhammad Qasim Nanautavi", "Sir Syed Ahmed Khan", "Syed Ahmed Barelvi", "Keshab Chandra Sen"], "a": 2, "e": "Wahabi Movement was led by Syed Ahmed Barelvi (1786-1831). He declared jihad against Sikh rule and was killed at Battle of Balakot (1831). The movement later became anti-British."}, {"q": "'Satyarth Prakash' was written by:", "o": ["Raja Ram Mohan Roy", "Swami Vivekananda", "Swami Dayanand Saraswati", "Bal Gangadhar Tilak"], "a": 2, "e": "'Satyarth Prakash' (Light of Truth) was written by Swami Dayanand Saraswati, founder of Arya Samaj. He critiqued all religions including Hinduism while advocating Vedic knowledge."}, {"q": "The Deoband School (1867) was established at:", "o": ["Aligarh", "Lucknow", "Saharanpur, UP", "Calcutta"], "a": 2, "e": "Deoband School (Darul Uloom Deoband) was established in 1867 at Deoband, Saharanpur district, UP by Muhammad Qasim Nanautavi and Rashid Ahmed Gangohi."}, {"q": "The 'Shuddhi' movement was associated with:", "o": ["Brahmo Samaj", "Arya Samaj", "Prarthana Samaj", "Ramakrishna Mission"], "a": 1, "e": "Shuddhi (purification/reconversion) movement was started by Arya Samaj to reconvert Hindus who had converted to Islam or Christianity. It often created communal tension."}]}, {"id": "inc_formation_sessions", "label": "INC: Foundation & Early Sessions 🏛️", "icon": "🏛", "xp": "55", "seqIdx": "1", "facts": ["<b>Foundation of INC</b>: 28 December 1885; Gokuldas Tejpal Sanskrit College, Bombay; <b>AO Hume</b> (retired ICS, Etawah) + Viceroy Dufferin (planned); <b>WC Banerjee</b> = 1st president; 72 delegates", "<b>Safe Valve Theory</b>: Lala Lajpat Rai accused INC of being a 'safety valve' for British — Hume wanted a moderate platform to channel Indian grievances safely", "<b>Early INC demands (Moderate Phase 1885-1905)</b>: Representative government, Indianization of services, economic reforms, end to drain of wealth, press freedom — through petitions, prayers, memorials", "<b>INC Sessions — Firsts</b>: 1st=Bombay(1885,WC Banerjee); 2nd=Calcutta(1886,Dadabhai Naoroji); 3rd=Madras(1887,Badruddin Tyabji=1st Muslim president); 4th=Allahabad(1888,George Yule=1st British)", "<b>Prominent Moderate leaders</b>: Dadabhai Naoroji (Grand Old Man of India; Drain Theory; MP in British Parliament 1892); Gopal Krishna Gokhale (Ranade's disciple; founded Servants of India Society 1905); Pherozeshah Mehta; Surendranath Banerjee", "<b>Dadabhai Naoroji's Drain Theory</b>: India's wealth being systematically drained to Britain through salaries, pensions, interest, trade surplus; wrote 'Poverty and UnBritish Rule in India' (1901)", "<b>Gokhale</b>: Called 'political guru of Gandhi'; Servants of India Society 1905; member of Imperial Legislative Council; opposed Tilak's aggressive methods", "<b>Poona Sarvajanik Sabha 1870</b>: MG Ranade, Gokhale's mentor; significant reform organization in Maharashtra before INC", "<b>Indian National Social Conference</b>: MG Ranade; met alongside INC sessions; focused on social reforms (widow remarriage, girl education)", "<b>AO Hume</b>: Allan Octavian Hume; retired ICS officer; had access to sedition reports; real reason for founding INC debated — political safety valve vs genuine platform"], "table": "<table><thead><tr><th>Session</th><th>Year</th><th>City</th><th>President</th></tr></thead><tbody><tr><td>1st</td><td>1885</td><td>Bombay</td><td>WC Banerjee</td></tr><tr><td>2nd</td><td>1886</td><td>Calcutta</td><td>Dadabhai Naoroji</td></tr><tr><td>3rd</td><td>1887</td><td>Madras</td><td>Badruddin Tyabji</td></tr><tr><td>4th</td><td>1888</td><td>Allahabad</td><td>George Yule</td></tr><tr><td>5th</td><td>1889</td><td>Bombay</td><td>Sir William Wedderburn</td></tr><tr><td>12th</td><td>1896</td><td>Calcutta</td><td>Rahimtulla M. Sayani (first to sing Vande Mataram)</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — First INC Presidents</b><br>'<b>Busy Daddy Buys Good Wares</b>'<br><b>B</b>anerji(1885) → <b>D</b>adabhai(1886) → <b>B</b>adruddin(1887) → <b>G</b>eorge Yule(1888) → <b>W</b>edderburn(1889)", "traps": ["❌ INC was founded in Calcutta → ✅ INC founded in <b>Bombay</b> (Gokuldas Tejpal College, 28 Dec 1885)", "❌ Gokhale was INC founder → ✅ INC founder = <b>AO Hume</b>; Gokhale was a moderate leader", "❌ Dadabhai Naoroji was 1st INC president → ✅ 1st president = <b>WC Banerjee</b>; Naoroji was 2nd (1886)", "❌ INC had 720 delegates at founding → ✅ 72 delegates (NOT 720) at founding session", "❌ Badruddin Tyabji was 1st Hindu president → ✅ Badruddin Tyabji was <b>1st Muslim president</b> (3rd session, 1887)", "❌ Vande Mataram was first sung at 1st INC session → ✅ Vande Mataram first sung at <b>1896 (12th session, Calcutta)</b>"], "revision": ["INC founded 28 Dec 1885, Bombay, AO Hume, WC Banerjee (1st president)", "Moderates: petition/prayer/memorial method, Drain Theory (Dadabhai)", "Gokhale = political guru of Gandhi, Servants of India Society 1905", "1st Muslim president = Badruddin Tyabji (1887)", "Vande Mataram first sung at 12th session, 1896, Calcutta"], "oneliners": ["72 delegates at first INC session, not 720", "Dadabhai Naoroji = Grand Old Man of India + MP in British Parliament 1892", "AO Hume = retired ICS officer who founded INC — 'Safe Valve Theory'", "'Poverty and UnBritish Rule in India' = Dadabhai Naoroji's drain theory book (1901)"], "flashcards": [{"q": "When and where was the Indian National Congress founded?", "a": "28 December 1885 at Gokuldas Tejpal Sanskrit College, Bombay. Founded by AO Hume. First president: WC Banerjee. 72 delegates."}, {"q": "What was the 'Drain of Wealth' theory?", "a": "Dadabhai Naoroji's theory that British systematically drained India's wealth through salaries, pensions, trade. Book: 'Poverty and UnBritish Rule in India' (1901)."}, {"q": "Who was the first Muslim president of INC?", "a": "Badruddin Tyabji — at the 3rd INC session in Madras (1887)"}, {"q": "Who was the first British president of INC?", "a": "George Yule — at the 4th INC session in Allahabad (1888)"}, {"q": "What was the Safe Valve Theory about INC?", "a": "Lala Lajpat Rai accused INC of being a 'safety valve' — Hume created it to channel Indian grievances safely within British control, preventing revolution"}, {"q": "When was 'Vande Mataram' first sung at an INC session?", "a": "1896 — at the 12th INC session in Calcutta, during Rahimtulla M. Sayani's presidency"}, {"q": "What was Gokhale's contribution?", "a": "Founded Servants of India Society (1905); member of Imperial Legislative Council; called 'political guru of Gandhi'; opposed Tilak's aggressive methods"}, {"q": "What method did Moderate INC leaders use?", "a": "Petition, Prayer, Memorial (PPM) — believed in constitutional methods, appealed to British Parliament, no confrontation"}, {"q": "Who was Dadabhai Naoroji?", "a": "Grand Old Man of India; 2nd INC president (1886); wrote Drain Theory; became first Indian MP in British Parliament (1892)"}, {"q": "What was the Servants of India Society (1905)?", "a": "Founded by Gopal Krishna Gokhale — trained educated Indians to serve the nation; inspired Gandhi's service ethic"}], "mcqs": [{"q": "The Indian National Congress was founded in:", "o": ["1857", "1878", "1885", "1892"], "a": 2, "e": "INC was founded on 28 December 1885 at Gokuldas Tejpal Sanskrit College, Bombay by AO Hume, a retired ICS officer. 72 delegates attended. WC Banerjee presided."}, {"q": "The first President of the Indian National Congress was:", "o": ["Dadabhai Naoroji", "AO Hume", "WC Banerjee", "Badruddin Tyabji"], "a": 2, "e": "WC Banerjee (Womesh Chunder Banerjee) was the first President of INC at the 1885 Bombay session. Dadabhai Naoroji was 2nd (1886). AO Hume founded INC but never became its president."}, {"q": "The 'Drain of Wealth' theory was propounded by:", "o": ["Bal Gangadhar Tilak", "Dadabhai Naoroji", "Gopal Krishna Gokhale", "AO Hume"], "a": 1, "e": "Drain Theory was propounded by Dadabhai Naoroji in his book 'Poverty and UnBritish Rule in India' (1901). He calculated that Britain drained millions from India annually through trade, salaries, and pensions."}, {"q": "The first Muslim President of INC was:", "o": ["Sir Syed Ahmed Khan", "Badruddin Tyabji", "Muhammad Ali Jinnah", "Rahimtulla Sayani"], "a": 1, "e": "Badruddin Tyabji was the first Muslim President of INC — at the 3rd session in Madras in 1887. Sir Syed Ahmed Khan opposed INC membership for Muslims."}, {"q": "'Vande Mataram' was first sung at an INC session in:", "o": ["1885", "1893", "1896", "1905"], "a": 2, "e": "Vande Mataram (written by Bankim Chandra Chattopadhyay in 'Anandamath') was first sung at the 12th INC session in Calcutta in 1896, presided by Rahimtulla M. Sayani."}, {"q": "The 'Servants of India Society' (1905) was founded by:", "o": ["Bal Gangadhar Tilak", "Gopal Krishna Gokhale", "AO Hume", "Dadabhai Naoroji"], "a": 1, "e": "Servants of India Society was founded by Gopal Krishna Gokhale in 1905. It trained educated Indians for selfless national service. Gokhale is called the 'political guru of Mahatma Gandhi.'"}, {"q": "Dadabhai Naoroji became the first Indian elected to British Parliament in:", "o": ["1885", "1892", "1900", "1905"], "a": 1, "e": "Dadabhai Naoroji was elected to the British House of Commons from Finsbury Central constituency in 1892 — the first Indian MP in the British Parliament. He represented the Liberal Party."}, {"q": "The INC founding session had how many delegates?", "o": ["72", "270", "720", "1000"], "a": 0, "e": "The first INC session (1885) had 72 delegates — NOT 720. This is a common trap. They came from across India to Bombay, selected by AO Hume."}, {"q": "The 'Safe Valve Theory' for INC's founding refers to:", "o": ["INC was meant to drain Britain of resources", "INC was to channel Indian discontent safely within British framework", "INC was to promote Indian industry", "INC was to replace EIC"], "a": 1, "e": "'Safe Valve Theory' (or Safety Valve Theory): Lala Lajpat Rai accused AO Hume of founding INC as a 'safety valve' to release Indian political discontent in a controlled manner and prevent revolution."}, {"q": "Gopal Krishna Gokhale's mentor was:", "o": ["Bal Gangadhar Tilak", "MG Ranade", "Dadabhai Naoroji", "Raja Ram Mohan Roy"], "a": 1, "e": "Gokhale was mentored by Mahadev Govind Ranade (Justice Ranade) at Pune — who ran the Poona Sarvajanik Sabha and Indian National Social Conference. Gokhale later mentored Gandhi."}]}, {"id": "inc_moderates_extremists", "label": "Moderates vs Extremists & Surat Split", "icon": "🔥", "xp": "60", "seqIdx": "2", "facts": ["<b>Moderate Phase (1885-1905)</b>: Petitions; faith in British justice; Naoroji, Gokhale, Pherozeshah Mehta, Surendranath Banerjee; wanted gradual reforms", "<b>Extremist/Assertive Phase (1905-1920)</b>: Lal-Bal-Pal (Lala Lajpat Rai, Bal Gangadhar Tilak, Bipin Chandra Pal); no faith in British; demanded Swaraj; mass mobilization", "<b>Bal Gangadhar Tilak (1856-1920)</b>: 'Father of Indian Unrest' (Valentine Chirol); 'Swaraj is my birthright' (<i>Kesari</i> 1898); Ganesh festival 1893; Shivaji festival 1895; <i>Gita Rahasya</i>; imprisoned twice; <i>Kesari</i> and <i>Mahratta</i> newspapers", "<b>Bipin Chandra Pal</b>: 'Prophet of New India'; advocated radical methods; Partition of Bengal radicalized him; New India magazine; later withdrew from politics", "<b>Lala Lajpat Rai (Punjab Kesari)</b>: Founded Congress in Punjab; deported 1907 (Mandalay Conspiracy); wrote books on Shivaji and Dayanand; died after Simon Commission lathi charge 1928", "<b>Surat Split 1907</b>: INC split into Moderates vs Extremists at Surat session; Tilak + Pal wanted Lajpat Rai as president (extremists); Moderates imposed Rash Behari Ghosh; walkout; Congress split for ~9 years", "<b>Partition of Bengal 1905</b>: Curzon's partition (Swadeshi trigger); Boycott of British goods; <b>Swadeshi Movement</b>: use Indian-made goods; aroused mass consciousness", "<b>Lucknow Pact 1916</b>: INC + Muslim League agreed on separate electorates; Tilak + Jinnah; reunited Congress moderates + extremists; 'Home Rule' demand", "<b>Home Rule League 1916</b>: Two separate leagues: Tilak's (April 1916, Poona) and Annie Besant's (September 1916, Madras/Adyar); demanded home rule within British Empire", "<b>Bal Gangadhar Tilak key dates</b>: Born 23 July 1856 (Maharashtra Day); died 1 August 1920 ('Lokmanya'); sentenced 18 months (1897 sedition) + 6 years (1908 Mandalay)"], "table": "<table><thead><tr><th>Feature</th><th>Moderates</th><th>Extremists</th></tr></thead><tbody><tr><td>Period</td><td>1885-1905</td><td>1905-1920</td></tr><tr><td>Method</td><td>Petition, Prayer</td><td>Passive resistance, Swadeshi</td></tr><tr><td>Goal</td><td>Reforms within Empire</td><td>Swaraj (self-rule)</td></tr><tr><td>Belief</td><td>Faith in British justice</td><td>No faith in British</td></tr><tr><td>Leaders</td><td>Naoroji, Gokhale, Mehta</td><td>Tilak, Pal, Lajpat Rai</td></tr><tr><td>Base</td><td>Educated elite</td><td>Mass mobilization</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — Lal-Bal-Pal</b><br>'<b>L</b>oyal <b>B</b>rave <b>P</b>atriot'<br><b>L</b>ala Lajpat Rai = <b>L</b>ion of Punjab<br><b>B</b>al Gangadhar Tilak = <b>L</b>okmanya (beloved of people)<br><b>P</b>al Bipin Chandra = <b>P</b>rophet of New India", "traps": ["❌ Surat Split was in 1905 → ✅ Surat Split = <b>1907</b> (1905 = Partition of Bengal)", "❌ 'Swaraj is my birthright' was said by Gandhi → ✅ Famous quote by <b>Bal Gangadhar Tilak</b>", "❌ Tilak founded Home Rule League in Madras → ✅ Tilak's Home Rule = <b>Poona (April 1916)</b>; Annie Besant's = Madras (Sept 1916)", "❌ Lal-Bal-Pal = Lala, Balaji, Pal → ✅ <b>Lala</b> Lajpat Rai + <b>Bal</b>gangadhar Tilak + Bipin Chandra <b>Pal</b>", "❌ Lucknow Pact was only between INC and British → ✅ Lucknow Pact 1916 = <b>INC and Muslim League</b>", "❌ Valentine Chirol called Tilak 'Father of Indian Nationalism' → ✅ Valentine Chirol called Tilak <b>'Father of Indian Unrest'</b>"], "revision": ["Moderates 1885-1905: petition-prayer; Extremists 1905-1920: Swaraj + mass action", "Lal-Bal-Pal = Lajpat Rai + Tilak + Bipin Chandra Pal", "Surat Split 1907: Extremists vs Moderates; split ~9 years", "Lucknow Pact 1916 = INC + ML; Tilak + Jinnah; reunited", "Home Rule: Tilak (Poona, April 1916) + Besant (Madras, Sept 1916)"], "oneliners": ["Tilak: Kesari + Mahratta newspapers; Ganesh festival 1893; Gita Rahasya", "LLR = Punjab Kesari; died after Simon Commission lathi charge 1928", "Bipin Chandra Pal = 'Prophet of New India'; later withdrew from politics", "Swadeshi = Boycott British goods + use Indian goods; triggered by Partition of Bengal 1905"], "flashcards": [{"q": "What was the Surat Split (1907)?", "a": "INC split at Surat session (1907) — Extremists wanted Lajpat Rai as president; Moderates imposed Rash Behari Ghosh; Extremists walked out; Congress split for ~9 years"}, {"q": "What is 'Lal-Bal-Pal' known for?", "a": "Lala Lajpat Rai (Punjab) + Bal Gangadhar Tilak (Maharashtra) + Bipin Chandra Pal (Bengal) — the three leaders of the Extremist/Assertive phase of INC (1905-1920)"}, {"q": "What was the Swadeshi Movement?", "a": "Movement to boycott British goods and use Indian-made goods — triggered by Partition of Bengal 1905; mass movement; extremists led it"}, {"q": "What is Tilak's famous quote?", "a": "'Swaraj is my birthright and I shall have it' — published in Kesari newspaper (1898). Tilak called himself 'Lokmanya' (beloved of people)."}, {"q": "What was the Lucknow Pact (1916)?", "a": "Agreement between INC and Muslim League — INC accepted separate electorates for Muslims; both demanded home rule. Key figures: Tilak and Jinnah."}, {"q": "What were the two Home Rule Leagues (1916)?", "a": "Tilak's Home Rule League: April 1916, Poona. Annie Besant's Home Rule League: September 1916, Madras. Both demanded self-rule within British Empire."}, {"q": "What did Valentine Chirol call Tilak?", "a": "'Father of Indian Unrest' — in his book 'Indian Unrest' (1910)"}, {"q": "What festivals did Tilak start?", "a": "Ganesh Chaturthi festival (1893) and Shivaji festival (1895) — to mobilize Maharashtrian Hindus into nationalist gatherings"}, {"q": "Difference between Moderates and Extremists methods?", "a": "Moderates: Petition, Prayer, Memorial — faith in British justice. Extremists: Passive resistance, Boycott, Swadeshi, mass mobilization — no faith in British."}, {"q": "When and why was Tilak imprisoned?", "a": "1897: 18 months for sedition (after plague officers killed). 1908: 6 years at Mandalay (for articles supporting Muzaffarpur bomb case)."}], "mcqs": [{"q": "The Surat Split (1907) divided INC into:", "o": ["Congress and Muslim League", "Hindus and Muslims", "Moderates and Extremists", "Unionists and Nationalists"], "a": 2, "e": "Surat Split (December 1907): INC split at Surat into Moderates (Gokhale, Mehta) and Extremists/Assertivists (Tilak, Pal, Lajpat Rai). Congress remained split until 1916 Lucknow reunification."}, {"q": "'Swaraj is my birthright and I shall have it' is associated with:", "o": ["Mahatma Gandhi", "Lala Lajpat Rai", "Bal Gangadhar Tilak", "Bipin Chandra Pal"], "a": 2, "e": "This is Bal Gangadhar Tilak's famous quote from his newspaper Kesari (1898). He is called 'Lokmanya' (one beloved by people). Valentine Chirol called him 'Father of Indian Unrest.'"}, {"q": "The Lucknow Pact (1916) was between:", "o": ["INC and British government", "INC and Muslim League", "Tilak and Gokhale", "Moderates and Extremists"], "a": 1, "e": "Lucknow Pact (1916): Agreement between INC and Muslim League — INC accepted separate electorates for Muslims; both demanded home rule. Key figures: Tilak (INC) and Jinnah (ML)."}, {"q": "The Swadeshi Movement was triggered by:", "o": ["Rowlatt Act", "Partition of Bengal 1905", "Jallianwala Bagh", "Simon Commission"], "a": 1, "e": "Swadeshi Movement was triggered by Partition of Bengal 1905 by Lord Curzon. People boycotted British goods and used Indian-made (swadeshi) goods. Extremists led this mass movement."}, {"q": "Tilak's Home Rule League (April 1916) was based at:", "o": ["Bombay", "Madras", "Poona", "Calcutta"], "a": 2, "e": "Tilak founded his Home Rule League in April 1916 at Poona (Pune). Annie Besant founded her separate Home Rule League in September 1916 at Madras/Adyar."}, {"q": "'Father of Indian Unrest' is a title given to:", "o": ["Lala Lajpat Rai", "Bipin Chandra Pal", "Bal Gangadhar Tilak", "Aurobindo Ghosh"], "a": 2, "e": "Valentine Chirol (British journalist) gave Bal Gangadhar Tilak the title 'Father of Indian Unrest' in his 1910 book. Tilak sued him for defamation in a London court (1919) but lost."}, {"q": "'Prophet of New India' is associated with:", "o": ["Bal Gangadhar Tilak", "Bipin Chandra Pal", "Lala Lajpat Rai", "Aurobindo Ghosh"], "a": 1, "e": "Bipin Chandra Pal (of Lal-Bal-Pal) is called 'Prophet of New India.' He advocated radical nationalism and edited 'New India' magazine. He later withdrew from active politics."}, {"q": "Ganesh Chaturthi was popularized as a political platform by:", "o": ["Gokhale", "Tilak", "Pherozeshah Mehta", "Lajpat Rai"], "a": 1, "e": "Bal Gangadhar Tilak started organizing Ganesh Chaturthi as a public festival in 1893 and Shivaji festival in 1895 — to bring people together under a nationalist platform in Maharashtra."}, {"q": "Which INC session reunited Moderates and Extremists after the Surat Split?", "o": ["Surat 1907", "Lucknow 1916", "Calcutta 1906", "Lahore 1929"], "a": 1, "e": "Lucknow Session (1916) reunited Moderates and Extremists through the Lucknow Pact. The pact was between INC and Muslim League. Tilak returned to Congress mainstream."}, {"q": "During the Moderate phase (1885-1905), the primary method of INC was:", "o": ["Mass agitation", "Armed struggle", "Petition, Prayer, Memorial", "Boycott and Swadeshi"], "a": 2, "e": "Moderate phase used 'Petition, Prayer, Memorial' (PPM) method — submitting petitions to British Parliament, praying for reforms, writing memorials. They had faith in British sense of justice."}]}, {"id": "muslim_league_events", "label": "Muslim League & Communal Politics ☪️", "icon": "☪", "xp": "55", "seqIdx": "3", "facts": ["<b>Muslim League founded: 30 December 1906</b>; Dhaka; organized by Nawab Salimullah of Dhaka + Aga Khan III; initial aim: protect Muslim interests and loyalty to Crown", "<b>Aga Khan III</b>: First president of Muslim League (1906); led Shimla Deputation to Viceroy Minto (October 1906) demanding separate electorates", "<b>Shimla Deputation 1906</b>: 35 Muslim leaders led by Aga Khan III met Viceroy Minto; demanded separate electorates for Muslims; Minto sympathized (Minto-Morley Reforms 1909 included separate electorates)", "<b>Morley-Minto Reforms 1909</b>: Separate electorate for Muslims; councils enlarged; Indian member in Executive Council; fuelled communalism", "<b>Muhammad Ali Jinnah</b>: Joined ML in 1913; initially an 'Ambassador of Hindu-Muslim Unity'; had been Congress member from 1904; negotiated Lucknow Pact 1916; later led Pakistan movement", "<b>Lucknow Pact 1916</b>: INC accepted separate electorates; ML accepted INC demands; both demanded Home Rule; brought them together temporarily", "<b>Khilafat Movement 1919-1922</b>: Muhammad Ali + Shaukat Ali (Ali Brothers); supported Ottoman Caliph; Gandhi joined; mass movement united Hindus+Muslims briefly; Gandhi called off after Chauri Chaura", "<b>Communal Award 1932</b>: Ramsay MacDonald; separate electorates for Muslims, Sikhs, Christians, Depressed Classes; Gandhi fasted against Depressed Classes part → Poona Pact", "<b>Two-Nation Theory</b>: Hindus and Muslims are two separate nations; given by Savarkar (1937) and adopted by ML; basis for Pakistan demand", "<b>Lahore Resolution 1940 (Pakistan Resolution)</b>: 23 March 1940; Muhammad Ali Jinnah; Muslim League's demand for separate Muslim state(s) — later called 'Pakistan'"], "table": "<table><thead><tr><th>Event</th><th>Year</th><th>Key Figure</th></tr></thead><tbody><tr><td>Muslim League founded</td><td>1906</td><td>Nawab Salimullah/Aga Khan III</td></tr><tr><td>Shimla Deputation</td><td>1906</td><td>Aga Khan III → Viceroy Minto</td></tr><tr><td>Morley-Minto Reforms</td><td>1909</td><td>Lord Minto II</td></tr><tr><td>Jinnah joins ML</td><td>1913</td><td>Jinnah</td></tr><tr><td>Lucknow Pact</td><td>1916</td><td>Jinnah+Tilak</td></tr><tr><td>Khilafat Movement</td><td>1919-22</td><td>Ali Brothers+Gandhi</td></tr><tr><td>Lahore Resolution</td><td>1940</td><td>Jinnah</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — Muslim League History</b><br>'<b>D</b>haka <b>S</b>tarted <b>M</b>uslim <b>L</b>eague'<br><b>D</b>haka 1906 (Founded) → <b>S</b>himla Deputation 1906 → <b>M</b>orley-Minto 1909 → <b>L</b>ucknow Pact 1916<br>Then: <b>K</b>hilafat (1919) → <b>C</b>ommunal Award (1932) → <b>L</b>ahore Resolution (1940)", "traps": ["❌ Muslim League was founded in Bombay → ✅ Muslim League founded in <b>Dhaka</b>, 30 Dec 1906", "❌ Jinnah was always anti-Congress → ✅ Jinnah was a Congress member (1904-1920) and called 'Ambassador of Hindu-Muslim Unity'", "❌ Khilafat Movement was about Indian Caliph → ✅ Khilafat = support for <b>Ottoman Caliph</b> in Turkey (abolished 1924)", "❌ Two-Nation Theory was given by Jinnah → ✅ Two-Nation Theory term was first used by <b>Savarkar (1937)</b>; ML adopted it", "❌ Lahore Resolution 1940 used the word 'Pakistan' → ✅ Lahore Resolution used 'independent states' — word Pakistan was NOT in the resolution", "❌ Shimla Deputation demanded Hindu-Muslim unity → ✅ Shimla Deputation demanded <b>separate electorates for Muslims</b>"], "revision": ["ML founded 30 Dec 1906, Dhaka, Aga Khan III (1st president)", "Shimla Deputation 1906 → separate electorates → Minto-Morley 1909", "Jinnah in Congress 1904; joined ML 1913; Lucknow Pact 1916", "Khilafat 1919-22: Ali Brothers + Gandhi; ended after Chauri Chaura", "Lahore Resolution 23 March 1940: Pakistan demand"], "oneliners": ["Jinnah's title: 'Quaid-i-Azam' (Great Leader) for Muslims, 'Ambassador of H-M Unity' earlier", "Khilafat ended when Mustafa Kemal Ataturk abolished the Caliphate in 1924", "Communal Award 1932 was by Ramsay MacDonald (British PM), not Viceroy", "Lahore Resolution = 23 March 1940 = Pakistan Day observed by Pakistan"], "flashcards": [{"q": "When and where was the Muslim League founded?", "a": "30 December 1906 at Dhaka (organized by Nawab Salimullah and Aga Khan III). First president: Aga Khan III."}, {"q": "What was the Shimla Deputation (1906)?", "a": "35 Muslim leaders led by Aga Khan III met Viceroy Minto — demanded separate electorates for Muslims. Led to Morley-Minto Reforms 1909."}, {"q": "What was Jinnah's position in Congress?", "a": "Jinnah was a Congress member from 1904. Was called 'Ambassador of Hindu-Muslim Unity'. Joined Muslim League in 1913. Left Congress in 1920."}, {"q": "What was the Khilafat Movement (1919-22)?", "a": "Movement to support Ottoman Caliph's authority — led by Muhammad Ali and Shaukat Ali (Ali Brothers). Gandhi joined to unite Hindus and Muslims in anti-British struggle."}, {"q": "What was the Lahore Resolution (1940)?", "a": "23 March 1940 — Muslim League under Jinnah demanded separate independent state(s) for Muslims (called Pakistan). Note: word 'Pakistan' was NOT in the resolution."}, {"q": "What was the Two-Nation Theory?", "a": "Hindus and Muslims are two separate nations. Term first used by Savarkar (1937); Muslim League adopted it as basis for Pakistan demand."}, {"q": "What was the Communal Award (1932)?", "a": "Ramsay MacDonald's award — separate electorates for Muslims, Sikhs, Christians, and Depressed Classes. Gandhi fasted against it (for Depressed Classes part) → Poona Pact 1932."}, {"q": "Why did the Khilafat Movement end?", "a": "Mustafa Kemal Ataturk abolished the Caliphate in Turkey in 1924. Also, Gandhi called off NCM after Chauri Chaura incident 1922."}, {"q": "What was significant about 30 December 1906?", "a": "Muslim League was founded at Dhaka on 30 December 1906 — same year as the Shimla Deputation (October 1906). Both events aimed at securing Muslim political representation."}, {"q": "What did Morley-Minto Reforms (1909) give to Muslims?", "a": "Separate electorates — Muslims could only vote for Muslim candidates in reserved seats. This fuelled communalism and is seen as 'divide and rule' policy."}], "mcqs": [{"q": "The Muslim League was founded at:", "o": ["Bombay", "Lahore", "Dhaka", "Lucknow"], "a": 2, "e": "Muslim League was founded on 30 December 1906 at Dhaka (now Bangladesh). Organized by Nawab Salimullah Khan of Dhaka and Aga Khan III. Initially aimed at loyalty to Crown and protecting Muslim interests."}, {"q": "The Shimla Deputation (1906) demanded:", "o": ["Abolition of British rule", "Home Rule for India", "Separate electorates for Muslims", "Hindu-Muslim unity"], "a": 2, "e": "Shimla Deputation (October 1906): 35 Muslim leaders led by Aga Khan III met Viceroy Minto, demanding separate electorates for Muslims. Minto agreed; implemented through Morley-Minto Reforms (GoI Act 1909)."}, {"q": "Muhammad Ali Jinnah joined the Muslim League in:", "o": ["1906", "1913", "1920", "1930"], "a": 1, "e": "Jinnah joined the Muslim League in 1913, while still a Congress member. He had joined Congress in 1904. He is called 'Ambassador of Hindu-Muslim Unity' for his early career. Left Congress in 1920."}, {"q": "The Khilafat Movement (1919-22) was led by:", "o": ["Jinnah and Nehru", "Muhammad Ali and Shaukat Ali", "Aga Khan and Nawab Salimullah", "Syed Ahmed Khan and Deoband scholars"], "a": 1, "e": "Khilafat Movement was led by Muhammad Ali and Shaukat Ali (Ali Brothers). They sought to protect the Ottoman Caliph's position. Gandhi joined the movement to unite Hindus and Muslims against British."}, {"q": "The Lahore Resolution (Pakistan Resolution) was passed on:", "o": ["23 March 1940", "14 August 1940", "23 March 1939", "26 January 1940"], "a": 0, "e": "Lahore Resolution was passed on 23 March 1940 by Muslim League under Jinnah. Pakistan observes 23 March as Pakistan Day. Note: the word 'Pakistan' was NOT used in the resolution — it said 'independent states.'"}, {"q": "The 'Two-Nation Theory' was first propounded by:", "o": ["Muhammad Ali Jinnah", "Aga Khan III", "VD Savarkar", "Sir Syed Ahmed Khan"], "a": 2, "e": "The 'Two-Nation Theory' (Hindus and Muslims are two nations) was first given by VD Savarkar in 1937 at a Hindu Mahasabha session. The Muslim League under Jinnah adopted this as its political platform."}, {"q": "The Communal Award (1932) was given by:", "o": ["Viceroy Willingdon", "Ramsay MacDonald", "Winston Churchill", "Lord Irwin"], "a": 1, "e": "Communal Award was given by British PM Ramsay MacDonald in August 1932. It provided separate electorates for Muslims, Sikhs, Christians, and Depressed Classes. Gandhi fasted against the Depressed Classes part → Poona Pact."}, {"q": "Why did the Khilafat Movement eventually collapse?", "a": "Mustafa Kemal Ataturk abolished the Caliphate in Turkey in 1924 — removing the basis of the movement. Also, Gandhi called off NCM in 1922 after Chauri Chaura."}, {"q": "Why did the Khilafat Movement eventually collapse?", "o": ["Gandhi withdrew support", "Caliphate abolished by Ataturk in 1924", "British suppressed it", "Jinnah opposed it"], "a": 1, "e": "The Khilafat Movement collapsed primarily because Mustafa Kemal Ataturk abolished the Ottoman Caliphate in Turkey in 1924. Gandhi calling off NCM in 1922 also weakened it."}, {"q": "Morley-Minto Reforms (1909) introduced separate electorates because:", "o": ["Hindus demanded it", "Muslims demanded it through Shimla Deputation", "British wanted to divide India", "Congress demanded it"], "a": 1, "e": "Separate electorates resulted from the Shimla Deputation (1906) where 35 Muslim leaders led by Aga Khan demanded them from Viceroy Minto. This was a 'divide and rule' strategy."}, {"q": "The first President of Muslim League was:", "o": ["Muhammad Ali Jinnah", "Nawab Salimullah", "Aga Khan III", "Shaukat Ali"], "a": 2, "e": "Aga Khan III (Sultan Mohammed Shah) was the first President of the Muslim League when it was founded at Dhaka in 1906. He had led the Shimla Deputation to Minto in October 1906."}]}, {"id": "gandhi_arrival_movements", "label": "Gandhi's Arrival & Early Movements 🕊️", "icon": "🕊", "xp": "60", "seqIdx": "4", "facts": ["<b>Gandhi arrives India</b>: 9 January 1915 (Pravasi Bharatiya Divas); returned from South Africa; Gokhale was his political mentor", "<b>Champaran Satyagraha 1917</b>: <b>FIRST Satyagraha in India</b>; Bihar; against Tinkathia system (3/20 land for indigo); Annie Besant + Raj Kumar Shukla brought Gandhi; British ordered him out; he refused; first civil disobedience in India", "<b>Ahmedabad Mill Strike 1918</b>: Gandhi's first hunger strike; workers' strike against mill owners for wage hike; Gandhi fasted; owners agreed; 35% wage increase", "<b>Kheda Satyagraha 1918</b>: Gujarat; crop failure; farmers demanded revenue remission; Vallabhbhai Patel was Gandhi's lieutenant here; farmers' no-tax campaign; British suspended collection", "<b>Rowlatt Act Satyagraha 1919</b>: Gandhi's first nationwide satyagraha; Jallianwala followed (13 April 1919); Gandhi called off when violence broke out (Ahmedabad riots)", "<b>Non-Cooperation Movement (NCM) 1920-22)</b>: 4 Sep 1920 (Calcutta session); 'Swaraj in one year'; returned medals, boycott councils/schools/courts; Khilafat united Hindus+Muslims; Gandhi called off after <b>Chauri Chaura 5 Feb 1922</b>", "<b>Chauri Chaura 5 February 1922</b>: Gorakhpur, UP; mob burnt police station killing 22 policemen; Gandhi called off NCM; criticized by many nationalists", "<b>Gandhi's tools</b>: Satyagraha (truth-force), Ahimsa (non-violence), Hartal (strike), Fasting, Civil Disobedience, Non-Cooperation", "<b>Gandhi's Ashrams</b>: Phoenix Settlement 1904 (Durban, SA); Tolstoy Farm 1910 (SA); Sabarmati Ashram 1917 (Ahmedabad); Sewagram Ashram 1936 (Wardha)", "<b>Indian Opinion</b>: Gandhi's journal in SA; in India: <i>Young India</i> (English) and <i>Navajivan</i> (Gujarati) from 1919; Harijan (1932)"], "table": "<table><thead><tr><th>Satyagraha</th><th>Year</th><th>Place</th><th>Issue</th></tr></thead><tbody><tr><td>Champaran</td><td>1917</td><td>Bihar</td><td>Tinkathia/Indigo</td></tr><tr><td>Ahmedabad</td><td>1918</td><td>Gujarat</td><td>Mill workers' wages</td></tr><tr><td>Kheda</td><td>1918</td><td>Gujarat</td><td>Revenue remission</td></tr><tr><td>Rowlatt</td><td>1919</td><td>Nationwide</td><td>Anti-Rowlatt Act</td></tr><tr><td>Non-Cooperation</td><td>1920-22</td><td>Nationwide</td><td>Swaraj/Khilafat</td></tr><tr><td>Salt/Dandi</td><td>1930</td><td>Gujarat→Dandi</td><td>Salt Law violation</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — Gandhi's Satyagrahas</b><br>'<b>C</b>hamparan <b>A</b>hmedabad <b>K</b>heda — <b>R</b>owlatt <b>N</b>on-Cooperated'<br>C(1917)→A(1918)→K(1918)→R(1919)→NCM(1920-22)<br>Remember: all three local ones first, then national", "traps": ["❌ Champaran was first satyagraha in South Africa → ✅ Champaran 1917 = <b>first satyagraha in India</b>", "❌ Chauri Chaura was in Ahmedabad → ✅ Chauri Chaura = <b>Gorakhpur, UP</b> (5 Feb 1922)", "❌ Gandhi called off NCM because British agreed → ✅ Gandhi called off NCM due to <b>Chauri Chaura violence</b>", "❌ Gandhi arrived India in 1920 → ✅ Gandhi arrived India on <b>9 January 1915</b>", "❌ Kheda Satyagraha was against indigo farming → ✅ Kheda = revenue remission; Champaran = indigo (Tinkathia)", "❌ Sabarmati Ashram was in Wardha → ✅ Sabarmati = <b>Ahmedabad</b>; Wardha = <b>Sewagram Ashram 1936</b>"], "revision": ["Gandhi arrives India 9 Jan 1915; Gokhale = political mentor", "Champaran 1917 = 1st satyagraha in India (Bihar, indigo/Tinkathia)", "NCM Sept 1920 → called off Feb 1922 after Chauri Chaura", "Chauri Chaura 5 Feb 1922 = Gorakhpur, UP; 22 policemen killed", "Gandhi's ashrams: Phoenix(1904)→Tolstoy(1910)→Sabarmati(1917)→Sewagram(1936)"], "oneliners": ["Raj Kumar Shukla brought Gandhi to Champaran", "Vallabhbhai Patel was Gandhi's lieutenant in Kheda 1918", "Tinkathia: peasants to grow indigo on 3/20 of land", "Gandhi's 'Swaraj in one year' claim for NCM (didn't happen)"], "flashcards": [{"q": "When did Gandhi return to India and from where?", "a": "9 January 1915 — returned from South Africa (after 21 years). Gokhale was his political mentor."}, {"q": "What was the Champaran Satyagraha (1917) about?", "a": "Bihar farmers forced to grow indigo on 3/20 of land (Tinkathia system). First satyagraha in India. Gandhi arrested; British backed down."}, {"q": "Why did Gandhi call off the Non-Cooperation Movement?", "a": "Chauri Chaura incident (5 February 1922, Gorakhpur, UP) — mob burned police station killing 22 policemen. Gandhi insisted on non-violence."}, {"q": "What was the Kheda Satyagraha (1918)?", "a": "Gujarat farmers demanded revenue remission after crop failure. Gandhi + Vallabhbhai Patel led no-tax campaign. British suspended collection."}, {"q": "What was the NCM slogan?", "a": "'Swaraj in one year' — though Gandhi's prediction proved incorrect. NCM started September 1920, called off February 1922."}, {"q": "What were Gandhi's main newspapers?", "a": "Young India (English, from 1919), Navajivan (Gujarati, from 1919), Harijan (1932). Earlier: Indian Opinion in South Africa."}, {"q": "What was the Ahmedabad Mill Strike (1918)?", "a": "Workers' strike for 35% wage hike. Gandhi's first hunger strike. Mill owners eventually agreed."}, {"q": "What were Gandhi's four ashrams?", "a": "Phoenix Settlement 1904 (SA), Tolstoy Farm 1910 (SA), Sabarmati Ashram 1917 (Ahmedabad), Sewagram Ashram 1936 (Wardha)"}, {"q": "What was the Tinkathia system in Champaran?", "a": "System forcing indigo farmers to cultivate indigo on 3/20 (three-twentieths) of their land. British planters profited; farmers suffered."}, {"q": "Who brought Gandhi to Champaran?", "a": "Raj Kumar Shukla — a local indigo farmer who persistently requested Gandhi to visit and see the conditions in Champaran."}], "mcqs": [{"q": "Gandhi's first Satyagraha in India was:", "o": ["Rowlatt Satyagraha", "Non-Cooperation Movement", "Champaran Satyagraha", "Kheda Satyagraha"], "a": 2, "e": "Champaran Satyagraha (1917) was Gandhi's first satyagraha in India — against the Tinkathia system forcing farmers to grow indigo. Annie Besant and Raj Kumar Shukla brought Gandhi there."}, {"q": "The Non-Cooperation Movement was called off due to:", "o": ["Jallianwala Bagh massacre", "Simon Commission protests", "Chauri Chaura incident", "Gandhi's arrest"], "a": 2, "e": "NCM was called off by Gandhi on 12 February 1922 after the Chauri Chaura incident (5 Feb 1922, Gorakhpur, UP) — where a mob burned a police station killing 22 policemen. Gandhi insisted on non-violence."}, {"q": "Gandhi returned to India from South Africa on:", "o": ["9 January 1912", "9 January 1915", "9 March 1915", "26 January 1915"], "a": 1, "e": "Gandhi returned to India on 9 January 1915 (now celebrated as Pravasi Bharatiya Divas). He spent 21 years in South Africa (1893-1914). Gokhale was his political mentor in India."}, {"q": "The Tinkathia system (Champaran 1917) related to:", "o": ["Salt production", "Indigo cultivation", "Cotton weaving", "Land revenue"], "a": 1, "e": "Tinkathia system: farmers were forced to cultivate indigo on 3/20 (tinkathia means three-twentieths) of their land for British planters at low prices. Gandhi's intervention got it abolished."}, {"q": "Chauri Chaura (1922) was located in:", "o": ["Bihar", "Gujarat", "Punjab", "Gorakhpur, UP"], "a": 3, "e": "Chauri Chaura was in Gorakhpur district, United Provinces (UP). On 5 February 1922, agitators burned the police station killing 22 policemen. This led Gandhi to call off NCM."}, {"q": "Sabarmati Ashram was located at:", "o": ["Wardha", "Ahmedabad", "Porbandar", "Rajkot"], "a": 1, "e": "Sabarmati Ashram was established by Gandhi at Ahmedabad in 1917. It was from here that the Dandi March began on 12 March 1930. Gandhi called it his 'home' in India."}, {"q": "Gandhi's first hunger strike in India was during:", "o": ["Champaran Satyagraha", "Ahmedabad Mill Strike", "Kheda Satyagraha", "Rowlatt Satyagraha"], "a": 1, "e": "Gandhi conducted his first hunger strike during the Ahmedabad Mill Strike of 1918 — to support mill workers demanding a 35% wage increase. Mill owners eventually agreed."}, {"q": "Vallabhbhai Patel was Gandhi's lieutenant in:", "o": ["Champaran Satyagraha", "Dandi March", "Kheda Satyagraha", "Bardoli Satyagraha"], "a": 2, "e": "Vallabhbhai Patel (Sardar Patel) first came to prominence as Gandhi's lieutenant in the Kheda Satyagraha (1918) in Gujarat. He later led Bardoli Satyagraha (1928) — earning him the title 'Sardar'."}, {"q": "The NCM demanded 'Swaraj in one year' by:", "o": ["1921", "1922", "1923", "1925"], "a": 0, "e": "Gandhi promised 'Swaraj in one year' meaning by 1921. However, the NCM was called off in February 1922 after Chauri Chaura without achieving Swaraj."}, {"q": "Gandhi's newspaper 'Harijan' was started in:", "o": ["1919", "1922", "1929", "1932"], "a": 3, "e": "Gandhi started the weekly 'Harijan' in 1932 (while imprisoned at Agha Khan Palace, Pune). Young India (English) and Navajivan (Gujarati) were started in 1919."}]}, {"id": "jallianwala_ncm", "label": "Jallianwala Bagh to Non-Cooperation", "icon": "💔", "xp": "65", "seqIdx": "5", "facts": ["<b>Jallianwala Bagh Massacre: 13 April 1919</b>: Baisakhi; Amritsar; Dr. Saifuddin Kitchlew + Dr. Satyapal arrested; 20,000 people gathered in walled garden; General Dyer fired 1,650 rounds in 10 minutes; Official count: 379 dead, 1,200 wounded; Hunter Commission: 379 dead; Dyer called it 'minimum necessary force'", "<b>Hunter Commission 1919</b>: Investigated Jallianwala; found Dyer guilty; Dyer removed from command; but House of Lords defended him; 'Morning Post' raised £26,000 for Dyer", "<b>Rabindranath Tagore's reaction</b>: Renounced his Knighthood after Jallianwala Bagh massacre in protest", "<b>Udham Singh</b>: Avenged Jallianwala by shooting Michael O'Dwyer (Lt. Governor of Punjab) in London on <b>13 March 1940</b>; hanged 31 July 1940", "<b>Non-Cooperation Movement 1920-22</b>: Congress's Special Session (September 1920, Calcutta) + annual session (December 1920, Nagpur) endorsed NCM; boycott of legislative councils, courts, schools, foreign cloth; return of titles and medals; students left British colleges; lawyers suspended practice", "<b>Khilafat Conference 1919</b>: Muhammad Ali + Shaukat Ali (Ali Brothers); Gandhi joined to unite Hindus-Muslims; NCM and Khilafat ran together; gave NCM mass character", "<b>Effects of NCM</b>: Massive national awakening; lakhs joined; Hindu-Muslim unity; British alarmed; many arrested; Gandhi arrested 10 March 1922; sentenced 6 years", "<b>Chauri Chaura 5 Feb 1922</b>: 22 policemen killed by mob; Gandhi called off entire NCM; C.R. Das, Nehru, Lajpat Rai criticized Gandhi's decision but ultimately supported", "<b>Swaraj Party 1923</b>: CR Das + Motilal Nehru formed Swaraj Party after NCM called off; to enter councils and obstruct from within; Won elections 1923; CR Das died 1925", "<b>September 1920 Calcutta Special Session</b>: Congress accepted NCM; Lala Lajpat Rai presided (not Gandhi); Motilal Nehru and CR Das initially opposed NCM"], "table": "<table><thead><tr><th>Event</th><th>Date</th><th>Key Figure</th></tr></thead><tbody><tr><td>Jallianwala Bagh</td><td>13 April 1919</td><td>Gen. Dyer; 379 dead (official)</td></tr><tr><td>Tagore renounces knighthood</td><td>1919</td><td>Rabindranath Tagore</td></tr><tr><td>NCM started</td><td>Sept 1920</td><td>Gandhi (Congress endorsed)</td></tr><tr><td>Chauri Chaura</td><td>5 Feb 1922</td><td>Gorakhpur UP; 22 police killed</td></tr><tr><td>Gandhi arrested</td><td>10 March 1922</td><td>6-year sentence</td></tr><tr><td>Swaraj Party formed</td><td>1923</td><td>CR Das + Motilal Nehru</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — Post-Jallianwala Events</b><br>'<b>J</b>allianwala <b>H</b>unter <b>T</b>agore <b>N</b>ot <b>C</b>ooperating'<br><b>J</b>allianwala(April 1919)→<b>H</b>unter Commission→<b>T</b>agore renounces→<b>N</b>CM(Sept 1920)→<b>C</b>hauri Chaura(Feb 1922)", "traps": ["❌ 379 is exact death count of Jallianwala → ✅ 379 = <b>official/Hunter Commission count</b>; estimates go 1000+", "❌ Tagore resigned from INC after Jallianwala → ✅ Tagore <b>renounced his KNIGHTHOOD</b> (not INC membership)", "❌ Udham Singh shot Gen. Dyer → ✅ Udham Singh shot <b>Michael O'Dwyer</b> (Lt. Governor of Punjab) in London 1940", "❌ Gandhi was presiding at NCM Calcutta session → ✅ <b>Lala Lajpat Rai presided</b> at Calcutta 1920 session", "❌ CR Das and Motilal Nehru always supported NCM → ✅ They initially <b>opposed</b> NCM; joined after Nagpur session Dec 1920", "❌ Swaraj Party wanted to boycott councils → ✅ Swaraj Party wanted to <b>enter councils and disrupt</b> from within"], "revision": ["Jallianwala 13 April 1919: Gen. Dyer, 379 dead (official), Baisakhi", "Tagore renounced Knighthood; Udham Singh shot O'Dwyer 1940", "NCM Sept 1920 (Calcutta); called off Feb 1922 (Chauri Chaura)", "Gandhi arrested 10 March 1922; sentenced 6 years", "Swaraj Party 1923: CR Das + Motilal Nehru; enter councils, disrupt"], "oneliners": ["Gen. Dyer fired 1,650 rounds in 10 minutes — claimed 'minimum necessary force'", "Hunter Commission found Dyer guilty but House of Lords defended him", "'Morning Post' (British newspaper) raised £26,000 for General Dyer", "Swaraj Party: CR Das died 1925; Motilal Nehru became sole leader"], "flashcards": [{"q": "How many rounds were fired at Jallianwala Bagh?", "a": "1,650 rounds in 10 minutes by General Dyer. Official death count: 379 (Hunter Commission). The well had 120 bodies. Dyer called it 'minimum necessary force.'"}, {"q": "Who avenged Jallianwala Bagh and how?", "a": "Udham Singh shot Michael O'Dwyer (Lt. Governor of Punjab) at Caxton Hall, London on 13 March 1940. Hanged 31 July 1940."}, {"q": "What did Tagore do in response to Jallianwala Bagh?", "a": "Rabindranath Tagore renounced his Knighthood (awarded 1915) in protest against the massacre."}, {"q": "When was the NCM officially endorsed by Congress?", "a": "Special Calcutta session (September 1920) — presided by Lala Lajpat Rai. Later endorsed at Nagpur session (December 1920)."}, {"q": "What happened to Gandhi after Chauri Chaura?", "a": "Gandhi called off NCM. He was arrested on 10 March 1922, tried for sedition, sentenced to 6 years. Released in 1924 due to illness."}, {"q": "What was the Swaraj Party (1923)?", "a": "Formed by CR Das and Motilal Nehru after NCM collapse. Entered legislative councils to obstruct British rule from within. CR Das died 1925."}, {"q": "Who presided at the Calcutta Special Session (Sept 1920) that endorsed NCM?", "a": "Lala Lajpat Rai — not Gandhi. CR Das and Motilal Nehru initially opposed NCM at this session."}, {"q": "What was Hunter Commission's finding?", "a": "Lord Hunter investigated Jallianwala — found Dyer guilty, ordered his removal. But House of Lords passed a motion in Dyer's support."}, {"q": "How did Hindu-Muslim unity get reflected in NCM?", "a": "Khilafat Movement (Ali Brothers) joined NCM — Muslims and Hindus cooperated. Gandhi used Khilafat as a bridge for unity. It was a brief but significant Hindu-Muslim cooperation."}, {"q": "What were the main forms of boycott during NCM?", "a": "Boycott of legislative councils, courts, schools/colleges, foreign cloth; return of titles/medals; lawyers suspended practice; students left British institutions"}], "mcqs": [{"q": "The official death count at Jallianwala Bagh (Hunter Commission) was:", "o": ["120", "379", "1000", "1200"], "a": 1, "e": "Hunter Commission gave the official death toll as 379. The actual toll was likely much higher (estimates: 1000+). 1,650 rounds were fired in ~10 minutes. The well at Jallianwala Bagh contained 120 bodies."}, {"q": "Udham Singh shot Michael O'Dwyer in:", "o": ["Amritsar 1919", "London 1940", "Delhi 1940", "Lahore 1941"], "a": 1, "e": "Udham Singh shot Michael O'Dwyer (Lt. Governor of Punjab during Jallianwala Bagh) at Caxton Hall, London on 13 March 1940 — to avenge the massacre. He was hanged on 31 July 1940."}, {"q": "Rabindranath Tagore's response to Jallianwala Bagh was to:", "o": ["Resign from INC", "Renounce his Knighthood", "Lead a protest march", "Write a condemnation poem"], "a": 1, "e": "Tagore renounced his Knighthood (awarded in 1915) in a letter to Viceroy Chelmsford in May 1919 — protesting Jallianwala Bagh and martial law in Punjab."}, {"q": "The Congress Special Session that endorsed NCM (Sept 1920) was presided by:", "o": ["Mahatma Gandhi", "Lala Lajpat Rai", "CR Das", "Motilal Nehru"], "a": 1, "e": "The Special Calcutta Session (September 1920) endorsing NCM was presided by Lala Lajpat Rai. CR Das and Motilal Nehru initially opposed it but later joined. Gandhi's motion passed 1855 vs 873."}, {"q": "The Swaraj Party (1923) was formed by:", "o": ["Gandhi and Nehru", "CR Das and Motilal Nehru", "Tilak and Gokhale", "Lajpat Rai and Bipin Pal"], "a": 1, "e": "Swaraj Party was formed in 1923 by CR Das (Deshbandhu) and Motilal Nehru (father of Jawaharlal). They aimed to enter legislative councils and obstruct from within — unlike Gandhi's constructive program."}, {"q": "General Dyer fired how many rounds at Jallianwala Bagh?", "o": ["650", "1000", "1650", "2000"], "a": 2, "e": "General Dyer ordered 1,650 rounds to be fired in approximately 10 minutes at the unarmed crowd of ~20,000 people assembled on Baisakhi (13 April 1919) at Jallianwala Bagh."}, {"q": "Gandhi was sentenced to __ years after Chauri Chaura:", "o": ["2", "4", "6", "10"], "a": 2, "e": "Gandhi was arrested on 10 March 1922 and sentenced to 6 years imprisonment for 'promoting disaffection towards the government.' He was released in 1924 after a surgery for appendicitis."}, {"q": "The Hunter Commission was set up to investigate:", "o": ["Simon Commission boycott", "Jallianwala Bagh massacre", "Chauri Chaura incident", "Meerut Conspiracy Case"], "a": 1, "e": "Hunter Commission (headed by Lord Hunter) was set up to investigate the Jallianwala Bagh massacre and martial law imposed in Punjab. It found Dyer guilty but the British government took no serious action."}, {"q": "The NCM aimed to achieve Swaraj within:", "o": ["5 years", "2 years", "1 year", "10 years"], "a": 2, "e": "Gandhi promised 'Swaraj in one year' at the Calcutta Special Session (1920). This was a bold and unrealistic promise — but it energized millions into joining NCM. Swaraj was not achieved; NCM was called off in 1922."}, {"q": "'Morning Post' raised money for:", "o": ["Jallianwala victims", "General Dyer", "Gandhi's defence", "Udham Singh"], "a": 1, "e": "The British newspaper 'Morning Post' raised £26,000 for General Dyer after he was removed from command — showing British public's sympathy for the man who ordered the Jallianwala massacre."}]}, {"id": "chauri_swaraj_hra", "label": "Chauri to Swaraj: HRA & Simon", "icon": "🔴", "xp": "55", "seqIdx": "6", "facts": ["<b>Hindustan Republican Association (HRA) 1924</b>: Founded by Sachindra Nath Sanyal; Shakti Sanyal; manifesto 'The Revolutionary'; aim = armed revolution to overthrow British", "<b>Kakori Conspiracy/Train Action 9 August 1924 → 9 August 1925</b>: Ram Prasad Bismil + Ashfaqullah Khan + Roshan Singh + Rajendra Lahiri looted train treasury near Kakori, Lucknow; all arrested; Bismil+Ashfaq+Roshan Singh+Lahiri hanged (Dec 1927)", "<b>Saunders Murder Case 1928</b>: Lahore; Bhagat Singh + Chandrashekhar Azad + Rajguru killed British officer John Saunders (mistaken for ASP Scott, who had ordered lathi charge on Lala Lajpat Rai); LLR died shortly after", "<b>HSRA (Hindustan Socialist Republican Association)</b>: HRA renamed to HSRA in 1928; Bhagat Singh, Chandrashekhar Azad, Sukhdev, Rajguru — added 'Socialist' to reflect ideology", "<b>Assembly Bomb Case 8 April 1929</b>: Bhagat Singh + Batukeshwar Dutt threw bombs in Central Legislative Assembly (Delhi); deliberately did not want to kill anyone; 'To make the deaf hear'; arrested voluntarily; trial became platform for revolutionary ideas", "<b>Lahore Conspiracy Case 1929-30</b>: Bhagat Singh + Rajguru + Sukhdev hanged <b>23 March 1931</b> at Lahore Central Jail (a day before scheduled, secretly at sunset to avoid protests); Chandrashekhar Azad killed himself at Alfred Park, Allahabad 27 Feb 1931", "<b>Lahore Session 1929</b>: Jawaharlal Nehru presided; <b>Poorna Swaraj (Complete Independence)</b> declared; tricolour hoisted 31 December 1929; 26 January 1930 first Independence Day celebrated", "<b>Simon Commission</b>: All-White commission (1927-29); 'Simon Go Back'; Lala Lajpat Rai lathi-charged 30 Oct 1928; died 17 Nov 1928; Bhagat Singh avenged by killing Saunders", "<b>Ram Prasad Bismil's last words</b>: 'Sarfaroshi ki tamanna ab hamare dil mein hai' (poem by Bismil Azimabadi); shouted at gallows", "<b>Bhagat Singh's age</b>: Born 28 Sep 1907; hanged 23 Mar 1931 = only 23 years old"], "table": "<table><thead><tr><th>Event</th><th>Date</th><th>People</th></tr></thead><tbody><tr><td>HRA founded</td><td>1924</td><td>Sachindra Nath Sanyal</td></tr><tr><td>Kakori Train Action</td><td>9 Aug 1925</td><td>Bismil, Ashfaq, Roshan, Lahiri</td></tr><tr><td>LLR lathi-charged</td><td>30 Oct 1928</td><td>Lala Lajpat Rai (died 17 Nov)</td></tr><tr><td>Saunders murder</td><td>17 Dec 1928</td><td>Bhagat Singh, Azad, Rajguru</td></tr><tr><td>Assembly Bomb</td><td>8 April 1929</td><td>Bhagat Singh, BK Dutt</td></tr><tr><td>Bhagat Singh hanged</td><td>23 March 1931</td><td>Bhagat Singh, Rajguru, Sukhdev</td></tr><tr><td>Azad killed</td><td>27 Feb 1931</td><td>Alfred Park, Allahabad</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — Revolutionary dates</b><br>'<b>K</b>akori <b>S</b>aunders <b>A</b>ssembly <b>L</b>ahore'<br>K(1925)→S(1928)→A(1929)→L(1931 hanging)<br>Bhagat Singh = born 1907, hanged 1931 aged 23", "traps": ["❌ Kakori Train Action was in 1924 → ✅ Kakori = <b>9 August 1925</b> (HRA founded 1924)", "❌ Bhagat Singh killed John Saunders in the Assembly → ✅ Saunders killed in <b>Lahore</b>; bombs thrown in <b>Delhi Assembly</b>", "❌ Bhagat Singh wanted to kill ASP Scott → ✅ Target was Scott (who ordered LLR lathi charge); <b>accidentally killed Saunders</b>", "❌ Bhagat Singh was hanged on 24 March 1931 → ✅ Hanged <b>23 March 1931</b> (a day before scheduled; secretly at sunset)", "❌ Chandrashekhar Azad surrendered to British → ✅ Azad <b>shot himself</b> at Alfred Park, Allahabad (27 Feb 1931) to avoid capture", "❌ HSRA and HRA are different organizations → ✅ <b>HSRA = HRA renamed</b> (added 'Socialist') in 1928"], "revision": ["Kakori 9 Aug 1925: Bismil + Ashfaq (hanged Dec 1927)", "Saunders killed 17 Dec 1928 by Bhagat Singh+Rajguru+Azad (for LLR death)", "Assembly bomb 8 April 1929: Bhagat Singh+BK Dutt (not to kill, to be heard)", "Bhagat Singh+Rajguru+Sukhdev hanged 23 March 1931, Lahore", "Azad shot himself Alfred Park 27 Feb 1931"], "oneliners": ["HRA 1924 → renamed HSRA 1928 (added Socialist)", "Bhagat Singh was only 23 when hanged (born 1907, died 1931)", "'Inquilab Zindabad' slogan in India popularized by Bhagat Singh", "Lahore Session 1929: Nehru presided; Poorna Swaraj declared; 26 Jan = Independence Day"], "flashcards": [{"q": "What was the Kakori Train Action (1925)?", "a": "9 August 1925 near Kakori, Lucknow — Ram Prasad Bismil, Ashfaqullah Khan, Roshan Singh and others looted British Treasury train. All arrested and hanged (Dec 1927)."}, {"q": "Why did Bhagat Singh kill Saunders (1928)?", "a": "To avenge the death of Lala Lajpat Rai (died 17 Nov 1928 after lathi charge during Simon Commission protests). Target was ASP Scott; accidentally killed DSP John Saunders."}, {"q": "What happened on 8 April 1929 in the Central Legislative Assembly?", "a": "Bhagat Singh and Batukeshwar Dutt threw smoke bombs in the Assembly. They wanted to 'make the deaf hear' — not to kill. They were arrested voluntarily."}, {"q": "When were Bhagat Singh, Rajguru, and Sukhdev hanged?", "a": "23 March 1931 — hanged at Lahore Central Jail at sunset (a day before scheduled, secretly). Chandrashekhar Azad had shot himself on 27 February 1931."}, {"q": "When was Poorna Swaraj declared?", "a": "31 December 1929 — at Lahore session presided by Jawaharlal Nehru; tricolour hoisted; 26 January 1930 celebrated as first Independence Day"}, {"q": "Who founded the Hindustan Republican Association (HRA)?", "a": "Sachindra Nath Sanyal founded HRA in 1924. It was renamed Hindustan Socialist Republican Association (HSRA) in 1928."}, {"q": "How did Chandrashekhar Azad die?", "a": "Shot himself at Alfred Park, Allahabad on 27 February 1931 to avoid capture by British police. His pistol had one bullet left which he used on himself."}, {"q": "What was Bhagat Singh's age when hanged?", "a": "23 years old — born 28 September 1907, hanged 23 March 1931"}, {"q": "What was the slogan popularized by Bhagat Singh?", "a": "'Inquilab Zindabad' (Long Live Revolution) — shouted in the Assembly after throwing bombs"}, {"q": "When was the Simon Commission boycotted and who was lathi-charged?", "a": "Simon Commission reached India 3 February 1928. Lala Lajpat Rai was lathi-charged on 30 October 1928 during protests in Lahore; died 17 November 1928."}], "mcqs": [{"q": "The Kakori Train Action took place on:", "o": ["9 August 1924", "9 August 1925", "9 August 1942", "9 August 1920"], "a": 1, "e": "Kakori Train Action: 9 August 1925 near Kakori (Lucknow). Ram Prasad Bismil, Ashfaqullah Khan, Roshan Singh, Rajendra Lahiri looted British Treasury train. All four were hanged in December 1927."}, {"q": "Bhagat Singh threw bombs in the Central Legislative Assembly on:", "o": ["8 April 1927", "8 April 1929", "8 April 1930", "8 April 1928"], "a": 1, "e": "Bhagat Singh and Batukeshwar Dutt threw smoke/noise bombs in the Central Legislative Assembly, Delhi on 8 April 1929 — to protest Public Safety Bill and Trade Dispute Bill. They shouted 'Inquilab Zindabad'."}, {"q": "Bhagat Singh was hanged on:", "o": ["24 March 1931", "23 March 1931", "23 March 1930", "22 March 1931"], "a": 1, "e": "Bhagat Singh, Rajguru, and Sukhdev were hanged on 23 March 1931 at Lahore Central Jail (secretly, a day before scheduled, at sunset). Chandrashekhar Azad had already shot himself on 27 Feb 1931."}, {"q": "Chandrashekhar Azad died at:", "o": ["Lahore Central Jail", "Alfred Park, Allahabad", "Anushilan Society HQ", "Delhi prison"], "a": 1, "e": "Chandrashekhar Azad shot himself at Alfred Park, Allahabad (now Azad Park) on 27 February 1931 to avoid British capture. He had vowed to never be captured alive."}, {"q": "The Lahore Congress Session 1929 was presided by:", "o": ["Mahatma Gandhi", "Subhas Chandra Bose", "Jawaharlal Nehru", "Lala Lajpat Rai"], "a": 2, "e": "Jawaharlal Nehru presided over the historic Lahore Session (Dec 1929) where Congress declared Poorna Swaraj (Complete Independence). The tricolour was hoisted and 26 January was declared Independence Day."}, {"q": "Lala Lajpat Rai was lathi-charged on:", "o": ["3 February 1928", "30 October 1928", "17 November 1928", "13 April 1929"], "a": 1, "e": "Lala Lajpat Rai was lathi-charged on 30 October 1928 in Lahore during Simon Commission protests. He died on 17 November 1928 from injuries. This led Bhagat Singh to avenge his death by killing Saunders (December 1928)."}, {"q": "HRA was renamed HSRA (added 'Socialist') in:", "o": ["1924", "1926", "1928", "1929"], "a": 2, "e": "Hindustan Republican Association (HRA, 1924) was renamed to Hindustan Socialist Republican Association (HSRA) in 1928 — reflecting the socialist ideology of Bhagat Singh and his comrades."}, {"q": "Bhagat Singh killed John Saunders (1928) to avenge the death of:", "o": ["Ashfaqullah Khan", "Ram Prasad Bismil", "Lala Lajpat Rai", "Chandrashekhar Azad"], "a": 2, "e": "Bhagat Singh targeted ASP Scott who had ordered the lathi charge on Lala Lajpat Rai (Oct 1928). He accidentally killed DSP John Saunders. LLR died on 17 November 1928 from injuries."}, {"q": "26 January was first celebrated as 'Independence Day' in:", "o": ["1927", "1929", "1930", "1947"], "a": 2, "e": "After the Lahore Session (December 1929) declared Poorna Swaraj, Congress decided that 26 January 1930 would be celebrated as Independence Day throughout India. This led to the choice of 26 January 1950 for Republic Day."}, {"q": "The Assembly Bomb Case (1929) aimed to:", "o": ["Kill British officials", "Make the government hear their demands", "Start a revolution", "Protest Gandhi's policies"], "a": 1, "e": "Bhagat Singh and BK Dutt deliberately did not throw bombs to kill anyone. The pamphlet they scattered said 'To make the deaf hear' — it was a symbolic act to protest the Public Safety Bill and publicize revolutionary ideas."}]}, {"id": "cdm_round_table", "label": "Civil Disobedience & Round Table", "icon": "🧂", "xp": "65", "seqIdx": "7", "facts": ["<b>Dandi March 12 March 1930</b>: Gandhi walked 241 miles from <b>Sabarmati Ashram</b> to <b>Dandi</b> (reached 6 April 1930); violated Salt Law; started CDM; 79 followers + Gandhi", "<b>Civil Disobedience Movement 1930-34</b>: Boycott foreign cloth, salt production, liquor shops; women participated massively; Chittagong Armory Raid (18 April 1930) by Surya Sen", "<b>Chittagong Armory Raid 18 April 1930</b>: Surya Sen (Masterda); seized 2 armories; Indian Republican Army; Surya Sen captured 1933, hanged 12 January 1934", "<b>1st Round Table Conference 1930 (London)</b>: Congress boycotted; Muslim League, Princes, B.R. Ambedkar attended; no agreement", "<b>Gandhi-Irwin Pact 5 March 1931</b>: Gandhi suspended CDM; agreed to attend 2nd RTC; political prisoners released; salt manufacture allowed near sea", "<b>2nd Round Table Conference Sept-Dec 1931</b>: Gandhi attended as sole Congress representative; Ambedkar demanded separate electorates for Depressed Classes; no agreement", "<b>3rd Round Table Conference 1932</b>: Congress boycotted; Communal Award 1932 followed", "<b>Communal Award 1932</b>: Ramsay MacDonald; separate electorates for Depressed Classes (untouchables); Gandhi fasted; Poona Pact 1932 = Ambedkar agreed to reserved seats instead", "<b>Poona Pact 26 September 1932</b>: Gandhi-Ambedkar; reserved seats (148) for Depressed Classes in provincial legislatures (vs 71 in Communal Award) but joint electorates", "<b>CDM called off April 1934</b>: Gandhi called off CDM (2nd phase 1932-34); started constructive program; Congress contested 1937 elections under GoI Act 1935"], "table": "<table><thead><tr><th>Event</th><th>Date</th><th>Significance</th></tr></thead><tbody><tr><td>Dandi March begins</td><td>12 March 1930</td><td>79 followers; Salt Law</td></tr><tr><td>Salt lifted at Dandi</td><td>6 April 1930</td><td>CDM begins nationwide</td></tr><tr><td>1st RTC</td><td>Nov 1930-Jan 1931</td><td>Congress absent; no result</td></tr><tr><td>Gandhi-Irwin Pact</td><td>5 March 1931</td><td>CDM suspended</td></tr><tr><td>2nd RTC</td><td>Sept-Dec 1931</td><td>Gandhi alone; no result</td></tr><tr><td>Communal Award</td><td>Aug 1932</td><td>Separate seats for Depressed Classes</td></tr><tr><td>Poona Pact</td><td>26 Sept 1932</td><td>Reserved seats (joint electorate)</td></tr><tr><td>CDM called off</td><td>April 1934</td><td>Gandhi starts constructive program</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — CDM + RTCs</b><br>'<b>D</b>andi <b>G</b>andhi <b>I</b>rwin <b>R</b>ound <b>C</b>ommunal <b>P</b>oona'<br><b>D</b>andi March(12 Mar 1930)→<b>G</b>andhi-Irwin Pact(5 Mar 1931)→<b>I</b>rwin/2nd RTC(Sept 1931)→<b>R</b>ound Tables 3→<b>C</b>ommunal Award(1932)→<b>P</b>oona Pact(26 Sept 1932)", "traps": ["❌ Gandhi attended 1st Round Table Conference → ✅ Congress boycotted 1st RTC; Gandhi attended <b>2nd RTC (1931)</b>", "❌ Poona Pact gave more seats than Communal Award → ✅ Poona Pact gave <b>148 seats</b> (more than Communal Award's 71) but <b>joint</b> electorate", "❌ CDM started on 6 April 1930 → ✅ Dandi March started <b>12 March 1930</b>; Gandhi lifted salt on <b>6 April 1930</b>", "❌ Gandhi went to London for 1st RTC → ✅ Gandhi attended <b>2nd RTC (Sept-Dec 1931)</b>", "❌ Communal Award was about Muslim seats → ✅ Communal Award also gave separate seats to <b>Depressed Classes</b> (what triggered Gandhi's fast)", "❌ Chittagong Armory Raid = Bhagat Singh → ✅ Chittagong Armory Raid = <b>Surya Sen</b> (Masterda), 18 April 1930"], "revision": ["Dandi March 12 March 1930; salt lifted 6 April 1930", "Gandhi-Irwin Pact 5 March 1931; Gandhi attended 2nd RTC", "Communal Award 1932: Depressed Classes seats; Gandhi fasted", "Poona Pact 26 Sept 1932: 148 reserved seats (joint electorate)", "CDM called off April 1934"], "oneliners": ["Surya Sen (Masterda) = Chittagong Armory Raid 18 April 1930; hanged 12 Jan 1934", "Gandhi walked 241 miles in 24 days from Sabarmati to Dandi", "79 followers accompanied Gandhi on Dandi March", "Women massively participated in CDM — picketing liquor shops, foreign cloth"], "flashcards": [{"q": "When did the Dandi March start and end?", "a": "Started: 12 March 1930 from Sabarmati Ashram; arrived Dandi: 6 April 1930 (24 days, 241 miles/388 km, 79 followers)"}, {"q": "What was the Gandhi-Irwin Pact (5 March 1931)?", "a": "Gandhi suspended CDM; agreed to attend 2nd Round Table Conference; political prisoners released; salt manufacture near sea allowed; no boycott of courts"}, {"q": "Which Round Table Conference did Gandhi attend?", "a": "2nd Round Table Conference (September-December 1931, London) as Congress's sole representative"}, {"q": "What was the Communal Award (1932) and Gandhi's response?", "a": "Ramsay MacDonald gave separate electorates to Depressed Classes. Gandhi fasted against it — led to Poona Pact (26 Sept 1932) replacing separate electorates with reserved seats."}, {"q": "What was the Poona Pact (1932)?", "a": "Gandhi-Ambedkar agreement: 148 reserved seats for Depressed Classes (more than Communal Award's 71) but through joint electorates (not separate). Gandhi's fast ended."}, {"q": "Who led the Chittagong Armory Raid?", "a": "Surya Sen (Masterda) on 18 April 1930 — seized two British armories in Chittagong; captured 1933, hanged 12 January 1934"}, {"q": "Which conference did Congress boycott?", "a": "Congress boycotted 1st RTC (Nov 1930-Jan 1931) and 3rd RTC (1932). Gandhi attended only the 2nd RTC (1931)."}, {"q": "How many followers walked with Gandhi on Dandi March?", "a": "79 followers accompanied Gandhi from Sabarmati Ashram on 12 March 1930"}, {"q": "When was CDM finally called off?", "a": "April 1934 — Gandhi called off the second phase of CDM. Congress then focused on constructive program and contested 1937 elections under GoI Act 1935."}, {"q": "What happened in the 2nd Round Table Conference (1931)?", "a": "Gandhi attended as Congress's sole representative. Ambedkar demanded separate electorates for Depressed Classes. No agreement reached. Gandhi returned with nothing."}], "mcqs": [{"q": "The Dandi March started from:", "o": ["Dandi", "Ahmedabad", "Sabarmati Ashram", "Porbandar"], "a": 2, "e": "Dandi March started from Sabarmati Ashram (Ahmedabad) on 12 March 1930. Gandhi and 79 followers walked 388 km (241 miles) to Dandi, reaching on 6 April 1930. Gandhi then violated the Salt Law."}, {"q": "Gandhi attended which Round Table Conference in London?", "o": ["1st RTC (1930)", "2nd RTC (1931)", "3rd RTC (1932)", "All three"], "a": 1, "e": "Gandhi attended only the 2nd RTC (September-December 1931) as Congress's sole representative, after the Gandhi-Irwin Pact (5 March 1931). Congress boycotted the 1st and 3rd RTCs."}, {"q": "The Poona Pact (26 September 1932) was between:", "o": ["Gandhi and Lord Irwin", "Gandhi and Jinnah", "Gandhi and Ambedkar", "Gandhi and Ramsay MacDonald"], "a": 2, "e": "Poona Pact (26 Sept 1932): Gandhi (who was fasting) and BR Ambedkar agreed to replace the Communal Award's separate electorates for Depressed Classes with reserved seats (148) in joint electorates."}, {"q": "The Communal Award (1932) was given by:", "o": ["Lord Irwin", "Lord Willingdon", "Ramsay Mac
