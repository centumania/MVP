Donald", "Winston Churchill"], "a": 2, "e": "Communal Award was announced by British PM Ramsay MacDonald in August 1932 — separate electorates for Muslims, Sikhs, Christians, and Depressed Classes. Gandhi fasted against the Depressed Classes provision."}, {"q": "Chittagong Armory Raid (18 April 1930) was led by:", "o": ["Bhagat Singh", "Chandrashekhar Azad", "Surya Sen (Masterda)", "Subhas Chandra Bose"], "a": 2, "e": "Chittagong Armory Raid was led by Surya Sen (Masterda) on 18 April 1930 — he led the Indian Republican Army to seize British armories in Chittagong, Bengal. He was captured in 1933 and hanged on 12 January 1934."}, {"q": "How many followers accompanied Gandhi on the Dandi March?", "o": ["70", "79", "100", "120"], "a": 1, "e": "79 followers accompanied Gandhi on the Dandi March from Sabarmati Ashram (12 March 1930) to Dandi (6 April 1930). The march covered 388 km in 24 days."}, {"q": "Gandhi-Irwin Pact (5 March 1931) resulted in:", "o": ["CDM being started", "CDM being suspended", "Poona Pact", "Round Table Conference being cancelled"], "a": 1, "e": "Gandhi-Irwin Pact (5 March 1931): Gandhi suspended the Civil Disobedience Movement and agreed to attend the 2nd RTC in London. Political prisoners were released and salt manufacture near sea was permitted."}, {"q": "Civil Disobedience Movement was finally called off in:", "o": ["1930", "1932", "1933", "1934"], "a": 3, "e": "CDM was called off in April 1934 by Gandhi (2nd phase of CDM, 1932-34). After that, Congress contested 1937 provincial elections under the GoI Act 1935 and formed governments in 8 provinces."}, {"q": "The 1st Round Table Conference (1930) was attended by:", "o": ["Gandhi as sole Congress rep", "Congress, ML, and Princes", "Muslim League, Princes, Ambedkar (no Congress)", "Only British officials"], "a": 2, "e": "Congress boycotted the 1st RTC (November 1930-January 1931). It was attended by Muslim League, Indian Princes, British-Indian communities, and BR Ambedkar. No agreement was reached."}, {"q": "Poona Pact gave Depressed Classes how many reserved seats?", "o": ["71", "100", "148", "200"], "a": 2, "e": "Poona Pact gave 148 reserved seats to Depressed Classes in provincial legislatures (vs 71 in Communal Award) — but through joint electorates. The Communal Award's 71 seats through separate electorates was replaced."}]}, {"id": "goi1935_bose_cripps", "label": "GoI Act 1935, Bose & Cripps Mission", "icon": "📜", "xp": "60", "seqIdx": "8", "facts": ["<b>Government of India Act 1935</b>: Most elaborate act; Provincial Autonomy (implemented 1937); All-India Federation (never implemented); dyarchy at centre; RBI, Federal Court, PSC, FPSC established; Burma separated", "<b>1937 Elections</b>: Congress won 8 of 11 provinces; formed governments; ML won only 109 of 1585 seats; Congress refused to form coalition with ML (Nehru said ML was 'party of Muslims, not India')", "<b>Subhas Chandra Bose</b>: Elected INC President 1938 (Haripura); re-elected 1939 (Tripuri) defeating Gandhi's candidate Pattabhi Sitaramayya; Gandhi said 'defeat is mine'; Bose resigned; formed Forward Bloc 1939", "<b>Bose's escape</b>: January 1941; escaped to Germany via Kabul+Peshawar disguised as Muhammed Ziauddin; met Hitler; came to Asia via submarine; reached Singapore 1943", "<b>INA (Indian National Army)</b>: Originally formed by Mohan Singh (1942) from Indian POWs in Singapore; Bose reorganized INA 1943; 'Netaji'; 'Jai Hind'; 'Delhi Chalo'; 'Tum mujhe khoon do main tumhe azadi dunga'", "<b>Azad Hind Government</b>: 21 October 1943; provisional government of Free India; Singapore; INA fought alongside Japanese in Imphal-Kohima battles (1944)", "<b>Bose's death</b>: 18 August 1945; plane crash near Taipei, Taiwan; disputed — not officially confirmed for decades; Shah Nawaz Committee said death by plane crash", "<b>August Offer 1940</b>: Linlithgow offered Dominion Status after war; Congress rejected; ML welcomed; Gandhi said no promise without freedom", "<b>Cripps Mission 1942</b>: Sir Stafford Cripps; offered Dominion Status after war + constituent assembly; BUT defence remained British during war; Gandhi = 'Post-dated cheque on a crashing bank'; Congress + ML both rejected", "<b>Wavell Plan (Shimla Conference) 1945</b>: Lord Wavell; proposed Executive Council with equal Hindu-Muslim representation; failed because ML insisted on nominating ALL Muslim members"], "table": "<table><thead><tr><th>Event</th><th>Year</th><th>Key Outcome</th></tr></thead><tbody><tr><td>GoI Act 1935</td><td>1935</td><td>Provincial Autonomy; Fed. Court; RBI</td></tr><tr><td>1937 Elections</td><td>1937</td><td>Congress 8/11 provinces; ML failed</td></tr><tr><td>Bose at Haripura</td><td>1938</td><td>Elected INC President (1st time)</td></tr><tr><td>Bose at Tripuri</td><td>1939</td><td>Re-elected; defeated Gandhi's candidate</td></tr><tr><td>INA reorganized</td><td>1943</td><td>Bose; 'Jai Hind'; Azad Hind Govt</td></tr><tr><td>Cripps Mission</td><td>1942</td><td>Rejected by Gandhi + Congress</td></tr><tr><td>Bose dies</td><td>18 Aug 1945</td><td>Plane crash, Taiwan (disputed)</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — GoI 1935 features</b><br>'<b>F</b>ederation <b>P</b>rovinces <b>R</b>BI <b>D</b>yarchy <b>B</b>urma'<br><b>F</b>ederation (never implemented) + <b>P</b>rovincial Autonomy (implemented 1937) + <b>R</b>BI + <b>D</b>yarchy at centre + <b>B</b>urma separated", "traps": ["❌ GoI Act 1935 introduced Provincial Autonomy immediately → ✅ Provincial Autonomy came into effect <b>1937</b> after elections", "❌ Bose defeated Nehru for INC presidency → ✅ Bose defeated <b>Pattabhi Sitaramayya</b> (Gandhi's candidate) in 1939", "❌ INA was founded by Bose → ✅ INA originally formed by <b>Mohan Singh (1942)</b>; Bose reorganized it 1943", "❌ Gandhi called Cripps Mission a 'blank cheque' → ✅ Gandhi called it '<b>post-dated cheque on a crashing bank</b>'", "❌ Bose escaped to Japan directly → ✅ Bose went Germany via Kabul → <b>submarine</b> → Singapore; NOT direct Japan route", "❌ Bose died in 1944 → ✅ Bose reportedly died in <b>plane crash 18 August 1945</b> near Taipei"], "revision": ["GoI Act 1935: Provincial Autonomy 1937; All-India Federation never implemented", "Congress won 8/11 provinces 1937; refused coalition with ML", "Bose: Haripura 1938; Tripuri 1939 (defeated Pattabhi); Forward Bloc 1939", "INA: Mohan Singh 1942 → Bose reorganized 1943; Jai Hind", "Cripps Mission 1942: 'post-dated cheque'; Gandhi rejected"], "oneliners": ["Bose escaped via Kabul disguised as 'Muhammed Ziauddin'", "Azad Hind Government 21 October 1943, Singapore", "INA fought at Imphal-Kohima (1944) with Japanese forces", "Wavell Plan failed: ML insisted on nominating ALL Muslim members"], "flashcards": [{"q": "What was the Government of India Act 1935's key feature that was NEVER implemented?", "a": "All-India Federation — it was meant to bring Indian Princely States and British India under one federal structure, but Princes never agreed to join."}, {"q": "When did Congress form governments in provinces under GoI Act 1935?", "a": "After 1937 elections — Congress won 8 of 11 provinces and formed governments. Muslim League won only 109 of 1585 seats."}, {"q": "Who did Subhas Chandra Bose defeat in the 1939 INC presidential election?", "a": "Pattabhi Sitaramayya — Gandhi's preferred candidate. Gandhi said 'Pattabhi's defeat is my defeat.'"}, {"q": "Who originally formed the Indian National Army?", "a": "Mohan Singh (1942) from Indian POWs captured by Japanese in Singapore. Bose reorganized INA in 1943."}, {"q": "What was Gandhi's criticism of the Cripps Mission (1942)?", "a": "'Post-dated cheque on a crashing bank' — it offered Dominion Status after the war but kept defence in British hands during the war."}, {"q": "What was the Azad Hind Government?", "a": "Provisional government of Free India established by Bose on 21 October 1943 in Singapore. INA was its military arm."}, {"q": "What was the August Offer (1940)?", "a": "Lord Linlithgow offered Dominion Status after WW2. Congress rejected (demanded immediate freedom); ML welcomed it."}, {"q": "How did Bose escape from India in 1941?", "a": "January 1941 — escaped disguised as 'Muhammed Ziauddin', went via Kabul and Peshawar to Germany; then reached Singapore via submarine."}, {"q": "When and how did Bose reportedly die?", "a": "18 August 1945 in a plane crash near Taipei, Taiwan. His death remains somewhat disputed, though Shah Nawaz Committee confirmed plane crash."}, {"q": "Why did the Wavell Plan (1945) fail?", "a": "Muslim League insisted on nominating ALL Muslim members to the Executive Council, not allowing Congress to nominate Muslim members. Talks broke down."}], "mcqs": [{"q": "The Government of India Act 1935 provided for Provincial Autonomy which was implemented in:", "o": ["1935", "1936", "1937", "1939"], "a": 2, "e": "GoI Act 1935 was passed in 1935 but Provincial Autonomy was implemented in 1937 after elections. Congress won 8 of 11 provinces and formed governments. All-India Federation was never implemented."}, {"q": "Subhas Chandra Bose defeated __ in the 1939 INC presidential election:", "o": ["Jawaharlal Nehru", "Rajendra Prasad", "Pattabhi Sitaramayya", "Vallabhbhai Patel"], "a": 2, "e": "Bose defeated Pattabhi Sitaramayya (Gandhi's preferred candidate) for INC presidency at Tripuri session (1939). Gandhi said 'Pattabhi's defeat is my defeat.' Bose soon resigned due to lack of support."}, {"q": "The Indian National Army was originally formed by:", "o": ["Subhas Chandra Bose", "Mohan Singh", "Rash Behari Bose", "Shah Nawaz Khan"], "a": 1, "e": "INA was originally formed by Mohan Singh in 1942 from Indian POWs in Singapore after the fall of Singapore to Japan. Subhas Chandra Bose reorganized and revitalized INA in 1943 as 'Netaji'."}, {"q": "Gandhi called the Cripps Mission (1942) a:", "o": ["Gift of freedom", "Post-dated cheque on a crashing bank", "Blank cheque", "Promise of swaraj"], "a": 1, "e": "Gandhi called the Cripps Mission (1942) a 'post-dated cheque on a crashing bank' — it offered Dominion Status after WW2 but kept India's defence in British hands during the war. Both Congress and ML rejected it."}, {"q": "The Azad Hind Government was established on:", "o": ["21 October 1943", "21 October 1942", "8 August 1943", "1 September 1944"], "a": 0, "e": "Azad Hind Government (Provisional Government of Free India) was established by Subhas Chandra Bose on 21 October 1943 in Singapore. Its military wing was the Indian National Army (INA)."}, {"q": "Bose escaped from India in January 1941 disguised as:", "o": ["A British officer", "Muhammed Ziauddin (Pathan)", "Mohan Singh", "A Japanese diplomat"], "a": 1, "e": "Bose escaped from Calcutta in January 1941 disguised as 'Muhammed Ziauddin', a Pathan insurance agent. He traveled via Peshawar, Kabul, Soviet Union to Germany. He later reached Singapore via submarine."}, {"q": "The 1937 elections saw Congress win governments in how many provinces?", "o": ["5", "8", "10", "11"], "a": 1, "e": "Congress won majorities in 8 of 11 provinces in 1937 and formed governments. Muslim League won only 109 of 1585 seats. Congress refused coalition with ML — a decision Jinnah saw as Congress's 'Hindu rule.'"}, {"q": "The Wavell Plan (Shimla Conference, 1945) failed because:", "o": ["Congress rejected it", "Jinnah demanded all India government", "ML insisted on nominating ALL Muslim members", "Gandhi fasted against it"], "a": 2, "e": "Wavell Plan failed because ML insisted that all Muslim members of the proposed Executive Council must be nominated by ML alone — not allowing Congress (which had Muslim members) to nominate any Muslims."}, {"q": "Which feature of GoI Act 1935 was NEVER implemented?", "o": ["Provincial Autonomy", "Federal Court", "All-India Federation", "Reserve Bank of India"], "a": 2, "e": "All-India Federation was never implemented — Indian Princes refused to join. The chamber of Princes rejected the terms. Provincial Autonomy (1937) and Federal Court (1937) were implemented."}, {"q": "Bose formed the Forward Bloc in:", "o": ["1938", "1939", "1940", "1941"], "a": 1, "e": "Subhas Chandra Bose formed the Forward Bloc in May 1939 after resigning as INC president (due to opposition from Gandhi/old guard). Forward Bloc was meant to be a left-wing coalition within Congress."}]}, {"id": "quit_india_partition", "label": "Quit India to Cabinet Mission", "icon": "🇮", "xp": "65", "seqIdx": "9", "facts": ["<b>Quit India Movement 8 August 1942</b>: 'Do or Die'; Gowalia Tank Maidan, Bombay; AICC session; Linlithgow's tenure; all Congress leaders arrested on <b>9 August 1942</b>; Gandhi at Agha Khan Palace, Pune; underground movement; JP Narayan, Aruna Asaf Ali, Ram Manohar Lohia", "<b>Underground leaders (QIM)</b>: JP Narayan (Bihar, underground); Aruna Asaf Ali (hoisted Congress flag at Gowalia Tank); Ram Manohar Lohia (social media of its time — clandestine radio); Sucheta Kripalani", "<b>Congress Radio (Clandestine)</b>: Ram Manohar Lohia + Usha Mehta; broadcast QIM messages secretly from Bombay", "<b>Japanese threat 1942</b>: Japan captured Burma (March 1942); Andaman-Nicobar Islands; threat to Bengal/Assam; also context for QIM and Cripps Mission", "<b>Bengal Famine 1943</b>: 2-3 million died; Churchill's wartime policies diverted food; Amartya Sen's analysis: political/distribution failure not production failure", "<b>Cabinet Mission 1946</b>: Three British ministers: Pethick-Lawrence (Sec of State) + Sir Stafford Cripps + AV Alexander; Three-tier plan: All-India Union + Groups + Provinces; ML accepted; Congress accepted partially; ML later rejected (Nehru's statement that Congress could change constitution)", "<b>Direct Action Day 16 August 1946</b>: Jinnah called 'direct action'; massive Hindu-Muslim riots in Calcutta (Great Calcutta Killings); spread to Noakhali (Bengal) and Bihar; Gandhi's peace walks", "<b>Interim Government formed October 1946</b>: Jawaharlal Nehru as PM (Vice President of Executive Council); ML members joined Nov 1946 but obstructed", "<b>Indian Independence Act July 1947</b>: British Parliament; two dominions India and Pakistan; 15 Aug 1947 (India) and 14 Aug 1947 (Pakistan); princely states to choose; Radcliffe Line", "<b>Mountbatten Plan 3 June 1947</b>: Partition of India; Bengal + Punjab to be divided; Sylhet (Bengal) to Pakistan (referendum); princely states to accede"], "table": "<table><thead><tr><th>Event</th><th>Date</th><th>Key Figure</th></tr></thead><tbody><tr><td>QIM launched</td><td>8 Aug 1942</td><td>Gandhi; 'Do or Die'</td></tr><tr><td>Leaders arrested</td><td>9 Aug 1942</td><td>Gandhi to Agha Khan Palace</td></tr><tr><td>Aruna Asaf Ali</td><td>9 Aug 1942</td><td>Hoisted flag at Gowalia Tank</td></tr><tr><td>Cabinet Mission</td><td>1946</td><td>Pethick-Lawrence+Cripps+Alexander</td></tr><tr><td>Direct Action Day</td><td>16 Aug 1946</td><td>Jinnah; Calcutta Killings</td></tr><tr><td>Interim Govt formed</td><td>Oct 1946</td><td>Nehru as Vice-President</td></tr><tr><td>Independence Act</td><td>July 1947</td><td>Two dominions; 14+15 Aug 1947</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — QIM Leaders</b><br>'<b>A</b>runa <b>J</b>P <b>R</b>am <b>S</b>ucheta'<br><b>A</b>runa Asaf Ali (flag) + <b>J</b>P Narayan (Bihar underground) + <b>R</b>am Manohar Lohia (clandestine radio) + <b>S</b>ucheta Kripalani", "traps": ["❌ Gandhi hoisted flag at Gowalia Tank → ✅ <b>Aruna Asaf Ali</b> hoisted Congress flag at Gowalia Tank", "❌ QIM leaders were not arrested → ✅ ALL top Congress leaders were arrested on <b>9 August 1942</b> (one day after launch)", "❌ Cabinet Mission had 4 members → ✅ Cabinet Mission had <b>3 members</b>", "❌ Direct Action Day caused riots only in Lahore → ✅ Direct Action Day primarily caused <b>Calcutta killings</b> (16 Aug 1946)", "❌ Independence Act was passed in August 1947 → ✅ Indian Independence Act passed by British Parliament in <b>July 1947</b>", "❌ Pakistan got independence on 15 Aug 1947 → ✅ Pakistan = <b>14 August</b>; India = 15 August 1947"], "revision": ["QIM 8 Aug 1942: 'Do or Die', Gowalia Tank; leaders arrested 9 Aug", "Aruna Asaf Ali = hoisted flag; JP Narayan = underground Bihar", "Cabinet Mission 1946: 3 members; 3-tier plan", "Direct Action Day 16 Aug 1946: Calcutta killings", "Independence Act July 1947; India 15 Aug, Pakistan 14 Aug"], "oneliners": ["Bengal Famine 1943: 2-3 million dead; Churchill's policies blamed", "Usha Mehta + Lohia ran secret Congress Radio during QIM", "Nehru's statement that Congress could change constitution → ML withdrew Cabinet Mission acceptance", "Radcliffe Line drawn by Sir Cyril Radcliffe in August 1947"], "flashcards": [{"q": "When and where was the Quit India Movement launched?", "a": "8 August 1942 at Gowalia Tank Maidan, Bombay. Gandhi's slogan: 'Do or Die'. All Congress leaders arrested 9 August 1942."}, {"q": "Who hoisted the Congress flag at Gowalia Tank after leaders were arrested?", "a": "Aruna Asaf Ali — hoisted the tricolour at Gowalia Tank on 9 August 1942 after Congress leaders were arrested"}, {"q": "Who were the underground leaders of the Quit India Movement?", "a": "JP Narayan (Bihar), Aruna Asaf Ali (Bombay), Ram Manohar Lohia (clandestine radio), Sucheta Kripalani"}, {"q": "What was the Cabinet Mission Plan (1946)?", "a": "Three British ministers (Pethick-Lawrence, Cripps, AV Alexander) proposed 3-tier structure: All-India Union + Groups + Provinces. Both Congress and ML initially accepted, then ML withdrew."}, {"q": "What was Direct Action Day (16 August 1946)?", "a": "Jinnah called for Direct Action for Pakistan — massive Hindu-Muslim riots in Calcutta (Great Calcutta Killings), then spread to Noakhali and Bihar"}, {"q": "When was the Indian Independence Act passed?", "a": "July 1947 by British Parliament; came into effect 14-15 August 1947 creating two dominions: India (15 Aug) and Pakistan (14 Aug)"}, {"q": "Where was Gandhi imprisoned during Quit India Movement?", "a": "Agha Khan Palace, Pune — from 9 August 1942. Kasturba Gandhi and Mahadev Desai (Gandhi's secretary) died there."}, {"q": "What was the Bengal Famine (1943)?", "a": "2-3 million people died in Bengal; Churchill's wartime food policies blamed; Amartya Sen argued it was a distribution/political failure not production failure"}, {"q": "What triggered ML's rejection of the Cabinet Mission Plan?", "a": "Nehru's statement that Congress was not bound by the Cabinet Mission Plan and could change the constitution after independence — Jinnah took this as bad faith."}, {"q": "When was the Interim Government formed and who led it?", "a": "October 1946 — Jawaharlal Nehru as Vice President of Executive Council (de facto Prime Minister). ML members joined in November 1946 but obstructed."}], "mcqs": [{"q": "The Quit India Movement was launched on:", "o": ["8 August 1940", "9 August 1942", "8 August 1942", "26 August 1942"], "a": 2, "e": "QIM was launched on 8 August 1942 at Gowalia Tank Maidan, Bombay during the AICC session. Gandhi gave 'Do or Die' slogan. Next day (9 Aug) all top Congress leaders were arrested."}, {"q": "Who hoisted the Congress flag at Gowalia Tank on 9 August 1942?", "o": ["Mahatma Gandhi", "Jawaharlal Nehru", "Aruna Asaf Ali", "JP Narayan"], "a": 2, "e": "Aruna Asaf Ali hoisted the Congress flag at Gowalia Tank, Bombay on 9 August 1942 — the day after QIM launch when all Congress leaders had been arrested. She later joined the underground movement."}, {"q": "The Cabinet Mission (1946) consisted of:", "o": ["Pethick-Lawrence, Cripps, AV Alexander", "Attlee, Cripps, AV Alexander", "Pethick-Lawrence, Wavell, Cripps", "Churchill, Cripps, Wavell"], "a": 0, "e": "Cabinet Mission (1946): Pethick-Lawrence (Sec of State for India), Sir Stafford Cripps (Board of Trade), AV Alexander (First Lord of Admiralty). They proposed a 3-tier plan for India's independence."}, {"q": "Direct Action Day (16 August 1946) caused major riots in:", "o": ["Lahore", "Calcutta", "Amritsar", "Delhi"], "a": 1, "e": "Direct Action Day triggered the Great Calcutta Killings (16-17 August 1946) — massive Hindu-Muslim riots in Calcutta. Violence then spread to Noakhali (Bengal) and Bihar. Gandhi undertook peace walks."}, {"q": "Gandhi was kept at __ during the Quit India Movement:", "o": ["Agha Khan Palace, Pune", "Red Fort, Delhi", "Naini Prison", "Yerwada Prison, Pune"], "a": 0, "e": "Gandhi was kept at Agha Khan Palace, Pune from 9 August 1942. Kasturba Gandhi died there on 22 February 1944. Gandhi's secretary Mahadev Desai also died there (9 August 1942)."}, {"q": "The Indian Independence Act was passed by the British Parliament in:", "o": ["June 1947", "July 1947", "August 1947", "September 1947"], "a": 1, "e": "Indian Independence Act was passed by British Parliament in July 1947. It came into force on 14-15 August 1947 creating the Dominion of Pakistan (14 Aug) and Dominion of India (15 Aug)."}, {"q": "The clandestine Congress Radio during QIM was operated by:", "o": ["JP Narayan + Aruna Asaf Ali", "Ram Manohar Lohia + Usha Mehta", "Gandhi + Nehru", "Sucheta Kripalani + Jayaprakash"], "a": 1, "e": "The secret Congress Radio during QIM was operated by Ram Manohar Lohia and Usha Mehta from Bombay. It broadcast QIM messages and information before being shut down by British police."}, {"q": "The Bengal Famine (1943) caused approximately how many deaths?", "o": ["200,000", "500,000", "1-2 million", "2-3 million"], "a": 3, "e": "Bengal Famine (1943) caused approximately 2-3 million deaths. Amartya Sen (who witnessed it as a child) argued it was not a food production failure but a political/distribution failure — Churchill's wartime policies diverted food."}, {"q": "Why did ML withdraw acceptance of Cabinet Mission Plan?", "o": ["Congress rejected it first", "Gandhi's fast", "Nehru's statement that Congress could modify constitution", "British refused dominion status"], "a": 2, "e": "Jinnah accepted Cabinet Mission Plan in June 1946. Nehru's press statement (July 1946) saying Congress was 'free to change it' gave Jinnah the excuse to withdraw ML's acceptance — calling it Congress bad faith."}, {"q": "JP Narayan's role in QIM was as:", "o": ["Underground leader in Bihar", "Congress Radio operator", "Delhi organizer", "Calcutta organizer"], "a": 0, "e": "Jayaprakash Narayan (JP) escaped from Hazaribagh jail in 1943 and operated as the key underground leader in Bihar during QIM, coordinating resistance activities. He became a hero of the freedom movement."}]}, {"id": "ina_trials_partition", "label": "INA Trials to Partition 🗺️", "icon": "🗺", "xp": "60", "seqIdx": "10", "facts": ["<b>INA Trials 1945-46</b>: Red Fort Trials; INA officers (Shah Nawaz Khan, Gurbaksh Singh Dhillon, Prem Kumar Sehgal) tried for treason; defence team: Bhulabhai Desai, Nehru, Tej Bahadur Sapru; huge public sympathy; British dropped charges due to public outcry", "<b>Royal Indian Navy Mutiny Feb 1946</b>: Mumbai; sailors revolted on HMIS Talwar; spread to 78 ships, 20,000 sailors; support strikes in Bombay; Congress+ML both asked them to stop; mutiny suppressed; showed British that Indian armed forces could not be relied upon", "<b>Attlee's announcement 20 February 1947</b>: British PM Clement Attlee announced Britain would leave India by June 1948; appointed Mountbatten as Viceroy", "<b>Mountbatten Plan 3 June 1947</b>: Partition; Bengal + Punjab to be divided by referendum; Sindh legislature voted for Pakistan; NWFP referendum voted for Pakistan; Balochistan chose Pakistan; Sylhet (Bengal) chose Pakistan; Congress+ML accepted", "<b>Partition violence</b>: Largest mass migration in history; 10-15 million displaced; 200,000-2 million killed; Punjab and Bengal worst affected; Gurdaspur awarded to India (Nehru secured Kashmir access)", "<b>Integration of Princely States</b>: Sardar Patel (Iron Man) + VP Menon (States Secretary); 565 princely states integrated; Hyderabad (police action Sep 1948); Junagadh (accession then referendum); Kashmir (Instrument of Accession Oct 1947 after Pakistan-backed tribal invasion)", "<b>Instrument of Accession</b>: Legal document by which Princely States joined India; Maharaja Hari Singh of Kashmir signed in October 1947 after Pakistani tribal attack", "<b>Kashmir conflict</b>: Pakistan sent tribal fighters Oct 1947; India airlifted troops after Instrument of Accession; ceasefire Jan 1949 (UN mediation); plebiscite never held", "<b>Indian Independence 15 August 1947</b>: 'Tryst with Destiny' speech by Nehru at midnight; Gandhi was NOT in Delhi (in Calcutta for Hindu-Muslim peace); Mountbatten = first GG of India; Jinnah = 1st GG of Pakistan", "<b>Radcliffe Award August 1947</b>: Sir Cyril Radcliffe (who had never been to India before) drew the Radcliffe Line for Punjab and Bengal within 5 weeks"], "table": "<table><thead><tr><th>Event</th><th>Date</th><th>Significance</th></tr></thead><tbody><tr><td>INA Trials</td><td>1945-46</td><td>Red Fort; public sympathy; charges dropped</td></tr><tr><td>RIN Mutiny</td><td>Feb 1946</td><td>78 ships; showed unreliability of Indian forces</td></tr><tr><td>Attlee announcement</td><td>20 Feb 1947</td><td>Britain to leave by June 1948</td></tr><tr><td>Mountbatten Plan</td><td>3 June 1947</td><td>Partition; Bengal+Punjab divided</td></tr><tr><td>Independence</td><td>14-15 Aug 1947</td><td>Two dominions created</td></tr><tr><td>Kashmir Accession</td><td>Oct 1947</td><td>After Pakistani tribal invasion</td></tr><tr><td>Hyderabad Police Action</td><td>Sep 1948</td><td>Sardar Patel integrated Hyderabad</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — Path to Independence</b><br>'<b>I</b>NA <b>R</b>evealed <b>A</b>ttlee's <b>M</b>ount<b>b</b>atten <b>P</b>lan'<br><b>I</b>NA Trials → <b>R</b>IN Mutiny → <b>A</b>ttlee announcement → <b>M</b>ount<b>b</b>atten Plan → <b>P</b>artition/Independence", "traps": ["❌ Gandhi gave 'Tryst with Destiny' speech → ✅ 'Tryst with Destiny' = <b>Nehru</b>; Gandhi was in Calcutta that night", "❌ Radcliffe had extensive knowledge of India → ✅ Radcliffe had <b>never been to India</b> before drawing the line", "❌ All 565 princely states joined India voluntarily → ✅ Hyderabad and Junagadh were problematic; Kashmir was invaded", "❌ INA trials ended with convictions → ✅ Charges were <b>dropped</b> due to massive public sympathy", "❌ Mountbatten became PM of India → ✅ Mountbatten became <b>1st Governor-General</b> of independent India", "❌ Attlee announced June 1947 deadline → ✅ Attlee announced <b>June 1948</b> deadline (Mountbatten advanced it to Aug 1947)"], "revision": ["INA Trials Red Fort 1945-46: public sympathy; charges dropped", "RIN Mutiny Feb 1946: 78 ships, 20,000 sailors", "Attlee 20 Feb 1947: leave by June 1948 (Mountbatten moved to Aug 1947)", "Mountbatten Plan 3 June 1947; Independence 14-15 Aug 1947", "Kashmir Accession Oct 1947 after Pakistani tribal invasion"], "oneliners": ["Sardar Patel = 'Iron Man'; integrated 565 princely states", "Hyderabad Police Action = September 1948 (Operation Polo)", "'Tryst with Destiny' = Nehru's midnight speech 14-15 Aug 1947", "Radcliffe drew India-Pakistan border in just 5 weeks (never been to India)"], "flashcards": [{"q": "Who were the three INA officers tried at Red Fort?", "a": "Shah Nawaz Khan, Gurbaksh Singh Dhillon, and Prem Kumar Sehgal — tried for treason; charges dropped due to massive public sympathy"}, {"q": "What was the Royal Indian Navy Mutiny (February 1946)?", "a": "78 ships and 20,000 sailors mutinied on HMIS Talwar, Bombay. Showed British that Indian armed forces couldn't be relied upon. Both Congress and ML asked them to stop."}, {"q": "When did Attlee announce Britain would leave India?", "a": "20 February 1947 — announced transfer of power by June 1948 (Mountbatten later advanced it to August 1947)"}, {"q": "Who gave the 'Tryst with Destiny' speech?", "a": "Jawaharlal Nehru — midnight 14-15 August 1947. Gandhi was in Calcutta for Hindu-Muslim peace, NOT in Delhi."}, {"q": "How did Sardar Patel integrate Hyderabad?", "a": "Police Action (Operation Polo) in September 1948 — Indian military operation after Nizam refused to accede. Hyderabad integrated within 5 days."}, {"q": "When did Kashmir sign the Instrument of Accession?", "a": "October 1947 — after Pakistani tribal fighters invaded. Maharaja Hari Singh signed, India airlifted troops, war ensued; ceasefire January 1949."}, {"q": "Who drew the Radcliffe Line?", "a": "Sir Cyril Radcliffe — appointed in July 1947; had never been to India; drew the boundary between India and Pakistan (for both Punjab and Bengal) within 5 weeks"}, {"q": "What happened at the INA Trials?", "a": "INA officers (Shah Nawaz Khan etc.) tried for treason at Red Fort, Delhi (1945-46). Defence team: Nehru, Bhulabhai Desai. Charges dropped due to massive public outcry."}, {"q": "Who was the first Governor-General of independent India?", "a": "Lord Mountbatten (last Viceroy became first GG of India). Jinnah became first GG of Pakistan."}, {"q": "What does 'Instrument of Accession' mean?", "a": "Legal document by which a Princely State agreed to join India (or Pakistan). Gave India control over defence, external affairs, and communications."}], "mcqs": [{"q": "The INA trials (Red Fort, 1945-46) ended with:", "o": ["Convictions and life imprisonment", "Acquittals", "Death sentences for all", "Charges dropped due to public pressure"], "a": 3, "e": "INA trials: Shah Nawaz Khan, Gurbaksh Singh Dhillon, Prem Kumar Sehgal were tried. Massive public support (including British Indian Army soldiers) forced British to drop charges — afraid of rebellion if convicted."}, {"q": "'Tryst with Destiny' speech was given by:", "o": ["Mahatma Gandhi", "Sardar Patel", "Jawaharlal Nehru", "Lord Mountbatten"], "a": 2, "e": "'Tryst with Destiny' was Jawaharlal Nehru's iconic midnight speech (14-15 August 1947). Gandhi was in Calcutta undertaking peace walks — he was NOT in Delhi on Independence night."}, {"q": "The Royal Indian Navy Mutiny (February 1946) involved:", "o": ["20 ships", "50 ships", "78 ships", "100 ships"], "a": 2, "e": "RIN Mutiny (Feb 1946): 78 ships and approximately 20,000 sailors revolted in Bombay (on HMIS Talwar). It spread to Calcutta and Karachi. Showed British the Indian military could not be relied upon."}, {"q": "Sardar Patel used 'police action' to integrate:", "o": ["Junagadh", "Hyderabad", "Kashmir", "Travancore"], "a": 1, "e": "Sardar Patel launched Operation Polo (Police Action) in September 1948 to integrate Hyderabad — whose Nizam refused to accede. Hyderabad was integrated in 5 days. Kashmir needed military operations after Pakistani tribal invasion."}, {"q": "Attlee's announcement (20 February 1947) set the deadline as:", "o": ["December 1947", "June 1948", "August 1947", "March 1948"], "a": 1, "e": "Attlee announced Britain would leave India by June 1948. However, Mountbatten advanced the date to August 1947 — arguing the political situation couldn't wait 15 more months."}, {"q": "Sir Cyril Radcliffe drew the Partition line:", "o": ["After spending a year in India", "In 5 weeks, having never been to India before", "After extensive consultation with locals", "Based on the 1941 census only"], "a": 1, "e": "Radcliffe had never visited India before. He was given 5 weeks to draw the boundaries for both Punjab and Bengal. The Radcliffe Award was announced on 17 August 1947 — 2 days after Independence."}, {"q": "Kashmir signed the Instrument of Accession in:", "o": ["August 1947", "September 1947", "October 1947", "January 1948"], "a": 2, "e": "Maharaja Hari Singh of Kashmir signed the Instrument of Accession in October 1947 after Pakistani-backed tribal fighters invaded. India airlifted troops to Srinagar. UN-mediated ceasefire in January 1949."}, {"q": "The RIN Mutiny was important because:", "o": ["It led to immediate independence", "It showed Indian armed forces were unreliable for British", "It brought Congress and ML together", "It replaced the Cripps Mission"], "a": 1, "e": "RIN Mutiny showed the British that they could no longer rely on the Indian armed forces — a key factor in the decision to leave India quickly. This contributed to Attlee's announcement of leaving India in February 1947."}, {"q": "Who became the first Governor-General of independent India?", "o": ["C. Rajagopalachari", "Jawaharlal Nehru", "Lord Mountbatten", "Sardar Patel"], "a": 2, "e": "Lord Mountbatten (last Viceroy) became the first Governor-General of independent India. CR became the first Indian GG later (1948). Jinnah became the first GG of Pakistan."}, {"q": "The number of Princely States integrated by Sardar Patel was approximately:", "o": ["365", "465", "565", "665"], "a": 2, "e": "Sardar Patel and VP Menon integrated 565 Princely States into India — a massive achievement called Patel's 'Iron Curtain' diplomacy. Only Hyderabad, Junagadh, and Kashmir required special measures."}]}, {"id": "gandhi_nehru_congress", "label": "Gandhi, Nehru & Congress Leaders", "icon": "👤", "xp": "55", "seqIdx": "11", "facts": ["<b>Mahatma Gandhi (1869-1948)</b>: Born Porbandar, 2 October 1869; died 30 January 1948 (shot by Nathuram Godse); weapons = Satyagraha + Ahimsa + Non-Cooperation + Civil Disobedience", "<b>Gandhi's titles</b>: 'Mahatma' (Tagore gave it); 'Father of the Nation' (Subhas Chandra Bose gave it 1944); 'Bapu'; 'Half-naked fakir' (Churchill)", "<b>Jawaharlal Nehru (1889-1964)</b>: Born 14 Nov 1889 (Children's Day); PM 1947-1964 (longest); wrote Discovery of India, Glimpses of World History, Autobiography; Panchsheel with China (1954)", "<b>Sardar Vallabhbhai Patel (1875-1950)</b>: 'Iron Man of India'; 1st Deputy PM + Home Minister; integrated 565 Princely States; Bismarck of India", "<b>BR Ambedkar (1891-1956)</b>: 'Father of Indian Constitution'; drafted Constitution; 1st Law Minister; converted to Buddhism (14 Oct 1956, Nagpur); died 6 Dec 1956; founded Republican Party of India", "<b>Subhas Chandra Bose (1897-1945?)</b>: 'Netaji'; INA + Azad Hind Govt; 'Dilli Chalo'; 'Give me blood, I will give you freedom'; Forward Bloc 1939", "<b>CR Das (1870-1925)</b>: 'Deshbandhu'; founded Swaraj Party 1923 with Motilal Nehru; Bengal INC leader; died 1925", "<b>Bal Gangadhar Tilak (1856-1920)</b>: 'Lokmanya'; 'Swaraj is my birthright'; Gita Rahasya; Kesari; died 1 Aug 1920", "<b>Gandhi's assassination 30 Jan 1948</b>: Birla House, Delhi; shot by Nathuram Godse at 5:17 PM during prayer meeting; RSS+Hindu Mahasabha accused; Nehru: 'The light has gone out of our lives'", "<b>Congress Split 1969</b>: Congress split during Indira Gandhi era; Indira Congress (Congress-I) vs Congress (O); election of 5th President VV Giri vs official Congress candidate Neelam Sanjeeva Reddy"], "table": "<table><thead><tr><th>Leader</th><th>Born-Died</th><th>Title/Known For</th></tr></thead><tbody><tr><td>Gandhi</td><td>1869-1948</td><td>Mahatma; Father of Nation; Satyagraha</td></tr><tr><td>Nehru</td><td>1889-1964</td><td>First PM; Discovery of India; Panchsheel</td></tr><tr><td>Sardar Patel</td><td>1875-1950</td><td>Iron Man; integrated Princely States</td></tr><tr><td>BR Ambedkar</td><td>1891-1956</td><td>Father of Constitution; converted Buddhism</td></tr><tr><td>SC Bose</td><td>1897-1945?</td><td>Netaji; INA; 'Dilli Chalo'</td></tr><tr><td>CR Das</td><td>1870-1925</td><td>Deshbandhu; Swaraj Party</td></tr><tr><td>BG Tilak</td><td>1856-1920</td><td>Lokmanya; Swaraj is my birthright</td></tr></tbody></table>", "mn": "<b>🧠 Mnemonic — Leaders' titles</b><br>'<b>M</b>ahatma <b>N</b>ehru <b>P</b>atel <b>A</b>mbedkar <b>N</b>etaji'<br><b>M</b>ahatma Gandhi → <b>N</b>ehru (Discovery of India) → <b>P</b>atel (Iron Man) → <b>A</b>mbedkar (Constitution) → <b>N</b>etaji Bose (INA)", "traps": ["❌ 'Mahatma' title was given by Gandhi himself → ✅ 'Mahatma' was given by <b>Rabindranath Tagore</b>", "❌ 'Father of the Nation' title was given by Nehru → ✅ 'Father of the Nation' given by <b>Subhas Chandra Bose</b> (1944)", "❌ Ambedkar was 1st President of India → ✅ Ambedkar was <b>1st Law Minister</b>; 1st President = Rajendra Prasad", "❌ Nehru was PM for 10 years → ✅ Nehru was PM from <b>1947 to 1964 = 17 years</b>", "❌ Tilak died in prison → ✅ Tilak died on <b>1 August 1920</b> (not in prison; was out)", "❌ Gandhi was shot in Sabarmati → ✅ Gandhi was shot at <b>Birla House, New Delhi</b> (30 Jan 1948)"], "revision": ["Gandhi: Mahatma (Tagore) + Father of Nation (Bose 1944) + died 30 Jan 1948", "Nehru: PM 1947-64 (17 years); Discovery of India; Panchsheel 1954", "Patel: Iron Man + 1st Deputy PM + integrated 565 states", "Ambedkar: 1st Law Minister + Father of Constitution + Buddhist 1956", "Bose: Netaji + INA + Dilli Chalo + Forward Bloc 1939"], "oneliners": ["Nehru's birthday 14 Nov = Children's Day; wrote 3 famous books", "Patel compared to Bismarck for integrating India like Bismarck united Germany", "Ambedkar converted to Buddhism on 14 October 1956, died 6 December 1956", "Churchill called Gandhi 'half-naked fakir'"], "flashcards": [{"q": "Who gave Gandhi the title 'Mahatma'?", "a": "Rabindranath Tagore gave Gandhi the title 'Mahatma' (Great Soul)"}, {"q": "Who gave Gandhi the title 'Father of the Nation'?", "a": "Subhas Chandra Bose gave Gandhi this title in 1944 in a Singapore radio broadcast"}, {"q": "What is Nehru's birth date and why is it significant?", "a": "14 November 1889 — celebrated as Children's Day in India. Nehru loved children. He was PM from 1947 to 1964 (17 years — longest)."}, {"q": "What was Sardar Patel's contribution to Indian integration?", "a": "Integrated 565 Princely States into India (with VP Menon). Used diplomacy and when needed, force (Hyderabad police action 1948). Called 'Bismarck of India.'"}, {"q": "What did Ambedkar do on 14 October 1956?", "a": "BR Ambedkar converted to Buddhism at Nagpur on 14 October 1956 with 600,000 followers. He died on 6 December 1956 — just 7 weeks later."}, {"q": "Where and when was Gandhi assassinated?", "a": "Birla House (now Gandhi Smriti), New Delhi on 30 January 1948 at 5:17 PM during prayer meeting. Shot by Nathuram Godse."}, {"q": "What did Nehru call himself in 'Discovery of India'?", "a": "Nehru wrote 'Discovery of India' (1946) while in Ahmednagar Fort prison. He described India's civilization, culture, and history. Also wrote 'Glimpses of World History' and his Autobiography."}, {"q": "What was CR Das's title and contribution?", "a": "'Deshbandhu' (Friend of the Country); founded Swaraj Party 1923 with Motilal Nehru to enter legislative councils and disrupt. Died 1925."}, {"q": "When did Tilak die?", "a": "1 August 1920 — Gandhi organized his 6-month non-cooperation program in response. Tilak is called 'Lokmanya' (one beloved by people)."}, {"q": "What books did Nehru write in prison?", "a": "'Discovery of India' (Ahmednagar, 1944) and 'Glimpses of World History' (1934, letters to daughter Indira). His Autobiography was written in 1936."}], "mcqs": [{"q": "The title 'Mahatma' was given to Gandhi by:", "o": ["Jawaharlal Nehru", "Sardar Patel", "Rabindranath Tagore", "Subhas Chandra Bose"], "a": 2, "e": "Rabindranath Tagore gave Gandhi the title 'Mahatma' (Great Soul). Subhas Chandra Bose gave the title 'Father of the Nation' (1944). Churchill called Gandhi 'half-naked fakir.'"}, {"q": "Nehru was the Prime Minister of India from 1947 to:", "o": ["1960", "1962", "1964", "1966"], "a": 2, "e": "Jawaharlal Nehru was PM from 15 August 1947 to 27 May 1964 — serving for 17 years (the longest PM tenure in India's history). He died in office on 27 May 1964."}, {"q": "Gandhi was assassinated at:", "o": ["Sabarmati Ashram", "Agha Khan Palace, Pune", "Birla House, New Delhi", "Red Fort, Delhi"], "a": 2, "e": "Gandhi was shot at Birla House (now Gandhi Smriti), New Delhi on 30 January 1948 at 5:17 PM by Nathuram Godse during an evening prayer meeting."}, {"q": "BR Ambedkar converted to Buddhism in:", "o": ["14 Oct 1954", "14 Oct 1956", "6 Dec 1956", "14 Nov 1956"], "a": 1, "e": "Ambedkar converted to Buddhism on 14 October 1956 at Nagpur with approximately 600,000 followers. He died just 7 weeks later on 6 December 1956 (Mahaparinirvan Din)."}, {"q": "Sardar Patel is compared to Germany's Bismarck because:", "o": ["Both used military force", "Both united their nations through integration of smaller states", "Both were lawyers", "Both wrote constitutions"], "a": 1, "e": "Sardar Patel is called 'Bismarck of India' — like Bismarck united the German states into one nation, Patel integrated 565 Princely States into India. He used a combination of diplomacy and limited force."}, {"q": "'Father of the Nation' title was given to Gandhi by:", "o": ["Rabindranath Tagore", "Jawaharlal Nehru", "Subhas Chandra Bose", "Sardar Patel"], "a": 2, "e": "'Father of the Nation' was first given by Subhas Chandra Bose in a Singapore radio broadcast in 1944. The Indian government has not officially given anyone this title, but Gandhi is universally recognized as such."}, {"q": "Nehru's book 'Discovery of India' was written while he was imprisoned at:", "o": ["Yerwada Prison", "Naini Prison", "Ahmednagar Fort", "Agha Khan Palace"], "a": 2, "e": "Nehru wrote 'Discovery of India' at Ahmednagar Fort (1944) during the Quit India imprisonment. 'Glimpses of World History' (letters to Indira) and his Autobiography were also written in prison."}, {"q": "Children's Day (14 November) celebrates:", "o": ["Gandhi's birthday", "Ambedkar's birthday", "Nehru's birthday", "Tilak's birthday"], "a": 2, "e": "Children's Day is celebrated on 14 November — Jawaharlal Nehru's birthday (born 14 November 1889). Nehru's affection for children led to this tradition. Gandhi's birthday is 2 October (Gandhi Jayanti = International Non-Violence Day)."}, {"q": "CR Das's title 'Deshbandhu' means:", "o": ["Father of Nation", "Friend of Country", "Lion of Punjab", "Servant of People"], "a": 1, "e": "'Deshbandhu' means 'Friend of Country.' This title was given to CR Das (1870-1925), who founded the Swaraj Party (1923) with Motilal Nehru. He was a senior Bengali leader and renowned lawyer."}, {"q": "Who was Nathuram Godse?", "o": ["Congress leader", "A communist militant", "Member of RSS/Hindu Mahasabha who shot Gandhi", "INA soldier"], "a": 2, "e": "Nathuram Godse was associated with the RSS (later expelled) and Hindu Mahasabha. He shot Gandhi on 30 January 1948 at Birla House. He was tried, convicted, and hanged on 15 November 1949."}]}, {"id": "master_history_2", "label": "⭐ Master Node: Freedom Struggle", "icon": "⭐", "xp": "200", "seqIdx": "12", "type": "gold", "requires_pct": 80, "goldFacts": ["<b>Chronological backbone</b>: 1885 (INC) → 1905 (Partition Bengal) → 1906 (ML) → 1907 (Surat Split) → 1915 (Gandhi returns) → 1917 (Champaran) → 1919 (Jallianwala/Rowlatt) → 1920 (NCM) → 1922 (Chauri Chaura) → 1923 (Swaraj Party) → 1924 (HRA) → 1925 (Kakori) → 1929 (Lahore/Poorna Swaraj) → 1930 (Dandi) → 1931 (GI Pact) → 1935 (GoI Act) → 1937 (Elections) → 1939 (Bose-Forward Bloc) → 1942 (QIM+Cripps) → 1943 (Azad Hind) → 1945 (INA trials) → 1946 (Cabinet Mission+Direct Action) → 1947 (Independence) → 1948 (Gandhi killed)", "<b>Governor-Generals vs Viceroys</b>: GG became Viceroy from 1858 (after 1857 revolt transferred power from Company to Crown). Canning = last GG + 1st Viceroy. Before 1858 = Company rule (GGs). After 1858 = Crown rule (Viceroys).", "<b>Three phases of Congress</b>: Moderate (1885-1905, prayers+petitions) → Extremist/Assertive (1905-1920, Swadeshi+Boycott) → Gandhian (1920-1947, mass movements)", "<b>Five famous pacts</b>: Lucknow Pact 1916 (Congress+ML united) → Gandhi-Irwin Pact 5 Mar 1931 (CDM suspended) → Poona Pact 26 Sep 1932 (Ambedkar+Gandhi, separate electorates dropped) → Liaquat-Nehru Pact 1950 (minority rights India-Pakistan) → Tashkent Agreement 1966 (Lal Bahadur Shastri)", "<b>Key newspapers/journals</b>: Kesari+Mahratta (Tilak) → Indian Opinion (Gandhi, South Africa) → Young India+Harijan (Gandhi) → Al-Hilal (Azad) → Independent+Leader (Motilal) → New India (Annie Besant) → Jugantar+Sandhya (Bengal extremists)", "<b>Revolutionary organisations</b>: Anushilan Samiti (1902, Bengal) → HRA 1924 → HSRA 1928 (Bhagat Singh added 'socialist'); Abhinav Bharat (1904, VD Savarkar); Ghadar Party 1913 (Lala Har Dayal, San Francisco); Berlin Committee (WW1)", "<b>Acts timeline</b>: IPC 1860 → Indian Councils Act 1861/1892/1909 (Morley-Minto) → GoI Act 1919 (Montagu-Chelmsford; dyarchy in provinces) → Rowlatt Act 1919 → GoI Act 1935 (Provincial Autonomy+Federal Court+RBI) → Independence Act 1947", "<b>Important commissions/reports</b>: Duff Commission (education 1854) → Hunter Commission (1882 education) → Welby Commission (finance) → Muddiman Committee (1924, dyarchy review) → Simon Commission (1927, no Indians) → Hartog Committee (1929) → Sapru Report (1944)", "<b>Women leaders</b>: Sarojini Naidu (Nightingale of India, 1st woman INC President 1925) → Annie Besant (1st woman INC President 1917) → Aruna Asaf Ali (QIM flag, Gowalia Tank) → Usha Mehta (Congress Radio) → Sucheta Kripalani → Vijayalakshmi Pandit (1st woman UN General Assembly President)", "<b>Key sessions/years of INC</b>: 1885 Bombay (WC Banerjee) → 1905 Banaras (Gokhale; partition Bengal) → 1906 Calcutta (Dadabhai; Swaraj+Swadeshi+Boycott+Nat. Edu.) → 1907 Surat (split) → 1916 Lucknow (Lucknow Pact) → 1917 Calcutta (Annie Besant, 1st woman president) → 1920 Nagpur (Gandhi takes over; non-cooperation) → 1929 Lahore (Nehru; Poorna Swaraj; 26 Jan celebrated) → 1931 Karachi (Fundamental Rights + Economic Policy) → 1942 Bombay (QIM 'Do or Die')", "<b>Important Viceroy-event pairs</b>: Canning (1857) → Mayo (Assassination) → Ripon (1882 local self-govt; Ilbert Bill) → Curzon (1905 Bengal Partition) → Hardinge (1911 Delhi Durbar; capital Delhi) → Chelmsford (1919 Rowlatt/Jallianwala) → Irwin (Gandhi-Irwin Pact 1931) → Linlithgow (1942 QIM) → Wavell (Shimla Conf 1945) → Mountbatten (Partition 1947)", "<b>Last 6 months of Raj timeline</b>: Feb 1947 (Attlee announces exit) → Jun 1947 (Mountbatten Plan) → Jul 1947 (Independence Act) → 14 Aug (Pakistan) → 15 Aug (India) → 17 Aug (Radcliffe Award announced) → Oct 1947 (Kashmir accession) → 30 Jan 1948 (Gandhi killed)"], "goldTraps": ["❌ Simon Commission (1927) had NO Indian members → ✅ CORRECT — that's WHY it was boycotted; 'Simon go back'", "❌ Annie Besant was the 1st woman INC President (1917) → ✅ Wait — this IS correct; Sarojini Naidu was 2nd (1925). Trick: Sarojini is more famous but NOT 1st", "❌ Dandi March was 12 March 1930 → ✅ CORRECT — Dandi March STARTED 12 March 1930; salt law broken 6 April 1930", "❌ Bhagat Singh was hanged on 23 March 1930 → ✅ WRONG — 23 March <b>1931</b> (one year after Dandi March start)", "❌ Round Table Conferences: 1st had Gandhi → ✅ Gandhi attended <b>2nd</b> RTC (1931); NOT 1st RTC (1930)", "❌ Morley-Minto reforms = 1919 → ✅ Morley-Minto = <b>1909</b>; Montagu-Chelmsford = 1919", "❌ Poona Pact was signed between Congress and Muslim League → ✅ Poona Pact = <b>Gandhi + Ambedkar</b> (26 Sep 1932); about depressed classes seats", "❌ Nehru was the 1st to demand Poorna Swaraj → ✅ Nehru proposed at <b>Lahore session Dec 1929</b>; celebrated on 26 Jan 1930 (1st Republic Day = 26 Jan 1950)", "❌ GoI Act 1919 introduced Provincial Autonomy → ✅ GoI 1919 = dyarchy in provinces; <b>Provincial Autonomy = GoI Act 1935</b>", "❌ INC was founded by Bal Gangadhar Tilak → ✅ INC founded by <b>AO Hume</b> (1885); first president WC Banerjee; Tilak was Extremist leader 1905+"], "goldMCQs": [{"q": "Which session of INC passed the Poorna Swaraj resolution?", "o": ["Nagpur 1920", "Karachi 1931", "Lahore 1929", "Calcutta 1928"], "a": 2, "e": "Lahore Session (December 1929) under Jawaharlal Nehru passed the Poorna Swaraj resolution. 26 January 1930 was celebrated as Independence Day. This is why Republic Day is on 26 January."}, {"q": "Who was the FIRST woman president of Indian National Congress?", "o": ["Sarojini Naidu (1925)", "Annie Besant (1917)", "Vijayalakshmi Pandit (1932)", "Aruna Asaf Ali (1940)"], "a": 1, "e": "Annie Besant was the FIRST woman INC president (1917, Calcutta session). Sarojini Naidu was the SECOND (1925, Kanpur session). This is a classic exam trap — Sarojini is more famous but was not first."}, {"q": "Morley-Minto Reforms refer to the:", "o": ["Indian Councils Act 1892", "Indian Councils Act 1909", "Government of India Act 1919", "Government of India Act 1935"], "a": 1, "e": "Morley-Minto Reforms = Indian Councils Act 1909 (Lord Minto = Viceroy, Morley = Sec of State). Introduced separate electorates for Muslims. Montagu-Chelmsford Reforms = GoI Act 1919."}, {"q": "Gandhi attended which Round Table Conference?", "o": ["First (1930)", "Second (1931)", "Third (1932)", "Both 1st and 2nd"], "a": 1, "e": "Gandhi attended ONLY the Second Round Table Conference (1931, London) after the Gandhi-Irwin Pact. He boycotted the 1st RTC and was in jail during the 3rd. He returned empty-handed from the 2nd."}, {"q": "The Poona Pact (26 September 1932) was between:", "o": ["Congress and Muslim League", "Gandhi and Jinnah", "Gandhi and Ambedkar", "Congress and British"], "a": 2, "e": "Poona Pact was signed between Gandhi and BR Ambedkar on 26 September 1932 at Yerwada Prison. Gandhi fasted against Communal Award (separate electorates for Depressed Classes). Pact gave reserved seats in general electorates instead."}, {"q": "Dyarchy in provinces was introduced by:", "o": ["GoI Act 1909", "GoI Act 1919", "GoI Act 1935", "Indian Councils Act 1892"], "a": 1, "e": "Dyarchy in provinces was introduced by GoI Act 1919 (Montagu-Chelmsford Reforms). Dyarchy = two categories of subjects: Reserved (Governor) and Transferred (elected ministers). GoI Act 1935 replaced dyarchy with Provincial Autonomy."}, {"q": "Ghadar Party (1913) was founded by:", "o": ["Bal Gangadhar Tilak", "Bhagat Singh", "Lala Har Dayal", "VD Savarkar"], "a": 2, "e": "Ghadar Party was founded by Lala Har Dayal in San Francisco (1913) among Indian immigrants (especially Punjabis) in North America. 'Ghadar' means 'mutiny/revolution.' Active during WW1 trying to spark Indian revolution."}, {"q": "Which Viceroy partitioned Bengal in 1905?", "o": ["Ripon", "Hardinge", "Curzon", "Chelmsford"], "a": 2, "e": "Lord Curzon partitioned Bengal in October 1905. This triggered the Swadeshi Movement. Bengal partition was annulled in 1911 by Lord Hardinge during Delhi Durbar, when capital was also shifted from Calcutta to Delhi."}, {"q": "The salt law was broken on:", "o": ["12 March 1930", "6 April 1930", "26 January 1930", "12 April 1930"], "a": 1, "e": "Dandi March STARTED on 12 March 1930 and Gandhi reached Dandi on 5 April 1930 and broke the salt law by picking salt on 6 April 1930. Civil Disobedience Movement (CDM) officially launched on 6 April 1930."}, {"q": "Which of these pairs is INCORRECT?", "o": ["Tilak - Lokmanya", "CR Das - Deshbandhu", "Lal Bahadur Shastri - Jai Jawan Jai Kisan", "Gokhale - Lokamanya"], "a": 3, "e": "Gokhale is NOT 'Lokamanya' — that is Tilak's title. Gokhale was known as 'Mahatma' by Gandhi who called him his political guru. CR Das = Deshbandhu (Friend of Country). Lal Bahadur Shastri = 'Jai Jawan Jai Kisan' slogan."}]}];
function save(){ss(SK,JSON.stringify(st));}
function load(){try{const d=gs(SK);if(d)st=JSON.parse(d);}catch(e){st={};}}
function calcPct(node){const r=st[PREFIX+node.id+'_results'];if(!r||!r.length)return 0;const s=r[r.length-1];return Math.round((s.correct/s.total)*100);}
function calcAvgPct(){const reg=CHAPTERS.filter(c=>c.type!=='gold');if(!reg.length)return 0;const sum=reg.reduce((a,c)=>a+calcPct(c),0);return Math.round(sum/reg.length);}
function rebuildUnlocked(){CHAPTERS.forEach((c,i)=>{if(c.type==='gold'){c._unlocked=(calcAvgPct()>=80);}else if(i===0){c._unlocked=true;}else{const prev=CHAPTERS[i-1];c._unlocked=(prev&&!prev.type&&calcPct(prev)>=60);}});}
function updateTopbar(){const xp=st[PREFIX+'xp']||0;document.getElementById('tb-xp').textContent='⚡ '+xp+' XP';document.getElementById('tb-pct').textContent='📊 '+calcAvgPct()+'%';}
function buildSidebar(){rebuildUnlocked();const c=document.getElementById('sidebar-inner');c.innerHTML='';CHAPTERS.forEach(n=>{const div=document.createElement('div');div.className='node-item'+(n._unlocked?'':' locked')+(n.type==='gold'?' gold-node':'');div.onclick=()=>{if(n._unlocked){selectNode(n);if(window.innerWidth<=768){document.getElementById('aside').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('show');}}else{showToast('🔒 Complete previous node with 60%+ to unlock!');}};const pct=calcPct(n);div.innerHTML=`<span class="node-icon">${n.icon}</span><div class="node-info"><div class="node-label">${n.label}</div><div class="node-xp">⚡${n.xp} XP${n.type==='gold'?' · Avg 80%+ required':''}</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;c.appendChild(div);});}
function selectNode(node){st[PREFIX+'current']=node.id;save();buildSidebar();updateTopbar();renderContent(node);}
function switchTab(nodeId,tab){st[PREFIX+nodeId+'_tab']=tab;save();const node=CHAPTERS.find(c=>c.id===nodeId);if(node)renderContent(node);}
function renderContent(node){document.getElementById('tb-title').textContent=node.icon+' '+node.label;const mc=document.getElementById('node-content');mc.innerHTML='';if(node.type==='gold'){renderGold(node,mc);return;}const tab=st[PREFIX+node.id+'_tab']||'learn';const tabs=`<div class="tab-bar"><button class="tab-btn${tab==='learn'?' active':''}" onclick="switchTab('${node.id}','learn')">📖 LEARN</button><button class="tab-btn${tab==='flash'?' active':''}" onclick="switchTab('${node.id}','flash')">🃏 FLASHCARDS</button><button class="tab-btn${tab==='test'?' active':''}" onclick="switchTab('${node.id}','test')">📝 TEST</button></div>`;const prev=st[PREFIX+node.id+'_results'];const badge=prev&&prev.length?`<div class="score-badge">Last score: ${prev[prev.length-1].pct}% (${prev[prev.length-1].correct}/${prev[prev.length-1].total})</div>`:'';mc.innerHTML=tabs+badge;if(tab==='learn')renderLearn(node,mc);else if(tab==='flash')renderFlash(node,mc);else renderTest(node,mc);}
function renderLearn(node,mc){const d=document.createElement('div');d.className='learn-body';d.innerHTML=`<h2>${node.icon} ${node.label}</h2><div>${node.facts.map(f=>`<div class="fact-item">${f}</div>`).join('')}</div><h3>📊 Quick Reference Table</h3><div class="table-wrap">${node.table}</div><h3>🧠 Memory Hook</h3><div class="mnemonic-box">${node.mn}</div><div class="traps-section"><h3>⚠️ Exam Traps</h3>${node.traps.map(t=>`<div class="trap-item">${t}</div>`).join('')}</div><div class="revision-section"><h3>✅ Rapid Revision</h3><ul>${node.revision.map(r=>`<li>${r}</li>`).join('')}</ul></div><div class="oneliners-section"><h3>💡 One-Liners</h3>${node.oneliners.map(o=>`<div class="oneliner">${o}</div>`).join('')}</div>`;mc.appendChild(d);}
function renderFlash(node,mc){let idx=st[PREFIX+node.id+'_fi']||0;const cards=node.flashcards;if(idx>=cards.length)idx=0;const d=document.createElement('div');d.className='flash-body';d.innerHTML=`<div class="flash-counter">Card ${idx+1} of ${cards.length}</div><div class="flash-card" id="fc-${node.id}" onclick="this.classList.toggle('flipped')"><div class="flash-front"><div class="flash-q">${cards[idx].q}</div><div class="flip-hint">Tap to reveal answer</div></div><div class="flash-back"><div class="flash-a">${cards[idx].a}</div></div></div><div class="flash-nav"><button ${idx===0?'disabled':''} onclick="navFlash('${node.id}',-1)">← Prev</button><button ${idx===cards.length-1?'disabled':''} onclick="navFlash('${node.id}',1)">Next →</button></div>`;mc.appendChild(d);}
function navFlash(nodeId,dir){const node=CHAPTERS.find(c=>c.id===nodeId);let idx=st[PREFIX+nodeId+'_fi']||0;idx=Math.max(0,Math.min(node.flashcards.length-1,idx+dir));st[PREFIX+nodeId+'_fi']=idx;save();renderContent(node);}
function renderTest(node,mc){const d=document.createElement('div');d.className='test-body';const answered=st[PREFIX+node.id+'_ans']||{};const submitted=st[PREFIX+node.id+'_sub'];node.mcqs.forEach((q,qi)=>{const qd=document.createElement('div');qd.className='q-block'+(submitted?(answered[qi]===q.ans?' correct':' wrong'):'');qd.innerHTML=`<div class="q-text">Q${qi+1}. ${q.q}</div><div class="opts">${q.opts.map((o,oi)=>`<label class="opt-label${answered[qi]===oi?' selected':''}${submitted?(oi===q.ans?' right-ans':(answered[qi]===oi?' wrong-ans':'')):''}"><input type="radio" name="q${node.id}_${qi}" value="${oi}" ${answered[qi]===oi?'checked':''} ${submitted?'disabled':''} onchange="setAns('${node.id}',${qi},${oi})"> ${o}</label>`).join('')}${submitted?`<div class="exp-box">💡 ${q.exp}</div>`:''}`;d.appendChild(qd);});if(!submitted){const btn=document.createElement('button');btn.className='submit-btn';btn.textContent='Submit Answers';btn.onclick=()=>submitTest(node.id);d.appendChild(btn);}else{const res=st[PREFIX+node.id+'_results'];renderResult(node,d,res[res.length-1]);}mc.appendChild(d);}
function setAns(nodeId,qi,oi){const k=PREFIX+nodeId+'_ans';const a=st[k]||{};a[qi]=oi;st[k]=a;save();}
function submitTest(nodeId){const node=CHAPTERS.find(c=>c.id===nodeId);const answered=st[PREFIX+nodeId+'_ans']||{};let correct=0;node.mcqs.forEach((q,qi)=>{if(answered[qi]===q.ans)correct++;});const pct=Math.round((correct/node.mcqs.length)*100);const res={correct,total:node.mcqs.length,pct};const key=PREFIX+nodeId+'_results';if(!st[key])st[key]=[];st[key].push(res);st[PREFIX+nodeId+'_sub']=true;if(pct>=60&&!(st[PREFIX+'xp_'+nodeId])){st[PREFIX+'xp']=(st[PREFIX+'xp']||0)+node.xp;st[PREFIX+'xp_'+nodeId]=true;}save();rebuildUnlocked();buildSidebar();updateTopbar();renderContent(node);}
function renderResult(node,d,res){const pass=res.pct>=60;const rb=document.createElement('div');rb.className='result-banner '+(pass?'pass':'fail');rb.innerHTML=pass?`🏆 ${res.pct}% — Passed! +${node.xp} XP earned`:`❌ ${res.pct}% — Need 60%+ to unlock next node`;d.appendChild(rb);const rb2=document.createElement('button');rb2.className='submit-btn';rb2.textContent='Retry Test';rb2.onclick=()=>{delete st[PREFIX+node.id+'_sub'];delete st[PREFIX+node.id+'_ans'];save();renderContent(node);};d.appendChild(rb2);}
function renderGold(node,mc){const avg=calcAvgPct();if(avg<80){mc.innerHTML=`<div class="gold-locked-msg"><div style="font-size:3rem">⭐</div><h2>Golden Challenge Locked</h2><p>Complete all regular nodes with average 80%+ to unlock.</p><p style="margin-top:1rem;color:var(--amber)">Your current average: <b>${avg}%</b> / 80% required</p></div>`;return;}const tab=st[PREFIX+node.id+'_tab']||'learn';const tabs=`<div class="tab-bar"><button class="tab-btn${tab==='learn'?' active':''}" onclick="switchTab('${node.id}','learn')">📖 GOLD FACTS</button><button class="tab-btn${tab==='test'?' active':''}" onclick="switchTab('${node.id}','test')">🏆 GOLD TEST</button></div>`;mc.innerHTML=tabs;if(tab==='learn'){const d=document.createElement('div');d.className='learn-body';d.innerHTML=`<div class="gold-header"><span>⭐ MASTER CHALLENGE: ALL PART 4 TOPICS</span><span>Avg: ${avg}% | Required: 80%</span></div><h3 style="color:var(--gold)">📌 Master Facts (Cross-Topic)</h3><div class="gold-facts-ticker">${node.goldFacts.map((f,i)=>`<div class="fact-item" style="margin-bottom:.3rem">${i+1}. ${f}</div>`).join('')}</div><div class="gold-traps"><h3 style="color:var(--gold);margin-bottom:.5rem">⚠️ Critical SSC Traps</h3>${node.goldTraps.map(t=>`<div class="trap-item">${t}</div>`).join('')}</div>`;mc.appendChild(d);}else{const answered=st[PREFIX+node.id+'_ans']||{};const submitted=st[PREFIX+node.id+'_sub'];const d=document.createElement('div');d.className='test-body';node.goldMCQs.forEach((q,qi)=>{const qd=document.createElement('div');qd.className='q-block'+(submitted?(answered[qi]===q.ans?' correct':' wrong'):'');qd.innerHTML=`<div class="q-text" style="color:var(--gold)">G${qi+1}. ${q.q}</div><div class="opts">${q.opts.map((o,oi)=>`<label class="opt-label${answered[qi]===oi?' selected':''}${submitted?(oi===q.ans?' right-ans':(answered[qi]===oi?' wrong-ans':'')):''}"><input type="radio" name="gq${qi}" value="${oi}" ${answered[qi]===oi?'checked':''} ${submitted?'disabled':''} onchange="setAns('${node.id}',${qi},${oi})"> ${o}</label>`).join('')}${submitted?`<div class="exp-box">💡 ${q.exp}</div>`:''}`;d.appendChild(qd);});if(!submitted){const btn=document.createElement('button');btn.className='submit-btn gold-submit';btn.textContent='Submit Golden Test';btn.onclick=()=>submitGoldTest(node.id);d.appendChild(btn);}else{renderGoldResult(node,d);}mc.appendChild(d);}}
function submitGoldTest(nodeId){const node=CHAPTERS.find(c=>c.id===nodeId);const answered=st[PREFIX+nodeId+'_ans']||{};let correct=0;node.goldMCQs.forEach((q,qi)=>{if(answered[qi]===q.ans)correct++;});const pct=Math.round((correct/node.goldMCQs.length)*100);const res={correct,total:node.goldMCQs.length,pct};const key=PREFIX+nodeId+'_results';if(!st[key])st[key]=[];st[key].push(res);st[PREFIX+nodeId+'_sub']=true;if(pct>=80&&!(st[PREFIX+'xp_'+nodeId])){st[PREFIX+'xp']=(st[PREFIX+'xp']||0)+node.xp;st[PREFIX+'xp_'+nodeId]=true;showToast('🏆 GOLDEN NODE CLEARED! +200 XP!');}save();updateTopbar();renderContent(node);}
function renderGoldResult(node,d){const res=st[PREFIX+node.id+'_results'];const r=res[res.length-1];const pass=r.pct>=80;const rb=document.createElement('div');rb.className='result-banner '+(pass?'pass':'fail');rb.innerHTML=pass?`🏆 ${r.pct}% — GOLD CLEARED! +200 XP!`:`❌ ${r.pct}% — Need 80%+ for Golden Node`;d.appendChild(rb);const rb2=document.createElement('button');rb2.className='submit-btn gold-submit';rb2.textContent='Retry Gold Test';rb2.onclick=()=>{delete st[PREFIX+node.id+'_sub'];delete st[PREFIX+node.id+'_ans'];save();renderContent(node);};d.appendChild(rb2);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function toggleDrawer(){const a=document.getElementById('aside');const o=document.getElementById('drawer-overlay');a.classList.toggle('open');o.classList.toggle('show');}
let st={};
load();
document.getElementById('menu-btn').addEventListener('click',toggleDrawer);
document.getElementById('drawer-overlay').addEventListener('click',toggleDrawer);
let _mToken=null,_mSid=null;
function initMetrics(){
  try{
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  }catch(e){}
  _mSid='mod2-'+(Date.now().toString(36));
}
function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})}).catch(()=>{});
}
document.addEventListener('DOMContentLoaded',function(){rebuildUnlocked();buildSidebar();updateTopbar();initMetrics();track('material_opened',{material:'modern_history_part2'});const cur=st[PREFIX+'current'];const node=cur?CHAPTERS.find(c=>c.id===cur):null;if(node&&node._unlocked){renderContent(node);}else{document.getElementById('node-content').innerHTML=`<div class="welcome-panel"><h1>📜 Modern History Part 2</h1><p style="color:var(--ink2);max-width:500px;margin:0 auto">Master Reform Movements, INC, Partition, Non-Cooperation and Civil Disobedience for SSC Exams.</p><div class="welcome-stats"><div>📚 13 Learning Nodes</div><div>⭐ 1 Golden Challenge</div><div>🃏 130 Flashcards</div><div>📝 195 MCQs</div></div><p style="margin-top:1.5rem;color:var(--ink3);font-size:.85rem">Click a node in the sidebar to begin!</p></div>`;}});
</script></body></html>
