<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CentuMania · Geography Part 1</title>
<style>
:root{
--bg:#030B17;--bg2:#020710;--panel:#071A30;--panel2:#0A2040;--line:#1A3A5C;
--ink:#D4E0EC;--ink2:#88AACC;--ink3:#4A6888;
--gold:#38BDF8;--gold2:#1D4ED8;--gold-glow:rgba(56,189,248,.15);
--amber:#60A5FA;--gold-bg:rgba(56,189,248,.08);
--red:#f87171;--red-bg:rgba(248,113,113,.10);
--blue:#93C5FD;--green:#4ade80;--orange:#fb923c;--purple:#c084fc;
--r:12px;--r2:8px;--tr:.22s;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg2);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:200}
#hamburger{background:none;border:none;color:var(--ink);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background var(--tr)}
#hamburger:hover{background:var(--panel)}
#tb-title{flex:1;font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-badge{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600;color:var(--amber);white-space:nowrap}
/* ── ASIDE/DRAWER ── */
#aside{position:fixed;top:52px;left:0;bottom:0;width:280px;background:var(--bg2);border-right:1px solid var(--line);z-index:150;transform:translateX(-100%);transition:transform .28s ease;overflow:hidden;display:flex;flex-direction:column}
#aside.open{transform:translateX(0)}
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:140}
#drawer-overlay.active{display:block}
#sidebar-inner{flex:1;overflow-y:auto;padding:12px 0 80px}
.ch-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);padding:14px 16px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:0;transition:background var(--tr);font-size:13px;color:var(--ink2);border-left:3px solid transparent}
.nav-item:hover{background:var(--panel);color:var(--ink)}
.nav-item.active{background:var(--panel2);color:var(--gold);border-left-color:var(--gold)}
.nav-item.locked{opacity:.4;cursor:not-allowed}
.nav-item.gold-nav{color:var(--gold)}
.nav-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.nav-info{flex:1;min-width:0}
.nav-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-xp{font-size:11px;color:var(--ink3);margin-top:1px}
.nav-badge{font-size:10px;background:var(--panel2);color:var(--amber);border-radius:10px;padding:1px 7px;margin-left:auto;flex-shrink:0}
/* ── MAIN ── */
#main{margin-top:52px;padding:20px 16px;max-width:860px;margin-left:auto;margin-right:auto}
/* ── HOME DASHBOARD ── */
#dash{display:block}
.dash-hero{background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--r);padding:28px 24px;margin-bottom:20px;text-align:center}
.dash-hero h1{font-size:24px;font-weight:700;color:var(--gold);margin-bottom:6px}
.dash-hero p{color:var(--ink2);font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:11px;color:var(--ink3);margin-top:2px;text-transform:uppercase;letter-spacing:.8px}
.dash-btn{display:block;width:100%;padding:13px;background:var(--gold2);color:#fff;border:none;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;transition:opacity var(--tr)}
.dash-btn:hover{opacity:.85}
.dash-btn.outline{background:transparent;border:1px solid var(--line);color:var(--ink2)}
/* ── NODE CONTENT ── */
#node-content{display:none}
.node-header{background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:16px}
.node-chapter{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.node-title{font-size:20px;font-weight:700;color:var(--gold)}
.node-meta{font-size:12px;color:var(--ink3);margin-top:4px}
/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:4px;margin-bottom:16px}
.tab-btn{flex:1;padding:8px 4px;border:none;background:none;color:var(--ink3);font-size:12px;font-weight:600;cursor:pointer;border-radius:6px;transition:all var(--tr);text-align:center;letter-spacing:.5px;text-transform:uppercase}
.tab-btn.active{background:var(--panel2);color:var(--gold)}
/* ── LEARN PANE ── */
.section-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.section-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.fact-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.fact-list li{font-size:13px;color:var(--ink);line-height:1.5;padding:7px 10px;background:var(--bg);border-radius:6px;border-left:3px solid var(--line)}
.fact-list li b,.fact-list li strong{color:var(--amber)}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:var(--panel2);color:var(--ink2);padding:7px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--line)}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:top}
.data-table tr:hover td{background:rgba(255,255,255,.03)}
.data-table td b,.data-table td strong{color:var(--amber)}
.mn-box{background:var(--gold-bg);border:1px solid var(--gold2);border-radius:var(--r2);padding:14px;font-size:13px;color:var(--gold);line-height:1.6}
.trap-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.trap-list li{font-size:13px;padding:8px 12px;background:var(--red-bg);border:1px solid rgba(248,113,113,.25);border-radius:6px;color:var(--ink);line-height:1.5}
.trap-list li::before{content:"⚠ ";color:var(--red)}
.trap-list li b,.trap-list li strong{color:var(--red)}
.rev-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rev-list li{font-size:12px;padding:6px 10px;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--ink2);line-height:1.4}
.rev-list li b,.rev-list li strong{color:var(--amber)}
.ol-list{list-style:none;display:flex;flex-direction:column;gap:4px;columns:1}
.ol-list li{font-size:12px;padding:5px 9px;background:var(--bg);border-radius:5px;color:var(--ink2);line-height:1.4;border-left:2px solid var(--line)}
.ol-list li b,.ol-list li strong{color:var(--amber)}
/* ── FLASH CARDS ── */
.flash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flash-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:14px;cursor:pointer;min-height:90px;display:flex;flex-direction:column;justify-content:center;transition:border-color var(--tr)}
.flash-card:hover{border-color:var(--gold2)}
.flash-q{font-size:12px;color:var(--ink2);line-height:1.4}
.flash-a{font-size:13px;color:var(--gold);font-weight:600;margin-top:6px;display:none;line-height:1.4}
.flash-card.revealed .flash-a{display:block}
.flash-card.revealed{border-color:var(--green)}
.flash-hint{font-size:10px;color:var(--ink3);margin-top:8px;text-align:center}
/* ── TEST PANE ── */
.test-start-box{text-align:center;padding:30px 20px}
.test-start-box h3{font-size:18px;color:var(--gold);margin-bottom:8px}
.test-start-box p{color:var(--ink2);font-size:13px;margin-bottom:20px}
.btn-primary{background:var(--gold2);color:#fff;border:none;border-radius:var(--r2);padding:11px 28px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity var(--tr)}
.btn-primary:hover{opacity:.85}
.q-box{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:12px}
.q-counter{font-size:11px;color:var(--ink3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.q-text{font-size:14px;color:var(--ink);line-height:1.6;margin-bottom:14px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{width:100%;text-align:left;padding:10px 14px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);color:var(--ink);font-size:13px;cursor:pointer;transition:all var(--tr);line-height:1.4}
.opt-btn:hover:not(:disabled){background:var(--panel2);border-color:var(--gold2)}
.opt-btn.correct{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.exp-box{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r2);padding:10px 14px;font-size:12px;color:var(--ink2);margin-top:10px;line-height:1.5;display:none}
.exp-box.show{display:block}
.progress-bar{height:4px;background:var(--line);border-radius:4px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .3s}
/* ── NODE NAV ── */
#node-nav-bar{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.nav-arrow{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:9px 18px;color:var(--ink2);font-size:13px;cursor:pointer;font-weight:500;transition:all var(--tr)}
.nav-arrow:hover{background:var(--panel2);color:var(--gold);border-color:var(--gold2)}
/* ── RESULTS ── */
.result-box{text-align:center;padding:28px 20px}
.result-score{font-size:48px;font-weight:700;color:var(--gold);margin-bottom:4px}
.result-msg{font-size:15px;color:var(--ink2);margin-bottom:20px}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.r-stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:12px}
.r-stat-val{font-size:20px;font-weight:700;color:var(--amber)}
.r-stat-lbl{font-size:11px;color:var(--ink3);margin-top:2px}
/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--panel2);border:1px solid var(--gold2);color:var(--gold);border-radius:20px;padding:10px 22px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ── GOLD NODE ── */
.gold-hero{background:linear-gradient(135deg,var(--gold-bg),var(--panel));border:2px solid var(--gold);border-radius:var(--r);padding:24px;margin-bottom:16px;text-align:center}
.gold-hero h2{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:6px}
.gold-hero p{color:var(--ink2);font-size:13px}
.gold-fact{background:var(--gold-bg);border:1px solid rgba(56,189,248,.3);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--ink);line-height:1.5;margin-bottom:6px}
.gold-fact strong,.gold-fact b{color:var(--gold)}
/* ── LOCKED ── */
.locked-box{text-align:center;padding:40px 20px}
.locked-box .lock-icon{font-size:48px;margin-bottom:12px}
.locked-box h3{font-size:18px;color:var(--ink2);margin-bottom:8px}
.locked-box p{color:var(--ink3);font-size:13px}
/* ── RESPONSIVE ── */
@media(min-width:768px){
  #aside{transform:translateX(0)}
  #main{margin-left:280px;padding:24px}
  #drawer-overlay{display:none!important}
  #hamburger{display:none}
}
@media(max-width:480px){
  .flash-grid{grid-template-columns:1fr}
  .rev-list{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
}
</style>
</head>

<main id="main">

<script>

// ── Analytics ──────────────────────────────────────────────────────────────
const METRICS={events:[],startTime:Date.now()};
let _mToken=null,_mSid=null;
function initMetrics(){
  try{
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  }catch(e){}
  _mSid='geo1-'+(Date.now().toString(36));
}
function track(event,data={}){
  METRICS.events.push({event,ts:Date.now()-METRICS.startTime,data});
  try{const s=JSON.parse(localStorage.getItem('cm_metrics_geo1')||'[]');s.push({event,ts:new Date().toISOString(),...data});localStorage.setItem('cm_metrics_geo1',JSON.stringify(s.slice(-200)));}catch(e){}
  if(_mToken){fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},body:JSON.stringify({event_name:event,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:data})}).catch(()=>{});}
}

ere."}, {"q": "The Pole Star (Dhruva) is NOT visible from:", "opts": ["Northern Hemisphere", "Equator", "Arctic Circle", "Southern Hemisphere"], "ans": 3, "exp": "The Pole Star lies above the North Pole and is not visible from the Southern Hemisphere."}, {"q": "What percentage of the Solar System's mass does the Sun contain?", "opts": ["85.5%", "99.86%", "95.2%", "88.6%"], "ans": 1, "exp": "The Sun contains 99.86% of the total mass of the Solar System."}, {"q": "A Pulsar is best described as a:", "opts": ["Supernova explosion", "Black hole remnant", "Rotating magnetised neutron star", "White dwarf"], "ans": 2, "exp": "A Pulsar is a highly magnetised, rapidly rotating neutron star that emits beams of electromagnetic radiation."}, {"q": "Which galaxy is nearest to our Milky Way?", "opts": ["Triangulum Galaxy", "Large Magellanic Cloud", "Andromeda (M31)", "Whirlpool Galaxy"], "ans": 2, "exp": "Andromeda (M31) is the nearest large galaxy to the Milky Way."}, {"q": "The Sun's corona temperature is approximately:", "opts": ["1,000°C", "20,00,000°C", "6,000°C", "50,000°C"], "ans": 2, "exp": "The Sun's corona (outer atmosphere) is about 6,000°C; the core is ~20,00,000°C."}, {"q": "Ursa Major constellation is best visible during:", "opts": ["Winter mornings", "Summer evenings", "Spring mornings", "Autumn nights"], "ans": 1, "exp": "Ursa Major (Big Dipper/Saptarshi) is prominently visible during summer evenings."}, {"q": "Which object is formed when a massive star collapses beyond a neutron star?", "opts": ["Pulsar", "White Dwarf", "Asteroid", "Black Hole"], "ans": 3, "exp": "When a star is too massive to form a neutron star, it collapses into a Black Hole."}, {"q": "How many stars are approximately in the Milky Way galaxy?", "opts": ["10 billion", "100 billion", "400 billion", "1 trillion"], "ans": 2, "exp": "The Milky Way contains approximately 400 billion (4×10¹¹) stars."}, {"q": "Cassiopeia constellation looks like which shape?", "opts": ["Big spoon", "Arrow", "Cross", "Distorted W or M"], "ans": 3, "exp": "Cassiopeia looks like a distorted W or M shape and represents a seated queen."}, {"q": "Nuclear fusion in the Sun converts:", "opts": ["Helium to Hydrogen", "Carbon to Oxygen", "Hydrogen to Helium", "Nitrogen to Helium"], "ans": 2, "exp": "The Sun's energy comes from nuclear fusion where Hydrogen is converted to Helium in its core."}, {"q": "Lyman Alpha Blobs are:", "opts": ["Bright pulsars", "Heavy cluster bodies in Universe", "Type of asteroids", "Exploded supernovae"], "ans": 1, "exp": "Lyman Alpha Blobs are extremely large (up to 400,000 light-years wide) concentrations of gas in the Universe."}]},
{"id": "solar_planets", "chapter": "Cosmos 🌌", "seqIdx": 1, "xp": 60, "icon": "🪐", "title": "Solar System Planets", "facts": ["<b>Mercury</b>: 0 moons; 88-day revolution; fastest planet; nearest to Sun; greatest diurnal temp range", "<b>Venus</b>: 0 moons; 225-day revolution; <b>475°C</b>; hottest planet; brightest planet; Earth's Twin", "Venus = <b>Morning Star + Evening Star</b>; atmosphere = <b>97% CO₂</b>; clouds of <b>Sulphuric Acid</b>", "<b>Earth</b>: 1 moon; 365.25-day revolution; Blue Planet; Densest planet; Life exists", "<b>Mars</b>: 2 moons (Phobos, Deimos); 687-day revolution; Red Planet (iron oxide); CO₂ atmosphere", "Smallest satellite = <b>Deimos</b> (Mars's moon)", "<b>Jupiter</b>: <b>95 moons</b>; 12-year revolution; <b>-123°C</b>; Biggest planet; Gas giant", "Jupiter = <b>Big Red Spot</b> (giant storm); <b>Lord of Heavens</b>; biggest satellite = <b>Ganymede</b>", "<b>Saturn</b>: <b>146 moons</b> (highest); 29.5-year revolution; <b>-178°C</b>; 2nd largest; <b>7 rings</b>", "Saturn = least dense planet; last visible by <b>naked eye</b>; largest satellite = <b>Titan</b>", "<b>Uranus</b>: 27 moons; 84-year revolution; <b>-224°C</b> (coldest); Green Planet; <b>5 rings</b>", "Uranus discovered by <b>William Herschel (1781)</b>; Ice giant; 3rd largest", "<b>Neptune</b>: 14 moons; 165-year revolution; <b>-214°C</b>; farthest from Sun; 1 day = ~16 hours", "<b>Pluto</b>: discovered 1930 by <b>Clyde Tombaugh</b>; demoted to dwarf planet by <b>IAU in 2006</b>", "Total dwarf planets = <b>7</b> (Pluto, Haumea, Makemake, Eris, Hygiea, Ceres, Sedna)", "Gas Giants: <b>Jupiter, Saturn</b> | Ice Giants: <b>Uranus, Neptune</b>", "All 4 outer planets have rings: <b>Jupiter, Saturn, Uranus, Neptune</b>", "Moon weight vs Earth weight = <b>1/6th</b>; Moon diameter = <b>1/4 of Earth</b>", "Planet with most satellites = <b>Saturn (146)</b>", "Biggest satellite in Solar System = <b>Ganymede</b> (Jupiter's moon)", "Hottest planet = <b>Venus (475°C)</b> — not Mercury despite ": "Which planet is farthest from the Sun?", "a": "Neptune"}], "mcqs": [{"q": "Which planet is called 'Earth's Twin' or 'Sister Planet'?", "opts": ["Mars", "Mercury", "Venus", "Saturn"], "ans": 2, "exp": "Venus is called Earth's Twin because of similar size and mass. It is also the brightest planet and Morning/Evening Star."}, {"q": "Which planet has the highest number of moons?", "opts": ["Jupiter (95)", "Saturn (146)", "Uranus (27)", "Neptune (14)"], "ans": 1, "exp": "Saturn has 146 known moons, the highest number among all planets. Jupiter has 95."}, {"q": "The biggest satellite in the entire Solar System is:", "opts": ["Titan (Saturn)", "Deimos (Mars)", "Ganymede (Jupiter)", "Charon (Pluto)"], "ans": 2, "exp": "Ganymede, a moon of Jupiter, is the largest satellite in the Solar System — even larger than Mercury."}, {"q": "Pluto was classified as a Dwarf Planet in which year?", "opts": ["1930", "1992", "2000", "2006"], "ans": 3, "exp": "The International Astronomical Union (IAU) demoted Pluto to Dwarf Planet status in 2006."}, {"q": "Which gas giant planet has 7 distinct rings?", "opts": ["Jupiter", "Uranus", "Saturn", "Neptune"], "ans": 2, "exp": "Saturn is famous for its 7 prominent rings made of ice and rock particles."}, {"q": "The Great Red Spot on Jupiter is:", "opts": ["A volcanic eruption", "A giant storm", "A crater", "An ocean"], "ans": 1, "exp": "Jupiter's Great Red Spot is a giant storm/anticyclone that has persisted for centuries."}, {"q": "Which planet is called the Green Planet?", "opts": ["Neptune", "Mars", "Earth", "Uranus"], "ans": 3, "exp": "Uranus appears green-blue due to methane in its atmosphere and is specifically called the Green Planet."}, {"q": "Venus rotates in which direction (compared to Earth)?", "opts": ["Same direction", "Retrograde (opposite)", "Doesn't rotate", "Tilted 90°"], "ans": 1, "exp": "Venus rotates retrograde (east to west), opposite to most other planets. The Sun rises in the west on Venus."}, {"q": "Which is the smallest planet in the Solar System?", "opts": ["Pluto", "Mars", "Mercury", "Venus"], "ans": 2, "exp": "Mercury is the smallest planet (Pluto is a dwarf planet, not a planet)."}, {"q": "Saturn can be seen with the naked eye up to which planet?", "opts": ["Jupiter", "Saturn", "Uranus", "Neptune"], "ans": 1, "exp": "Saturn is the last planet visible to the naked eye. Uranus and Neptune require telescopes."}, {"q": "Which planet has revolution period of 84 years?", "opts": ["Saturn", "Neptune", "Jupiter", "Uranus"], "ans": 3, "exp": "Uranus takes 84 Earth years to complete one revolution around the Sun."}, {"q": "The atmosphere of Venus mainly consists of:", "opts": ["Nitrogen", "Oxygen", "97% CO₂", "Methane"], "ans": 2, "exp": "Venus's atmosphere is about 97% carbon dioxide with clouds of sulphuric acid, causing extreme greenhouse effect."}, {"q": "Gas Giants in our Solar System are:", "opts": ["Earth and Venus", "Mars and Jupiter", "Jupiter and Saturn", "Uranus and Neptune"], "ans": 2, "exp": "Jupiter and Saturn are Gas Giants. Uranus and Neptune are Ice Giants."}, {"q": "Mars has how many moons?", "opts": ["0", "1", "2", "4"], "ans": 2, "exp": "Mars has 2 moons: Phobos (larger) and Deimos (smallest moon in Solar System)."}, {"q": "Which planet takes approximately 165 years to orbit the Sun?", "opts": ["Uranus", "Saturn", "Pluto", "Neptune"], "ans": 3, "exp": "Neptune takes about 165 Earth years to complete one revolution around the Sun."}]},

{"id": "earth_facts", "chapter": "Planet Earth 🌍", "seqIdx": 2, "xp": 50, "icon": "🌍", "title": "Facts About Earth", "facts": ["Earth's distance from Sun = <b>14.96 crore km (149 million km)</b>", "Earth's water cover = <b>71.96%</b> of surface", "Earth's shape = <b>Oblate Spheroid</b> — flattened at poles, bulge at equator", "Earth's circumference = <b>40,232 km</b>", "Earth's total area = <b>510 million sq km</b>", "Polar radius = <b>6,357 km</b> | Equatorial radius = <b>6,378 km</b>", "Equatorial diameter = <b>12,756 km</b> | Polar diameter = <b>12,714 km</b>", "Rotation period = <b>23 hrs 56 min 4 sec</b> (Sidereal day)", "Revolution period = <b>365 days 6 hrs</b> (~365¼ days)", "Revolution speed = <b>29.8 km/sec</b>", "Equatorial rotation speed = <b>1,667 km/h</b> (decreases to 0 at poles)", "<b>Perihelion</b> = Earth nearest to Sun = <b>January 3</b> (147 million km)", "<b>Aphelion</b> = Earth farthest from Sun = <b>July 4</b> (152 million km)", "Sunlight takes <b>8 minutes 18 seconds</b> to reach Earth", "Highest point = <b>Mt. Everest (8,848.86 m)</b>", "Deepest point = <b>Mariana Trench</b> — Pacific Ocean (10,994 m)", "Longest day in N. Hemisphere = <b>June 21</b> (Summer Solstice)", "Shortest day in N. Hemisphere = <b>December 22</b> (Winter Solstice)", "Equinox = Day equals night = <b>March 21</b> (Spring) & <b>Sept 23</b> (Autumn)", "Rotation causes: <b>days & nights</b>, 1-hour difference per 15°", "Revolution causes: <b>change of seasons</b>, variation in day/night lengths", "Earth is the <b>densest planet</b> in Solar System", "Earth is called the <b>Blue Planet</b> due to 71.96% water cover", "Seasons occur due to Earth's <b>axial tilt (23½°)</b> — NOT due to distance from Sun"], "table": "<table class='data-table'><tr><th>Feature</th><th>Value</th></tr><tr><td><b>Shape</b></td><td>Oblate Spheroid</td></tr><tr><td><b>Circumference</b></td><td>40,232 km</td></tr><tr><td><b>Equatorial Radius</b></td><td>6,378 km</td></tr><tr><td><b>Polar Radius</b></t : "How long does light from the Sun take to reach Earth?", "opts": ["3 min 20 sec", "5 min 30 sec", "8 min 18 sec", "12 min 40 sec"], "ans": 2, "exp": "Light from the Sun travels at 3×10⁸ m/s and takes approximately 8 minutes 18 seconds to reach Earth."}, {"q": "Earth's rotation period (sidereal day) is:", "opts": ["24 hours exactly", "23 hr 56 min 4 sec", "23 hr 30 min", "24 hr 6 min"], "ans": 1, "exp": "Earth's actual rotation period is 23 hours 56 minutes 4 seconds, also called a sidereal day."}, {"q": "The Summer Solstice (longest day in Northern Hemisphere) occurs on:", "opts": ["March 21", "June 21", "September 23", "December 22"], "ans": 1, "exp": "June 21 is the Summer Solstice when the Sun is directly over the Tropic of Cancer, giving the longest day in N. Hemisphere."}, {"q": "Earth's equatorial rotation speed is approximately:", "opts": ["500 km/h", "1,000 km/h", "1,667 km/h", "3,000 km/h"], "ans": 2, "exp": "Earth rotates at about 1,667 km/h at the equator, decreasing to zero at the poles."}, {"q": "Earth's equatorial radius compared to its polar radius:", "opts": ["Equal", "Equatorial is greater", "Polar is greater", "Varies seasonally"], "ans": 1, "exp": "Earth's equatorial radius (6,378 km) is larger than its polar radius (6,357 km) due to the oblate spheroid shape."}, {"q": "The Vernal (Spring) Equinox occurs on approximately:", "opts": ["June 21", "December 22", "March 21", "January 3"], "ans": 2, "exp": "The Spring Equinox (Vernal Equinox) occurs around March 21, when day and night are equal everywhere."}, {"q": "Earth's distance from the Sun is approximately:", "opts": ["14.96 crore km", "10 crore km", "20 crore km", "5 crore km"], "ans": 0, "exp": "Earth is approximately 14.96 crore km (149.6 million km) from the Sun on average."}, {"q": "The shortest day in the Northern Hemisphere occurs on:", "opts": ["September 23", "March 21", "December 22", "June 21"], "ans": 2, "exp": "December 22 is the Winter Solstice, giving the shortest day in the North // ── ENGINE ──────────────────────────────────────────────────────────────────
function allNodes(){return CHAPTERS;}
function seqNodes(){return CHAPTERS.filter(n=>n.type!=='gold').sort((a,b)=>a.seqIdx-b.seqIdx);}
function goldNode(){return CHAPTERS.find(n=>n.type==='gold');}

function isUnlocked(node){
  if(node.type==='gold'){
    const sn=seqNodes();
    if(!sn.length)return false;
    const totPct=sn.reduce((a,n)=>a+(S.mcq[n.id]?.pct||0),0)/sn.length;
    return totPct>=(node.requires_pct||80);
  }
  if(node.seqIdx===0)return true;
  const prev=seqNodes().find(n=>n.seqIdx===node.seqIdx-1);
  return prev?((S.mcq[prev.id]?.pct||0)>=60):true;
}

function refreshTopbar(nid){
  const sn=seqNodes();
  const tot=sn.reduce((a,n)=>a+(S.mcq[n.id]?.pct||0),0);
  const pct=sn.length?Math.round(tot/sn.length):0;
  document.getElementById('tb-xp').textContent=S.xp+' XP';
  document.getElementById('tb-pct').textContent=pct+'%';
  if(nid){const n=CHAPTERS.find(c=>c.id===nid);if(n)document.getElementById('tb-title').textContent=n.icon+' '+n.title;}
}

function buildSidebar(){
  const el=document.getElementById('sidebar-inner');
  if(!el)return;
  let h='<div class="nav-item" onclick="showDash()" style="border-left:3px solid transparent"><span class="nav-icon">🏠</span><span class="nav-info"><span class="nav-name">Home</span></span></div>';
  const sn=seqNodes();
  let lastCh='';
  sn.forEach(n=>{
    if(n.chapter!==lastCh){h+=`<div class="ch-label">${n.chapter}</div>`;lastCh=n.chapter;}
    const locked=!isUnlocked(n);
    const pct=S.mcq[n.id]?.pct||0;
    const badge=pct>=60?`<span class="nav-badge">✓${pct}%</span>`:(pct>0?`<span class="nav-badge">${pct}%</span>`:'');
    h+=`<div class="nav-item${locked?' locked':''}" onclick="${locked?'showToast(\"Complete previous node first!\")':'openNode(\"'+n.id+'\")'}">`+
       `<span class="nav-icon">${n.icon}</span>`+
       `<span class="nav-info"><span class="nav-name">${n.title}</span><span class="nav-xp">${n.xp} XP</span></span>${badge}</div>`;
  });
  const gn=goldNode();
  if(gn){
    const gl=isUnlocked(gn);
    h+=`<div class="ch-label">Master Node 🏆</div>`;
    h+=`<div class="nav-item gold-nav${gl?'':' locked'}" onclick="${gl?'openNode(\"'+gn.id+'\")':'showToast(\"Score 80% avg to unlock Master Node!\")'}">`;
    h+=`<span class="nav-icon">🏹</span><span class="nav-info"><span class="nav-name">${gn.title}</span><span class="nav-xp">${gn.xp} XP</span></span></div>`;
  }
  el.innerHTML=h;
}

function openNode(nid){
  const n=CHAPTERS.find(c=>c.id===nid);
  if(!n)return;
  if(!isUnlocked(n)){showToast('🔒 Complete previous nodes first!');return;}
  track('node_open',{node:nid});
  document.getElementById('dash').style.display='none';
  const nc=document.getElementById('node-content');
  nc.style.display='block';
  renderNode(n,'learn');
  buildSidebar();
  refreshTopbar(nid);
  closeDrawer();
}

function renderNode(n,tab){
  const nc=document.getElementById('node-content');
  const isGold=n.type==='gold';
  let h=`<div class="node-header"><div class="node-chapter">${n.chapter}</div>`;
  h+=`<div class="node-title">${n.icon} ${n.title}</div>`;
  h+=`<div class="node-meta">${n.xp} XP · ${isGold?'Master Node':'seqIdx '+(n.seqIdx+1)}</div></div>`;
  if(!isGold){
    h+=`<div class="tabs">`;
    ['learn','flashcards','test'].forEach(t=>{
      const lbl=t==='learn'?'📖 Learn':t==='flashcards'?'⚡ Flashcards':'🎯 Test';
      h+=`<button class="tab-btn${tab===t?' active':''}" onclick="switchTab('${n.id}','${t}')">${lbl}</button>`;
    });
    h+='</div>';
    if(tab==='learn')h+=buildLearnPane(n);
    else if(tab==='flashcards')h+=buildFlashPane(n);
    else h+=buildTestPane(n);
  } else {
    h+=`<div class="tabs">`;
    ['learn','test'].forEach(t=>{
      const lbl=t==='learn'?'🏹 Master Facts':'🎯 Master Test';
      h+=`<button class="tab-btn${tab===t?' active':''}" onclick="switchTab('${n.id}','${t}')">${lbl}</button>`;
    });
    h+='</div>';
    if(tab==='learn')h+=buildGoldPane(n);
    else h+=buildTestPane(n);
  }
  h+='<div id="node-nav-bar"></div>';
  nc.innerHTML=h;
  if(tab==='test'||tab==='learn'){}
}

function switchTab(nid,tab){
  const n=CHAPTERS.find(c=>c.id===nid);
  if(n)renderNode(n,tab);
  track('tab_switch',{node:nid,tab});
}

function buildLearnPane(n){
  let h='';
  if(n.facts?.length){
    h+=`<div class="section-card"><div class="section-title">📌 Key Facts</div><ul class="fact-list">`;
    n.facts.forEach(f=>h+=`<li>${f}</li>`);
    h+=`</ul></div>`;
  }
  if(n.table){h+=`<div class="section-card"><div class="section-title">📊 Reference Table</div>${n.table}</div>`;}
  if(n.mn){h+=`<div class="section-card"><div class="section-title">🧠 Memory Hook</div><div class="mn-box">${n.mn}</div></div>`;}
  if(n.traps?.length){
    h+=`<div class="section-card"><div class="section-title">⚠️ Exam Traps</div><ul class="trap-list">`;
    n.traps.forEach(t=>h+=`<li>${t}</li>`);
    h+=`</ul></div>`;
  }
  if(n.revision?.length){
    h+=`<div class="section-card"><div class="section-title">⚡ Rapid Revision</div><ul class="rev-list">`;
    n.revision.forEach(r=>h+=`<li>${r}</li>`);
    h+=`</ul></div>`;
  }
  if(n.oneliners?.length){
    h+=`<div class="section-card"><div class="section-title">🎯 One-Liners</div><ul class="ol-list">`;
    n.oneliners.forEach(o=>h+=`<li>${o}</li>`);
    h+=`</ul></div>`;
  }
  return h;
}

function buildGoldPane(n){
  let h=`<div class="gold-hero"><h2>🏹 Master Revision</h2><p>High-probability points for exam day</p></div>`;
  if(n.goldFacts?.length){
    h+=`<div class="section-card"><div class="section-title">🌟 Gold Facts</div>`;
    n.goldFacts.forEach(f=>h+=`<div class="gold-fact">${f}</div>`);
    h+=`</div>`;
  }
  if(n.goldTraps?.length){
    h+=`<div class="section-card"><div class="section-title">⚠️ Critical Traps</div><ul class="trap-list">`;
    n.goldTraps.forEach(t=>h+=`<li>${t}</li>`);
    h+=`</ul></div>`;
  }
  return h;
}

function buildFlashPane(n){
  if(!n.flashcards?.length)return '<div class="section-card"><p>No flashcards available.</p></div>';
  let h=`<div class="section-card"><div class="section-title">⚡ Tap to reveal answer</div><div class="flash-grid">`;
  n.flashcards.forEach((fc,i)=>{
    h+=`<div class="flash-card" id="fc${i}" onclick="this.classList.toggle('revealed')">`;
    h+=`<div class="flash-q">${fc.q}</div>`;
    h+=`<div class="flash-a">${fc.a}</div>`;
    h+=`<div class="flash-hint">Tap to reveal</div></div>`;
  });
  h+=`</div></div>`;
  return h;
}

function buildTestPane(n){
  const mcqs=getMcqs(n);
  if(!mcqs.length)return '<div class="section-card"><p>No questions available.</p></div>';
  const done=S.mcq[n.id]?.done;
  const pct=S.mcq[n.id]?.pct||0;
  if(!done){
    return `<div class="section-card"><div class="test-start-box">
      <h3>Ready to test yourself?</h3>
      <p>${mcqs.length} questions · Earn up to ${n.xp} XP<br>Score 60%+ to unlock next node</p>
      <button class="btn-primary" onclick="startTest('${n.id}')">Start Test 🎯</button>
    </div></div>`;
  }
  return `<div class="section-card"><div class="result-box">
    <div class="result-score">${pct}%</div>
    <div class="result-msg">${pct>=60?'✅ Node Unlocked!':'Keep Practicing!'}</div>
    <div class="result-stats">
      <div class="r-stat"><div class="r-stat-val">${S.mcq[n.id]?.correct||0}</div><div class="r-stat-lbl">Correct</div></div>
      <div class="r-stat"><div class="r-stat-val">${S.mcq[n.id]?.total||0}</div><div class="r-stat-lbl">Total</div></div>
      <div class="r-stat"><div class="r-stat-val">${S.xp}</div><div class="r-stat-lbl">Total XP</div></div>
    </div>
    <button class="btn-primary" onclick="startTest('${n.id}')">Retake Test 🔄</button>
  </div></div>`;
}

function getMcqs(n){
  if(n.type==='gold')return n.goldMCQs||[];
  return n.mcqs||[];
}

let CUR={nid:'',qi:0,correct:0,total:0,answers:[]};

function startTest(nid){
  const n=CHAPTERS.find(c=>c.id===nid);
  if(!n)return;
  const mcqs=getMcqs(n);
  CUR={nid,qi:0,correct:0,total:mcqs.length,answers:[]};
  if(!S.faa[nid])S.faa[nid]={};
  track('test_start',{node:nid,prefix:'geo1-'});
  renderQ(n,0);
}

function renderQ(n,qi){
  const mcqs=getMcqs(n);
  if(qi>=mcqs.length){finishAttempt(n);return;}
  const q=mcqs[qi];
  const nc=document.getElementById('node-content');
  let h=`<div class="node-header"><div class="node-chapter">${n.chapter}</div>`;
  h+=`<div class="node-title">${n.icon} ${n.title}</div></div>`;
  h+=`<div class="progress-bar"><div class="progress-fill" style="width:${(qi/mcqs.length*100).toFixed(0)}%"></div></div>`;
  h+=`<div class="q-box">`;
  h+=`<div class="q-counter">Q${qi+1} of ${mcqs.length}</div>`;
  h+=`<div class="q-text">${q.q}</div>`;
  h+=`<div class="opts">`;
  q.opts.forEach((o,i)=>{
    h+=`<button class="opt-btn" id="opt${i}" onclick="chooseOpt('${n.id}',${qi},${i})">${String.fromCharCode(65+i)}. ${o}</button>`;
  });
  h+=`</div><div class="exp-box" id="expbox">${q.exp||''}</div></div>`;
  h+='<div id="node-nav-bar"></div>';
  nc.innerHTML=h;
}

function chooseOpt(nid,qi,chosen){
  const n=CHAPTERS.find(c=>c.id===nid);
  const mcqs=getMcqs(n);
  const q=mcqs[qi];
  const correct=q.ans;
  const isCorrect=chosen===correct;
  if(isCorrect)CUR.correct++;
  if(S.faa[nid]&&S.faa[nid][qi]===undefined)S.faa[nid][qi]=isCorrect?1:0;
  CUR.answers.push({qi,chosen,correct,isCorrect});
  document.querySelectorAll('.opt-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===correct)b.classList.add('correct');
    else if(i===chosen&&!isCorrect)b.classList.add('wrong');
  });
  const eb=document.getElementById('expbox');
  if(eb)eb.classList.add('show');
  track('answer',{node:nid,qi,correct:isCorrect,prefix:'geo1-'});
  setTimeout(()=>{
    if(qi+1>=mcqs.length)finishAttempt(n);
    else renderQ(n,qi+1);
  },1400);
}

function finishAttempt(n){
  const pct=Math.round((CUR.correct/CUR.total)*100);
  const xpEarned=pct>=60?Math.round(n.xp*(pct/100)):0;
  if(!S.mcq[n.id]||pct>(S.mcq[n.id]?.pct||0)){
    S.mcq[n.id]={done:true,pct,correct:CUR.correct,total:CUR.total};
    S.xp+=xpEarned;
    saveS();
  }
  track('test_finish',{node:n.id,pct,xp:xpEarned,prefix:'geo1-'});
  const nc=document.getElementById('node-content');
  let h=`<div class="node-header"><div class="node-chapter">${n.chapter}</div>`;
  h+=`<div class="node-title">${n.icon} ${n.title}</div></div>`;
  h+=`<div class="section-card"><div class="result-box">`;
  h+=`<div class="result-score">${pct}%</div>`;
  h+=`<div class="result-msg">${pct>=60?'✅ Node Unlocked! +'+xpEarned+' XP':'📚 Keep Practicing!'}</div>`;
  h+=`<div class="result-stats">`;
  h+=`<div class="r-stat"><div class="r-stat-val">${CUR.correct}</div><div class="r-stat-lbl">Correct</div></div>`;
  h+=`<div class="r-stat"><div class="r-stat-val">${CUR.total}</div><div class="r-stat-lbl">Total</div></div>`;
  h+=`<div class="r-stat"><div class="r-stat-val">${S.xp}</div><div class="r-stat-lbl">Total XP</div></div>`;
  h+=`</div>`;
  h+=`<button class="btn-primary" onclick="startTest('${n.id}')">Retake 🔄</button> `;
  h+=`<button class="btn-primary outline" onclick="switchTab('${n.id}','learn')" style="margin-top:8px;display:inline-block;background:transparent;border:1px solid var(--line);color:var(--ink2)">Review 📖</button>`;
  h+=`</div></div>`;
  h+='<div id="node-nav-bar"></div>';
  nc.innerHTML=h;
  refreshTopbar(n.id);
  buildSidebar();
  setTimeout(()=>buildNodeNav(n.id),100);
}

function buildNodeNav(nid){
  const bar=document.getElementById('node-nav-bar');
  if(!bar)return;
  const sn=seqNodes();
  const idx=sn.findIndex(n=>n.id===nid);
  let h='';
  if(idx>0)h+=`<button class="nav-arrow" onclick="openNode('${sn[idx-1].id}')">← ${sn[idx-1].title}</button>`;
  h+=`<button class="nav-arrow" onclick="showDash()">🏠 Home</button>`;
  if(idx<sn.length-1&&isUnlocked(sn[idx+1]))h+=`<button class="nav-arrow" onclick="openNode('${sn[idx+1].id}')">${sn[idx+1].title} →</button>`;
  const gn=goldNode();
  if(gn&&isUnlocked(gn))h+=`<button class="nav-arrow" style="color:var(--gold)" onclick="openNode('${gn.id}')">🏹 Master</button>`;
  bar.innerHTML=h;
}

function showDash(){
  document.getElementById('dash').style.display='block';
  document.getElementById('node-content').style.display='none';
  const sn=seqNodes();
  const tot=sn.reduce((a,n)=>a+(S.mcq[n.id]?.pct||0),0);
  const pct=sn.length?Math.round(tot/sn.length):0;
  const done=sn.filter(n=>(S.mcq[n.id]?.pct||0)>=60).length;
  const gn=goldNode();
  let h=`<div class="dash-hero"><h1>🌏 Geography Part 1</h1><p>Universe · Earth · India · Himalayas · Passes</p></div>`;
  h+=`<div class="stats-row">`;
  h+=`<div class="stat-card"><div class="stat-val">${S.xp}</div><div class="stat-lbl">Total XP</div></div>`;
  h+=`<div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-lbl">Avg Score</div></div>`;
  h+=`<div class="stat-card"><div class="stat-val">${done}/${sn.length}</div><div class="stat-lbl">Nodes Done</div></div>`;
  h+=`</div>`;
  const first=sn.find(n=>!S.mcq[n.id]?.done)||sn[0];
  h+=`<button class="dash-btn" onclick="openNode('${first.id}')">▶ Continue Learning</button>`;
  if(gn&&isUnlocked(gn))h+=`<button class="dash-btn" style="background:var(--gold2)" onclick="openNode('${gn.id}')">🏹 Master Node</button>`;
  document.getElementById('dash').innerHTML=h;
  refreshTopbar();
  buildSidebar();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function toggleDrawer(){
  const a=document.getElementById('aside');
  const o=document.getElementById('drawer-overlay');
  const open=a.classList.toggle('open');
  if(o){if(open)o.classList.add('active');else o.classList.remove('active');}
}
function closeDrawer(){
  const a=document.getElementById('aside');
  const o=document.getElementById('drawer-overlay');
  if(a)a.classList.remove('open');
  if(o)o.classList.remove('active');
}

function init(){
  loadS();
  initMetrics();
