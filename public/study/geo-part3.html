<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CentuMania | Geography Part 3</title>
<style>
:root{
  --bg:#030B17;--bg2:#020710;--panel:#071A30;--panel2:#0A2040;--line:#1A3A5C;
  --ink:#D4E0EC;--ink2:#88AACC;--ink3:#4A6888;--gold:#38BDF8;--gold2:#1D4ED8;
  --gold-glow:rgba(56,189,248,.15);--amber:#60A5FA;--gold-bg:rgba(56,189,248,.08);
  --red:#f87171;--red-bg:rgba(248,113,113,.10);--blue:#93C5FD;--green:#4ade80;
  --sidebar-w:260px;--topbar-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
#topbar{height:var(--topbar-h);background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:12px;position:fixed;top:0;left:0;right:0;z-index:100}
#tb-menu{background:none;border:none;color:var(--ink2);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px}
#tb-menu:hover{background:var(--panel2)}
#tb-title{font-weight:700;font-size:15px;color:var(--gold);flex:1}
.tb-stat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--ink2)}
#layout{display:flex;margin-top:var(--topbar-h);height:calc(100vh - var(--topbar-h))}
#sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;flex-shrink:0;transition:transform .3s}
#sidebar-inner{padding:12px 8px 40px}
.ch-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;padding:12px 8px 4px}
.node-btn{width:100%;background:none;border:none;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--ink);text-align:left;transition:.15s;margin-bottom:2px}
.node-btn:hover:not(.locked){background:var(--panel2)}
.node-btn.active{background:var(--gold-bg);border:1px solid var(--gold)}
.node-btn.locked{opacity:.45;cursor:not-allowed}
.node-btn.gold-btn{border:1px solid rgba(56,189,248,.3);background:var(--gold-bg)}
.node-icon{font-size:18px;flex-shrink:0}
.node-info{flex:1;min-width:0}
.node-name{font-size:12px;font-weight:600;display:block}
.node-meta{font-size:10px;color:var(--ink3);display:block}
.node-pct{font-size:11px;font-weight:700;color:var(--green);flex-shrink:0}
.node-lock{font-size:12px;flex-shrink:0}
#main{flex:1;overflow-y:auto;padding:20px}
#dash{display:none}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.dash-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
.dash-card .val{font-size:24px;font-weight:700;color:var(--gold)}
.dash-card .lbl{font-size:11px;color:var(--ink3);margin-top:4px}
.progress-bar-wrap{background:var(--panel2);height:6px;border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:var(--gold);border-radius:3px;transition:.4s}
#node-content{display:none;flex-direction:column;gap:16px}
.node-header{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px}
.node-hicon{font-size:36px}
.node-htitle{font-size:20px;font-weight:700}
.node-hxp{font-size:12px;color:var(--ink3);margin-top:2px}
.tabs{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.tab-btn{flex:1;background:none;border:none;padding:10px;font-size:13px;font-weight:600;color:var(--ink3);cursor:pointer;transition:.15s}
.tab-btn.active{background:var(--gold-bg);color:var(--gold)}
.section-title{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.learn-pane,.gold-node-panel{display:flex;flex-direction:column;gap:16px}
.fact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.fact-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.5}
.tbl-wrap{overflow-x:auto}
.tbl-wrap table,.tbl-wrap th,.tbl-wrap td{border:1px solid var(--line)}
.tbl-wrap table{width:100%;border-collapse:collapse;font-size:12px}
.tbl-wrap th{background:var(--panel2);padding:6px 10px;color:var(--ink2);font-size:11px}
.tbl-wrap td{padding:6px 10px;color:var(--ink)}
.tbl-wrap tr:nth-child(even) td{background:rgba(7,26,48,.4)}
.mn-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.6}
.mn-label{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.trap-list,.rev-list{display:flex;flex-direction:column;gap:6px}
.trap-item{background:var(--red-bg);border:1px solid var(--red);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--red)}
.rev-item{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12px}
.ol-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.ol-item{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px}
.flash-pane{display:flex;flex-direction:column;align-items:center;gap:16px;padding:16px 0}
.flash-card-wrap{perspective:1000px;width:100%;max-width:480px}
.flash-card{width:100%;height:180px;cursor:pointer;transition:transform .5s;transform-style:preserve-3d;position:relative}
.flash-card.flipped{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;align-items:center;justify-content:center;padding:20px;font-size:15px;font-weight:600;text-align:center;line-height:1.5}
.flash-front{background:var(--panel);border:1px solid var(--line);color:var(--ink)}
.flash-back{background:var(--gold-bg);border:1px solid var(--gold);color:var(--gold);transform:rotateY(180deg)}
.flash-hint{font-size:11px;color:var(--ink3)}
.flash-nav{display:flex;gap:12px;align-items:center}
.flash-counter{font-size:12px;color:var(--ink2)}
.flash-nav button{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 14px;color:var(--ink);cursor:pointer;font-size:13px}
.test-pane,.test-start{display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px;text-align:center}
.btn-primary{background:var(--gold2);border:none;border-radius:10px;padding:10px 20px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.btn-primary:hover{filter:brightness(1.15)}
.q-wrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px}
.q-meta{font-size:11px;color:var(--ink3)}
.q-text{font-size:14px;font-weight:600;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 14px;color:var(--ink);font-size:13px;cursor:pointer;text-align:left;transition:.15s}
.opt-btn:not(:disabled):hover{background:var(--gold-bg);border-color:var(--gold)}
.opt-btn.correct{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.exp-box{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:12px;color:var(--ink2)}
.result-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:32px}
.result-score{font-size:56px;font-weight:800;color:var(--gold)}
.result-lbl{font-size:15px;color:var(--ink2)}
.result-msg{font-size:20px;font-weight:700}
.node-nav{display:flex;gap:12px;flex-wrap:wrap}
.nav-btn{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 14px;color:var(--ink2);font-size:12px;cursor:pointer}
.nav-btn:hover{border-color:var(--gold);color:var(--gold)}
#aside{position:fixed;top:var(--topbar-h);right:-280px;width:280px;height:calc(100vh - var(--topbar-h));background:var(--panel);border-left:1px solid var(--line);z-index:200;transition:right .3s;padding:16px;overflow-y:auto}
#aside.open{right:0}
#drawer-overlay{display:none;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.4)}
#drawer-overlay.show{display:block}
#toast{position:fixed;bottom:24px;right:24px;background:var(--gold);color:#000;font-weight:700;padding:10px 16px;border-radius:10px;transform:translateY(80px);opacity:0;transition:.3s;z-index:300}
#toast.show{transform:translateY(0);opacity:1}
@media(max-width:768px){
  #sidebar{position:fixed;top:var(--topbar-h);left:-260px;height:calc(100vh - var(--topbar-h));z-index:200;transition:left .3s}
  #sidebar.open{left:0}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .fact-grid,.ol-grid{grid-template-columns:1fr}
}
</style>
</head>

const CHAPTERS=[
{"id": "world_geography", "chapter": "🌍 World & Physical", "title": "World Geography Basics", "icon": "🌐", "xp": 60, "seqIdx": 0, "facts": ["<b>Continent by Area:</b> Asia > Africa > N.America > S.America > Antarctica > Europe > Australia", "<b>Continent by Population:</b> Asia > Africa > Europe > N.America > S.America > Australia > Antarctica", "<b>Oceans by Area/Volume/Depth:</b> Pacific > Atlantic > Indian > Southern > Arctic", "<b>Largest continent = Asia</b> (44 million km²) | Smallest = Australia", "<b>Mt. Everest = 8,852 m</b> (Nepal-Tibet) = highest peak in world", "<b>K2 (Godwin Austin) = 8,611 m</b> — India (POK); 2nd highest", "<b>Kangchenjunga = 8,586 m</b> — Nepal-India (Sikkim); 3rd highest", "<b>Caspian Sea</b> = world's LARGEST lake (1,200 km); Russia/Iran", "<b>Lake Baikal (Russia)</b> = world's DEEPEST lake (1,642 m); also oldest", "<b>Lake Superior</b> = largest freshwater lake by surface area (Canada/USA)", "<b>Amazon</b> = largest river by volume (S.America) | <b>Nile</b> = longest river", "<b>Radcliffe Line</b> = India–Pakistan | <b>McMahon Line</b> = India–China", "<b>Durand Line</b> = Pakistan–Afghanistan | <b>Maginot Line</b> = Germany–France", "<b>38th Parallel</b> = N.Korea–S.Korea | <b>49th Parallel</b> = USA–Canada", "<b>24th Parallel</b> = India–Pakistan (Gujarat sector)", "<b>Blue Line</b> = Lebanon–Israel | <b>Mannerheim Line</b> = Russia–Finland", "<b>17th Parallel</b> = N.Vietnam–S.Vietnam | <b>Hindenburg Line</b> = Poland–Germany", "<b>Mt. Aconcagua (6,961m)</b> = highest peak in S.America", "<b>Mt. Elbrus (5,642m)</b> = highest peak in Europe", "<b>Volga</b> = largest river in Europe | <b>Murray-Darling</b> = Australia"], "table": "<table><tr><th>Line</th><th>Countries</th></tr><tr><td><b>Radcliffe Line</b></td><td>India – Pakistan</td></tr><tr><td><b>McMahon Line</b></td><td>India – China</td></tr><tr><td><b>Durand Line</b></td><td>Pakistan – Afghanistan</td></tr><tr><td><b>Maginot Line</b></td><td>Germany – France</td></tr><tr><td><b>38th Parallel</b></td><td>N. Korea – S. Korea</td></tr><tr><td><b>49th Parallel</b></td><td>USA – Canada</td></tr><tr><td><b>17th Parallel</b></td><td>N. Vietnam – S. Vietnam</td></tr><tr><td><b>24th Parallel</b></td><td>India – Pakistan (Gujarat)</td></tr><tr><td><b>Blue Line</b></td><td>Lebanon – Israel</td></tr></table>", "mn": "🧠 <b>AA-NAME</b> = Asia, Africa, N.America, A-ntarctica, M-erica(S), Europe, Australia — for continent area order. For Oceans: <b>PAISA</b> = Pacific, Atlantic, Indian, Southern, Arctic.", "traps": ["Amazon = largest by VOLUME; Nile = longest — students confuse these constantly", "Caspian Sea = LAKE (largest lake) NOT a sea — it's landlocked", "Lake Baikal = deepest lake; Lake Superior = largest freshwater BY SURFACE AREA", "McMahon Line = India–China (NOT India–Pakistan; Radcliffe = India–Pakistan)", "38th Parallel = Korea | 49th = USA–Canada — these numbers are frequently switched in exams"], "revision": ["Continents: Area = Asia→Africa→N.Am→S.Am→Antarctica→Europe→Australia", "Oceans: Area/Volume/Depth = Pacific→Atlantic→Indian→Southern→Arctic", "Highest peak = Everest (8,852m, Nepal-Tibet) | 2nd = K2 (8,611m)", "Largest lake = Caspian Sea | Deepest = Baikal | Largest freshwater = Superior", "Radcliffe = India-Pak | McMahon = India-China | Durand = Pak-Afghan", "38th Parallel = Korea | 49th Parallel = USA-Canada | 17th = Vietnam", "Amazon = largest volume | Nile = longest river", "Highest S.America = Aconcagua (6,961m) | Europe = Elbrus (5,642m)"], "oneliners": ["<b>Largest continent = Asia</b> (44 million km²)", "<b>Largest ocean = Pacific</b> (deepest + largest by all measures)", "<b>Everest = 8,852 m</b> — Nepal-Tibet border", "<b>K2 = India's 2nd highest</b> (POK, 8,611m)", "<b>Caspian Sea</b> = world's largest lake", "<b>Baikal</b> = world's deepest lake (1,642m)", "<b>Lake Superior</b> = largest freshwater lake area", "<b>Nile</b> = longest river | <b>Amazon</b> = largest by volume", "<b>Radcliffe Line = India-Pakistan</b>", "<b>McMahon Line = India-China</b>", "<b>Durand Line = Pak-Afghanistan</b>", "<b>38th Parallel = Korea divide</b>", "<b>49th Parallel = USA-Canada</b>", "<b>Hindenburg Line = Poland-Germany</b>", "<b>Elbrus (5,642m) = Europe's highest</b>", "<b>Aconcagua (6,961m) = S.America highest</b>", "<b>Murray-Darling = Australia's largest river</b>", "<b>Volga = Europe's longest river</b>", "<b>Mannerheim Line = Russia-Finland</b>", "<b>17th Parallel = Vietnam divide</b>"], "flashcards": [{"q": "Which is the world's largest lake?", "a": "Caspian Sea (Russia/Iran) — 1,200 km long, landlocked"}, {"q": "What is the deepest lake in the world?", "a": "Lake Baikal, Russia — 1,642 m deep, oldest lake too"}, {"q": "McMahon Line separates which two countries?", "a": "India and China (drawn in 1914 Simla Convention)"}, {"q": "38th Parallel divides which countries?", "a": "North Korea and South Korea"}, {"q": "49th Parallel is the border between which countries?", "a": "USA and Canada"}, {"q": "What is the highest peak in South America?", "a": "Mt. Aconcagua — 6,961 m"}, {"q": "Nile vs Amazon — which is longer and which has more water?", "a": "Nile = longer river | Amazon = largest by volume/discharge"}, {"q": "Radcliffe Line vs Durand Line?", "a": "Radcliffe = India–Pakistan | Durand = Pakistan–Afghanistan"}, {"q": "Which ocean is largest, deepest, and has most volume?", "a": "Pacific Ocean — largest in all three parameters"}, {"q": "What is the continent order by area?", "a": "Asia > Africa > N.America > S.America > Antarctica > Europe > Australia"}], "mcqs": [{"q": "Which is the world's DEEPEST lake?", "opts": ["Caspian Sea", "Lake Superior", "Lake Baikal", "Lake Victoria"], "ans": 2, "exp": "Lake Baikal (Russia) = 1,642 m deep = world's deepest AND oldest lake. Caspian = world's largest."}, {"q": "The McMahon Line is the boundary between:", "opts": ["India and Pakistan", "India and China", "Pakistan and Afghanistan", "India and Bangladesh"], "ans": 1, "exp": "McMahon Line = India–China boundary (drawn 1914). Radcliffe = India–Pakistan."}, {"q": "38th Parallel divides:", "opts": ["USA and Canada", "North and South Vietnam", "North and South Korea", "Germany and France"], "ans": 2, "exp": "38th Parallel = North Korea – South Korea. 49th Parallel = USA–Canada. 17th = Vietnam divide."}, {"q": "The largest ocean by area, volume AND depth is:", "opts": ["Atlantic", "Indian", "Arctic", "Pacific"], "ans": 3, "exp": "Pacific Ocean = largest by area, volume, and deepest point (Mariana Trench = 11,022 m)."}, {"q": "Which line separates Pakistan from Afghanistan?", "opts": ["Radcliffe Line", "McMahon Line", "Durand Line", "Maginot Line"], "ans": 2, "exp": "Durand Line = Pakistan–Afghanistan. Drawn by Sir Mortimer Durand in 1893."}, {"q": "The highest peak in South America is:", "opts": ["Mt. McKinley", "Mt. Elbrus", "Mt. Aconcagua", "Mt. Kilimanjaro"], "ans": 2, "exp": "Mt. Aconcagua (6,961 m) = highest in S.America (Argentina). McKinley = N.America. Elbrus = Europe."}, {"q": "Which is the largest freshwater lake by surface area?", "opts": ["Lake Baikal", "Lake Caspian", "Lake Victoria", "Lake Superior"], "ans": 3, "exp": "Lake Superior = largest freshwater lake by SURFACE AREA (Canada/USA). Baikal = deepest."}, {"q": "Continent order by POPULATION (1st to 3rd):", "opts": ["Asia, Africa, Europe", "Asia, Europe, Africa", "Africa, Asia, Europe", "Europe, Asia, Africa"], "ans": 0, "exp": "Population: Asia (4.7B) > Africa (1.4B) > Europe (750M) > N.America > S.America > Australia."}, {"q": "The Amazon River is famous for:", "opts": ["Being the longest river", "Having the largest volume/discharge", "Being the widest river", "Starting in Peru only"], "ans": 1, "exp": "Amazon = largest by VOLUME (discharge). Nile = longest river in the world."}, {"q": "Maginot Line separated:", "opts": ["India and Pakistan", "USA and Canada", "Germany and France", "Russia and Finland"], "ans": 2, "exp": "Maginot Line = France–Germany defensive line (WW2). Mannerheim Line = Russ // ─── ENGINE ───────────────────────────────────────────────────────────────────
function seqNodes(){return CHAPTERS.filter(n=>n.type!=='gold')}
function goldNode(){return CHAPTERS.find(n=>n.type==='gold')}

function isUnlocked(n){
  if(n.seqIdx===0)return true;
  if(n.type==='gold'){
    const ns=seqNodes(),tot=ns.length;
    if(tot===0)return false;
    const avg=ns.reduce((s,x)=>s+(state.scores[x.id]||0),0)/tot;
    return avg>=n.requires_pct;
  }
  const prev=seqNodes().find(x=>x.seqIdx===n.seqIdx-1);
  return prev?(state.scores[prev.id]||0)>=60:false;
}

function refreshTopbar(){
  const ns=seqNodes(),tot=ns.length;
  const avg=tot?Math.round(ns.reduce((s,x)=>s+(state.scores[x.id]||0),0)/tot):0;
  document.getElementById('tb-xp').textContent='⚡ '+state.xp+' XP';
  document.getElementById('tb-pct').textContent='📊 '+avg+'%';
}

function buildSidebar(){
  const si=document.getElementById('sidebar-inner');
  si.innerHTML='';
  let lastCh='';
  CHAPTERS.forEach(n=>{
    if(n.chapter!==lastCh){
      lastCh=n.chapter;
      const lbl=document.createElement('div');
      lbl.className='ch-label';lbl.textContent=n.chapter;si.appendChild(lbl);
    }
    const btn=document.createElement('button');
    btn.className='node-btn'+(n.type==='gold'?' gold-btn':'');
    const locked=!isUnlocked(n);
    if(locked)btn.classList.add('locked');
    const sc=state.scores[n.id]||0;
    btn.innerHTML=`<span class="node-icon">${n.icon}</span>
      <span class="node-info"><span class="node-name">${n.title}</span>
      <span class="node-meta">${n.xp} XP</span></span>
      ${sc>0?`<span class="node-pct">${sc}%</span>`:''}
      ${locked?'<span class="node-lock">🔒</span>':''}`;
    btn.id='btn-geo3-'+n.id;
    if(!locked)btn.onclick=()=>openNode(n.id);
    si.appendChild(btn);
  });
}

let currentNodeId=null;
function openNode(id){
  const n=CHAPTERS.find(x=>x.id===id);
  if(!n||!isUnlocked(n))return;
  currentNodeId=id;
  document.querySelectorAll('.node-btn').forEach(b=>b.classList.remove('active'));
  const ab=document.getElementById('btn-geo3-'+id);
  if(ab)ab.classList.add('active');
  document.getElementById('dash').style.display='none';
  const nc=document.getElementById('node-content');
  nc.style.display='flex';nc.style.flexDirection='column';nc.style.gap='16px';
  nc.innerHTML='';
  const hdr=document.createElement('div');hdr.className='node-header';
  hdr.innerHTML=`<span class="node-hicon">${n.icon}</span>
    <div><div class="node-htitle">${n.title}</div>
    <div class="node-hxp">⚡ ${n.xp} XP${n.type==='gold'?' · 🏹 Golden Node':''}</div></div>`;
  nc.appendChild(hdr);
  if(n.type==='gold'){renderNode(n,nc,'gold');}
  else{
    const tabs=document.createElement('div');tabs.className='tabs';
    ['LEARN','FLASHCARDS','TEST'].forEach((t,i)=>{
      const b=document.createElement('button');b.className='tab-btn'+(i===0?' active':'');
      b.textContent=t;b.id='tab-geo3-'+i;b.onclick=()=>switchTab(n,i);tabs.appendChild(b);
    });
    nc.appendChild(tabs);
    const pane=document.createElement('div');pane.id='tab-pane-geo3';nc.appendChild(pane);
    renderNode(n,pane,'learn');
  }
  buildNodeNav(n,nc);
}

function renderNode(n,container,mode){
  container.innerHTML=mode==='gold'?buildGoldPane(n):
    mode==='flash'?buildFlashPane(n):
    mode==='test'?buildTestPane(n):buildLearnPane(n);
  if(mode==='flash')initFlash(n);
  if(mode==='test')initTest(n);
}

function switchTab(n,idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const pane=document.getElementById('tab-pane-geo3');
  const mode=['learn','flash','test'][idx];
  renderNode(n,pane,mode);
}

function buildLearnPane(n){
  let h=`<div class="learn-pane">`;
  h+=`<div class="section-title">📚 Key Facts</div><div class="fact-grid">`;
  (n.facts||[]).forEach(f=>{h+=`<div class="fact-card">${f}</div>`;});
  h+=`</div>`;
  if(n.table)h+=`<div class="section-title">📊 Table</div><div class="tbl-wrap">${n.table}</div>`;
  if(n.mn)h+=`<div class="section-title">🧠 Mnemonic</div><div class="mn-box"><div class="mn-label">Memory Hook</div>${n.mn}</div>`;
  h+=`<div class="section-title">⚠️ Exam Traps</div><div class="trap-list">`;
  (n.traps||[]).forEach(t=>{h+=`<div class="trap-item">${t}</div>`;});
  h+=`</div><div class="section-title">⚡ Rapid Revision</div><div class="rev-list">`;
  (n.revision||[]).forEach(r=>{h+=`<div class="rev-item">${r}</div>`;});
  h+=`</div><div class="section-title">💡 One-Liners</div><div class="ol-grid">`;
  (n.oneliners||[]).forEach(o=>{h+=`<div class="ol-item">${o}</div>`;});
  h+=`</div></div>`;
  return h;
}

function buildGoldPane(n){
  let h=`<div class="gold-node-panel">`;
  h+=`<div class="section-title">🏅 Master Facts</div><div class="fact-grid">`;
  (n.goldFacts||[]).forEach(f=>{h+=`<div class="fact-card">${f}</div>`;});
  h+=`</div><div class="section-title">⚠️ Critical Traps</div><div class="trap-list">`;
  (n.goldTraps||[]).forEach(t=>{h+=`<div class="trap-item">${t}</div>`;});
  h+=`</div>`;
  h+=`<div class="section-title" style="margin-top:16px">🎯 Final Test (${(n.goldMCQs||[]).length} Questions)</div>`;
  h+=`<div class="test-start"><h3>Golden Node Challenge</h3><p>Test your mastery — 15 high-difficulty questions</p>
    <button class="btn-primary" onclick="startTest('gold')">Start Challenge ⚔️</button></div>`;
  h+=`</div>`;
  return h;
}

function buildFlashPane(n){
  const fc=n.flashcards||[];
  return `<div class="flash-pane">
    <div class="flash-card-wrap">
      <div class="flash-card" id="fc-card" onclick="flipCard()">
        <div class="flash-front" id="fc-front">${fc[0]?fc[0].q:'No cards'}</div>
        <div class="flash-back" id="fc-back">${fc[0]?fc[0].a:''}</div>
      </div>
    </div>
    <div class="flash-hint">Tap card to flip</div>
    <div class="flash-nav">
      <button onclick="prevCard()">← Prev</button>
      <span class="flash-counter" id="fc-counter">1 / ${fc.length}</span>
      <button onclick="nextCard()">Next →</button>
    </div>
  </div>`;
}

let fcIdx=0;
function initFlash(n){fcIdx=0;}
function flipCard(){document.getElementById('fc-card').classList.toggle('flipped');}
function nextCard(){
  const n=CHAPTERS.find(x=>x.id===currentNodeId);
  const fc=n.flashcards||[];
  fcIdx=(fcIdx+1)%fc.length;
  updateCard(fc);
}
function prevCard(){
  const n=CHAPTERS.find(x=>x.id===currentNodeId);
  const fc=n.flashcards||[];
  fcIdx=(fcIdx-1+fc.length)%fc.length;
  updateCard(fc);
}
function updateCard(fc){
  const card=document.getElementById('fc-card');
  card.classList.remove('flipped');
  setTimeout(()=>{
    document.getElementById('fc-front').innerHTML=fc[fcIdx].q;
    document.getElementById('fc-back').innerHTML=fc[fcIdx].a;
    document.getElementById('fc-counter').textContent=(fcIdx+1)+' / '+fc.length;
  },200);
}

function buildTestPane(n){
  return `<div class="test-pane">
    <div class="test-start">
      <h3>📝 Knowledge Test</h3>
      <p>${(n.mcqs||[]).length} questions · Earn ${n.xp} XP on 60%+</p>
      <button class="btn-primary" onclick="startTest('node')">Start Test 🚀</button>
    </div>
  </div>`;
}

let testQ=[],testIdx=0,testScore=0,testMode='';
function getMcqs(mode){
  const n=CHAPTERS.find(x=>x.id===currentNodeId);
  if(!n)return[];
  return mode==='gold'?(n.goldMCQs||[]):(n.mcqs||[]);
}
function startTest(mode){
  testMode=mode;testIdx=0;testScore=0;
  testQ=getMcqs(mode).slice();
  const container=mode==='gold'?document.querySelector('.gold-node-panel'):document.getElementById('tab-pane-geo3');
  if(container)renderQ(container);
}
function renderQ(container){
  if(testIdx>=testQ.length){finishAttempt(container);return;}
  const q=testQ[testIdx];
  let h=`<div class="q-wrap"><div class="q-meta">Q${testIdx+1} of ${testQ.length}</div>
    <div class="q-text">${q.q}</div><div class="opts">`;
  q.opts.forEach((o,i)=>{h+=`<button class="opt-btn" onclick="chooseOpt(this,${i},${q.ans},'${container.id||'gp'}')">${o}</button>`;});
  h+=`</div></div>`;
  container.innerHTML=h;
}
function chooseOpt(btn,chosen,correct,cid){
  const container=document.getElementById(cid)||document.querySelector('.gold-node-panel')||document.getElementById('tab-pane-geo3');
  container.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(chosen===correct){btn.classList.add('correct');testScore++;}
  else{btn.classList.add('wrong');container.querySelectorAll('.opt-btn')[correct].classList.add('correct');}
  const q=testQ[testIdx];
  if(q.exp){const e=document.createElement('div');e.className='exp-box';e.textContent=q.exp;btn.parentElement.after(e);}
  const nb=document.createElement('button');nb.className='btn-primary';nb.style.marginTop='12px';
  nb.textContent=testIdx+1<testQ.length?'Next →':'See Results';
  nb.onclick=()=>{testIdx++;renderQ(container);};
  container.querySelector('.q-wrap').appendChild(nb);
}
function finishAttempt(container){
  const n=CHAPTERS.find(x=>x.id===currentNodeId);
  if(!n)return;
  const total=testQ.length,pct=Math.round((testScore/total)*100);
  const isGold=testMode==='gold';
  if(!isGold){
    if(pct>=(state.scores[n.id]||0)){state.scores[n.id]=pct;}
    if(pct>=60){state.xp+=n.xp;showToast('🎉 +'+n.xp+' XP earned!');}
    save();refreshTopbar();buildSidebar();
  }else{
    state.xp+=200;showToast('🏆 Golden Node Complete! +200 XP');
    save();refreshTopbar();buildSidebar();
  }
  container.innerHTML=`<div class="result-wrap">
    <div class="result-score">${pct}%</div>
    <div class="result-lbl">${testScore} / ${total} correct</div>
    <div class="result-msg">${pct>=80?'🔥 Excellent!':pct>=60?'✅ Passed!':'📖 Keep Revising'}</div>
    <button class="btn-primary" onclick="openNode('${n.id}')">Review Node</button>
  </div>`;
}

function buildNodeNav(n,container){
  const sn=seqNodes();
  const idx=sn.findIndex(x=>x.id===n.id);
  const prev=idx>0?sn[idx-1]:null;
  const next=idx<sn.length-1?sn[idx+1]:null;
  const gn=goldNode();
  const nav=document.createElement('div');nav.className='node-nav';
  if(prev)nav.innerHTML+=`<button class="nav-btn" onclick="openNode('${prev.id}')">← ${prev.title}</button>`;
  if(next&&isUnlocked(next))nav.innerHTML+=`<button class="nav-btn" onclick="openNode('${next.id}')">Next: ${next.title} →</button>`;
  if(!next&&gn&&isUnlocked(gn))nav.innerHTML+=`<button class="nav-btn" style="color:var(--gold)" onclick="openNode('${gn.id}')">🏹 Golden Node →</button>`;
  if(nav.innerHTML)container.appendChild(nav);
}

function showDash(){
  document.getElementById('dash').style.display='block';
  document.getElementById('node-content').style.display='none';
  document.querySelectorAll('.node-btn').forEach(b=>b.classList.remove('active'));
  const ns=seqNodes(),tot=ns.length;
  const avg=tot?Math.round(ns.reduce((s,x)=>s+(state.scores[x.id]||0),0)/tot):0;
  const done=ns.filter(x=>(state.scores[x.id]||0)>=60).length;
  document.getElementById('dash').innerHTML=`
    <div class="dash-grid">
      <div class="dash-card"><div class="val">${state.xp}</div><div class="lbl">Total XP</div></div>
      <div class="dash-card"><div class="val">${avg}%</div><div class="lbl">Avg Score</div></div>
      <div class="dash-card"><div class="val">${done}/${tot}</div><div class="lbl">Nodes Passed</div></div>
      <div class="dash-card"><div class="val">${Math.round((done/tot)*100)||0}%</div><div class="lbl">Completion</div></div>
    </div>
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px">
      <div class="section-title" style="margin-bottom:12px">Node Progress</div>
      ${ns.map(n=>`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span>${n.icon} ${n.title}</span><span style="color:var(--gold)">${state.scores[n.id]||0}%</span>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${state.scores[n.id]||0}%"></div></div>
      </div>`).join('')}
    </div>`;
}

function showToast(msg,dur=2500){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function toggleDrawer(){
  const a=document.getElementById('aside');
  const o=document.getElementById('drawer-overlay');
  a.classList.toggle('open');o.classList.toggle('show');
  if(a.classList.contains('open')){
    const dn=document.getElementById('drawer-nodes');
    dn.innerHTML=CHAPTERS.map(n=>`<div style="padding:6px 10px;background:var(--panel2);border-radius:6px;font-size:12px;color:${isUnlocked(n)?'var(--ink)':'var(--ink3)'}">
      ${n.icon} ${n.title} ${(state.scores[n.id]||0)>0?'· '+state.scores[n.id]+'%':''}</div>`).join('');
  }
}
function closeDrawer(){
  document.getElementById('aside').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
}

function initTest(n){}

let _mToken=null,_mSid=null;
function initMetrics(){
  try{
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  }catch(e){}
  _mSid='geo3-'+(Date.now().toString(36));
}
function track(event,data={}){
  try{
    const key='cm_metrics_geo3';
    let m=JSON.parse(localStorage.getItem(key)||'{"events":[]}');
    m.events.push({event,data,ts:Date.now()});
    if(m.events.length>200)m.events=m.events.slice(-200);
    localStorage.setItem(key,JSON.stringify(m));
  }catch(e){}
  if(_mToken){fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},body:JSON.stringify({event_name:event,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:data})}).catch(()=>{});}
}

function init(){
  buildSidebar();refreshTopbar();showDash();
  document.getElementById('tb-title').textContent='🌍 Geography Part 3';
  initMetrics();
  track('material_opened',{material:'geography_part3'});
  track('session_start');
}
document.addEventListener('DOMContentLoaded',init);
window.addEventListener('beforeunload',()=>track('session_end'));
</script>
