 founded by Raja Ram Mohan Roy in:", "opts": ["1815", "1821", "1828", "1833"], "ans": 2, "exp": "Brahmo Sabha was founded in 1828. RRR had earlier founded Atmiya Sabha in 1815."}, {"q": "Which was Raja Ram Mohan Roy's Persian newspaper?", "opts": ["Sambad Kaumudi", "Mirat-ul-Akbar", "Kesari", "Bengal Gazette"], "ans": 1, "exp": "Mirat-ul-Akbar (1822) was RRR's Persian newspaper — the first Persian newspaper in India. Sambad Kaumudi (1821) was his Bengali newspaper."}, {"q": "Wood's Educational Dispatch (1854) is called:", "opts": ["Magna Carta of Indian Education", "Magna Carta of English Education in India", "Morning without Sun", "Liberator of Press"], "ans": 1, "exp": "Wood's Dispatch is called 'Magna Carta of English Education in India' — it recommended English for higher education and led to founding of 3 universities."}, {"q": "How many universities were established as a result of Wood's Dispatch (1854)?", "opts": ["1", "2", "3", "5"], "ans": 2, "exp": "3 universities were established in 1857: Bombay, Calcutta, and Madras — all inspired by Wood's Dispatch 1854."}, {"q": "Sati was abolished in 1829 by:", "opts": ["Raja Ram Mohan Roy", "Lord Cornwallis", "Lord William Bentinck", "Lord Dalhousie"], "ans": 2, "exp": "Sati was abolished by Lord William Bentinck through Bengal Sati Regulation 1829 — Raja Ram Mohan Roy had lobbied strongly for this reform."}, {"q": "Raja Ram Mohan Roy is called 'Father of':", "opts": ["Indian Nationalism", "Indian Renaissance", "Indian Independence Movement", "Indian Socialism"], "ans": 1, "exp": "RRR is called Father of Indian Renaissance (also Father of Modern India and Father of Bengali Prose)."}, {"q": "RRR's first organization (before Brahmo Sabha) was:", "opts": ["Theosophical Society", "Prarthana Samaj", "Atmiya Sabha", "Arya Samaj"], "ans": 2, "exp": "Atmiya Sabha (1815) was RRR's first organization, predecessor to Brahmo Sabha (1828)."}, {"q": "Wood's Dispatch was sent by:", "opts": ["Lord William Bentinck", "Thomas Babington Macaulay", "Charles Wood", "Lord Dalhousie"], "ans": 2, "exp": "Charles Wood (President of Board of Control) sent the Educational Dispatch in 1854."}, {"q": "Raja Ram Mohan Roy died in:", "opts": ["Calcutta", "London", "Bristol", "Bengal"], "ans": 2, "exp": "RRR died in Bristol, England in 1833 — he had gone to England in 1831 to represent Mughal Emperor Akbar II's cause."}, {"q": "Downward Filtration Theory was associated with:", "opts": ["Ram Mohan Roy", "Macaulay's approach to Indian education", "Wood's Dispatch", "Gokhale's education policy"], "ans": 1, "exp": "Downward Filtration Theory = educate elite Indians in English; knowledge will filter down to masses — associated with Macaulay's approach."}, {"q": "Wood's Dispatch recommended which level of education in vernacular languages?", "opts": ["Higher education", "University level", "Lower/primary level", "All levels"], "ans": 2, "exp": "Wood's Dispatch (1854) recommended English for higher education but vernacular languages for lower/primary education levels."}, {"q": "The 3 universities established in 1857 were in:", "opts": ["Bombay, Madras, Delhi", "Calcutta, Bombay, Madras", "Calcutta, Madras, Lahore", "Bombay, Delhi, Calcutta"], "ans": 1, "exp": "Calcutta, Bombay, and Madras universities were established in 1857 as a result of Wood's Educational Dispatch (1854)."}, {"q": "RRR wrote 'Tuhfat-ul-Muwahhidin' (1804) which attacked:", "opts": ["British colonial rule", "Polytheism and idol worship", "Sati practice", "English education"], "ans": 1, "exp": "Tuhfat-ul-Muwahhidin (Gift to Monotheists, 1804) was RRR's work attacking polytheism and idol worship."}, {"q": "Lord Bentinck also abolished which practice in 1830?", "opts": ["Child marriage", "Devadasi system", "Thuggee (Thagi)", "Purdah"], "ans": 2, "exp": "Lord Bentinck abolished Thuggee (Thagi — ritual killing by Thugs) in 1830, and also abolished female infanticide."}]},
{"id": "princely_states_partition", "label": "Princely States Integration & Partition", "icon": "🗺️", "xp": 60, "seqIdx": 5, "facts": ["<b>562 Princely States</b> at time of independence; most signed Instrument of Accession voluntarily.", "<b>Sardar Vallabhbhai Patel</b> = Iron Man of India; masterminded integration of princely states as Deputy PM + Home Minister; called 'Bismarck of India'.", "<b>VP Menon</b> (V.P. Menon — Vapal Pangunni Menon) = Secretary, Ministry of States; actual executor who drafted Instrument of Accession and negotiated with rulers.", "<b>Instrument of Accession</b>: Legal document states signed to join India; 3 subjects = Defence, External Affairs, Communications.", "<b>Hyderabad</b>: Nizam Mir Osman Ali Khan wanted independence; Patel used <b>Police Action / Operation Polo</b>; launched <b>13 September 1948</b>; lasted <b>4 days</b>; Hyderabad merged 17 September 1948; Commander = <b>Major General JN Chaudhury</b>.", "<b>Junagadh</b>: Muslim ruler (Nawab Muhammad Mahabat Khan III) declared accession to Pakistan despite Hindu majority; <b>plebiscite held</b> → voted to join India (November 1947).", "<b>Kashmir</b>: Hindu ruler <b>Maharaja Hari Singh</b>; Muslim majority state; Pakistani tribal raiders (backed by Pakistan army) attacked Kashmir; Hari Singh appealed to India; signed Instrument of Accession on <b>26 October 1947</b>; First Kashmir War 1947-48; UN ceasefire 1 January 1949.", "Sheikh Abdullah = 'Lion of Kashmir'; led National Conference; supported accession to India.", "<b>Travancore</b>: Initially declared independence ('American model'); CP Ramaswami Iyer, Dewan; agreed to join India after public pressure.", "Bhopal: Nawab Hamidullah Khan (Muslim) delayed accession; eventually signed.", "Mysore, Jodhpur, Jaisalmer: Signed relatively peacefully.", "<b>Manipur and Tripura</b>: Initially wanted independence; merged 1949.", "Patel's role: Used combination of persuasion, threats, and force; managed 560+ states in just <b>one year</b>; called 'miracle of history.'", "VP Menon drafted the uniform Instrument of Accession; Patel persuaded rulers with generous privy purses.", "Privy Purse: Annual payment to rulers after accession; abolished by Indira Gandhi via 26th Constitutional Amendment 1971."], "table": "<table><thead><tr><th>State</th><th>Key Factor</th><th>Resolution</th></tr></thead><tbody><tr><td>Hyderabad</td><td>Nizam wanted independence; Muslim ruler, Hindu majority</td><td>Operation Polo Sept 1948; 4 days; Maj Gen JN Chaudhury</td></tr><tr><td>Junagadh</td><td>Muslim ruler declared accession to Pakistan (Hindu majority)</td><td>Plebiscite Nov 1947 → joined India</td></tr><tr><td>Kashmir</td><td>Hindu ruler Hari Singh; Muslim majority; Pakistani raiders</td><td>Accession 26 Oct 1947; First Kashmir War; UN ceasefire 1 Jan 1949</td></tr><tr><td>Travancore</td><td>Initially declared independence</td><td>Public pressure → joined India</td></tr><tr><td>Manipur</td><td>Initially independent</td><td>Merged 1949</td></tr></tbody></table>", "mn": "<b>HJK = Integration Hotspots:</b><br>🗺️ <b>H</b>yderabad → Operation Polo (police action, 13-17 Sept 1948, 4 days, JN Chaudhury)<br><b>J</b>unagadh → Plebiscite (Muslim ruler wanted Pakistan; Hindu majority voted India)<br><b>K</b>ashmir → Hari Singh's Instrument of Accession 26 Oct 1947 after tribal raiders attacked", "traps": ["⚠️ Operation Polo (Hyderabad) started 13 September 1948 — NOT in 1947!", "⚠️ Hyderabad took 4 days to integrate (13-17 Sept 1948) — NOT months!", "⚠️ Junagadh = Muslim RULER wanted Pakistan; people VOTED for India (plebiscite)!", "⚠️ Kashmir = HINDU ruler Hari Singh; MUSLIM majority — opposite of Junagadh!", "⚠️ VP Menon (NOT Patel) was Secretary of Ministry of States who drafted Instrument of Accession!", "⚠️ Patel is called 'Iron Man of India' AND 'Bismarck of India' — Nehru is NOT 'Iron Man'!"], "revision": ["562 Princely States integrated; Patel = Iron Man + Bismarck of India", "VP Menon drafted Instrument of Accession; 3 subjects = Defence, External Affairs, Communications", "Hyderabad: Operation Polo 13-17 Sept 1948; 4 days; Maj Gen JN Chaudhury", "Junagadh: Muslim ruler → Pakistan; plebiscite → India (Nov 1947)", "Kashmir: Hari Singh (Hindu ruler); signed 26 Oct 1947; Pakistani raiders; UN ceasefire 1 Jan 1949", "Travancore: Initially declared independence; joined under pressure", "Privy Purse abolished by Indira Gandhi 26th Amendment 1971", "Sheikh Abdullah 'Lion of Kashmir'; National Conference; pro-India"], "oneliners": ["562 Princely States at independence", "Sardar Patel = Iron Man of India + Bismarck of India", "VP Menon = Secretary, Ministry of States; drafted Instrument of Accession", "Instrument of Accession: Defence + External Affairs + Communications", "Hyderabad = Operation Polo; started 13 Sept 1948; 4 days; Maj Gen JN Chaudhury", "Nizam Mir Osman Ali Khan = ruler of Hyderabad (wanted independence)", "Junagadh: Muslim ruler declared Pakistan accession; plebiscite chose India", "Kashmir: Hindu ruler Hari Singh; Muslim majority; Pakistani raiders 1947", "Hari Singh signed Instrument of Accession on 26 October 1947", "First Kashmir War 1947-48; UN ceasefire 1 January 1949", "Sheikh Abdullah 'Lion of Kashmir'; supported India", "Travancore initially declared independence; CP Ramaswami Iyer = Dewan", "Privy Purse abolished by 26th Constitutional Amendment 1971 (Indira Gandhi)", "Operation Polo = 'Police Action' — Patel's term for Hyderabad military action", "Manipur and Tripura merged 1949", "Patel integrated 560+ states in just ONE year — called 'miracle of history'", "Bhopal: Nawab Hamidullah Khan eventually signed Instrument of Accession", "Patel also integrated French territories (Pondicherry 1954) and Goa (1961 — Nehru's time)", "Jawaharlal Nehru took Kashmir issue to UN — still contentious", "Major General JN Chaudhury commanded Operation Polo (Hyderabad 1948)"], "flashcards": [{"q": "Operation Polo — what, when, where, who?", "a": "Military action to integrate Hyderabad; launched 13 September 1948; lasted 4 days; Hyderabad merged 17 September 1948; commanded by Major General JN Chaudhury"}, {"q": "What was unique about the Junagadh integration?", "a": "Muslim ruler (Nawab) declared accession to Pakistan despite Hindu majority — plebiscite held November 1947 → people voted overwhelmingly for India"}, {"q": "Kashmir's accession — key facts?", "a": "Hindu Maharaja Hari Singh; Muslim majority state; Pakistani tribal raiders attacked Oct 1947; Hari Singh signed Instrument of Accession on 26 October 1947; First Kashmir War 1947-48; UN ceasefire 1 January 1949"}, {"q": "What 3 subjects were covered by the Instrument of Accession?", "a": "Defence, External Affairs, and Communications — states retained control over everything else"}, {"q": "Who was VP Menon and what was his role?", "a": "Vapal Pangunni Menon — Secretary, Ministry of States; worked closely with Sardar Patel; drafted the uniform Instrument of Accession and personally negotiated with many rulers"}, {"q": "Why is Sardar Patel called 'Bismarck of India'?", "a": "Otto von Bismarck unified Germany in the 19th century; Patel unified India by integrating 562 princely states into the Indian Union — earning him the same title"}, {"q": "What was the Privy Purse and when was it abolished?", "a": "Annual payment to former rulers in exchange for their accession — abolished by Indira Gandhi's government through the 26th Constitutional Amendment 1971"}, {"q": "Who was Sheikh Abdullah and what was his significance?", "a": "'Lion of Kashmir' — led the National Conference; was a Muslim who supported accession to India; became first PM of J&K"}, {"q": "How long did it take Patel to integrate 562 princely states?", "a": "Just ONE year — called 'miracle of history'; used persuasion, privy purses, and force where necessary (Hyderabad)"}, {"q": "Travancore's integration — key facts?", "a": "Initially declared independence under Dewan CP Ramaswami Iyer (the 'American model'); public pressure and political developments forced it to join India"}], "mcqs": [{"q": "Operation Polo (1948) was the military action to integrate:", "opts": ["Junagadh", "Kashmir", "Hyderabad", "Travancore"], "ans": 2, "exp": "Operation Polo was the military action ('Police Action') to integrate Hyderabad, launched on 13 September 1948."}, {"q": "Operation Polo lasted:", "opts": ["1 day", "4 days", "10 days", "1 month"], "ans": 1, "exp": "Operation Polo lasted exactly 4 days (13-17 September 1948), and Hyderabad was integrated on 17 September 1948."}, {"q": "Junagadh was integrated through:", "opts": ["Military action like Hyderabad", "Instrument of Accession signed peacefully", "Plebiscite in November 1947", "United Nations intervention"], "ans": 2, "exp": "Junagadh was integrated through a plebiscite held in November 1947, where the Hindu majority voted to join India despite the Muslim ruler's declaration to accede to Pakistan."}, {"q": "Maharaja Hari Singh signed the Instrument of Accession on:", "opts": ["15 August 1947", "1 October 1947", "26 October 1947", "1 January 1948"], "ans": 2, "exp": "Maharaja Hari Singh signed the Instrument of Accession on 26 October 1947, after Pakistani tribal raiders attacked Kashmir."}, {"q": "The Instrument of Accession covered which 3 subjects?", "opts": ["Finance, Police, Justice", "Defence, External Affairs, Communications", "Defence, Finance, Communications", "External Affairs, Police, Finance"], "ans": 1, "exp": "The Instrument of Accession covered Defence, External Affairs, and Communications — the 3 core subjects for joining the Indian Union."}, {"q": "VP Menon's role in integration of princely states was:", "opts": ["He was Deputy Prime Minister", "He drafted the Instrument of Accession and negotiated with rulers", "He commanded the military action at Hyderabad", "He was the Foreign Secretary for the process"], "ans": 1, "exp": "VP Menon (V.P. Menon) was Secretary, Ministry of States — he drafted the Instrument of Accession and was the key executor of the integration alongside Patel."}, {"q": "Sardar Patel is also called:", "opts": ["Iron Lady of India", "Lion of Punjab", "Bismarck of India", "Father of Indian Constitution"], "ans": 2, "exp": "Sardar Patel is called 'Bismarck of India' for unifying India (like Bismarck unified Germany). He is also called 'Iron Man of India.'"}, {"q": "Sheikh Abdullah was known as:", "opts": ["Iron Man of Kashmir", "Lion of Kashmir", "Father of Kashmir", "King of Kashmir"], "ans": 1, "exp": "Sheikh Abdullah was called 'Lion of Kashmir' — he led the National Conference and supported Kashmir's accession to India."}, {"q": "Privy Purse was abolished by:", "opts": ["Nehru's 1952 amendment", "Indira Gandhi's 26th Constitutional Amendment 1971", "Rajiv Gandhi's amendment", "Emergency powers 1975"], "ans": 1, "exp": "Privy Purse (annual payment to former rulers) was abolished by Indira Gandhi through the 26th Constitutional Amendment 1971."}, {"q": "Total number of Princely States integrated at independence:", "opts": ["365", "452", "562", "621"], "ans": 2, "exp": "562 Princely States were integrated into the Indian Union after independence."}, {"q": "Major General JN Chaudhury commanded:", "opts": ["Kashmir operations 1947", "Operation Polo (Hyderabad 1948)", "Junagadh plebiscite forces", "Indian Army during Partition"], "ans": 1, "exp": "Major General JN Chaudhury commanded Operation Polo (the military action to integrate Hyderabad in 1948)."}, {"q": "Which state initially declared independence on the 'American model'?", "opts": ["Hyderabad", "Junagadh", "Travancore", "Kashmir"], "ans": 2, "exp": "Travancore initially declared independence (called the 'American model') under Dewan CP Ramaswami Iyer before eventually joining India under public pressure."}, {"q": "Kashmir's Instrument of Accession was signed after:", "opts": ["Peaceful negotiations", "Pakistani tribal raiders attacked Kashmir", "UN intervention", "British pressure"], "ans": 1, "exp": "Hari Singh signed the Instrument of Accession on 26 October 1947 only after Pakistani tribal raiders (backed by Pakistan) attacked Kashmir."}, {"q": "First Kashmir War ceasefire was on:", "opts": ["26 October 1947", "15 August 1948", "1 January 1949", "26 January 1950"], "ans": 2, "exp": "UN-mediated ceasefire in the First Kashmir War took effect on 1 January 1949."}, {"q": "Patel integrated 562 princely states in approximately:", "opts": ["5 years", "3 years", "One year", "6 months"], "ans": 2, "exp": "Patel integrated 562+ states in just ONE year — historians call it a 'miracle of history.'"}]},
{"id": "press_laws_economic", "label": "Press Laws & Economic Impact", "icon": "📰", "xp": 60, "seqIdx": 6, "facts": ["<b>Press Laws Timeline</b>: 1799 (Wellesley) → 1835 (Metcalfe) → 1867 (Registration) → 1878 (Vernacular Press Act) → 1882 (Ripon) → 1910 (Indian Press Act) → 1931 (Gandhi's pact) → 1947.", "<b>Censorship Act 1799</b> — by Lord Wellesley: Strict pre-censorship of press; imposed due to fears of French influence during Napoleon's India ambitions.", "<b>Licensing Regulations 1823</b> — by Lord Amherst: Required license to print; opposed by RRR.", "<b>Thomas Macaulay 1835</b>: Abolished pre-censorship; restored freedom of press temporarily.", "<b>Metcalfe's Press Act 1835</b> ← KEY: Lord Metcalfe (Governor-General 1835-36) removed press restrictions; called '<b>Liberator of Indian Press</b>.'", "<b>Vernacular Press Act (VPA) 1878</b> ← HIGH SSC: By Lord Lytton during Famine; targeted vernacular (Indian language) press; English press exempted; called '<b>Gagging Act</b>.'", "<b>Ilbert Bill controversy (1883)</b> — Lord Ripon: Proposed allowing Indian judges to try Europeans in India; huge opposition by British community in India; eventually watered down.", "<b>VPA 1878 was repealed in 1882</b> by Lord Ripon (after facing massive criticism).", "<b>Indian Press Act 1910</b> — Lord Minto: Required security deposit from press; aimed at nationalist newspapers.", "<b>Key Press figures</b>: Bal Gangadhar Tilak — <b>Kesari</b> (Marathi) and <b>Mahratta</b> (English); Lala Lajpat Rai — <b>The People</b>; Bipin Chandra Pal — <b>New India</b>; Annie Besant — <b>New India</b> and <b>Commonweal</b>.", "<b>Bengal Gazette (1780)</b> — James Augustus Hickey; 1st newspaper in India; called '<b>Hickey's Bengal Gazette</b>'; suppressed by Warren Hastings after it criticized him.", "<b>Drain of Wealth Theory</b> ← KEY: By <b>Dadabhai Naoroji</b>; presented in book '<b>Poverty and Un-British Rule in India</b>' (1901); argued wealth being drained from India to Britain without equivalent return.", "<b>Deindustrialisation</b>: British destroyed Indian handicrafts (especially textiles) through one-way tariff policy; British goods entered India duty-free while Indian goods faced heavy duties in Britain; Bengal muslin industry destroyed.", "<b>Land Revenue Systems</b>: Zamindari (1793, Cornwallis, Bengal) — Zamindars paid fixed tax; Ryotwari (1820, Thomas Munro, Bombay & Madras) — direct settlement with peasants; Mahalwari (1833, Bentinck, UP & Punjab) — settlement with villages/mahal.", "<b>Famine Policy</b>: Millions died in famines under British — Great Bengal Famine 1943 (3 million died; during WW2; Churchill refused to help); Famine of 1876-78 (Madras; Lord Lytton); Famine Commission under Richard Strachey.", "William Digby, R.C. Dutt and others also critiqued drain of wealth; Dadabhai Naoroji ('Grand Old Man of India') presented Drain theory most systematically."], "table": "<table><thead><tr><th>Year</th><th>Press Act</th><th>Who</th><th>Key Effect</th></tr></thead><tbody><tr><td>1799</td><td>Censorship Act</td><td>Wellesley</td><td>Pre-censorship of press; fear of French influence</td></tr><tr><td>1823</td><td>Licensing Regulations</td><td>Amherst</td><td>License required to print; RRR opposed</td></tr><tr><td>1835</td><td>Metcalfe's Press Act</td><td>Metcalfe</td><td>Freedom of press restored; Metcalfe = Liberator of Indian Press</td></tr><tr><td>1878</td><td>Vernacular Press Act</td><td>Lord Lytton</td><td>'Gagging Act'; targeted vernacular press; English press exempt</td></tr><tr><td>1882</td><td>Repeal of VPA</td><td>Lord Ripon</td><td>VPA repealed after criticism</td></tr><tr><td>1910</td><td>Indian Press Act</td><td>Lord Minto</td><td>Security deposit required; targeted nationalist papers</td></tr></tbody></table>", "mn": "<b>Press = WAMVRI sequence:</b><br>📰 <b>W</b>ellesley 1799 (censor) → <b>A</b>mherst 1823 (license) → <b>M</b>etcalfe 1835 (free = Liberator) → <b>V</b>PA 1878 Lytton (Gagging Act) → <b>R</b>ipon 1882 (repeal) ilak's newspapers?", "a": "Kesari (Marathi) and Mahratta (English) — both used extensively for nationalist messaging"}, {"q": "Bengal Famine 1943 — key facts?", "a": "3 million people died; occurred during World War 2; Churchill refused aid to India; caused by wartime policies and mismanagement"}, {"q": "VPA 1878 was repealed by whom and when?", "a": "Vernacular Press Act 1878 was repealed in 1882 by Lord Ripon, who was more liberal in his approach to Indians"}, {"q": "Ryotwari system vs Zamindari system?", "a": "Ryotwari (Munro 1820) = direct settlement with peasants/ryots; Zamindari (Cornwallis 1793) = settlement with Zamindars (landlords) who collected from tenants"}], "mcqs": [{"q": "'Liberator of Indian Press' refers to:", "opts": ["Lord Rippon", "Lord Metcalfe", "Lord Bentinck", "Lord Cornwallis"], "ans": 1, "exp": "Lord Metcalfe (1835-36) is called 'Liberator of Indian Press' for restoring freedom of press by removing pre-censorship restrictions."}, {"q": "Vernacular Press Act (1878) is also called:", "opts": ["Liberating Act", "Gagging Act", "Magna Carta of Press", "Bengal Gazette Act"], "ans": 1, "exp": "Vernacular Press Act 1878 is called the 'Gagging Act' — it targeted vernacular (Indian language) press while exempting English press."}, {"q": "The Vernacular Press Act 1878 was repealed in 1882 by:", "opts": ["Lord Lytton", "Lord Metcalfe", "Lord Ripon", "Lord Curzon"], "ans": 2, "exp": "Lord Ripon repealed the Vernacular Press Act in 1882."}, {"q": "'Poverty and Un-British Rule in India' (1901) was written by:", "opts": ["Bal Gangadhar Tilak", "Dadabhai Naoroji", "Gopal Krishna Gokhale", "MG Ranade"], "ans": 1, "exp": "Dadabhai Naoroji ('Grand Old Man of India') wrote 'Poverty and Un-British Rule in India' (1901) detailing the Drain of Wealth theory."}, {"q": "Zamindari system (1793) was introduced by:", "opts": ["Lord Munro", "Lord Bentinck", "Lord Cornwallis", "Lord Dalhousie"], "ans": 2, "exp": "Lord Cornwallis introduced the Zamindari System (Permanen {"id": "commissions_committees", "label": "Viceroys, Commissions & Committees", "icon": "🔍", "xp": 60, "seqIdx": 7, "facts": ["<b>Hunter Commission (1882)</b>: Appointed by Lord Ripon; reviewed Wood's Dispatch (1854); recommended expansion of primary education and female education; W.W. Hunter was chairman.", "<b>Hunter Commission (1919)</b>: Appointed by Lord Chelmsford to investigate <b>Jallianwala Bagh massacre (13 April 1919)</b>; W.W. Hunter NOT chairman — Lord William Hunter; General Dyer's actions investigated but he was only 'censured'; Dyer given 'instigator of disorder' tag.", "<b>Simon Commission (1927)</b>: No Indian members; appointed under 10-year review provision of 1919 Act; 'Simon Go Back' protests; Simon Commission Report (1930) led to Round Table Conferences.", "<b>Round Table Conferences</b>: 1st RTC (1930) — Congress absent (Gandhi in jail; Civil Disobedience); 2nd RTC (1931) — Gandhi attended (Gandhi-Irwin Pact); 3rd RTC (1932) — Congress absent again.", "<b>Cripps Mission (1942)</b>: Sir Stafford Cripps; offered Dominion Status AFTER WW2 + right to frame own Constitution; Congress rejected it ('Post-dated cheque on a failing bank' — Gandhi); interim govt not given real power.", "<b>Wavell Plan (1945)</b>: Lord Wavell's attempt to form interim govt; Simla Conference 1945; failed because Jinnah insisted on Muslim League nominating ALL Muslim members.", "<b>Cabinet Mission (1946)</b>: Lord Pethick-Lawrence + Sir Stafford Cripps + A.V. Alexander; proposed federal structure with 3 groups (A=Hindu majority, B=NW Muslim majority, C=NE Muslim majority); Congress accepted Constituent Assembly; ML initially accepted then rejected.", "<b>August Offer (1940)</b>: By Viceroy Linlithgow; promised Dominion Status after WW2; Congress rejected; Muslim League accepted (seeing opportunity).", "<b>Key Viceroys (SSC pattern)</b>: Lord Canning (1st Viceroy, 1858-62); Lord Curzon (Partition of Bengal 1905; Lord Kitchener military reform; Universities Act 1904; Ancie he Simla Conference (1945) — it failed because Jinnah insisted on ML nominating all Muslim members."}, {"q": "Jallianwala Bagh massacre occurred on:", "opts": ["13 March 1919", "13 April 1919", "13 May 1919", "13 April 1920"], "ans": 1, "exp": "Jallianwala Bagh massacre occurred on 13 April 1919 (Baisakhi day) — General Dyer ordered firing on a peaceful crowd at Amritsar."}]},
{"id": "tribal_peasant_revolts", "label": "Tribal & Peasant Revolts", "icon": "⚡", "xp": 60, "seqIdx": 8, "facts": ["<b>Sanyasi Revolt (1763-1800)</b>: Sanyasis + Fakirs; Bengal + Bihar; against British restrictions on pilgrimage; economic disruption; featured in Bankim Chandra Chatterjee's novel 'Anandamath' (1882); gave 'Vande Mataram.'", "<b>Santhal Revolt (1855-56)</b>: Also called 'Santhal Hul'; leaders = <b>Sidhu & Kanhu</b> (brothers); Rajmahal Hills (Bengal/Bihar border); against oppressive moneylenders and British land policies; suppressed brutally.", "<b>Munda Revolt (1899-1900)</b>: Leader = <b>Birsa Munda</b> ← HIGH SSC; called '<b>Dharti Abba</b>' (Father of Earth); also called 'Bhagwan'; Chhotanagpur region (Bihar/Jharkhand); fought against forest laws and landlords; Birsa Munda died in jail in 1900; celebrated on <b>15 November</b> (Birsa Munda Jayanti = Jharkhand Formation Day).", "<b>Khasi Uprising (1829-33)</b>: Tirot Singh; against British in Assam/Meghalaya; wanted to preserve tribal autonomy.", "<b>Indigo Revolt (1859-60)</b>: Bengal; peasants revolted against indigo planters who forced them to grow indigo instead of food crops; '<b>Nil Darpan</b>' play by <b>Dinabandhu Mitra</b> (1860) exposed indigo horrors; Jack Pettigrew etc.", "<b>Pabna Agrarian Revolt (1873)</b>: Pabna district, Bengal; peasants organized against oppressive zamindars; led to Bengal Tenancy Act 1885.", "<b>Deccan Riots (1875)</b>: Pune + Ahmednagar; peasant riots against moneylenders (Marwari and Gujarati); Deccan Agriculturalists Relief Act 1879.", "<b>Moplah (Mapillah) Revolt (1921)</b>: Malabar (Kerala); Muslim tenant farmers (Moplahs) against Hindu zamindars and British authority; sometimes called 'last revolt of peasants'; controversial — some classify it as communal violence; during Non-Cooperation Movement.", "<b>Tebhaga Movement (1946)</b>: Bengal; sharecroppers demanded 2/3 share of harvest (tebhaga = 'three shares'); Communist Party of India led; partially successful.", "<b>Telangana Movement (1946-51)</b>: Nizam's Hyderabad; Communist-led; peasants against Nizam's tyranny and Deshmukhs (landlords); 3,000 villages covered; merged into India after Operation Polo.", "<b>Birsa Munda key facts</b>: Born 1875; died June 1900 (in British jail, cholera); led Ulgulan ('Great Tumult'); created religious movement; promoted wearing of thread; opposed tribal conversion to Christianity.", "Women in tribal revolts: Phulo-Jhano (Santhal 1855); many women fought in Munda revolt alongside Birsa.", "<b>Ramosi Uprising (1822-29)</b>: Pune; Chittur Singh; against British control of forts.", "<b>Bhil Revolt (1818-31)</b>: Khandesh; against British land settlement.", "15 November is now Jharkhand Formation Day AND Birsa Munda Jayanti — the state was carved on his birth anniversary."], "table": "<table><thead><tr><th>Revolt</th><th>Year</th><th>Leader/Feature</th><th>Region</th></tr></thead><tbody><tr><td>Sanyasi Revolt</td><td>1763-1800</td><td>Sanyasis + Fakirs; 'Anandamath'</td><td>Bengal, Bihar</td></tr><tr><td>Santhal Revolt ('Hul')</td><td>1855-56</td><td>Sidhu & Kanhu</td><td>Rajmahal Hills</td></tr><tr><td>Munda Revolt (Ulgulan)</td><td>1899-1900</td><td>Birsa Munda 'Dharti Abba'</td><td>Chhotanagpur</td></tr><tr><td>Indigo Revolt</td><td>1859-60</td><td>Bengal peasants; 'Nil Darpan' by Dinabandhu Mitra</td><td>Bengal</td></tr><tr><td>Pabna Revolt</td><td>1873</td><td>Organized peasants vs zamindars</td><td>Pabna, Bengal</td></tr><tr><td>Deccan Riots</td><td>1875</td><td>vs moneylenders; Deccan Agriculturalists Relief Act</td><td>Pune + Ahmednagar</td></tr><tr><td>Moplah Revolt</td><td>1921</td><td>Muslim peasants vs Hindu zamindars + British</td><td>Malabar, Kerala</td></tr><tr><td>Tebhaga Movement</td><td>1946</td><td>2/3 share demand; CPI-led</td><td>Bengal</td></tr><tr><td>Telangana Movement</td><td>1946-51</td><td>Communist-led; vs Nizam's landlords</td><td>Hyderabad</td></tr></tbody></table>", "mn": "<b>Revolts: S-S-M-I-P-D-M-T-T:</b><br>⚡ <b>S</b>anyasi 1763 → <b>S</b>anthal 1855 (Sidhu+Kanhu) → <b>M</b>unda 1899 (Birsa Munda 'Dharti Abba') → <b>I</b>ndigo 1859 (Nil Darpan) → <b>P</b>abna 1873 → <b>D</b>eccan 1875 → <b>M</b>oplah 1921 → <b>T</b>ebhaga 1946 → <b>T</b>elangana 1946-51", "traps": ["⚠️ Santhal Revolt leaders = SIDHU & KANHU (brothers) — NOT Birsa Munda!", "⚠️ Birsa Munda = Munda Revolt (1899-1900) 'Dharti Abba' — NOT Santhal revolt!", "⚠️ 'Nil Darpan' = Indigo Revolt (1860) by Dinabandhu Mitra — NOT about any other revolt!", "⚠️ Birsa Munda died in JAIL in 1900 (cholera) — was NOT executed by British!", "⚠️ Tebhaga 1946 = Bengal sharecroppers wanted 2/3 share — communist-led!", "⚠️ Telangana Movement (1946-51) = against NIZAM's landlords (communist-led) — NOT partition-related!"], "revision": ["Sanyasi Revolt 1763-1800 = 'Anandamath' novel; Vande Mataram", "Santhal Revolt 1855-56 = 'Santhal Hul'; Sidhu & Kanhu; Rajmahal Hills", "Munda Revolt 1899-1900 = Birsa Munda 'Dharti Abba'; Ulgulan; died in jail 1900", "Indigo Revolt 1859-60 = Bengal; Nil Darpan by Dinabandhu Mitra", "Pabna 1873 = vs zamindars; led to Bengal Tenancy Act 1885", "Deccan Riots 1875 = vs moneylenders; Deccan Agriculturalists Relief Act 1879", "Moplah 1921 = Malabar; Muslim peasants; Non-Cooperation period", "Tebhaga 1946 = Bengal; 2/3 share; CPI-led", "Telangana 1946-51 = vs Nizam's landlords; communist-led", "15 November = Birsa Munda Jayanti = Jharkhand Formation Day"], "oneliners": ["Sanyasi Revolt 1763-1800 = Bengal/Bihar; featured in Anandamath (Vande Mataram)", "Santhal Revolt 1855-56 = 'Santhal Hul'; leaders Sidhu & Kanhu (brothers)", "Munda Revolt 1899-1900 = Birsa Munda; 'Dharti Abba'; 'Ulgulan'", "Birsa Munda died June 1900 in British jail (cholera)", "15 November = Birsa Munda Jayanti = Jharkhand Formation Day", "Indigo Revolt 1859-60 = Bengal peasants vs indigo planters", "'Nil Darpan' (1860) by Dinabandhu Mitra = exposed indigo exploitation", "Pabna Revolt 1873 = organized peasants vs zamindars; led to Bengal Tenancy Act 1885", "Deccan Riots 1875 = Pune + Ahmednagar; vs moneylenders; Deccan Agriculturalists Relief Act 1879", "Moplah Revolt 1921 = Malabar; Muslim peasants vs Hindu zamindars + British", "Tebhaga Movement 1946 = Bengal; 2/3 share of harvest demand; CPI-led", "Telangana Movement 1946-51 = vs Nizam's Deshmukhs; communist-led", "Santhal Hul 1855 = first major tribal revolt against British land policies", "Birsa Munda created religious movement; opposed Christian conversion", "Khasi Uprising 1829-33 = Tirot Singh; Meghalaya/Assam", "Ramosi Uprising 1822-29 = Pune; Chittur Singh; against British forts", "Bhil Revolt 1818-31 = Khandesh; against British land settlement", "Phulo-Jhano = women leaders of Santhal Revolt 1855", "Moplah Revolt 1921 = sometimes classified as communal violence (controversial)", "Indigo planters forced peasants to grow indigo instead of food crops"], "flashcards": [{"q": "Santhal Revolt (1855-56) leaders?", "a": "Sidhu & Kanhu (brothers) — Rajmahal Hills on Bengal/Bihar border; revolt against oppressive moneylenders and British land policies; also called 'Santhal Hul'"}, {"q": "Who was Birsa Munda and what was his revolt called?", "a": "Birsa Munda = 'Dharti Abba' (Father of Earth); led Munda Revolt (Ulgulan = Great Tumult) 1899-1900 in Chhotanagpur; died in British jail June 1900; celebrated on 15 November (Jharkhand Formation Day)"}, {"q": "'Nil Darpan' — what was it and why is it important?", "a": "A Bengali play by Dinabandhu Mitra (1860) that exposed the brutal exploitation of indigo farmers by British planters in Bengal; key document of the Indigo Revolt 1859-60"}, {"q": "Deccan Riots (1875) — cause, location, outcome?", "a": "Peasant riots in Pune and Ahmednagar districts against moneylenders (Marwari and Gujarati); led to Deccan Agriculturalists Relief Act 1879"}, {"q": "Tebhaga Movement (1946) — what did it demand?", "a": "Bengal sharecroppers (led by CPI) demanded 2/3 share of harvest (tebhaga = 'three shares'); was partially successful"}, {"q": "Moplah Revolt (1921) — significance?", "a": "Malabar (Kerala); Muslim tenant farmers (Moplahs) revolted against Hindu zamindars and British; occurred during Non-Cooperation Movement; controversial whether it was peasant revolt or communal violence"}, {"q": "What is Jharkhand Formation Day and why is it on 15 November?", "a": "Jharkhand was formed on 15 November 2000 — the date was chosen because it is Birsa Munda's birthday (Jayanti)"}, {"q": "Sanyasi Revolt (1763-1800) — connection to literature?", "a": "Featured in Bankim Chandra Chatterjee's novel 'Anandamath' (1882) — which contains 'Vande Mataram' (originally a description of the motherland in the novel)"}, {"q": "Pabna Agrarian Revolt (1873) outcome?", "a": "Peasants organized against oppressive zamindars in Pabna district, Bengal; led to Bengal Tenancy Act 1885 which gave some protection to tenants"}, {"q": "Birsa Munda's religious movement — key features?", "a": "Created his own religious movement; promoted sacred thread; opposed conversion to Christianity; wanted to revive tribal identity and customs"}], "mcqs": [{"q": "Santhal Revolt (1855-56) leaders were:", "opts": ["Birsa Munda and Phulo", "Sidhu and Kanhu", "Tirot Singh and Birsa", "Sido and Birsa"], "ans": 1, "exp": "Sidhu and Kanhu (brothers) led the Santhal Revolt (1855-56) in the Rajmahal Hills region."}, {"q": "Birsa Munda is called:", "opts": ["Lokamanya", "Dharti Abba", "Rashtrapit", "Deshbandhu"], "ans": 1, "exp": "Birsa Munda is called 'Dharti Abba' (Father of Earth) — he led the Munda Revolt (Ulgulan) 1899-1900."}, {"q": "'Nil Darpan' (1860) by Dinabandhu Mitra exposed:", "opts": ["Partition of Bengal", "Exploitation of indigo farmers", "Tribal exploitation", "Zamindari atrocities"], "ans": 1, "exp": "'Nil Darpan' (Indigo Mirror, 1860) exposed the brutal exploitation of Bengal peasants by British indigo planters."}, {"q": "Deccan Riots (1875) were against:", "opts": ["British land policy", "Oppressive zamindars", "Moneylenders (Marwari and Gujarati)", "Indigo planters"], "ans": 2, "exp": "Deccan Riots (1875) in Pune and Ahmednagar were peasant riots against moneylenders, particularly Marwari and Gujarati traders."}, {"q": "Munda Revolt (1899-1900) area was:", "opts": ["Rajmahal Hills", "Chhotanagpur, Bihar/Jharkhand", "Malabar, Kerala", "Pabna, Bengal"], "ans": 1, "exp": "Birsa Munda's Munda Revolt (Ulgulan) 1899-1900 was centered in Chhotanagpur region of Bihar/Jharkhand."}, {"q": "Birsa Munda died in:", "opts": ["Battle with British forces", "British jail in 1900", "1903 after release", "1905 in his village"], "ans": 1, "exp": "Birsa Munda died in British jail in June 1900 — reportedly of cholera. He was arrested and died while imprisoned."}, {"q": "Tebhaga Movement (1946) was led by:", "opts": ["INC (Congress)", "Kisan Sabha (Marxist)", "Communist Party of India", "Muslim League"], "ans": 2, "exp": "Tebhaga Movement 1946 was led by the Communist Party of India — Bengal sharecroppers demanded 2/3 share (tebhaga) of harvest."}, {"q": "Moplah Revolt (1921) occurred in:", "opts": ["Bengal", "Rajasthan", "Malabar, Kerala", "Telangana"], "ans": 2, "exp": "Moplah Revolt (1921) occurred in Malabar (Kerala) — Muslim tenant farmers (Moplahs) revolted against Hindu zamindars and British."}, {"q": "Jharkhand Formation Day (15 November) coincides with:", "opts": ["Santhal Revolt anniversary", "Birsa Munda's birthday", "Munda Revolt anniversary", "Sidhu Kanhu's birthday"], "ans": 1, "exp": "15 November is Jharkhand Formation Day (2000) AND Birsa Munda's birthday (1875) — the date was chosen to honor him."}, {"q": "Sanyasi Revolt (1763-1800) is featured in which novel?", "opts": ["Devdas", "Godan", "Anandamath", "Neel Darpan"], "ans": 2, "exp": "Sanyasi Revolt features in Bankim Chandra Chatterjee's novel 'Anandamath' (1882) which also contains 'Vande Mataram.'"}, {"q": "Pabna Revolt (1873) led to:", "opts": ["Bengal Partition", "Bengal Tenancy Act 1885", "Deccan Agriculturalists Act", "Government of India Act 1909"], "ans": 1, "exp": "Pabna Revolt (1873) led to the Bengal Tenancy Act 1885 which gave tenants some protection against zamindars."}, {"q": "Telangana Movement (1946-51) was against:", "opts": ["British colonial forces", "Nizam's Deshmukhs (landlords); Communist-led", "Congress government", "Partition of Hyderabad"], "ans": 1, "exp": "Telangana Movement was a communist-led peasant revolt against the Nizam of Hyderabad's Deshmukhs (landlords) during 1946-51."}, {"q": "Khasi Uprising (1829-33) was led by:", "opts": ["Sidhu and Kanhu", "Birsa Munda", "Tirot Singh", "Chittur Singh"], "ans": 2, "exp": "Tirot Singh led the Khasi Uprising (1829-33) in present-day Meghalaya against British expansion."}, {"q": "The Indigo Revolt (1859-60) was caused by:", "opts": ["Zamindars forcing peasants to grow indigo", "British planters forcing peasants to grow indigo at low prices", "Government tax on indigo farms", "Indigo export ban"], "ans": 1, "exp": "British indigo planters forced Bengal peasants to grow indigo instead of food crops, paying them inadequate prices — this triggered the Indigo Revolt."}, {"q": "Deccan Agriculturalists Relief Act (1879) was passed after:", "opts": ["Santhal Revolt", "Pabna Revolt", "Deccan Riots 1875", "Moplah Revolt"], "ans": 2, "exp": "Deccan Agriculturalists Relief Act 1879 was passed in response to the Deccan Riots of 1875 to give some debt relief to peasants."}]},
{"id": "ina_missions_wwii", "label": "INA, Cripps & Naval Mutiny", "icon": "⚓", "xp": 60, "seqIdx": 9, "facts": ["<b>Indian National Army (INA)</b>: Founded in <b>September 1942</b> by <b>Ras Bihari Bose</b> (not Subhash Chandra Bose); revived and reorganized by <b>Subhash Chandra Bose</b> in 1943 after he escaped house arrest and reached Singapore.", "INA motto: '<b>Ittehad, Itmad, Qurbani</b>' (Unity, Faith, Sacrifice).", "<b>Azad Hind Fauj</b> = INA's name; '<b>Azad Hind</b>' = 'Free India' government in exile (Singapore, 1943) — SC Bose was head.", "<b>Rani Jhansi Regiment</b>: Women's unit of INA; led by <b>Lakshmi Sahgal (Dr. Lakshmi Swaminathan)</b>.", "<b>INA Trials (Red Fort Trials) 1945-46</b>: British tried INA officers at Red Fort; famous triad: <b>Shah Nawaz Khan, PK Sehgal, Gurbaksh Singh Dhillon</b>; defended by <b>Bhulabhai Desai</b> (Congress); also participated: Jawaharlal Nehru, Tej Bahadur Sapru; sentences remitted due to public outrage.", "INA trials sparked massive sympathy; contributed to weakening of British position in India.", "<b>Naval Mutiny (Royal Indian Navy Mutiny)</b>: <b>18 February 1946</b>; started on <b>HMIS Talwar</b> (Bombay); spread to <b>78 ships, 20 shore establishments, 20,000 ratings</b>; salute to INA trial prisoners.", "Naval Mutiny was supported by Congress, Muslim League, and CPI — rare moment of unity; Patel and Jinnah both appealed to sailors to surrender.", "After mutiny: British realized India could not be held militarily; accelerated plans for transfer of power.", "<b>August Offer (1940)</b>: Lord Linlithgow; promised Dominion Status after WW2 and expansion of Viceroy's council; Congress rejected; ML conditionally accepted.", "<b>Cripps Mission (1942)</b>: Sir Stafford Cripps; offered Dominion Status after WW2 + right to secede from Commonwealth + right to frame Constitution; Congress rejected ('post-dated cheque'); Gandhi: 'failing bank'; sent during Japanese threat.", "<b>Wavell Plan (1945) / Simla Conference</b>: Lord Wavell proposed interim government with equal Hindus and Muslims; Jinnah refused to allow Congress to nominate any Muslim; failed.", "<b>Cabinet Mission Plan (1946)</b>: 3 groups scheme; Constituent Assembly; accepted by Congress for Constituent Assembly; ML initially accepted then rejected.", "<b>Interim Government (1946)</b>: Nehru as head; formed September 1946; ML joined October 1946 (Liaquat Ali Khan in Finance); friction between Congress and ML inside govt.", "<b>Quit India Movement (1942)</b>: 'Do or Die' — Gandhi; August 9, 1942; 'August Kranti'; all leaders arrested; underground movement; Aruna Asaf Ali hoisted flag at Gowalia Tank Maidan."], "table": "<table><thead><tr><th>Event</th><th>Year</th><th>Key Facts</th></tr></thead><tbody><tr><td>INA founded</td><td>1942</td><td>Ras Bihari Bose; revived by SC Bose 1943</td></tr><tr><td>Azad Hind govt</td><td>1943</td><td>Singapore; SC Bose head; motto: Ittehad Itmad Qurbani</td></tr><tr><td>INA Trials</td><td>1945-46</td><td>Red Fort; Shah Nawaz Khan, Sehgal, Dhillon; defended by Bhulabhai Desai</td></tr><tr><td>Naval Mutiny</td><td>18 Feb 1946</td><td>HMIS Talwar; 78 ships; 20,000 ratings</td></tr><tr><td>August Offer</td><td>1940</td><td>Linlithgow; Dominion Status after WW2; Congress rejected</td></tr><tr><td>Cripps Mission</td><td>1942</td><td>Stafford Cripps; 'post-dated cheque'; Dominion Status after WW2</td></tr><tr><td>Wavell Plan</td><td>1945</td><td>Simla Conference; Jinnah vetoed; failed</td></tr><tr><td>Cabinet Mission</td><td>1946</td><td>Groups A/B/C; Constituent Assembly; Pethick-Lawrence, Cripps, Alexander</td></tr><tr><td>Quit India</td><td>1942</td><td>'Do or Die'; August 9; Aruna Asaf Ali; 'August Kranti'</td></tr></tbody></table>", "mn": "<b>INA = R-S-A (Ras Bihari→SC Bose→Azad Hind):</b><br>⚓ INA founded by <b>R</b>as Bihari Bose (1942) → revived by <b>S</b>C Bose (1943) → <b>A</b>zad Hind Govt Singapore<br>INA Trials 1945-46: '<b>SSD</b>' = Shah Nawaz Khan + Sehgal + Dhillon defended by Bhulabhai Desai<br>Naval Mutiny: <b>18 Feb 1946</b>, HMIS <b>T</b>alwar, <b>78</b> ships, <b>20,000</b> ratings", "traps": ["⚠️ INA was FOUNDED by RAS BIHARI BOSE (1942) — SC Bose REVIVED it in 1943!", "⚠️ INA Trials = Red Fort (NOT Cellular Jail)!", "⚠️ Naval Mutiny = 18 February 1946 on HMIS TALWAR (NOT Delhi or Calcutta)!", "⚠️ Gandhi called Cripps Mission 'post-dated cheque on a FAILING bank' (not 'bounced cheque')!", "⚠️ Quit India = 'Do or Die' August 9, 1942 — Aruna Asaf Ali hoisted flag at GOWALIA TANK MAIDAN (Mumbai) — NOT India Gate!", "⚠️ Bhulabhai Desai defended INA at Red Fort Trial — Nehru also participated (wearing barrister's gown)!"], "revision": ["INA: Ras Bihari Bose (founded 1942); SC Bose (revived 1943); Azad Hind; motto = Ittehad Itmad Qurbani", "Rani Jhansi Regiment = women's INA unit; Lakshmi Sahgal led", "INA Trials 1945-46: Red Fort; Shah Nawaz Khan, Sehgal, Dhillon; Bhulabhai Desai defended", "Naval Mutiny: 18 Feb 1946; HMIS Talwar; 78 ships; 20,000 ratings", "August Offer 1940 = Linlithgow; Dominion Status after WW2; Congress rejected", "Cripps Mission 1942 = Stafford Cripps; 'post-dated cheque'; Congress rejected", "Wavell Plan 1945 = Simla Conference; Jinnah vetoed all Muslim nominations", "Cabinet Mission 1946 = Groups A/B/C; Constituent Assembly", "Quit India 1942 = 'Do or Die' August 9; Aruna Asaf Ali; 'August Kranti'", "Interim Govt Sept 1946 = Nehru; ML joined Oct 1946"], "oneliners": ["INA founded by Ras Bihari Bose in September 1942", "INA revived and reorganized by SC Bose in 1943 (Singapore)", "Azad Hind motto: 'Ittehad, Itmad, Qurbani' (Unity, Faith, Sacrifice)", "Rani Jhansi Regiment = women's unit of INA; led by Lakshmi Sahgal", "INA Trials 1945-46 at Red Fort; Shah Nawaz Khan, PK Sehgal, GS Dhillon", "Bhulabhai Desai = primary defender of INA at Red Fort Trials", "Naval Mutiny = 18 February 1946; HMIS Talwar; Bombay", "Naval Mutiny: 78 ships + 20 shore establishments; 20,000 ratings", "Quit India Movement = 9 August 1942; 'Do or Die'; 'August Kranti'", "Aruna Asaf Ali hoisted flag at Gowalia Tank Maidan (Mumbai) during Quit India", "Gandhi called Cripps Mission 'post-dated cheque on a failing bank'", "August Offer 1940 = Lord Linlithgow; Congress rejected; ML conditionally accepted", "Cripps Mission 1942 = sent during Japanese advance into Burma", "Wavell Plan 1945 = Simla Conference; failed because Jinnah's veto on Muslim nominees", "Cabinet Mission 1946: Group A=Hindu provinces; Group B=NW Muslim; Group C=NE Muslim", "Interim Govt formed September 1946; Nehru as Vice-President (head)", "ML joined Interim Govt October 1946; Liaquat Ali Khan in Finance Ministry", "Naval Mutiny accelerated British decision to leave India", "INA trials created massive public sympathy; British couldn't punish officers", "SC Bose escape route: Calcutta → Kabul → Berlin → Singapore"], "flashcards": [{"q": "Who founded the INA and who revived it?", "a": "INA was founded by Ras Bihari Bose in September 1942; revived, reorganized, and led by Subhash Chandra Bose in 1943 after he escaped to Singapore"}, {"q": "INA motto and what does it mean?", "a": "'Ittehad, Itmad, Qurbani' = Unity, Faith, Sacrifice — the motto of Azad Hind Fauj (INA)"}, {"q": "Naval Mutiny (1946) — when, where, scale?", "a": "18 February 1946; started on HMIS Talwar in Bombay; spread to 78 ships, 20 shore establishments, approximately 20,000 naval ratings"}, {"q": "INA Trials — who was tried, where, who defended?", "a": "Shah Nawaz Khan, PK Sehgal, Gurbaksh Singh Dhillon were tried at Red Fort (1945-46); defended by Bhulabhai Desai (Congress); Nehru also participated as a lawyer"}, {"q": "Rani Jhansi Regiment — what was it?", "a": "Women's combat unit of INA; led by Dr. Lakshmi Sahgal (Lakshmi Swaminathan); named after Rani Lakshmi Bai of Jhansi"}, {"q": "Quit India Movement — key facts?", "a": "9 August 1942; 'August Kranti'; Gandhi's call 'Do or Die'; all leaders arrested; Aruna Asaf Ali hoisted INC flag at Gowalia Tank Maidan, Bombay"}, {"q": "Why did the Naval Mutiny of 1946 matter strategically?", "a": "It showed British India's military was no longer loyal — British realized they could not hold India militarily; accelerated decision to transfer power"}, {"q": "Cripps Mission 1942 — what did it offer and why was it rejected?", "a": "Offered Dominion Status after WW2, right to secede from Commonwealth, right to frame Constitution; Congress rejected because it was deferred (only after WW2); Gandhi called it 'post-dated cheque on a failing bank'"}, {"q": "Cabinet Mission 1946 — what were Groups A, B, C?", "a": "Group A = Hindu majority provinces (Congress); Group B = NW Muslim majority provinces (Punjab, Sindh, NWFP, Baluchistan — Muslim League); Group C = NE Muslim provinces (Bengal + Assam)"}, {"q": "Interim Government (1946) — who led it and who else joined?", "a": "Nehru as Vice-President (head); formed September 1946; Muslim League joined October 1946 with Liaquat Ali Khan in Finance Ministry"}], "mcqs": [{"q": "Indian National Army was FOUNDED by:", "opts": ["Subhash Chandra Bose", "Ras Bihari Bose", "Bhagat Singh", "Rash Behari Ghosh"], "ans": 1, "exp": "INA was founded by Ras Bihari Bose in September 1942. SC Bose reorganized and revived it in 1943 after escaping to Singapore."}, {"q": "INA motto 'Ittehad, Itmad, Qurbani' means:", "opts": ["Truth, Courage, Sacrifice", "Unity, Faith, Sacrifice", "Independence, Unity, Progress", "Action, Discipline, Sacrifice"], "ans": 1, "exp": "'Ittehad, Itmad, Qurbani' means Unity, Faith, Sacrifice — the motto of Azad Hind Fauj (INA)."}, {"q": "Naval Mutiny (1946) started on:", "opts": ["INS Delhi", "HMIS Talwar", "INS Vikrant", "HMIS Bengal"], "ans": 1, "exp": "Naval Mutiny started on 18 February 1946 on HMIS Talwar in Bombay."}, {"q": "INA Trials were held at:", "opts": ["Cellular Jail, Andaman", "Sabarmati Jail", "Red Fort, Delhi", "Lahore Fort"], "ans": 2, "exp": "INA Trials (1945-46) were held at Red Fort, Delhi — the famous 'Red Fort Trials.'"}, {"q": "Primary defense counsel at INA Trials was:", "opts": ["Jawaharlal Nehru", "Bhulabhai Desai", "Tej Bahadur Sapru", "MK Gandhi"], "ans": 1, "exp": "Bhulabhai Desai (Congress) was the primary defense counsel. Nehru also participated wearing his barrister's gown."}, {"q": "Naval Mutiny (1946) scale:", "opts": ["12 ships, 5,000 sailors", "78 ships, 20,000 ratings", "25 ships, 8,000 ratings", "100 ships, 50,000 ratings"], "ans": 1, "exp": "Naval Mutiny spread to 78 ships and 20 shore establishments, involving approximately 20,000 naval ratings."}, {"q": "Rani Jhansi Regiment was led by:", "opts": ["Savitribai Phule", "Annie Besant", "Dr. Lakshmi Sahgal", "Sarojini Naidu"], "ans": 2, "exp": "Rani Jhansi Regiment (women's unit of INA) was led by Dr. Lakshmi Sahgal (Lakshmi Swaminathan)."}, {"q": "'Do or Die' slogan was associated with:", "opts": ["Non-Cooperation Movement", "Quit India Movement 1942", "Civil Disobedience Movement", "Home Rule Movement"], "ans": 1, "exp": "'Do or Die' was Gandhi's call for Quit India Movement on 9 August 1942 — also called 'August Kranti.'"}, {"q": "Who hoisted INC flag at Gowalia Tank Maidan during Quit India?", "opts": ["Sardar Patel", "Subhash Chandra Bose", "Aruna Asaf Ali", "Kamala Nehru"], "ans": 2, "exp": "Aruna Asaf Ali hoisted the INC flag at Gowalia Tank Maidan (August Kranti Maidan), Bombay, after all Congress leaders were arrested."}, {"q": "Gandhi called Cripps Mission:", "opts": ["Post-dated cheque on a failing bank", "Morning without Sun", "Magna Carta of India", "Drain of Wealth"], "ans": 0, "exp": "Gandhi called Cripps Mission 1942 'a post-dated cheque on a failing bank' — referring to its offer being deferred until after WW2."}, {"q": "Cabinet Mission (1946) proposed:", "opts": ["Direct independence with partition", "Federal India with 3 groups A/B/C", "Dominion Status after WW2", "Two separate countries immediately"], "ans": 1, "exp": "Cabinet Mission 1946 proposed keeping India united with a federal structure divided into 3 groups: A (Hindu majority), B (NW Muslim), C (NE Muslim)."}, {"q": "Wavell Plan (1945) at Simla Conference failed because:", "opts": ["Congress refused to attend", "Jinnah insisted ML alone nominate all Muslim members", "British changed the proposal", "Gandhi started a fast"], "ans": 1, "exp": "Wavell Plan failed because Jinnah insisted that Muslim League alone should nominate ALL Muslim members to the interim govt — Congress couldn't accept this."}, {"q": "Interim Government formed in September 1946 was headed by:", "opts": ["Sardar Patel", "Maulana Azad", "Jawaharlal Nehru", "Rajendra Prasad"], "ans": 2, "exp": "Interim Government (September 1946) was headed by Jawaharlal Nehru as Vice-President of the Executive Council."}, {"q": "Azad Hind government in exile was headquartered in:", "opts": ["Tokyo, Japan", "Rangoon, Burma", "Singapore", "Berlin, Germany"], "ans": 2, "exp": "Azad Hind government in exile was set up by SC Bose in Singapore in 1943."}, {"q": "August Offer (1940) was rejected by:", "opts": ["Muslim League", "Congress (INC)", "Both Congress and Muslim League", "Ambedkar and depressed classes"], "ans": 1, "exp": "August Offer 1940 was rejected by Congress; Muslim League conditionally accepted it (seeing opportunity to gain separate Pakistan)."}]},
{"id": "bhagat_bose_gandhi", "label": "Bhagat Singh, SC Bose & Gandhi", "icon": "👤", "xp": 60, "seqIdx": 10, "facts": ["<b>Bhagat Singh</b>: Born <b>28 September 1907</b>, Layalpur (now Faisalabad, Pakistan); hanged <b>23 March 1931</b> (Lahore Central Jail); along with Rajguru and Sukhdev.", "Bhagat Singh: Founded <b>Naujawan Bharat Sabha</b> (1926); member of <b>Hindustan Republican Association (HRA)</b>; HRA renamed <b>Hindustan Socialist Republican Association (HSRA)</b> (1928).", "<b>Saunders murder (1928)</b>: Bhagat Singh + Rajguru + Chandrashekhar Azad killed British police officer <b>John Saunders</b> to avenge Lala Lajpat Rai's death (killed by police baton charge, November 1928).", "<b>Assembly Bombing (8 April 1929)</b>: Bhagat Singh + <b>Batukeshwar Dutt</b> threw bombs in Central Legislative Assembly, Delhi; they surrendered to police; slogan '<b>Inquilab Zindabad</b>'; bombs thrown to 'make the deaf hear' (not to kill).", "Bhagat Singh: Famous quote — '<b>They may kill me, but they cannot kill my ideas. They can crush my body, but they will not be able to crush my spirit.</b>'", "<b>Subhash Chandra Bose</b>: Born <b>23 January 1897</b> (Cuttack, Odisha); disappeared/died <b>18 August 1945</b> (Taihoku = Taipei, Taiwan — plane crash; disputed).", "SC Bose called '<b>Netaji</b>'; also '<b>Deshpran</b>' (not famous); opposed Gandhi's non-violent approach; believed in armed struggle.", "SC Bose: Appeared for ICS exam (1919), ranked 4th; resigned from ICS in 1921 to join freedom movement.", "SC Bose: Elected President of INC twice — <b>Haripura (1938)</b> and <b>Tripuri (1939)</b>; resigned in 1939 after clash with Gandhi and Congress high command.", "SC Bose escaped house arrest (1941): Calcutta → Peshawar → Kabul → Moscow → Berlin; met Hitler in Germany.", "SC Bose: Formed <b>Free India Centre</b> (Berlin) and <b>Indian Legion</b> (Europe) in 1942; then went to Singapore via submarine (1943) to lead INA.", "<b>SC Bose's radio address</b>: 'Give me blood, and I shall give you freedom' — famous speech to INA.", "<b>Mahatma Gandhi</b>: Born <b>2 October 1869</b> (Porbandar, Gujarat); assassinated <b>30 January 1948</b> (Birla House, New Delhi) by <b>Nathuram Godse</b>.", "Gandhi called: <b>Father of the Nation</b> (1st time used by SC Bose in Singapore radio address, 1944); <b>Mahatma</b> (by Rabindranath Tagore, 1915); <b>Bapu</b> (affectionate).", "Gandhi's major movements: Champaran Satyagraha (1917, indigo); Kheda Satyagraha (1918); Non-Cooperation Movement (1920-22); Civil Disobedience / Dandi March (1930); Quit India (1942).", "Gandhi's Dandi March: <b>12 March – 6 April 1930</b>; 241 miles (388 km); from Sabarmati Ashram to Dandi (Gujarat); 78 followers; broke salt law.", "<b>Gandhi-Irwin Pact (1931)</b>: British agreed to release political prisoners, allow Congress at RTC, allow coastal salt making; Congress agreed to suspend Civil Disobedience.", "<b>Karachi Congress 1931</b>: Resolution on Fundamental Rights + Economic Policy — drafted by Nehru; Gandhi presided; defined goals of independent India.", "Gandhi's assassin Nathuram Godse: member of RSS (later expelled); founder of Hindu Mahasabha connection; shot Gandhi at evening prayer, Birla House, New Delhi.", "<b>Sardar Patel key facts</b>: Born <b>31 October 1875</b> (Nadiad, Gujarat); died <b>15 December 1950</b>; Iron Man of India; integrated princely states; 1st Home Minister and Deputy PM of India."], "table": "<table><thead><tr><th>Leader</th><th>Born</th><th>Died</th><th>Key Contribution</th></tr></thead><tbody><tr><td>Bhagat Singh</td><td>28 Sep 1907</td><td>23 Mar 1931 (hanged)</td><td>Naujawan Bharat Sabha; HSRA; Saunders murder; Assembly bombing</td></tr><tr><td>SC Bose (Netaji)</td><td>23 Jan 1897</td><td>18 Aug 1945 (Taiwan)</td><td>INC President 1938+1939; INA; Azad Hind; 'Give me blood'</td></tr><tr><td>Mahatma Gandhi</td><td>2 Oct 1869</td><td>30 Jan 1948 (assassinated)</td><td>Satyagraha; Non-Cooperation; Dandi March; Quit India</td></tr><tr><td>Sardar Patel</td><td>31 Oct 1875</td><td>15 Dec 1950</td><td>Integrated 562 princely states; 1st Home Minister; Iron Man</td></tr></tbody></table>", "mn": "<b>BSG = Born dates: B(1907) S(1897) G(1869):</b><br>👤 <b>B</b>hagat Singh 28 Sep <b>1907</b>; hanged 23 Mar 1931<br><b>S</b>C Bose 23 Jan <b>1897</b>; died 18 Aug 1945 Taihoku<br><b>G</b>andhi 2 Oct <b>1869</b>; assassinated 30 Jan 1948 by Godse<br>Patel 31 Oct 1875; died 15 Dec 1950", "traps": ["⚠️ SC Bose = 'Netaji'; 'Father of the Nation' = Gandhi (but this TITLE was first used by SC Bose for Gandhi in 1944 Singapore radio address)!", "⚠️ Bhagat Singh hanged on 23 MARCH 1931 (not January or April)!", "⚠️ Assembly Bombing = Bhagat Singh + BATUKESHWAR DUTT (not Rajguru) on 8 April 1929!", "⚠️ Saunders murder = Bhagat Singh + RAJGURU + CHANDRASHEKHAR AZAD (not Bhatt/Dutt)!", "⚠️ Gandhi title 'Mahatma' = by RABINDRANATH TAGORE (1915) — NOT by Indians generally first!", "⚠️ SC Bose died at TAIHOKU (= Taipei, Taiwan) on 18 August 1945 — NOT in India or Singapore!"], "revision": ["Bhagat Singh: born 28 Sep 1907; hanged 23 Mar 1931 with Rajguru + Sukhdev", "Bhagat Singh: Naujawan Bharat Sabha (1926); HSRA; Saunders murder (1928); Assembly bombing with Batukeshwar Dutt (8 Apr 1929)", "SC Bose: born 23 Jan 1897; died 18 Aug 1945 Taihoku (Taiwan)", "SC Bose: ICS rank 4 (resigned 1921); INC President 1938 (Haripura) + 1939 (Tripuri)", "SC Bose: escaped 1941; reached Singapore 1943; led INA; 'Give me blood' speech", "Gandhi: born 2 Oct 1869 (Porbandar); assassinated 30 Jan 1948 by Nathuram Godse", "Gandhi called 'Mahatma' by Tagore (1915); 'Father of Nation' (SC Bose used it 1944)", "Dandi March: 12 Mar – 6 Apr 1930; 241 miles; 78 followers; broke salt law", "Gandhi-Irwin Pact 1931; Karachi Congress 1931 = Fundamental Rights resolution", "Patel: born 31 Oct 1875; died 15 Dec 1950; Iron Man; 1st Home Minister"], "oneliners": ["Bhagat Singh born 28 September 1907 (Layalpur, now Pakistan)", "Bhagat Singh hanged 23 March 1931 with Rajguru and Sukhdev", "Naujawan Bharat Sabha (1926) = Bhagat Singh's youth organization", "HSRA = Hindustan Socialist Republican Association (renamed from HRA in 1928)", "Saunders murder 1928 = Bhagat Singh + Rajguru + Chandrashekhar Azad (avenging Lala Lajpat Rai)", "Assembly bombing 8 April 1929 = Bhagat Singh + Batukeshwar Dutt", "'Inquilab Zindabad' = slogan during assembly bombing; meant to 'make the deaf hear'", "SC Bose born 23 January 1897 (Cuttack, Odisha)", "SC Bose died 18 August 1945 at Taihoku (Taipei, Taiwan) in plane crash", "SC Bose = 'Netaji'; appeared ICS 1919; ranked 4th; resigned 1921", "SC Bose: INC President Haripura 1938 + Tripuri 1939", "SC Bose: 'Give me blood, I shall give you freedom' — INA speech", "Gandhi born 2 October 1869 (Porbandar, Gujarat)", "Gandhi assassinated 30 January 1948 by Nathuram Godse (Birla House)", "Gandhi called 'Mahatma' by Rabindranath Tagore (1915)", "'Father of Nation' title first used by SC Bose for Gandhi (1944, Singapore radio)", "Dandi March: 12 March – 6 April 1930; 241 miles; 78 followers", "Gandhi-Irwin Pact 1931: CDM suspended; political prisoners released", "Karachi Congress 1931: Fundamental Rights + Economic Policy resolution (Nehru drafted)", "Patel: Iron Man of India; born 31 Oct 1875; died 15 Dec 1950"], "flashcards": [{"q": "Bhagat Singh — birth date, death date, and how he died?", "a": "Born 28 September 1907 (Layalpur); hanged 23 March 1931 at Lahore Central Jail alongside Rajguru and Sukhdev"}, {"q": "What was the difference between Saunders murder and Assembly bombing (Bhagat Singh)?", "a": "Saunders murder (1928): Bhagat Singh + Rajguru + Chandrashekhar Azad killed British police officer John Saunders; Assembly bombing (8 April 1929): Bhagat Singh + Batukeshwar Dutt threw smoke bombs in Central Legislative Assembly"}, {"q": "SC Bose — when was he INC President and what happened?", "a": "Haripura session 1938 (elected) and Tripuri session 1939 (re-elected defeating Pattabhi Sitaramayya — Gandhi's candidate); resigned in 1939 after clash with Congress high command"}, {"q": "SC Bose — birth, death, and how he died?", "a": "Born 23 January 1897 (Cuttack, Odisha); died 18 August 1945 at Taihoku (Taipei, Taiwan) — reportedly in plane crash (disputed)"}, {"q": "SC Bose's famous speech line?", "a": "'Give me blood, and I shall give you freedom' — said to INA soldiers in Singapore"}, {"q": "Who called Gandhi 'Mahatma' and who called him 'Father of the Nation'?", "a": "'Mahatma' = Rabindranath Tagore (1915); 'Father of the Nation' = first used by Subhash Chandra Bose in a Singapore radio address (1944)"}, {"q": "Dandi March — full facts?", "a": "12 March – 6 April 1930; from Sabarmati Ashram to Dandi (Gujarat); 241 miles (388 km); 78 followers; broke salt law as part of Civil Disobedience Movement"}, {"q": "Karachi Congress 1931 — significance?", "a": "Passed resolution on Fundamental Rights and Economic Policy (drafted by Nehru); Gandhi presided; defined the goals of free India"}, {"q": "How did Gandhi die?", "a": "Assassinated on 30 January 1948 by Nathuram Godse (member of RSS, expelled; Hindu Mahasabha connection) at Birla House, New Delhi, during evening prayers"}, {"q": "What was 'Inquilab Zindabad' and who used it?", "a": "'Long Live the Revolution' — used by Bhagat Singh in Central Legislative Assembly (8 April 1929) when he and Batukeshwar Dutt threw smoke bombs"}], "mcqs": [{"q": "Bhagat Singh was hanged on:", "opts": ["23 March 1930", "23 March 1931", "28 September 1931", "13 April 1931"], "ans": 1, "exp": "Bhagat Singh was hanged on 23 March 1931 at Lahore Central Jail, along with Rajguru and Sukhdev."}, {"q": "Who accompanied Bhagat Singh in throwing bombs in Central Legislative Assembly (1929)?", "opts": ["Rajguru", "Chandrashekhar Azad", "Sukhdev", "Batukeshwar Dutt"], "ans": 3, "exp": "Batukeshwar Dutt accompanied Bhagat Singh in throwing smoke bombs in Central Legislative Assembly on 8 April 1929."}, {"q": "John Saunders was killed (1928) to avenge:", "opts": ["Simon Commission protests", "Lala Lajpat Rai's death", "Jallianwala Bagh massacre", "Partition of Bengal"], "ans": 1, "exp": "John Saunders was killed to avenge the death of Lala Lajpat Rai who had been injured in a police baton charge during Simon Commission protests (November 1928)."}, {"q": "SC Bose was INC President at which two sessions?", "opts": ["Lahore 1929 and Haripura 1938", "Haripura 1938 and Tripuri 1939", "Tripuri 1939 and Karachi 1931", "Karachi 1931 and Haripura 1938"], "ans": 1, "exp": "SC Bose was INC President at Haripura 1938 and Tripuri 1939 — he resigned after clash with Congress high command."}, {"q": "SC Bose's famous speech 'Give me blood, I shall give you freedom' was addressed to:", "opts": ["INC workers at Tripuri", "INA soldiers in Singapore", "Azad Hind government members", "Audience in Berlin, Germany"], "ans": 1, "exp": "This speech was addressed to INA soldiers in Singapore (1943), rallying them for the freedom struggle."}, {"q": "SC Bose died at:", "opts": ["Rangoon, Burma", "Singapore", "Taihoku (Taipei), Taiwan", "Berlin, Germany"], "ans": 2, "exp": "SC Bose died on 18 August 1945 at Taihoku (Taipei, Taiwan) — reportedly in a plane crash, though it remains disputed."}, {"q": "'Mahatma' title was given to Gandhi by:", "opts": ["Jawaharlal Nehru", "Subhash Chandra Bose", "Rabindranath Tagore", "Gopal Krishna Gokhale"], "ans": 2, "exp": "Rabindranath Tagore gave the title 'Mahatma' to Gandhi in 1915."}, {"q": "Gandhi was assassinated by:", "opts": ["Veer Savarkar", "Godse Narayan", "Nathuram Godse", "Muhammad Ali Jinnah"], "ans": 2, "exp": "Gandhi was assassinated on 30 January 1948 by Nathuram Godse at Birla House, New Delhi."}, {"q": "Dandi March covered a distance of approximately:", "opts": ["100 miles", "141 miles", "241 miles", "341 miles"], "ans": 2, "exp": "Dandi March (12 March – 6 April 1930) covered approximately 241 miles (388 km) from Sabarmati Ashram to Dandi, Gujarat."}, {"q": "Karachi Congress (1931) was famous for:", "opts": ["Starting the Civil Disobedience Movement", "Resolution on Fundamental Rights and Economic Policy", "Demanding complete independence (Purna Swaraj)", "Condemning the Partition of Bengal"], "ans": 1, "exp": "Karachi Congress 1931 passed a landmark resolution on Fundamental Rights and Economic Policy (drafted by Nehru) — defining the vision for independent India."}, {"q": "'Father of the Nation' title was first used by:", "opts": ["Rabindranath Tagore", "Lord Mountbatten", "Subhash Chandra Bose (in 1944 Singapore radio)", "Jawaharlal Nehru"], "ans": 2, "exp": "'Father of the Nation' title was first used by SC Bose in a 1944 Singapore radio address referring to Gandhi."}, {"q": "Naujawan Bharat Sabha (1926) was founded by:", "opts": ["Chandrashekhar Azad", "Bhagat Singh", "Bal Gangadhar Tilak", "Lala Lajpat Rai"], "ans": 1, "exp": "Naujawan Bharat Sabha (1926) was founded by Bhagat Singh — a revolutionary youth organization."}, {"q": "Gandhi's Civil Disobedience (Dandi March) — number of followers:", "opts": ["241", "78", "388", "100"], "ans": 1, "exp": "Gandhi started the Dandi March with 78 followers from Sabarmati Ashram (12 March 1930)."}, {"q": "SC Bose ranked __ in ICS exam (1919) before resigning:", "opts": ["1st", "2nd", "4th", "8th"], "ans": 2, "exp": "SC Bose appeared for ICS in 1919 and ranked 4th — then resigned from ICS in 1921 to join the freedom movement."}, {"q": "HSRA (Hindustan Socialist Republican Association) was renamed from:", "opts": ["Naujawan Bharat Sabha", "Indian Republican Army", "Hindustan Republican Association (HRA)", "Anushilan Samiti"], "ans": 2, "exp": "Hindustan Republican Association (HRA) was renamed Hindustan Socialist Republican Association (HSRA) in 1928."}]},
{"id": "ssc_firsts_blast", "label": "Important Firsts & SSC Blast", "icon": "🏆", "xp": 60, "seqIdx": 11, "facts": ["<b>Important Firsts in India</b>: First railway = 16 April 1853 (Bombay VT to Thane, 34 km, Lord Dalhousie); First telegraph = 1851 (Calcutta to Diamond Harbour); First post office = 1766 (under Lord Clive).", "First Indian ICS officer = <b>Satyendranath Tagore</b> (1863, elder brother of Rabindranath Tagore).", "First Indian to become a Judge of High Court = <b>Sarada Charan Mitter</b>.", "First newspaper in India = Bengal Gazette 1780 (Hickey).", "First to introduce English education in India = <b>Serampore Mission (1800)</b> by William Carey.", "First bank in India = Bank of Hindustan (1770); Bank of Bengal (1806, later merged to form Imperial Bank → SBI).", "<b>Moderates vs Extremists</b>: Moderates (1885-1905): Dadabhai Naoroji, Gokhale, Ranade, Pherozeshah Mehta; believed in petitions, prayers, protests; Extremists (1905-1920): Tilak, Lajpat Rai, Bipin Chandra Pal (Lal-Bal-Pal).", "<b>Lal-Bal-Pal</b>: Lala Lajpat Rai (Punjab), Bal Gangadhar Tilak (Maharashtra), Bipin Chandra Pal (Bengal) — trinity of Extremist leaders.", "<b>Surat Split (1907)</b>: INC split into Moderates and Extremists at Surat session; disagreement on method of agitation.", "<b>Swadeshi Movement (1905-11)</b>: Started as reaction to Partition of Bengal; used swadeshi goods, boycott of foreign goods, passive resistance.", "<b>Gopal Krishna Gokhale</b>: Called 'Political Guru of Gandhi'; founded Servants of India Society (1905); believed in constitutional methods.", "<b>Lokmanya Tilak</b>: 'Swaraj is my birthright and I shall have it'; Kesari + Mahratta; Ganapati Festival (1893) and Shivaji Festival (as national events); called 'Bal Gangadhar Tilak'; born 1856, died 1920.", "<b>Post-Independence key dates</b>: India becomes Republic = 26 January 1950; 1st General Elections = 1951-52; 1st Five Year Plan = 1951-56; Green Revolution = 1960s-70s (Norman Borlaug + M.S. Swaminathan); {"id": "master_history_4", "label": "⭐ Master Challenge: Modern History Part 4", "icon": "⭐", "xp": 200, "seqIdx": 12, "type": "gold", "requires_pct": 80, "goldFacts": ["Regulating Act 1773 = 1st Parliamentary control; Warren Hastings = 1st GG of Bengal; Supreme Court Calcutta established 1774.", "Pitt's India Act 1784 = Board of Control (political) + Court of Directors (commercial); Dual Government.", "Charter Act 1813 = End of EIC's trade monopoly in India; ₹1 lakh for education; missionaries allowed.", "Charter Act 1833 = Company admin only; 1st GG of INDIA = Lord William Bentinck; Macaulay = 1st Law Member; Slavery abolished.", "Charter Act 1853 = LAST Charter Act; ICS open competition; Legislative Council separated from Executive.", "Morley-Minto 1909 = Separate electorate for Muslims; Central Council 16→60; SP Sinha = 1st Indian in Viceroy's Executive Council.", "GoI Act 1919 = Dyarchy in provinces; Reserved (Finance/Police/Justice/Irrigation/Land) vs Transferred (Education/Health/Agriculture/Public Works/Local Self-Govt); Council of State (60) + CLA (144).", "GoI Act 1935 = Provincial autonomy; Dyarchy at CENTRE; Federal Court; RBI; FPSC; Burma separated; Congress won 7 provinces 1937.", "Subsidiary Alliance (Wellesley 1798): Nizam 1st (1798); Peshwa/Bassein 1802; Ranjit Singh NEVER signed.", "Doctrine of Lapse (Dalhousie): 7 states — Satara 1848 1st; Jhansi 1853 (Rani Lakshmi Bai's son not recognized); Awadh 1856 = misgovernance NOT lapse; Canning withdrew it 1858.", "Raja Ram Mohan Roy: born 1772; died 1833 Bristol; 'Raja' title from Akbar II; Brahmo Sabha 1828; Sambad Kaumudi 1821; Mirat-ul-Akbar 1822; Sati abolished 1829 (Bentinck).", "Wood's Dispatch 1854 = 'Magna Carta of English Education'; Charles Wood; led to 3 universities 1857 (Bombay, Calcutta, Madras).", "562 Princely States; Sardar Patel = Iron Man + Bismarck; VP Menon drafted Instrument of Accession (3 subjects: Defence, External Affairs, Communications).", "Hyderabad = Operation Polo 13-17 Sep  BENGAL (1773)!", "⚠️ TRAP: ICS open exam implemented from Charter Act 1853 — 1833 only PROPOSED it!", "⚠️ TRAP: Morley-Minto 1909 = separate Muslim electorate; Montagu-Chelmsford 1919 = Dyarchy! Don't swap!", "⚠️ TRAP: Dyarchy in PROVINCES = 1919 Act; Dyarchy at CENTRE = 1935 Act — they're OPPOSITE!", "⚠️ TRAP: Awadh 1856 = MISGOVERNANCE (NOT Doctrine of Lapse) — Nawab Wajid Ali Shah had an heir!", "⚠️ TRAP: INA FOUNDED by Ras Bihari Bose (1942) — SC Bose REVIVED it (1943)!", "⚠️ TRAP: Assembly bombing (1929) = Bhagat Singh + BATUKESHWAR DUTT; Saunders murder (1928) = Bhagat Singh + Rajguru + Azad!", "⚠️ TRAP: 'Mahatma' = given by Tagore (1915); 'Father of Nation' = SC Bose used it for Gandhi (1944 Singapore radio)!", "⚠️ TRAP: Constitution ADOPTED 26 November 1949 — EFFECTIVE 26 January 1950! Don't confuse!", "⚠️ TRAP: Rajendra Prasad = Constituent Assembly PRESIDENT; Ambedkar = Drafting Committee CHAIRMAN!", "⚠️ TRAP: VPA 1878 targeted VERNACULAR press; English press was EXEMPT from it!", "⚠️ TRAP: Metcalfe = 'Liberator of Press' (1835); Ripon REPEALED VPA (1882) — two different events!", "⚠️ TRAP: Santhal Revolt = Sidhu & Kanhu (brothers); Munda Revolt = Birsa Munda — DON'T SWAP!", "⚠️ TRAP: Title 'Raja' given to RRR by Mughal Emperor AKBAR II — NOT by British!", "⚠️ TRAP: Radcliffe Award announced 17 August 1947 — AFTER both India and Pakistan independence (14/15 Aug)!"], "goldMCQs": [{"q": "Which Charter Act made the East India Company a purely administrative body?", "opts": ["Charter Act 1793", "Charter Act 1813", "Charter Act 1833", "Charter Act 1853"], "ans": 2, "exp": "Charter Act 1833 — Company ceased to be a trading body and became purely administrative. Lord William Bentinck became 1st GG of India (not just Bengal)."}, {"q": "Morley-Minto Reforms (1909) are significant because they introduced:", "opts": ["Dyarchy in provinces", "Separate electorate for Muslims", "Provincial autonomy", "Federal Court"], "ans": 1, "exp": "Morley-Minto Reforms (1909) introduced separate electorate for Muslims — seeds of Partition; also enlarged Central Council from 16 to 60 members."}, {"q": "GoI Act 1935: Which of these is CORRECT?", "opts": ["Dyarchy introduced in provinces (same as 1919)", "Federal Court established; RBI established; Burma separated", "All-India Federation implemented in 1937", "Separate electorates abolished"], "ans": 1, "exp": "GoI Act 1935: Federal Court established; RBI established; Burma separated. Dyarchy was at CENTRE (not provinces). Federation was proposed but NEVER implemented."}, {"q": "Under Doctrine of Lapse, Awadh (1856) was actually annexed on grounds of:", "opts": ["No natural heir", "No adopted heir", "Subsidiary Alliance violation", "Misgovernance by the Nawab"], "ans": 3, "exp": "Awadh was NOT annexed under Doctrine of Lapse — Nawab Wajid Ali Shah had an heir. It was annexed for misgovernance — a major cause of 1857 revolt."}, {"q": "The title 'Raja' was given to Raja Ram Mohan Roy by:", "opts": ["Lord William Bentinck", "British Parliament", "Mughal Emperor Akbar II", "Indian National Congress"], "ans": 2, "exp": "Mughal Emperor Akbar II gave RRR the title 'Raja' when RRR went to England (1831) to represent the Mughal Emperor's cause."}, {"q": "Operation Polo (1948) to integrate Hyderabad was commanded by:", "opts": ["Major General Thimayya", "Major General JN Chaudhury", "Lt General Cariappa", "Field Marshal Manekshaw"], "ans": 1, "exp": "Operation Polo (13-17 September 1948) was commanded by Major General JN Chaudhury. It lasted 4 days."}, {"q": "Vernacular Press Act 1878 — which press was EXEMPT?", "opts": ["Urdu press", "Hindi press", "Bengali press", "English press"], "ans": 3, "exp": "English press was completely EXEMPT from Vernacular Press Act 1878 — it targeted only vernacular (Indian language) press. That's why it was called discriminatory."}, {"q": "Who founded INA in 1942 (before SC Bose took over)?", "opts": ["Subhash Chandra Bose", "Shah Nawaz Khan", "Ras Bihari Bose", "Captain Mohan Singh"], "ans": 2, "exp": "INA was founded by Ras Bihari Bose in September 1942. SC Bose reorganized and revived it in 1943 after escaping to Singapore."}, {"q": "Bhagat Singh + Batukeshwar Dutt threw bombs in Central Legislative Assembly to:", "opts": ["Kill British officials", "Protest against Simon Commission", "Make the deaf hear (attract attention to labour bills)", "Avenge Lala Lajpat Rai's death"], "ans": 2, "exp": "The Assembly bombing (8 April 1929) was to 'make the deaf hear' — to attract attention to bills against labour. Bhagat Singh said bombs were thrown to make noise, not to kill."}, {"q": "Constitution of India was adopted on:", "opts": ["26 January 1950", "15 August 1947", "24 January 1950", "26 November 1949"], "ans": 3, "exp": "Constitution was adopted on 26 November 1949 (Constitution Day); came into effect on 26 January 1950 (Republic Day)."}, {"q": "Gandhi's Dandi March (1930) was from Sabarmati to Dandi — how many followers started?", "opts": ["241", "78", "388", "36"], "ans": 1, "exp": "Gandhi started with 78 followers from Sabarmati Ashram on 12 March 1930; they walked 241 miles to Dandi."}, {"q": "Ryotwari system was introduced in Bombay and Madras by:", "opts": ["Lord Cornwallis", "Thomas Munro", "Lord Bentinck", "Lord Dalhousie"], "ans": 1, "exp": "Thomas Munro introduced Ryotwari system in 1820 in Bombay and Madras Presidencies — direct settlement with peasants/ryots."}, {"q": "Santhal Revolt (1855-56) was led by:", "opts": ["Birsa Munda", "Sidhu and Kanhu", "Tirot Singh", "Phulo and Jhano"], "ans": 1, "exp": "Santhal Revolt ('Santhal Hul', 1855-56) was led by brothers Sidhu and Kanhu — NOT Birsa Munda (who led the Munda Revolt 1899-1900)."}, {"q": "Wavell Plan (1945) failed because:", "opts": ["Congress refused to participate", "Jinnah demanded ML nominate all Muslim members", "Britain changed the proposal", "Gandhi started a fast"], "ans": 1, "exp": "Wavell Plan failed because Jinnah insisted Muslim League alone should nominate ALL
