<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#130A0A;--bg2:#0A0505;--panel:#2A1010;--panel2:#3D1818;--line:#5C2525;
  --ink:#ECD4D4;--ink2:#CC9090;--ink3:#885555;
  --gold:#FCA5A5;--gold2:#CC2222;--gold-glow:rgba(252,165,165,.18);
  --amber:#FBBF24;--gold-bg:rgba(252,165,165,.09);
  --red:#f87171;--red-bg:rgba(248,113,113,.12);--blue:#93C5FD;--green:#4ade80;
}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;}
#topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:.6rem 1rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;flex-shrink:0;}
#menu-btn{background:none;border:none;color:var(--ink);font-size:1.4rem;cursor:pointer;padding:.2rem;}
#tb-title{flex:1;font-weight:700;font-size:.95rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#tb-xp{color:var(--amber);font-weight:700;font-size:.9rem;white-space:nowrap;}
#tb-pct{color:var(--green);font-weight:700;font-size:.9rem;white-space:nowrap;}
#layout{display:flex;flex:1;overflow:hidden;}
#aside{display:none;width:280px;background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;flex-shrink:0;transition:transform .25s;}
#sidebar-inner{padding:.5rem;}
#main{flex:1;overflow-y:auto;padding:1rem;}
#node-content{max-width:900px;margin:0 auto;}
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;}
#drawer-overlay.show{display:block;}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--panel2);color:var(--ink);padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;}
#toast.show{opacity:1;}
.node-item{display:flex;align-items:center;gap:.6rem;padding:.6rem .7rem;border-radius:8px;cursor:pointer;margin-bottom:.3rem;transition:background .2s;border:1px solid transparent;}
.node-item:hover{background:var(--panel);}
.node-item.locked{opacity:.5;cursor:not-allowed;}
.node-item.gold-node{border-color:var(--gold);background:var(--gold-bg);}
.node-icon{font-size:1.2rem;flex-shrink:0;}
.node-info{flex:1;min-width:0;}
.node-label{font-size:.82rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.node-xp{font-size:.75rem;color:var(--amber);white-space:nowrap;}
.prog-bar{height:4px;background:var(--panel2);border-radius:2px;margin-top:.3rem;}
.prog-fill{height:100%;background:var(--gold2);border-radius:2px;transition:width .4s;}
.tab-bar{display:flex;gap:.4rem;margin-bottom:1rem;border-bottom:2px solid var(--line);padding-bottom:.6rem;}
.tab-btn{padding:.45rem .9rem;border:none;border-radius:6px;cursor:pointer;font-size:.83rem;font-weight:600;background:var(--panel);color:var(--ink2);transition:all .2s;}
.tab-btn.active{background:var(--gold2);color:#fff;}
.learn-body{display:flex;flex-direction:column;gap:1rem;}
.score-badge{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.5rem 1rem;font-size:.85rem;color:var(--ink2);}
h2{color:var(--gold);font-size:1.3rem;margin:.3rem 0;}
h3{color:var(--gold);font-size:1rem;margin:.5rem 0;}
.fact-item{background:var(--panel);border-left:3px solid var(--gold2);padding:.6rem .9rem;border-radius:0 6px 6px 0;font-size:.88rem;line-height:1.5;margin-bottom:.4rem;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.83rem;}
th{background:var(--panel2);color:var(--gold);padding:.5rem .7rem;text-align:left;border:1px solid var(--line);}
td{padding:.45rem .7rem;border:1px solid var(--line);color:var(--ink2);}
tr:nth-child(even)td{background:var(--bg2);}
.mnemonic-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;font-size:.87rem;line-height:1.6;color:var(--ink);}
.traps-section,.revision-section,.oneliners-section{background:var(--panel);border-radius:8px;padding:.8rem 1rem;}
.trap-item{background:var(--red-bg);border-left:3px solid var(--red);padding:.5rem .8rem;border-radius:0 6px 6px 0;font-size:.84rem;margin-bottom:.4rem;color:var(--ink);}
.revision-section ul{list-style:none;padding:0;}
.revision-section li{padding:.3rem 0;border-bottom:1px solid var(--line);font-size:.84rem;color:var(--ink2);}
.revision-section li::before{content:'✓ ';color:var(--green);}
.oneliner{padding:.3rem 0;border-bottom:1px solid var(--line);font-size:.83rem;color:var(--ink2);}
.flash-body{display:flex;flex-direction:column;gap:1rem;padding:1rem 0;}.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.8rem;width:100%;}.flip-hint{font-size:.7rem;color:var(--ink3);margin-top:.6rem;}
.flash-counter{color:var(--ink2);font-size:.85rem;}
.flash-card{width:100%;height:175px;perspective:1000px;cursor:pointer;position:relative;}
.flash-front,.flash-back{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:1.2rem;border-radius:12px;backface-visibility:hidden;transition:transform .4s;}
.flash-front{background:var(--panel);border:2px solid var(--gold);transform:rotateY(0deg);}
.flash-back{background:var(--panel2);border:2px solid var(--green);transform:rotateY(180deg);}
.flash-card.flipped .flash-front{transform:rotateY(-180deg);}
.flash-card.flipped .flash-back{transform:rotateY(0deg);}
.flash-q{font-size:.95rem;font-weight:600;color:var(--gold);}
.flash-a{font-size:.9rem;color:var(--green);}
.flip-hint{font-size:.75rem;color:var(--ink3);margin-top:.5rem;}
.flash-nav{display:flex;gap:1rem;}
.flash-nav button{padding:.5rem 1.2rem;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;cursor:pointer;}
.flash-nav button:disabled{opacity:.4;cursor:not-allowed;}
.test-body{display:flex;flex-direction:column;gap:1rem;}
.q-block{background:var(--panel);border-radius:8px;padding:.8rem 1rem;}
.q-block.correct{border-left:4px solid var(--green);}
.q-block.wrong{border-left:4px solid var(--red);}
.q-text{font-size:.9rem;font-weight:600;margin-bottom:.6rem;color:var(--ink);}
.opts{display:flex;flex-direction:column;gap:.4rem;}
.opt-label{display:flex;align-items:center;gap:.6rem;padding:.4rem .7rem;border-radius:6px;font-size:.85rem;cursor:pointer;border:1px solid var(--line);color:var(--ink2);transition:background .2s;}
.opt-label:hover{background:var(--panel2);}
.opt-label.selected{background:var(--panel2);border-color:var(--gold);color:var(--ink);}
.opt-label.right-ans{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green);}
.opt-label.wrong-ans{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.opt-label input[type=radio]{accent-color:var(--gold);}
.exp-box{font-size:.82rem;color:var(--ink2);background:var(--bg2);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;}
.submit-btn{padding:.7rem 1.5rem;background:var(--gold2);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:opacity .2s;}
.submit-btn:hover{opacity:.85;}
.gold-submit{background:linear-gradient(135deg,#b91c1c,#dc2626);}
.result-banner{padding:1rem;border-radius:8px;text-align:center;font-size:1.1rem;font-weight:700;}
.result-banner.pass{background:rgba(74,222,128,.15);color:var(--green);border:1px solid var(--green);}
.result-banner.fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.gold-header{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.gold-header span:first-child{color:var(--gold);font-weight:700;font-size:1rem;}
.gold-header span:last-child{color:var(--amber);font-weight:700;}
.gold-facts-ticker{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:.6rem .9rem;font-size:.78rem;color:var(--ink2);margin-bottom:1rem;max-height:90px;overflow-y:auto;line-height:1.6;}
.gold-traps{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:.8rem 1rem;margin-top:1rem;}
.gold-locked-msg{text-align:center;padding:3rem 2rem;color:var(--ink2);}
.gold-locked-msg h2{color:var(--gold);margin:1rem 0;}
.welcome-panel{text-align:center;padding:3rem 2rem;color:var(--ink2);}
.welcome-panel h1{color:var(--gold);font-size:1.8rem;margin-bottom:.8rem;}
.welcome-stats{display:flex;gap:1.5rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;}
.welcome-stats div{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:.5rem 1rem;font-size:.85rem;}
@media(min-width:769px){
  #aside{display:flex;flex-direction:column}
}
@media(max-width:768px){
  #aside.open{display:block;position:fixed;top:0;left:0;height:100%;width:280px;z-index:200}
  #main{padding:.7rem;}
}
</style>

const CHAPTERS=[{"id": "charter_acts", "label": "Charter Acts 1773–1853", "icon": "📜", "xp": 60, "seqIdx": 0, "facts": ["<b>Regulating Act (1773)</b> — 1st step by British Parliament to control EIC; Governor of Bengal became <b>Governor-General of Bengal</b>; <b>Warren Hastings = 1st GG</b>; Supreme Court established at Calcutta (1774).", "<b>Pitt's India Act (1784)</b> — Named after PM William Pitt the Younger; political & commercial functions separated; <b>Board of Control</b> (political) created + Court of Directors (commercial); India = 'joint government' (dual control).", "<b>Act of 1786</b> — GG given powers of <b>Commander-in-Chief</b>; Lord Cornwallis used this to consolidate power.", "<b>Charter Act 1793</b> — Company's monopoly <b>retained 20 more years</b>; GG given more overriding powers over Council; salaries of Board of Control to be paid from Indian revenues.", "<b>Charter Act 1813</b> ← KEY SSC: <b>End of Company's trade monopoly in India</b> (retained only for China & tea trade); Christian missionaries allowed in India; <b>₹1 lakh allocated</b> for Indian education; separate accounts for commercial & territorial revenues.", "<b>Charter Act 1833</b> ← KEY SSC: Company <b>ceased to be a trading body</b> — became purely administrative; <b>1st Governor-General of INDIA</b> (not just Bengal) — Lord William Bentinck was 1st; Law Commission formed — <b>Macaulay as 1st Law Member</b>; abolished slavery in India; laws now called 'Acts' (previously 'Regulations').", "<b>Charter Act 1853</b> ← KEY SSC: <b>Last Charter Act</b> — Company's rule extended without time limit; <b>Open competition for ICS introduced</b> (landmark); Legislative Council <b>separated from Executive Council</b> for 1st time; 6 new members added; first time Indians to be appointed to Legislative Council.", "Quick memory: Regulating Act 1773 = 1st Parliamentary control; Pitt's 1784 = Board of Control; 1793 = Monopoly retained; 1813 = Monopoly ended; 1833 = Company admin only + 1st GG of India; 1853 = Last + ICS open exam.", "<b>Lord Cornwallis</b> used the Act of 1786 to combine GG + Commander-in-Chief powers; he also introduced Permanent Settlement (1793) and is called 'Father of Civil Services.'", "The 1813 Charter Act allocated <b>₹1 lakh</b> for education — this later led to debates on Oriental vs Western education (Macaulay's Minute 1835).", "Charter Act 1833 also proposed <b>competitive examination for ICS</b> — but was NOT implemented then; actual open ICS exam only started after Charter Act 1853.", "Warren Hastings (1st GG under Regulating Act) was impeached by the British Parliament — Burkean trial (1788-1795) — but acquitted.", "<b>Macaulay's Minute (1835)</b>: Argued for English as medium of instruction; famous quote aimed to create 'a class of persons, Indian in blood and colour, but English in taste, opinions, morals, and intellect.' Macaulay also drafted Indian Penal Code (IPC), enacted 1860.", "After Charter Act 1858 (not a Charter Act — Government of India Act 1858): EIC abolished, Crown took over; <b>1st Viceroy of India = Lord Canning</b> (1858).", "The term <b>'Governor-General of India'</b> (not just Bengal) was created by Charter Act 1833; first holder = Lord William Bentinck."], "table": "<table><thead><tr><th>Act</th><th>Year</th><th>Key Feature</th></tr></thead><tbody><tr><td>Regulating Act</td><td>1773</td><td>1st Parliamentary control; GG of Bengal; Supreme Court Calcutta</td></tr><tr><td>Pitt's India Act</td><td>1784</td><td>Board of Control; Dual Govt; Company subordinated to British Govt</td></tr><tr><td>Act</td><td>1786</td><td>GG = Commander-in-Chief; Lord Cornwallis</td></tr><tr><td>Charter Act</td><td>1793</td><td>Monopoly retained 20 yrs; GG overriding powers</td></tr><tr><td>Charter Act</td><td>1813</td><td>Monopoly ENDED; missionaries allowed; ₹1 lakh education</td></tr><tr><td>Charter Act</td><td>1833</td><td>Company = admin only; 1st GG of India (Bentinck); Macaulay; Slavery abolished</td></tr><tr><td>Charter Act</td><td>1853</td><td>LAST Charter Act; ICS open exam; Leg Council separated from Executive</td></tr></tbody></table>", "mn": "<b>RPP-CAB-C Sequence (Charter Acts):</b><br>📜 <b>R</b>egulating 1773 (1st control) → <b>P</b>itt's 1784 (Board of Control) → <b>P</b>owers 1786 (CinC) → <b>C</b>harter 1793 (monopoly retained) → <b>A</b>cts 1813 (monopoly ended; ₹1 lakh) → <b>B</b>entinck 1833 (1st GG of India; company admin) → <b>C</b>ompetitive ICS 1853 (last Charter Act)", "traps": ["⚠️ Charter Act 1833 → 1st GG of INDIA (not Bengal) = Lord William BENTINCK; GG of Bengal was Warren Hastings under 1773!", "⚠️ Charter Act 1853 introduced ICS open exam — NOT 1833! (1833 only PROPOSED it but didn't implement)!", "⚠️ Monopoly in India ENDED in 1813 — retained only for China & tea! Complete end was 1833!", "⚠️ Macaulay was Law Member under CHARTER ACT 1833 (not Regulating Act or Pitt's Act)!", "⚠️ Board of Control (political) = Pitt's India Act 1784; Court of Directors = commercial — don't mix them up!", "⚠️ Lord Cornwallis used Act of 1786 (combined GG + CinC) — He is Father of Civil Services, NOT Warren Hastings!"], "revision": ["1773 Regulating Act = 1st Parliamentary control; Warren Hastings 1st GG of Bengal", "1784 Pitt's India Act = Board of Control + Court of Directors; Dual Govt", "1786 = GG gets Commander-in-Chief powers (Lord Cornwallis)", "1793 Charter = Monopoly retained 20 more years", "1813 Charter = Trade monopoly ended; ₹1 lakh education; missionaries", "1833 Charter = Company admin only; 1st GG of India = Bentinck; Macaulay; Slavery abolished", "1853 Charter = Last; ICS open competition; Legislative Council separated", "1858 GoI Act = Crown rule; 1st Viceroy = Lord Canning", "Macaulay's Minute 1835 = English medium; drafted IPC (enacted 1860)", "Board of Control (1784) = political; Court of Directors = commercial"], "oneliners": ["Regulating Act 1773 = 1st Parliamentary control over EIC", "Warren Hastings = 1st GG under Regulating Act 1773", "Supreme Court Calcutta established 1774 (Regulating Act)", "Pitt's India Act 1784 = Board of Control + Dual Government", "1813 Charter = End of trade monopoly in India; ₹1 lakh for education", "1833 Charter = Company = admin only; 1st GG of India = Lord Bentinck", "Macaulay = 1st Law Member (Charter Act 1833); drafted IPC", "1853 Charter = Last; ICS open competition; Legislative separated from Executive", "Act of 1786 = GG given Commander-in-Chief powers (used by Cornwallis)", "1793 Charter = Company monopoly retained 20 more years", "Cornwallis = Father of Civil Services; Permanent Settlement 1793", "ICS open exam first implemented AFTER Charter Act 1853", "1833 Charter abolished slavery in India (full effect: Act V of 1843)", "Macaulay's quote: 'Indian in blood... but English in taste'", "Laws renamed from 'Regulations' to 'Acts' by Charter Act 1833", "Board of Control = political; Court of Directors = commercial (Pitt's 1784)", "GoI Act 1858 = Crown Rule; EIC abolished; Lord Canning = 1st Viceroy", "1813 Charter = Christian missionaries allowed into India", "Warren Hastings was impeached (1788-95) but acquitted", "6 new members added to GG's council for legislation (Charter Act 1853)"], "flashcards": [{"q": "Which Act first gave the British Parliament control over the EIC?", "a": "Regulating Act 1773 — 1st step by Parliament to control East India Company; Warren Hastings became 1st GG of Bengal"}, {"q": "Pitt's India Act 1784 — what two bodies did it create?", "a": "Board of Control (political matters) + Court of Directors (commercial); created 'dual government'"}, {"q": "What did Charter Act 1813 do to EIC's trade monopoly?", "a": "Ended EIC's trade monopoly in India; retained only for China & tea trade; also allowed Christian missionaries and allocated ₹1 lakh for education"}, {"q": "Charter Act 1833 — 3 key features?", "a": "1) Company became admin-only (ceased trading); 2) Created 1st GG of India (Bentinck); 3) Law Commission formed with Macaulay as 1st Law Member"}, {"q": "C IC's trade monopoly in India but retained it for:", "opts": ["Tea trade only", "China and tea trade", "All trade with Asia", "No exception; monopoly fully ended"], "ans": 1, "exp": "EIC's trade monopoly in India was ended by Charter Act 1813, but retained only for trade with China and the tea trade."}, {"q": "The 1st Governor-General of INDIA (not just Bengal) was:", "opts": ["Warren Hastings", "Lord Cornwallis", "Lord William Bentinck", "Lord Canning"], "ans": 2, "exp": "Lord William Bentinck became the 1st Governor-General of India under Charter Act 1833, which upgraded the title from 'GG of Bengal.'"}, {"q": "Macaulay was appointed as the first Law Member under:", "opts": ["Regulating Act 1773", "Pitt's India Act 1784", "Charter Act 1833", "Charter Act 1853"], "ans": 2, "exp": "Charter Act 1833 created a Law Commission and appointed Thomas Babington Macaulay as the 1st Law Member."}, {"q": "Open competitive examination for ICS was FIRST IMPLEMENTED after:", "opts": ["Charter Act 1813", "Charter Act 1833", "Charter Act 1853", "GoI Act 1858"], "ans": 2, "exp": "Charter Act 1853 introduced open competition for ICS. Charter Act 1833 only proposed it but did not implement it."}, {"q": "Charter Act 1853 is landmark because it first separated:", "opts": ["Executive Council from Viceroy", "Legislative Council from Executive Council", "Board of Control from Parliament", "Board of Directors from Board of Control"], "ans": 1, "exp": "For the first time, the Legislative Council was separated from the Executive Council under Charter Act 1853."}, {"q": "The 'Act of 1786' is known for:", "opts": ["Creating Supreme Court", "Giving GG powers of Commander-in-Chief", "Ending Company monopoly", "Creating Board of Control"], "ans": 1, "exp": "The Act of 1786 gave the Governor-General combined powers of Commander-in-Chief. Lord Cornwallis used this."}, {"q": "Charter Act 1833 abolished:", "opts": ["Board of Control", "ICS exam", "Slavery in India", "Indian languages for laws"], "ans": 2, "exp": "Charter Act 1833 abolished slavery in India (though full effect came via Act V of 1843)."}, {"q": "₹1 lakh for promotion of Indian education was allocated by:", "opts": ["Regulating Act 1773", "Charter Act 1813", "Charter Act 1833", "Wood's Dispatch 1854"], "ans": 1, "exp": "Charter Act 1813 allocated ₹1 lakh (one lakh rupees) for promotion of Indian education."}, {"q": "Macaulay's famous quote aimed to create people 'Indian in blood and colour but English in':", "opts": ["Law and administration", "Taste, opinions, morals, and intellect", "Language and customs", "Religion and culture"], "ans": 1, "exp": "Macaulay's Minute (1835) aimed to create 'a class of persons, Indian in blood and colour, but English in taste, opinions, in morals, and in intellect.'"}, {"q": "The last Charter Act before Crown took over was:", "opts": ["Charter Act 1833", "Charter Act 1853", "Charter Act 1793", "GoI Act 1858"], "ans": 1, "exp": "Charter Act 1853 was the last Charter Act. After the 1857 revolt, the Crown took over via Government of India Act 1858."}, {"q": "Board of Control introduced by Pitt's India Act 1784 handled:", "opts": ["Commercial affairs", "Political affairs of India", "Both commercial and political", "ICS recruitment"], "ans": 1, "exp": "Board of Control handled political affairs; the Court of Directors continued to handle commercial affairs — this is why it was called 'dual government.'"}, {"q": "The 1st Viceroy of India after Crown Rule was:", "opts": ["Lord Dalhousie", "Lord Canning", "Lord Cornwallis", "Lord Chelmsford"], "ans": 1, "exp": "Lord Canning became the 1st Viceroy of India under the Government of India Act 1858, after Crown took over from the EIC."}]}, {"id": "constitutional_acts_1861_1919", "label": "Constitutional Acts 1861–1919", "icon": "⚖️", "xp": 60, "seqIdx": 1, "facts": ["<b>Indian Councils Act 1861</b>: Legislative Councils enlarged; non-official Indians nominated; <b>Portfolio system introduced</b> (Cabinet system in embryo); Viceroy could issue ordinances for 6 months; Bombay & Madras got back legislative councils. Passed during <b>Lord Canning's</b> tenure.", "<b>Indian Councils Act 1892</b>: Enlarged legislative councils; <b>Indirect elections introduced</b> (though word 'election' not used); members could discuss budget & ask questions.", "<b>Indian Councils Act 1909 (Morley-Minto Reforms)</b> ← HIGH SSC: Lord Morley (Secretary of State) + Lord Minto (Viceroy); Central Legislative Council enlarged from <b>16 → 60</b>; <b>Separate electorate for Muslims introduced</b>; Indians allowed in Viceroy's Executive Council for 1st time.", "<b>Satyendra Prasad Sinha</b> = 1st Indian in Viceroy's Executive Council (as Law Member, 1909); also 1st Indian to become Governor of Bihar (under Lord Chelmsford).", "Morley-Minto criticism: Congress called separate electorate 'divisive'; Gokhale called it 'most serious mistake'; critics called it 'divide and rule' — seed of Partition.", "<b>GoI Act 1919 (Montagu-Chelmsford Reforms)</b> ← KEY: Lord Montagu (Secretary of State) + Lord Chelmsford (Viceroy); <b>Dyarchy introduced in provinces</b>.", "<b>Dyarchy Reserved Subjects</b> (under Governor — NOT responsible to legislature): Finance, Police, Justice/Law & Order, Irrigation, Land Revenue.", "<b>Dyarchy Transferred Subjects</b> (under Ministers — responsible to legislature): Education, Health, Agriculture, Public Works, Local Self-Govt.", "<b>Bicameral Legislature at Centre</b> (1919 Act): Upper House → <b>Council of State</b> (60 members); Lower House → <b>Central Legislative Assembly</b> (144 members).", "1919 Act: Communal electorate extended to Sikhs, Christians, Anglo-Indians; franchise extended (limited property-based); <b>Secretary of State's salary from British funds</b> (not Indian revenue).", "<b>10-year review provision</b> in 1919 Act → led to <b>Simon Commission (1927)</b>.", "Moderates called 1919 Act 'Magna Carta of India'; <b>Tilak called it 'Morning without Sun'</b>.", "<b>August Declaration (1917)</b> — precursor to 1919 reforms: Montagu declared British policy was 'increasing association of Indians in every branch of administration' and 'gradual development of self-governing institutions.' Used term 'responsible government.'", "<b>Dyarchy failed</b>: Reserved subjects more important than transferred; neither Congress nor ML satisfied; Simon Commission (1927) set up to review it.", "Indian Councils Act 1861 passed during Lord Canning's tenure — same Viceroy who presided over 1857 revolt aftermath; called 'Clemency Canning' for his moderate approach post-revolt."], "table": "<table><thead><tr><th>Act</th><th>Year</th><th>Key Feature</th><th>Viceroy/SoS</th></tr></thead><tbody><tr><td>Indian Councils Act</td><td>1861</td><td>Portfolio system; non-official Indians; Bombay+Madras councils restored</td><td>Lord Canning</td></tr><tr><td>Indian Councils Act</td><td>1892</td><td>Indirect elections; budget discussion allowed</td><td>—</td></tr><tr><td>Morley-Minto Reforms</td><td>1909</td><td>Separate electorate for Muslims; Central Council 16→60; SP Sinha</td><td>Morley+Minto</td></tr><tr><td>Montagu-Chelmsford Reforms</td><td>1919</td><td>Dyarchy in provinces; Bicameral legislature; 10-yr review → Simon Commission</td><td>Montagu+Chelmsford</td></tr></tbody></table>", "mn": "<b>1861-1892-1909-1919 (Councils to Dyarchy):</b><br>⚖️ <b>1861</b>: Portfolio system (Canning) → <b>1892</b>: Indirect elections → <b>1909</b>: Separate Muslim electorate (Morley-Minto) → <b>1919</b>: Dyarchy (Montagu-Chelmsford)<br>Dyarchy mnemonic: <b>F-P-J-I-L</b> = Reserved (Finance, Police, Justice, Irrigation, Land) | <b>E-H-A-P-L</b> = Transferred (Education, Health, Agriculture, Public works, Local self-govt)", "traps": ["⚠️ Separate electorate for Muslims = Morley-MINTO 1909 (NOT Montagu-Chelmsford 1919)!", "⚠️ Dyarchy was introduced in PROVINCES by 1919 Act; introduced at CENTRE by 1935 Act (opposite)!", "⚠️ Satyendra Prasad Sinha = 1st Indian in Viceroy's Executive Council (1909) — NOT in Legislative Council!", "⚠️ 10-year review in 1919 Act led to SIMON COMMISSION 1927 (set up 1927, came to India 1928)!", "⚠️ Tilak called 1919 Act 'Morning without Sun' — Moderates called it 'Magna Carta of India' — DON'T SWAP!", "⚠️ Council of State (Upper) = 60 members; Central Legislative Assembly (Lower) = 144 members (1919 Act)!"], "revision": ["1861 Councils Act = Portfolio system; Canning; Bombay + Madras councils restored", "1892 Councils Act = Indirect elections (first time); budget discussion allowed", "1909 Morley-Minto = Separate Muslim electorate; Central Council 16→60; SP Sinha 1st Indian in EC", "1919 Montagu-Chelmsford = Dyarchy in provinces; Bicameral legislature at Centre", "Reserved subjects (1919): Finance, Police, Justice, Irrigation, Land Revenue", "Transferred subjects (1919): Education, Health, Agriculture, Public Works, Local Self-Govt", "Council of State (Upper, 60) + Central Legislative Assembly (Lower, 144) — 1919 Act", "10-year review → Simon Commission 1927", "Tilak: 'Morning without Sun'; Moderates: 'Magna Carta of India'", "August Declaration 1917 = Montagu's promise of responsible govt for Indians"], "oneliners": ["1861 Councils Act = Portfolio system introduced; Lord Canning", "1892 Councils Act = Indirect elections (word 'election' not used)", "1909 Morley-Minto = Separate Muslim electorate; seed of Partition", "SP Sinha = 1st Indian in Viceroy's Executive Council (1909, Law Member)", "1919 Montagu-Chelmsford = Dyarchy in provinces", "Reserved = Finance, Police, Justice, Irrigation, Land Revenue (Governor)", "Transferred = Education, Health, Agriculture, Public Works, Local Self-Govt (Ministers)", "1919 Act: Council of State (60) + Central Legislative Assembly (144)", "10-year review in 1919 → Simon Commission 1927", "Tilak called 1919 Act 'Morning without Sun'", "Moderates called 1919 Act 'Magna Carta of India'", "Dyarchy failed: reserved subjects more important than transferred", "August Declaration 1917 = 'responsible government' promise by Montagu", "Communal electorate extended to Sikhs, Christians, Anglo-Indians (1919)", "Secretary of State's salary from BRITISH funds (not Indian) — 1919 Act", "Morley-Minto: Gokhale called separate electorate 'most serious mistake'", "SP Sinha later became 1st Indian Governor of Bihar (under Chelmsford)", "Indian Councils Act 1861: Viceroy could issue ordinances (6 months validity)", "1892 Act: Members could discuss budget (first time)", "Portfolio system 1861 = embryo of Cabinet system"], "flashcards": [{"q": "Morley-Minto Reforms (1909) — most controversial provision?", "a": "Separate electorate for Muslims — Muslims could only vote for Muslim candidates in separate constituencies; called 'divide and rule' by critics; 'seed of Partition'"}, {"q": "Who was the 1st Indian in the Viceroy's Executive Council?", "a": "Satyendra Prasad Sinha (1909, as Law Member) — also later became 1st Indian Governor of Bihar"}, {"q": "Dyarchy (1919) — what went to Governors vs Ministers?", "a": "Reserved (Governor): Finance, Police, Justice, Irrigation, Land Revenue | Transferred (Ministers): Education, Health, Agriculture, Public Works, Local Self-Govt"}, {"q": "What provision in the 1919 Act led to the Simon Commission?", "a": "10-year review provision — GoI Act 1919 mandated review after 10 years → Simon Commission formed 1927"}, {"q": "What did Tilak call the GoI Act 1919?", "a": "'Morning without Sun' — he felt it gave form of reforms without substance; Moderates called it 'Magna Carta of India'"}, {"q": "Bicameral legislature created by 1919 Act?", "a": "Upper House = Council of State (60 members); Lower House = Central Legislative Assembly (144 members)"}, {"q": "August Declaration (1917) was made by whom and what did it promise?", "a": "Edwin Montagu (Secretary of State) — promised 'increasing association of Indians in administration' and 'gradual development of self-governing institutions' (responsible government)"}, {"q": "Indian Councils Act 1861 — 3 key features?", "a": "Portfolio system (Cabinet in embryo); Viceroy could issue ordinances for 6 months; Bombay & Madras got back their legislative councils"}, {"q": "What was introduced for the first time in Indian Councils Act 1892?", "a": "Indirect elections (though the word 'election' was not used); members could also discuss budget and ask questions for the first time"}, {"q": "Who are Morley and Minto in the 1909 Reforms?", "a": "Lord Morley = Secretary of State for India (in London); Lord Minto = Viceroy of India"}], "mcqs": [{"q": "The 'Portfolio System' was introduced by which Act?", "opts": ["Indian Councils Act 1892", "Indian Councils Act 1861", "GoI Act 1919", "Charter Act 1853"], "ans": 1, "exp": "Indian Councils Act 1861 introduced the Portfolio system — a precursor to the Cabinet system."}, {"q": "Separate electorate for Muslims was introduced by:", "opts": ["GoI Act 1919 (Montagu-Chelmsford)", "GoI Act 1935", "Indian Councils Act 1909 (Morley-Minto)", "Indian Councils Act 1892"], "ans": 2, "exp": "Separate electorate for Muslims was introduced by the Indian Councils Act 1909 (Morley-Minto Reforms)."}, {"q": "The Central Legislative Council was enlarged from 16 to 60 members by:", "opts": ["Morley-Minto Reforms 1909", "Montagu-Chelmsford Reforms 1919", "Charter Act 1853", "GoI Act 1935"], "ans": 0, "exp": "Morley-Minto Reforms (1909) enlarged the Central Legislative Council from 16 to 60 members."}, {"q": "Dyarchy in provinces was introduced by:", "opts": ["Indian Councils Act 1909", "GoI Act 1935", "GoI Act 1919", "Charter Act 1833"], "ans": 2, "exp": "Dyarchy (double rule) in provinces was introduced by Government of India Act 1919 (Montagu-Chelmsford Reforms)."}, {"q": "Which subject was a 'Reserved' subject under Dyarchy (1919)?", "opts": ["Education", "Health", "Agriculture", "Finance"], "ans": 3, "exp": "Finance was a Reserved subject (controlled by the Governor, not accountable to legislature). Education, Health, Agriculture were Transferred subjects."}, {"q": "Which subject was 'Transferred' under Dyarchy (1919)?", "opts": ["Police", "Land Revenue", "Irrigation", "Local Self-Government"], "ans": 3, "exp": "Local Self-Government was a Transferred subject (under Ministers responsible to legislature). Police, Land Revenue, Irrigation were Reserved."}, {"q": "The 10-year review provision in GoI Act 1919 led to:", "opts": ["GoI Act 1935", "Nehru Report", "Simon Commission 1927", "Round Table Conferences"], "ans": 2, "exp": "The 10-year review provision in GoI Act 1919 led to formation of Simon Commission in 1927 to review the Act's working."}, {"q": "Tilak called GoI Act 1919:", "opts": ["Magna Carta of India", "Morning without Sun", "Post-dated cheque", "Drain of Wealth"], "ans": 1, "exp": "Tilak called GoI Act 1919 'Morning without Sun' — implying it had the form of constitutional reforms but no real substance."}, {"q": "Council of State (Upper House, 1919 Act) had how many members?", "opts": ["144", "60", "120", "30"], "ans": 1, "exp": "Council of State (Upper House) had 60 members; Central Legislative Assembly (Lower House) had 144 members."}, {"q": "August Declaration (1917) was made by:", "opts": ["Lord Chelmsford", "Lord Morley", "Edwin Samuel Montagu", "Lord Minto"], "ans": 2, "exp": "Edwin Samuel Montagu (Secretary of State for India) made the August Declaration in 1917, promising responsible government for India."}, {"q": "1st Indian in Viceroy's Executive Council was:", "opts": ["Gopal Krishna Gokhale", "Satyendra Prasad Sinha", "MG Ranade", "Dadabhai Naoroji"], "ans": 1, "exp": "Satyendra Prasad Sinha was the 1st Indian in the Viceroy's Executive Council (1909), as Law Member."}, {"q": "Indian Councils Act 1892 introduced:", "opts": ["Separate electorate", "Portfolio system", "Indirect elections (first time)", "Dyarchy"], "ans": 2, "exp": "Indian Councils Act 1892 introduced indirect elections for the first time (though the word 'election' was not used)."}, {"q": "Dyarchy FAILED primarily because:", "opts": ["Indians refused to participate", "Reserved subjects were more important than transferred ones", "British revoked it within 5 years", "Ministers refused portfolios"], "ans": 1, "exp": "Dyarchy failed because Reserved subjects (Finance, Police, etc.) were more important than Transferred subjects (Education, Health), making the elected ministers ineffective."}, {"q": "Which Act restored legislative councils to Bombay and Madras presidencies?", "opts": ["Pitt's India Act 1784", "Charter Act 1853", "Indian Councils Act 1861", "GoI Act 1919"], "ans": 2, "exp": "Indian Councils Act 1861 restored legislative councils to Bombay and Madras, which had been removed earlier."}, {"q": "Gokhale called the separate electorate in Morley-Minto Reforms a:", "opts": ["Magna Carta of India", "Most serious mistake", "Morning without Sun", "Landmark reform"], "ans": 1, "exp": "Gokhale called the introduction of separate electorate for Muslims in Morley-Minto Reforms 'the most serious mistake' — warning it would divide Indians."}]}, {"id": "goi_act_1935_independence", "label": "GoI Act 1935 & Independence Act 1947", "icon": "🏛️", "xp": 60, "seqIdx": 2, "facts": ["<b>GoI Act 1935</b> ← HIGH SSC: Longest Act of British Parliament till then; <b>Provincial autonomy introduced</b> — provinces given more power.", "<b>All-India Federation proposed</b> (but NEVER implemented — Princely States refused to join).", "<b>Dyarchy introduced at CENTRE</b> (opposite of 1919 Act where Dyarchy was in provinces).", "<b>Federal Court established</b> (predecessor of Supreme Court of India).", "<b>RBI (Reserve Bank of India) established</b> under GoI Act 1935.", "<b>Federal Public Service Commission (FPSC) established</b> (predecessor of UPSC).", "Separate electorate retained + extended to depressed classes, women, labour.", "<b>Burma & Aden separated from India</b> under GoI Act 1935.", "11 provinces + 3 Chief Commissioner's provinces under GoI Act 1935.", "<b>Congress contested 1937 elections</b> under this Act and won in 7 provinces.", "The 1935 Act provided the constitutional framework that independent India used until 1950 — most provisions of Indian Constitution are drawn from GoI Act 1935.", "<b>Indian Independence Act 1947</b>: Passed by British Parliament on <b>18 July 1947</b>; two independent dominions created: India & Pakistan.", "<b>14 August 1947</b> = Pakistan Independence; <b>15 August 1947</b> = India Independence.", "Independence Act 1947: Partition of Bengal & Punjab; Radcliffe Line = India-Pakistan boundary; British paramountcy over Princely States ended.", "<b>Sir Cyril Radcliffe</b> headed 2 boundary commissions (one for Bengal, one for Punjab); <b>had never been to India before</b>; Award announced on <b>17 August 1947</b> (AFTER independence).", "<b>Mountbatten Plan (3 June 1947)</b>: Bengal to be divided; Punjab to be divided; NWFP & Sylhet — plebiscite held; Princely States free to join either dominion.", "<b>Partition aftermath</b>: Largest mass migration in history — 10–15 million displaced; ~1 million killed; 'Operation Madhouse' = name given to mass exodus.", "<b>1st PM of Pakistan</b>: Liaquat Ali Khan; <b>1st GG of Pakistan</b>: Muhammad Ali Jinnah (Quaid-e-Azam); capital: Karachi → later Islamabad.", "India's Constitution (until 1950) was based on GoI Act 1935 with additions from Government of India Act 1858 and Indian Independence Act 1947.", "<b>Congress resolutions 1937</b>: Won 8 provinces (sometimes stated as 7); formed governments; showed readiness for self-governance."], "table": "<table><thead><tr><th>Feature</th><th>GoI Act 1919</th><th>GoI Act 1935</th></tr></thead><tbody><tr><td>Dyarchy location</td><td>In PROVINCES</td><td>At CENTRE</td></tr><tr><td>Federation</td><td>No</td><td>Proposed (never implemented)</td></tr><tr><td>Court</td><td>No change</td><td>Federal Court established</td></tr><tr><td>RBI</td><td>No</td><td>Established</td></tr><tr><td>Burma</td><td>Part of India</td><td>Separated</td></tr><tr><td>Provinces</td><td>8</td><td>11 + 3 Chief Commissioners</td></tr><tr><td>Congress 1937 elections</td><td>N/A</td><td>Won in 7 provinces</td></tr></tbody></table>", "mn": "<b>GoI 1935 = P-F-F-F-R-B-S-11:</b><br>🏛️ <b>P</b>rovincial autonomy → <b>F</b>ederation proposed (never implemented) → <b>F</b>ederal Court → <b>F</b>PSC → <b>R</b>BI → <b>B</b>urma separated → <b>S</b>eparate electorate extended → <b>11</b> provinces<br>Independence Act 1947: <b>18 July</b> passed → <b>14 August</b> Pakistan → <b>15 August</b> India → <b>17 August</b> Radcliffe Award", "traps": ["⚠️ GoI Act 1935: Dyarchy at CENTRE (NOT provinces — provinces had AUTONOMY)!", "⚠️ All-India Federation (1935) was PROPOSED but NEVER IMPLEMENTED — Princely States refused!", "⚠️ Radcliffe Award announced 17 August 1947 — AFTER independence on 14/15 August!", "⚠️ Radcliffe had NEVER been to India before being asked to draw the boundary!", "⚠️ Indian Independence Act 1947 was passed by British Parliament on 18 JULY 1947 (not August)!", "⚠️ RBI established under GoI Act 1935 (NOT 1919 Act or after independence)!"], "revision": ["GoI Act 1935 = longest British Parliament Act; Provincial autonomy; Federation proposed (never implemented)", "1935: Dyarchy AT CENTRE; Federal Court; RBI; FPSC; Burma separated", "1935: 11 provinces + 3 Chief Commissioners provinces; Congress won 7 in 1937", "Independence Act 1947: Passed 18 July 1947; two dominions", "14 August 1947 = Pakistan; 15 August 1947 = India", "Radcliffe Line = India-Pakistan boundary; announced 17 August (after independence)", "Radcliffe had never been to India; headed 2 commissions (Bengal + Punjab)", "Mountbatten Plan 3 June 1947; PM Clement Attlee", "Partition: 10-15 million displaced; ~1 million killed; Operation Madhouse", "Pakistan: 1st PM = Liaquat Ali Khan; 1st GG = Jinnah (Quaid-e-Azam)"], "oneliners": ["GoI Act 1935 = longest Act of British Parliament till then", "1935: Provincial autonomy + Dyarchy at CENTRE (not provinces)", "Federal Court (1935) = predecessor of Supreme Court", "RBI established under GoI Act 1935", "FPSC established under GoI Act 1935", "Burma & Aden separated from India in 1935", "All-India Federation 1935 = never implemented (Princely States refused)", "Congress won 7 provinces in 1937 elections (under GoI Act 1935)", "Indian Independence Act 1947 passed on 18 July 1947", "Pakistan Independence = 14 August 1947", "India Independence = 15 August 1947", "Radcliffe Line = India-Pakistan boundary", "Radcliffe Award announced 17 August 1947 (AFTER independence)", "Sir Cyril Radcliffe had never been to India before", "Mountbatten Plan = 3 June 1947", "PM of Britain at partition time = Clement Attlee", "Partition: 10-15 million displaced; ~1 million killed", "Operation Madhouse = name for mass exodus during partition", "1st PM Pakistan = Liaquat Ali Khan; 1st GG = Jinnah", "India's Constitution draws heavily from GoI Act 1935"], "flashcards": [{"q": "GoI Act 1935 — where was Dyarchy introduced this time?", "a": "At CENTRE (opposite of 1919 Act where Dyarchy was in provinces; 1935 gave provinces AUTONOMY)"}, {"q": "Why was the All-India Federation (1935) never implemented?", "a": "Princely States refused to join — they were reluctant to surrender their autonomy to the federation"}, {"q": "GoI Act 1935 created two important institutions still in use today. What are they?", "a": "Reserve Bank of India (RBI) and the Federal Public Service Commission (FPSC — later became UPSC)"}, {"q": "What happened to Burma under GoI Act 1935?", "a": "Burma (and Aden) was separated from India under GoI Act 1935"}, {"q": "Radcliffe Award — when was it announced and why is it significant?", "a": "17 August 1947 — AFTER independence on 14/15 August; drew the Radcliffe Line (India-Pakistan boundary); Sir Cyril Radcliffe had never been to India before"}, {"q": "Indian Independence Act 1947 — when was it passed by British Parliament?", "a": "18 July 1947 (not 15 August — that was India's Independence Day)"}, {"q": "Partition aftermath statistics?", "a": "10-15 million people displaced (largest mass migration in history); ~1 million killed in communal violence; called 'Operation Madhouse'"}, {"q": "Pakistan's 1st PM and 1st GG?", "a": "1st PM = Liaquat Ali Khan; 1st GG = Muhammad Ali Jinnah (Quaid-e-Azam)"}, {"q": "Congress won how many provinces in 1937 elections under GoI Act 1935?", "a": "7 provinces (sometimes cited as 8) — demonstrating Congress's nationwide popularity"}, {"q": "Federal Court (1935) is the predecessor of what?", "a": "Supreme Court of India (established in 1950 when India became a Republic)"}], "mcqs": [{"q": "GoI Act 1935 introduced Dyarchy at:", "opts": ["In provinces (same as 1919)", "At the Centre", "In Princely States", "In both Centre and provinces"], "ans": 1, "exp": "GoI Act 1935 introduced Dyarchy at the Centre, while provinces were given AUTONOMY (opposite of 1919 Act)."}, {"q": "All-India Federation proposed in GoI Act 1935:", "opts": ["Was implemented in 1936", "Was implemented in 1937 after elections", "Was never implemented as Princely States refused", "Was implemented partially in 10 provinces"], "ans": 2, "exp": "The All-India Federation proposed in GoI Act 1935 was never implemented because Princely States refused to join."}, {"q": "Reserve Bank of India was established under:", "opts": ["GoI Act 1919", "GoI Act 1935", "Indian Independence Act 1947", "Charter Act 1853"], "ans": 1, "exp": "RBI (Reserve Bank of India) was established under the Government of India Act 1935."}, {"q": "Federal Court established in 1935 was the predecessor of:", "opts": ["High Courts of India", "Supreme Court of India", "Election Commission", "UPSC"], "ans": 1, "exp": "The Federal Court established under GoI Act 1935 was the predecessor of India's Supreme Court (1950)."}, {"q": "Burma was separated from India under:", "opts": ["GoI Act 1919", "Indian Independence Act 1947", "GoI Act 1935", "Montagu-Chelmsford Reforms"], "ans": 2, "exp": "Burma (and Aden) was separated from India under the Government of India Act 1935."}, {"q": "Congress won in how many provinces in 1937 elections?", "opts": ["5", "7", "9", "11"], "ans": 1, "exp": "Congress won in 7 provinces in the 1937 elections held under GoI Act 1935, forming governments in them."}, {"q": "Indian Independence Act 1947 was passed by British Parliament on:", "opts": ["15 August 1947", "14 August 1947", "3 June 1947", "18 July 1947"], "ans": 3, "exp": "Indian Independence Act 1947 was passed by British Parliament on 18 July 1947 — NOT on India's Independence Day."}, {"q": "The Radcliffe Award (India-Pakistan boundary) was announced:", "opts": ["On 15 August 1947", "On 14 August 1947", "On 17 August 1947", "On 3 June 1947"], "ans": 2, "exp": "Radcliffe Award was announced on 17 August 1947 — AFTER both India's and Pakistan's independence."}, {"q": "Sir Cyril Radcliffe who drew the India-Pakistan boundary:", "opts": ["Was an expert on South Asian history", "Had visited India several times as a diplomat", "Had never been to India before", "Was from the Indian Civil Service"], "ans": 2, "exp": "Sir Cyril Radcliffe had never been to India before being appointed to draw the partition boundary."}, {"q": "Pakistan's first Governor-General was:", "opts": ["Liaquat Ali Khan", "Chaudhry Muhammad Ali", "Muhammad Ali Jinnah", "Ayub Khan"], "ans": 2, "exp": "Muhammad Ali Jinnah (Quaid-e-Azam) was the 1st Governor-General of Pakistan; Liaquat Ali Khan was 1st PM."}, {"q": "The Mountbatten Plan (partition plan) was announced on:", "opts": ["18 July 1947", "3 June 1947", "14 August 1947", "15 August 1947"], "ans": 1, "exp": "The Mountbatten Plan (3rd June Plan) was announced by Lord Mountbatten on 3 June 1947."}, {"q": "GoI Act 1935 — how many provinces were there?", "opts": ["8 provinces", "11 provinces + 3 Chief Commissioner's provinces", "14 provinces", "6 provinces"], "ans": 1, "exp": "GoI Act 1935 created 11 provinces and 3 Chief Commissioner's provinces."}, {"q": "The Partition led to what scale of displacement?", "opts": ["2-3 million people", "5-7 million people", "10-15 million people", "25 million people"], "ans": 2, "exp": "The Partition of India led to the displacement of 10-15 million people — the largest mass migration in human history."}, {"q": "Federal Public Service Commission (FPSC) established by GoI Act 1935 is today known as:", "opts": ["Election Commission", "UPSC (Union Public Service Commission)", "CAG", "Finance Commission"], "ans": 1, "exp": "FPSC established in 1935 became UPSC (Union Public Service Commission) after India's independence."}, {"q": "The British PM at the time of Indian Independence (1947) was:", "opts": ["Winston Churchill", "Anthony Eden", "Clement Attlee", "Harold Macmillan"], "ans": 2, "exp": "Clement Attlee was the British Prime Minister when India became independent on 15 August 1947."}]}, {"id": "subsidiary_doctrine_lapse", "label": "Subsidiary Alliance & Doctrine of Lapse", "icon": "⚔️", "xp": 60, "seqIdx": 3, "facts": ["<b>Subsidiary Alliance</b> introduced by <b>Lord Wellesley (1798)</b>: Indian ruler accepts a permanent British military force in his state; ruler pays for this force OR gives territory; British gain land if ruler cannot pay.", "<b>6 Conditions of Subsidiary Alliance</b>: (1) Accept permanent British troops; (2) Pay for their maintenance or cede territory; (3) No independent foreign relations — use British mediation; (4) Cannot employ Europeans (other than British) without British approval; (5) British Resident posted at court; (6) Cannot make war or peace without British permission.", "<b>Nizam of Hyderabad (1798)</b> = 1st state to sign Subsidiary Alliance.", "<b>Peshwa (Bassein, 1802)</b> = Treaty of Bassein — KEY for SSC — led to 2nd Anglo-Maratha War.", "States that accepted: Nizam (1798), Mysore (1799), Tanjore (1799), Awadh (1801), Peshwa/Bassein (1802), Scindia (1803), Bhonsale (1803), Holkar (1804).", "<b>Ranjit Singh of Punjab</b> = never signed Subsidiary Alliance; too strong; maintained independent sovereignty.", "<b>Impact of Subsidiary Alliance</b>: States lost sovereignty; puppet rulers; British interference in succession; prepared ground for Doctrine of Lapse; Indian resources drained to pay for British troops.", "<b>Doctrine of Lapse</b> introduced by <b>Lord Dalhousie (1848-56)</b>: If an Indian ruler died WITHOUT a natural (biological) heir, state lapses to British; <b>adopted sons NOT recognised</b> as legal heirs.", "<b>States annexed under Doctrine of Lapse</b>: Satara (1848), Jaitpur (1849), Sambalpur (1849), Baghat (1850), Udaipur (1852), <b>Jhansi (1853)</b> ← led to Rani Lakshmi Bai's revolt, Nagpur (1854).", "<b>Awadh (1856) was NOT under Doctrine of Lapse</b> — annexed by misgovernance; Nawab Wajid Ali Shah had an heir; major cause of 1857 revolt.", "<b>Lord Canning withdrew</b> Doctrine of Lapse (1858) after 1857 revolt; adopted sons were then recognised as legal heirs.", "<b>Jhansi</b> (1853) is the most important: Rani Lakshmi Bai's adopted son Damodar Rao was not recognized; she led the 1857 revolt ('Mardani Jhansi waali').", "Lord Wellesley called himself 'Bengal Tiger' — aggressive expansionist; Subsidiary Alliance was his major tool.", "Doctrine of Lapse applied only to states under <b>British paramountcy</b> — NOT to Mughal Empire or independent sovereign states.", "Difference: Subsidiary Alliance = voluntary system (states signed); Doctrine of Lapse = Dalhousie's unilateral annexation policy."], "table": "<table><thead><tr><th>State</th><th>Year</th><th>Subsidiary Alliance / Lapse</th><th>Notes</th></tr></thead><tbody><tr><td>Nizam of Hyderabad</td><td>1798</td><td>Subsidiary Alliance</td><td>1st to sign</td></tr><tr><td>Mysore</td><td>1799</td><td>Subsidiary Alliance</td><td>After 4th Anglo-Mysore War; Tipu defeated</td></tr><tr><td>Awadh</td><td>1801</td><td>Subsidiary Alliance</td><td>Gave up half territory</td></tr><tr><td>Peshwa (Bassein)</td><td>1802</td><td>Subsidiary Alliance</td><td>Treaty of Bassein ← KEY</td></tr><tr><td>Satara</td><td>1848</td><td>Doctrine of Lapse</td><td>1st state lapsed; Dalhousie</td></tr><tr><td>Jhansi</td><td>1853</td><td>Doctrine of Lapse</td><td>Rani Lakshmi Bai's revolt; son not recognized</td></tr><tr><td>Nagpur</td><td>1854</td><td>Doctrine of Lapse</td><td>No natural heir</td></tr><tr><td>Awadh</td><td>1856</td><td>Misgovernance (NOT Lapse)</td><td>Nawab had heir; major cause of 1857 revolt</td></tr></tbody></table>", "mn": "<b>WELLESLEY's SA = NMTAPSBH (states that accepted):</b><br>⚔️ <b>N</b>izam 1798 → <b>M</b>ysore 1799 → <b>T</b>anjore 1799 → <b>A</b>wadh 1801 → <b>P</b>eshwa/Bassein 1802 → <b>S</b>cindia 1803 → <b>B</b>honsale 1803 → <b>H</b>olkar 1804<br>DALHOUSIE's LAPSE = <b>S-J-S-B-U-J-N</b>: Satara(1848)→Jaitpur→Sambalpur→Baghat→Udaipur→<b>Jhansi(1853)</b>→Nagpur(1854)", "traps": ["⚠️ Awadh (1856) was NOT under Doctrine of Lapse — it was annexed due to MISGOVERNANCE; Nawab Wajid Ali Shah had an heir!", "⚠️ Nizam of Hyderabad = 1st to sign Subsidiary Alliance (1798) — NOT Mysore!", "⚠️ Ranjit Singh of Punjab NEVER signed Subsidiary Alliance — he was too strong!", "⚠️ Jhansi lapsed (1853) — Rani Lakshmi Bai's ADOPTED son Damodar Rao was NOT recognized under Doctrine of Lapse!", "⚠️ Lord CANNING (not Dalhousie) WITHDREW Doctrine of Lapse in 1858!", "⚠️ Treaty of BASSEIN (1802) = Peshwa signed Subsidiary Alliance — not Bhonsale or Holkar!"], "revision": ["Subsidiary Alliance: Wellesley 1798; 6 conditions; Nizam 1st to sign", "Treaty of Bassein 1802 = Peshwa signed SA; led to 2nd Anglo-Maratha War", "Ranjit Singh = only major ruler who never signed SA", "Doctrine of Lapse: Dalhousie 1848-56; no natural heir = lapses to British", "Adopted sons NOT recognized under Doctrine of Lapse", "Satara 1848 = 1st state lapsed; Jhansi 1853 = Rani Lakshmi Bai revolt", "Awadh 1856 = NOT Doctrine of Lapse; misgovernance; had heir", "Lord Canning withdrew Doctrine of Lapse (1858) after 1857 revolt", "Nagpur 1854 = last state under Doctrine of Lapse", "7 states lapsed under Dalhousie: Satara, Jaitpur, Sambalpur, Baghat, Udaipur, Jhansi, Nagpur"], "oneliners": ["Subsidiary Alliance introduced by Lord Wellesley 1798", "Nizam of Hyderabad 1798 = 1st state to sign Subsidiary Alliance", "Treaty of Bassein 1802 = Peshwa signed Subsidiary Alliance", "Ranjit Singh = never signed SA; too strong for British", "Lord Wellesley called himself 'Bengal Tiger'", "Doctrine of Lapse: Dalhousie 1848-56; adopted sons not recognized", "Satara 1848 = 1st state lapsed under Doctrine of Lapse", "Jhansi 1853 = Rani Lakshmi Bai's revolt; son Damodar Rao not recognized", "Nagpur 1854 = last state annexed under Doctrine of Lapse", "Awadh 1856 = NOT Doctrine of Lapse; annexed for misgovernance", "Nawab Wajid Ali Shah (Awadh) had an heir — still annexed", "Lord Canning withdrew Doctrine of Lapse (1858) after 1857 revolt", "6 conditions of Subsidiary Alliance: troops + cost + no foreign relations + no European + Resident + no war", "British Resident posted at court = key SA condition", "SA impact: puppet rulers; drain of resources; ground for Doctrine of Lapse", "Doctrine of Lapse only applied to states under British paramountcy", "Mysore signed SA 1799 after 4th Anglo-Mysore War (Tipu Sultan defeated)", "Awadh signed SA 1801 and gave up half its territory", "Holkar (Maratha) signed SA last (1804)", "Total states lapsed under Dalhousie: 7 (Satara, Jaitpur, Sambalpur, Baghat, Udaipur, Jhansi, Nagpur)"], "flashcards": [{"q": "What were the 6 conditions of Subsidiary Alliance?", "a": "1) Accept permanent British troops; 2) Pay for their maintenance or cede territory; 3) No independent foreign relations; 4) No non-British Europeans without British approval; 5) British Resident at court; 6) No war or peace without British permission"}, {"q": "Which was the 1st state to sign the Subsidiary Alliance and when?", "a": "Nizam of Hyderabad in 1798 — the very year Wellesley introduced the system"}, {"q": "What was the Treaty of Bassein (1802)? ad was the 1st state to sign the Subsidiary Alliance in 1798."}, {"q": "Treaty of Bassein (1802) refers to:", "opts": ["Mysore signing Subsidiary Alliance", "Peshwa signing Subsidiary Alliance", "Scindia signing Subsidiary Alliance", "Ranjit Singh signing treaty"], "ans": 1, "exp": "Treaty of Bassein (1802) refers to the Peshwa (Baji Rao II) signing the Subsidiary Alliance with British — a key SSC fact."}, {"q": "Doctrine of Lapse was introduced by:", "opts": ["Lord Wellesley", "Lord Cornwallis", "Lord Dalhousie", "Lord Canning"], "ans": 2, "exp": "Doctrine of Lapse was introduced by Lord Dalhousie during 1848-56."}, {"q": "Under Doctrine of Lapse, which of these was NOT recognized as a legal heir?", "opts": ["Youngest biological son", "Eldest biological son", "Adopted son", "Biological daughter"], "ans": 2, "exp": "Adopted sons were NOT recognized as legal heirs under Doctrine of Lapse."}, {"q": "Awadh was annexed in 1856 on the grounds of:", "opts": ["Doctrine of Lapse (no heir)", "Subsidiary Alliance violation", "Misgovernance by the Nawab", "Failure to pay tribute"], "ans": 2, "exp": "Awadh was annexed for misgovernance — Nawab Wajid Ali Shah actually had an heir; this was a major cause of 1857 revolt."}, {"q": "Doctrine of Lapse was withdrawn by:", "opts": ["Lord Dalhousie", "Lord Wellesley", "Lord Canning", "Lord Ripon"], "ans": 2, "exp": "Lord Canning withdrew the Doctrine of Lapse in 1858 after the 1857 revolt."}, {"q": "The annexation of Jhansi (1853) led to revolt by:", "opts": ["Nawab of Jhansi", "Rani Lakshmi Bai", "Tantia Tope", "Nana Sahib"], "ans": 1, "exp": "Rani Lakshmi Bai revolted against the annexation of Jhansi — her adopted son Damodar Rao was not recognized."}, {"q": "Ranjit Singh of Punjab regarding Subsidiary Alliance:", "opts": ["Signed it in 1800", "Signed it in 1810", "Rejected it but later accepted", "Never signed it"], "ans": 3, "exp": "Ranjit Singh of Punjab never signed the Subsidiary Alliance — he was strong enough to maintain full sovereignty."}, {"q": "First state annexed under Doctrine of Lapse was:", "opts": ["Jhansi", "Nagpur", "Satara", "Sambalpur"], "ans": 2, "exp": "Satara was the first state annexed under Doctrine of Lapse in 1848."}, {"q": "Under Subsidiary Alliance conditions, the British Resident was:", "opts": ["Posted at the Indian court", "Appointed as the ruler", "Only present during wars", "Given financial control"], "ans": 0, "exp": "A British Resident was posted permanently at the Indian court as one of the 6 key conditions of Subsidiary Alliance."}, {"q": "Doctrine of Lapse was applicable to:", "opts": ["All Indian states", "Only Muslim-ruled states", "States under British paramountcy", "States that had signed Subsidiary Alliance"], "ans": 2, "exp": "Doctrine of Lapse applied only to states under British paramountcy — NOT to the Mughal Empire or fully sovereign states."}, {"q": "Total number of states annexed under Doctrine of Lapse:", "opts": ["4", "5", "7", "9"], "ans": 2, "exp": "7 states were annexed: Satara (1848), Jaitpur (1849), Sambalpur (1849), Baghat (1850), Udaipur (1852), Jhansi (1853), Nagpur (1854)."}, {"q": "Subsidiary Alliance: Indian ruler who was too powerful to be coerced was:", "opts": ["Nizam of Hyderabad", "Tipu Sultan", "Ranjit Singh", "Peshwa Baji Rao II"], "ans": 2, "exp": "Ranjit Singh of Punjab was the only major ruler powerful enough to never sign the Subsidiary Alliance."}, {"q": "The impact of Subsidiary Alliance on Indian states was:", "opts": ["They became more autonomous", "States gained foreign policy rights", "States lost sovereignty; became puppet rulers", "British reduced military interference"], "ans": 2, "exp": "Under Subsidiary Alliance, states lost sovereignty, had permanent British troops on their soil, and became puppet rulers with no independent foreign policy."}]},
{"id": "rrr_wood_dispatch", "label": "Raja Ram Mohan Roy & Wood's Dispatch", "icon": "🌟", "xp": 60, "seqIdx": 4, "facts": ["<b>Raja Ram Mohan Roy (RRR)</b> ← HIGH SSC: Born <b>1772</b> (Radhanagar, Bengal); died <b>1833</b> (Bristol, England).", "Called: <b>Father of Indian Renaissance</b>, <b>Father of Modern India</b>, <b>Father of Bengali Prose</b>.", "<b>Brahmo Sabha</b> founded by RRR in <b>1828</b> (later called Brahmo Samaj); first reform movement of modern India.", "Newspapers: <b>Sambad Kaumudi</b> (1821, Bengali newspaper) and <b>Mirat-ul-Akbar</b> (1822, first Persian newspaper in India).", "Title '<b>Raja</b>' granted by <b>Mughal Emperor Akbar II</b> (not by British); given for going to England to represent Mughal Emperor's cause.", "<b>Fought against Sati</b> — lobbied for its abolition; Sati abolished by Lord William Bentinck via <b>Bengal Sati Regulation 1829</b>.", "RRR also opposed child marriage, purdah; promoted women's rights, widow remarriage, English education.", "Wrote <b>Tuhfat-ul-Muwahhidin</b> (Gift to Monotheists, 1804) — one of his earliest works attacking polytheism.", "RRR went to England in 1831 to represent Mughal Emperor's petition for higher pension — died there 1833 at Bristol.", "<b>Atmiya Sabha</b> founded by RRR in 1815 (precursor to Brahmo Sabha 1828).", "<b>Wood's Educational Dispatch (1854)</b> ← KEY SSC: Called '<b>Magna Carta of English Education in India</b>'; sent by Charles Wood (President, Board of Control).", "Wood's Dispatch 1854 recommended: (1) English as medium of higher education; (2) Vernacular languages at lower levels; (3) Universities to be established; (4) Teacher training (Normal Schools); (5) Education for women; (6) Government grants-in-aid for private schools.", "Result of Wood's Dispatch: <b>3 universities established in 1857</b> — Bombay, Calcutta, Madras (all on same day 24 January 1857 for Calcutta and Bombay; Madras later).", "<b>Macaulay's Minute (1835)</b>: English as medium; defeated Oriental school of thought; Bentinck's resolution based on this.", "<b>Downward Filtration Theory</b>: Education to educated elite who will 'filter' knowledge to masses — criticized as elitist.", "Lord William Bentinck abolished Sati (1829), also abolished Thuggee (1830) and female infanticide."], "table": "<table><thead><tr><th>Aspect</th><th>Raja Ram Mohan Roy</th></tr></thead><tbody><tr><td>Born</td><td>1772, Radhanagar, Bengal</td></tr><tr><td>Died</td><td>1833, Bristol, England</td></tr><tr><td>Title 'Raja'</td><td>Given by Mughal Emperor Akbar II</td></tr><tr><td>Newspaper (Bengali)</td><td>Sambad Kaumudi (1821)</td></tr><tr><td>Newspaper (Persian)</td><td>Mirat-ul-Akbar (1822)</td></tr><tr><td>Organization 1</td><td>Atmiya Sabha (1815)</td></tr><tr><td>Organization 2</td><td>Brahmo Sabha (1828) → Brahmo Samaj</td></tr><tr><td>Sati abolished</td><td>Bengal Sati Regulation 1829 (Bentinck)</td></tr><tr><td>Called</td><td>Father of Indian Renaissance / Modern India / Bengali Prose</td></tr><tr><td>Wood's Dispatch</td><td>1854; Magna Carta of English Education; led to 3 Universities 1857</td></tr></tbody></table>", "mn": "<b>RRR = R-A-B-S-M-T:</b><br>🌟 <b>R</b>adhanagar 1772 born → <b>A</b>tmiya Sabha 1815 → <b>B</b>rahmo Sabha 1828 → <b>S</b>ambad Kaumudi 1821 → <b>M</b>irat-ul-Akbar 1822 → <b>T</b>itle 'Raja' from Akbar II<br>Wood's Dispatch 1854 → 3 Universities 1857 (BCM = Bombay+Calcutta+Madras)", "traps": ["⚠️ Title 'Raja' given to RRR by Mughal Emperor AKBAR II — NOT by British!", "⚠️ Brahmo SABHA 1828 (founded by RRR); Brahmo SAMAJ came later (Debendranath Tagore expanded it); don't call it Samaj when RRR founded it!", "⚠️ Sati abolished by Lord William BENTINCK (1829) — not by RRR directly!", "⚠️ RRR was NOT alive for Wood's Dispatch (1854) — he died in 1833!", "⚠️ Wood's Dispatch = 'Magna Carta of ENGLISH Education' — not of Indian education generally!", "⚠️ 3 universities after Wood's Dispatch = 1857 (Bombay, Calcutta, Madras) — NOT immediately in 1854!"], "revision": ["RRR born 1772, died 1833 (Bristol, England)", "Atmiya Sabha 1815 → Brahmo Sabha 1828", "Sambad Kaumudi 1821 (Bengali); Mirat-ul-Akbar 1822 (Persian)", "Title 'Raja' from Mughal Emperor Akbar II", "Sati abolished: Bengal Sati Regulation 1829 (Bentinck, lobbied by RRR)", "Wood's Dispatch 1854 = Magna Carta of English Education in India", "Wood's Dispatch = English for higher; vernacular for lower; universities; teacher training", "3 Universities 1857: Bombay, Calcutta, Madras", "Macaulay's Minute 1835 = English medium; Downward Filtration Theory", "RRR = Father of Indian Renaissance + Modern India + Bengali Prose"], "oneliners": ["RRR born 1772 Radhanagar; died 1833 Bristol England", "RRR = Father of Indian Renaissance, Modern India, Bengali Prose", "Atmiya Sabha 1815 (RRR's first organization)", "Brahmo Sabha 1828 = RRR's major organization (later Brahmo Samaj)", "Sambad Kaumudi 1821 = RRR's Bengali newspaper", "Mirat-ul-Akbar 1822 = 1st Persian newspaper in India (by RRR)", "Title 'Raja' given by Mughal Emperor Akbar II (NOT British)", "Sati abolished by Bengal Sati Regulation 1829 (Bentinck; lobbied by RRR)", "RRR went to England 1831 for Mughal Emperor's pension petition", "Wood's Dispatch 1854 = Magna Carta of English Education in India", "Wood's Dispatch: English for higher education; vernacular for lower", "Wood's Dispatch: universities; teacher training; women's education; grants-in-aid", "3 Universities 1857: Bombay, Calcutta, Madras (from Wood's Dispatch)", "Macaulay's Minute 1835 = English medium; won over Oriental school", "Downward Filtration Theory = educate elite; knowledge filters to masses", "Bentinck also abolished Thuggee (1830) and female infanticide", "Tuhfat-ul-Muwahhidin 1804 = RRR's work attacking polytheism", "Charles Wood = President, Board of Control (sent Wood's Dispatch)", "Wood's Dispatch recommended Normal Schools (teacher training)", "Brahmo Sabha → Debendranath Tagore expanded it as Brahmo Samaj"], "flashcards": [{"q": "Who gave
