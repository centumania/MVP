{id:'sc1',title:'Ancient India Science & Mathematics',xp:170,type:'regular',seqIdx:5,learn:'<h2 class="sec-head">🔬 Ancient India Science & Mathematics</h2><h3 class="sub-head">Key Scientists</h3><table><thead><tr><th>Scientist</th><th>Period</th><th>Key Contribution</th></tr></thead><tbody><tr><td>Aryabhata</td><td>499 AD (Gupta)</td><td>Pi=3.1416; heliocentric theory; solar/lunar eclipses; Earth\'s rotation; Aryabhatiya at age 23</td></tr><tr><td>Brahmagupta</td><td>628 AD</td><td>Formalized ZERO with rules; negative numbers; Brahmasphutasiddhanta</td></tr><tr><td>Varahamihira</td><td>Gupta period</td><td>Brihatsamhita; Panchasiddhantika (5 astronomical systems)</td></tr><tr><td>Bhaskaracharya II</td><td>12th cent AD</td><td>Lilavati; Bijaganita; concept of infinity</td></tr><tr><td>Charaka</td><td>Kushan period</td><td>Charakasamhita — Ayurveda; internal medicine</td></tr><tr><td>Sushruta</td><td>~6th cent BC</td><td>Sushrutasamhita — PLASTIC SURGERY; cataract surgery; 300 surgical instruments</td></tr><tr><td>Nagarjuna</td><td>Kushan period</td><td>Rasa Shastra (mercury alchemy); Buddhist philosophy</td></tr><tr><td>Panini</td><td>~4th cent BC</td><td>Ashtadhyayi — 4000 sutras; world\'s 1st formal grammar</td></tr></tbody></table><h3 class="sub-head">Key Mathematical Discoveries</h3><table><thead><tr><th>Concept</th><th>Credit</th><th>Period</th></tr></thead><tbody><tr><td>Decimal system</td><td>India</td><td>Ancient (Vedic)</td></tr><tr><td>Zero (concept)</td><td>Aryabhata (used); Brahmagupta (formalized)</td><td>5th–7th cent AD</td></tr><tr><td>Pi (π = 3.1416)</td><td>Aryabhata</td><td>499 AD</td></tr><tr><td>Heliocentric theory</td><td>Aryabhata</td><td>499 AD (1000 yrs before Copernicus)</td></tr><tr><td>Pythagorean theorem precursor</td><td>Sulba Sutras (BAUDHYANA)</td><td>~800 BC</td></tr><tr><td>Negative numbers</td><td>Brahmagupta</td><td>628 AD</td></tr><tr><td>Trigonometry (sine)</td><td>Aryabhata</td><td>499 AD</td></tr><tr><td>Binary numbers</td><td>PINGALA (Chandashashtra)</td><td>~200 BC</td></tr><tr><td>Calculus precursor</td><td>KERALA SCHOOL (Madhava)</td><td>14th–15th cent</td></tr></tbody></table><div class="fact-box"><strong>SSC Must Know</strong><ul><li>Sushruta = plastic surgery + 300 surgical instruments ← HIGH FREQ</li><li>Panini = Ashtadhyayi = world\'s 1st formal grammar</li><li>Baudhyana\'s Sulba Sutras = Pythagorean theorem precursor (800 BC)</li><li>Brahmagupta = formalized zero + negative numbers (628 AD)</li><li>Pingala = binary numbers (~200 BC)</li></ul></div><div class="trap-box">⚠️ EXAM TRAP: Sushruta = surgery (NOT Charaka). Charaka = internal medicine/Ayurveda. Brahmagupta FORMALIZED zero — Aryabhata USED the concept. Heliocentric theory = ARYABHATA (not Brahmagupta). Sulba Sutras = BAUDHYANA (not Aryabhata).</div>',revision:['Aryabhata(499AD,Gupta): pi=3.1416,heliocentric theory,Earth\'s rotation,Aryabhatiya at age 23','Brahmagupta(628AD): formalized ZERO with rules,negative numbers,Brahmasphutasiddhanta','Varahamihira(Gupta): Brihatsamhita,Panchasiddhantika | Bhaskaracharya II(12th c): Lilavati,Bijaganita,infinity','Charaka(Kushan,Ayurveda/internal medicine) | Sushruta(~6th c BC,PLASTIC SURGERY,300 instruments)','Nagarjuna(Kushan,mercury alchemy) | Panini(~4th c BC,Ashtadhyayi,4000 sutras,1st formal grammar)'],oneliners:['Aryabhata (499 AD) calculated pi as 3.1416 and proposed a heliocentric theory','Aryabhata explained the Earth\'s rotation and wrote the Aryabhatiya at age 23','Brahmagupta (628 AD) formalized rules for zero and negative numbers','Brahmagupta\'s key work is the Brahmasphutasiddhanta','Varahamihira wrote the Brihatsamhita and the Panchasiddhantika','Bhaskaracharya II (12th century AD) wrote Lilavati and Bijaganita, and explored infinity','Charaka, of the Kushan period, wrote the Charakasamhita on Ayurveda and internal medicine','Sushruta (~6th century BC) is famous for pioneering plastic surgery and cataract surgery','Sushruta\'s text describes around 300 surgical instruments','Nagarjuna, of the Kushan period, worked on Rasa Shastra (mercury alchemy) and Buddhist philosophy','Panini (~4th century BC) wrote the Ashtadhyayi, the world\'s first formal grammar, with 4000 sutras'],flashcards:[{q:'Who calculated pi as 3.1416, and what theory did he propose?',a:'Aryabhata; proposed a heliocentric theory and Earth\'s rotation'},{q:'What did Brahmagupta formalize?',a:'Rules for zero and negative numbers, in the Brahmasphutasiddhanta'},{q:'Who wrote the Brihatsamhita and Panchasiddhantika?',a:'Varahamihira'},{q:'Who wrote Lilavati and Bijaganita, and explored infinity?',a:'Bhaskaracharya II'},{q:'Who is famous for pioneering plastic surgery in ancient India?',a:'Sushruta (~6th century BC)'},{q:'Who wrote the Ashtadhyayi, and what is its significance?',a:'Panini; the world\'s first formal grammar, with 4000 sutras'},{q:'Who worked on Rasa Shastra (mercury alchemy)?',a:'Nagarjuna'},{q:'Who wrote the Charakasamhita?',a:'Charaka'}],mcqs:[{q:'Who is called the \'Father of Surgery\' for documenting 300+ surgical instruments and plastic surgery techniques?',o:['Charaka','Aryabhata','Sushruta','Vagbhata'],a:2,e:'Sushruta (Sushruta Samhita, ~600 BC) described 300 surgical instruments and procedures including rhinoplasty (nose reconstruction) — making him the Father of Surgery.'},{q:'Brahmagupta\'s contribution of formalizing zero and its arithmetic rules was in which work?',o:['Aryabhatiya','Brahmasphutasiddhanta','Surya Siddhanta','Panchasiddhantika'],a:1,e:'Brahmasphutasiddhanta (628 AD) by Brahmagupta formally defined zero and rules for arithmetic with zero and negative numbers.'},{q:'The world\'s first formal grammar was written by Panini. What is this work called?',o:['Mahabhashya','Nirukta','Ashtadhyayi','Vakya Padiya'],a:2,e:'Ashtadhyayi (~4th cent BC) by Panini = 4,000 sutras describing Sanskrit grammar systematically. It is considered the world\'s first formal grammar.'},{q:'Which ancient Indian mathematician is credited with the earliest known statement of the Pythagorean theorem?',o:['Aryabhata','Brahmagupta','Baudhyana','Pingala'],a:2,e:'Baudhyana\'s Sulba Sutras (~800 BC) contain a statement equivalent to the Pythagorean theorem — predating Pythagoras (~570-495 BC).'},{q:'Aryabhata\'s value of π (pi) correct to 4 decimal places was given in which work?',o:['Brahmasphutasiddhanta','Aryabhatiya','Surya Siddhanta','Panchasiddhantika'],a:1,e:'Aryabhatiya (499 AD) gives π ≈ 3.1416 (correct to 4 decimal places). He also described Earth\'s rotation as cause of apparent star movement.'},{q:'The binary number system concept is traced to which ancient Indian work?',o:['Chandas Shastra by Pingala','Ashtadhyayi by Panini','Arthashastra by Kautilya','Aryabhatiya by Aryabhata'],a:0,e:'Pingala\'s Chandas Shastra (~200 BC) used a binary-like notation (laghu/guru = light/heavy syllables) for Vedic meter — earliest known binary system.'},{q:'Varahamihira\'s Brihat Samhita is primarily a work on:',o:['Surgery','Astronomy, astrology and natural phenomena','Grammar','Mathematics'],a:1,e:'Brihat Samhita (6th cent AD) by Varahamihira = encyclopedic work on astronomy, astrology, weather, gems, agriculture, and architecture. He was a jewel of Chandragupta II\'s court.'},{q:'The Charaka Samhita, the foundational text of Ayurveda, primarily deals with:',o:['Surgery and anatomy','Internal medicine and pharmacology','Pediatrics and gynecology','Ophthalmology'],a:1,e:'Charaka Samhita = internal medicine (kaya-chikitsa) and pharmacology. Sushruta Samhita = surgery. Ashtanga Hridayam (Vagbhata) = synthesis of both.'},{q:'Which ancient Indian astronomer first proposed that the Earth rotates on its axis and that planets shine by reflected sunlight?',o:['Brahmagupta','Varahamihira','Bhaskara I','Aryabhata'],a:3,e:'Aryabhata (499 AD) proposed Earth\'s rotation as the cause of apparent celestial movement and that the Moon and planets reflect sunlight — remarkably correct observations.'},{q:'The Nagarjuna of ancient India (not the Buddhist philosopher) is famous for contributions to:',o:['Grammar','Alchemy and chemistry (Rasa Shastra)','Astronomy','Agriculture'],a:1,e:'Nagarjuna (different from the Buddhist philosopher) is associated with Rasa Shastra (alchemy/chemistry) and the preparation of medicinal compounds from metals.'}]},
{id:'cn1',title:'Coins Deep Dive',xp:150,type:'regular',seqIdx:6,learn:'<h2 class="sec-head">💰 Coins — Deep Dive</h2><h3 class="sub-head">Punch-Marked Coins (Ahata Coins)</h3><table><thead><tr><th>Feature</th><th>Detail</th></tr></thead><tbody><tr><td>Period</td><td>~7th–4th century BC (pre-Mauryan)</td></tr><tr><td>Material</td><td>Mostly silver; some copper</td></tr><tr><td>Shape</td><td>Irregular (not round)</td></tr><tr><td>Marks</td><td>5 symbols punched; no king\'s name or image</td></tr><tr><td>Other name</td><td>Karshapana (unit of currency)</td></tr><tr><td>Coin inspector (Arthashastra)</td><td>Rupadharshaka</td></tr><tr><td>Found at</td><td>Taxila, Pataliputra, Ujjain, Magadha in large numbers</td></tr></tbody></table><h3 class="sub-head">Gupta Coins — SSC Special</h3><p>Called <b>"Dinar"</b> (gold) — most artistic in Indian numismatic history.</p><table><thead><tr><th>Coin Type</th><th>Ruler</th></tr></thead><tbody><tr><td>Lyrist type (playing veena)</td><td>SAMUDRAGUPTA ← FAMOUS</td></tr><tr><td>Ashvamedha type (horse sacrifice)</td><td>Samudragupta</td></tr><tr><td>Archer type</td><td>Samudragupta</td></tr><tr><td>Tiger-slayer type</td><td>CHANDRAGUPTA II</td></tr><tr><td>Silver coins (1st Gupta)</td><td>CHANDRAGUPTA II — replaced Shaka silver coins in W. India</td></tr></tbody></table><p>Kalidasa compared Gupta gold coins to "fireflies shining at night."</p><h3 class="sub-head">All Coin Facts — Quick Reference</h3><table><thead><tr><th>Fact</th><th>Answer</th></tr></thead><tbody><tr><td>1st coins in India</td><td>Punch-marked (Ahata) coins — 7th century BC</td></tr><tr><td>Another name</td><td>Karshapana</td></tr><tr><td>1st gold coins</td><td>INDO-GREEKS (NOT Guptas)</td></tr><tr><td>Satavahana coins</td><td>Lead (most common) — 1st to show ruler portrait</td></tr><tr><td>Kushan (Kanishka) coins</td><td>1st to depict Buddha in human form on coins</td></tr><tr><td>Most artistic coins</td><td>GUPTA period (gold Dinara)</td></tr><tr><td>Samudragupta coins</td><td>Veena-playing (Lyrist type) + Ashvamedha</td></tr><tr><td>CG II coins</td><td>Tiger-slayer + 1st silver coins in Gupta era</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: Karshapana = punch-marked coin unit (not a separate coin type). Rupadharshaka = coin inspector in Arthashastra. SAMUDRAGUPTA\'s coins = veena-playing. CHANDRAGUPTA II = tiger-slayer + 1st silver. These two are commonly swapped.</div>',revision:['Punch-marked/Ahata coins(7th-4thBC,pre-Mauryan): silver,irregular shape,5 symbols,no king\'s name,also called Karshapana','Coin inspector(Arthashastra)=Rupadharshaka | Found at Taxila,Pataliputra,Ujjain,Magadha','Gupta gold coins=\'Dinar\', most artistic in Indian numismatics','Samudragupta coin types: Lyrist(veena),Ashvamedha,Archer | Chandragupta II: Tiger-slayer,1st Gupta silver coins','Indo-Greeks=1st gold coins in India | Satavahana=lead coins most common'],oneliners:['Punch-marked (Ahata) coins were pre-Mauryan, dating 7th-4th century BC','Punch-marked coins were mostly silver, irregularly shaped, with 5 punched symbols and no king\'s name','Punch-marked coins were also called Karshapana','The Arthashastra names the coin inspector as Rupadharshaka','Punch-marked coins are found in large numbers at Taxila, Pataliputra, Ujjain, and Magadha','Gupta gold coins were called Dinars and are considered the most artistic in Indian numismatic history','Samudragupta\'s coin types include the Lyrist type (playing veena), Ashvamedha type, and Archer type','Chandragupta II\'s coin types include the Tiger-slayer type','Chandragupta II was the first Gupta ruler to issue silver coins','Indo-Greeks were the first to issue gold coins in India','Satavahanas most commonly issued lead coins'],flashcards:[{q:'What were Pre-Mauryan coins called, and what metal were they?',a:'Punch-marked (Ahata) coins, also called Karshapana; mostly silver'},{q:'What did punch-marked coins lack, compared to later coins?',a:'A king\'s name or image — just 5 punched symbols'},{q:'What did the Arthashastra call the coin inspector?',a:'Rupadharshaka'},{q:'What were Gupta gold coins called?',a:'Dinar'},{q:'Which famous Samudragupta coin type shows him playing an instrument?',a:'The Lyrist type (playing veena)'},{q:'Which Gupta king\'s coin shows him as a \'Tiger-slayer\'?',a:'Chandragupta II'},{q:'Who first issued gold coins in India?',a:'The Indo-Greeks'},{q:'What metal did the Satavahanas most commonly use for coins?',a:'Lead'}],mcqs:[{q:'Punch-marked coins, the earliest coins of India, are made of which metal?',o:['Gold','Silver','Copper','Bronze'],a:1,e:'Punch-marked coins (600-300 BC) = mostly SILVER (also copper). They are irregular in shape, with multiple punched symbols. Called Karshapana or Pana in ancient texts.'},{q:'The basic unit of ancient Indian coinage mentioned in the Arthashastra is:',o:['Nishka','Pana/Karshapana','Dinara','Tankah'],a:1,e:'Arthashastra describes Pana or Karshapana as the standard monetary unit. 16 Mashakas = 1 Pana; 10 Dharanas = 1 Pala (rough equivalents).'},{q:'Gupta gold coins are called:',o:['Karshapana','Nishka','Dinar/Dinara','Tanka'],a:2,e:'Gupta gold coins = Dinar or Dinara. Samudragupta\'s coins show him playing the veena (evidence of his musical talent). Different types: Archer type, Lyrist type, Tiger-slayer type.'},{q:'The Kushana coins introduced which significant innovation in Indian numismatics?',o:['First punch-marked coins','Gold coinage with king\'s portrait and Greek legends','Copper token coinage','First bilingual inscriptions on coins'],a:1,e:'Kushanas (Kanishka etc.) introduced gold coins with the KING\'S PORTRAIT on one side and deity on the other, with Greek+Kharoshthi legends. This influenced Gupta coinage.'},{q:'Which type of Samudragupta\'s Gupta coins depicts him playing a musical instrument?',o:['Archer type','Standard type','Lyrist type','Tiger-slayer type'],a:2,e:'Lyrist type = Samudragupta playing the veena, confirming Harishena\'s description of him as a great musician. Archer type = most common Gupta coin.'},{q:'The earliest coins of India (punch-marked coins) date to approximately:',o:['1000 BC','600 BC','300 BC','200 BC'],a:1,e:'Punch-marked coins begin ~600 BC in the Mahajanapada period. This corresponds roughly to the Nanda-Maurya transition or just before Mauryan period.'},{q:'Coins of which ruler bear the legend \'Kaviraj\' (King of Poets)?',o:['Ashoka','Chandragupta II','Samudragupta','Kumaragupta I'],a:2,e:'Samudragupta\'s coins bear the legend \'Kaviraj\' — he was a poet as well as warrior. His court poet Harishena wrote the Allahabad Pillar inscription.'},{q:'The silver coins of the Mauryan period were primarily:',o:['Punch-marked (Karshapana)','Die-struck with king\'s portrait','Gold Dinars','Copper Karshas'],a:0,e:'Mauryan coins = punch-marked (Karshapana) silver coins with multiple symbols. The Mauryas did NOT issue portrait coins — that innovation came with Indo-Greeks/Kushanas.'},{q:'Indo-Greek kings were the first in India to issue coins with:',o:['Punch marks','King\'s portrait and bilingual legends','Gold coinage','Copper coinage'],a:1,e:'Indo-Greeks (like Menander/Milinda) were the FIRST to issue coins with king\'s portrait on obverse and deity on reverse, with bilingual (Greek+Kharoshthi) inscriptions — a revolutionary change.'},{q:'The Nishka, mentioned in Vedic texts, refers to:',o:['A unit of land','A golden ornament used as currency','A type of punch-marked coin','A copper coin'],a:1,e:'Nishka in Vedic period = a gold ornament (necklace/ring) used as a medium of exchange — pre-coinage \'currency\'. Later Nishka became a gold coin unit in Arthashastra terminology.'}]},
]},
{id:'ch5',title:'🏰 Chapter 5: South Indian Dynasties Extended',nodes:[
{id:'sd1',title:'Gangas, Kadambas & Hoysalas',xp:150,type:'regular',seqIdx:7,learn:'<h2 class="sec-head">🏰 South Indian Dynasties — Extended</h2><h3 class="sub-head">Gangas of Karnataka (350–1000 AD)</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Region</td><td>Southern Karnataka</td></tr><tr><td>Religion</td><td>Patrons of Jainism + Kannada literature</td></tr><tr><td>Famous contribution</td><td>Minister CHAMUNDARAYA built GOMATESHWARA statue at Shravanabelagola (981 AD)</td></tr><tr><td>Gomateshwara</td><td>World\'s tallest monolithic statue (58.8m); depicts Bahubali (Jain saint)</td></tr></tbody></table><h3 class="sub-head">Kadambas (345–540 AD)</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Significance</td><td>1ST DYNASTY to use Kannada for official inscriptions</td></tr><tr><td>Capital</td><td>Banavasi (North Karnataka)</td></tr><tr><td>Founder</td><td>MAYURASHARMA (Brahmin who became king)</td></tr><tr><td>Contemporary of</td><td>Guptas</td></tr></tbody></table><h3 class="sub-head">Hoysalas (1026–1343 AD)</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Region</td><td>Karnataka; capital DORASAMUDRA (Halebid)</td></tr><tr><td>Art style</td><td>HOYSALA STYLE = hybrid Nagara+Dravidian; star-shaped platform; intricate carvings</td></tr><tr><td>Key temples</td><td>Hoysaleshvara Temple (Halebid, Hassan); Chennakeshava Temple (Belur, Hassan)</td></tr><tr><td>Defeated by</td><td>Muhammad bin Tughlaq (1326)</td></tr></tbody></table><p>Hoysala temples feature elaborate star-shaped (stellate) platforms and some of the most intricate stone carvings in Indian art history.</p><div class="trap-box">⚠️ EXAM TRAP: Kadambas = 1st to use KANNADA in official inscriptions (not Gangas). Gomateshwara = built by CHAMUNDARAYA (minister of Ganga dynasty — not Kadamba). Hoysala = DORASAMUDRA/Halebid (not Hampi — that is Vijayanagara). Hoysaleshvara temple = HALEBID (not Belur — Belur has Chennakeshava temple).</div>',revision:['Gangas of Karnataka(350-1000AD): patrons of Jainism+Kannada, minister Chamundaraya built Gomateshwara(981AD)','Gomateshwara=world\'s tallest monolithic statue(58.8m),depicts Bahubali(Jain saint)','Kadambas(345-540AD): 1ST dynasty to use Kannada for official inscriptions, founder Mayurasharma(Brahmin who became king), capital Banavasi','Hoysalas(1026-1343AD): capital Dorasamudra(Halebid), Hoysala art style=hybrid Nagara+Dravidian,star-shaped platform','Kadambas contemporary of Guptas'],oneliners:['The Gangas of Karnataka ruled 350-1000 AD and patronized Jainism and Kannada literature','Ganga minister Chamundaraya built the Gomateshwara statue at Shravanabelagola in 981 AD','The Gomateshwara statue is the world\'s tallest monolithic statue (58.8m), depicting the Jain saint Bahubali','The Kadambas (345-540 AD) were the first dynasty to use Kannada for official inscriptions','The Kadamba dynasty was founded by Mayurasharma, a Brahmin who became king','The Kadamba capital was Banavasi in North Karnataka','The Kadambas were contemporaries of the Guptas','The Hoysalas (1026-1343 AD) ruled Karnataka with capital at Dorasamudra (Halebid)','Hoysala art style is a hybrid of Nagara and Dravidian styles','Hoysala temples feature a star-shaped platform and intricate carvings'],flashcards:[{q:'Which dynasty patronized Jainism and built the Gomateshwara statue?',a:'The Gangas of Karnataka'},{q:'Who built the Gomateshwara statue, and when?',a:'Minister Chamundaraya, in 981 AD'},{q:'What does the Gomateshwara statue depict, and how tall is it?',a:'The Jain saint Bahubali; 58.8 metres tall'},{q:'Which dynasty was first to use Kannada for official inscriptions?',a:'The Kadambas'},{q:'Who founded the Kadamba dynasty, and what was his background?',a:'Mayurasharma, a Brahmin who became king'},{q:'What was the Kadamba capital?',a:'Banavasi'},{q:'What was the Hoysala capital, and what art style did they develop?',a:'Dorasamudra (Halebid); a hybrid Nagara-Dravidian style with star-shaped platforms'}],mcqs:[{q:'The world\'s tallest monolithic statue, Gomateshwara (Bahubali), is located at:',o:['Hampi','Pattadakal','Shravanabelagola','Belur'],a:2,e:'Gomateshwara = Shravanabelagola, Hassan district, Karnataka. 58.8m tall monolithic statue of Bahubali (Jain Tirthankara), built in 981 AD.'},{q:'Who built the Gomateshwara statue at Shravanabelagola?',o:['Hoysala king','Ganga dynasty minister Chamundaraya','Kadamba king','Rashtrakuta king'],a:1,e:'Chamundaraya, minister of the Ganga dynasty of Karnataka, built the Gomateshwara statue in 981 AD. The Mahamastakabhisheka festival is held every 12 years.'},{q:'The Kadamba dynasty was the FIRST dynasty to use which language in official inscriptions?',o:['Tamil','Telugu','Kannada','Sanskrit'],a:2,e:'Kadambas of Banavasi (4th-6th cent AD) were the FIRST dynasty to use Kannada in official inscriptions — a landmark in Kannada literary history.'},{q:'The Hoysala style of temple architecture is best described as:',o:['Pure Dravidian with Vimana','Pure Nagara with Shikhara','Hybrid Nagara-Dravidian with star-shaped platform (stellate)','Vesara style on circular platform'],a:2,e:'Hoysala style = hybrid (Vesara) combining Nagara+Dravidian elements; built on a star-shaped (stellate) platform; known for intricate horizontal band carvings.'},{q:'The Hoysaleshvara Temple (one of the finest Hoysala temples) is located at:',o:['Belur','Somnathpur','Halebid','Badami'],a:2,e:'Hoysaleshvara Temple = HALEBID (Hassan district, Karnataka). Chennakeshava Temple = BELUR. Keshava Temple = SOMNATHPUR. All three are key Hoysala temples.'},{q:'The founder of the Kadamba dynasty was:',o:['Mayurasharma','Vishnuvardhan','Chamundaraya','Simhavishnu'],a:0,e:'Mayurasharma (also Mayurasharman) founded the Kadamba dynasty (~345 AD). He was originally a Brahmin scholar who fought and became a king — unique in Indian history.'},{q:'The Hoysala capital was:',o:['Banavasi','Dorasamudra (Halebid)','Vatapi','Malkhed'],a:1,e:'Dorasamudra (modern Halebid) = Hoysala capital. Banavasi = Kadamba capital. Vatapi/Badami = Chalukya capital. Malkhed = Rashtrakuta capital.'},{q:'The Ganga dynasty of Karnataka was primarily patrons of:',o:['Buddhism','Shaivism','Jainism','Vaishnavism'],a:2,e:'Gangas of Karnataka = patrons of Jainism (hence Gomateshwara at Shravanabelagola). They also supported Kannada literature.'},{q:'The Hoysala dynasty was ultimately defeated by:',o:['Alauddin Khilji','Muhammad bin Tughlaq','Malik Kafur','Firuz Shah Tughlaq'],a:1,e:'Muhammad bin Tughlaq defeated the last Hoysala king Vira Ballala III (1326-27 AD). Malik Kafur defeated earlier southern kings but not specifically the Hoysalas.'},{q:'Which famous Jain text (Jataka-like) was composed during the Ganga period at Shravanabelagola?',o:['Vardhamana Charitra','Adipurana by Jinasena','Aadipurana and Mahapurana','Adipurana'],a:1,e:'Jinasena\'s Adipurana (9th cent AD) = a great Jain Sanskrit text composed during the Ganga/Rashtrakuta period. Shravanabelagola was a major center of Jain learning.'}]},
{id:'sd2',title:'Kakatiyas, Eastern Chalukyas & Admin',xp:150,type:'regular',seqIdx:8,learn:'<h2 class="sec-head">🏯 Kakatiyas & Eastern Chalukyas</h2><h3 class="sub-head">Kakatiya Dynasty (1083–1323 AD)</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Region</td><td>Warangal (Andhra Pradesh)</td></tr><tr><td>Capital</td><td>Orugallu (Warangal)</td></tr><tr><td>Founders</td><td>Originally Rashtrakuta feudatories</td></tr><tr><td>Greatest ruler</td><td>PRATAPARUDRA II — defeated by Malik Kafur; captured by Ulugh Khan (1323)</td></tr><tr><td>Famous monuments</td><td>Warangal Fort + RAMAPPA TEMPLE (UNESCO 2021) ← NEW UNESCO SITE</td></tr><tr><td>Significance of Ramappa</td><td>UNESCO inscription = 2021; also called Rudreshvara Temple</td></tr></tbody></table><h3 class="sub-head">Eastern Chalukyas (Vengi) — 7th–12th cent AD</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Origin</td><td>Branch of Western Chalukyas (Badami)</td></tr><tr><td>Founded by</td><td>VISHNUVARDHAN (brother of Pulakeshin II)</td></tr><tr><td>Capital</td><td>Vengi (Andhra Pradesh)</td></tr><tr><td>End</td><td>Ultimately merged with Cholas via matrimonial alliance</td></tr></tbody></table><h3 class="sub-head">Administration Comparison — Mauryan vs Gupta vs Harsha</h3><table><thead><tr><th>Feature</th><th>Mauryan</th><th>Gupta</th><th>Harsha</th></tr></thead><tbody><tr><td>Type</td><td>Centralized</td><td>Semi-feudal</td><td>Feudal tendency</td></tr><tr><td>Land revenue</td><td>1/4 to 1/3</td><td>1/4 to 1/6</td><td>1/4</td></tr><tr><td>Spy system</td><td>ELABORATE (Gudhapurusha)</td><td>Existed</td><td>Existed</td></tr><tr><td>Capital</td><td>Pataliputra</td><td>Pataliputra (+Ujjain)</td><td>Kannauj</td></tr><tr><td>Provincial units</td><td>Province → District → Village</td><td>Desha → Vishaya → Vithi → Grama</td><td>Bhukti → Vishaya → Pathaka</td></tr><tr><td>Primary source</td><td>Arthashastra + Indica</td><td>Inscriptions + coins</td><td>Harshacharita + Si-Yu-Ki</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: Ramappa Temple = UNESCO 2021 (Kakatiya); Dholavira = UNESCO 2021 (IVC); Bhimbetka = UNESCO 2003. Vishnuvardhan = Eastern Chalukya founder (NOT Pulakeshin II himself). Mauryan land revenue = 1/4 to 1/3 (more than Gupta\'s 1/4 to 1/6).</div>',revision:['Kakatiyas(1083-1323AD,Warangal/Orugallu): originally Rashtrakuta feudatories, greatest ruler Pratapurudra II(defeated by Malik Kafur,captured by Ulugh Khan 1323)','Ramappa Temple(Warangal)=UNESCO 2021,also called Rudreshvara Temple — NEW UNESCO SITE','Eastern Chalukyas(Vengi,7th-12th c): branch of Western Chalukyas(Badami), founded by Vishnuvardhan(brother of Pulakeshin II), merged with Cholas via marriage','Capital comparison: Mauryan=Pataliputra, Gupta=Pataliputra(2nd Ujjain), Harsha=Thaneshwar->Kannauj','Eastern Chalukya capital = Vengi, Andhra Pradesh'],oneliners:['The Kakatiya dynasty (1083-1323 AD) ruled from Warangal (Orugallu), Andhra Pradesh','The Kakatiyas originated as feudatories of the Rashtrakutas','Pratapurudra II was the greatest Kakatiya ruler','Pratapurudra II was defeated by Malik Kafur and later captured by Ulugh Khan in 1323','The Ramappa Temple at Warangal, also called Rudreshvara Temple, received UNESCO status in 2021','The Eastern Chalukyas ruled Vengi (Andhra Pradesh) from the 7th-12th centuries','The Eastern Chalukyas were a branch of the Western Chalukyas of Badami','Vishnuvardhan, brother of Pulakeshin II, founded the Eastern Chalukya dynasty','The Eastern Chalukyas eventually merged with the Cholas through a matrimonial alliance','Mauryan and Gupta capitals were both Pataliputra; Harsha\'s capital shifted to Kannauj'],flashcards:[{q:'Where did the Kakatiya dynasty rule from?',a:'Warangal (Orugallu), Andhra Pradesh'},{q:'Who was the greatest Kakatiya ruler, and how did his reign end?',a:'Pratapurudra II; defeated by Malik Kafur, captured by Ulugh Khan in 1323'},{q:'What UNESCO site is linked to the Kakatiyas, and when was it inscribed?',a:'Ramappa (Rudreshvara) Temple, Warangal; UNESCO 2021'},{q:'Who founded the Eastern Chalukya dynasty?',a:'Vishnuvardhan, brother of Pulakeshin II'},{q:'What was the Eastern Chalukya capital?',a:'Vengi, Andhra Pradesh'},{q:'How did the Eastern Chalukya dynasty end?',a:'Merged with the Cholas via a matrimonial alliance'},{q:'What dynasty were the Kakatiyas originally feudatories of?',a:'The Rashtrakutas'}],mcqs:[{q:'The Ramappa Temple (UNESCO 2021) is associated with which dynasty?',o:['Cholas','Pallavas','Kakatiyas','Hoysalas'],a:2,e:'Ramappa Temple (officially Rudreshvara Temple) at Palampet, Warangal, Telangana = built by KAKATIYA dynasty (~13th cent AD). UNESCO World Heritage since 2021.'},{q:'The capital of the Kakatiya dynasty was:',o:['Orugallu (Warangal)','Vengi','Halebid','Vijayanagara'],a:0,e:'Kakatiyas ruled from Orugallu (modern Warangal), Telangana. Their greatest king Prataparudra II was captured by Delhi Sultanate general Ulugh Khan in 1323.'},{q:'The Eastern Chalukyas of Vengi were founded by:',o:['Pulakeshin II','Vishnuvardhan (Kubja Vishnuvardhana)','Vikramaditya II','Kirtivarman I'],a:1,e:'Kubja Vishnuvardhana (Pulakeshin II\'s brother) founded the Eastern Chalukya dynasty of Vengi (~7th cent AD). They later merged with the Cholas through marriage alliances.'},{q:'In which year did the Kakatiya king Prataparudra II fall to the Delhi Sultanate?',o:['1296','1310','1323','1336'],a:2,e:'Warangal fell to Ulugh Khan (later Muhammad bin Tughlaq) in 1323 AD, ending the Kakatiya dynasty. Prataparudra II died in captivity.'},{q:'Under the Mauryan administrative system, \'Mahamattas\' were:',o:['Village headmen','High-level officials / inspectors of the empire','Revenue collectors','Military commanders'],a:1,e:'Mahamattas = high-level officials in the Mauryan system. Dhamma Mahamattas = special officers for spreading Dhamma. Rajukas = revenue/administrative officials.'},{q:'Which administrative subdivision was the smallest unit in the Gupta administrative system?',o:['Desha','Vishaya','Vithi','Grama'],a:3,e:'Gupta hierarchy: Desha → Vishaya → Vithi → GRAMA (village). The Vishaya was governed by Vishayapati. Compare Mauryan: Province → District → Village.'},{q:'The Kakatiya rulers are best known for building which type of water management structures?',o:['Step-wells (Vav)','Large lake-tanks (Cheruvu) for irrigation','Canal systems','Underground qanats'],a:1,e:'Kakatiyas built hundreds of large artificial tanks (Cheruvu) for irrigation in the Deccan. Their water management system transformed the Telangana region.'},{q:'In Harsha\'s administrative system, the province was called:',o:['Bhukti','Janapada','Desha','Pradesh'],a:0,e:'Harsha\'s system: BHUKTI (province) → Vishaya (district) → Pathaka → Village. This is similar to Gupta\'s Desha but using the term Bhukti.'},{q:'The Eastern Chalukyas\' capital Vengi is located in present-day:',o:['Karnataka','Telangana','Andhra Pradesh','Tamil Nadu'],a:2,e:'Vengi = ancient name for the region near modern Eluru, East Godavari district, Andhra Pradesh. The Eastern Chalukyas ruled from here for nearly 500 years.'},{q:'Which Kakatiya monument was inscribed as UNESCO World Heritage Site in 2021, the same year as Dholavira?',o:['Warangal Fort','Ramappa Temple','Thousand Pillar Temple','Golconda Fort'],a:1,e:'Both Ramappa Temple (Telangana) and Dholavira (Gujarat) received UNESCO World Heritage status in 2021. Warangal Fort is a protected site but not UNESCO listed.'}]},
]},
{id:'ch6',title:'🗿 Chapter 6: Art & Architecture',nodes:[
{id:'ar1',title:'Rock-Cut Caves, Elephanta & Mahabalipuram',xp:160,type:'regular',seqIdx:9,learn:'<h2 class="sec-head">🗿 Art & Architecture Deep Dive</h2><h3 class="sub-head">Rock-Cut Architecture</h3><table><thead><tr><th>Site</th><th>Dynasty</th><th>Type</th><th>Key Feature</th></tr></thead><tbody><tr><td>Barabar Caves (Bihar)</td><td>Ashoka + Dasharatha</td><td>Buddhist + Ajivika</td><td>OLDEST rock-cut caves in India; polished interiors</td></tr><tr><td>Bhaja/Nasik Caves (MH)</td><td>Satavahana</td><td>Buddhist</td><td>Chaitya halls; early Buddhist</td></tr><tr><td>Ajanta (Maharashtra)</td><td>Satavahana+Vakataka/Gupta</td><td>Buddhist Chaitya+Vihara</td><td>Paintings masterpiece; 30 caves</td></tr><tr><td>Ellora (Maharashtra)</td><td>Multiple dynasties</td><td>Buddhist+Hindu+Jain</td><td>34 caves; Kailash Temple (single rock)</td></tr><tr><td>Elephanta (Maharashtra)</td><td>RASHTRAKUTA</td><td>Hindu</td><td>TRIMURTI sculpture (3-faced Shiva) — 6m tall; UNESCO 1987</td></tr><tr><td>Udaigiri (MP)</td><td>GUPTA</td><td>Hindu</td><td>VARAHA (Vishnu as boar) sculpture; Chandragupta II</td></tr></tbody></table><h3 class="sub-head">Elephanta Caves — Detailed</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Location</td><td>Elephanta Island, Mumbai Harbour</td></tr><tr><td>UNESCO</td><td>1987</td></tr><tr><td>Built by</td><td>RASHTRAKUTAS (~8th century AD)</td></tr><tr><td>Most famous</td><td>TRIMURTI = 3-faced Shiva (Brahma+Vishnu+Shiva aspects) — 6m tall</td></tr><tr><td>Other sculptures</td><td>Ardhanarishvara (Shiva-Shakti), Nataraja, Andhakasura-vadha</td></tr></tbody></table><h3 class="sub-head">Mahabalipuram (Pallava) — Detailed</h3><table><thead><tr><th>Monument</th><th>Builder</th><th>Key Fact</th></tr></thead><tbody><tr><td>Pancha Rathas (5 Rathas)</td><td>Narsimhavarman I (Mamalla)</td><td>Monolithic chariots; named after Pandavas + Draupadi</td></tr><tr><td>Shore Temple</td><td>Narsimhavarman II (Rajasimha)</td><td>1st structural stone temple in South India</td></tr><tr><td>Arjuna\'s Penance</td><td>Pallava</td><td>Largest open-air rock relief in world; Descent of Ganga</td></tr><tr><td>Cave Temples (Mandapas)</td><td>Pallava</td><td>Rock-cut temples; Mahishasuramardini cave famous</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: Elephanta Caves = RASHTRAKUTA (NOT Pallava, NOT Gupta). UNESCO Elephanta = 1987. Trimurti = 3-faced Shiva (NOT Brahma). Mahabalipuram UNESCO = 1984. Pancha Rathas = NARSIMHAVARMAN I (not II). Shore Temple = NARSIMHAVARMAN II (not I). Udaigiri (MP) = Gupta; Varaha sculpture.</div>',revision:['Barabar Caves(Bihar,Ashoka+Dasharatha,Buddhist+Ajivika)=OLDEST rock-cut caves in India','Bhaja/Nasik Caves(MH,Satavahana,Buddhist Chaitya halls) | Ajanta(Satavahana+Vakataka/Gupta,30 caves,paintings)','Ellora(multiple dynasties,34 caves,Buddhist+Hindu+Jain,Kailash Temple=single rock)','Elephanta(Rashtrakuta,Trimurti sculpture-3-faced Shiva,6m tall,UNESCO 1987)','Udaigiri(MP,Gupta,Varaha-Vishnu as boar-sculpture,Chandragupta II)'],oneliners:['Barabar Caves in Bihar are the OLDEST rock-cut caves in India','Barabar Caves were built under Ashoka and Dasharatha, for Buddhist and Ajivika use','Bhaja and Nasik Caves in Maharashtra, built under the Satavahanas, have early Buddhist Chaitya halls','Ajanta Caves, built under the Satavahanas and later Vakataka/Gupta period, have 30 caves famous for paintings','Ellora Caves have 34 caves representing Buddhist, Hindu, and Jain traditions across multiple dynasties','The Kailash Temple at Ellora is carved from a single rock','Elephanta Caves, built under the Rashtrakutas, feature the Trimurti sculpture — a 3-faced Shiva, 6 metres tall','Elephanta Caves received UNESCO status in 1987','Udaigiri Caves in Madhya Pradesh, from the Gupta period, feature the Varaha (Vishnu as a boar) sculpture','The Udaigiri Varaha sculpture is associated with Chandragupta II'],flashcards:[{q:'Which are the oldest rock-cut caves in India?',a:'Barabar Caves, Bihar'},{q:'Who built the Barabar Caves, and for which sects?',a:'Ashoka and Dasharatha; for Buddhist and Ajivika use'},{q:'Which dynasty built the early Chaitya halls at Bhaja and Nasik?',a:'The Satavahanas'},{q:'How many caves does Ellora have, and what 3 religions does it represent?',a:'34 caves; Buddhism, Hinduism, Jainism'},{q:'What is special about the Kailash Temple at Ellora?',a:'It is carved from a single rock'},{q:'What does the Elephanta Trimurti sculpture depict, and how tall is it?',a:'A 3-faced Shiva, 6 metres tall'},{q:'When did Elephanta Caves receive UNESCO status?',a:'1987'},{q:'What does the Udaigiri Varaha sculpture depict, and from which period?',a:'Vishnu as a boar; Gupta period, linked to Chandragupta II'}],mcqs:[{q:'The OLDEST rock-cut caves in India, featuring highly polished interiors, are:',o:['Ajanta Caves','Bhaja Caves','Barabar Caves','Udaigiri Caves (Odisha)'],a:2,e:'Barabar Caves (Bihar) = oldest rock-cut caves in India, 3rd cent BC. Ashoka dedicated some to Ajivikas; Dasharatha dedicated others to Ajivikas. Famous for their mirror-like polished interiors.'},{q:'The Trimurti sculpture (3-faced Shiva representing Brahma, Vishnu, Shiva aspects) at Elephanta Caves stands approximately:',o:['2m','4m','6m','10m'],a:2,e:'The Trimurti (Maheshmurti) at Elephanta is approximately 6 metres (20 feet) tall — one of the largest and most celebrated sculptures in Indian art.'},{q:'Elephanta Caves were built by which dynasty?',o:['Pallava','Chalukya','Rashtrakuta','Gupta'],a:2,e:'Elephanta Caves = RASHTRAKUTA dynasty (~8th century AD). Though earlier art existed, the main cave temples with the Trimurti were created under Rashtrakuta patronage.'},{q:'The Shore Temple at Mahabalipuram (the first structural stone temple in South India) was built by:',o:['Narsimhavarman I (Mamalla)','Narsimhavarman II (Rajasimha)','Mahendravarman I','Paramesvaravarman'],a:1,e:'Shore Temple = NARSIMHAVARMAN II (also called Rajasimha), ~700 AD. His father Narsimhavarman I (Mamalla) built the Pancha Rathas (monolithic). UNESCO 1984.'},{q:'Ajanta Caves are famous for their Buddhist paintings. The paintings primarily depict:',o:['Geometric patterns','Jataka tales (previous lives of Buddha) and Buddhist legends','Portrait of Gupta kings','Nature scenes without religious content'],a:1,e:'Ajanta paintings (mostly Gupta/Vakataka period) depict Jataka tales, Buddhist legends, and scenes from Bodhisattva lives. They are considered the finest surviving examples of ancient Indian painting.'},{q:'The Kailash Temple at Ellora (Cave 16) — carved from a single rock — was built by which dynasty?',o:['Rashtrakuta','Chalukya','Pallava','Gurjara-Pratihara'],a:0,e:'Kailash Temple (Ellora Cave 16) = RASHTRAKUTA king Krishna I (~8th cent AD). It is the world\'s largest monolithic rock excavation — carved top-down from a single basalt cliff.'},{q:'The Varaha (Vishnu as boar) sculpture at Udaigiri Caves (MP) is attributed to which period?',o:['Maurya','Shunga','Gupta','Rashtrakuta'],a:2,e:'Udaigiri Caves (Vidisha, MP) = GUPTA period (~5th cent AD). The giant Varaha panel shows Vishnu rescuing Earth goddess from the ocean — linked to Chandragupta II.'},{q:'The Pancha Rathas at Mahabalipuram are named after Pandavas and Draupadi. Which Pandava\'s name does the LARGEST ratha bear?',o:['Arjuna','Bhima','Dharmaraja','Nakula'],a:2,e:'Dharmaraja Ratha = largest of the 5 rathas. It has 3 stories and follows the Dravida/Pallava style. Arjuna Ratha is the second-largest.'},{q:'Ellora Caves contain temples of THREE religions. Which order is correct from caves 1-34?',o:['Hindu-Buddhist-Jain','Buddhist-Hindu-Jain','Jain-Buddhist-Hindu','Buddhist-Jain-Hindu'],a:1,e:'Ellora: Caves 1-12 = BUDDHIST; 13-29 = HINDU; 30-34 = JAIN. UNESCO 1983. The Kailash Temple = Cave 16 (Hindu section).'},{q:'Which ancient Indian Buddhist site features the famous painting of a \'Dying Princess\' (Sundari) and the \'Padmapani Bodhisattva\'?',o:['Ellora','Elephanta','Bagh Caves','Ajanta'],a:3,e:'Ajanta Cave 1 has the famous Padmapani Bodhisattva; Cave 17 has the \'Dying Princess\'. These are the most celebrated paintings in Ajanta\'s 30 Buddhist caves.'}]},
{id:'ar2',title:'Khajuraho + UNESCO Sites',xp:160,type:'regular',seqIdx:10,learn:'<h2 class="sec-head">🕌 Khajuraho + Key Art Facts</h2><h3 class="sub-head">Khajuraho — Chandela Temples</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Location</td><td>Chhatarpur, Madhya Pradesh</td></tr><tr><td>UNESCO</td><td>1986</td></tr><tr><td>Dynasty</td><td>CHANDELA (10th–11th century AD)</td></tr><tr><td>Number of temples</td><td>Originally 85; now 22 survive</td></tr><tr><td>Style</td><td>NAGARA (North Indian) — curvilinear Shikhara</td></tr><tr><td>Famous for</td><td>Erotic sculptures (only ~10% erotic; rest devotional)</td></tr><tr><td>Most famous temple</td><td>KANDARIYA MAHADEVA TEMPLE (largest; dedicated to Shiva)</td></tr><tr><td>Rediscovered by</td><td>T.S. BURT (British army engineer, 1838)</td></tr></tbody></table><h3 class="sub-head">UNESCO Heritage Sites — Ancient India</h3><table><thead><tr><th>Site</th><th>Year</th><th>Location</th><th>Dynasty/Period</th></tr></thead><tbody><tr><td>Sanchi Stupa</td><td>1989</td><td>MP</td><td>Ashoka (expanded by Shunga)</td></tr><tr><td>Ajanta Caves</td><td>1983</td><td>Maharashtra</td><td>Satavahana + Gupta/Vakataka</td></tr><tr><td>Ellora Caves</td><td>1983</td><td>Maharashtra</td><td>Multiple dynasties</td></tr><tr><td>Elephanta Caves</td><td>1987</td><td>Maharashtra</td><td>Rashtrakuta</td></tr><tr><td>Mahabalipuram</td><td>1984</td><td>Tamil Nadu</td><td>Pallava</td></tr><tr><td>Khajuraho</td><td>1986</td><td>MP</td><td>Chandela</td></tr><tr><td>Virupaksha Temple (Pattadakal)</td><td>1987</td><td>Karnataka</td><td>Chalukya</td></tr><tr><td>Hampi (Vijayanagara)</td><td>1986</td><td>Karnataka</td><td>Vijayanagara</td></tr><tr><td>Bhimbetka</td><td>2003</td><td>MP</td><td>Prehistoric</td></tr><tr><td>Dholavira (IVC)</td><td>2021</td><td>Gujarat</td><td>Harappan</td></tr><tr><td>Ramappa Temple</td><td>2021</td><td>Telangana</td><td>Kakatiya</td></tr></tbody></table><p><b>Chola Nataraja</b> = Shiva as cosmic dancer; made by CHOLA bronze using <b>lost-wax (cire-perdue) method</b>. <b>Dilwara Temples</b> (Mount Abu, Rajasthan) = JAIN temples; built by Solanki/Chaulukya rulers; Vimalshah (1031 AD) built first.</p><div class="fact-box"><strong>Correction Key Facts</strong><ul><li>Khajuraho = CHANDELA (not Chahamana/Chauhan)</li><li>Rediscovered by T.S. BURT (1838) — not John Smith</li><li>Chola Nataraja = LOST-WAX (cire-perdue) method</li><li>Dilwara temples = JAIN (not Hindu)</li><li>Ramappa Temple = KAKATIYA; UNESCO 2021</li></ul></div>',revision:['Khajuraho(Chhatarpur,MP,Chandela dynasty,10th-11th c,Nagara style,UNESCO 1986)','Originally 85 temples,now 22 survive | Famous for erotic sculptures(only ~10%,rest devotional)','Kandariya Mahadeva Temple=largest,dedicated to Shiva | Rediscovered by T.S.Burt(British engineer,1838)','UNESCO sites: Sanchi Stupa(1989,Ashoka/Shunga),Ajanta(1983),Ellora(1983),Elephanta(1987),Khajuraho(1986)','All these UNESCO years are frequently tested and confused'],oneliners:['Khajuraho temples are located in Chhatarpur, Madhya Pradesh','Khajuraho temples were built by the Chandela dynasty, 10th-11th century AD','Khajuraho follows the Nagara (North Indian) style with curvilinear Shikharas','Khajuraho originally had 85 temples; only 22 survive today','Khajuraho is famous for erotic sculptures, but only about 10% are erotic — the rest are devotional','Kandariya Mahadeva Temple, the largest at Khajuraho, is dedicated to Shiva','Khajuraho was rediscovered by T.S. Burt, a British army engineer, in 1838','Khajuraho received UNESCO World Heritage status in 1986','Sanchi Stupa received UNESCO status in 1989; Ajanta and Ellora in 1983; Elephanta in 1987','These UNESCO inscription years are frequently confused and tested in exams'],flashcards:[{q:'Where is Khajuraho, and which dynasty built it?',a:'Chhatarpur, Madhya Pradesh; built by the Chandela dynasty'},{q:'What percentage of Khajuraho\'s sculptures are erotic?',a:'Only about 10% — the rest are devotional'},{q:'How many Khajuraho temples survive today, out of how many originally?',a:'22 survive, out of an original 85'},{q:'Who rediscovered Khajuraho, and when?',a:'T.S. Burt, a British army engineer, in 1838'},{q:'Which is the largest Khajuraho temple, and to whom is it dedicated?',a:'Kandariya Mahadeva Temple; dedicated to Shiva'},{q:'When did Khajuraho receive UNESCO status?',a:'1986'},{q:'List the UNESCO years for Sanchi, Ajanta/Ellora, and Elephanta.',a:'Sanchi: 1989 | Ajanta & Ellora: 1983 | Elephanta: 1987'}],mcqs:[{q:'Khajuraho temples were built by which Rajput dynasty?',o:['Chahamanas (Chauhans)','Chandelas','Paramaras','Chandellas of Jejakabhukti'],a:1,e:'Chandela dynasty (also called Chandellas of Jejakabhukti) built Khajuraho temples ~10th-11th cent AD. Capital = Mahoba/Khajuraho region, MP.'},{q:'The Kandariya Mahadeva Temple at Khajuraho is dedicated to:',o:['Vishnu','Brahma','Shiva','Surya'],a:2,e:'Kandariya Mahadeva = largest Khajuraho temple; dedicated to SHIVA. \'Kandariya\' = mountain cave (refers to Shiva\'s abode). It exemplifies the Nagara (north Indian) style with curvilinear Shikhara.'},{q:'Khajuraho temples were \'rediscovered\' by which British engineer in 1838?',o:['Alexander Cunningham','T.S. Burt','John Marshall','James Prinsep'],a:1,e:'T.S. BURT (Captain, Bengal Engineers) rediscovered Khajuraho temples in 1838. He noted the erotic sculptures with some disapproval. Alexander Cunningham later documented them formally.'},{q:'Khajuraho temples received UNESCO World Heritage status in which year?',o:['1983','1986','1989','1992'],a:1,e:'Khajuraho = UNESCO 1986. (Ajanta = 1983, Ellora = 1983, Mahabalipuram = 1984, Elephanta = 1987, Sanchi = 1989)'},{q:'The Virupaksha Temple at Pattadakal (Karnataka), a UNESCO site, was built by which dynasty?',o:['Rashtrakuta','Chalukya of Badami','Hoysala','Pallava'],a:1,e:'Virupaksha Temple, Pattadakal = WESTERN CHALUKYA (Badami Chalukya) dynasty, ~740 AD, by Queen Lokamahadevi. It is a Dravidian-style temple. UNESCO 1987.'},{q:'Sanchi Stupa was originally built by Ashoka but expanded by which dynasty?',o:['Gupta','Kushana','Shunga','Satavahana'],a:2,e:'Ashoka built the original brick Sanchi Stupa. The SHUNGAS expanded it and added the toranas (gateways). The ornate toranas we see today are Shunga-period work.'},{q:'Chola bronze statues (including Nataraja) were made using which technique?',o:['Cold hammering','Stone carving','Lost-wax (cire-perdue) casting','Sheet metal repoussé'],a:2,e:'Chola bronzes = LOST-WAX (cire-perdue/madhuchchhishta vidhana) method. A wax model is made, coated in clay, heated to melt the wax, then molten metal poured in. Each piece is unique.'},{q:'The Dilwara Temples on Mount Abu (Rajasthan) are temples of which religion?',o:['Hindu','Buddhist','Jain','Shaiva'],a:2,e:'Dilwara Temples = JAIN temples built by Solanki/Chaulukya ministers. Vimalshah built the first Dilwara temple (1031 AD) dedicated to Adinath (1st Tirthankara). Famous for white marble carvings.'},{q:'Bhimbetka rock shelters (UNESCO 2003) in MP are famous for:',o:['Buddhist cave paintings','Prehistoric rock paintings (oldest ~30,000 years)','Jain carvings','Shaiva sculptures'],a:1,e:'Bhimbetka (Raisen, MP) = prehistoric rock shelters with paintings dating back 30,000+ years. They show hunting scenes, animals, dances. UNESCO 2003. Discovered by V.S. Wakankar (1957).'},{q:'Which of these pairs of UNESCO sites and their inscribing years is INCORRECT?',o:['Ajanta = 1983','Sanchi = 1989','Hampi = 1986','Dholavira = 2018'],a:3,e:'Dholavira received UNESCO status in 2021 — NOT 2018. Hampi = 1986 (correct). Ajanta = 1983 (correct). Sanchi = 1989 (correct).'}]},
]},
{id:'ch7',title:'🌍 Chapter 7: Foreign Travellers Enhanced',nodes:[
{id:'ft1',title:'Additional Travellers + What They Said',xp:160,type:'regular',seqIdx:11,learn:'<h2 class="sec-head">🌍 Foreign Travellers — Enhanced + Additional</h2><h3 class="sub-head">Additional Travellers Not in Earlier Parts</h3><table><thead><tr><th>Traveller</th><th>Period</th><th>Country</th><th>Visited/Key Fact</th></tr></thead><tbody><tr><td>Periplus of Erythrean Sea (anonymous)</td><td>1st cent AD</td><td>Greek/Egyptian</td><td>Describes Sangam ports (Chera, Chola, Pandya); maritime trade routes</td></tr><tr><td>Pliny the Elder</td><td>1st cent AD</td><td>Roman</td><td>Naturalis Historia; complained India drained Roman gold; describes Indian trade</td></tr><tr><td>Ptolemy (Claudius)</td><td>150 AD</td><td>Greek</td><td>Geography — first scientific map of India</td></tr><tr><td>Cosmas Indicopleustes</td><td>6th cent AD</td><td>Greek monk</td><td>Christian Topography; describes India\'s trade with SE Asia</td></tr><tr><td>Suleiman</td><td>851 AD</td><td>Arab</td><td>Silsilat ut-tawarikh — 1st Arab account of India</td></tr><tr><td>Al-Masudi</td><td>957 AD</td><td>Arab</td><td>Muruj-ul-Zahab — extensive account of India</td></tr><tr><td>Domingo Paes</td><td>1520–1522 AD</td><td>Portuguese</td><td>Visited Vijayanagara (KRISHNADEVA RAYA); described his court</td></tr><tr><td>Fernão Nunes</td><td>1535–1537 AD</td><td>Portuguese</td><td>History of Vijayanagara</td></tr></tbody></table><h3 class="sub-head">What Travellers Said — SSC Quick Points</h3><table><thead><tr><th>Observation</th><th>Traveller</th></tr></thead><tbody><tr><td>No slavery in India; no famine; 6 committees in Pataliputra; no lending/borrowing</td><td>MEGASTHENES (Indica) — Chandragupta Maurya</td></tr><tr><td>People well-off; no capital punishment; no killing of animals</td><td>FA-HIEN (Fo-Kyo-Ki) — Chandragupta II</td></tr><tr><td>Nalanda had 10,000+ monks; India divided into many kingdoms</td><td>HIUEN TSANG (Si-Yu-Ki) — Harshavardhana</td></tr><tr><td>India drained Roman gold via trade</td><td>PLINY THE ELDER</td></tr><tr><td>1st Muslim to study India scientifically; founder of Indology</td><td>AL-BERUNI (Kitab-ul-Hind) — came with Mahmud Ghazni</td></tr><tr><td>Described Vijayanagara wealth</td><td>ABDUR RAZZAQ + NICOLO CONTI + DUARTE BARBOSA + DOMINGO PAES</td></tr><tr><td>Economic history of India</td><td>MARCO POLO (Pandyan period)</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: Pliny the Elder = Roman who wrote about India (NOT a traveller who visited). Periplus = anonymous Greek/Egyptian text about Sangam ports. Domingo Paes = Portuguese who visited KRISHNADEVA RAYA (not Devraya II). Ptolemy = Greek geographer — wrote about India but did NOT visit.</div>',revision:['Periplus of Erythrean Sea(anon,1st c AD,Greek/Egyptian): describes Sangam ports+maritime trade','Pliny the Elder(Roman,1st c AD): Naturalis Historia, complained India drained Roman gold','Ptolemy(150AD,Greek): Geography, 1st scientific map of India','Cosmas Indicopleustes(6th c,Greek monk): Christian Topography | Suleiman(851AD,Arab): 1st Arab account','Al-Masudi(957AD,Arab): Muruj-ul-Zahab | Domingo Paes(1520-22,Portuguese): visited Vijayanagara/Krishnadeva Raya'],oneliners:['The Periplus of the Erythraean Sea, by an anonymous 1st century AD author, describes Sangam-era ports and trade routes','Pliny the Elder, a Roman, wrote Naturalis Historia and complained that India drained Roman gold','Ptolemy (Claudius), a Greek, wrote Geography around 150 AD — the first scientific map of India','Cosmas Indicopleustes, a Greek monk, wrote Christian Topography in the 6th century AD','Cosmas Indicopleustes described India\'s trade with Southeast Asia','Suleiman, an Arab traveller, wrote Silsilat ut-tawarikh in 851 AD — the first Arab account of India','Al-Masudi, an Arab traveller, wrote Muruj-ul-Zahab in 957 AD, an extensive account of India','Domingo Paes, a Portuguese traveller (1520-1522), visited Vijayanagara during Krishnadeva Raya\'s reign'],flashcards:[{q:'Who wrote the Periplus of the Erythraean Sea, and what does it describe?',a:'An anonymous Greek/Egyptian author; describes Sangam-era ports and trade routes'},{q:'Who complained that India drained Roman gold, and in which work?',a:'Pliny the Elder, in Naturalis Historia'},{q:'Who produced the first scientific map of India, and when?',a:'Ptolemy (Claudius), around 150 AD, in his work Geography'},{q:'Who wrote Christian Topography, and what does it describe?',a:'Cosmas Indicopleustes; describes India\'s trade with Southeast Asia'},{q:'Who wrote the first Arab account of India, and what was it called?',a:'Suleiman; Silsilat ut-tawarikh (851 AD)'},{q:'Who wrote Muruj-ul-Zahab?',a:'Al-Masudi (957 AD)'},{q:'Who was Domingo Paes, and whom did he visit?',a:'A Portuguese traveller who visited Vijayanagara under Krishnadeva Raya'}],mcqs:[{q:'The anonymous text \'Periplus of the Erythraean Sea\' (1st cent AD) is significant for Ancient Indian history because:',o:['It describes the Mauryan Empire','It provides the first European account of South Indian ports and trade routes','It mentions Alexander\'s campaigns','It describes Harsha\'s kingdom'],a:1,e:'Periplus = detailed account of maritime trade routes from Egypt to India; names Sangam-era ports (Musiri, Tondi, Korkai, Barygaza). Crucial source for Sangam economy.'},{q:'Al-Beruni is called the \'Father of Indology\' because:',o:['He was the first Muslim to visit India','He made the first systematic scientific study of Indian culture, religion, and science','He wrote about trade routes','He accompanied Mahmud Ghazni as a diplomat'],a:1,e:'Al-Beruni\'s Kitab-ul-Hind (1030 AD) = first systematic, comparative, and scientific analysis of Indian society, religion, mathematics, and philosophy by any foreign scholar.'},{q:'Which Arab traveller wrote \'Muruj-ul-Zahab\' (Meadows of Gold) with accounts of India?',o:['Suleiman','Al-Beruni','Al-Masudi','Ibn Batuta'],a:2,e:'Al-Masudi\'s Muruj-ul-Zahab (957 AD) = extensive Arab geographical and historical work with accounts of India. Al-Masudi is called the \'Herodotus of the Arabs\'.'},{q:'Domingo Paes (Portuguese traveller, 1520-22) is famous for describing the court of:',o:['Alauddin Khilji','Devaraya II','Krishnadeva Raya','Prataparudra II'],a:2,e:'Domingo Paes visited Vijayanagara and described the court of KRISHNADEVA RAYA (r. 1509-1529). He called it one of the best-provisioned cities in the world.'},{q:'Ibn Batuta\'s account of India (\'Rehla\') covers the period of which Delhi Sultan?',o:['Alauddin Khilji','Balban','Muhammad bin Tughlaq','Firuz Shah Tughlaq'],a:2,e:'Ibn Batuta visited India during MUHAMMAD BIN TUGHLAQ\'s reign (1334-41 AD). He served as qazi of Delhi and describes the Sultan\'s eccentricities in detail.'},{q:'The Chinese traveller who described Nalanda as having 10,000 monks and Harsha\'s kingdom was:',o:['Fa-Hien','I-Tsing','Hiuen Tsang','Wang Hiuen Tse'],a:2,e:'HIUEN TSANG (629-645 AD) described Nalanda\'s 10,000 monks, Harshavardhana\'s kingdom, and the overall condition of Buddhism in India. His account = Si-Yu-Ki.'},{q:'Fa-Hien noted that in India \'no capital punishment; people well-off; no killing of animals\' — this describes conditions under which king?',o:['Ashoka','Chandragupta Maurya','Chandragupta II (Gupta)','Harshavardhana'],a:2,e:'Fa-Hien (399-414 AD) visited India during CHANDRAGUPTA II\'s reign and described a peaceful, prosperous kingdom. His book = Fo-Kyo-Ki (Record of Buddhist Kingdoms).'},{q:'Which Greek geographer (~150 AD) produced the first scientific geographical map that included India?',o:['Megasthenes','Strabo','Pliny the Elder','Claudius Ptolemy'],a:3,e:'Claudius Ptolemy (Geographia, ~150 AD) created a systematic world map based on latitude/longitude that included India. He used coordinates for Indian cities.'},{q:'Abdur Razzaq, who described the wealth of Vijayanagara, was ambassador of which ruler?',o:['Ottoman Sultan','Mamluk Sultan of Egypt','Shah Rukh of Timurid Persia','Portuguese King'],a:2,e:'Abdur Razzaq (1442-43 AD) was ambassador of Shah Rukh (Timurid ruler of Persia/Samarkand). He visited Vijayanagara during Devaraya II\'s reign and left vivid descriptions.'},{q:'The first Arab account of India, \'Silsilat ut-tawarikh\', was written by:',o:['Al-Masudi','Suleiman','Ibn Battuta','Al-Biruni'],a:1,e:'Suleiman\'s Silsilat ut-tawarikh (851 AD) = the FIRST Arab account of India. It describes the Rashtrakuta and Pala kingdoms.'}]},
]},
{id:'ch8',title:'⚖️ Chapter 8: Administration + Identifications',nodes:[
{id:'ad1',title:'Admin Comparison + Key Identifications',xp:150,type:'regular',seqIdx:12,learn:'<h2 class="sec-head">⚖️ Administration Deep Dive + SSC Special Facts</h2><h3 class="sub-head">Arthashastra vs Indica — Key Differences</h3><table><thead><tr><th>Feature</th><th>Arthashastra (Kautilya)</th><th>Indica (Megasthenes)</th></tr></thead><tbody><tr><td>Author</td><td>Kautilya/Chanakya (Indian)</td><td>Megasthenes (Greek ambassador)</td></tr><tr><td>Perspective</td><td>Internal; theoretical; prescriptive</td><td>External; descriptive; observational</td></tr><tr><td>Period</td><td>Chandragupta Maurya\'s time</td><td>Chandragupta Maurya\'s time</td></tr><tr><td>Key content</td><td>Governance, economy, espionage, war</td><td>Society, 7 classes, cities, customs</td></tr></tbody></table><h3 class="sub-head">Decipherment of Ancient Scripts</h3><table><thead><tr><th>Script</th><th>Deciphered By</th><th>Year</th></tr></thead><tbody><tr><td>BRAHMI script</td><td>JAMES PRINSEP</td><td>1837</td></tr><tr><td>KHAROSHTHI script</td><td>James Prinsep + others</td><td>1837</td></tr><tr><td>Indus script</td><td>NOT YET DECIPHERED</td><td>—</td></tr></tbody></table><p><b>Arthashastra</b> was lost for centuries and rediscovered by <b>R. Shamasastry in 1905</b> at Mysore Oriental Library.</p><h3 class="sub-head">Key SSC Identifications</h3><table><thead><tr><th>Person</th><th>Identification</th></tr></thead><tbody><tr><td>Indian Machiavelli</td><td>CHANAKYA/KAUTILYA</td></tr><tr><td>Father of Indology</td><td>AL-BERUNI</td></tr><tr><td>Napoleon of India</td><td>SAMUDRAGUPTA (by V.A. Smith)</td></tr><tr><td>Prince of Travellers</td><td>HIUEN TSANG</td></tr><tr><td>Father of Pataliputra</td><td>UDAYIN (son of Ajatashatru)</td></tr><tr><td>Contemporary of both Buddha & Mahavira</td><td>BIMBISARA</td></tr><tr><td>Deciphered Brahmi</td><td>JAMES PRINSEP (1837)</td></tr><tr><td>Rediscovered Arthashastra</td><td>R. SHAMASASTRY (1905)</td></tr></tbody></table><h3 class="sub-head">Alexander in India — Quick Facts</h3><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody><tr><td>Year</td><td>326 BC</td></tr><tr><td>Battle</td><td>Battle of HYDASPES (vs PORUS on JHELUM river)</td></tr><tr><td>Who welcomed Alexander</td><td>AMBHI (Taxila)</td></tr><tr><td>Who stopped Alexander</td><td>COENUS (his own general) + Beas river</td></tr><tr><td>Alexander died at</td><td>BABYLON (323 BC)</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: Arthashastra rediscovered by SHAMASASTRY (1905) — not Cunningham. Brahmi deciphered by JAMES PRINSEP (1837) — not Mortimer Wheeler. Indus script = NOT yet deciphered. Father of Pataliputra = UDAYIN (not Ajatashatru himself).</div>',revision:['Arthashastra(Kautilya,internal/theoretical) vs Indica(Megasthenes,external/observational) — both Chandragupta Maurya\'s time','Brahmi script deciphered by James Prinsep(1837) | Kharoshthi also Prinsep+others(1837)','Indus script NOT YET DECIPHERED','Arthashastra lost for centuries, rediscovered by R.Shamasastry(1905) at Mysore Oriental Library','Key distinction: Arthashastra=prescriptive govt manual; Indica=descriptive foreign observation'],oneliners:['The Arthashastra, by Kautilya, is an internal, prescriptive work on governance, economy, and war','The Indica, by Megasthenes, is an external, descriptive account by a foreign observer','Both the Arthashastra and Indica describe Chandragupta Maurya\'s era','James Prinsep deciphered the Brahmi script in 1837','James Prinsep and others also deciphered the Kharoshthi script around 1837','The Indus Valley script remains undeciphered to this day','The Arthashastra was lost for centuries and rediscovered by R. Shamasastry in 1905','R. Shamasastry rediscovered the Arthashastra at the Mysore Oriental Library'],flashcards:[{q:'Compare the perspectives of the Arthashastra and the Indica.',a:'Arthashastra: internal, prescriptive (Kautilya) | Indica: external, descriptive (Megasthenes)'},{q:'Who deciphered the Brahmi script, and when?',a:'James Prinsep, in 1837'},{q:'Has the Indus script been deciphered?',a:'No — it remains undeciphered'},{q:'Who rediscovered the Arthashastra, and where?',a:'R. Shamasastry, at the Mysore Oriental Library'},{q:'When was the Arthashastra rediscovered?',a:'1905'},{q:'Both Arthashastra and Indica describe whose era?',a:'Chandragupta Maurya\'s era'}],mcqs:[{q:'Who deciphered the Brahmi script in 1837, enabling reading of Ashokan inscriptions?',o:['Alexander Cunningham','Mortimer Wheeler','James Prinsep','John Marshall'],a:2,e:'James Prinsep (Secretary of Asiatic Society of Bengal) deciphered Brahmi script in 1837. This was the key that unlocked reading of Ashoka\'s edicts.'},{q:'The Arthashastra was lost for centuries and rediscovered in 1905 by:',o:['R. Shamasastry','James Prinsep','Alexander Cunningham','Mortimer Wheeler'],a:0,e:'R. Shamasastry discovered the Arthashastra manuscript at the Mysore Oriental Library in 1905 and published his translation in 1909. A landmark in Indian historical studies.'},{q:'\'Indian Machiavelli\' is a title given to:',o:['Chandragupta Maurya','Bimbisara','Kautilya/Chanakya','Harsha'],a:2,e:'Kautilya/Chanakya = \'Indian Machiavelli\' for his realpolitik Arthashastra (similar to Machiavelli\'s The Prince). This comparison was made by Western scholars.'},{q:'The term \'Napoleon of India\' was coined by historian V.A. Smith for which ruler?',o:['Chandragupta Maurya','Ashoka','Harshavardhana','Samudragupta'],a:3,e:'V.A. Smith called SAMUDRAGUPTA the \'Napoleon of India\' for his extensive military conquests. He is described in the Allahabad Pillar inscription by his court poet Harishena.'},{q:'The \'Father of Pataliputra\' (founder of the city) is:',o:['Ajatashatru','Bimbisara','Udayin','Chandragupta Maurya'],a:2,e:'UDAYIN (son of Ajatashatru) founded Pataliputra (~460 BC) at the confluence of Ganges and Son rivers. Ajatashatru built a fort at the site. Chandragupta made it a great capital.'},{q:'Megasthenes in the Indica describes Pataliputra administration using how many committees?',o:['4 committees of 4 members each','6 committees of 5 members each','6 committees of 10 members each','5 committees of 6 members each'],a:1,e:'Megasthenes describes 30 MUNICIPAL COMMISSIONERS divided into 6 committees of 5 members each handling different aspects of city governance (port, industry, trade, census, etc.).'},{q:'The \'Uttaramerur inscription\' is important as evidence of which administrative system?',o:['Mauryan provincial administration','Gupta feudalism','Chola village self-governance','Harsha\'s bhukti system'],a:2,e:'Uttaramerur inscription (Tamil Nadu, Chola period, 9th-10th cent AD) describes the detailed rules of VILLAGE SELF-GOVERNANCE (Ward Assembly), including qualifications for representatives.'},{q:'Which ancient text was composed by the Mimamsa school and is considered the oldest extant systematic philosophy text?',o:['Brahma Sutras','Purva Mimamsa Sutras (Jaimini)','Nyaya Sutras','Yoga Sutras'],a:1,e:'Purva Mimamsa Sutras by Jaimini (~300 BC) = oldest extant systematic philosophy text. Mimamsa focuses on correct interpretation of Vedic rituals and the authority of the Vedas.'},{q:'The Indus Valley script remains undeciphered. This means:',o:['We know nothing about Harappan culture','We cannot directly read their language or texts but know much from archaeology','All Harappan sites are unexcavated','Only one Harappan site has inscriptions'],a:1,e:'Despite the undeciphered script, we know much about Harappan culture from archaeology (urban planning, seals, artifacts). The script has ~400 signs and appears to be read right-to-left.'},{q:'The \'Prince of Travellers\' is a title given to:',o:['Fa-Hien','Al-Beruni','Ibn Batuta','Hiuen Tsang'],a:3,e:'Hiuen Tsang (Xuanzang) = \'Prince of Travellers\' for his remarkable 16-year journey across Central Asia and India (629-645 AD). He traveled 10,000+ miles.'}]},
{id:'t1',title:'⚠️ Trap Node — Part 4 Confused Facts',xp:200,type:'trap',seqIdx:13,learn:'<h2 class="sec-head">⚠️ TRAP NODE — Part 4 Confused Facts</h2><h3 class="sub-head">Persian/Greek Invasion Traps</h3><table><thead><tr><th>WRONG</th><th>CORRECT</th></tr></thead><tbody><tr><td>First foreign invasion = Alexander</td><td>First foreign invasion = DARIUS I (Persian, 518 BC)</td></tr><tr><td>Darius I defeated by Alexander at Gaugamela</td><td>DARIUS III (not I) was defeated at Gaugamela (331 BC)</td></tr><tr><td>Kharoshthi came from Chinese contact</td><td>Kharoshthi = from PERSIAN (Achaemenid) contact</td></tr><tr><td>Alexander defeated Porus at Beas river</td><td>Battle of Hydaspes (JHELUM river) — not Beas; Beas = where army refused to advance</td></tr><tr><td>Ambhi opposed Alexander</td><td>AMBHI WELCOMED Alexander; PORUS opposed</td></tr></tbody></table><h3 class="sub-head">Art & Architecture Traps</h3><table><thead><tr><th>WRONG</th><th>CORRECT</th></tr></thead><tbody><tr><td>Elephanta Caves = Pallava</td><td>ELEPHANTA = RASHTRAKUTA (~8th cent AD)</td></tr><tr><td>Khajuraho = Hindu only; all erotic</td><td>Khajuraho = CHANDELA; only ~10% erotic; rest devotional</td></tr><tr><td>Khajuraho rediscovered = John Smith</td><td>Khajuraho rediscovered by T.S. BURT (1838)</td></tr><tr><td>Ramappa Temple UNESCO 1983</td><td>RAMAPPA = UNESCO 2021 (Kakatiya; Warangal, Telangana)</td></tr><tr><td>Hoysala temples = pure Dravidian</td><td>Hoysala = HYBRID of Nagara+Dravidian; star-shaped platform</td></tr><tr><td>Udaigiri (MP) = Satavahana</td><td>UDAIGIRI (MP) = GUPTA period; Varaha sculpture of Chandragupta II</td></tr></tbody></table><h3 class="sub-head">Science & Coins Traps</h3><table><thead><tr><th>WRONG</th><th>CORRECT</th></tr></thead><tbody><tr><td>Charaka = surgeon</td><td>SUSHRUTA = surgeon (plastic surgery, 300 instruments); CHARAKA = internal medicine</td></tr><tr><td>Aryabhata formalized zero</td><td>BRAHMAGUPTA formalized zero; Aryabhata USED the concept</td></tr><tr><td>Punch-marked coins = round</td><td>Punch-marked coins = IRREGULAR shape (not round)</td></tr><tr><td>Karshapana = gold coin</td><td>Karshapana = punch-marked SILVER coin unit</td></tr><tr><td>1st Indian to use binary numbers = Aryabhata</td><td>Binary numbers = PINGALA (Chandashashtra, ~200 BC)</td></tr></tbody></table><h3 class="sub-head">Dynasties Traps</h3><table><thead><tr><th>WRONG</th><th>CORRECT</th></tr></thead><tbody><tr><td>Kadamba = 1st to use Tamil in inscriptions</td><td>KADAMBA = 1st to use KANNADA in official inscriptions</td></tr><tr><td>Chamundaraya = Pallava minister</td><td>CHAMUNDARAYA = minister of GANGA dynasty (Karnataka)</td></tr><tr><td>Eastern Chalukya founder = Pulakeshin II</td><td>Eastern Chalukya founded by VISHNUVARDHAN (Pulakeshin II\'s brother)</td></tr><tr><td>Hoysala capital = Hampi</td><td>Hoysala capital = DORASAMUDRA (Halebid); Hampi = Vijayanagara</td></tr></tbody></table>',revision:['First foreign invasion=DARIUS I(518BC,Persian),NOT Alexander','Darius III(not I) defeated by Alexander at Gaugamela(331BC) | Kharoshthi=Persian contact(NOT Chinese)','Battle of Hydaspes=JHELUM river(NOT Beas) | Ambhi WELCOMED Alexander; PORUS opposed','Elephanta=RASHTRAKUTA(NOT Pallava) | Khajuraho=CHANDELA,only~10%erotic(NOT all erotic)','Khajuraho rediscovered by T.S.BURT(NOT John Smith — that\'s Ajanta\'s discoverer)'],oneliners:['Trap: The first foreign invasion of India was by Darius I (Persian, 518 BC), NOT Alexander','Trap: Darius III, not Darius I, was defeated by Alexander at Gaugamela (331 BC)','Trap: Kharoshthi script came from Persian contact, NOT Chinese contact','Trap: The Battle of Hydaspes was fought on the Jhelum river, NOT the Beas','Trap: Ambhi WELCOMED Alexander; Porus OPPOSED him — don\'t swap these','Trap: Elephanta Caves were built under the RASHTRAKUTAS, not the Pallavas','Trap: Khajuraho was built by the CHANDELA dynasty, and only ~10% of its sculptures are erotic','Trap: Khajuraho was rediscovered by T.S. Burt — John Smith rediscovered Ajanta, not Khajuraho','Always double-check which discoverer/dynasty goes with which monument — these pairs are heavily tested'],flashcards:[{q:'Who was the first foreign invader of India — Darius I or Alexander?',a:'Darius I (518 BC) — before Alexander'},{q:'Which Darius was defeated by Alexander at Gaugamela?',a:'Darius III, NOT Darius I'},{q:'Did Kharoshthi script come from Persian or Chinese contact?',a:'Persian contact'},{q:'Which river was the Battle of Hydaspes fought on?',a:'The Jhelum river, NOT the Beas'},{q:'Who welcomed Alexander, and who opposed him?',a:'Ambhi welcomed him; Porus opposed him'},{q:'Which dynasty built the Elephanta Caves?',a:'The Rashtrakutas, NOT the Pallavas'},{q:'Who rediscovered Khajuraho, and who rediscovered Ajanta?',a:'Khajuraho: T.S. Burt | Ajanta: John Smith — don\'t swap these'}],mcqs:[{q:'TRAP: Which of these statements about Darius I\'s invasion is CORRECT?',o:['Darius I was defeated by Alexander the Great','Darius I invaded India in 326 BC','Darius I made NW India the 20th satrapy (~518 BC)','Darius I was the first Achaemenid king'],a:2,e:'Darius I invaded ~518 BC — not 326 BC (that was Alexander). Alexander defeated DARIUS III (not I) at Gaugamela. Cyrus II was earlier but didn\'t fully conquer. NW India = 20th satrapy is correct.'},{q:'TRAP: The Elephanta Caves Trimurti shows 3 faces representing:',o:['Brahma, Vishnu, Shiva (Trimurti = three deities)','3 aspects of Shiva (Creator, Preserver, Destroyer)','3 forms of Vishnu','3 rivers — Ganga, Yamuna, Saraswati'],a:1,e:'The Elephanta Trimurti = 3 aspects of SHIVA (Sadyojata/Creator, Vamadeva/Preserver, Aghora/Destroyer) — NOT the Hindu Trimurti of 3 different gods. It is sometimes called Maheshmurti.'},{q:'TRAP: Which statement about Khajuraho is CORRECT?',o:['Built by Chahamana (Chauhan) Rajputs','Rediscovered by Alexander Cunningham','Most of the sculptures are erotic in nature (>50%)','Built by Chandela dynasty; only ~10% sculptures are erotic; rediscovered by T.S. Burt'],a:3,e:'Khajuraho = CHANDELA dynasty (not Chahamana). Rediscovered by T.S. BURT (not Cunningham). Only ~10% of the temple sculptures are erotic — the rest are devotional scenes.'},{q:'TRAP: Who FORMALIZED zero and its arithmetic rules?',o:['Aryabhata','Brahmagupta','Bhaskara I','Pingala'],a:1,e:'BRAHMAGUPTA (Brahmasphutasiddhanta, 628 AD) formalized zero and arithmetic with zero. Aryabhata USED a place-value system but did not define rules for zero arithmetic. This is a very common SSC trap.'},{q:'TRAP: Sushruta is famous for which field?',o:['Internal medicine / pharmacology','Astronomy','Surgery / plastic surgery','Grammar'],a:2,e:'SUSHRUTA = surgery (rhinoplasty, 300 instruments). CHARAKA = internal medicine. A very common SSC confusion. Sushruta Samhita = surgical text; Charaka Samhita = medical/pharmacology text.'},{q:'TRAP: The Eastern Chalukyas of Vengi were founded by:',o:['Pulakeshin II himself','Vishnuvardhan (Kubja Vishnuvardhana — Pulakeshin II\'s brother)','Kirtivarman II','Vikramaditya I'],a:1,e:'Eastern Chalukyas = founded by KUBJA VISHNUVARDHANA — Pulakeshin II\'s BROTHER (not Pulakeshin II himself). This is a common confusion since Pulakeshin II is the famous Chalukya king.'},{q:'TRAP: Ramappa Temple (UNESCO 2021) belongs to which dynasty?',o:['Cholas','Pallavas','Hoysalas','Kakatiyas'],a:3,e:'Ramappa (Rudreshvara) Temple = KAKATIYA dynasty; Warangal, Telangana; UNESCO 2021. Common trap: Hoysalas also built great temples but their UNESCO sites are pending. Cholas/Pallavas = Tamil Nadu.'},{q:'TRAP: The Periplus of the Erythraean Sea describes which period of Indian history?',o:['Mauryan Empire','Sangam era (South Indian ports and Roman trade, ~1st cent AD)','Gupta Empire','Delhi Sultanate'],a:1,e:'Periplus (1st cent AD) describes SANGAM-ERA ports and Indo-Roman maritime trade. It predates the Gupta Empire. This is sometimes confused with Megasthenes\' Indica (Mauryan period).'},{q:'TRAP: Kadamba dynasty was the first to use Kannada in official inscriptions. Their founder was:',o:['Simhavishnu','Mayurasharma','Chamundaraya','Vishnuvardhan'],a:1,e:'Kadamba founder = MAYURASHARMA. Chamundaraya = minister of the GANGA dynasty (not Kadamba). Vishnuvardhan = Eastern Chalukya founder. Simhavishnu = Pallava king.'},{q:'TRAP: Which pair is CORRECTLY matched — traveller and book?',o:['Fa-Hien — Si-Yu-Ki','Hiuen Tsang — Fo-Kyo-Ki','Ibn Batuta — Rehla','Al-Beruni — Muruj-ul-Zahab'],a:2,e:'Ibn Batuta — Rehla is CORRECT. Fa-Hien = Fo-Kyo-Ki; Hiuen Tsang = Si-Yu-Ki (these are SWAPPED in the first two options). Al-Beruni = Kitab-ul-Hind (not Muruj-ul-Zahab; that is Al-Masudi).'}]},
]},
{id:'chG',title:'🏹 Golden Chapter',nodes:[
{id:'golden',title:'🏹 SSC Bullet Blast + Master Revision',xp:500,type:'gold',seqIdx:14,learn:'<h2 class="sec-head">🏹 GOLDEN NODE — Part 4 Master Revision</h2><h3 class="sub-head">Persian Invasion & Chronology</h3><div class="fact-box"><strong>Must Know</strong><ul><li>Darius I invaded India ~518 BC — NW India = 20th satrapy</li><li>FIRST foreign invasion = Persians (Darius I, 518 BC) — NOT Alexander</li><li>Kharoshthi script = from Persian (Achaemenid) contact</li><li>Indians fought for Persia at Battle of Thermopylae (480 BC)</li><li>Battle of Hydaspes = JHELUM river; Alexander vs PORUS; 326 BC</li><li>Ambhi (Taxila) = welcomed Alexander; Porus = opposed</li><li>Alexander stopped by = COENUS (own general) + Beas river; died at Babylon (323 BC)</li></ul></div><h3 class="sub-head">Science & Art</h3><div class="fact-box"><strong>Must Know</strong><ul><li>Sushruta = plastic surgery + 300 surgical instruments</li><li>Charaka = internal medicine (Charakasamhita)</li><li>Brahmagupta = formalized ZERO (Brahmasphutasiddhanta, 628 AD)</li><li>Panini = Ashtadhyayi = world\'s 1st formal grammar</li><li>Baudhyana\'s Sulba Sutras = Pythagorean theorem precursor (800 BC)</li><li>Pingala = binary numbers (~200 BC)</li><li>Elephanta Caves = RASHTRAKUTA; UNESCO 1987; TRIMURTI (3-faced Shiva)</li><li>Khajuraho = CHANDELA; UNESCO 1986; T.S. Burt rediscovered (1838)</li><li>Ramappa Temple = KAKATIYA; UNESCO 2021</li><li>Gomateshwara (Shravanabelagola) = CHAMUNDARAYA (Ganga minister, 981 AD)</li></ul></div><h3 class="sub-head">SSC Bullet Blast</h3><table><thead><tr><th>Fact</th><th>Answer</th></tr></thead><tbody><tr><td>World\'s tallest monolithic statue</td><td>Gomateshwara, Shravanabelagola (58.8m)</td></tr><tr><td>World\'s 1st formal grammar</td><td>Ashtadhyayi — Panini (~4th cent BC)</td></tr><tr><td>India drained Roman gold</td><td>Pliny the Elder complained</td></tr><tr><td>Arikamedu excavated by</td><td>Mortimer Wheeler (1945)</td></tr><tr><td>Deciphered Brahmi</td><td>James Prin
