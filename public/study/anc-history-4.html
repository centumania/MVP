<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CentuMania — Ancient History Part 4</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#13100a;--surface:#1c1710;--surf2:#252018;--gold:#f0bc45;--gold2:#c8960e;--amber:#e67e22;--green:#3dd68c;--red:#f06b6b;--text:#f0e8d6;--muted:#8a7a5a;--border:#2e2618;--trap:#2d1a0a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;display:flex;flex-direction:column}
/* HEADER */
#hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
#hdr h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.2rem;color:var(--gold);flex:1}
#hdr .stat{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
/* LAYOUT */
#wrap{display:flex;flex:1;min-height:0}
/* SIDEBAR */
#sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
@media(max-width:700px){#sidebar{display:none}#sidebar.open{display:block;position:fixed;inset:0;z-index:200;width:100%;overflow-y:auto}}
.ch-label{font-size:11px;font-weight:600;color:var(--muted);padding:14px 14px 6px;letter-spacing:.06em;text-transform:uppercase}
.nd-btn{display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;border-left:3px solid transparent;cursor:pointer;color:var(--text);font-family:inherit;font-size:13px;transition:.15s}
.nd-btn:hover{background:var(--surf2)}
.nd-btn.active{background:var(--surf2);border-left-color:var(--gold);color:var(--gold)}
.nd-btn.locked{color:var(--muted);cursor:not-allowed}
.nd-btn.passed{border-left-color:var(--green)}
.nd-btn.gold-node{border-left-color:var(--amber)}
.nd-btn .nd-meta{font-size:11px;color:var(--muted);margin-top:2px}
/* MAIN CONTENT */
#main{flex:1;overflow-y:auto;padding:20px}
/* DASHBOARD */
#dash{max-width:700px;margin:0 auto}
.hero{background:linear-gradient(135deg,var(--surf2),var(--surface));border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px;text-align:center}
.hero h2{font-family:'Instrument Serif',serif;font-style:italic;font-size:2rem;color:var(--gold);margin-bottom:8px}
.hero p{color:var(--muted);font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.stat-card .val{font-family:'JetBrains Mono',monospace;font-size:1.6rem;color:var(--gold);font-weight:600}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:4px}
.ch-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.ch-card h3{font-size:14px;font-weight:600;margin-bottom:10px}
.nd-pills{display:flex;flex-wrap:wrap;gap:8px}
.nd-pill{padding:5px 10px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surf2);color:var(--muted);transition:.15s}
.nd-pill:hover{border-color:var(--gold);color:var(--gold)}
.nd-pill.passed{background:rgba(61,214,140,.1);border-color:var(--green);color:var(--green)}
.nd-pill.locked{opacity:.5;cursor:not-allowed}
.nd-pill.gold-node{border-color:var(--amber);color:var(--amber)}
/* NODE VIEW */
#node-view{max-width:780px;margin:0 auto}
.nv-hdr{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px}
.nv-hdr h2{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.4rem;color:var(--gold);margin-bottom:6px}
.nv-hdr .nv-meta{display:flex;gap:16px;font-size:12px;color:var(--muted)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:10px 20px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px;color:var(--muted);border-bottom:2px solid transparent;transition:.15s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
/* LEARN PANE */
.learn-content{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;line-height:1.7}
.learn-content h2.sec-head{font-family:'Instrument Serif',serif;font-style:italic;color:var(--gold);font-size:1.3rem;margin:20px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.learn-content h3.sub-head{color:var(--amber);font-size:1rem;margin:16px 0 8px;font-weight:600}
.learn-content p{margin-bottom:10px;color:var(--text)}
.learn-content table{width:100%;border-collapse:collapse;margin:10px 0 16px;font-size:13px}
.learn-content th{background:var(--surf2);color:var(--gold);padding:8px 10px;text-align:left;border:1px solid var(--border)}
.learn-content td{padding:7px 10px;border:1px solid var(--border);vertical-align:top}
.learn-content tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.fact-box{background:rgba(240,188,69,.07);border:1px solid var(--gold2);border-radius:6px;padding:12px 16px;margin:12px 0}
.fact-box strong{color:var(--gold);display:block;margin-bottom:6px;font-size:13px}
.revision-box{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.22);border-radius:6px;padding:12px 16px;margin:12px 0}
.revision-box strong{color:#4f8ef7;display:block;margin-bottom:6px;font-size:13px}
.oneliner-box{background:rgba(61,214,140,.05);border:1px solid rgba(61,214,140,.18);border-radius:6px;padding:12px 16px;margin:12px 0}
.oneliner-box strong{color:var(--green);display:block;margin-bottom:6px;font-size:13px}
.flash-hint{font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px;letter-spacing:.5px}
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:14px}
.flash-card{perspective:900px;cursor:pointer;height:140px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;line-height:1.4;border:1px solid var(--border)}
.flash-front{background:var(--surface);color:var(--text)}
.flash-back{background:rgba(240,188,69,.1);border-color:rgba(240,188,69,.3);color:var(--gold);transform:rotateY(180deg)}
.flash-reset-row{text-align:center;margin-top:4px}
.fact-box ul{list-style:none;padding:0}
.fact-box ul li{padding:3px 0;font-size:13px;color:var(--text)}
.fact-box ul li::before{content:"▸ ";color:var(--amber)}
.trap-box{background:var(--trap);border:1px solid #7a3010;border-radius:6px;padding:12px 16px;margin:12px 0;font-size:13px;color:#f0c090}
/* TEST PANE */
.test-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.test-header .score-badge{font-family:'JetBrains Mono',monospace;font-size:13px}
.test-header .score-badge.pass{color:var(--green)}
.test-header .score-badge.fail{color:var(--red)}
.retry-banner{background:rgba(240,107,107,.1);border:1px solid var(--red);border-radius:6px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.pass-banner{background:rgba(61,214,140,.1);border:1px solid var(--green);border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--green)}
.mcq-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.mcq-card .qnum{font-size:11px;color:var(--muted);margin-bottom:6px}
.mcq-card .qtext{font-size:14px;margin-bottom:12px;line-height:1.5}
.opt-btn{display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;background:var(--surf2);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text);transition:.15s}
.opt-btn:hover:not([disabled]){border-color:var(--gold);color:var(--gold)}
.opt-btn.selected{border-color:var(--amber);background:rgba(230,126,34,.1);color:var(--amber)}
.opt-btn.correct{border-color:var(--green);background:rgba(61,214,140,.1);color:var(--green)}
.opt-btn.wrong{border-color:var(--red);background:rgba(240,107,107,.1);color:var(--red)}
.opt-btn[disabled]{cursor:default;opacity:.55}
.explanation{font-size:12px;color:var(--muted);background:rgba(255,255,255,.03);border-radius:4px;padding:8px 10px;margin-top:8px;line-height:1.5;display:none}
.explanation.show{display:block}
.submit-row{text-align:center;padding:16px 0}
.btn{padding:10px 24px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;transition:.15s}
.btn-gold{background:var(--gold);color:#13100a}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.btn-outline:hover{background:rgba(240,188,69,.1)}
/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;border:1px solid var(--gold);border-radius:8px;padding:10px 20px;font-size:13px;z-index:999;opacity:0;transition:.3s;pointer-events:none}
#toast.show{opacity:1}
/* DRAWER */
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:none}
#drawer-overlay.open{display:block}
#drawer-btn{display:none;position:fixed;top:12px;left:12px;z-index:101;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer;color:var(--gold);font-size:18px}
@media(max-width:700px){#drawer-btn{display:block}}

.node-nav{display:flex;gap:8px;padding:16px;border-top:1px solid var(--border);margin-top:8px}
.nav-btn{font-family:inherit;font-weight:600;font-size:13px;border-radius:8px;padding:9px 14px;cursor:pointer;border:1px solid var(--border);background:var(--surf2);color:var(--text);transition:.15s;flex:1;text-align:center}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-btn.home-btn{flex:0 0 auto;background:var(--surface);color:var(--gold)}
</style>
</head>

<script>
const CHAPTERS=[
{id:'ch1',title:'🏺 Chapter 1: Invasions & Chronology',nodes:[
{id:'inv1',title:'Persian Invasion + Mega Timeline',xp:150,type:'regular',seqIdx:0,learn:'<h2 class="sec-head">🏺 Persian Invasion of India (Darius I, 518 BC)</h2><table><thead><tr><th>Detail</th><th>Answer</th></tr></thead><tbody><tr><td>Invader</td><td>DARIUS I (Darius the Great) — Achaemenid Persian Emperor</td></tr><tr><td>Year of invasion</td><td>~518 BC</td></tr><tr><td>Conquered</td><td>Gandhara (NW Pakistan) + Indus valley (Sindh + Punjab)</td></tr><tr><td>Status given</td><td>Made NW India the 20TH SATRAPY of Persian Empire</td></tr><tr><td>Annual tribute</td><td>360 silver talents (~360 kg silver)</td></tr><tr><td>Indians in Persian army</td><td>Fought for Persia at BATTLE OF THERMOPYLAE (480 BC) against Greeks</td></tr><tr><td>Script introduced</td><td>KHAROSHTHI script — came to India via Persian contact</td></tr><tr><td>Darius III distinction</td><td>Darius III (not I) was defeated by Alexander at Battle of Gaugamela (331 BC)</td></tr></tbody></table><h3 class="sub-head">Impact of Persian Invasion</h3><div class="fact-box"><strong>Key Effects</strong><ul><li>Kharoshthi script introduced — used in Ashokan NW edicts</li><li>Achaemenid administrative style in NW India</li><li>Cultural contact India ↔ Persia</li><li>Indians served in Persian army at Thermopylae (480 BC)</li></ul></div><h3 class="sub-head">Ancient India Chronology — Key Dates</h3><table><thead><tr><th>Date</th><th>Event</th></tr></thead><tbody><tr><td>~7,000 BC</td><td>Mehargarh — earliest farming in South Asia</td></tr><tr><td>2,500–1,750 BC</td><td>Indus Valley Civilisation (IVC) — first urban civilisation</td></tr><tr><td>1,500–600 BC</td><td>Aryan migration / Vedic period</td></tr><tr><td>600–325 BC</td><td>Mahajanapadas; Magadha rises</td></tr><tr><td>563–483 BC</td><td>Gautama Buddha</td></tr><tr><td>518 BC</td><td>Darius I invasion — NW India = 20th satrapy</td></tr><tr><td>326 BC</td><td>Alexander\'s invasion — Battle of Hydaspes vs Porus</td></tr><tr><td>321–297 BC</td><td>Chandragupta Maurya — Mauryan Empire founded</td></tr><tr><td>268–232 BC</td><td>Ashoka — Kalinga War (261 BC); Dhamma</td></tr><tr><td>185 BC</td><td>Brihadrath killed; Pushyamitra Shunga begins</td></tr><tr><td>319–550 AD</td><td>Gupta Empire — Golden Age</td></tr><tr><td>606–647 AD</td><td>Harshavardhana — last great N. India empire</td></tr><tr><td>1565 AD</td><td>Battle of Talikota — end of Vijayanagara</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: Darius I invaded India (518 BC) — NOT Darius III. Darius III was defeated by Alexander the Great at Gaugamela (331 BC). Kharoshthi script = Persian contact. First foreign invasion of India = PERSIANS (Darius I), NOT Greeks (Alexander).</div>',revision:['Darius I(Persian,518BC) invaded NW India FIRST — before Alexander(326BC) by ~200yrs','NW India = 20th satrapy, tribute 360 silver talents | Kharoshthi script via Persian contact','Indians fought for Persia at Thermopylae(480BC) | Darius III(not I) defeated by Alexander at Gaugamela(331BC)','Behistun Inscription(Darius I) lists \'Hi(n)dus\' as a province','Mega timeline: Mehargarh(7000BC)->IVC(2500BC)->Vedic->Mahajanapada->Buddha(563BC)->Darius I(518BC)->Alexander(326BC)->Mauryas->Guptas->Harsha'],oneliners:['Darius I, the Achaemenid Persian emperor, invaded India around 518 BC','Darius I\'s invasion of NW India predates Alexander\'s by nearly 200 years','Darius I made NW India the 20th satrapy of the Persian Empire','NW India paid an annual tribute of 360 silver talents to Persia','The Kharoshthi script came to India through Persian (Achaemenid) contact','Indian troops fought for Persia at the Battle of Thermopylae (480 BC)','Darius III, not Darius I, was defeated by Alexander at the Battle of Gaugamela (331 BC)','The Behistun Inscription of Darius I lists India (Hi(n)dus) as a Persian province','Mehargarh (~7000 BC) has the earliest evidence of farming in South Asia','The Mauryan Empire was founded by Chandragupta Maurya in 321-297 BC','The Gupta Empire (319-550 AD) is called India\'s Golden Age','Harshavardhana (606-647 AD) ruled the last great North Indian empire of this era'],flashcards:[{q:'Who first invaded India — Darius I or Alexander?',a:'Darius I (518 BC), about 200 years before Alexander (326 BC)'},{q:'What status did Persia give NW India?',a:'Made it the 20th satrapy of the Achaemenid Empire'},{q:'What script came to India via Persian contact?',a:'Kharoshthi script'},{q:'Where did Indian troops fight for Persia?',a:'At the Battle of Thermopylae (480 BC)'},{q:'Who was defeated by Alexander at Gaugamela — Darius I or III?',a:'Darius III, NOT Darius I'},{q:'What does the Behistun Inscription record about India?',a:'Lists India (Hi(n)dus) as a Persian province, under Darius I'},{q:'What was the annual tribute from NW India to Persia?',a:'360 silver talents'},{q:'In what year did the Mauryan Empire begin?',a:'321 BC, under Chandragupta Maurya'}],mcqs:[{q:'Which Persian king first invaded India around 518 BC?',o:['Cyrus II','Darius I','Xerxes I','Darius III'],a:1,e:'Darius I invaded NW India ~518 BC, making it the 20th satrapy. Cyrus II attempted earlier but died. Darius III was defeated by Alexander.'},{q:'Which region of India was conquered by Darius I and made the 20th satrapy of the Achaemenid Empire?',o:['Magadha','Taxila','North-West India (Gandhara/Punjab)','Kalinga'],a:2,e:'NW India (Gandhara/Sindh) became the 20th satrapy. Taxila was a city within that region, not the satrapy itself.'},{q:'Which script developed in India due to Persian (Achaemenid) influence?',o:['Brahmi','Devanagari','Kharoshthi','Grantha'],a:2,e:'Kharoshthi script came from Persian/Aramaic contact. Brahmi developed independently; Devanagari is medieval.'},{q:'Which Greek general\'s refusal to advance forced Alexander to turn back from India?',o:['Seleucus','Antigonus','Coenus','Ptolemy'],a:2,e:'Coenus led the military\'s refusal to advance beyond the Beas river. Seleucus and Ptolemy were successors who came after.'},{q:'The Battle of Hydaspes (326 BC) was fought on which river?',o:['Chenab','Beas','Jhelum','Ravi'],a:2,e:'Hydaspes = Greek name for Jhelum river. Alexander defeated Porus here. Beas = Hyphasis = the farthest point Alexander reached.'},{q:'Who welcomed Alexander at Taxila but was opposed by the local king Porus?',o:['Ambhi','Chandragupta','Bimbisara','Omphis II'],a:0,e:'Ambhi (also called Omphis) was ruler of Taxila and welcomed Alexander. Porus (ruler of Paurava kingdom) resisted.'},{q:'Alexander the Great died at which city after his Indian campaign?',o:['Alexandria','Susa','Persepolis','Babylon'],a:3,e:'Alexander died at Babylon in 323 BC, just 2 years after returning from India. He was 32 years old.'},{q:'What was CORRECT about the first foreign invasion of India?',o:['Alexander\'s invasion (326 BC) was the first','Darius I\'s invasion (518 BC) was the first','Cyrus II completely conquered India','Xerxes invaded India after Marathon'],a:1,e:'Darius I\'s ~518 BC invasion predates Alexander (326 BC) by nearly 200 years. Cyrus II attempted but did not successfully conquer. Xerxes never invaded India.'},{q:'Indians fought on the Persian side in which famous Greek battle?',o:['Marathon (490 BC)','Thermopylae (480 BC)','Plataea (479 BC)','Salamis (480 BC)'],a:1,e:'Indian troops (from the 20th satrapy) fought for Xerxes at Thermopylae (480 BC). This is confirmed by Herodotus.'},{q:'Which Achaemenid king\'s inscription (Behistun Inscription) mentions India (Hi(n)duš) as a province?',o:['Cyrus II','Darius I','Xerxes I','Artaxerxes'],a:1,e:'The Behistun Inscription of Darius I lists Hinduš (Sindhu/India) as a satrapy. This is key epigraphic evidence of Persian control.'}]},
]},
{id:'ch2',title:'📜 Chapter 2: Sangam Deep Dive',nodes:[
{id:'sg1',title:'Three Kingdoms + Roman Trade',xp:160,type:'regular',seqIdx:1,learn:'<h2 class="sec-head">📜 Sangam Age — Three Kingdoms Deep Dive</h2><h3 class="sub-head">Chera Kingdom</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Region</td><td>Kerala + parts of Tamil Nadu (western India)</td></tr><tr><td>Capital</td><td>Vanji (Karur, Tamil Nadu)</td></tr><tr><td>Main ports</td><td>Musiri (Muziri), Tondi</td></tr><tr><td>Emblem</td><td>Bow</td></tr><tr><td>Famous for</td><td>Pepper, spices, ivory trade with Rome; western sea trade</td></tr><tr><td>Historical source</td><td>Periplus of the Erythrean Sea mentions Chera ports</td></tr></tbody></table><h3 class="sub-head">Chola Kingdom (Sangam Age)</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Capital</td><td>Uraiyur → Puhar/Kaveripattinam</td></tr><tr><td>Emblem</td><td>Tiger</td></tr><tr><td>Main port</td><td>Puhar (Kaveripattinam)</td></tr><tr><td>Greatest king</td><td>KARIKALA CHOLA</td></tr><tr><td>His achievements</td><td>Defeated Chera+Pandya+11 chieftains at Battle of Venni; Built Grand Anicut (Kallanai) dam on Kaveri — one of world\'s oldest dams still in use; Built city of Puhar</td></tr></tbody></table><h3 class="sub-head">Pandya Kingdom</h3><table><thead><tr><th>Detail</th><th>Info</th></tr></thead><tbody><tr><td>Region</td><td>Southern Tamil Nadu (Tirunelveli, Madurai, Ramanathapuram)</td></tr><tr><td>Capital</td><td>Madurai</td></tr><tr><td>Main port</td><td>Korkai (pearl trade)</td></tr><tr><td>Emblem</td><td>Fish</td></tr><tr><td>Famous for</td><td>Pearl fishery in Gulf of Mannar; pearls exported to Rome</td></tr><tr><td>Greatest king</td><td>NEDUNJ CHELIYAN</td></tr></tbody></table><h3 class="sub-head">Roman Trade with Sangam South India</h3><table><thead><tr><th>Exported</th><th>Imported</th></tr></thead><tbody><tr><td>Pepper (black gold), spices, ivory, pearls, cotton</td><td>Roman gold coins (found in large numbers in Tamil Nadu)</td></tr></tbody></table><p><b>Arikamedu</b> (near Pondicherry) = major Indo-Roman trade centre; excavated by <b>Mortimer Wheeler (1945)</b>. Roman glass + pottery (<b>Arretine ware</b>) found there.</p><p><b>Pliny the Elder</b> complained that India drained Roman gold via trade. Roman coins found at Pondicherry, Coimbatore, Malabar (Kerala).</p><div class="trap-box">⚠️ EXAM TRAP: Karikala Chola built Grand Anicut (Kallanai) — NOT the Kaveri embankment only. Arikamedu excavated by MORTIMER WHEELER (1945). Chera capital = Vanji/Karur (NOT Madurai — that is Pandya). Pandya port = KORKAI (NOT Puhar — that is Chola).</div>',revision:['Chera(Kerala,capital Vanji/Karur,emblem Bow,ports Musiri+Tondi)','Chola(capital Uraiyur->Puhar,emblem Tiger,greatest king Karikala-built Grand Anicut/Kallanai)','Pandya(capital Madurai,port Korkai-pearls,emblem Fish,greatest king Nedunj Cheliyan)','Arikamedu(near Pondicherry)=Indo-Roman trade site, excavated Mortimer Wheeler(1945)','Pliny the Elder complained India drained Roman gold'],oneliners:['The three Sangam kingdoms were Chera, Chola, and Pandya','The Chera kingdom covered Kerala and western Tamil Nadu, capital at Vanji (Karur)','The Chera emblem was the Bow; main ports were Musiri and Tondi','The Chola kingdom\'s capital moved from Uraiyur to Puhar (Kaveripattinam)','The Chola emblem was the Tiger','Karikala Chola, the greatest Chola king, built the Grand Anicut (Kallanai) dam on the Kaveri','The Kallanai dam is one of the world\'s oldest dams still in use','The Pandya kingdom\'s capital was Madurai, with port at Korkai for pearl trade','The Pandya emblem was the Fish; Nedunj Cheliyan was their greatest king','Arikamedu, near Pondicherry, was a major Indo-Roman trade centre','Arikamedu was excavated by Mortimer Wheeler in 1945','Pliny the Elder complained that trade with India was draining Rome of its gold'],flashcards:[{q:'Name the 3 Sangam kingdoms and their emblems.',a:'Chera (Bow), Chola (Tiger), Pandya (Fish)'},{q:'What dam did Karikala Chola build, and is it still in use?',a:'The Grand Anicut (Kallanai), on the Kaveri — still in use today'},{q:'What was the Pandya capital and key port?',a:'Madurai; port at Korkai (pearls)'},{q:'What was the Chera capital?',a:'Vanji (Karur)'},{q:'Who excavated Arikamedu, and when?',a:'Mortimer Wheeler, in 1945'},{q:'What did Pliny the Elder complain about?',a:'That trade with India was draining Rome of gold'},{q:'Which text mentions Sangam-era ports like Musiri and Tondi?',a:'The Periplus of the Erythraean Sea'}],mcqs:[{q:'Which text describes Sangam-era ports and maritime trade routes in detail?',o:['Arthashastra','Periplus of the Erythraean Sea','Indica','Naturalis Historia'],a:1,e:'Periplus of the Erythraean Sea (1st cent AD, anonymous Greek/Egyptian author) describes Sangam-era ports — Musiri, Tondi, Korkai etc.'},{q:'The Roman trading post excavated at Arikamedu is located in which present-day state?',o:['Tamil Nadu','Kerala','Karnataka','Andhra Pradesh'],a:0,e:'Arikamedu is near Pondicherry (Puducherry), Tamil Nadu. It was excavated by Mortimer Wheeler in 1945.'},{q:'Who excavated Arikamedu in 1945, confirming Indo-Roman trade?',o:['John Marshall','Alexander Cunningham','Mortimer Wheeler','R.E.M. Wheeler'],a:2,e:'Mortimer Wheeler excavated Arikamedu (1945). Roman amphorae, coins, and arretine pottery confirmed active Indo-Roman trade.'},{q:'The Sangam-era Chera kingdom was centred in which region?',o:['Northern Tamil Nadu','Modern Kerala and western Tamil Nadu','Eastern Andhra Pradesh','Karnataka'],a:1,e:'The Cheras controlled modern Kerala and western Tamil Nadu (Kongu region). Chola = eastern TN; Pandya = southern TN.'},{q:'Which Roman author complained that India was draining Rome of its gold through trade?',o:['Julius Caesar','Pliny the Elder','Claudius Ptolemy','Suetonius'],a:1,e:'Pliny the Elder (Naturalis Historia, 1st cent AD) famously complained that India drained Roman gold — estimated at 50 million sesterces annually.'},{q:'The Sangam text that describes Puhar (Chola port) as a major trading hub is:',o:['Manimekalai','Silappatikaram','Akananuru','Purananuru'],a:0,e:'Manimekalai (by Seethalai Saathanar) opens at Puhar (Kaveripattinam), the great Chola port. Silappatikaram begins at Puhar too, but Manimekalai specifically details it as a trade city.'},{q:'Which Sangam dynasty had its capital at Korkai (later Madurai)?',o:['Chera','Chola','Pandya','Pallava'],a:2,e:'The Pandyas had their capital at Korkai (early) and later Madurai. Chola = Uraiyur/Kaveripattinam; Chera = Vanji/Tondi.'},{q:'The Sangam poem \'Pattinappalai\' describes trade in which Chola port?',o:['Tondi','Musiri','Kaveripattinam (Puhar)','Korkai'],a:2,e:'Pattinappalai (one of 10 Idylls / Pattupattu) describes Kaveripattinam (Puhar) — the great Chola commercial port.'},{q:'What did Roman archaeology (red-glazed Arretine ware + amphorae) at Arikamedu confirm?',o:['That Indians visited Rome','That Romans had a permanent settlement in Tamil Nadu','Direct Indo-Roman maritime trade (~1st cent BC – 1st cent AD)','That Sangam kings were Roman allies'],a:2,e:'Arretine ware (Roman fine pottery), wine amphorae, and Roman coins at Arikamedu confirmed direct maritime trade, not merely relay trade.'},{q:'The Sangam Chola port \'Uraiyur\' was famous for trade in which commodity?',o:['Gold','Silk','Muslin','Pearls'],a:1,e:'Uraiyur (Chola inland capital) was famous for cotton/silk trade. Kaveripattinam/Puhar was the seaport. Pearls = Pandya/Korkai region.'}]},
{id:'sg2',title:'Sangam Literature + Society',xp:150,type:'regular',seqIdx:2,learn:'<h2 class="sec-head">📚 Sangam Literature Extended + Society</h2><h3 class="sub-head">Five Great Tamil Epics (Aimperumkappiyangal)</h3><table><thead><tr><th>Epic</th><th>Author</th><th>Key Fact</th></tr></thead><tbody><tr><td>Silappadikaram</td><td>Ilango Adigal (Chera prince)</td><td>1st Tamil epic; story of Kovalan & Kannagi</td></tr><tr><td>Manimegalai</td><td>Sattanar</td><td>2nd Tamil epic; sequel to Silappadikaram; Buddhist</td></tr><tr><td>Civaka Cintamani</td><td>Tiruttakkadevar</td><td>Jain epic</td></tr><tr><td>Valayapathi</td><td>Unknown</td><td>Jain-influenced</td></tr><tr><td>Kundalakesi</td><td>Naathakutnar</td><td>Buddhist epic</td></tr></tbody></table><h3 class="sub-head">Sangam Text Categories</h3><table><thead><tr><th>Category</th><th>Texts</th><th>Content</th></tr></thead><tbody><tr><td>Ettuthokai (8 anthologies)</td><td>Purananuru, Akananuru, Kalittokai, Natrinai, Kurunthokai, etc.</td><td>Love + war poems</td></tr><tr><td>Pattupattu (10 idylls)</td><td>Tirumurukattruppadai, etc.</td><td>Longer descriptive poems</td></tr><tr><td>Didactic</td><td>Tirukkural (Tiruvalluvar), Naladiyar</td><td>Ethics, morals</td></tr></tbody></table><h3 class="sub-head">Five Tinai Zones — Sangam Society</h3><table><thead><tr><th>Tinai</th><th>Landscape</th><th>Occupation</th></tr></thead><tbody><tr><td>Kurinji</td><td>Mountains</td><td>Hunters</td></tr><tr><td>Mullai</td><td>Forests</td><td>Pastoral (cattle herders)</td></tr><tr><td>Marudam</td><td>River plains</td><td>Agricultural</td></tr><tr><td>Neytal</td><td>Coastal</td><td>Fishing</td></tr><tr><td>Palai</td><td>Desert</td><td>Wanderers, robbers</td></tr></tbody></table><p><b>Koothu</b> = Tamil folk drama (important social institution). <b>Panar</b> = wandering minstrels who praised kings. Women had relative freedom; some warrior women noted in Sangam texts.</p><div class="fact-box"><strong>SSC One-Liners</strong><ul><li>Tirukkural = Tiruvalluvar; 1330 couplets; "Bible of Tamil Land"</li><li>Tolkappiyam = Tolkappiyar; oldest Tamil grammar</li><li>Silappadikaram = Ilango Adigal; 1st Tamil epic</li><li>Five Great Epics = Aimperumkappiyangal</li><li>Arikamedu = Indo-Roman trade site; excavated by Mortimer Wheeler (1945)</li><li>Pliny the Elder = complained India drained Roman gold</li></ul></div>',revision:['5 Great Tamil Epics: Silappadikaram(Ilango Adigal,1st),Manimegalai(Sattanar,Buddhist),Civaka Cintamani(Jain),Valayapathi,Kundalakesi(Buddhist)','Sangam texts: Ettuthokai(8 anthologies),Pattupattu(10 idylls),Didactic(Tirukkural by Tiruvalluvar)','5 Tinai zones: Kurinji(mountains,hunters),Mullai(forest,pastoral),Marudam(plains,agri),Neytal(coast,fishing),Palai(desert,wanderers)','Tolkappiyam=oldest Tamil grammar | Tirukkural=1330 couplets,\'Bible of Tamil Land\'','3 Sangams in tradition: only 3rd Sangam\'s texts survive'],oneliners:['The 5 Great Tamil Epics are called Aimperumkappiyangal','Silappadikaram, by Ilango Adigal, is the first Tamil epic, about Kovalan and Kannagi','Manimegalai, by Sattanar, is a Buddhist epic, a sequel to Silappadikaram','Civaka Cintamani is a Jain epic','Sangam literature is grouped into Ettuthokai (8 anthologies) and Pattupattu (10 idylls)','Tirukkural, by Tiruvalluvar, is a didactic text with 1330 couplets on ethics','Tirukkural is called the \'Bible of the Tamil Land\'','Tolkappiyam, by Tolkappiyar, is the oldest surviving Tamil grammar','The Tinai system divides Sangam society into 5 ecological/landscape zones','Kurinji (mountains) = hunters; Mullai (forest) = pastoral herders','Marudam (river plains) = agriculturalists; Neytal (coastal) = fishers; Palai (desert) = wanderers','Tamil tradition recognizes 3 Sangams, but only the Third Sangam\'s texts survive'],flashcards:[{q:'Name the first Tamil epic and its author.',a:'Silappadikaram, by Ilango Adigal'},{q:'Which epic is Buddhist and a sequel to Silappadikaram?',a:'Manimegalai, by Sattanar'},{q:'What are the two main categories of Sangam literature?',a:'Ettuthokai (8 anthologies) and Pattupattu (10 idylls)'},{q:'Who wrote the Tirukkural, and what is it called?',a:'Tiruvalluvar; called the \'Bible of the Tamil Land\''},{q:'What is the Tolkappiyam?',a:'The oldest surviving Tamil grammar'},{q:'Name the 5 Tinai zones and their occupations.',a:'Kurinji (hunters), Mullai (pastoral), Marudam (agriculture), Neytal (fishing), Palai (wanderers)'},{q:'How many Sangams does Tamil tradition recognize, and how many survive in text?',a:'3 Sangams; only the 3rd Sangam\'s texts survive'}],mcqs:[{q:'How many Sangam assemblies (Sangams) are mentioned in Tamil tradition?',o:['1','2','3','5'],a:2,e:'Tamil tradition mentions THREE Sangams (Muthamizh Sangam): First at Madurai (legendary), Second at Kapadapuram, Third at current Madurai — only the Third\'s texts survive.'},{q:'The Five Great Tamil Epics include Silappatikaram and Manimekalai. Who wrote Silappatikaram?',o:['Seethalai Saathanar','Ilango Adigal','Tiruttakka Devar','Chattan'],a:1,e:'Ilango Adigal (a Jain prince / Chera prince who became a monk) wrote Silappatikaram. Seethalai Saathanar wrote Manimekalai.'},{q:'The Tinai system in Sangam literature refers to:',o:['The tax system of the Sangam kings','Five ecological landscape zones each with prescribed themes','The five Sangam anthologies','Military units of the Chola army'],a:1,e:'Tinai = 5 eco-landscape zones (Kurinji=mountains, Mullai=forest, Marudam=farmland, Neithal=coast, Palai=desert) — each had prescribed love themes in Akam (inner/love) poetry.'},{q:'Which Sangam anthology contains the oldest Tamil poems and is called the \'Rig Veda of Tamil literature\'?',o:['Purananuru','Akananuru','Tolkappiyam','Purapporul Venba Malai'],a:0,e:'Purananuru (400 poems on war/heroism/outer life) is considered the Rig Veda of Tamil lit. Tolkappiyam = oldest Tamil grammar, not an anthology.'},{q:'Tolkappiyam, the oldest Tamil grammar, was composed during which Sangam?',o:['First Sangam','Second Sangam','Third Sangam','Fourth Sangam'],a:2,e:'Tolkappiyam was composed during the Third Sangam period. It is the oldest surviving Tamil grammar, by Tolkappiyar.'},{q:'The Sangam category of \'Akam\' poetry deals with:',o:['War and heroism','Love and inner emotions','Religion and devotion','Administrative records'],a:1,e:'Akam = inner/love poetry. Puram = outer/heroic poetry (war, death, kings). Silappatikaram blends both.'},{q:'Which of the following is NOT one of the Eight Anthologies (Ettuthokai) of Sangam literature?',o:['Purananuru','Akananuru','Kuruntokai','Silappatikaram'],a:3,e:'Silappatikaram is one of the FIVE GREAT EPICS, not one of the Eight Anthologies (Ettuthokai). The Ettuthokai includes Purananuru, Akananuru, Kuruntokai, Natrinai, Kalittokai, Ainkurunuru, Paripatal, Agattiyam.'},{q:'The Sangam Tinai zone associated with \'mountains and waterfalls\' and the theme of \'union\' in love is:',o:['Mullai','Marudam','Kurinji','Neithal'],a:2,e:'Kurinji = mountains/waterfalls = theme of secret union between lovers. Mullai = forest = waiting/separation; Neithal = seashore = longing.'},{q:'Who is the hero of Silappatikaram whose wife Kannagi burns Madurai after an unjust execution?',o:['Kovalan','Murugan','Ilangovadigal','Udayan'],a:0,e:'Kovalan (a Chola merchant) is unjustly executed; his wife Kannagi destroys Madurai. This is the central plot of Silappatikaram.'},{q:'The Sangam text Pattupattu contains how many long idylls/poems?',o:['5','8','10','18'],a:2,e:'Pattupattu = 10 Idylls (Ten Songs). Ettuthokai = 8 Anthologies. 18 minor works = Padhinenkilkanakku.'}]},
]},
{id:'ch3',title:'📖 Chapter 3: Religious Texts & Movements',nodes:[
{id:'rt1',title:'Smritis, Puranas & Vedangas',xp:150,type:'regular',seqIdx:3,learn:'<h2 class="sec-head">📖 Smritis, Puranas & Vedangas</h2><h3 class="sub-head">Smritis — Hindu Law Codes</h3><table><thead><tr><th>Smriti</th><th>Author</th><th>Key Content</th></tr></thead><tbody><tr><td>Manusmriti (Manava Dharmashastra)</td><td>Manu</td><td>MOST IMPORTANT; varna system; dharma; women\'s role; Shunga period (~2nd BC)</td></tr><tr><td>Yajnavalkya Smriti</td><td>Yajnavalkya</td><td>2nd most important; more liberal on women; inheritance (~3rd–4th AD)</td></tr><tr><td>Narada Smriti</td><td>Narada</td><td>Legal procedure; 18 kinds of disputes</td></tr><tr><td>Parashara Smriti</td><td>Parashara</td><td>Women\'s rights; widows allowed to remarry (progressive)</td></tr><tr><td>Vishnu Smriti</td><td>Vishnu</td><td>Devotional; connects law with Vishnu worship</td></tr></tbody></table><p>Manusmriti = 12 chapters + 2685 verses. Also called <b>Manava Dharmashastra</b>. Deals with creation, dharma, varna-ashrama, law, kingship, women\'s role. <b>Sati not mentioned</b> in Manusmriti.</p><h3 class="sub-head">18 Puranas — Key Facts</h3><p><b>5 characteristics (Pancha Lakshana)</b> of a Purana: Sarga (creation), Pratisarga (dissolution), Vamsha (genealogy of gods/sages), Manvantara (epochs of Manu), Vamshanucharita (genealogy of kings — most historically useful).</p><table><thead><tr><th>Purana</th><th>Key Content</th></tr></thead><tbody><tr><td>Vishnu Purana</td><td>Most systematically arranged; Vaishnava</td></tr><tr><td>Bhagavata Purana</td><td>12 books; devotion to Krishna; most popular</td></tr><tr><td>Matsya Purana</td><td>Oldest Purana; creation; Manu legend</td></tr><tr><td>Vayu Purana</td><td>Geography; dynastic lists (historically useful)</td></tr><tr><td>Brahmanda Purana</td><td>Cosmology; geography</td></tr></tbody></table><h3 class="sub-head">Vedangas vs Upvedas</h3><table><thead><tr><th>Vedangas (6 Limbs of Vedas)</th><th>Upvedas (Applied Knowledge)</th></tr></thead><tbody><tr><td>Shiksha (phonetics)</td><td>Ayurveda (medicine) — Rigveda</td></tr><tr><td>Kalpa (ritual)</td><td>Dhanurveda (archery/warfare) — Yajurveda</td></tr><tr><td>Vyakarana (grammar — PANINI)</td><td>Gandharvaevda (music) — Samaveda</td></tr><tr><td>Nirukta (etymology — YASKA)</td><td>Arthashastra/Sthapatyaveda (architecture) — Atharvaveda</td></tr><tr><td>Chhanda (metre)</td><td>—</td></tr><tr><td>Jyotisha (astronomy)</td><td>—</td></tr></tbody></table><div class="trap-box">⚠️ EXAM TRAP: Manusmriti = Shunga period (NOT Mauryan). Sati NOT mentioned in Manusmriti. Pancha Lakshana = 5 characteristics of a Purana. Panini = Vyakarana (grammar); Yaska = Nirukta (etymology).</div>',revision:['Manusmriti(Manu,MOST IMPORTANT,Shunga period,12 chapters+2685 verses)=varna+dharma+women\'s role','Yajnavalkya Smriti(2nd most important,more liberal on women) | Narada Smriti(legal procedure,18 disputes)','Parashara Smriti(progressive,widow remarriage) | Vishnu Smriti(devotional)','18 Puranas, 5 characteristics(Pancha Lakshana): Sarga,Pratisarga,Vamsa,Manvantara,Vamsanucharita','Sati NOT mentioned in Manusmriti — common trap'],oneliners:['Manusmriti (Manava Dharmashastra), by Manu, is the most important Smriti','Manusmriti was compiled during the Shunga period, around 2nd century BC','Manusmriti has 12 chapters and 2685 verses','Manusmriti deals with the varna system, dharma, and women\'s roles','Sati is NOT mentioned in the Manusmriti — a common exam trap','Yajnavalkya Smriti is the 2nd most important Smriti, more liberal on women\'s issues','Narada Smriti deals with legal procedure and lists 18 kinds of disputes','Parashara Smriti is progressive, allowing widow remarriage','Vishnu Smriti connects law with Vishnu worship','There are 18 Puranas in Hindu tradition','A Purana has 5 characteristics (Pancha Lakshana): Sarga, Pratisarga, Vamsa, Manvantara, Vamsanucharita','Vedangas are the 6 auxiliary disciplines for studying the Vedas'],flashcards:[{q:'Which is the most important Smriti, and who wrote it?',a:'Manusmriti, attributed to Manu'},{q:'During which period was the Manusmriti compiled?',a:'The Shunga period (~2nd century BC)'},{q:'How many chapters and verses does Manusmriti have?',a:'12 chapters, 2685 verses'},{q:'Is Sati mentioned in the Manusmriti?',a:'No — a common exam trap'},{q:'Which Smriti is more liberal on women\'s issues than Manusmriti?',a:'Yajnavalkya Smriti'},{q:'Which Smriti allows widow remarriage?',a:'Parashara Smriti'},{q:'How many Puranas are there, and what are the 5 characteristics of a Purana?',a:'18 Puranas; Pancha Lakshana: Sarga, Pratisarga, Vamsa, Manvantara, Vamsanucharita'}],mcqs:[{q:'How many major Puranas (Mahapuranas) are there in Hindu tradition?',o:['12','16','18','24'],a:2,e:'There are 18 Mahapuranas (including Vishnu Purana, Bhagavata Purana, Shiva Purana etc.) + 18 Upa-Puranas. This is a standard SSC fact.'},{q:'The Manusmriti is primarily a text dealing with:',o:['Military strategy','Dharma, social law and governance','Astronomy and mathematics','Grammar and linguistics'],a:1,e:'Manusmriti (Laws of Manu) = a Dharmashastra dealing with social law, caste duties, governance, and personal conduct. It is the most cited Smriti.'},{q:'How many Vedangas (auxiliary sciences of the Vedas) are there?',o:['4','6','8','12'],a:1,e:'There are SIX Vedangas: Shiksha (phonetics), Kalpa (ritual), Vyakarana (grammar), Nirukta (etymology), Chandas (meter), Jyotisha (astronomy).'},{q:'Which Vedanga deals with the correct pronunciation of Vedic texts?',o:['Kalpa','Nirukta','Shiksha','Chandas'],a:2,e:'Shiksha = science of correct pronunciation/phonetics. Kalpa = ritual procedures; Nirukta = etymology; Chandas = Vedic meter.'},{q:'The Upaveda associated with Rigveda is:',o:['Ayurveda','Dhanurveda','Gandharvaveda','Sthapatyaveda'],a:0,e:'Rigveda → Ayurveda (medicine). Yajurveda → Dhanurveda (archery/warfare). Samaveda → Gandharvaveda (music). Atharvaveda → Sthapatyaveda (architecture).'},{q:'Which Smriti text is specifically associated with women\'s property rights and was composed by Vijnaneshvara?',o:['Manusmriti','Mitakshara','Yajnavalkya Smriti','Narada Smriti'],a:1,e:'The Mitakshara is a commentary on Yajnavalkya Smriti by Vijnaneshvara (~11th cent) dealing with inheritance/property rights. Two schools of Hindu law: Mitakshara vs Dayabhaga.'},{q:'The Bhagavata Purana primarily glorifies which deity?',o:['Shiva','Brahma','Vishnu/Krishna','Surya'],a:2,e:'Bhagavata Purana (12 books) = glorification of Vishnu, especially Krishna\'s life (10th book = most famous). It is the basis of Vaishnavism.'},{q:'Which Kalpa text deals specifically with domestic rituals (household ceremonies)?',o:['Shrauta Sutra','Grihya Sutra','Dharma Sutra','Sulba Sutra'],a:1,e:'Grihya Sutras = domestic/household rituals. Shrauta Sutras = major Vedic sacrifices. Sulba Sutras = geometry for altar construction.'},{q:'The Sulba Sutras are primarily texts on:',o:['Grammar','Astronomy','Altar geometry (mathematics)','Phonetics'],a:2,e:'Sulba Sutras (part of Kalpa Vedanga) deal with the geometry of Vedic fire altars. They contain the earliest statement of the Pythagorean theorem (Baudhyana, ~800 BC).'},{q:'The concept of \'Panchalakshana\' defines a Purana as containing 5 characteristics — which of these is NOT one?',o:['Sarga (creation)','Pratisarga (recreation)','Vamsha (genealogy of kings)','Vyakarana (grammar)'],a:3,e:'Panchalakshana = 5 marks of a Purana: Sarga, Pratisarga, Vamsha, Manvantara, Vamsanucharita. Vyakarana = grammar = Vedanga, not a Purana characteristic.'}]},
{id:'rm1',title:'Religious Movements + Bhakti',xp:150,type:'regular',seqIdx:4,learn:'<h2 class="sec-head">🙏 Religious Movements — Complete Summary</h2><h3 class="sub-head">Heterodox Movements (Nastika — reject Vedas)</h3><table><thead><tr><th>Movement</th><th>Founder</th><th>Key Belief</th></tr></thead><tbody><tr><td>Jainism</td><td>Mahavira (24th Tirthankara)</td><td>Extreme ahimsa; Anekantavada (many-sidedness of truth)</td></tr><tr><td>Buddhism</td><td>Gautama Buddha</td><td>Middle path; Eightfold path; No Atman (no permanent self)</td></tr><tr><td>Ajivika</td><td>Makkhali Gosala</td><td>Pure determinism (Niyati); strict fatalism</td></tr><tr><td>Charvaka/Lokayata</td><td>Charvaka/Brihaspati</td><td>Pure materialism; reject afterlife; "Yavad jivet, sukham jivet" (live happily while alive)</td></tr></tbody></table><h3 class="sub-head">Orthodox Movements (Astika — accept Vedas)</h3><p><b>6 schools of philosophy (Shad Darshana)</b>: Nyaya, Vaisheshika, Samkhya, Yoga, Purva Mimamsa, Vedanta (Uttara Mimamsa).</p><p><b>Bhagavatism/Vaishnavism</b> = 1st major theistic movement; arose in Shunga period. <b>Shaivism</b> = Pashupata sect (early); later <b>Lingayats</b> (Basavanna, 12th cent, Karnataka) — rejected caste system.</p><h3 class="sub-head">Bhakti Movements Timeline</h3><table><thead><tr><th>Period</th><th>Movement</th><th>Key Saints</th></tr></thead><tbody><tr><td>6th–9th cent AD</td><td>South Indian Bhakti</td><td>63 Nayanmars (Shaiva) + 12 Alvars (Vaishnava)</td></tr><tr><td>12th cent AD</td><td>Virashaiva/Lingayat</td><td>BASAVANNA (Karnataka) — rejected caste; wrote Vachanas</td></tr><tr><td>14th–15th cent AD</td><td>North Indian Bhakti</td><td>Ramananda (Varanasi), Kabir (Varanasi), Mirabai (Rajasthan), Tukaram (Maharashtra), Surdas (Mathura)</td></tr></tbody></table><div class="fact-box"><strong>SSC Key Points</strong><ul><li>Charvaka = materialism; "eat drink be merry"; rejects Vedas</li><li>Ajivika = Makkhali Gosala; determinism (Niyati)</li><li>Lingayat/Virashaiva = BASAVANNA (12th cent); rejected caste</li><li>Bhakti movement originated in SOUTH INDIA (Nayanmars/Alvars 6th cent) → spread north</li><li>Kabir, Mirabai = North Indian Bhakti (14th–15th cent)</li></ul></div><div class="trap-box">⚠️ EXAM TRAP: Charvaka philosophy = pure materialism (not Buddhism or Jainism). Ajivika = MAKKHALI GOSALA (not Mahavira). Basavanna = Lingayat/Virashaiva movement (12th cent Karnataka) — not a Buddhist teacher. South Indian Bhakti came BEFORE North Indian Bhakti.</div>',revision:['Nastika(reject Vedas): Jainism(Mahavira),Buddhism(Buddha),Ajivika(Makkhali Gosala,Niyati/fatalism),Charvaka(Brihaspati,materialism)','Astika(accept Vedas): 6 schools(Shad Darshana)=Nyaya,Vaisheshika,Samkhya,Yoga,Purva Mimamsa,Vedanta','Bhagavatism/Vaishnavism=1st major theistic movement,arose Shunga period','Shaivism: Pashupata sect(early)->Lingayats(Basavanna,12th c,Karnataka,rejected caste)','Charvaka motto: \'Yavad jivet,sukham jivet\'=live happily while alive'],oneliners:['Nastika (heterodox) movements reject Vedic authority','Jainism, founded by Mahavira, emphasizes extreme ahimsa and Anekantavada','Buddhism, founded by Gautama Buddha, teaches the Middle Path and denies a permanent self (Atman)','Ajivika, founded by Makkhali Gosala, believes in pure determinism (Niyati)','Charvaka (Lokayata), founded by Brihaspati, is purely materialist and rejects an afterlife','The Charvaka motto is \'Yavad jivet, sukham jivet\' — live happily while alive','Astika (orthodox) movements accept Vedic authority','The 6 orthodox schools (Shad Darshana) are Nyaya, Vaisheshika, Samkhya, Yoga, Purva Mimamsa, and Vedanta','Bhagavatism/Vaishnavism was the first major theistic movement, arising in the Shunga period','Shaivism\'s early form was the Pashupata sect','Lingayats, a later Shaivite sect founded by Basavanna in 12th century Karnataka, rejected caste'],flashcards:[{q:'What do Nastika movements have in common?',a:'They reject Vedic authority'},{q:'Who founded Ajivika, and what was its core belief?',a:'Makkhali Gosala; Niyati (pure determinism/fatalism)'},{q:'What is the Charvaka motto?',a:'\'Yavad jivet, sukham jivet\' — live happily while alive'},{q:'Name the 6 orthodox (Astika) schools of philosophy.',a:'Nyaya, Vaisheshika, Samkhya, Yoga, Purva Mimamsa, Vedanta'},{q:'What was the first major theistic movement, and when did it arise?',a:'Bhagavatism/Vaishnavism, in the Shunga period'},{q:'Who founded the Lingayat sect, and when/where?',a:'Basavanna, 12th century, Karnataka'},{q:'What did the Lingayats reject?',a:'The caste system'}],mcqs:[{q:'The Bhakti movement in South India was initiated by which saint-poets?',o:['Alvars and Nayanmars','Kabir and Mirabai','Ramananda and Shankaracharya','Chaitanya and Tukaram'],a:0,e:'Alvars (Vaishnava) and Nayanmars (Shaiva) — poet-saints of Tamil Nadu — initiated the Bhakti movement (~6th-9th cent AD). North Indian Bhakti came much later.'},{q:'How many Alvars and Nayanmars are there in the traditional count?',o:['12 Alvars and 63 Nayanmars','12 Alvars and 12 Nayanmars','18 Alvars and 63 Nayanmars','63 Alvars and 12 Nayanmars'],a:0,e:'12 Alvars (Vaishnava saints) and 63 Nayanmars (Shaiva saints) are the traditional count. Andal = the only female Alvar.'},{q:'The orthodox (Astika) schools of Indian philosophy that accept the authority of the Vedas total:',o:['4','6','8','9'],a:1,e:'Six orthodox (Astika) schools (Shad-darshanas): Samkhya, Yoga, Nyaya, Vaisheshika, Mimamsa, Vedanta. Heterodox = Buddhism, Jainism, Ajivika, Charvaka.'},{q:'Which heterodox sect believed in strict determinism (Niyati) — that fate controls everything and free will is an illusion?',o:['Jainism','Buddhism','Ajivika','Charvaka'],a:2,e:'Ajivikas (founded by MAKKHALI GOSALA) believed in absolute determinism (Niyati). They rejected karma and free will. Contemporary of Buddha and Mahavira.'},{q:'Charvaka philosophy is primarily associated with:',o:['Idealism and non-violence','Materialism and rejection of afterlife/Vedas','Determinism and fate','Theism and Vedic authority'],a:1,e:'Charvaka (Lokayata) = materialist philosophy; rejects Vedas, karma, afterlife; only pratyaksha (perception) valid; \'eat, drink, be merry\'. Founder: BRIHASPATI.'},{q:'The Lingayat (Veerashaiva) movement was founded by which saint in Karnataka?',o:['Basavanna','Ramanuja','Madhvacharya','Allama Prabhu'],a:0,e:'Basavanna (12th cent AD) founded the Lingayat/Veerashaiva movement in Karnataka. He rejected caste discrimination and Brahminical rituals.'},{q:'Shankaracharya\'s philosophy is called:',o:['Vishishtadvaita','Dvaita','Advaita Vedanta','Achintya Bhedabheda'],a:2,e:'Adi Shankaracharya (8th cent AD) propounded Advaita Vedanta (non-dualism: Brahman=Atman=one reality). Ramanuja = Vishishtadvaita; Madhva = Dvaita.'},{q:'The concept of \'Prapatti\' (complete surrender to God) is central to which Vaishnava school?',o:['Advaita','Vishishtadvaita (Ramanuja)','Dvaita (Madhva)','Suddhadvaita'],a:1,e:'Prapatti (self-surrender) is central to Ramanuja\'s Vishishtadvaita and Sri Vaishnava tradition. Ramanuja emphasized devotion (Bhakti) and God\'s grace.'},{q:'The Nayanar saint-poet who composed the Tevaram (Shiva hymns) did NOT include:',o:['Appar (Tirunavukkarasar)','Sambandar (Thirugnana Sambandar)','Sundarar','Manikkavasagar'],a:3,e:'Tevaram = hymns by THREE Nayanmars: Appar, Sambandar, Sundarar. Manikkavasagar composed the THIRUVACHAKAM (not part of Tevaram). All four are Nayanmars but Manikkavasagar is not in Tevaram.'},{q:'The Alvar saint Andal is famous for composing which works?',o:['Nalayira Divya Prabandham only','Tiruppavai and Nacchiyar Tirumozhi','Divya Prabandham and Tevaram','Prabandham and Thiruvachakam'],a:1,e:'Andal (only female Alvar) composed Tiruppavai (30 verses) and Nacchiyar Tirumozhi. Together these form part of the 4000-verse Nalayira Divya Prabandham.'}]},
]},
