const SK='centumania_anc4_v1';
function loadState(){try{return JSON.parse(localStorage.getItem(SK))||{mcq:{}}}catch(e){return{mcq:{}}}}
function saveState(S){localStorage.setItem(SK,JSON.stringify(S))}
let S=loadState();
let _sess={};
function seqNodes(){let a=[];CHAPTERS.forEach(c=>c.nodes.forEach(n=>a.push(n)));a.sort((x,y)=>x.seqIdx-y.seqIdx);return a}
function regularNodes(){return seqNodes().filter(n=>n.type!=='gold')}
function isUnlocked(nd){
  if(nd.type==='gold'){let rn=regularNodes();let passed=rn.filter(n=>(S.mcq[n.id]||{}).passed);return passed.length>=Math.ceil(rn.length*0.8);}
  if(nd.seqIdx===0)return true;
  let sn=seqNodes();let prev=sn.find(n=>n.seqIdx===nd.seqIdx-1);
  if(!prev)return true;
  return !!(S.mcq[prev.id]||{}).passed;
}
function buildSidebar(){
  let h='';
  CHAPTERS.forEach(ch=>{
    h+=`<div class="ch-label">${ch.title}</div>`;
    ch.nodes.forEach(nd=>{
      let m=S.mcq[nd.id]||{};
      let unlocked=isUnlocked(nd);
      let cls='nd-btn';
      if(!unlocked)cls+=' locked';
      if(m.passed)cls+=' passed';
      if(nd.type==='gold')cls+=' gold-node';
      let icon=m.passed?'✅':(!unlocked?'🔒':'📖');
      let score=m.lastScore!=null?` — ${m.lastScore}/10`:'';
      h+=`<button class="${cls}" onclick="${unlocked?`openNode('${nd.id}')`:''}">${icon} ${nd.title}<div class="nd-meta">${nd.xp} XP${score}</div></button>`;
    });
  });
  document.getElementById('sidebar-inner').innerHTML=h;
}
function updateHeader(){
  let rn=regularNodes();let passed=rn.filter(n=>(S.mcq[n.id]||{}).passed).length;
  let totalXP=0;CHAPTERS.forEach(ch=>ch.nodes.forEach(nd=>{if((S.mcq[nd.id]||{}).passed)totalXP+=nd.xp;}));
  document.getElementById('hdr-stat').textContent=`${passed}/${rn.length} nodes · ${totalXP} XP`;
}
function updateDash(){
  let rn=regularNodes();let passed=rn.filter(n=>(S.mcq[n.id]||{}).passed).length;
  let totalXP=0;CHAPTERS.forEach(ch=>ch.nodes.forEach(nd=>{if((S.mcq[nd.id]||{}).passed)totalXP+=nd.xp;}));
  let attempts=0;CHAPTERS.forEach(ch=>ch.nodes.forEach(nd=>{attempts+=(S.mcq[nd.id]||{}).attempts||0;}));
  let h=`<div class="hero"><h2>Ancient History Part 4</h2><p>Gap-Fill Module — Gaps Closed = Marks Gained</p></div>
  <div class="stats-row">
    <div class="stat-card"><div class="val">${passed}/${rn.length}</div><div class="lbl">Nodes Passed</div></div>
    <div class="stat-card"><div class="val">${totalXP}</div><div class="lbl">Total XP</div></div>
    <div class="stat-card"><div class="val">${attempts}</div><div class="lbl">Attempts</div></div>
  </div>`;
  CHAPTERS.forEach(ch=>{
    h+=`<div class="ch-card"><h3>${ch.title}</h3><div class="nd-pills">`;
    ch.nodes.forEach(nd=>{
      let m=S.mcq[nd.id]||{};let unlocked=isUnlocked(nd);
      let cls='nd-pill'+(m.passed?' passed':(!unlocked?' locked':''))+(nd.type==='gold'?' gold-node':'');
      let icon=m.passed?'✅':(!unlocked?'🔒':'');
      h+=`<span class="${cls}" onclick="${unlocked?`openNode('${nd.id}')`:''}">${icon} ${nd.title}</span>`;
    });
    h+='</div></div>';
  });
  document.getElementById('dash').innerHTML=h;
}
function showDash(){
  document.getElementById('dash').style.display='';
  document.getElementById('node-view').style.display='none';
  updateDash();buildSidebar();updateHeader();
}
let curNode=null;
function openNode(nid){
  let nd=seqNodes().find(n=>n.id===nid);if(!nd||!isUnlocked(nd))return;
  curNode=nid;// _sess[nid] left undefined until startFresh called
  track('node_opened',{node_id:nd.id,node_title:nd.title,node_type:nd.type,xp:nd.xp});
  document.getElementById('dash').style.display='none';
  document.getElementById('node-view').style.display='';
  let m=S.mcq[nid]||{};
  let typeLabel=nd.type==='gold'?'🏹 Golden Node':nd.type==='trap'?'⚠️ Trap Node':'📖 Regular Node';
  let passedText=m.passed?`<span style="color:var(--green)">✅ Passed</span>`:'';
  document.getElementById('node-view').innerHTML=`
    <div class="nv-hdr">
      <h2>${nd.title}</h2>
      <div class="nv-meta"><span>${typeLabel}</span><span>${nd.xp} XP</span>${passedText}</div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-learn" onclick="switchTab('learn')">📖 Learn</button>
      <button class="tab" id="tab-flash" onclick="switchTab('flash')">🗂 Flashcards</button>
      ${nd.type!=='gold'?'<button class="tab" id="tab-test" onclick="switchTab(&apos;test&apos;)">🎯 Test</button>':''}
    </div>
    <div id="pane-learn"></div>
    <div id="pane-flash" style="display:none"></div>
    <div id="pane-test" style="display:none"></div>
    <div class="node-nav" id="node-nav"></div>`;
  buildLearnPane(nd);
  buildFlashPane(nd);
  if(nd.type!=='gold')buildTestPane(nd);
  buildNodeNav4(nd);
  buildSidebar();updateHeader();
  document.getElementById('node-view').scrollTo&&document.getElementById('node-view').scrollTo(0,0);
  document.getElementById('main').scrollTo(0,0);
  closeDrawer();
}
function switchTab(t){
  document.getElementById('tab-learn').classList.toggle('active',t==='learn');
  let tf=document.getElementById('tab-flash');if(tf)tf.classList.toggle('active',t==='flash');
  let tt=document.getElementById('tab-test');if(tt)tt.classList.toggle('active',t==='test');
  document.getElementById('pane-learn').style.display=t==='learn'?'':'none';
  let pf=document.getElementById('pane-flash');if(pf)pf.style.display=t==='flash'?'':'none';
  document.getElementById('pane-test').style.display=t==='test'?'':'none';
}
function buildLearnPane(nd){
  let h=`<div class="learn-content">${nd.learn}</div>`;
  if(nd.revision&&nd.revision.length){
    h+='<div class="revision-box"><strong>⚡ 30 SECOND REVISION</strong><ul>';
    nd.revision.forEach(r=>h+='<li>'+r+'</li>');
    h+='</ul></div>';
  }
  if(nd.oneliners&&nd.oneliners.length){
    h+='<div class="oneliner-box"><strong>🎯 20 EXAM ONE-LINERS</strong><ul>';
    nd.oneliners.forEach(o=>h+='<li>'+o+'</li>');
    h+='</ul></div>';
  }
  document.getElementById('pane-learn').innerHTML=h;
}
function buildFlashPane(nd){
  const cards=nd.flashcards||[];
  const el=document.getElementById('pane-flash');if(!el)return;
  if(!cards.length){el.innerHTML='<p style="color:var(--muted);text-align:center;padding:2rem">No flashcards for this node yet.</p>';return;}
  let h='<p class="flash-hint">TAP A CARD TO FLIP • '+cards.length+' CARDS</p><div class="flash-grid">';
  cards.forEach((c,i)=>{
    h+='<div class="flash-card" id="fc-'+nd.id+'-'+i+'" onclick="this.classList.toggle(\'flipped\')">'+
      '<div class="flash-inner">'+
      '<div class="flash-front">'+c.q+'</div>'+
      '<div class="flash-back">'+c.a+'</div>'+
      '</div></div>';
  });
  h+='</div><div class="flash-reset-row"><button class="btn btn-outline" onclick="resetFlash(\''+nd.id+'\')">↺ Reset All Cards</button></div>';
  el.innerHTML=h;
}
function resetFlash(nid){
  document.querySelectorAll('[id^="fc-'+nid+'-"]').forEach(c=>c.classList.remove('flipped'));
}
function buildTestPane(nd){
  let nid=nd.id;let m=S.mcq[nid]||{};let sess=_sess[nid]||{};
  let h='<div class="test-header"><span style="font-size:13px;font-weight:600">10 Questions — Need 10/10</span>';
  if(m.lastScore!=null){
    let cls=m.passed?'pass':'fail';
    h+=`<span class="score-badge ${cls}">Last: ${m.lastScore}/10${m.passed?' ✅':''}</span>`;
  }
  h+='</div>';
  if(m.passed){h+=`<div class="pass-banner">✅ Passed! You scored ${m.lastScore}/10. You may retry to reinforce.</div>`;}
  else if(m.lastScore!=null && !m.passed){
    h+=`<div class="retry-banner"><span>Score: ${m.lastScore}/10 — Need 10/10. Retry?</span><button class="btn btn-outline" onclick="startFresh('${nid}')">Retry</button></div>`;
  }
  if(!_sess[nid] && !m.passed && m.lastScore==null){
    h+=`<div style="text-align:center;padding:20px"><button class="btn btn-gold" onclick="startFresh('${nid}')">Start Test</button></div>`;
    document.getElementById('pane-test').innerHTML=h;return;
  }
  if(!_sess[nid]){document.getElementById('pane-test').innerHTML=h;return;}
  nd.mcqs.forEach((q,i)=>{
    let sessAns=sess[i];let answered=sessAns!=null;
    let correctIdx=q.a;
    h+=`<div class="mcq-card" id="qcard-${i}"><div class="qnum">Q${i+1}/10</div><div class="qtext">${q.q}</div>`;
    q.o.forEach((opt,oi)=>{
      let cls='opt-btn';let dis='';
      if(answered){
        dis='disabled';
        if(oi===sessAns){cls+=(sessAns===correctIdx?' correct':' wrong');}
        else if(oi===correctIdx){cls+=' correct';}
      }
      h+=`<button class="${cls}" ${dis} onclick="answer('${nid}',${i},${oi})">${opt}</button>`;
    });
    if(answered){h+=`<div class="explanation show">${q.e}</div>`;}
    h+='</div>';
  });
  let allAnswered=nd.mcqs.every((_,i)=>sess[i]!=null);
  if(allAnswered){
    let sc=nd.mcqs.filter((_,i)=>sess[i]===nd.mcqs[i].a).length;
    h+=`<div class="submit-row"><button class="btn btn-gold" onclick="finishAttempt('${nid}')">Finish & See Score</button></div>`;
  } else if(Object.keys(sess).length>0){
    h+=`<div class="submit-row"><span style="color:var(--muted);font-size:13px">Answer all questions to finish</span></div>`;
  }
  document.getElementById('pane-test').innerHTML=h;
}
function startFresh(nid){
  _sess[nid]={};
  let nd=seqNodes().find(n=>n.id===nid);
  buildTestPane(nd);switchTab('test');
}
function answer(nid,qi,oi){
  let nd=seqNodes().find(n=>n.id===nid);
  let m=S.mcq[nid]||(S.mcq[nid]={faa:{},best:0,passed:false,attempts:0,lastScore:null});
  let sess=_sess[nid]||(_sess[nid]={});
  if(sess[qi]!=null)return;
  sess[qi]=oi;
  if(!m.faa)m.faa={};
  if(m.faa[qi]==null){m.faa[qi]=(oi===nd.mcqs[qi].a);}
  saveState(S);buildTestPane(nd);
  setTimeout(()=>{
    let next=document.getElementById('qcard-'+(qi+1));
    let cur=document.getElementById('qcard-'+qi);
    if(next)next.scrollIntoView({behavior:'smooth',block:'start'});
    else if(cur)cur.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}
function finishAttempt(nid){
  let nd=seqNodes().find(n=>n.id===nid);
  let sess=_sess[nid]||{};
  let m=S.mcq[nid]||(S.mcq[nid]={faa:{},best:0,passed:false,attempts:0,lastScore:null});
  let score=nd.mcqs.reduce((acc,q,i)=>acc+(sess[i]===q.a?1:0),0);
  m.attempts=(m.attempts||0)+1;
  if(m.attempts===1)m.faaPct=Math.round(score*10);
  const faaPct=m.faaPct||0;
  m.lastScore=score;
  if(score>(m.best||0))m.best=score;
  if(score===10&&!m.passed){m.passed=true;track('node_completed',{node_id:nid,node_title:nd.title,xp_earned:nd.xp,score:score,faa_pct:faaPct,attempts:m.attempts});showToast(`🎉 Perfect Score! ${nd.title} Unlocked!`);}
  else if(score===10){showToast('✅ Perfect again!');}
  else{track('mcq_completed',{node_id:nid,node_title:nd.title,score:score,total:10,pct:Math.round(score*10),faa_pct:faaPct,passed:false,attempts:m.attempts});showToast(`Score: ${score}/10 — Need 10/10`);}
  _sess[nid]={};saveState(S);buildTestPane(nd);buildSidebar();updateHeader();
}
function showToast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function openDrawer(){document.getElementById('sidebar').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
function closeDrawer(){document.getElementById('sidebar').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}

/* ── METRICS ── */
let _mToken=null,_mSid=null;
function initMetrics(){
  // Supabase stores the session under a key like `sb-<ref>-auth-token`
  // in either localStorage or sessionStorage depending on the user's "keep me
  // signed in" choice (see centumania-mvp/src/lib/supabase/client.ts).
  try {
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;
          break;
        }
      }
    }
  } catch(e){}
  _mSid='anc4-'+(Date.now().toString(36));
}
function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},
    body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})
  }).catch(()=>{});
}
initMetrics();track('material_opened',{material:'ancient_history_part4'});
// INIT
buildSidebar();showDash();

function buildNodeNav4(nd){
  const sn=seqNodes();
  const idx=sn.findIndex(n=>n.id===nd.id);
  const prev=idx>0?sn[idx-1]:null;
  const next=sn[idx+1]||null;
  const nextOk=next&&isUnlocked(next);
  const nav=document.getElementById('node-nav');if(!nav)return;
  nav.innerHTML=
    `<button class="nav-btn"${prev?'':' disabled'}${prev?` onclick="openNode('${prev.id}')"`:''}>← ${prev?prev.title:'Start'}</button>`+
    `<button class="nav-btn home-btn" onclick="showDash()">⊞ Dashboard</button>`+
    `<button class="nav-btn"${nextOk?'':' disabled'}${nextOk?` onclick="openNode('${next.id}')"`:''}>→ ${next?next.title:'End'}</button>`;
}
</script>
