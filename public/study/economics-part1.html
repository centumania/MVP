SLR (Statutory Liquidity Ratio)</b>: % of deposits in liquid assets (Govt securities, gold, cash)", "<b>Repo Rate</b>: Rate at which RBI lends to commercial banks (short-term, against securities)", "<b>Reverse Repo Rate</b>: Rate at which RBI borrows from banks (banks park money with RBI)", "<b>Bank Rate</b>: Rate at which RBI lends to banks for long-term (without collateral)", "<b>MCLR</b>: Marginal Cost of Funds-based Lending Rate — replaced Base Rate (from April 2016)"], "table": {"h": ["Bank Type", "Deposits", "Loans", "Examples"], "r": [["Public Sector Banks", "Unlimited", "Yes", "SBI, PNB, Bank of Baroda"], ["Private Banks", "Unlimited", "Yes", "HDFC, ICICI, Axis"], ["Payment Banks", "Up to ₹2 lakh", "NO", "Paytm, Airtel, India Post"], ["Small Finance Banks", "Unlimited", "Yes (75% priority)", "AU SFB, Equitas"], ["RRBs", "Unlimited", "Yes (rural focus)", "Prathama Bank"]]}, "mn": {"h": "🧠 MEMORY HOOK — RBI Rates & Banking Facts", "b": "<b>Rate hierarchy:</b> Bank Rate (long-term, no collateral) > Repo Rate (short-term, with collateral) > Reverse Repo Rate (RBI borrows)<br><br><b>CRR vs SLR:</b> CRR = Cash with RBI (no interest) | SLR = Securities (Govt bonds + gold) kept by bank itself<br><br><b>RBI dates:</b> Established 1 April 1935 | Act 1934 | Nationalized 1949 | HQ: Calcutta→Mumbai 1937<br><br><b>Bank Nationalization:</b> '14-6-20' → 14 banks in 1969 + 6 banks in 1980 = 20 banks nationalized"}, "traps": ["❌ 'Payment Banks can give loans' → ✅ Payment Banks CANNOT give loans or credit cards; only accept deposits (max ₹2 lakh)", "❌ 'Repo Rate is the rate at which RBI borrows' → ✅ Repo = RBI LENDS to banks | Reverse Repo = RBI BORROWS from banks", "❌ 'NABARD was established in 1975' → ✅ NABARD was established in 1982 (Shivaraman Committee); RRBs were established in 1975", "❌ 'CRR earns interest for banks' → ✅ CRR maintained with RBI earns NO interest. SLR securities earn interest.", "❌ 'India's minimum CAR is 8% (Basel III)' → ✅ India's minimum CAR is 9% (higher than Basel III's 8%)"], "revision": ["RBI: 1 April 1935 | Act 1934 | Nationalized 1949 | HQ Mumbai", "Bank Nationalization: 14 banks (1969) + 6 banks (1980)", "Payment Banks: deposits up to ₹2 lakh; NO loans", "CRR = Cash with RBI (no interest) | SLR = Liquid assets (with interest)", "Repo = RBI lends to banks | Reverse Repo = RBI borrows from banks", "NABARD: 1982, Shivaraman Committee | RRBs: 1975, Narasimham Committee", "DICGC insures deposits up to ₹5 lakh per depositor", "NPA: loan overdue > 90 days", "Priority Sector Lending: 40% of ANBC", "MCLR replaced Base Rate from April 2016"], "oneliners": ["RBI established on → 1 April 1935", "RBI Act passed in → 1934", "RBI nationalized in → 1949", "RBI HQ → Mumbai (moved from Calcutta in 1937)", "RBI established based on → Hilton-Young Commission recommendations", "Bank Nationalization first wave → 1969 (14 banks, PM Indira Gandhi)", "Bank Nationalization second wave → 1980 (6 more banks)", "NABARD established in → 1982 (Shivaraman Committee)", "RRBs established in → 1975 (Narasimham Committee)", "Payment Banks maximum deposit → ₹2 lakh per customer", "Payment Banks can give loans → NO (cannot provide loans or credit)", "DICGC insures deposits up to → ₹5 lakh per depositor per bank", "Priority Sector Lending → 40% of ANBC for banks", "NPA definition → Loan repayment overdue for > 90 days", "CRR = → Cash maintained with RBI (no interest earned)", "SLR = → Liquid assets (Govt securities, gold, cash) held by bank itself", "Repo Rate = → RBI lends to commercial banks (short-term, with collateral)", "Reverse Repo Rate = → RBI borrows from banks", "Bank Rate = → RBI lends to banks long-term (no collateral)", "India's minimum Capital Adequacy Ratio (CAR) → 9% (Basel III = 8%)"], "flashcards": [{"q": "When was RBI established and nationalized?", "a": "Established: 1 April 1935 (based on Hilton-Young Commission). Nationalized: 1949. RBI Act: 1934. HQ moved from Calcutta to Mumbai in 1937."}, {"q": "What are Payment Banks — key restrictions?", "a": "Accept deposits max ₹2 lakh per customer. CANNOT give loans/credit cards. E.g., Paytm, Airtel, India Post Payments Bank."}, {"q": "CRR vs SLR — key differences?", "a": "CRR: Cash kept with RBI — earns NO interest. SLR: Liquid assets (Govt securities, gold) held by bank itself — earns interest. Both control credit creation."}, {"q": "Repo Rate vs Reverse Repo Rate?", "a": "Repo Rate: RBI LENDS money to commercial banks (short-term, against securities). Reverse Repo Rate: RBI BORROWS from commercial banks (banks park surplus funds with RBI)."}, {"q": "When were banks nationalized in India?", "a": "1st wave: 1969 — 14 banks nationalized (PM Indira Gandhi, to control commanding heights). 2nd wave: 1980 — 6 more banks."}, {"q": "NABARD vs RRBs — establishment years?", "a": "RRBs: 1975 (Narasimham Committee recommendation) — provide rural credit. NABARD: 1982 (Shivaraman Committee) — apex institution for agricultural/rural finance."}, {"q": "DICGC — what does it do?", "a": "Deposit Insurance and Credit Guarantee Corporation — insures deposits up to ₹5 lakh per depositor per bank. Even if bank fails, deposits up to ₹5 lakh are safe."}, {"q": "What is NPA?", "a": "Non-Performing Asset — a loan/advance where repayment of principal/interest is overdue for > 90 days. Banks must provision (set aside funds) against NPAs."}, {"q": "Priority Sector Lending requirement?", "a": "Commercial banks must lend 40% of their ANBC (Adjusted Net Bank Credit) to priority sectors: Agriculture, MSME, Housing, Education, Social Infrastructure etc."}, {"q": "MCLR — what replaced what?", "a": "MCLR (Marginal Cost of Funds-based Lending Rate) replaced Base Rate from April 2016. MCLR is more responsive to changes in RBI's policy rates."}], "mcqs": [{"q": "RBI was established on:", "o": ["1 January 1935", "1 April 1935", "1 April 1949", "15 August 1947"], "a": 1, "e": "RBI was established on 1 April 1935 based on Hilton-Young Commission recommendations. RBI Act was passed in 1934."}, {"q": "Payment Banks in India CANNOT:", "o": ["Accept deposits up to ₹2 lakh", "Issue debit cards", "Give loans and credit", "Offer internet banking"], "a": 2, "e": "Payment Banks cannot give loans or issue credit cards. They can only accept deposits (up to ₹2 lakh), offer remittances, and basic banking services."}, {"q": "Repo Rate is the rate at which:", "o": ["Banks lend to public", "RBI borrows from banks", "RBI lends to commercial banks", "Banks lend to each other"], "a": 2, "e": "Repo Rate = Rate at which RBI lends short-term money to commercial banks against eligible securities. Reverse Repo = Rate at which RBI borrows from banks."}, {"q": "How many banks were nationalized in the first wave (1969)?", "o": ["6", "10", "14", "20"], "a": 2, "e": "14 banks were nationalized in 1969 under PM Indira Gandhi. 6 more banks were nationalized in 1980 (2nd wave). Total = 20 banks nationalized."}, {"q": "NABARD was established in:", "o": ["1969", "1975", "1980", "1982"], "a": 3, "e": "NABARD (National Bank for Agriculture & Rural Development) was established in 1982 on the recommendations of Shivaraman Committee. RRBs were established earlier in 1975."}, {"q": "DICGC insures bank deposits up to:", "o": ["₹1 lakh", "₹2 lakh", "₹5 lakh", "₹10 lakh"], "a": 2, "e": "DICGC (Deposit Insurance & Credit Guarantee Corporation) insures deposits up to ₹5 lakh per depositor per bank (raised from ₹1 lakh in 2020)."}, {"q": "CRR maintained with RBI earns:", "o": ["Repo rate interest", "Reverse Repo rate interest", "SLR rate interest", "No interest"], "a": 3, "e": "Cash Reserve Ratio (CRR) deposits maintained with RBI earn NO interest. This is why banks prefer to keep minimum required CRR and use rest for lending."}, {"q": "A loan is classified as NPA when repayment is overdue for:", "o": ["30 days", "60 days", "90 days", "180 days"], "a": 2, "e": "NPA (Non-Performing Asset): Loan where repayment of interest/principal is overdue for more than 90 days (3 months)."}, {"q": "Priority Sector Lending requirement for commercial banks is:", "o": ["25% of ANBC", "40% of ANBC", "50% of ANBC", "30% of ANBC"], "a": 1, "e": "Commercial banks must lend 40% of their ANBC (Adjusted Net Bank Credit) to priority sectors including Agriculture, MSME, Housing, Education, Social Infrastructure."}, {"q": "India's minimum Capital Adequacy Ratio (CAR) is:", "o": ["6%", "8%", "9%", "12%"], "a": 2, "e": "India's minimum CAR is 9% (stricter than Basel III's 8%). CAR = Capital / Risk-Weighted Assets. Ensures banks have enough capital buffer."}, {"q": "MCLR replaced which lending rate benchmark?", "o": ["Prime Lending Rate", "Repo Rate", "Base Rate", "Bank Rate"], "a": 2, "e": "MCLR (Marginal Cost of Funds-based Lending Rate) replaced Base Rate from April 2016. MCLR better reflects funding costs and RBI rate changes."}, {"q": "RRBs (Regional Rural Banks) were established in:", "o": ["1969", "1972", "1975", "1980"], "a": 2, "e": "RRBs were established in 1975 under the RRB Act based on Narasimham Committee recommendations to provide credit to rural areas."}, {"q": "Which bank serves as the 'Banker to the Government' of India?", "o": ["State Bank of India", "NABARD", "Reserve Bank of India", "Bank of Baroda"], "a": 2, "e": "RBI acts as Banker to the Government — manages government's accounts, floating of public debt, payment of interest on government bonds."}, {"q": "Small Finance Banks must lend minimum ___ to priority sector:", "o": ["40%", "50%", "60%", "75%"], "a": 3, "e": "Small Finance Banks must allocate minimum 75% of their ANBC to priority sectors (Agriculture, MSME, etc.) — higher than 40% for regular commercial banks."}, {"q": "The Lead Bank Scheme was introduced in:", "o": ["1955", "1962", "1969", "1975"], "a": 2, "e": "Lead Bank Scheme was introduced in 1969 — assigns each district to a specific bank which takes lead role in banking development for that district."}]}, {"id": "monetary_policy", "title": "Monetary Policy & Money Supply", "xp": 60, "type": "regular", "seqIdx": 7, "facts": ["<b>Monetary Policy</b>: RBI's tool to control money supply and credit to achieve macroeconomic goals", "<b>Monetary Policy Committee (MPC)</b>: 6-member body; meets every 2 months; decides repo rate", "MPC composition: 3 RBI members (including Governor as chair) + 3 Govt-appointed external members", "<b>Quantitative Tools</b>: CRR, SLR, Repo, Reverse Repo, Open Market Operations (OMO), Bank Rate", "<b>Qualitative/Selective Tools</b>: Margin Requirements, Moral Suasion, Rationing of Credit, Direct Action", "<b>OMO (Open Market Operations)</b>: RBI buys/sells Govt securities in open market to control liquidity", "OMO purchase → money supply ↑ | OMO sale → money supply ↓", "<b>MSS (Market Stabilisation Scheme)</b>: RBI issues Govt securities to absorb excess liquidity from FOREX inflows", "<b>LAF (Liquidity Adjustment Facility)</b>: Daily mechanism; Repo + Reverse Repo are LAF tools", "<b>SLF (Standing Liquidity Facility)</b>: Emergency liquidity support from RBI to banks", "<b>Money Supply Measures in India</b>: M0, M1, M2, M3, M4", "<b>M0 (Reserve Money/High-Powered Money)</b>: Currency in circulation + Banker's deposits with RBI + other deposits", "<b>M1 (Narrow Money)</b>: Currency with public + Demand deposits (current + savings accounts)", "<b>M2</b>: M1 + Savings deposits with Post Office savings bank", "<b>M3 (Broad Money)</b>: M1 + Time/Fixed deposits with commercial banks — MOST USED measure in India", "<b>M4</b>: M3 + All deposits with Post Office (excl. NSC)", "<b>Money Multiplier</b>: 1/CRR — if CRR = 10%, multiplier = 10 (₹100 reserve creates ₹1000 money)", "<b>Velocity of Money (V)</b>: Number of times money changes hands | Fisher's equation: MV = PT", "<b>Quantity Theory of Money</b>: MV = PT (Money × Velocity = Price level × Transactions)", "<b>Liquidity Trap</b>: Interest rates near zero, monetary policy ineffective (J.M. Keynes)", "<b>Crowding Out Effect</b>: Govt borrowing raises interest rates → reduces private investment", "<b>Credit Multiplier</b>: Initial deposit creates multiple deposits through banking system (1/CRR)", "Tight Monetary Policy (contractionary): Raise CRR/Repo to reduce money supply (to control inflation)", "Easy Monetary Policy (expansionary): Lower CRR/Repo to increase money supply (to stimulate growth)"], "table": {"h": ["Money Measure", "Components", "Type"], "r": [["M0 (Reserve Money)", "Currency + Bank deposits with RBI", "Most liquid"], ["M1 (Narrow Money)", "Currency with public + Demand deposits", "Very liquid"], ["M2", "M1 + Post Office savings", "—"], ["M3 (Broad Money)", "M1 + Time deposits (banks)", "MOST USED in India"], ["M4", "M3 + Post Office all deposits", "Widest"]]}, "mn": {"h": "🧠 MEMORY HOOK — Money Supply & MPC", "b": "<b>M0→M4 ladder:</b> M0=smallest (just RBI) → M1=cash+demand deposits → M2=M1+PO savings → M3=M1+time deposits (widest used) → M4=widest<br><b>Key:</b> M3 is India's official broad money measure<br><br><b>OMO trick:</b> RBI BUYs securities → pumps money IN (expansionary) | RBI SELLs securities → takes money OUT (contractionary)<br><br><b>MV=PT:</b> Money×Velocity = Price×Transactions — if V & T fixed, M↑ → P↑ (inflation)"}, "traps": ["❌ 'M1 includes time deposits' → ✅ Time deposits (FD) are in M3, NOT M1. M1 = currency + demand deposits only", "❌ 'MPC has 3 members' → ✅ MPC has 6 members: 3 from RBI (including Governor) + 3 external (Govt-appointed)", "❌ 'OMO purchase reduces money supply' → ✅ OMO purchase INCREASES money supply (RBI pays money for securities bought from market)", "❌ 'M3 is not India's standard money measure' → ✅ M3 IS India's standard broad money measure (used for monetary policy targets)", "❌ 'Higher CRR increases money supply' → ✅ Higher CRR REDUCES money supply/credit creation (less money available to lend)"], "revision": ["MPC: 6 members, meets every 2 months, decides Repo Rate", "Quantitative tools: CRR, SLR, Repo, Reverse Repo, OMO, Bank Rate", "Qualitative tools: Moral Suasion, Margin requirements, Credit rationing", "M0=reserve money | M1=narrow money | M3=broad money (India's standard)", "Money Multiplier = 1/CRR", "Fisher: MV = PT | Liquidity Trap: Keynes (near-zero rates, policy ineffective)", "OMO buy → money ↑ | OMO sell → money ↓", "MSS: absorbs excess liquidity from FOREX inflows", "LAF: daily liquidity management (Repo + Reverse Repo)", "Contractionary = higher rates/CRR | Expansionary = lower rates/CRR"], "oneliners": ["Monetary Policy Committee (MPC) has → 6 members", "MPC meets → Every 2 months (bi-monthly)", "MPC decides → Repo Rate (key policy rate)", "MPC composition → 3 RBI members + 3 Govt-appointed external members", "M0 = → Reserve/High-Powered Money (currency + banker's deposits with RBI)", "M1 = → Narrow Money (currency with public + demand deposits)", "M3 = → Broad Money = M1 + Time deposits (India's standard measure)", "Money Multiplier = → 1/CRR", "OMO purchase by RBI → Increases money supply", "OMO sale by RBI → Reduces money supply", "MSS (Market Stabilisation Scheme) → Absorbs excess liquidity from FOREX inflows", "LAF = → Liquidity Adjustment Facility (daily: Repo + Reverse Repo)", "Fisher's Equation → MV = PT", "Quantity Theory of Money → Higher M → Higher P (if V,T constant)", "Liquidity Trap (Keynes) → Near-zero rates; monetary policy ineffective", "Crowding Out → Govt borrowing raises interest rates → reduces private investment", "Tight Monetary Policy → Higher CRR/Repo → reduces money supply → controls inflation", "Easy Monetary Policy → Lower CRR/Repo → increases money supply → stimulates growth", "M4 = → Widest measure = M3 + All Post Office deposits (excl. NSC)", "Qualitative tools include → Moral Suasion, Margin Requirements, Credit Rationing"], "flashcards": [{"q": "How many members in MPC and how often do they meet?", "a": "6 members (3 RBI including Governor + 3 external Govt-appointed). Meet every 2 months (bi-monthly). Decide Repo Rate by majority vote; Governor has casting vote in tie."}, {"q": "M1 vs M3 — key difference?", "a": "M1 (Narrow Money) = Currency with public + Demand deposits (savings + current accounts). M3 (Broad Money) = M1 + Time deposits with commercial banks. M3 is India's standard broad money measure."}, {"q": "What is the Money Multiplier?", "a": "Money Multiplier = 1/CRR. If CRR=10%, multiplier=10. An initial deposit of ₹100 creates ₹1000 in the economy through repeated lending in the banking system."}, {"q": "OMO — what is it and how does it affect money supply?", "a": "Open Market Operations: RBI buys/sells Govt securities. OMO Purchase → RBI pays cash → Money supply INCREASES. OMO Sale → RBI receives cash → Money supply DECREASES."}, {"q": "Fisher's Equation MV = PT — explain?", "a": "M=Money supply × V=Velocity of money = P=Price level × T=Total transactions. If V and T are constant, increasing M leads to proportionally higher P (inflation). Quantity Theory of Money."}, {"q": "What is the Liquidity Trap?", "a": "J.M. Keynes' concept — when interest rates are near zero, monetary policy becomes ineffective. People prefer to hold cash rather than invest even at zero rates. Govt must use fiscal policy instead."}, {"q": "Crowding Out Effect?", "a": "When Govt borrows heavily, it competes with private sector for funds → interest rates rise → private investment falls. Govt 'crowds out' private investment."}, {"q": "MSS vs OMO — difference?", "a": "OMO: RBI uses existing Govt securities. MSS (Market Stabilisation Scheme): Govt issues NEW securities specifically to absorb excess liquidity from large FOREX inflows. MSS proceeds kept in separate account."}, {"q": "Contractionary vs Expansionary Monetary Policy?", "a": "Contractionary (Tight): Raise Repo Rate/CRR → reduce money supply → control inflation. Expansionary (Easy): Lower Repo Rate/CRR → increase money supply → stimulate growth."}, {"q": "Qualitative monetary policy tools?", "a": "Moral Suasion (persuasion/advice), Margin Requirements (% of loan value in collateral), Rationing of Credit (credit limits), Direct Action (restrict specific lending)."}], "mcqs": [{"q": "How many members does the Monetary Policy Committee (MPC) have?", "o": ["3", "4", "6", "8"], "a": 2, "e": "MPC has 6 members: 3 from RBI (Governor + 2 Deputy Governors/officials) and 3 external members appointed by the Government. Meets every 2 months."}, {"q": "M3 in India is known as:", "o": ["Reserve Money", "Narrow Money", "Broad Money", "High-Powered Money"], "a": 2, "e": "M3 = Broad Money = M1 + Time deposits with commercial banks. It is India's standard/official broad money measure used for monetary policy purposes."}, {"q": "If CRR is 10%, what is the Money Multiplier?", "o": ["5", "10", "15", "20"], "a": 1, "e": "Money Multiplier = 1/CRR = 1/0.10 = 10. An initial deposit of ₹100 can create ₹1000 in money supply through the banking system."}, {"q": "When RBI purchases Govt securities in the open market (OMO), it:", "o": ["Reduces money supply", "Increases money supply", "Keeps money supply neutral", "Reduces bank deposits"], "a": 1, "e": "OMO Purchase: RBI buys securities → pays cash to sellers → money supply INCREASES (expansionary). OMO Sale → money supply DECREASES."}, {"q": "Fisher's Quantity Theory of Money: MV = PT means:", "o": ["Monetary policy determines exchange rates", "Money × Velocity = Price level × Transactions", "Money supply equals price level", "Velocity of money equals total production"], "a": 1, "e": "MV = PT: Money Supply × Velocity of Circulation = Price Level × Volume of Transactions. Shows that money supply growth leads to price level increases (inflation) if V and T constant."}, {"q": "Which monetary tool is qualitative (not quantitative)?", "o": ["CRR", "SLR", "Repo Rate", "Moral Suasion"], "a": 3, "e": "Moral Suasion is a qualitative/selective tool — RBI persuades banks through advice, requests. Quantitative tools: CRR, SLR, Repo Rate, Reverse Repo, OMO."}, {"q": "Liquidity Trap is associated with:", "o": ["Adam Smith", "J.M. Keynes", "Milton Friedman", "Irving Fisher"], "a": 1, "e": "Liquidity Trap (J.M. Keynes) — when interest rates are near zero, people prefer liquidity over bonds. Monetary policy loses effectiveness; fiscal policy needed."}, {"q": "M0 (Reserve Money) includes:", "o": ["Currency with public only", "Currency + Bank deposits with RBI + other RBI deposits", "M1 + Post Office savings", "M1 + Time deposits"], "a": 1, "e": "M0 = Reserve Money = Currency in circulation + Banker's deposits with RBI + Other deposits with RBI. Also called High-Powered Money or Monetary Base."}, {"q": "Market Stabilisation Scheme (MSS) is used to:", "o": ["Boost exports", "Stabilise stock market", "Absorb excess liquidity from large FOREX inflows", "Reduce fiscal deficit"], "a": 2, "e": "MSS: Govt issues special bonds to absorb excess liquidity created by large foreign exchange inflows (FOREX). Proceeds kept in separate sterilisation account."}, {"q": "To control inflation, RBI should:", "o": ["Reduce CRR and Repo Rate", "Buy Govt securities (OMO)", "Increase CRR and Repo Rate", "Reduce SLR"], "a": 2, "e": "Contractionary (tight) monetary policy: Increase CRR and Repo Rate → reduces money supply and credit → higher interest rates → less spending → controls inflation."}, {"q": "Which is NOT a function of Monetary Policy Committee?", "o": ["Setting Repo Rate", "Setting Reverse Repo Rate", "Setting CRR", "Recommending inflation target"], "a": 2, "e": "MPC decides Repo Rate (and linked Reverse Repo Rate). CRR and SLR are set by RBI separately — not by MPC. MPC focuses on interest rate decisions."}, {"q": "Crowding Out Effect means:", "o": ["Private firms crowd out Govt sector", "Govt borrowing raises interest rates, reducing private investment", "Exports crowd out domestic demand", "Banks crowd out non-banking firms"], "a": 1, "e": "Crowding Out: When Govt borrows heavily → demand for loanable funds rises → interest rates rise → private investment becomes expensive → private investment FALLS."}, {"q": "M1 includes:", "o": ["Currency + Time deposits", "Currency with public + Demand deposits", "Currency + Fixed deposits", "M0 + M2"], "a": 1, "e": "M1 (Narrow Money) = Currency with public + Demand deposits (current accounts + savings accounts). Time/Fixed deposits are in M3."}, {"q": "Liquidity Adjustment Facility (LAF) consists of:", "o": ["CRR and SLR", "Repo Rate and Reverse Repo Rate", "Bank Rate and MSS", "OMO and MSS"], "a": 1, "e": "LAF (Liquidity Adjustment Facility) is the daily liquidity management mechanism using Repo Rate (RBI lends to banks) and Reverse Repo Rate (RBI borrows from banks)."}, {"q": "If RBI wants to INCREASE money supply, it should:", "o": ["Increase CRR", "Increase SLR", "Sell Govt securities (OMO)", "Buy Govt securities (OMO)"], "a": 3, "e": "OMO Purchase (buying Govt securities) → RBI pays cash to market → Money supply increases. Reducing CRR/SLR also increases money supply."}]}]},
{"title": "Chapter 5: Poverty, Trade & Planning 🌏", "nodes": [{"id": "poverty_trade", "title": "Poverty, Inequality & Trade", "xp": 50, "type": "regular", "seqIdx": 8, "facts": ["<b>BPL (Below Poverty Line)</b>: India measures poverty based on caloric/expenditure norms", "<b>Tendulkar Committee (2009)</b>: Revised poverty line — 27.5% BPL (2004-05 data)", "<b>Rangarajan Committee (2014)</b>: Revised upward — Rs.972/month urban, Rs.407/month rural (2011-12 prices)", "<b>GINI Coefficient</b>: 0 = perfect equality | 1 = perfect inequality (measures income/wealth inequality)", "<b>Lorenz Curve</b>: Graphical representation of income distribution; farther from diagonal = more inequality", "<b>HDI</b> measures: Health (life expectancy) + Education (years schooling) + Income (GNI per capita)", "India's HDI rank: <b>134th</b> (2023 report, out of 193 countries)", "<b>PQLI (Physical Quality of Life Index)</b>: Life expectancy + Infant mortality + Literacy rate (Morris Morris)", "<b>Multidimensional Poverty Index (MPI)</b>: UNDP measure — health, education, living standards", "<b>Absolute Poverty</b>: Below minimum threshold | <b>Relative Poverty</b>: Relative to average society standard", "<b>Balance of Trade (BoT)</b>: Exports − Imports of GOODS only (visible items)", "<b>Balance of Payments (BoP)</b>: All transactions between India and rest of world (BoT + invisibles + capital)", "<b>Current Account</b>: Trade in goods + Trade in services + Primary income + Secondary income (transfers)", "<b>Capital Account</b>: FDI + FPI/FII + External borrowing + NRI deposits", "<b>Favorable BoT</b>: Exports > Imports (trade surplus) | <b>Adverse BoT</b>: Imports > Exports (trade deficit)", "<b>Terms of Trade</b>: Index of export prices / Index of import prices × 100", "<b>WTO (World Trade Organization)</b>: Established 1 January 1995 | Replaced GATT (1947) | HQ Geneva", "<b>WTO Ministerial Conferences</b>: MC1 Singapore (1996) to most recent (MC13 Abu Dhabi 2024)", "India: <b>Founding member of WTO, GATT, UN, IMF, World Bank</b>", "<b>SAFTA (South Asian Free Trade Area)</b>: Free trade among SAARC nations (effective 2006)", "<b>ASEAN</b>: 10 member nations | BRICS: Brazil, Russia, India, China, South Africa (+expansion)", "<b>IMF</b>: International Monetary Fund | HQ: Washington DC | Provides BoP support loans", "<b>World Bank</b>: HQ Washington DC | IBRD (loans to Govts) + IDA (soft loans) + IFC (private sector)", "<b>ADB</b>: Asian Development Bank | HQ: Manila, Philippines | Established 1966", "<b>FDI vs FPI</b>: FDI = long-term, direct investment in production/management. FPI = portfolio investment (stocks/bonds) — hot money, volatile"], "table": {"h": ["Committee", "Year", "Poverty Line Estimate"], "r": [["Alagh Committee", "1979", "Original calorie-based poverty line"], ["Lakdawala Committee", "1993", "State-specific poverty lines"], ["Tendulkar Committee", "2009", "27.5% BPL (2004-05)"], ["Rangarajan Committee", "2014", "29.5% BPL (2011-12) — revised higher"], ["Saxena Committee", "2009", "50% BPL in rural areas"]]}, "mn": {"h": "🧠 MEMORY HOOK — Poverty Committees & Trade", "b": "<b>Poverty committee order:</b> Alagh (1979) → Lakdawala (1993) → Tendulkar (2009) → Rangarajan (2014)<br>Each committee found HIGHER poverty than officially claimed!<br><br><b>BoT vs BoP:</b> BoT = only GOODS (visible) | BoP = EVERYTHING (goods + services + capital)<br><br><b>WTO:</b> Born 1 Jan 1995 from GATT's ashes | HQ Geneva (city of peace = trade peace)"}, "traps": ["❌ 'WTO replaced IMF' → ✅ WTO replaced GATT (1947). IMF and World Bank are separate (Bretton Woods institutions)", "❌ 'Balance of Trade includes services' → ✅ BoT = ONLY goods (visible trade). Services are in Current Account (BoP)", "❌ 'FPI is stable long-term investment' → ✅ FPI is 'hot money' — volatile portfolio investment. FDI is long-term direct investment", "❌ 'GINI = 0 means maximum inequality' → ✅ GINI = 0 means perfect EQUALITY. GINI = 1 means perfect INEQUALITY", "❌ 'ADB is headquartered in Tokyo' → ✅ ADB HQ is in Manila, Philippines (though Japan provides most capital)"], "revision": ["Tendulkar (2009): 27.5% BPL | Rangarajan (2014): 29.5% BPL", "GINI: 0=equality, 1=inequality | Lorenz Curve = income distribution graph", "BoT = only goods | BoP = goods + services + capital account", "WTO: 1 Jan 1995, replaced GATT (1947), HQ Geneva", "IMF + World Bank = Bretton Woods institutions (1944)", "FDI = long-term direct | FPI = portfolio (hot money)", "ADB: HQ Manila, Philippines (est. 1966)", "India HDI = 134th (2023) | HDI published by UNDP", "SAFTA effective 2006 | ASEAN = 10 members", "Current Account: Trade + Services + Transfers | Capital Account: FDI, FPI, borrowing"], "oneliners": ["Tendulkar Committee (2009) → 27.5% BPL population", "Rangarajan Committee (2014) → 29.5% BPL (revised higher)", "GINI Coefficient: 0 = → Perfect equality | 1 = perfect inequality", "Lorenz Curve measures → Income distribution (farther from diagonal = more inequality)", "India's HDI rank (2023) → 134th out of 193 countries", "PQLI includes → Life expectancy + Infant mortality + Literacy rate", "MPI published by → UNDP (Multidimensional Poverty Index)", "Balance of Trade (BoT) = → Exports − Imports of GOODS only", "Balance of Payments (BoP) = → All transactions (goods + services + capital)", "WTO established → 1 January 1995", "WTO replaced → GATT (1947)", "WTO HQ → Geneva, Switzerland", "IMF HQ → Washington DC (BoP support loans)", "World Bank HQ → Washington DC", "ADB HQ → Manila, Philippines (est. 1966)", "FDI = → Long-term direct investment in production", "FPI = → Portfolio investment (hot money, volatile)", "SAFTA → South Asian Free Trade Area (effective 2006, for SAARC nations)", "Favorable BoT → Exports > Imports (trade surplus)", "Terms of Trade = → (Export price index / Import price index) × 100"], "flashcards": [{"q": "Tendulkar vs Rangarajan Committee — what did they estimate?", "a": "Tendulkar (2009): 27.5% BPL (2004-05 data). Rangarajan (2014): 29.5% BPL (2011-12 data) — revised higher. Rangarajan gave higher poverty line: Urban ₹972/month, Rural ₹407/month."}, {"q": "GINI Coefficient — what does it measure?", "a": "Income/wealth inequality. Range: 0 (perfect equality — everyone earns same) to 1 (perfect inequality — one person earns everything). India's GINI ≈ 0.47 (2023)."}, {"q": "Balance of Trade vs Balance of Payments?", "a": "BoT: Only exports − imports of GOODS (visible items). BoP: ALL transactions — goods, services, transfers, FDI, FPI, external borrowing. BoP is comprehensive; BoT is subset."}, {"q": "WTO — when, what replaced, where?", "a": "WTO established 1 January 1995. Replaced GATT (General Agreement on Tariffs and Trade, 1947). HQ Geneva, Switzerland. India is founding member."}, {"q": "FDI vs FPI — key differences?", "a": "FDI: Long-term direct investment with management control (factories, subsidiaries). FPI: Portfolio investment in stocks/bonds — no management control, volatile 'hot money' that can leave quickly."}, {"q": "IMF vs World Bank — functions?", "a": "IMF: Provides short-term BoP support loans; monitors exchange rates; HQ Washington DC. World Bank: Long-term development finance; IBRD (loans to Govts) + IDA (soft loans) + IFC (private sector); HQ Washington DC."}, {"q": "What is Absolute vs Relative Poverty?", "a": "Absolute Poverty: Below a fixed minimum threshold (calories, expenditure) — regardless of what others earn. Relative Poverty: Poor relative to average society standard — even if needs are met but significantly below average."}, {"q": "Terms of Trade formula and significance?", "a": "Terms of Trade = (Index of Export Prices / Index of Import Prices) × 100. Improvement: Exports fetch more relative to imports (favorable). Deterioration: Pay more for imports relative to export earnings."}, {"q": "Current Account vs Capital Account in BoP?", "a": "Current Account: Trade in goods + services + primary income (dividends) + secondary income (remittances). Capital Account: FDI + FPI/FII g the failure of the 3rd Five Year Plan due to wars with China (1962), Pakistan (1965) and severe drought."}, {"q": "The last Five Year Plan in India was:", "o": ["10th FYP", "11th FYP", "12th FYP", "13th FYP"], "a": 2, "e": "12th Five Year Plan (2012-17) was India's last FYP. No 13th FYP was formulated. NITI Aayog replaced this with action plans and vision documents."}, {"q": "Father of Green Revolution in India is:", "o": ["Dr. Verghese Kurien", "M.S. Swaminathan", "Norman Borlaug", "P.C. Mahalanobis"], "a": 1, "e": "M.S. Swaminathan is the Father of Green Revolution in India — introduced HYV seeds (wheat and rice), modern agricultural practices in 1960s-70s."}, {"q": "White Revolution (Operation Flood) in India was related to:", "o": ["Wheat production", "Rice cultivation", "Milk production", "Fish farming"], "a": 2, "e": "White Revolution = Operation Flood — boost in MILK production (1970-1996) led by Dr. Verghese Kurien (Father of White Revolution/Milkman of India), founder of Amul."}, {"q": "MGNREGS guarantees how many days of employment per year?", "o": ["50 days", "75 days", "100 days", "150 days"], "a": 2, "e": "MGNREGS (2005) guarantees 100 days of employment per rural household per year. If work not provided within 15 days, unemployment allowance must be paid."}, {"q": "Ayushman Bharat (PM-JAY) provides health insurance of:", "o": ["₹1 lakh per family", "₹2 lakh per family", "₹5 lakh per family", "₹10 lakh per family"], "a": 2, "e": "PM-JAY provides ₹5 lakh health insurance coverage per family per year for secondary and tertiary care hospitalization. World's largest Govt-funded health insurance scheme."}, {"q": "PMJDY was launched for:", "o": ["Farm loan waivers", "Financial inclusion (zero-balance accounts)", "Rural road connectivity", "Housing for poor"], "a": 1, "e": "Pradhan Mantri Jan Dhan Yojana (2014) = financial inclusion. Zero-balance accounts, RuPay debit cards, ₹1 lakh accident insurance for unbanked population."}, {"q": "PM Kisan Samman Nidhi // ── HELPERS ──────────────────────────────────────────────────────────────────
function allNodes(){
  const ns=[];
  CHAPTERS.forEach(ch=>ch.nodes.forEach(n=>{n._ch=ch.title;ns.push(n);}));
  ns.push(GOLDEN_NODE);
  return ns;
}
function seqNodes(){return allNodes().sort((a,b)=>a.seqIdx-b.seqIdx);}
function isUnlocked(node){
  if(node.seqIdx===0)return true;
  if(node.type==='gold'){
    const reg=seqNodes().filter(n=>n.type!=='gold');
    const done=reg.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed);
    return done.length/reg.length>=(node.requires_pct/100);
  }
  const seq=seqNodes();
  const idx=seq.findIndex(n=>n.id===node.id);
  if(idx<=0)return true;
  const prev=seq[idx-1];
  return !!(S.mcq[prev.id]&&S.mcq[prev.id].passed);
}
function curNode(){
  const h=document.querySelector('#node-content .node-title b');
  if(!h)return null;
  return allNodes().find(n=>n.title===h.textContent)||null;
}

// ── TOPBAR REFRESH ────────────────────────────────────────────────────────────
function refreshTopbar(){
  const seq=seqNodes();
  const reg=seq.filter(n=>n.type!=='gold');
  const done=reg.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed);
  const xp=seq.reduce((s,n)=>s+(S.mcq[n.id]&&S.mcq[n.id].passed?n.xp:0),0);
  const pct=reg.length?Math.round(done.length/reg.length*100):0;
  const t=document.getElementById('tb-title');if(t)t.textContent='Economics Part 1';
  const p=document.getElementById('tb-pct');if(p)p.textContent=pct+'%';
  const x=document.getElementById('tb-xp');if(x)x.textContent='⚡'+xp+' XP';
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────────
function buildSidebar(){
  const sb=document.getElementById('sidebar-inner');
  if(!sb)return;
  const seq=seqNodes();
  const reg=seq.filter(n=>n.type!=='gold');
  const done=reg.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed);
  const xp=seq.reduce((s,n)=>s+(S.mcq[n.id]&&S.mcq[n.id].passed?n.xp:0),0);
  const pct=reg.length?Math.round(done.length/reg.length*100):0;
  let html=`<button class="dash-btn" onclick="showDash();closeDrawer()">📊 Dashboard — ${done.length}/${reg.length} (${pct}%) · ⚡${xp} XP</button>`;
  const byCh={};
  seq.filter(n=>n.type!=='gold').forEach(n=>{
    const ch=n._ch||'Other';
    if(!byCh[ch])byCh[ch]=[];
    byCh[ch].push(n);
  });
  Object.entries(byCh).forEach(([ch,nodes])=>{
    html+=`<div class="ch-header">${ch}</div>`;
    nodes.forEach(n=>{
      const locked=!isUnlocked(n);
      const passed=S.mcq[n.id]&&S.mcq[n.id].passed;
      const cls=locked?'node-item locked':passed?'node-item passed':'node-item';
      const icon=locked?'🔒':passed?'✅':'○';
      html+=`<div class="${cls}" onclick="openNode('${n.id}')">
<span class="ni-icon">${icon}</span>
<span class="ni-text">${n.title}</span>
<span class="ni-xp">${n.xp}XP</span></div>`;
    });
  });
  const gn=GOLDEN_NODE;
  const gLocked=!isUnlocked(gn);
  const gPassed=S.mcq[gn.id]&&S.mcq[gn.id].passed;
  const gCls=gLocked?'node-item gold-node locked':gPassed?'node-item gold-node passed':'node-item gold-node';
  const gIcon=gLocked?'🔒':gPassed?'🏆':'⭐';
  html+=`<div class="ch-header">🏆 Golden Challenge</div>
<div class="${gCls}" onclick="openNode('${gn.id}')">
<span class="ni-icon">${gIcon}</span>
<span class="ni-text">${gn.title}</span>
<span class="ni-xp">${gn.xp}XP</span></div>`;
  sb.innerHTML=html;
  refreshTopbar();
}

  track('node_open',{node_id:id,material:'economics_part1'});

}

}

  </div>
</div></div>`;

function chooseOpt(i){
  const qs=getMcqs();
  const q=qs[TS.qi];
  const correct=i===q.a;
  if(S.faa[TS.node.id][TS.qi]===undefined)S.faa[TS.node.id][TS.qi]=correct?1:0;
  if(correct)TS.score++;
  const opts=document.getElementById('opts');
  if(!opts)return;
  Array.from(opts.children).forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a)b.style.cssText+='background:rgba(74,201,133,.15)!important;border-color:var(--green)!important;color:var(--green)!important;';
    else if(idx===i&&!correct)b.style.cssText+='background:var(--red-bg)!important;border-color:var(--red)!important;color:var(--red)!important;';
  });
  const exp=document.createElement('div');
  exp.style.cssText='margin-top:10px;padding:9px 12px;background:var(--gold-bg);border:1px solid var(--gold2);border-radius:6px;font-size:.78rem;color:var(--ink2);line-height:1.5';
  exp.textContent='💡 '+q.e;
  opts.after(exp);
  setTimeout(()=>{
    TS.qi++;
    if(TS.qi<qs.length)renderQ();
    else finishAttempt();
  },1800);
}
function finishAttempt(){
  const qs=getMcqs();
  const total=qs.length;
  const pct=Math.round(TS.score/total*100);
  const pass=pct>=70;
  if(pass){
    S.mcq[TS.node.id]={passed:true,score:TS.score,total};
    S.xp+=TS.node.xp;
    saveS();
    buildSidebar();
    if(!TS.isGold)setTimeout(()=>buildNodeNav(TS.node),100);
    track(TS.isGold?'gold_pass':'node_pass',{node_id:TS.node.id,score:TS.score,total});
  } else {
    track(TS.isGold?'gold_fail':'node_fail',{node_id:TS.node.id,score:TS.score,total});
  }
  const pane=TS.isGold?'tp-gold':'tp-test';
  const el=document.getElementById(pane);
  if(!el)return;
  const faaOk=Object.values(S.faa[TS.node.id]||{}).filter(v=>v===1).length;
  el.innerHTML=`<div style="text-align:center;padding:24px 12px">
<div style="width:90px;height:90px;border-radius:50%;border:4px solid var(--${pass?'green':'red'});display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--${pass?'green':'red'});margin:0 auto 14px">${pct}%</div>
<div style="font-size:1.05rem;font-weight:700;margin-bottom:8px;color:var(--${pass?'gold':'red'})">${pass?(TS.isGold?'🏆 GOLD BADGE EARNED! +'+TS.node.xp+' XP':'🎉 Passed! +'+TS.node.xp+' XP'):'❌ Not Passed'}</div>
<div style="color:var(--ink2);font-size:.85rem;margin-bottom:6px">${TS.score} / ${total} correct</div>
${pass&&!TS.isGold?'<div style="color:var(--amber);font-size:.82rem;margin-bottom:6px">Next node unlocked! 🔓</div>':''}
${!pass?'<div style="color:var(--ink3);font-size:.8rem;margin-bottom:6px">Need 70% to pass. Review and retry!</div>':''}
${TS.isGold&&pass?'<div style="color:var(--gold);font-size:.9rem;font-weight:700;margin-bottom:8px">🌟 You are a Master Economist!</div>':''}
<div style="color:var(--amber);font-size:.78rem;margin-bottom:16px">⚡ First Attempt Accuracy: ${faaOk}/${total}</div>
<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
${pass&&!TS.isGold?`<button class="start-btn" onclick="goNext()">Next Node →</button>`:''}
${TS.isGold?`<button class="start-btn" onclick="startGoldTest()">🔄 Retry Gold</button><button class="nav-btn-sm" onclick="showDash()">📊 Dashboard</button>`:`<button class="nav-btn-sm" onclick="${TS.isGold?'startGoldTest':'startTest'}()">🔄 Retry</button>`}
</div></div>`;
}
function goNext(){
  const node=TS.node;
  const seq=seqNodes();
  const idx=seq.findIndex(n=>n.id===node.id);
  if(idx<seq.length-1){
    const next=seq[idx+1];
    if(isUnlocked(next))openNode(next.id);
    else showToast('Complete more nodes to unlock!');
  }
}

// ── NODE NAV ───────────────────────────────────────────────────────────────────
function buildNodeNav(node){
  const bar=document.getElementById('node-nav-bar');
  if(!bar)return;
  const seq=seqNodes();
  const idx=seq.findIndex(n=>n.id===node.id);
  const prev=idx>0?seq[idx-1]:null;
  const next=idx<seq.length-1?seq[idx+1]:null;
  bar.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;gap:8px;flex-wrap:wrap">
${prev?`<button class="nav-btn-sm" onclick="openNode('${prev.id}')">← ${prev.title}</button>`:'<div></div>'}
<button class="nav-btn-sm" onclick="showDash()">📊 Dashboard</button>
${next&&isUnlocked(next)?`<button class="start-btn" style="padding:8px 14px;font-size:.8rem" onclick="openNode('${next.id}')">${next.title} →</button>`:'<div></div>'}
</div>`;
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────────
function showDash(){
  const nc=document.getElementById('node-content');
  if(!nc)return;
  const seq=seqNodes();
  const reg=seq.filter(n=>n.type!=='gold');
  const done=reg.filter(n=>S.mcq[n.id]&&S.mcq[n.id].passed);
  const xp=seq.reduce((s,n)=>s+(S.mcq[n.id]&&S.mcq[n.id].passed?n.xp:0),0);
  const pct=reg.length?Math.round(done.length/reg.length*100):0;
  const gPassed=S.mcq[GOLDEN_NODE.id]&&S.mcq[GOLDEN_NODE.id].passed;
  nc.innerHTML=`<div class="nc"><div class="node-header"><div class="node-title"><b>📊 Your Economics Dashboard</b></div></div>
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">
  ${[['⚡ '+xp,'Total XP'],[''+done.length+'/'+reg.length,'Nodes Done'],[''+pct+'%','Completion'],[gPassed?'🏆 YES':'🔒 No','Gold Badge']].map(([v,l])=>`
  <div style="background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;text-align:center">
    <div style="font-size:1.2rem;font-weight:700;color:var(--gold)">${v}</div>
    <div style="font-size:.72rem;color:var(--ink3);margin-top:4px">${l}</div>
  </div>`).join('')}
</div>
<div style="height:8px;background:var(--panel);border-radius:4px;margin-bottom:16px;overflow:hidden">
  <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold2),var(--amber));border-radius:4px;transition:width .5s"></div>
</div>
<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
${seq.map(n=>{
  const p=S.mcq[n.id]&&S.mcq[n.id].passed;
  const lk=!isUnlocked(n);
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:6px;font-size:.78rem;background:${p?'rgba(74,201,133,.08)':lk?'var(--bg2)':'var(--panel)'};color:${p?'var(--green)':lk?'var(--ink3)':'var(--ink2)'}">
    <span>${p?'✅':lk?'🔒':'○'} ${n.title}</span>
    <span>${p?S.mcq[n.id].score+'/'+S.mcq[n.id].total+' +'+n.xp+'XP':lk?'Locked':n.xp+'XP avail'}</span>
  </div>`;}).join('')}
</div>
<div style="text-align:center">
<button class="start-btn" onclick="openNode(seqNodes()[0].id)">📚 Start Learning</button>
</div></div>`;
  track('dash_open',{xp,done:done.length});
}

// ── TOAST / DRAWER ─────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function toggleDrawer(){
  const a=document.getElementById('aside');
  const o=document.getElementById('drawer-overlay');
  if(!a)return;
  const open=a.style.transform==='translateX(0px)';
  a.style.transform=open?'translateX(-260px)':'translateX(0px)';
  if(o)o.style.display=open?'none':'block';
}
function closeDrawer(){
  const a=document.getElementById('aside');
  const o=document.getElementById('drawer-overlay');
  if(a)a.style.transform='translateX(-260px)';
  if(o)o.style.display='none';
}

// ── INIT ────────────────────────────────────────────────────────────────────────
function init(){
  initMetrics();
  loadS();
  // mobile: sidebar hidden by default
  const a=document.getElementById('aside');
  if(a&&window.innerWidth<768)a.style.transform='translateX(-260px)';
  buildSidebar();
  showDash();
  track('session_start',{material:'economics_part1'});
}
document.addEventListener('DOMContentLoaded',init);
window.addEventListener('beforeunload',()=>track('session_end',{material:'economics_part1'}));
</script>

<style>

.flash-front{background:var(--panel);color:var(--ink)}
.flash-back{background:rgba(240,188,69,.1);border-color:rgba(240,188,69,.3);color:var(--gold);transform:rotateY(180deg)}
.flash-reset-row{text-align:center;margin-top:4px}
.gold-header{border-color:var(--gold)!important;background:linear-gradient(135deg,var(--panel),rgba(46,125,50,.2))!important;}
.opt{padding:10px 14px;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:7px;cursor:pointer;font-size:.82rem;text-align:left;transition:all .15s;width:100%}
.opt:hover:not(:disabled){background:var(--panel2);border-color:var(--amber);}
.start-btn{padding:11px 24px;background:var(--gold2);color:var(--gold);border:1px solid var(--gold);border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:700;}
.start-btn:hover{background:#1B5E20;}
.nav-btn-sm{padding:8px 14px;background:var(--panel);border:1px solid var(--line);color:var(--ink2);border-radius:7px;cursor:pointer;font-size:.8rem;font-weight:600;}
.nav-btn-sm:hover{background:var(--panel2);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--gold);color:var(--ink);padding:10px 20px;border-radius:8px;font-size:.82rem;opacity:0;transition:all .3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;}
@media(min-width:768px){
  aside{transform:translateX(0)!important;}
  .drawer-overlay{display:none!important;}
}
</style>
