<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SSC Economics Part 1 — CentuMania</title>
<style>
:root{
  --bg:#051A0F;--bg2:#030E08;--panel:#0A2E18;--panel2:#0D3520;--line:#1A5C30;
  --ink:#D4E8DA;--ink2:#88B898;--ink3:#4A7858;
  --gold:#FFD54F;--gold2:#2E7D32;--gold-glow:rgba(255,213,79,.15);
  --amber:#4FC985;--gold-bg:rgba(255,213,79,.08);
  --red:#f87171;--red-bg:rgba(248,113,113,.10);
  --blue:#60a5fa;--green:#4ade80;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg2);color:var(--ink);font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--gold)}
/* TOPBAR */
.topbar{background:var(--bg);border-bottom:1px solid var(--line);padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.menu-btn{background:none;border:none;color:var(--ink2);cursor:pointer;font-size:20px;padding:4px}
.tb-brand{font-weight:700;font-size:.95rem;color:var(--gold);letter-spacing:.04em}
.tb-title{font-size:.8rem;color:var(--ink2);flex:1;text-align:center}
.tb-xp{font-size:.8rem;color:var(--gold);font-weight:600}
.tb-pct{font-size:.8rem;color:var(--amber)}
/* LAYOUT */
.layout{display:flex;flex:1;min-height:0}
aside{width:260px;background:var(--bg);border-right:1px solid var(--line);overflow-y:auto;flex-shrink:0;transition:transform .25s}
.sidebar-inner{padding:8px 0}
.main{flex:1;overflow-y:auto;padding:16px}
/* SIDEBAR */
.dash-btn{display:block;width:calc(100% - 16px);margin:8px;padding:8px 12px;background:var(--gold-bg);border:1px solid var(--gold2);border-radius:6px;color:var(--gold);font-size:.82rem;font-weight:600;cursor:pointer;text-align:left}
.dash-btn:hover{background:var(--gold-glow)}
.ch-header{padding:10px 16px 4px;font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase}
.node-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;font-size:.8rem}
.node-item:hover{background:var(--panel);border-left-color:var(--gold2)}
.node-item.active{background:var(--panel2);border-left-color:var(--gold)}
.node-item.locked{opacity:.75;cursor:not-allowed}
.node-item.passed .ni-icon{color:var(--green)}
.ni-icon{font-size:.9rem;width:20px;text-align:center}
.ni-text{flex:1;color:#fff}
.ni-xp{font-size:.68rem;color:var(--gold);font-weight:600}
.gold-node .ni-text{color:var(--gold)!important}
/* MAIN CONTENT */
.nc{max-width:860px;margin:0 auto;padding-bottom:40px}
.node-header{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px}
.node-title{font-size:1.3rem;font-weight:700;color:var(--ink);margin-bottom:8px}
.node-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:.75rem;color:var(--ink2)}
.node-meta span{background:var(--panel2);padding:3px 10px;border-radius:20px;border:1px solid var(--line)}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{flex:1;padding:9px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink2);font-size:.8rem;font-weight:600;cursor:pointer;text-align:center;letter-spacing:.04em;transition:all .15s}
.tab.active{background:var(--panel2);color:var(--gold);border-color:var(--gold)}
.tab-pane{display:none}
.tab-pane.active{display:block}
/* LEARN PANE SECTIONS */
.sec{margin-bottom:16px}
.sec-title{font-size:.75rem;font-weight:700;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase;margin-bottom:8px}
.facts-list{list-style:none;padding:0}
.facts-list li{padding:6px 0 6px 20px;border-bottom:1px solid var(--line);color:var(--ink2);font-size:.85rem;position:relative}
.facts-list li::before{content:"▸";position:absolute;left:4px;color:var(--gold2)}
.tbl{width:100%;border-collapse:collapse;font-size:.78rem;margin-bottom:4px}
.tbl th{background:var(--panel2);color:var(--gold);padding:7px 10px;text-align:left;border:1px solid var(--line);font-weight:600}
.tbl td{padding:6px 10px;border:1px solid var(--line);color:var(--ink2)}
.tbl tr:nth-child(even) td{background:var(--panel)}
.mnemonic{background:var(--gold-bg);border:1px solid var(--gold2);border-radius:8px;padding:14px;margin:12px 0}
.mn-h{font-size:.78rem;font-weight:700;color:var(--gold);margin-bottom:6px;letter-spacing:.05em}
.mn-b{font-size:.83rem;color:var(--ink2);line-height:1.6}
.traps-sec{background:var(--red-bg);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:14px;margin:12px 0}
.traps-sec .sec-title{color:var(--red)}
.trap-item{font-size:.82rem;color:var(--ink2);padding:5px 0;border-bottom:1px solid rgba(248,113,113,.15)}
.trap-item:last-child{border-bottom:none}
.revision-sec{background:rgba(79,201,133,.06);border:1px solid rgba(79,201,133,.25);border-radius:8px;padding:14px;margin:12px 0}
.revision-sec .sec-title{color:var(--amber)}
.rev-item{font-size:.82rem;color:var(--ink2);padding:4px 0;border-bottom:1px solid rgba(79,201,133,.1)}
.rev-item:last-child{border-bottom:none}
.oneliners-sec{margin:12px 0}
.oneliners-sec .sec-title{color:var(--blue)}
.ol-item{font-size:.8rem;color:var(--ink2);padding:4px 0 4px 16px;border-bottom:1px solid var(--line);position:relative}
.ol-item::before{content:"🎯";position:absolute;left:0;font-size:.7rem;top:5px}
/* FLASHCARDS */
.flash-hint{font-size:.78rem;color:var(--ink3);margin-bottom:12px;text-align:center}
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.flash-card{height:130px;cursor:pointer;perspective:600px}
.flash-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s}
.flash-card.flipped .flash-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:14px;text-align:center;font-size:.8rem}
.flash-front{background:var(--panel2);border:1px solid var(--line);color:var(--ink)}
.flash-back{background:var(--gold-bg);border:1px solid var(--gold2);color:var(--gold);transform:rotateY(180deg)}
/* MCQs */
.mcq-wrap{display:flex;flex-direction:column;gap:14px}
.mcq-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
.mcq-q{font-size:.85rem;color:var(--ink);margin-bottom:10px;font-weight:500}
.mcq-opts{display:flex;flex-direction:column;gap:6px}
.opt{padding:8px 12px;border-radius:6px;border:1px solid var(--line);background:var(--panel2);color:var(--ink2);font-size:.8rem;cursor:pointer;transition:all .15s}
.opt:hover:not(.answered){background:var(--gold-bg);border-color:var(--gold2);color:var(--ink)}
.opt.answered{cursor:default}
.opt.correct{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green)}
.opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.opt.skip{opacity:.4}
.mcq-exp{background:rgba(79,201,133,.08);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;padding:8px 12px;font-size:.78rem;color:var(--ink2);margin-top:8px;display:none}
.mcq-exp.show{display:block}
.submit-row{display:flex;gap:10px;margin-top:16px;padding:12px 0}
.result-banner{padding:12px 16px;border-radius:8px;font-size:.85rem;font-weight:600;display:none;margin-top:8px}
.result-banner.ok{background:rgba(74,222,128,.15);border:1px solid var(--green);color:var(--green)}
.result-banner.warn{background:var(--red-bg);border:1px solid var(--red);color:var(--red)}
/* BUTTONS */
.btn{padding:9px 18px;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid var(--line);transition:all .15s}
.btn-primary{background:var(--gold);color:#030E08;border-color:var(--gold)}
.btn-primary:hover{background:#FFE082}
.btn-secondary{background:var(--panel2);color:var(--ink2);border-color:var(--line)}
.btn-secondary:hover{background:var(--panel);color:var(--ink)}
/* DASHBOARD */
.dash{padding:8px 0}
.dash-title{font-size:1.5rem;font-weight:700;color:var(--gold);margin-bottom:4px}
.dash-sub{font-size:.85rem;color:var(--ink2);margin-bottom:20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;text-align:center}
.stat-val{font-size:1.4rem;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:.72rem;color:var(--ink2);margin-top:2px}
.progress-bar{height:8px;background:var(--panel2);border-radius:4px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;transition:width .5s}
.node-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.ng-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;cursor:pointer;text-align:center;transition:all .15s}
.ng-card:hover:not(.ng-locked){background:var(--panel2);border-color:var(--gold2)}
.ng-card.ng-locked{opacity:.5;cursor:not-allowed}
.ng-card.ng-passed{border-color:var(--green)}
.ng-icon{font-size:1.5rem;margin-bottom:6px}
.ng-title{font-size:.75rem;color:var(--ink2);font-weight:500;margin-bottom:4px}
.ng-xp{font-size:.7rem;color:var(--gold)}
.ng-status{font-size:.68rem;color:var(--green);margin-top:3px}
/* GOLD MASTER */
.gold-header{background:var(--gold-bg);border:1px solid var(--gold);border-radius:10px;padding:20px;text-align:center;margin-bottom:20px}
.gold-header h2{color:var(--gold);font-size:1.3rem;margin-bottom:6px}
.gold-header p{color:var(--ink2);font-size:.82rem}
.master-sec{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}
/* NODE NAV */
.node-nav{display:flex;gap:8px;margin-top:24px;padding-top:16px;border-top:1px solid var(--line)}
.node-nav .btn{flex:1;text-align:center;font-size:.8rem}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:.82rem;color:var(--ink);opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:none}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.warn{border-color:var(--gold);color:var(--gold)}
/* DRAWER OVERLAY */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:all}
@media(max-width:700px){
  aside{position:fixed;left:0;top:52px;bottom:0;z-index:95;transform:translateX(-100%);width:280px}
  aside.open{transform:translateX(0)}
  .main{padding:12px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .node-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

  <button class="menu-btn" onclick="toggleDrawer()">☰</button>

</div>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="layout">

  <main class="main"><div id="node-content"></div></main>
</div>

const SK='centumania_eco1_v1';

function initMetrics(){
  try{
    const stores=[localStorage,sessionStorage];
    for(const store of stores){
      if(_mToken)break;
      for(let i=0;i<store.length;i++){
        const k=store.key(i);
        if(k&&k.startsWith('sb-')&&k.endsWith('-auth-token')){
          const d=JSON.parse(store.getItem(k)||'{}');
          _mToken=d?.access_token||null;break;
        }
      }
    }
  }catch(e){}
  _mSid='eco1-'+(Date.now().toString(36));
}
function track(name,meta={}){
  if(!_mToken)return;
  fetch('/api/events',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_mToken},
    body:JSON.stringify({event_name:name,session_id:_mSid,event_timestamp:new Date().toISOString(),metadata:meta})

}

"Exceptions to Law of DMU?", "a": "Money, Hobbies, Alcohol — MU does NOT diminish for these"}, {"q": "Stock vs Flow — example each?", "a": "Stock: Machinery owned (at a point in time). Flow: National Income earned (over a period)"}, {"q": "What is Disinvestment?", "a": "Government selling its shareholdings in public sector — reduces Govt assets"}, {"q": "Who proposed Comparative Advantage theory?", "a": "David Ricardo in 1817 — a country should produce what it makes relatively most efficiently"}], "mcqs": [{"q": "Which sector contributes most to India's GDP?", "o": ["Primary (Agriculture)", "Secondary (Manufacturing)", "Tertiary (Services)", "Quaternary (Knowledge)"], "a": 2, "e": "Tertiary (Services) sector contributes ~54% to India's GDP — the highest. Primary contributes only 21-22%."}, {"q": "The Law of Diminishing Marginal Utility was given by:", "o": ["J.M. Keynes", "Alfred Marshall", "Adam Smith", "David Ricardo"], "a": 1, "e": "Alfred Marshall formulated the Law of DMU. He also gave the concept of Consumer Surplus."}, {"q": "Which of the following is a Giffen Good?", "o": ["iPhone", "Wheat (for the poor)", "Gold jewellery", "Mercedes Benz"], "a": 1, "e": "Giffen goods are inferior goods where demand INCREASES with price rise. Poor buy more wheat when prices rise as they can't afford better food."}, {"q": "MSME Development Act was passed in:", "o": ["2003", "2005", "2006", "2008"], "a": 2, "e": "MSME Development Act was passed in 2006. Micro <₹1Cr, Small <₹10Cr, Medium <₹20Cr investment."}, {"q": "Which economic system does India follow?", "o": ["Capitalist", "Socialist", "Mixed", "Laissez-faire"], "a": 2, "e": "India follows Mixed Economy. USA = Capitalist; USSR/North Korea = Socialist. Mixed = both Public + Private sectors."}, {"q": "LPG reforms in India were introduced in:", "o": ["1984", "1988", "1991", "1995"], "a": 2, "e": "LPG reforms (Liberalisation, Privatisation, Globalisation) introduced in 1991 under PM P.V. Narasimha Rao and FM Manmohan Singh."}, {"q": "Consumer Surplus = ?", "o": ["Market Price − Cost of Production", "Willingness to Pay − Market Price", "Market Price − Willingness to Pay", "Revenue − Total Cost"], "a": 1, "e": "Consumer Surplus = Willingness to Pay − Market Price (Alfred Marshall). It measures extra benefit consumers get above what they pay."}, {"q": "Father of Modern Economics is:", "o": ["J.M. Keynes", "David Ricardo", "Adam Smith", "Alfred Marshall"], "a": 2, "e": "Adam Smith is called Father of Modern Economics. J.M. Keynes = Father of Economics (Speculative motive theory)."}, {"q": "Which jobs are associated with the Quinary sector?", "o": ["Farmers", "Factory workers", "IT professionals", "Politicians and decision makers"], "a": 3, "e": "Quinary sector = decision-making activities (politicians, senior executives). Primary=Red collar, Secondary=Blue collar, Tertiary=White collar, Quinary=Gold collar."}, {"q": "Hoarding in relation to trade is:", "o": ["An aid to trade", "A form of warehousing", "NOT an aid to trade", "A form of investment"], "a": 2, "e": "Aid/Auxiliary to trade: Warehousing, Transport, Banking, Insurance, Advertisement. Hoarding is NOT an aid to trade."}, {"q": "Veblen Goods are characterized by:", "o": ["Elastic demand", "Perfectly inelastic demand", "Negative demand", "Unit elastic demand"], "a": 1, "e": "Veblen goods are luxury/status goods (iPhone, Mercedes). Their demand is perfectly inelastic — price rises don't reduce demand."}, {"q": "Which of the following is a STOCK concept (not flow)?", "o": ["National income per year", "Annual savings", "Machinery owned by a firm", "Export earnings this quarter"], "a": 2, "e": "Stock = measured at a point in time (machinery, inventory, cash). Flow = measured over a period (income, savings, exports)."}, {"q": "An exception to the Law of Diminishing Marginal Utility is:", "o": ["Food", "Clothing", "Money", "Shelter"], "a": 2, "e": "Exceptions to DMU where MU does NOT diminish: Money, Hobbies, Alcohol. All others including food, clothing, shelter follow normal DMU."}, {"q": "David Ricardo is known for:", "o": ["Law of Supply", "Comparative Advantage (1817)", "Consumer Surplus", "Speculative Motive"], "a": 1, "e": "David Ricardo (1817) developed the theory of Comparative Advantage — countries should specialise in producing what they make relatively most efficiently."}, {"q": "In which year was the MSME Development Act passed?", "o": ["2002", "2004", "2006", "2009"], "a": 2, "e": "MSME Development Act 2006. The National Board for MSME meets every 6 months."}]}, {"id": "national_income", "title": "National Income & GDP", "xp": 60, "type": "regular", "seqIdx": 1, "facts": ["<b>Financial Year in India</b>: 1 April to 31 March", "<b>GDP</b> = Total value of final goods & services produced within territorial boundaries", "<b>GNP = GDP + Net Factor Income from Abroad (NFIA)</b>", "<b>NDP = GDP − Depreciation</b> | <b>NNP = GNP − Depreciation</b>", "<b>GDP Deflator</b> = (Nominal GDP / Real GDP) × 100", "<b>Real GDP</b> = inflation-adjusted (uses base year prices) | <b>Nominal GDP</b> = current prices", "GDP concept developed by <b>Simon Kuznets (1934)</b>", "GDP calculated by <b>National Statistical Office (NSO)</b> under MoSPI", "India: <b>GNP < GDP</b> (more foreigners earn in India than Indians earn abroad)", "USA: GNP > GDP (more Americans earn abroad than foreigners earn in USA)", "<b>Per Capita Income</b> = National Income / Population", "<b>PPP (Purchasing Power Parity)</b>: India = 3rd largest economy (after USA & China) by PPP", "<b>Second-hand goods NEVER counted in GDP</b> (no new production)", "<b>Transfer Payments NOT included in GDP</b> (no productive activity): Pensions, Scholarships, Subsidies", "<b>Intermediate goods avoided</b> to prevent Double Counting — only FINAL goods counted", "3 methods: <b>Value Added</b> (Output−Input) | <b>Income Method</b> | <b>Expenditure Method</b> (C+G+I+X−M)", "<b>Money Illusion (Irving Fisher)</b>: Thinking in nominal terms not real — e.g., wage +5% with inflation +7% = real −2%", "<b>GDP₍FC₎ = GDP₍MP₎ − Net Indirect Taxes</b> | GVA = GDP − Net Taxes on Products", "<b>HDI</b> published by UNDP: Health (life expectancy) + Education + Income (GNI per capita). India = 134th (2023)", "<b>Personal Income</b> = NI + Transfer payments − Undistributed profits − Corporate taxes", "<b>Personal Disposable Income</b> = Personal Income − Personal taxes", "<b>Green GDP</b> = GDP adjusted for environmental degradation and natural resource depletion", "Circular Flow — 4-sector model: Households + Firms + Government + Foreign sector", "Leakages: Savings, Taxes, Imports | Injections: Investment, Govt spending, Exports"], "table": {"h": ["Measure", "Formula", "Key Point"], "r": [["GDP", "Final goods & services (domestic)", "Base measure of economy"], ["GNP", "GDP + NFIA", "Includes Indians earning abroad"], ["NDP", "GDP − Depreciation", "Net of asset wear & tear"], ["NNP (NI)", "GNP − Depreciation", "= National Income at MP"], ["Real GDP", "Constant (base year) prices", "Inflation-adjusted"], ["Nominal GDP", "Current prices", "Includes inflation effect"], ["GDP Deflator", "(Nominal/Real)×100", "Economy-wide inflation measure"]]}, "mn": {"h": "🧠 MEMORY HOOK — GDP Formulae Chain", "b": "<b>Think of GDP as a tree:</b><br>GDP = trunk | GNP = GDP + branches abroad (NFIA) | NDP = GDP − fallen leaves (depreciation) | NNP = GNP − fallen leaves<br><br><b>India vs USA trick:</b> India = poor in FOREX (GNP<GDP) | USA = rich abroad (GNP>GDP)<br><br><b>3 methods mnemonic: VIE</b> → Value Added, Income, Expenditure (C+G+I+X−M)"}, "traps": ["❌ 'Second-hand goods are counted in GDP' → ✅ NEVER counted — no new production", "❌ 'Transfer payments are included in GDP' → ✅ NOT included (pensions, scholarships = no productive activity)", "❌ 'Household domestic work is counted in GDP' → ✅ NOT counted", "❌ 'India's GNP > GDP' → ✅ India's GNP < GDP (more foreigners earn in India than Indians abroad)", "❌ 'GDP Deflator uses a fixed basket' → ✅ GDP Deflator covers ALL goods in economy; CPI uses a fixed basket", "❌ 'India is 3rd largest by nominal GDP' → ✅ India is 5th by nominal GDP but 3rd by PPP (after USA & China)"], "revision": ["GNP = GDP + NFIA | NDP = GDP − Dep | NNP = GNP − Dep", "GDP Deflator = (Nominal/Real GDP) × 100", "3 methods: Value Added | Income | Expenditure (C+G+I+X−M)", "India GNP < GDP | USA GNP > GDP", "Second-hand goods NEVER counted | Transfer payments NOT in GDP", "Only FINAL goods counted to avoid double counting", "HDI = Health + Education + Income (UNDP) | India rank: 134", "Green GDP = GDP adjusted for environment degradation", "Personal Disposable Income = PI − Personal taxes", "Circular flow — 4 sectors: Households, Firms, Govt, Foreign"], "oneliners": ["GDP developed by → Simon Kuznets (1934)", "GDP calculated by → National Statistical Office (NSO) under MoSPI", "India's financial year → 1 April to 31 March", "GNP = GDP + NFIA (Net Factor Income from Abroad)", "NDP = GDP − Depreciation", "NNP = GNP − Depreciation (= National Income at MP)", "GDP Deflator = (Nominal GDP / Real GDP) × 100", "Real GDP = constant prices (inflation-adjusted)", "Nominal GDP = current prices (not inflation-adjusted)", "India GNP < GDP | USA GNP > GDP", "India GDP rank = 5th (nominal) | 3rd by PPP", "Per Capita Income = National Income / Population", "Second-hand goods → NEVER counted in GDP", "Transfer payments → NOT included in GDP", "Household domestic work → NOT counted in GDP", "3 GDP methods → Value Added, Income, Expenditure", "Expenditure method = C + G + I + (X − M)", "Money Illusion concept → Irving Fisher", "HDI published by → UNDP (3 dimensions: Health, Education, Income)", "Green GDP = GDP adjusted for environmental degradation"], "flashcards": [{"q": "GNP formula?", "a": "GNP = GDP + NFIA (Net Factor Income from Abroad)"}, {"q": "Why is India's GNP less than GDP?", "a": "More foreigners earn income in India than Indians earn abroad — so NFIA is negative for India"}, {"q": "What is GDP Deflator?", "a": "GDP Deflator = (Nominal GDP / Real GDP) × 100 — measures economy-wide inflation"}, {"q": "Why are second-hand goods excluded from GDP?", "a": "No new production occurs — they were already counted when first produced. Counting again = double counting"}, {"q": "Why are transfer payments excluded from GDP?", "a": "No productive activity in return (pensions, scholarships, subsidies don't create new goods/services)"}, {"q": "What is Money Illusion?", "a": "Irving Fisher's concept — people think in nominal (not real) terms. E.g., wage +5% with inflation +7% = real loss of 2% but person feels richer"}, {"q": "What does HDI measure and who publishes it?", "a": "Human Development Index published by UNDP. 3 dimensions: Health (life expectancy) + Education + Income (GNI per capita). India rank: 134th (2023)"}, {"q": "Expenditure method of GDP?", "a": "GDP = C + G + I + (X − M) where C=Consumption, G=Govt expenditure, I=Investment, X=Exports, M=Imports"}, {"q": "Personal Disposable Income formula?", "a": "PDI = Personal Income − Personal taxes. Personal Income = NI + Transfer payments − Undistributed profits − Corporate taxes"}, {"q": "What is Green GDP?", "a": "GDP adjusted for environmental degradation and depletion of natural resources. Also called Environmentally adjusted GDP"}, {"q": "4-sector Circular Flow model includes?", "a": "Households + Firms + Government + Foreign sector. Leakages: Savings, Taxes, Imports. Injections: Investment, Govt spending, Exports"}, {"q": "GDP at Factor Cost vs GDP at Market Price?", "a": "GDP(FC) = GDP(MP) − Net Indirect Taxes. Or: GDP(MP) = GVA + Net Taxes on Products"}], "mcqs": [{"q": "India's GNP compared to GDP is:", "o": ["Greater than GDP", "Equal to GDP", "Less than GDP", "Cannot be compared"], "a": 2, "e": "India's GNP < GDP because more foreigners earn income in India than Indians earn abroad (NFIA is negative)."}, {"q": "GDP Deflator = ?", "o": ["(Real GDP/Nominal GDP)×100", "(Nominal GDP/Real GDP)×100", "(GNP/NNP)×100", "(NDP/GDP)×100"], "a": 1, "e": "GDP Deflator = (Nominal GDP / Real GDP) × 100. It measures economy-wide inflation, unlike CPI which uses a fixed basket."}, {"q": "Which is NOT counted in GDP?", "o": ["Value of cars manufactured", "Services of doctors", "Pensions paid to retired employees", "Revenue from software exports"], "a": 2, "e": "Transfer payments like pensions are NOT counted in GDP — no productive activity in return. Only goods and services produced are counted."}, {"q": "The concept of GDP was developed by:", "o": ["J.M. Keynes", "Adam Smith", "Simon Kuznets", "Irving Fisher"], "a": 2, "e": "Simon Kuznets developed the concept of GDP in 1934. GDP is calculated in India by NSO under MoSPI."}, {"q": "To avoid double counting in GDP, economists count only:", "o": ["All transactions", "Intermediate goods", "Final goods and services", "Second-hand goods"], "a": 2, "e": "Only FINAL goods and services are counted to avoid double counting. Example: Wheat→Flour→Bread — only Bread (final good) counted."}, {"q": "Personal Disposable Income = ?", "o": ["NI + Transfer payments", "Personal Income − Personal taxes", "GDP − Depreciation", "GNP − Net indirect taxes"], "a": 1, "e": "Personal Disposable Income = Personal Income − Personal taxes. PDI is what households can actually spend."}, {"q": "HDI (Human Development Index) is published by:", "o": ["World Bank", "IMF", "UNDP", "WTO"], "a": 2, "e": "HDI is published by UNDP (United Nations Development Programme). It covers 3 dimensions: Health + Education + Income (GNI per capita)."}, {"q": "Which method of GDP calculation uses C+G+I+(X-M)?", "o": ["Value Added Method", "Income Method", "Expenditure Method", "Product Method"], "a": 2, "e": "Expenditure Method: GDP = C (Consumption) + G (Govt) + I (Investment) + (X−M) (Net Exports). This is also called demand-side approach."}, {"q": "India's GDP rank by Purchasing Power Parity (PPP) is:", "o": ["1st", "2nd", "3rd", "5th"], "a": 2, "e": "India is 3rd largest economy by PPP (after USA and China), but 5th largest by nominal GDP."}, {"q": "Money Illusion concept was given by:", "o": ["J.M. Keynes", "Alfred Marshall", "Irving Fisher", "Adam Smith"], "a": 2, "e": "Irving Fisher gave the concept of Money Illusion — tendency to think in nominal rather than real terms (also gave MV=PT quantity theory)."}, {"q": "Green GDP adjusts GDP for:", "o": ["Population growth", "Environmental degradation and resource depletion", "Transfer payments", "Exchange rate changes"], "a": 1, "e": "Green GDP = GDP adjusted for environmental degradation and depletion of natural resources. Also called Environmentally adjusted GDP."}, {"q": "In the 4-sector circular flow model, which is a LEAKAGE?", "o": ["Investment", "Govt spending", "Exports", "Savings"], "a": 3, "e": "Leakages from circular flow: Savings, Taxes, Imports. Injections into circular flow: Investment, Govt spending, Exports."}, {"q": "GDP at Factor Cost = ?", "o": ["GDP at MP + Net indirect taxes", "GDP at MP − Net indirect taxes", "GNP − Depreciation", "NNP + Depreciation"], "a": 1, "e": "GDP at FC = GDP at MP − Net Indirect Taxes. Factor cost excludes taxes but includes subsidies."}, {"q": "Financial Year in India is:", "o": ["1 January to 31 December", "1 April to 31 March", "1 June to 31 May", "1 July to 30 June"], "a": 1, "e": "India's Financial Year runs from 1 April to 31 March. This was established by the Acworth Committee structure."}, {"q": "NNP at Market Price is the same as:", "o": ["GDP", "GNP", "National Income at Market Price", "Personal Income"], "a": 2, "e": "NNP at MP = GNP − Depreciation. This is also referred to as National Income at Market Price. To get NI at Factor Cost, subtract Net Indirect Taxes."}]}]},
{"title": "Chapter 2: Government Finance 💸", "nodes": [{"id": "budget_finance", "title": "Union Budget & Public Finance", "xp": 60, "type": "regular", "seqIdx": 2, "facts": ["<b>Union Budget</b> presented by Finance Minister on <b>1st February</b> every year (changed from last day of Feb in 2017)", "Budget presented under <b>Article 112</b> of the Constitution (Annual Financial Statement)", "<b>Vote on Account</b>: temporary approval of expenditure before full budget passed (max 2 months normally, but election year = 6 months)", "<b>Zero-Based Budgeting (ZBB)</b>: every expense must be justified from scratch each year (not carried forward)", "<b>Performance Budgeting</b>: expenditure linked to measurable objectives/outcomes", "<b>Revenue Budget</b>: Revenue Receipts + Revenue Expenditure (recurring/operational expenses)", "<b>Capital Budget</b>: Capital Receipts + Capital Expenditure (asset creation/debt repayment)", "<b>Fiscal Deficit</b> = Total Expenditure − Total Revenue Receipts (measures govt borrowing needs)", "<b>Revenue Deficit</b> = Revenue Expenditure − Revenue Receipts", "<b>Primary Deficit</b> = Fiscal Deficit − Interest Payments", "<b>CAD (Current Account Deficit)</b>: Imports > Exports of goods + invisibles", "<b>Public Debt</b>: Internal debt (from citizens/domestic) + External debt (from foreign sources)", "<b>FRBM Act (Fiscal Responsibility & Budget Management) 2003</b>: Aims to reduce fiscal deficit to 3% of GDP", "<b>Contingency Fund of India</b>: ₹500 crore (operated by President; Parliament approval not needed for emergency use)", "<b>Consolidated Fund of India</b>: ALL Govt revenue goes here; ALL expenditure from here. Parliament vote required", "<b>Public Accounts of India</b>: Provident Fund, Postal deposits etc. — Parliament vote NOT required", "<b>Salary of President/Speaker/SC Judges</b> = Charged from Consolidated Fund (no vote required)", "<b>Effective Revenue Deficit</b> = Revenue Deficit − Grants for Capital Assets", "Plan vs Non-Plan expenditure distinction removed from 2017-18 Budget", "<b>Fiscal Policy</b> tools: Taxation + Public Expenditure + Public Borrowing + Deficit Financing"], "table": {"h": ["Fund", "Amount", "Parliamentary Vote", "Purpose"], "r": [["Consolidated Fund of India", "Entire revenue", "Required", "All regular receipts & expenditures"], ["Contingency Fund", "₹500 crore", "NOT required", "Emergency expenditure (President operates)"], ["Public Accounts", "Variable", "NOT required", "PF, postal deposits, etc."]]}, "mn": {"h": "🧠 MEMORY HOOK — Budget Deficits", "b": "<b>Deficit Ladder: Primary → Fiscal → Revenue</b><br>Primary Deficit = smallest (Fiscal − Interest)<br>Fiscal Deficit = medium (Total Expenditure − Revenue)<br>Revenue Deficit = only revenue side<br><br><b>3 Funds trick:</b> Con-Pay-Public → Consolidated (Pay Parliament to use) | Con-tingency (President uses freely, ₹500Cr) | Public (no vote, PF/postal)<br><br><b>Budget date trick:</b> Changed from Feb-end to <b>1 Feb 2017</b> — now Ministry has 2 months before financial year starts."}, "traps": ["❌ 'Budget presented on last day of February' → ✅ Changed to 1st February from 2017 (Arun Jaitley's reform)", "❌ 'Contingency Fund needs Parliament approval for use' → ✅ NO — President can use directly; later ratified by Parliament", "❌ 'Fiscal Deficit = Revenue Deficit' → ✅ Completely different. Fiscal = Total Exp − Total Receipts | Revenue = Revenue Exp − Revenue Receipts", "❌ 'Primary Deficit includes interest payments' → ✅ Primary Deficit = Fiscal Deficit − Interest Payments (MINUS interest!)", "❌ 'Salary of Ministers charged from Consolidated Fund' → ✅ Only President, Speaker, Supreme Court judges are charged from CF. Ministers' salaries go through vote."], "revision": ["Budget presented on 1st Feb (changed 2017) under Article 112", "Vote on Account = max 2 months (6 months in election year)", "Fiscal Deficit = Total Expenditure − Total Revenue Receipts", "Revenue Deficit = Revenue Exp − Revenue Receipts", "Primary Deficit = Fiscal Deficit − Interest Payments", "Consolidated Fund = Parliament vote needed | Contingency Fund (₹500Cr) = No vote needed", "FRBM Act 2003 = Fiscal deficit target 3% of GDP", "ZBB = Zero-Based Budgeting (every expense justified from scratch)", "Plan vs Non-Plan removed from 2017-18 Budget", "CAD = Current Account Deficit (Imports > Exports of goods + invisibles)"], "oneliners": ["Budget presented on → 1st February (changed from Feb-end in 2017)", "Budget presented under → Article 112 of Constitution", "Vote on Account maximum duration → 2 months (6 months in election year)", "Consolidated Fund of India → ALL Govt revenue; Parliament vote required for expenditure", "Contingency Fund of India → ₹500 crore; operated by President; NO Parliament vote", "Public Accounts of India → PF, postal deposits; NO Parliament vote required", "Fiscal Deficit = → Total Expenditure − Total Revenue Receipts", "Revenue Deficit = → Revenue Expenditure − Revenue Receipts", "Primary Deficit = → Fiscal Deficit − Interest Payments", "FRBM Act passed in → 2003; fiscal deficit target = 3% of GDP", "ZBB = → Zero-Based Budgeting (expenses justified from scratch every year)", "CAD = → Current Account Deficit (Imports > Exports of goods + invisibles)", "Plan vs Non-Plan distinction removed from → 2017-18 Budget", "Fiscal Policy tools → Taxation, Public Expenditure, Borrowing, Deficit Financing", "President/Speaker/SC Judges salaries → Charged from Consolidated Fund (no vote)", "Effective Revenue Deficit = → Revenue Deficit − Grants for Capital Assets", "Performance Budgeting → Expenditure linked to measurable outcomes", "Public Debt = → Internal debt + External debt", "Revenue Budget covers → Revenue Receipts + Revenue Expenditure (recurring)", "Capital Budget covers → Capital Receipts + Capital Expenditure (assets/debt)"], "flashcards": [{"q": "When is the Union Budget presented?", "a": "1st February every year (changed from last day of February in 2017, under Arun Jaitley)"}, {"q": "What Article of Constitution deals with Annual Financial Statement (Budget)?", "a": "Article 112 of the Constitution"}, {"q": "Fiscal Deficit formula?", "a": "Fiscal Deficit = Total Expenditure − Total Revenue Receipts. Measures how much the government needs to borrow."}, {"q": "Primary Deficit formula?", "a": "Primary Deficit = Fiscal Deficit − Interest Payments. Shows deficit excluding interest burden."}, {"q": "Difference between Consolidated Fund and Contingency Fund?", "a": "Consolidated Fund: All regular govt revenue; Parliament vote REQUIRED. Contingency Fund: ₹500 crore; President can use WITHOUT Parliament approval (for emergencies)."}, {"q": "What is Vote on Account?", "a": "Temporary approval to spend money before full budget is passed. Max 2 months normally, but 6 months in election year."}, {"q": "What is Zero-Based Budgeting (ZBB)?", "a": "Every expense must be justified from scratch each year — no automatic carry-forward of previous year budgets"}, {"q": "FRBM Act and its key target?", "a": "Fiscal Responsibility and Budget Management Act, 2003. Key target: Reduce fiscal deficit to 3% of GDP"}, {"q": "Whose salaries are 'charged' from Consolidated Fund?", "a": "President, Speaker/Deputy Speaker, SC Judges, CAG — their salaries are NOT voted upon; automatically charged."}, {"q": "Effective Revenue Deficit formula?", "a": "Effective Revenue Deficit = Revenue Deficit − Grants for Capital Assets (to better capture true operational deficit)"}], "mcqs": [{"q": "Union Budget is presented on:", "o": ["15 January", "1 February", "28/29 February", "1 March"], "a": 1, "e": "Budget presentation date changed from last day of February to 1st February from 2017, under Finance Minister Arun Jaitley."}, {"q": "Annual Financial Statement (Budget) is presented under which Article?", "o": ["Article 109", "Article 110", "Article 112", "Article 114"], "a": 2, "e": "Article 112 mandates the President to present Annual Financial Statement (Union Budget) before both Houses of Parliament."}, {"q": "Fiscal Deficit = ?", "o": ["Revenue Exp − Revenue Receipts", "Fiscal Deficit − Interest Payments", "Total Expenditure − Total Revenue Receipts", "Capital Exp − Capital Receipts"], "a": 2, "e": "Fiscal Deficit = Total Expenditure − Total Revenue Receipts (excluding borrowings). It measures the government's borrowing requirement."}, {"q": "Primary Deficit = ?", "o": ["Fiscal Deficit + Interest Payments", "Fiscal Deficit − Interest Payments", "Revenue Deficit − Fiscal Deficit", "Total Expenditure − Capital Receipts"], "a": 1, "e": "Primary Deficit = Fiscal Deficit − Interest Payments. It shows the gap excluding the interest burden on past debt."}, {"q": "Contingency Fund of India is operated by:", "o": ["Finance Minister", "Prime Minister", "President of India", "Parliament"], "a": 2, "e": "Contingency Fund (₹500 crore) is operated by the President. No Parliamentary approval needed for emergency use; later ratified by Parliament."}, {"q": "Which fund requires Parliamentary vote for every expenditure?", "o": ["Contingency Fund", "Public Accounts", "Consolidated Fund of India", "None of these"], "a": 2, "e": "Consolidated Fund of India requires Parliament's vote for every expenditure. All govt revenue flows into this fund."}, {"q": "FRBM Act was passed in:", "o": ["1999", "2001", "2003", "2005"], "a": 2, "e": "Fiscal Responsibility and Budget Management (FRBM) Act was passed in 2003. It targets fiscal deficit at 3% of GDP."}, {"q": "Zero-Based Budgeting means:", "o": ["Budget starts from zero (previous year base)", "Every expense justified from scratch each year", "Budget deficit is zero", "Only capital expenditure is budgeted"], "a": 1, "e": "ZBB requires every item of expenditure to be justified from scratch each year, not based on previous year's allocations."}, {"q": "Vote on Account can cover expenditure for maximum:", "o": ["1 month", "2 months", "6 months", "Until budget is passed"], "a": 1, "e": "Vote on Account covers expenditure for max 2 months normally. In election year, it can be up to 6 months."}, {"q": "Plan vs Non-Plan expenditure distinction was removed from:", "o": ["2015-16", "2016-17", "2017-18", "2018-19"], "a": 2, "e": "The Plan vs Non-Plan expenditure distinction was abolished starting from 2017-18 budget on the recommendation of C. Rangarajan committee."}, {"q": "Effective Revenue Deficit = ?", "o": ["Revenue Deficit + Grants for Capital Assets", "Revenue Deficit − Grants for Capital Assets", "Fiscal Deficit − Revenue Deficit", "Revenue Deficit + Interest Payments"], "a": 1, "e": "Effective Revenue Deficit = Revenue Deficit − Grants for Capital Assets. It gives a purer measure of operational revenue gap."}, {"q": "Which is NOT a charged expenditure from Consolidated Fund?", "o": ["President's salary", "Supreme Court Judge's salary", "Speaker's salary", "Cabinet Minister's salary"], "a": 3, "e": "Cabinet Ministers' salaries are NOT charged — they are voted upon. President, Speaker, Deputy Speaker, SC Judges, CAG salaries are charged expenditures."}, {"q": "Public Accounts of India includes:", "o": ["Defence expenditure", "Provident Fund and Postal deposits", "Government salaries", "Capital expenditure"], "a": 1, "e": "Public Accounts of India includes PF deposits, Postal savings, Small Savings — Parliament vote NOT required for withdrawals."}, {"q": "Current Account Deficit (CAD) occurs when:", "o": ["Exports > Imports", "Imports > Exports (goods + invisibles)", "Capital inflows > Outflows", "GDP growth is negative"], "a": 1, "e": "CAD occurs when imports of goods, services, and transfers exceed exports — the country is spending more abroad than it earns."}, {"q": "Fiscal Policy in India includes:", "o": ["Repo rate and CRR changes", "Money supply management", "Taxation and public expenditure", "Foreign exchange interventions"], "a": 2, "e": "Fiscal Policy tools: Taxation, Public Expenditure, Public Borrowing, Deficit Financing. Monetary Policy (repo rate, CRR) is RBI's domain."}]}, {"id": "taxation_gst", "title": "Taxation & GST", "xp": 50, "type": "regular", "seqIdx": 3, "facts": ["<b>Direct Tax</b>: paid directly by person on whom levied (Income Tax, Corporate Tax, Wealth Tax, Gift Tax)", "<b>Indirect Tax</b>: burden can be shifted to others (GST, Customs, Excise — now under GST)", "<b>GST implemented: 1 July 2017</b> (replaces VAT, Service Tax, Central Excise, etc.)", "GST is a <b>dual GST</b>: CGST (Centre) + SGST (State) on intra-state | IGST (Centre) on inter-state", "<b>GST Council</b>: Chairman = Finance Minister | 2/3 vote of members required for decisions", "Article 279A → GST Council | Article 246A → GST concurrent power", "<b>Petroleum products, Alcohol NOT under GST</b> (still under state excise/VAT)", "GST rates: <b>0%, 5%, 12%, 18%, 28%</b> | Special rate 3% for Gold, 1.5% for rough diamond", "<b>E-way bill</b> mandatory for inter-state movement of goods > ₹50,000", "<b>Goods</b> → CGST+SGST or IGST | <b>Services</b> → Taxed at 18% mostly", "<b>Income Tax</b>: Direct tax | Progressive tax structure | Collected by Central Govt", "<b>TDS (Tax Deducted at Source)</b>: deducted at point of payment before recipient gets money", "<b>TCS (Tax Collected at Source)</b>: collected by seller at time of sale (added to price)", "<b>Advance Tax</b>: Pay-as-you-earn taxation (if tax > ₹10,000/year)", "<b>Regressive Tax</b>: higher burden on poor (e.g., indirect taxes since all pay same amount)", "<b>Progressive Tax</b>: higher income → higher tax rate (Income Tax in India)", "<b>Proportional Tax</b>: flat rate regardless of income", "<b>Laffer Curve</b>: at very high tax rates, revenue actually FALLS (optimal tax rate maximizes revenue)", "<b>Customs Duty</b>: Import duty on goods entering India | Export duty on goods leaving", "<b>GAAR (General Anti-Avoidance Rules)</b>: Prevent tax avoidance through artificial arrangements", "<b>Tobin Tax</b>: Tax on foreign exchange transactions (to reduce currency speculation)", "<b>Pigouvian Tax</b>: Tax on negative externalities (e.g., carbon tax on polluters)"], "table": {"h": ["Tax Type", "Examples", "Who Bears?", "India"], "r": [["Direct Tax", "Income tax, Corporate tax", "Cannot shift burden", "Collected by Central Govt"], ["Indirect Tax", "GST, Customs", "Can shift to consumer", "GST Council manages"], ["Progressive", "Income tax", "Higher income → higher rate", "Promotes equity"], ["Regressive", "Indirect taxes", "Higher burden on poor", "Flat rate for all"], ["Proportional", "Flat tax", "Same rate for all", "Not common in India"]]}, "mn": {"h": "🧠 MEMORY HOOK — GST Rates & Articles", "b": "<b>GST rates: 0-5-12-18-28</b> → 'Zero Five Twelve Eighteen Twenty-Eight' → Remember as doubling: 5→10(skip)→12→18→28<br><br><b>GST Articles:</b> 279A = GST Council | 246A = GST Powers → 'A-Council, A-Powers' (both A series, 279 before 246 in schedule not alphabet!)<br><br><b>Tax burden trick:</b> DIrect tax — DIfficult to shift | INdirect tax — INstantly shifted to consumer"}, "traps": ["❌ 'Petroleum products are under GST' → ✅ NO — Petroleum, Diesel, Aviation fuel, Natural gas, Alcohol are OUTSIDE GST", "❌ 'GST was implemented on 1 April 2017' → ✅ Wrong date — GST implemented on 1 July 2017", "❌ 'GST Council decisions need simple majority' → ✅ 3/4 majority required (Centre = 1/3 vote; States = 2/3 vote)", "❌ 'Regressive tax is fairer' → ✅ Regressive tax actually burdens the POOR more — same amount is higher % of poor person's income", "❌ 'Advance tax is paid after year ends' → ✅ Advance tax is paid during the financial year itself (quarterly installments)"], "revision": ["GST from 1 July 2017 | Dual: CGST+SGST (intra-state) | IGST (inter-state)", "GST rates: 0%, 5%, 12%, 18%, 28% | Gold 3% | Diamond 1.5%", "Article 279A = GST Council | Article 246A = GST powers", "Petroleum, Alcohol OUTSIDE GST scope", "Direct tax: burden not shifted | Indirect tax: burden shifted", "Progressive (Income tax) vs Regressive (GST) vs Proportional", "E-way bill: inter-state goods movement > ₹50,000", "Laffer Curve: revenue falls at very high tax rates", "GAAR prevents artificial tax avoidance arrangements", "Pigouvian tax = on negative externalities (carbon tax)"], "oneliners": ["GST implemented on → 1 July 2017", "GST replaces → VAT, Service Tax, Central Excise, CST etc.", "Intra-state GST → CGST + SGST | Inter-state → IGST", "GST Council chairman → Union Finance Minister", "GST Council Article → 279A | GST Powers Article → 246A", "GST rates → 0%, 5%, 12%, 18%, 28%", "Gold GST rate → 3% | Rough Diamond → 1.5%", "Outside GST → Petroleum products, Alcohol for human consumption", "E-way bill mandatory for → Inter-state goods > ₹50,000", "Direct tax examples → Income Tax, Corporate Tax, Gift Tax", "Indirect tax examples → GST, Customs Duty", "Progressive tax → Higher income = Higher rate (Income Tax in India)", "Regressive tax → Same amount = Higher % burden on poor (Indirect taxes)", "Laffer Curve shows → Revenue falls at very high tax rates", "Pigouvian Tax → Tax on negative externalities (carbon tax, pollution)", "Tobin Tax → Tax on foreign exchange transactions", "GAAR → General Anti-Avoidance Rules (prevent artificial tax avoidance)", "TDS → Tax Deducted at Source (deducted before payment)", "TCS → Tax Collected at Source (added to sale price)", "Advance Tax → Pay-as-you-earn (if liability > ₹10,000/year)"], "flashcards": [{"q": "When was GST implemented in India?", "a": "1 July 2017. It replaced multiple indirect taxes like VAT, Service Tax, Central Excise, CST etc."}, {"q": "Dual GST structure in India?", "a": "Intra-state: CGST (Centre) + SGST (State). Inter-state: IGST (Centre collects, then distributes)"}, {"q": "Which goods/commodities are OUTSIDE GST?", "a": "Petroleum products (crude, diesel, petrol, aviation fuel, natural gas), Alcohol for human consumption — still under state excise/VAT"}, {"q": "Article 279A relates to?", "a": "GST Council — its composition, powers, and functioning. Article 246A gives concurrent power to Parliament and State legislatures to legislate on GST"}, {"q": "Difference between Direct and Indirect Tax?", "a": "Direct Tax: burden falls on the person who pays it (cannot be shifted) — Income Tax. Indirect Tax: burden can be shifted to consumers — GST, Customs"}, {"q": "What is Laffer Curve?", "a": "Shows that beyond an optimal tax rate, increasing taxes actually REDUCES revenue (as people evade/reduce activity). Named after Arthur Laffer."}, {"q": "Pigouvian Tax vs Tobin Tax?", "a": "Pigouvian: Tax on negative externalities (carbon tax on polluters — to correct market failure). Tobin: Tax on foreign exchange transactions (to reduce currency speculation)"}, {"q": "GST Council voting requirement?", "a": "3/4 majority: Centre's vote = 1/3 of total | States' votes = 2/3 of total. Finance Minister is chairperson."}, {"q": "E-way bill requirement?", "a": "Mandatory for inter-state movement of goods worth > ₹50,000. Required since April 2018."}, {"q": "Progressive vs Regressive Tax?", "a": "Progressive: Higher income → Higher tax rate (Income Tax — promotes equity). Regressive: Same tax amount = proportionally higher burden on poor (Indirect taxes like GST)"}], "mcqs": [{"q": "GST was implemented in India on:", "o": ["1 April 2017", "1 July 2017", "1 January 2018", "1 April 2018"], "a": 1, "e": "GST was launched on 1 July 2017, replacing multiple central and state indirect taxes."}, {"q": "For inter-state supply of goods and services, which GST applies?", "o": ["CGST", "SGST", "IGST", "Both CGST and SGST"], "a": 2, "e": "IGST (Integrated GST) applies to inter-state supply. CGST+SGST applies to intra-state supply."}, {"q": "GST Council is established under which Article?", "o": ["Article 246A", "Article 270", "Article 279A", "Article 301"], "a": 2, "e": "Article 279A establishes the GST Council. Article 246A gives concurrent legislative powers on GST to Parliament and State legislatures."}, {"q": "Which of the following is NOT under GST?", "o": ["Restaurant services", "Hotel accommodation", "Petroleum products", "Software services"], "a": 2, "e": "Petroleum products (petrol, diesel, crude, aviation fuel, natural gas) and Alcohol for human consumption are OUTSIDE GST scope."}, {"q": "GST rate on Gold is:", "o": ["0.25%", "1.5%", "3%", "5%"], "a": 2, "e": "Gold is taxed at 3% GST. Rough diamonds are taxed at 1.5%. These are special rates outside the main slab structure."}, {"q": "The Laffer Curve demonstrates that:", "o": ["Tax revenue always increases with tax rates", "Beyond an optimal rate, higher taxes reduce revenue", "Progressive taxes are always better", "Indirect taxes maximize revenue"], "a": 1, "e": "Laffer Curve shows an inverted-U relationship: tax revenue rises with rates up to an optimal point, then FALLS as high rates discourage activity/encourage evasion."}, {"q": "Which is a DIRECT tax?", "o": ["GST", "Customs Duty", "Income Tax", "Service Tax"], "a": 2, "e": "Income Tax is a direct tax — the person who earns pays it directly and cannot shift the burden. GST, Customs, Service Tax are indirect taxes."}, {"q": "Pigouvian Tax is levied on:", "o": ["Luxury goods", "Foreign exchange transactions", "Negative externalities (pollution, carbon)", "Income above ₹1 crore"], "a": 2, "e": "Pigouvian tax (A.C. Pigou) is levied on activities creating negative externalities — pollution, carbon emissions — to make producers bear social cost."}, {"q": "Which tax type has higher burden on lower income groups?", "o": ["Progressive Tax", "Proportional Tax", "Regressive Tax", "None of these"], "a": 2, "e": "Regressive tax imposes same amount on all, which as a % of income is higher for poor. GST is regressive since rich and poor pay same rate on goods."}, {"q": "E-way bill is mandatory for inter-state goods movement above:", "o": ["₹10,000", "₹25,000", "₹50,000", "₹1,00,000"], "a": 2, "e": "E-way bill is mandatory for inter-state movement of goods worth more than ₹50,000."}, {"q": "Tax Deducted at Source (TDS) is:", "o": ["Tax paid annually by taxpayer", "Tax deducted before payment reaches recipient", "Tax collected by seller from buyer", "Tax paid on capital gains"], "a": 1, "e": "TDS is deducted by the payer at source before giving money to recipient. E.g., salary payer deducts TDS before crediting salary."}, {"q": "GAAR stands for:", "o": ["General Accounts and Revenue Rules", "Gross Asset and Return Ratio", "General Anti-Avoidance Rules", "Government Audit and Revenue Report"], "a": 2, "e": "GAAR = General Anti-Avoidance Rules. Empowers tax authorities to deny tax benefits of arrangements entered into primarily to avoid taxes."}, {"q": "Advance tax is applicable when tax liability exceeds:", "o": ["₹5,000", "₹10,000", "₹25,000", "₹50,000"], "a": 1, "e": "If estimated tax liability exceeds ₹10,000 in a financial year, taxpayer must pay Advance Tax in installments during the year."}, {"q": "Income Tax in India is an example of:", "o": ["Regressive Tax", "Proportional Tax", "Progressive Tax", "Flat Tax"], "a": 2, "e": "Income Tax in India is progressive — as income increases, the tax rate increases in slabs (0%, 5%, 10%, 15%, 20%, 30%)."}, {"q": "GST Council requires ___ majority for decisions:", "o": ["Simple majority", "Absolute majority", "2/3 majority", "3/4 majority"], "a": 3, "e": "GST Council decisions require 3/4 majority. Centre's vote = 1/3 weight. States' votes together = 2/3 weight."}]}]},
{"title": "Chapter 3: Markets & Prices 📈", "nodes": [{"id": "demand_supply", "title": "Demand, Supply & Market", "xp": 50, "type": "regular", "seqIdx": 4, "facts": ["<b>Law of Demand</b>: Price ↑ → Demand ↓ (inverse relationship, ceteris paribus)", "<b>Law of Supply</b>: Price ↑ → Supply ↑ (direct relationship)", "<b>Price Elasticity of Demand (PED)</b>: % change in Qty demanded / % change in Price", "PED = 1 → Unitary elastic | PED > 1 → Elastic | PED < 1 → Inelastic | PED = 0 → Perfectly inelastic | PED = ∞ → Perfectly elastic", "<b>Elastic demand</b>: Luxury goods, goods with many substitutes | <b>Inelastic</b>: Necessities, medicines", "<b>Income Elasticity of Demand (YED)</b>: YED > 0 → Normal goods | YED < 0 → Inferior goods", "<b>Cross Elasticity</b>: Substitutes = positive | Complements = negative", "<b>Giffen Goods</b>: Inferior + demand RISES when price rises (exception to Law of Demand)", "<b>Veblen Goods</b>: Luxury + demand RISES when price rises (prestige effect)", "<b>Equilibrium</b>: Demand = Supply → Market clears at equilibrium price", "<b>Price Ceiling (Maximum Price)</b>: Set BELOW equilibrium → creates Shortage (excess demand)", "<b>Price Floor (Minimum Price)</b>: Set ABOVE equilibrium → creates Surplus (excess supply)", "<b>MSP (Minimum Support Price)</b> in India = Price Floor for agricultural commodities", "<b>PDS (Public Distribution System)</b> = food security at subsidized prices (Price Ceiling for consumers)", "<b>Market Forms</b>: Perfect Competition | Monopoly | Oligopoly | Monopolistic Competition | Monopsony", "<b>Perfect Competition</b>: Price takers; homogeneous products; free entry/exit", "<b>Monopoly</b>: Single seller; price maker; no close substitutes; barriers to entry", "<b>Oligopoly</b>: Few large firms; interdependence; kinked demand curve; e.g., telecom, auto", "<b>Monopsony</b>: Single BUYER (labor market — govt as only employer in some sectors)", "<b>Natural Monopoly</b>: Increasing returns to scale → one firm supplies whole market (Railways, utilities)", "<b>Consumer's Equilibrium</b> (2 goods): MU₁/P₁ = MU₂/P₂ (Law of equi-marginal utility)", "<b>Producer's Equilibrium</b>: MR = MC (Marginal Revenue = Marginal Cost)", "Short Run: At least one factor fixed | Long Run: All factors variable", "<b>Law of Variable Proportions</b>: Adding more of one input while others fixed → first increasing, then diminishing, then negative returns"], "table": {"h": ["Market Type", "Sellers", "Product", "Price Control", "Examples"], "r": [["Perfect Competition", "Many", "Homogeneous", "Price taker", "Agricultural markets"], ["Monopoly", "One", "Unique", "Price maker", "Indian Railways (earlier)"], ["Oligopoly", "Few", "Similar/Diff", "Price leader", "Telecom, Automobiles"], ["Monopolistic", "Many", "Differentiated", "Some control", "FMCG, Restaurants"], ["Monopsony", "Many sellers", "Uniform", "One buyer controls", "Govt as sole employer"]]}, "mn": {"h": "🧠 MEMORY HOOK — Elasticity & Market Forms", "b": "<b>Elasticity quick rule:</b> 'LENI' → Luxury=Elastic | Necessity=Inelastic<br><b>Income Elasticity:</b> Positive = Normal goods | Negative = Inferior goods | >1 = Luxury goods<br><br><b>Price Controls:</b> Ceiling = CAP on top → shortage | Floor = BASE at bottom → surplus<br>Think: ceiling stops prices going too HIGH (shortage happens); floor stops prices falling too LOW (surplus happens)<br><br><b>Market forms mnemonic:</b> 'PMOM' → Perfect | Monopoly | Oligopoly | Monopolistic"}, "traps": ["❌ 'Price Ceiling creates surplus' → ✅ Price Ceiling creates SHORTAGE (set below equilibrium; demand > supply)", "❌ 'Price Floor creates shortage' → ✅ Price Floor creates SURPLUS (set above equilibrium; supply > demand)", "❌ 'Giffen and Veblen goods are same' → ✅ Different! Giffen = INFERIOR goods (wheat for poor). Veblen = LUXURY goods (iPhone). Both have upward demand curves but different reasons.", "❌ 'MSP is a price ceiling' → ✅ MSP is a Price FLOOR (minimum price guaranteed to farmers above which market price should be)", "❌ 'Perfect competition has one seller' → ✅ One seller = Monopoly. Perfect competition has MANY buyers AND sellers."], "revision": ["Demand: Price↑→Demand↓ | Supply: Price↑→Supply↑", "PED>1=Elastic | PED<1=Inelastic | PED=0=Perfectly inelastic", "Luxury goods = Elastic | Necessities = Inelastic demand", "Price Ceiling (below equilibrium) → Shortage", "Price Floor (above equilibrium) → Surplus", "MSP = Price Floor for farmers | PDS = subsidized prices (ceiling for consumers)", "Giffen (inferior goods) vs Veblen (luxury) — both upward demand", "Perfect competition = price taker | Monopoly = price maker", "MR=MC → Producer's equilibrium | MU₁/P₁=MU₂/P₂ → Consumer's equilibrium", "Short run: one factor fixed | Long run: all factors variable"], "oneliners": ["Law of Demand → Price ↑ then Demand ↓ (inverse)", "Law of Supply → Price ↑ then Supply ↑ (direct)", "PED > 1 → Elastic demand (luxury goods)", "PED < 1 → Inelastic demand (necessity goods)", "PED = 0 → Perfectly inelastic (no substitutes, e.g., insulin)", "Income elasticity > 0 → Normal goods", "Income elasticity < 0 → Inferior goods", "Cross elasticity (+) → Substitute goods", "Cross elasticity (−) → Complementary goods", "Price Ceiling → below equilibrium → creates SHORTAGE", "Price Floor → above equilibrium → creates SURPLUS", "MSP = → Price Floor for agricultural commodities", "Giffen goods → Inferior goods + demand rises when price rises", "Veblen goods → Luxury goods + demand rises when price rises (prestige)", "Perfect competition → Many sellers, price takers, homogeneous products", "Monopoly → Single seller, price maker, barriers to entry", "Oligopoly → Few sellers, interdependent pricing, e.g., telecom", "Monopsony → Single BUYER controlling the market", "Producer's equilibrium → MR = MC", "Consumer's equilibrium → MU₁/P₁ = MU₂/P₂"], "flashcards": [{"q": "Law of Demand vs Law of Supply?", "a": "Demand: Price↑→Quantity demanded↓ (inverse). Supply: Price↑→Quantity supplied↑ (direct). Both hold ceteris paribus."}, {"q": "Price Ceiling vs Price Floor — which causes shortage?", "a": "Price Ceiling (maximum price set BELOW equilibrium) → Shortage. Price Floor (minimum price set ABOVE equilibrium) → Surplus."}, {"q": "Difference between Giffen and Veblen goods?", "a": "Giffen: INFERIOR goods (wheat for poor) — when price rises, they can't afford better food, buy more wheat. Veblen: LUXURY goods — price rise INCREASES status, so demand increases."}, {"q": "MSP in India — what type of price control?", "a": "MSP (Minimum Support Price) = Price FLOOR for agricultural commodities. Guarantees minimum price to farmers above market price."}, {"q": "Elastic vs Inelastic Demand — examples?", "a": "Elastic (PED>1): Luxury goods, goods with many substitutes (air travel, cars). Inelastic (PED<1): Necessities, medicines, no substitutes (insulin, petrol)."}, {"q": "What is Monopsony?", "a": "Market with a SINGLE BUYER (as opposed to Monopoly which is single seller). E.g., Government as sole employer in defense sector."}, {"q": "Producer's equilibrium condition?", "a": "MR = MC (Marginal Revenue = Marginal Cost). At this point, profit is maximized — producing more would cost more than revenue earned."}, {"q": "Law of Variable Proportions — key stages?", "a": "Stage 1: Increasing returns (MP rising). Stage 2: Diminishing returns (MP falling but positive). Stage 3: Negative returns (MP negative). Rational producer produces in Stage 2."}, {"q": "Cross Price Elasticity — substitutes vs complements?", "a": "Substitutes: Positive cross elasticity (Price of tea ↑ → demand for coffee ↑). Complements: Negative cross elasticity (Price of car ↑ → demand for petrol ↓)."}, {"q": "Natural Monopoly characteristics?", "a": "Occurs with large economies of scale — one firm can serve entire market at lower cost than two firms (Railways, electricity grid). Usually regulated by government."}], "mcqs": [{"q": "Price Ceiling set below equilibrium price causes:", "o": ["Surplus", "Shortage", "Equilibrium", "Increase in price"], "a": 1, "e": "Price Ceiling (maximum price) below equilibrium → Demand > Supply → Shortage. Example: Rent control leads to housing shortage."}, {"q": "MSP (Minimum Support Price) in India is an example of:", "o": ["Price Ceiling", "Price Floor", "Equilibrium Price", "Market Price"], "a": 1, "e": "MSP is a Price Floor — set above equilibrium to guarantee minimum income to farmers. Price floor → Surplus (unsold stock with FCI)."}, {"q": "Which goods have demand that RISES when their price RISES (for poor consumers)?", "o": ["Veblen goods", "Substitute goods", "Giffen goods", "Normal goods"], "a": 2, "e": "Giffen goods are inferior goods (like wheat/bread for the poor). When their price rises, poor can't afford better food substitutes, so they buy MORE of the Giffen good."}, {"q": "PED > 1 indicates:", "o": ["Inelastic demand", "Perfectly inelastic", "Elastic demand", "Unit elastic demand"], "a": 2, "e": "PED > 1 = Elastic demand. % change in quantity > % change in price. Found in luxury goods and goods with many substitutes."}, {"q": "In perfect competition, firms are:", "o": ["Price makers", "Price leaders", "Price takers", "Price discriminators"], "a": 2, "e": "In perfect competition, many sellers sell homogeneous products — no single seller can influence price. All are price TAKERS."}, {"q": "Producer's equilibrium in economics occurs at:", "o": ["MR > MC", "MR = MC", "MC > MR", "MR = 0"], "a": 1, "e": "Producer's equilibrium (profit maximization) occurs where MR = MC. Beyond this, producing more adds more cost than revenue."}, {"q": "Which market structure is characterized by few interdependent sellers?", "o": ["Monopoly", "Perfect competition", "Monopolistic competition", "Oligopoly"], "a": 3, "e": "Oligopoly has FEW large firms that are interdependent (each watches others' pricing). Examples: Telecom (Jio, Airtel, Vi), Automobiles, Airlines."}, {"q": "Cross Price Elasticity of complementary goods is:", "o": ["Positive", "Zero", "Negative", "Infinity"], "a": 2, "e": "Complements are used together (car+petrol, phone+charger). If price of car rises, demand for petrol FALLS → Negative cross elasticity."}, {"q": "Income elasticity of inferior goods is:", "o": ["Positive (> 1)", "Positive (< 1)", "Zero", "Negative"], "a": 3, "e": "Inferior goods have negative income elasticity. As income rises, consumers switch away from inferior goods (rice/wheat → processed food). YED < 0."}, {"q": "Monopsony refers to:", "o": ["Single seller market", "Single buyer market", "Many buyers, one seller", "Perfectly competitive market"], "a": 1, "e": "Monopsony = single buyer. Monopoly = single seller. In a monopsonistic labor market, the government or a large firm is the only employer."}, {"q": "The Law of Variable Proportions applies to:", "o": ["Long run only", "Short run only", "Both short and long run", "Neither"], "a": 1, "e": "Law of Variable Proportions applies to SHORT RUN when at least one factor (e.g., land, machinery) is fixed while others vary. In long run, all factors are variable."}, {"q": "Demand for which type of good is most price INELASTIC?", "o": ["Luxury cars", "Foreign holidays", "Insulin (diabetes medicine)", "Designer clothes"], "a": 2, "e": "Insulin has perfectly inelastic demand — diabetics MUST have it regardless of price. Medical necessities with no substitutes = most inelastic demand."}, {"q": "What happens when supply of a good increases while demand stays same?", "o": ["Price rises", "Price falls", "Quantity falls", "No change"], "a": 1, "e": "Supply increase (rightward shift) while demand constant → Excess supply at old price → Price falls until new equilibrium reached. More supply = lower price."}, {"q": "Veblen goods defy Law of Demand because:", "o": ["They are inferior goods", "Their utility falls with more consumption", "They give status — higher price = more desirable", "They have perfect substitutes"], "a": 2, "e": "Veblen goods (luxury/status goods like designer bags, iPhone) — higher price INCREASES their desirability (status symbol). This violates the Law of Demand."}, {"q": "In which market form does 'kinked demand curve' theory apply?", "o": ["Monopoly", "Perfect Competition", "Oligopoly", "Monopolistic Competition"], "a": 2, "e": "Kinked demand curve applies to Oligopoly — if one firm raises price, others don't follow (demand elastic above); if one cuts price, others follow (demand inelastic below)."}]}, {"id": "inflation_unemployment", "title": "Inflation & Unemployment", "xp": 60, "type": "regular", "seqIdx": 5, "facts": ["<b>Inflation</b>: Sustained rise in general price level | Deflation: Sustained fall in prices", "<b>CPI (Consumer Price Index)</b>: Measures retail price changes from consumer's perspective", "<b>WPI (Wholesale Price Index)</b>: Measures wholesale price changes (headline inflation measure before 2014)", "India shifted to <b>CPI as headline inflation</b> measure from 2014 (Urjit Patel Committee recommendation)", "<b>Core Inflation</b> = CPI excluding food & fuel (more stable, reflects underlying demand)", "<b>Headline Inflation</b> = Overall CPI (includes food, fuel, all items)", "<b>Demand-Pull Inflation</b>: Too much money chasing too few goods (excess demand)", "<b>Cost-Push Inflation</b>: Supply-side factors raise production costs (e.g., oil price shock)", "<b>Stagflation</b>: Stagnation (low growth) + Inflation — both simultaneously (1970s oil crisis)", "<b>Hyperinflation</b>: Extremely rapid inflation (e.g., Zimbabwe: 79.6 billion % in 2008; Germany 1923)", "<b>Reflation</b>: Deliberate policy to increase money supply to combat deflation", "<b>Disinflation</b>: Slowing of inflation rate (still positive, but lower than before)", "<b>RBI Inflation Target</b>: 4% ± 2% (range: 2%-6%) — Flexible Inflation Targeting (since 2016)", "<b>Phillips Curve</b>: Inverse relationship between Inflation and Unemployment (short-run trade-off)", "<b>NAIRU</b>: Non-Accelerating Inflation Rate of Unemployment (structural/natural rate)", "Types of Unemployment: Frictional | Structural | Cyclical | Seasonal | Disguised", "<b>Disguised Unemployment</b>: More workers than needed (common in Indian agriculture) — marginal productivity = 0", "<b>Seasonal Unemployment</b>: Only during off-season (agriculture, tourism)", "<b>Frictional Unemployment</b>: Short-term; while changing jobs (not negative; natural)", "<b>Structural Unemployment</b>: Skills mismatch with market needs (technology changes)", "<b>Unemployment Rate</b> in India measured by NSSO/NSO (National Statistical Office)", "<b>GDP Deflator</b> vs <b>CPI</b>: GDP Deflator covers all goods | CPI uses fixed basket", "Inflation measured over <b>12 months (year-on-year)</b> for CPI", "<b>Money Illusion</b> = not adjusting for inflation (Irving Fisher)"], "table": {"h": ["Type", "Rate", "Feature", "India Context"], "r": [["Creeping inflation", "1-3%", "Normal/manageable", "Healthy economy sign"], ["Walking inflation", "3-10%", "Becoming dangerous", "Warning signal"], ["Running inflation", "10-20%", "Serious", "Requires policy action"], ["Galloping inflation", "20-1000%", "Very dangerous", "Economy in trouble"], ["Hyperinflation", ">1000%", "Economy collapses", "Zimbabwe/Germany 1923"]]}, "mn": {"h": "🧠 MEMORY HOOK — Unemployment Types", "b": "<b>FSS-DC mnemonic:</b> Frictional (job change) | Structural (skills mismatch) | Seasonal (off-season) | Disguised (hidden in agriculture) | Cyclical (recession-linked)<br><br><b>Inflation types:</b> Demand-Pull = 'Too much money, too few goods (demand side)' | Cost-Push = 'Oil shock from supply side'<br><br><b>Phillips Curve:</b> Inflation ↑ ↔ Unemployment ↓ (inverse short-run trade-off). Like a see-saw!"}, "traps": ["❌ 'WPI is India's headline inflation measure' → ✅ Changed to CPI from 2014 (Urjit Patel Committee recommendation)", "❌ 'Disinflation = Deflation' → ✅ Different! Disinflation = inflation rate SLOWING DOWN (still positive). Deflation = prices FALLING (negative inflation)", "❌ 'Stagflation is high growth + inflation' → ✅ Stagflation = STAGNATION (low growth) + high Inflation simultaneously — worst of both worlds", "❌ 'Disguised unemployment means people are not working' → ✅ Disguised = people ARE working but are EXTRA — their marginal productivity is zero", "❌ 'Core Inflation includes food and fuel' → ✅ Core Inflation EXCLUDES food and fuel (more volatile items removed for stable reading)"], "revision": ["CPI = headline inflation in India (from 2014) | WPI = wholesale prices", "Core Inflation = CPI excluding food & fuel", "Demand-Pull (excess demand) vs Cost-Push (supply shock)", "Stagflation = Stagnation + Inflation | Hyperinflation = >1000%", "Disinflation = slowing inflation | Deflation = falling prices", "RBI target: 4% ± 2% (range 2-6%) since 2016", "Phillips Curve: Inflation ↑ = Unemployment ↓ (inverse)", "Disguised unemployment: extra workers, marginal productivity = 0 (agriculture)", "Frictional: between jobs | Structural: skills mismatch", "NAIRU = natural/structural unemployment rate"], "oneliners": ["India's headline inflation measure → CPI (changed from WPI in 2014)", "WPI = → Wholesale Price Index (still used for industrial inflation)", "Shift to CPI recommended by → Urjit Patel Committee", "Core Inflation = → CPI excluding food and fuel", "Demand-Pull Inflation = → Excess demand (too much money, too few goods)", "Cost-Push Inflation = → Supply side cost increase (oil shock)", "Stagflation = → Stagnation + High Inflation simultaneously", "Hyperinflation = → Extremely rapid inflation (Zimbabwe, Germany 1923)", "Disinflation ≠ Deflation → Disinflation = slower inflation rate; Deflation = negative inflation", "Reflation = → Deliberate expansion to combat deflation", "RBI inflation target → 4% ± 2% (flexible targeting since 2016)", "Phillips Curve → Inflation and Unemployment have inverse relationship (short-run)", "NAIRU = → Natural rate of unemployment (non-accelerating inflation level)", "Disguised unemployment → Workers' marginal productivity = 0 (common in agriculture)", "Frictional unemployment → Short-term, between jobs (natural/voluntary)", "Structural unemployment → Skills mismatch with market demand", "Seasonal unemployment → Agriculture/tourism off-season joblessness", "Cyclical unemployment → During economic recession/downturn", "GDP Deflator vs CPI → Deflator covers all goods | CPI uses fixed basket", "Money Illusion (Irving Fisher) → Not adjusting income/wealth for inflation"], "flashcards": [{"q": "India shifted from WPI to CPI as headline inflation in which year?", "a": "2014 — on recommendation of Urjit Patel Committee. CPI better reflects consumer price changes."}, {"q": "Demand-Pull vs Cost-Push Inflation?", "a": "Demand-Pull: Excess demand ('too much money chasing too few goods') — e.g., increased govt spending. Cost-Push: Supply-side cost increase (oil price rise, wage increase)."}, {"q": "Stagflation — what is it?", "a": "Simultaneous STAGNATION (low economic growth, high unemployment) + HIGH INFLATION. The worst combination — 1970s oil crisis caused it globally."}, {"q": "Disinflation vs Deflation — key difference?", "a": "Disinflation: Inflation rate is SLOWING DOWN (e.g., from 6% to 3%) — prices still rising, just more slowly. Deflation: Prices actually FALLING (negative inflation rate)."}, {"q": "RBI's inflation target range?", "a": "4% ± 2% → Range of 2% to 6% CPI inflation (Flexible Inflation Targeting Framework since 2016)"}, {"q": "Phillips Curve shows what relationship?", "a": "Inverse short-run relationship between Inflation and Unemployment. High inflation → Low unemployment (and vice versa). Trade-off for policymakers."}, {"q": "Disguised unemployment — explain?", "a": "More workers employed than actually needed — marginal productivity of extra workers = 0. Very common in Indian agriculture — if removed, production wouldn't fall. Also called hidden unemployment."}, {"q": "Core Inflation vs Headline Inflation?", "a": "Headline Inflation: Overall CPI (includes ALL items including food & fuel). Core Inflation: CPI EXCLUDING food & fuel (removes volatile items; shows underlying demand)."}, {"q": "Types of unemployment — brief explanation?", "a": "Frictional: between jobs (job change). Structural: skills mismatch. Seasonal: off-season (agriculture). Cyclical: economic recession. Disguised: extra workers with zero marginal output."}, {"q": "Hyperinflation examples from history?", "a": "Zimbabwe (2008): 79.6 billion % per month. Germany (1923): Weimar Republic hyperinflation. Both caused by excessive money printing."}], "mcqs": [{"q": "India adopted CPI as headline inflation measure in:", "o": ["2010", "2012", "2014", "2016"], "a": 2, "e": "India shifted to CPI as headline inflation from 2014, on the recommendation of the Urjit Patel Committee. Earlier WPI was used."}, {"q": "Core Inflation excludes:", "o": ["Housing and clothing", "Food and fuel", "Services and manufacturing", "Imports and exports"], "a": 1, "e": "Core Inflation = CPI excluding Food and Fuel (most volatile items). It reflects more stable underlying demand-side inflation."}, {"q": "Stagflation refers to:", "o": ["High inflation + High growth", "High inflation + Low growth/Stagnation", "Low inflation + High growth", "Deflation + Recession"], "a": 1, "e": "Stagflation = Stagnation (low growth, high unemployment) + Inflation (high prices) — worst of both worlds. 1970s oil crisis caused global stagflation."}, {"q": "Which type of unemployment is most common in Indian agriculture?", "o": ["Frictional", "Structural", "Seasonal", "Disguised"], "a": 3, "e": "Disguised unemployment: more workers than needed — their marginal productivity is zero. Removing them won't reduce output. Very common in India's agricultural sector."}, {"q": "Phillips Curve shows:", "o": ["Direct relationship between inflation and unemployment", "Inverse relationship between inflation and unemployment", "Relationship between GDP and inflation", "Relationship between interest rates and investment"], "a": 1, "e": "Phillips Curve shows inverse short-run trade-off: High inflation → Low unemployment, Low inflation → High unemployment. Policymakers must choose."}, {"q": "Disinflation means:", "o": ["Prices falling", "Rate of inflation decreasing", "Deflation followed by inflation", "Prices rising very fast"], "a": 1, "e": "Disinflation = SLOWING of inflation rate. Prices are still rising but at a lower rate than before. Not to be confused with Deflation (prices actually falling)."}, {"q": "RBI's inflation target (CPI) is:", "o": ["2% ± 2%", "4% ± 2%", "6% ± 2%", "3% ± 1%"], "a": 1, "e": "RBI targets CPI inflation at 4% (with ±2% tolerance band = 2% to 6%) under Flexible Inflation Targeting Framework adopted in 2016."}, {"q": "Demand-pull inflation is caused by:", "o": ["Rising oil prices", "Excess demand (more money, fewer goods)", "Falling money supply", "Structural unemployment"], "a": 1, "e": "Demand-Pull Inflation: Excess demand (too much money chasing too few goods). Caused by increased consumer/govt spending, money supply growth."}, {"q": "Frictional unemployment is:", "o": ["Due to recession", "Due to mismatch of skills", "Short-term while changing jobs", "Due to lack of demand"], "a": 2, "e": "Frictional unemployment is voluntary, short-term unemployment while transitioning between jobs. It's considered 'natural' and exists even in healthy economies."}, {"q": "The Urjit Patel Committee recommended:", "o": ["Adoption of GST", "Shift to CPI as headline inflation", "Creation of SEBI", "External Benchmark Rate for loans"], "a": 1, "e": "Urjit Patel Committee (2014) recommended adopting CPI as headline inflation measure and flexible inflation targeting framework (4% ± 2%)."}, {"q": "GDP Deflator vs CPI — key difference?", "o": ["CPI covers all goods; Deflator uses fixed basket", "GDP Deflator covers all goods; CPI uses fixed basket", "Both use the same basket", "Deflator only covers manufactured goods"], "a": 1, "e": "GDP Deflator covers ALL goods produced in the economy and changes each year. CPI uses a FIXED basket of goods to measure price changes from consumer perspective."}, {"q": "NAIRU refers to:", "o": ["Normal Annual Inflation and Unemployment Rate", "Non-Accelerating Inflation Rate of Unemployment", "Net Annual Industrial Revenue", "National Average Income and Unemployment Rate"], "a": 1, "e": "NAIRU = Non-Accelerating Inflation Rate of Unemployment — the natural/structural rate of unemployment at which inflation doesn't accelerate. Below NAIRU → inflation rises."}, {"q": "Hyperinflation in Zimbabwe (2008) reached approximately:", "o": ["100%", "1,000%", "79.6 billion %", "500%"], "a": 2, "e": "Zimbabwe's hyperinflation in November 2008 reached 79.6 billion percent per month — one of the worst in history, caused by money printing to fund deficit."}, {"q": "Which type of inflation is caused by rising wages and raw material costs?", "o": ["Demand-pull", "Cost-push", "Reflation", "Hyperinflation"], "a": 1, "e": "Cost-Push Inflation: Supply-side factors increase production costs (rising wages, oil prices, raw materials) → firms raise prices → inflation. 1973 OPEC oil shock caused it globally."}, {"q": "Reflation refers to:", "o": ["Return of inflation after deflation", "Deliberate expansion to combat deflation", "Rapid increase in inflation", "Control of inflation"], "a": 1, "e": "Reflation = Deliberate government/central bank policy to increase money supply and prices to combat deflation or recession. Opposite of anti-inflation policy."}]}]},
{"title": "Chapter 4: Banking & Money 🏦", "nodes": [{"id": "rbi_banking", "title": "RBI & Banking System", "xp": 60, "type": "regular", "seqIdx": 6, "facts": ["<b>RBI established: 1 April 1935</b> (based on Hilton-Young Commission recommendations)", "RBI Act: <b>1934</b> | Nationalized: <b>1949</b>", "<b>RBI Governor</b>: Appointed by Central Govt; 3-year term (renewable); can be removed by Govt", "<b>RBI HQ: Mumbai</b> (originally Calcutta 1935 → Mumbai 1937)", "RBI functions: Issue of currency | Banker to Government | Banker's Bank | Credit Control | Foreign Exchange Management", "<b>Bank Nationalization</b>: First wave 1969 (14 banks) under PM Indira Gandhi | Second wave 1980 (6 more banks)", "<b>Lead Bank Scheme (1969)</b>: One bank assigned lead role for development in each district", "<b>NABARD</b>: National Bank for Agriculture & Rural Development — established 1982 (Shivaraman Committee)", "Scheduled Banks: Listed in 2nd Schedule of RBI Act | Non-Scheduled Banks: Not listed", "<b>Commercial Banks</b>: Public Sector Banks + Private Sector Banks + Foreign Banks + RRBs", "<b>Regional Rural Banks (RRBs)</b>: Established 1975 under RRB Act (Narasimham Committee); support rural credit", "<b>Payment Banks</b>: Accept deposits up to ₹2 lakh; CANNOT give loans; e.g., Paytm, Airtel", "<b>Small Finance Banks</b>: Can give loans to micro enterprises; minimum 75% to priority sector", "<b>DICGC (Deposit Insurance)</b>: Insures deposits up to ₹5 lakh per depositor per bank", "<b>Priority Sector Lending</b>: Banks must lend 40% of ANBC to priority sectors (agriculture, MSME, housing etc.)", "<b>Capital Adequacy Ratio (CAR)</b>: Capital/Risk-weighted assets; Minimum 9% in India (Basel III: 8%)", "<b>Basel Norms</b>: Basel I (1988) | Basel II (2004) | Basel III (2010) — international banking standards", "<b>NPA (Non-Performing Asset)</b>: Loan where repayment overdue > 90 days", "<b>CRR (Cash Reserve Ratio)</b>: % of deposits banks must keep with RBI (no interest paid)", "<b>
